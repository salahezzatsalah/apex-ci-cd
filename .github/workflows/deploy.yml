name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SQLcl
        run: |
          wget -q https://download.oracle.com/otn_software/java/sqldeveloper/sqlcl-latest.zip
          unzip -q sqlcl-latest.zip
          chmod +x sqlcl/bin/sql

      - name: Configure Oracle Wallet
        run: |
          mkdir -p $GITHUB_WORKSPACE/wallet
          echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/wallet/wallet.zip
          unzip -q $GITHUB_WORKSPACE/wallet/wallet.zip -d $GITHUB_WORKSPACE/wallet/
          echo "TNS_ADMIN=$GITHUB_WORKSPACE/wallet" >> $GITHUB_ENV

      - name: Generate Artifact
        env:
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASS: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          printf "connect %s/\"%s\"@armadadev_tp\nproject gen-artifact -verbose\nexit;\n" \
            "$DB_USER" "$DB_PASS" > /tmp/gen.sql
          sqlcl/bin/sql -S /nolog @/tmp/gen.sql
        working-directory: ${{ github.workspace }}

      - name: Deploy to Production
        env:
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASS: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          ARTIFACT=$(find artifact/ -name "*.zip" | sort | tail -n 1)
          echo "Deploying: $ARTIFACT"
          printf "connect %s/\"%s\"@armadadev_tp\nproject deploy -file %s -verbose\nexit;\n" \
            "$DB_USER" "$DB_PASS" "$ARTIFACT" > /tmp/deploy.sql
          sqlcl/bin/sql -S /nolog @/tmp/deploy.sql
        working-directory: ${{ github.workspace }}
