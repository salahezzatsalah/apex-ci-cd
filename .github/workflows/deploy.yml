name: Build and Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SQLcl
        run: |
          wget https://download.oracle.com/otn_software/java/sqldeveloper/sqlcl-latest.zip
          unzip -q sqlcl-latest.zip
          echo "$GITHUB_WORKSPACE/sqlcl/bin" >> $GITHUB_PATH

      - name: Configure Oracle Wallet
        run: |
          mkdir -p $GITHUB_WORKSPACE/Wallet_ArmadaDev
          echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/Wallet_ArmadaDev/wallet.zip
          unzip -q $GITHUB_WORKSPACE/Wallet_ArmadaDev/wallet.zip -d $GITHUB_WORKSPACE/Wallet_ArmadaDev/
          echo "TNS_ADMIN=$GITHUB_WORKSPACE/Wallet_ArmadaDev" >> $GITHUB_ENV

      - name: Run SQLcl Liquibase Deployment
        env:
          DB_URL: armadadev_tp
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASS: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          # Generate the fresh artifact from codebase
          sql -S /nolog <<EOF
          connect $DB_USER/"$DB_PASS"@$DB_URL
          project gen-artifact -verbose
          exit;
          EOF
          
          # Deploy finding the newest generated zip
          ARTIFACT_FILE=$(ls artifact/*.zip | head -n 1)
          
          sql -S /nolog <<EOF
          connect $DB_USER/"$DB_PASS"@$DB_URL
          project deploy -file "$ARTIFACT_FILE" -verbose
          exit;
          EOF
