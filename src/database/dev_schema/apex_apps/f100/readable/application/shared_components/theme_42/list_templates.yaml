---
- # ====== List Template: copy =================================
  id: 265592403527451205
  identification: 
    name: copy
    identifier: COPY
    class: Vertical Unordered List without Bullets

  advanced: 
    translatable: false

  list: 
    before-rows: '<ul class="t-LinksList #COMPONENT_CSS_CLASSES#" id="#LIST_ID#">'

  entry: 
    current: |
      <li class="t-LinksList-item is-current #A03#" aria-current="page">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="#ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
      </li>
      
    current-with-sublist: |
      <li class="t-LinksList-item is-current #A03#" aria-current="page">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="#ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
        #SUB_LISTS#
      </li>
    noncurrent: |
      <li class="t-LinksList-item #A03#">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="t-Icon #ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
      </li>
    noncurrent-with-sublist: |
      <li class="t-LinksList-item #A03#">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="t-Icon #ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
      </li>

  sublist: 
    before-rows: <ul class="t-LinksList-list">
    after-rows: </ul>

  sublist-entry: 
    current: |
      <li class="t-LinksList-item is-current #A03#" aria-current="page">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="t-Icon #ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
      </li>
      
    noncurrent: |
      <li class="t-LinksList-item #A03#">
        <a href="#LINK#" class="t-LinksList-link" #A02# data-otel-label="#A10#">
          <span class="t-LinksList-icon" aria-hidden="true"><span class="t-Icon #ICON_CSS_CLASSES#"></span></span>
          <span class="t-LinksList-label">#TEXT#</span>
          <span class="t-LinksList-badge">#A01#</span>
        </a>
      </li>
      

  after-list-entry: 
    after-rows: </ul>

  attribute-descriptions: 
    a01: Badge Value
    a02: Link Attributes
    a03: List Item CSS Classes
    a10: OpenTelemetry Label

  template-options: 
  - # ====== Template Option: For All Items ======================
    id: 265593147096451209
    identification: 
      name: For All Items
      identifier: SHOWICONS
      group: Display Icons
      sequence: 20

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--showIcons

  - # ====== Template Option: Show Right Arrow ===================
    id: 265593551665451209
    identification: 
      name: Show Right Arrow
      identifier: SHOWGOTOARROW
      sequence: 20

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--showArrow

    help: 
      help-text: Show arrow to the right of link

  - # ====== Template Option: Disable Text Wrapping ==============
    id: 265593975656451209
    identification: 
      name: Disable Text Wrapping
      identifier: DISABLETEXTWRAPPING
      sequence: 30

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--nowrap

    help: 
      help-text: Do not allow link text to wrap to new lines. Truncate with ellipsis.

  - # ====== Template Option: Show Badges ========================
    id: 265594377164451209
    identification: 
      name: Show Badges
      identifier: SHOWBADGES
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--showBadge

    help: 
      help-text: Show badge to right of link (requires Attribute 1 to be populated)

  - # ====== Template Option: For Top Level Items Only ===========
    id: 265595017979451210
    identification: 
      name: For Top Level Items Only
      identifier: SHOWTOPICONS
      group: Display Icons
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--showTopIcons

    help: 
      help-text: This will show icons for top level items of the list only. It will not show icons for sub lists.

  - # ====== Template Option: Actions ============================
    id: 265595715717451210
    identification: 
      name: Actions
      identifier: ACTIONS
      group: Style
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-LinksList--actions

    help: 
      help-text: Render as actions to be placed on the right side column.

- # ====== List Template: side =================================
  id: 265597780188527583
  identification: 
    name: side
    identifier: SIDE
    class: Vertical Sidebar List

  advanced: 
    translatable: false

  template-options: 
    preset: 
    - t-TreeNav--styleA
    - js-navCollapsed--hidden
    default: 
    - js-defaultCollapsed

  list: 
    before-rows: |
      <div class="t-Body-nav" id="t_Body_nav" role="navigation" aria-label="&"APP_TEXT$APEX.TEMPLATE.APPLICATION".">
        <div class="a-TreeView t-TreeNav #COMPONENT_CSS_CLASSES#" id="t_TreeNav" data-id="#PARENT_STATIC_ID#_tree" aria-label="&"APP_TEXT$APEX.TEMPLATE.MAIN_NAV_LABEL".">
          <ul>
      

  entry: 
    current: |
      <li data-current="true" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#">
        <a href="#LINK#" title="#A04#" #APEX_CSP_DISPLAY_NONE# target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>
        <div class="a-TreeView-node a-TreeView-node--topLevel" aria-hidden="true">
          <div role="none" class="a-TreeView-row"></div>
          <div role="none" class="a-TreeView-content">
            <span class="fa6 #ICON_CSS_CLASSES#"></span>
            <span class="a-TreeView-label">#TEXT_ESC_SC#</span>
          </div>
        </div>
      </li>
      
    current-with-sublist: |
      <li data-current="true" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#">
        <a href="#LINK#" title="#A04#" #APEX_CSP_DISPLAY_NONE# target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>
        <div class="a-TreeView-node a-TreeView-node--topLevel" aria-hidden="true">
          <div role="none" class="a-TreeView-row"></div>
          <div role="none" class="a-TreeView-content">
            <span class="fa6 #ICON_CSS_CLASSES#"></span>
            <span class="a-TreeView-label">#TEXT_ESC_SC#</span>
          </div>
        </div>
      
    noncurrent: |
      <li data-current="false" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#">
        <a href="#LINK#" title="#A04#" #APEX_CSP_DISPLAY_NONE# target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>
        <div class="a-TreeView-node a-TreeView-node--topLevel" aria-hidden="true">
          <div role="none" class="a-TreeView-row"></div>
          <div role="none" class="a-TreeView-content">
            <span class="fa6 #ICON_CSS_CLASSES#"></span>
            <span class="a-TreeView-label">#TEXT_ESC_SC#</span>
          </div>
        </div>
      </li>
    noncurrent-with-sublist: |
      <li data-current="false" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#">
        <a href="#LINK#" title="#A04#" #APEX_CSP_DISPLAY_NONE# target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>
        <div class="a-TreeView-node a-TreeView-node--topLevel" aria-hidden="true">
          <div role="none" class="a-TreeView-row"></div>
          <div role="none" class="a-TreeView-content">
            <span class="fa6 #ICON_CSS_CLASSES#"></span>
            <span class="a-TreeView-label">#TEXT_ESC_SC#</span>
          </div>
        </div>
      

  sublist: 
    before-rows: '<ul #APEX_CSP_DISPLAY_NONE#>'
    after-rows: </ul></li>

  sublist-entry: 
    current: <li data-current="true" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#"><a href="#LINK#" title="#A04#" target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a></li>
    current-with-sublist: <li data-current="true" data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#"><a href="#LINK#" title="#A04#" target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>
    noncurrent: <li data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#"><a href="#LINK#" title="#A04#" target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a></li>
    noncurrent-with-sublist-items: <li data-id="#A01#" data-disabled="#A02#" data-icon="#ICON_CSS_CLASSES#" data-shortcut="#A05#"><a href="#LINK#" title="#A04#" target="#A06#" data-otel-label="#A10#">#TEXT_ESC_SC#</a>

  after-list-entry: 
    after-rows: |2
          </ul>
        </div>
      </div>
      <script #APEX_CSP_NONCE_ATTRIBUTE#>
      (() => {
        const pref = "ORA_WWV_apex.toggleCore.nav.&APP_ID..preferenceForExpanded",
              nav  = document.getElementById('t_TreeNav').classList,
              body = document.getElementById('t_PageBody');
        if ( !sessionStorage.getItem( pref ) ) { sessionStorage.setItem( pref, !nav.contains('js-defaultCollapsed') ); }
        if ( nav.contains('js-navCollapsed--default') ) {
            body?.classList.add('js-navCollapsed--icons');
            if ( sessionStorage.getItem( pref ) === "false" ) { body?.classList.add('js-navCollapsed'); }
        }
        if ( sessionStorage.getItem( pref ) === "true" && window.matchMedia("(min-width: " + getComputedStyle(document.documentElement).getPropertyValue("--js-mq-lg") + ")").matches) { body?.classList.add('js-navExpanded'); }
        for (const label of document.querySelectorAll(".a-TreeView .a-TreeView-label")) {
            label.textContent = label.textContent.replaceAll(/\[(.*?)\]/ig, '');
        }
      })();
      </script>

  javascript: 
    file-urls: 
    - '#APEX_FILES#libraries/apex/#MIN_DIRECTORY#widget.treeView#MIN#.js?v=#APEX_VERSION#'
    execute-when-page-loads: apex.jQuery('body').addClass('t-PageBody--leftNav');

  attribute-descriptions: 
    a01: ID Attribute
    a02: Disabled (True/False)
    a04: Title Attribute (Used By Actions Only)
    a05: Shortcut Key
    a06: Link Target
    a10: OpenTelemetry Label

  template-options: 
  - # ====== Template Option: Hidden =============================
    id: 265598496658527584
    identification: 
      name: Hidden
      identifier: COLLAPSE_STYLE_HIDDEN
      group: Collapse Mode
      sequence: 20

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - js-navCollapsed--hidden

    help: 
      help-text: Completely hide the navigation menu when it is collapsed.

  - # ====== Template Option: Add Actions ========================
    id: 265598855190527585
    identification: 
      name: Add Actions
      identifier: ADD_ACTIONS
      sequence: 1

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - js-addActions

    help: 
      help-text: Use this option to add shortcuts for menu items. Note that actions.js must be included on your page to support this functionality.

  - # ====== Template Option: Icon ===============================
    id: 265599541751527586
    identification: 
      name: Icon
      identifier: ICON_DEFAULT
      group: Collapse Mode
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - js-navCollapsed--default

    help: 
      help-text: Display icons when the navigation menu is collapsed for large screens.

  - # ====== Template Option: Collapsed by Default ===============
    id: 265599997399527586
    identification: 
      name: Collapsed by Default
      identifier: COLLAPSED_DEFAULT
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - js-defaultCollapsed

    help: 
      help-text: This option will load the side navigation menu in a collapsed state by default.

  - # ====== Template Option: Style A ============================
    id: 265600650770527587
    identification: 
      name: Style A
      identifier: STYLE_A
      group: Style
      sequence: 20

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-TreeNav--styleA

    help: 
      help-text: Style Variation A

  - # ====== Template Option: Style B ============================
    id: 265601389063527587
    identification: 
      name: Style B
      identifier: STYLE_B
      group: Style
      sequence: 30

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-TreeNav--styleB

    help: 
      help-text: Style Variation B

  - # ====== Template Option: Classic ============================
    id: 265602005573527587
    identification: 
      name: Classic
      identifier: STYLE_C
      group: Style
      sequence: 10

    settings: 
      advanced: false

    appearance: 
      css-classes: 
      - t-TreeNav--classic

    help: 
      help-text: Classic Style

