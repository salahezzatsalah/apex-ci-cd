             null    attribute1,
             null    attribute2,
             null    attribute3,
             null    attribute4,
             null    attribute5,
             null    attribute6,
             null    attribute7,
             null    attribute8,
             null    attribute9,
             null    attribute10,
             l.page_rendered
      from  sp_projects p,
            recent_projects l
      where p.id = l.project_id 
      )
      order by page_rendered desc

