- # ====== Style: Redwood Light SP =============================
  id: 14774829622040814077
  identification: 
    name: Redwood Light SP

  settings: 
    is-public: true
    accessibility-tested: false

  css: 
    file-urls: 
    - '#APEX_FILES#libraries/oracle-fonts/oraclesans-apex#MIN#.css?v=#APEX_VERSION#'
    - '#THEME_FILES#css/Redwood#MIN#.css?v=#APEX_VERSION#'

  cascading-style-sheet: 
    css-classes: ' rw-mode-body-header--dark rw-mode-nav--pillar rw-mode-body--dark rw-mode-header--pillar rw-pillar--sky rw-layout--contained'

  theme-roller-attributes: 
    read-only: false
    input-parameter-file-urls: '#THEME_FILES#less/theme/Redwood-Theme.less'
    output-css-file-url: '#THEME_DB_FILES#14765102487833371977.css'
    json-configuration: '{"classes":["rw-mode-body-header--dark","rw-layout--fixed t-PageBody--scrollTitle","rw-layout--fixed t-PageBody--scrollTitle","rw-layout--fixed t-PageBody--scrollTitle","rw-mode-nav--pillar","rw-mode-body--dark","rw-layout--fixed t-PageBody--scrollTitle","rw-layout--fixed t-PageBody--scrollTitle","rw-mode-header--pillar","rw-pillar--sky","rw-layout--contained"],"vars":{},"customCSS":":root {\n  /* Reduce Redwood Padding */\n  --ut-footer-padding-x: var(--ut-body-content-padding-x);\n  --ut-body-content-padding-y: 2rem;\n  /* Unset badge font family */\n  --ut-treeview-badge-font-family: unset;\n}\n\n.header-actions {\n  margin-inline-start: auto;\n}\n\n.header-actions .t-ContentRow-wrap {\n  padding: 0;\n  float: right;\n}\n\n.has-header-actions {\n  display: inline-flex;\n}\n\n.header-actions .t-ContentRow-wrap button {\n  --a-button-background-color: transparent;\n}\n\n.t-BreadcrumbRegion--showBreadcrumb .t-BreadcrumbRegion-breadcrumb {\n  display: flex;\n  align-items: center;\n}\n\n\n/* Clear the default fa-user icon for content row regions with the clear-avatar-icons class */\n.clear-avatar-icons .t-Avatar.t-Avatar--icon.fa-user:before {\n  display: none;\n}\n\n/* Adding initiative icon to the left of contextual info region */\n.initiative-icon {\n  margin: 0 -2rem .5rem 3rem;\n  max-inline-size: 2.5rem;\n}\n\n.t-PageBody--showLeft .initiative-icon {\n  margin: 0 0 .5rem 1rem;\n  max-inline-size: 2.5rem;\n}\n\n/* Setting max height for facets, otherwise it gets too big */\n.a-FS-bodyInner .apex-item-checkbox {\n  max-height: 320px;\n  overflow: auto;\n}\n\n/* Search Clear Button */\n.sp-ClearButton {\n  position: absolute;\n  inline-size: 1.5rem;\n  block-size: 1.5rem;\n  cursor: pointer;\n  inset-inline-end: .25rem;\n  inset-block-start: 50%;\n  transform: translateY(-50%);\n  visibility: visible;\n  opacity: 1;\n  transition: opacity .25s ease;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  order: 4;\n}\n\n.sp-ClearButton:before {\n  content: \"\\e0a2\";\n  font-size: 1rem;\n  speak: none;\n  font-style: normal;\n  font-weight: 400;\n  font-variant: normal;\n  text-transform: none;\n  text-rendering: auto;\n  line-height: 1;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  font-family: var(--a-icon-font-family, \"apex-5-icon-font\");\n  opacity: .8;\n}\n\n.t-Form-itemWrapper {\n  position: relative;\n}\n\n.t-Form-fieldContainer:not(.t-Form-fieldContainer--floatingLabel):not(.t-Form-fieldContainer--hiddenLabel) .t-Form-itemWrapper {\n  display: inline-flex;\n}\n\n.t-Form-itemWrapper:has(:placeholder-shown) .sp-ClearButton {\n  visibility: hidden;\n  opacity: 0;\n}\n","useCustomLess":"N"}'

