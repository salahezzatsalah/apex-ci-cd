---
- # ====== Search Configuration: Project Search ================
  id: 10573570853519467183
  identification: 
    name: Project Search

  subscription: 
    version-number: 41430204951859

  source: 
    search-type: Simple (APEX Data Source)
    location: Local Database
    type: SQL Query
    sql-query: |
      select p.ID,
             f.area,
             i.initiative||' / '||f.area area_initiative,
             p.PROJECT,
             p.TARGET_COMPLETE,
             p.PRIORITY_ID,
             decode(p.RELEASE_DEPENDENT_YN,'Y','Yes','N','No','No') RELEASE_DEPENDENT_YN,
             decode(
                 p.RELEASE_DEPENDENT_YN,
                 'Y',
                 (select release_train||' '||release from SP_RELEASE_TRAINS t where t.id = p.release_id),
                 decode(
                     to_char(p.target_complete,'DD-MON-YYYY'),
                     null,
                     'Not Targeted',
                     to_char(p.target_complete,'MON-YYYY')
                     ))  release,
             p.updated,
             nvl((select 'P'||priority from sp_project_priorities pp where pp.id = p.priority_id),'Not Prioritized')||' - '||
             (select first_name||' '||last_name from sp_team_members t where t.id = p.OWNER_ID)||' - '||
             P.PCT_COMPLETE||'%'||' - '||
             (select first_name||' '||last_name from sp_team_members t where t.id = p.OWNER_ID)||
             decode(p.tags, null, null, ' - '||p.tags)
             details,
             'PR' initials,
             p.id project_id
        from SP_PROJECTS p, 
             SP_INITIATIVES i,
             SP_AREAS f
      where (nvl(:P23_INITIATIVE_ID,0) = 0 or :P23_INITIATIVE_ID = p.INITIATIVE_ID ) and 
            (nvl(:P23_FOCUS_AREA_ID,0) = 0 or :P23_AREA_ID = f.ID ) and
            p.initiative_id = i.id and
            i.area_id = f.id
    searchable-columns: 'AREA_INITIATIVE:PROJECT:RELEASE:DETAILS:INITIALS'

  column-mapping: 
    primary-key-1-column-name: ID
    title-column-name: PROJECT
    subtitle-column-name: AREA_INITIATIVE
    description-column-name: DETAILS
    last-modified-column-name: UPDATED
    custom-column-name-1: RELEASE

  link: 
    type: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:3:&APP_SESSION.::&DEBUG.:RP,3:P3_PROJECT_ID:&ID.'
      page: 3 # Create Identity
      clear-cache: RP,3
      values: 
        p3_project_id: '&ID.'

  icon-and-badge: 
    icon-source: Icon Class

  advanced: 
    static-id: project_search

