  - # ====== Custom Attribute: autoPlaceholder ===================
    id: 1744949279016213132
    identification: 
      static-id: attribute_03
      attribute: 3
      name: autoPlaceholder
      scope: Component

    layout: 
      sequence: 30

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: polite

    help: 
      help-text: |
        Set the input's placeholder to an example number for the selected country, and update it if the country changes. You can specify the number type using the placeholderNumberType option. By default it is set to "polite", which means it will only set the placeholder if the input doesn't already have one. You can also set it to "aggressive", which will replace any existing placeholder, or "off". <br>
        Requires the utilsScript option.

    entries: 
    - # ====== Entry: polite =======================================
      id: 1744950442302214261
      entry: 
        sequence: 10
        display: polite
        return: polite

      advanced: 
        quick-pick: false

    - # ====== Entry: aggressive ===================================
      id: 1744950857167216404
      entry: 
        sequence: 20
        display: aggressive
        return: aggressive

      advanced: 
