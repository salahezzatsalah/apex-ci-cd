  actions: 
  - # ====== Action: قبول المهمة =================================
    id: 264556728888301366
    identification: 
      name: قبول المهمة
      type: Execute Code

    source: 
      location: Local Database
      language: PL/SQL
      pl/sql-code: |
        BEGIN
          UPDATE HOTEL_RESERVATIONS
          SET OPS_REP_ID = TO_NUMBER(:APP_USER_ID),
              UPDATED = SYSTIMESTAMP,
              UPDATED_BY = :APP_USER_ID,
              STATUS = 'PENDINGOFFER'
          WHERE RESERVATION_ID = :RESERVATION_ID;
        END;
        

    error-handling: 
      log-message-type: None

    execution: 
      on-event: Claim
      sequence: 10

    success-message: 
      success-message: تم اضافتك كمسؤول عمليات على الحجز

    error: 
      stop-execution-on-error: true

  - # ====== Action: تم تعين مسؤول عمليات ========================
    id: 264594942054829078
    identification: 
      name: تم تعين مسؤول عمليات
      type: Send Push Notification

    settings: 
      to: '&SALES_USER.'
      title: تم تعين مسؤول العمليات &RESERVATION_ID.
      body: المسؤول الحالي هو &OPS_USER.
      link-target: 
        url: 'f?p=&APP_ID.:HOTEL-RESERVATION-DETAILS:&SESSION.::&DEBUG.::P3_RESERVATION_ID:&RESERVATION_ID.'
        page: HOTEL-RESERVATION-DETAILS
        values: 
          p3_reservation_id: '&RESERVATION_ID.'

    error-handling: 
      log-message-type: Success

    execution: 
      on-event: Claim
      sequence: 20

    success-message: 
