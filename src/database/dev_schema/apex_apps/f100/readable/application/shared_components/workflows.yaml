    - # ====== Activity: Activity ==================================
      id: 186804767922294946
      identification: 
        name: Activity
        type: Execute Code

      source: 
        location: Local Database
        language: PL/SQL
        pl/sql-code: |
          DECLARE
            v_user_id      VARCHAR2(300) := :USER_ID;
            v_attend_id    VARCHAR2(300);
            v_checkin_time TIMESTAMP := SYSTIMESTAMP AT TIME ZONE 'Africa/Cairo';
          BEGIN
            SELECT ATTENDANCE_ID
            INTO v_attend_id
            FROM AS_ATTENDANCE
            WHERE USER_ID = v_user_id
                AND TRUNC(CHECKIN) = TRUNC(SYSTIMESTAMP AT TIME ZONE 'Africa/Cairo')
          
            FETCH FIRST 1 ROWS ONLY;
          
            :APP_USER_ATTEND_ID := v_attend_id;
            :CHECKIN_DISABLED := 'Y';
          
            SELECT CASE WHEN COMPLETE = 'F' THEN 'F' ELSE 'T' END
            INTO :CHECKOUT_DISABLED
            FROM AS_ATTENDANCE
            WHERE ATTENDANCE_ID = v_attend_id;
          
          EXCEPTION
            WHEN NO_DATA_FOUND THEN
              INSERT INTO AS_ATTENDANCE (ATTENDANCE_ID, USER_ID, CHECKIN, COMPLETE)
              VALUES (SYS_GUID(), v_user_id, v_checkin_time, 'F')
              RETURNING ATTENDANCE_ID INTO v_attend_id;
          
              :APP_USER_ATTEND_ID := v_attend_id;
              :CHECKIN_DISABLED := 'Y';
              :CHECKOUT_DISABLED := 'F';
          END;
          

      deadline: 
        due-on-type: None

      layout: 
        sequence: 30

      advanced: 
        static-id: New_1

