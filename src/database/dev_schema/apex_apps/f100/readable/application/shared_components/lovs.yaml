- # ====== List of Values: BED_TYPES ===========================
  id: 194090337307845247
  identification: 
    name: BED_TYPES

  subscription: 
    version-number: 45741131648458

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          beds.BED_TYPE_ID AS return_value,
          beds.BED_TYPE_NAME || ' - ' ||
          NVL(beds.ADULT_CAPACITY, 0) || ' بالغ ' ||
          NVL(beds.CHILD_CAPACITY, 0) || ' طفل' AS display_value
      FROM ROOM_BED_TYPES beds
      WHERE beds.STATUS = 'Y'
      ORDER BY beds.BED_TYPE_NAME;
      

  column-mapping: 
    return: RETURN_VALUE
    display: DISPLAY_VALUE
    default-sort: Use Order By from Query

