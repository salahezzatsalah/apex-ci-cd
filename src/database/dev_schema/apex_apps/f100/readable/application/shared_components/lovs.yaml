  id: 276371775389227518
  identification: 
    name: P6005_COLLECTED_BY_ID

  subscription: 
    version-number: 44998722934594

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          FIRST_NAME || ' ' || LAST_NAME AS display_value,
          ID AS return_value
      FROM
          BS_EMPLOYEES
      WHERE
          :P6005_COLLECTED_BY_TYPE = 'OFFICE'
      
      
      UNION ALL
      
      SELECT
          DRIVER_NAME AS display_value,
          DRIVER_ID AS return_value
      FROM
          UNIFIED_DRIVERS_LIST
      WHERE
          :P6005_COLLECTED_BY_TYPE = 'DRIVER'
          AND DRIVER_ID IN (
              SELECT DISTINCT DRIVER_ID
              FROM LIMO_PRODUCT_ASSIGNMENTS
              WHERE PRODUCT_ID = :P6005_PRODUCT_ID
          )
      ORDER BY display_value
      

  column-mapping: 
    return: RETURN_VALUE
    display: DISPLAY_VALUE
    default-sort: Use Order By from Query

