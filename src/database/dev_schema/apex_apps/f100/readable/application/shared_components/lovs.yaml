- # ====== List of Values: RESERVED ROOM DESCRIPTION ===========
  id: 261471904806949073
  identification: 
    name: RESERVED ROOM DESCRIPTION

  subscription: 
    version-number: 44789101006661

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          CASE WHEN room_type_count > 1 
               THEN room_name || ' (' || rn || ')' 
               ELSE room_name 
          END || ' - (' || night_count || ' ليلة)' AS display_value,
          id AS return_value
      FROM (
          SELECT 
              R.ID,
              RT.ROOM_NAME,
              R.ROOM_TYPE_ID,
              R.DATE_FROM,
              R.DATE_TO,
              -- Calculate number of nights from the room's own FROM/TO dates
              CASE 
                  WHEN R.DATE_FROM IS NOT NULL AND R.DATE_TO IS NOT NULL THEN 
                      TRUNC(R.DATE_TO) - TRUNC(R.DATE_FROM)
                  ELSE NULL 
              END AS night_count,
              COUNT(*) OVER (PARTITION BY R.ROOM_TYPE_ID, R.HOTEL_RESERVATION_ID) AS room_type_count,
              ROW_NUMBER() OVER (
                  PARTITION BY R.ROOM_TYPE_ID, R.HOTEL_RESERVATION_ID 
                  ORDER BY R.CREATED_DATE
              ) AS rn
          FROM HOTEL_RESERVATION_ROOMS R
          JOIN HOTEL_ROOM_TYPES RT ON R.ROOM_TYPE_ID = RT.ROOM_TYPE_ID
      
      )
      ORDER BY display_value
      

  column-mapping: 
    return: RETURN_VALUE
    display: DISPLAY_VALUE
    default-sort: Use Order By from Query

