- # ====== Classic Report Template: Kanban Board ===============
  id: 20044050105392275240
  identification: 
    name: Kanban Board
    identifier: KANBAN_GRID
    class: Custom 1

  advanced: 
    translatable: false

  attributes: 
    type: Named Column (row template)

  report-template: 
    top: |
      <div class="kb-Layout">
        <div class="kb-RowHeader">
      
    bottom: |2
          </div>
        </div>
      </div>

  column-templates: 
    heading: |2
        <div class="kb-Column">#COLUMN_HEADER#</div>
      

  row-template-1: 
    template: |
      </div>
      <h3 class="kb-Group"><span class="kb-Group-label">#FOCUS_AREA#</span></h3>
      <div class="kb-Row" id="#FOCUS_AREA_ID#">
        <div class="#SORTABLE# kb-Cell" ID="#ROWNUM#" data-id="#COLUMN_ID#">
          <div id="#ID#" class="kb-Card #P_STYLE# #DISPLAY#" onclick="#LINK#">
            <h4 class="kb-Card-title" title="#PROJECT#">#PROJECT#</h4>
            <div class="kb-Card-attributes">#ATTRS#</div>
          </div>
    condition: Use Based on PL/SQL Expression
    pl/sql-expression: '#ROWNUM# = 1'

  row-template-2: 
    template: |2
        </div>
      </div>
      <h3 class="kb-Group"><span class="kb-Group-label">#FOCUS_AREA#</span></h3>
      <div class="kb-Row" id="#FOCUS_AREA_ID#">
        <div class="#SORTABLE# kb-Cell" ID="#ROWNUM#" data-id="#COLUMN_ID#">
          <div id="#ID#" class="kb-Card #P_STYLE# #DISPLAY#" onclick="#LINK#">
            <h4 class="kb-Card-title" title="#PROJECT#">#PROJECT#</h4>
            <div class="kb-Card-attributes">#ATTRS#</div>
          </div>
    condition: Use Based on PL/SQL Expression
    pl/sql-expression: '#ROW_SPLIT# = 1'

  row-template-3: 
    template: |2
        </div>
        <div class="#SORTABLE# kb-Cell" ID="#ROWNUM#" data-id="#COLUMN_ID#">
          <div id="#ID#" class="kb-Card #P_STYLE# #DISPLAY#" onclick="#LINK#">
            <h4 class="kb-Card-title" title="#PROJECT#">#PROJECT#</h4>
