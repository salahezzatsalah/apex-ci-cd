    language: PL/SQL
    pl/sql-code: |
      BEGIN
        SELECT
          ASSIGNMENT_ID,
          VENDOR_ID,
          NOTES,
          ASSIGNMENT_TYPE
        INTO
          :P247_ASSIGNMENT_ID,
          :P247_VENDOR_ID,
          :P247_NOTES,
          :P247_ASSIGNMENT_TYPE
        FROM FAST_TRACK_ASSIGNMENTS
        WHERE RESERVATION_ID = :P247_SUB_RES_ID
          AND VENDOR_STATUS = 'CURRENT';
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
          :P247_ASSIGNMENT_ID := NULL;
      END;
      

