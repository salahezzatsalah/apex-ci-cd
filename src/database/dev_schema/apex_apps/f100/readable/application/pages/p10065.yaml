- # ====== Validation: static id no spaces =====================
  id: 11216546264727187867
  identification: 
    name: static id no spaces

  execution: 
    sequence: 20

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: "instr(:P10065_STATIC_ID,' ') = 0"
    always-execute: false

  error: 
    error-message: الـ Static ID مينفعش يكون فيه مسافات
    display-location: Inline with Field and in Notification
    associated-item: P10065_STATIC_ID # 30457789386234831390

- # ====== Validation: Cannot change parent if refs ============
  id: 29062456941713313642
  identification: 
    name: Cannot change parent if refs

  execution: 
    sequence: 10

  validation: 
    type: No Rows returned
    sql-query: |
      select 1 from reservation_tasks
       where task_sub_type_id = :P10065_ID
    always-execute: false

  error: 
    error-message: مينفعش تغيّر العنصر الأب طالما نوع المهمة مربوط في مكان تاني.
    display-location: Inline with Field and in Notification
    associated-item: P10065_PARENT_TYPE_ID # 28669599777637820728

  server-side-condition: 
    when-button-pressed: SAVE # 28755313639797837480
    type: Rows returned
    sql-query: |
      select 1 from res_task_types
       where nvl(:P10065_PARENT_TYPE_ID,-1) != nvl(parent_type_id,-1)
         and id = :P10065_ID

