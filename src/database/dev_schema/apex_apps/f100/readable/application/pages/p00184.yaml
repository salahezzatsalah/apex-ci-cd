- # ====== Dynamic Action: SetRates ============================
  id: 265035213405155570
  identification: 
    name: SetRates

  execution: 
    sequence: 50
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P184_PAYMENT_CURRENCY

  actions: 
  - # ====== Action: SetRates ====================================
    id: 265035340022155571
    identification: 
      name: SetRates
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P184_PAYMENT_CURRENCY
        
      items-to-submit: 
      - P184_PAYMENT_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P184_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: SetRates # 265035213405155570
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

