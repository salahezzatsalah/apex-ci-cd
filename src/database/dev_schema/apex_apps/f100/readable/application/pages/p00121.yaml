- # ====== Process: ComboBox ===================================
  id: 268237552064222344
  identification: 
    name: ComboBox
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
      l_new_tag_id number;
      begin 
          FOR L_NEW_TAG IN (
          SELECT
              PREFERRED_LANGUAGE
          FROM
          CRM_CLIENTS
      
              -- APEX_STRING.SPLIT(:P121_PREFERRED_LANGUAGE, ':')
      ) LOOP
           insert into CRM_CLIENTS
      (PREFERRED_LANGUAGE) values (l_new_tag.PREFERRED_LANGUAGE) returning CLIENT_ID into l_new_tag_id;
           :P121_PREFERRED_LANGUAGE := :P121_PREFERRED_LANGUAGE || CASE WHEN :P121_PREFERRED_LANGUAGE IS NOT NULL
          THEN
          ':'
              END || L_NEW_TAG_ID;
          END
              LOOP;
      :P121_PREFERRED_LANGUAGE := null;
      end;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  configuration: 
    build-option: Commented Out # 253764608978089549

