regions: 
- # ====== Region: Content Row =================================
  id: 10951724335631785709
  identification: 
    name: Content Row
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
        SERVICE_TYPE_NAME,
        PRODUCT_IMAGE_URL,
        RESERVATION_ID,
        CLIENT_CODE,
        CLIENT_NUMBER,
        COUNTRY,
        CLIENT_NAME,
        RESERVATION_DATE,
        RES_TIME,
        TICKET_NO,
        SIGNAGE_DETAILS,
        PASSENGERS_NO,
        CURRENCY,
        PRICE_PER_PERSON,
        TOTAL_AMOUNT,
        NOTES,
        COLLECTION_BY,
        FULFILLED_BY_NAME,
        CREATED_BY_NAME,
          -- Period tracking
         TO_CHAR(RESERVATION_DATE, 'YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_year,
        TO_CHAR(RESERVATION_DATE, 'MM', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_month,
        TO_CHAR(RESERVATION_DATE, 'DAY / DD/MM/YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS days_filter
      
      FROM FAST_TRACK_RESERVATIONS_VW;
      
    page-items-to-submit: 
    - APP_USER_ID

  order-by: 
    type: Item
    item: 
      item-name: P454_ORDER_BY
      order-bys: 
      - key: PICK_UP_TIME
        clause: PICK_UP_TIME

      - key: RESERVATION_ID
        clause: RESERVATION_ID

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

