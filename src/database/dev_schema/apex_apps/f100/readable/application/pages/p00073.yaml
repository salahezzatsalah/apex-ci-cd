  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select tm.ID,
             tm.FIRST_NAME||' '||tm.LAST_NAME name,
             tm.EMAIL,
             replace(lower(tm.TAGS),',',', ') tags,
             rtrim(replace(tm.competencies,',',', ')) competencies,
             screen_name,
             tm.created,
             tm.updated
