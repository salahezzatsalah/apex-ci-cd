- # ====== Region: Search Results ==============================
  id: 177293729384469683
  identification: 
    name: Search Results
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          u.user_id,
          u.username,
          u.email,
          u.phone_number,
          u.global_role,
          u.status,
          u.account_locked_yn,
          t.tenant_name,
      
          LISTAGG(g.group_code, ', ')
              WITHIN GROUP (ORDER BY g.group_code) AS groups,
      
          u.created,
          u.updated
      
      FROM iam_users u
      JOIN iam_tenants t
          ON t.tenant_id = u.tenant_id
      
      LEFT JOIN iam_user_security_groups ug
          ON ug.user_id = u.user_id
         AND ug.is_active_yn = 'Y'
      
      LEFT JOIN iam_security_groups g
          ON g.group_id = ug.group_id
         AND g.is_active_yn = 'Y'
      
      GROUP BY
          u.user_id,
          u.username,
          u.email,
          u.phone_number,
          u.global_role,
          u.status,
          u.account_locked_yn,
          t.tenant_name,
          u.created,
          u.updated

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    render-components: Above Content

  accessibility: 
    use-landmark: true
