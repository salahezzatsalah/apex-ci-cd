    type: SQL Query
    sql-query: |
      select ID,
             PROJECT_SIZE,
             SIZE_DESCRIPTION,
             EFFORT_DAYS,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             decode(include_yn,'Y','Yes','N','No',include_yn) include,
