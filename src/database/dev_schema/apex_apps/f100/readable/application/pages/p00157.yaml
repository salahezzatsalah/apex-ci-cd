- # ====== Region: Suppliers Accounts  =========================
  id: 20894967304620098347
  identification: 
    name: 'Suppliers Accounts '
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         s.SUPPLIER_ID AS id,
         s.SUPPLIER_NAME,
         s.IS_COMPANY,
         s.NATIONAL_ID,
         s.COMPANY_REG_NO,
         s.PHONE,
         s.EMAIL,
         --
         SUBSTR(s.EMAIL, INSTR(s.EMAIL, '@') + 1) AS email_domain,
         --
         s.CITY,
         (
           SELECT COUNTRY_NAME || ' (' || REGION || ')' 
           FROM SP_COUNTRIES c 
           WHERE c.ID = s.COUNTRY_ID
         ) AS country,
         s.ADDRESS,
         s.STATUS,
         s.HAS_PORTAL_ACCESS,
         s.USERNAME,
         s.CREATED,
         s.CREATED_BY,
         s.UPDATED,
         s.UPDATED_BY,
         s.NOTES,
         s.PHOTO_URL,
      
         --
         CASE 
           WHEN s.PHOTO_URL IS NOT NULL AND DBMS_LOB.GETLENGTH(s.PROFILE_PHOTO) > 0 THEN 'نعم'
           ELSE 'لا'
         END AS has_profile_photo,
         --
         s.supplier_type_id,
         --
         (SELECT COUNT(*) 
            FROM SUPPLIERS_DOCUMENTS a 
           WHERE a.SUPPLIER_ID = s.SUPPLIER_ID
         ) AS attachments_count,
         --
         (
           SELECT u.ROLE_IDS
           FROM APEX_APPL_ACL_USERS u
           WHERE u.APPLICATION_ID = :APP_ID
             AND LOWER(u.USER_NAME) = LOWER(s.USERNAME)
           FETCH FIRST 1 ROWS ONLY
         ) AS app_role
      FROM SUPPLIERS s;
      

  order-by: 
    type: Item
    item: 
      item-name: P157_ORDER_BY
      order-bys: 
      - key: SUPPLIER_NAME
        clause: SUPPLIER_NAME

      - key: EMAIL
        clause: email

  layout: 
    sequence: 33
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: true
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&SUPPLIER_NAME!HTML.'
      description: |
        &PHONE. - &EMAIL!HTML.
        {if SUPPLIER_TYPE_ID/}<br>تصنيف الملف: &SUPPLIER_TYPE_ID.{endif/}
        {if NOTES/}<br>ملاحظات: &NOTES.{endif/}
        
      miscellaneous: 'عدد مرفقات: <strong>&ATTACHMENTS_COUNT.</strong><br>'
      display-avatar: true
      display-badge: false

    avatar: 
      type: Image
      image: 
        url: '&PHOTO_URL.'

      shape: Rounded
      size: Default

    appearance: 
      apply-theme-colors: true
      style: Default
      hide-borders: false
      remove-padding: false

    row-selection: 
      type: None

    performance: 
      lazy-loading: false

    pagination: 
      type: Page
      entities-per-page: 15
      show-total-count: false

