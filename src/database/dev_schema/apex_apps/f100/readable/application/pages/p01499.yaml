- # ====== Region: Cart ========================================
  id: 205456736985406174
  identification: 
    name: Cart
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html        CLOB := '';
        l_total       NUMBER := 0;
        l_currency    VARCHAR2(10);
        l_items_count NUMBER := 0;
        l_status_lbl  VARCHAR2(200);
      BEGIN
      /* ===============================
         Load order header
         =============================== */
      IF :P1499_MAIN_RES_ID IS NULL THEN
        RETURN '
        <div style="direction:rtl;background:#fff7ed;border:1px solid #fed7aa;padding:14px;border-radius:14px;font-family:Tahoma,Arial">
          <div style="font-weight:900;color:#9a3412">لا يوجد طلب نشط حالياً</div>
          <div style="margin-top:6px;color:#7c2d12;font-size:12px">
            يرجى إنشاء طلب جديد أو اختيار عميل لديه طلب جاري.
          </div>
        </div>';
      END IF;
      
      BEGIN
        SELECT
          m.currency_code,
          NVL(SUM(i.amount_orig),0),
          NVL(s.status_label_ar,'غير معروف'),
          COUNT(i.order_item_id)
        INTO
          l_currency,
          l_total,
          l_status_lbl,
          l_items_count
        FROM main_reservations m
        LEFT JOIN vw_reservation_statuses s
          ON s.status_code = m.status
        LEFT JOIN order_items i
          ON i.main_res_id = m.main_res_id
         AND NVL(i.is_cancelled,'N')='N'
        WHERE m.main_res_id = :P1499_MAIN_RES_ID
        GROUP BY m.currency_code, NVL(s.status_label_ar,'غير معروف');
      
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
          RETURN '
          <div style="direction:rtl;background:#fef2f2;border:1px solid #fecaca;padding:14px;border-radius:14px;font-family:Tahoma,Arial">
            <div style="font-weight:900;color:#991b1b">الطلب غير موجود</div>
            <div style="margin-top:6px;color:#7f1d1d;font-size:12px">
              رقم الطلب: '||apex_escape.html(:P1499_MAIN_RES_ID)||'
            </div>
          </div>';
      END;
      
        /* ===============================
           STYLES – Friendly & Professional
           =============================== */
        l_html := '
      <style>
      .order-report{
        direction:rtl;
        font-family:Inter,Tahoma,Arial;
        background:#f8fafc;
        padding:14px;
        border-radius:18px;
      }
      
      /* Header */
      .order-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#ffffff;
        border:1px solid #e5e7eb;
        padding:14px 16px;
        border-radius:16px;
        margin-bottom:16px;
      }
      .order-title{
        font-weight:900;
        font-size:14px;
      }
      .order-sub{
        font-size:12px;
        color:#6b7280;
      }
      .order-total{
        font-size:20px;
        font-weight:900;
        color:#0f766e;
      }
      .order-status{
        font-size:12px;
        font-weight:800;
        color:#2563eb;
      }
      
      /* Inventory Grid */
      .inventory-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(135px,1fr));
        gap:14px;
      }
      
      /* Item Card */
      .inv-item{
        background:#ffffff;
        border:1px solid #e5e7eb;
        border-radius:14px;
        padding:12px;
        min-height:150px;
      
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        text-align:center;
      
        transition:.2s ease;
      }
      .inv-item:hover{
        box-shadow:0 10px 20px rgba(15,23,42,.08);
        transform:translateY(-2px);
      }
      
      /* Icon */
      .inv-icon{
        font-size:26px;
        margin-bottom:6px;
      }
      
      /* Text */
      .inv-text{
        flex:1;
        display:flex;
        flex-direction:column;
        gap:4px;
      }
      .inv-title{
        font-size:13px;
        font-weight:800;
        line-height:1.3;
        color:#111827;
      
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }
      .inv-sub{
        font-size:11.5px;
        color:#6b7280;
        line-height:1.3;
      
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }
      
      /* Price */
      .inv-price{
        margin-top:8px;
        padding-top:6px;
        border-top:1px dashed #e5e7eb;
        font-size:13px;
        font-weight:900;
        color:#047857;
      }
      
      /* Mobile */
      @media(max-width:480px){
        .inventory-grid{
          grid-template-columns:repeat(auto-fill,minmax(115px,1fr));
        }
        .inv-item{min-height:140px}
      }
      </style>
      
      <div class="order-report">
      ';
      
        /* ===============================
           HEADER
           =============================== */
        l_html := l_html || '
      <div class="order-header">
        <div>
          <div class="order-title">طلب #'||:P1499_MAIN_RES_ID||'</div>
          <div class="order-sub">عدد العناصر: '||l_items_count||'</div>
        </div>
        <div style="text-align:left">
          <div class="order-status">'||l_status_lbl||'</div>
          <div class="order-total">'||l_total||' '||l_currency||'</div>
        </div>
      </div>
      
      <div class="inventory-grid">
      ';
      
        /* ===============================
           ITEMS
           =============================== */
        FOR r IN (
          SELECT
            i.amount_orig,
            i.currency,
            i.ref_table,
      
            CASE
              WHEN i.ref_table='SUBLEVEL_LIMO_RES' THEN '🚗'
              WHEN i.ref_table='SUBLEVEL_FAST_TRACK_RES' THEN '✈️'
              ELSE '🎟️'
            END AS icon,
      
            CASE
              WHEN i.ref_table='SUBLEVEL_LIMO_RES'
                THEN NVL(ct.CAR_TYPE_NAME,'ليموزين')
              WHEN i.ref_table='SUBLEVEL_FAST_TRACK_RES'
                THEN sft.SERVICE_NAME
              ELSE i.item_type
            END AS title,
      
            CASE
              WHEN i.ref_table='SUBLEVEL_LIMO_RES'
                THEN NVL(l.FROM_LOCATION,'')||' → '||NVL(l.TO_LOCATION,'')
              WHEN i.ref_table='SUBLEVEL_FAST_TRACK_RES'
                THEN ap.AIRPORT_NAME||' – صالة '||ft.TERMINAL_NO
            END AS sub_txt
      
          FROM order_items i
          LEFT JOIN sublevel_limo_res l
            ON i.ref_table='SUBLEVEL_LIMO_RES' AND l.SUB_RES_ID=i.ref_id
          LEFT JOIN LIMO_CAR_TYPES ct
            ON ct.CAR_TYPE_ID=l.CAT_ITEM_ID
          LEFT JOIN sublevel_fast_track_res ft
            ON i.ref_table='SUBLEVEL_FAST_TRACK_RES' AND ft.SUB_RES_ID=i.ref_id
          LEFT JOIN FAST_TRACK_SERVICE_CATALOG sft
            ON sft.SERVICE_ID=ft.CAT_ITEM_ID
          LEFT JOIN AIRPORTS ap
            ON ap.AIRPORT_ID=ft.AIRPORT_ID
          WHERE i.main_res_id=:P1499_MAIN_RES_ID
            AND NVL(i.is_cancelled,'N')='N'
        ) LOOP
      
          l_html := l_html || '
        <div class="inv-item">
          <div class="inv-icon">'||r.icon||'</div>
      
          <div class="inv-text">
            <div class="inv-title">'||r.title||'</div>
            <div class="inv-sub">'||r.sub_txt||'</div>
          </div>
      
          <div class="inv-price">'||r.amount_orig||' '||r.currency||'</div>
        </div>';
      
        END LOOP;
      
        l_html := l_html || '
      </div>
      </div>';
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P1499_MAIN_RES_ID
    - P1499_CUSTOMER_ID

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

