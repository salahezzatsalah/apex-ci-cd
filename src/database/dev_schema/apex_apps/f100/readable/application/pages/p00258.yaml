- # ====== Region: Master Records ==============================
  id: 196428442592925522
  identification: 
    name: Master Records
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select "SETTLEMENT_ID",
          null LINK_CLASS,
          apex_page.get_url(p_items => 'P258_SETTLEMENT_ID', p_values => "SETTLEMENT_ID") LINK,
          null ICON_CLASS,
          null LINK_ATTR,
          null ICON_COLOR_CLASS,
          case when coalesce(:P258_SETTLEMENT_ID,'0') = "SETTLEMENT_ID"
            then 'is-active' 
            else ' '
          end LIST_CLASS,
          (substr("DRIVER_ID", 1, 50)||( case when length("DRIVER_ID") > 50 then '...' else '' end )) LIST_TITLE,
          (substr("CREATED", 1, 50)||( case when length("CREATED") > 50 then '...' else '' end )) LIST_TEXT,
          null LIST_BADGE
      from "LIMO_TRIP_SETTLEMENTS" x
      where (:P258_SEARCH is null
              or upper(x."DRIVER_ID") like '%'||upper(:P258_SEARCH)||'%'
              or upper(x."CREATED") like '%'||upper(:P258_SEARCH)||'%'
          )
      order by "DRIVER_ID"
    page-items-to-submit: 
    - P258_SEARCH

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: REGION_POSITION_02
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
