- # ====== Region: Search Result ===============================
  id: 267396153177331157
  identification: 
    name: Search Result
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- CLIENTS (NEW MODEL)
      select
          'ملف عميل' as result_type,
      
          c.full_name || 
          case 
              when c.client_code is not null 
              then ' (' || c.client_code || ')' 
          end as result_label,
      
          ph.contact_value as result_subtitle, -- PHONE
      
          em.contact_value as result_desc,      -- EMAIL
      
          c.client_id as result_id,
      
          /* Avatar */
          '#APP_FILES#placeholders/client-profile-placeholder.png' as avatar_src,
      
          98 as target_page,
          'P98_ID' as target_item
      from clients c
      
      /* ===============================
         Primary PHONE
         =============================== */
      left join client_contacts ph
             on ph.client_id = c.client_id
            and ph.contact_type = 'PHONE'
      
      
      /* ===============================
         Primary EMAIL (optional)
         =============================== */
      left join client_contacts em
             on em.client_id = c.client_id
            and em.contact_type = 'EMAIL'
            and em.is_primary = 'Y'
      
      where
          length(:P0_SEARCH) >= 2
      and (
             lower(c.full_name) like '%' || lower(:P0_SEARCH) || '%'
          or lower(c.client_code) like '%' || lower(:P0_SEARCH) || '%'
          or ph.contact_value like '%' || regexp_replace(:P0_SEARCH, '[^0-9]', '') || '%'
      )
      
      union all
      
      -- EMPLOYEES
      select
          'ملف موظف' as result_type,
          e.first_name || ' ' || e.last_name as result_label,
          e.job_title as result_subtitle,
          e.email as result_desc,
          e.id as result_id,
          case
              when e.photo_filename is not null then
              'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/photo/' || e.id
              else
                  '#APP_FILES#placeholders/employees-profile-placeholder.png'
          end as avatar_src,
          5 as target_page,
          'P5_ID' as target_item
      from bs_employees e
      where
          length(:P0_SEARCH) >= 2 and
      (lower(e.first_name) like '%' || lower(:P0_SEARCH) || '%'
          or lower(e.last_name) like '%' || lower(:P0_SEARCH) || '%'
          or lower(e.phone_number) like '%' || lower(:P0_SEARCH) || '%')
      
      -- union all
      
      -- -- HOTEL RESERVATIONS
      -- select
      --     'طلب حجز فندق' as result_type,
      --     'كود الطلب: ' || r.reservation_id as result_label,
      --     to_char(r.from_date, 'YYYY-MM-DD') || ' - ' || to_char(r.to_date, 'YYYY-MM-DD') as result_subtitle,
      --     r.client_name || ' – ' || r.hotel_name as result_desc,
      --     r.reservation_id as result_id,
      --     '#APP_FILES#placeholders/hotel-reservations-placeholder.png' as avatar_src,
      --     3 as target_page,
      --     'P3_RESERVATION_ID' as target_item
      -- from vw_hotel_reservation_summary r
      -- where     length(:P0_SEARCH) >= 2 and 
      --     lower(r.reservation_id) like '%' || lower(:P0_SEARCH) || '%'
      
      -- -- union all
      
      -- LIMO RESERVATIONS
      -- select
      --     'طلب حجز ليموزين' as result_type,
      --     'كود الطلب: ' || r.reservation_id as result_label,
      --     to_char(r.from_date, 'YYYY-MM-DD') || ' - ' || to_char(r.to_date, 'YYYY-MM-DD') as result_subtitle,
      --     r.client_name as result_desc,
      --     r.reservation_id as result_id,
      --     '#APP_FILES#placeholders/limo-reservation-placeholder.png' as avatar_src,
      --     360 as target_page,
      --     'P360_RESERVATION_ID' as target_item
      -- from vw_limo_reservation_summary r
      -- where
      --     length(:P0_SEARCH) >= 2 and 
      --     lower(r.reservation_id) like '%' || lower(:P0_SEARCH) || '%'
      
    page-items-to-submit: 
    - P0_SEARCH

