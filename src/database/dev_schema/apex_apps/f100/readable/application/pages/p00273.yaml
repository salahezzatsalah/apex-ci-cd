processes: 
- # ====== Process: New ========================================
  id: 220306284415546856
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_km  NUMBER;
        l_min NUMBER;
        l_raw CLOB;
      
        l_from_pid VARCHAR2(200);
        l_to_pid   VARCHAR2(200);
      BEGIN
        IF :P273_IS_RETURN IS NULL THEN
          :P273_IS_RETURN := 'N';
        END IF;
      
        /* ======================
           AIRPORT / TRANSFER
        ====================== */
        IF :P273_SERVICETYPE IN ('AIRPORT','TRANSFER') THEN
      
          IF :P273_SERVICETYPE = 'AIRPORT' THEN
            l_from_pid := :P273_FROM_PLACE_ID;
            l_to_pid   := :P273_TO_PLACE_ID;
          ELSE
            l_from_pid := :P273_TR_FROM_PLACE_ID;
            l_to_pid   := :P273_TR_TO_PLACE_ID;
          END IF;
      
          IF l_from_pid IS NULL OR l_to_pid IS NULL THEN
            raise_application_error(-20001,'FROM/TO place_id is required');
          END IF;
      
          maps_pkg.compute_route_by_place_id(
            p_from_place_id => l_from_pid,
            p_to_place_id   => l_to_pid,
            o_distance_km   => l_km,
            o_duration_min  => l_min,
            o_raw_json      => l_raw
          );
      
          :P273_DISTANCE_KM  := l_km;
          :P273_DURATION_MIN := l_min;
      
        /* ======================
              DAILY
        ====================== */
        ELSIF :P273_SERVICETYPE = 'DAILY' THEN
      
          IF :P273_DAILY_DATE_FROM IS NULL
             OR :P273_DAILY_DATE_TO IS NULL THEN
            raise_application_error(-20002,'Daily dates are required');
          END IF;
      
          :P273_DISTANCE_KM  := NULL;
          :P273_DURATION_MIN := NULL;
      
          :P273_DAILY_HOURS := 12;
      
        END IF;
      
      END;
      

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: NEXT # 220278024304280339
    type: Request = Value
    value: NEXT

- # ====== Process: SAVE_LIMO_RUNTIME ==========================
  id: 220387780394441856
  identification: 
    name: SAVE_LIMO_RUNTIME
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_runtime_id limo_search_runtime.runtime_id%TYPE;
        l_user_id    NUMBER;
      BEGIN
        -- مهم جداً: تهيئة إخراج JSON كـ CLOB عشان يرجع نظيف
        apex_json.initialize_clob_output;
      
        -- user_id: لو APP_USER_ID مش رقم، خليه NULL بدل ما يعمل exception
        BEGIN
          l_user_id := TO_NUMBER(NULLIF(v('APP_USER_ID'), ''));
        EXCEPTION WHEN OTHERS THEN
          l_user_id := NULL;
        END;
      
        INSERT INTO limo_search_runtime (
          session_id,
          user_id,
          service_type,
          car_type_id,
          distance_km,
          duration_min,
          hours,
          base_price,
          final_price,
          currency,
          route_json,
          status,
          valid_until
        )
        VALUES (
          v('APP_SESSION'),
          l_user_id,
          apex_application.g_x02,                          -- service_type
          apex_application.g_x01,                          -- car_type_id
          TO_NUMBER(NVL(apex_application.g_x03,'0')),      -- distance_km
          TO_NUMBER(NVL(apex_application.g_x04,'0')),      -- duration_min
          TO_NUMBER(NVL(apex_application.g_x05,'0')),      -- hours
          TO_NUMBER(NVL(apex_application.g_x06,'0')),      -- base_price
          TO_NUMBER(NVL(apex_application.g_x07,'0')),      -- final_price
          apex_application.g_x08,                          -- currency
          apex_application.g_x09,                          -- route_json
          'NEW',
          SYSTIMESTAMP + INTERVAL '30' MINUTE
        )
        RETURNING runtime_id INTO l_runtime_id;
      
        apex_json.open_object;
        apex_json.write('ok', true);
        apex_json.write('runtime_id', l_runtime_id);
        apex_json.close_object;
      
        -- اطبع الـ JSON للـ response
        htp.p(apex_json.get_clob_output);
        apex_json.free_output;
      
      EXCEPTION
        WHEN OTHERS THEN
          -- رجّعي JSON حتى في الخطأ (بدل HTML)
          apex_json.initialize_clob_output;
          apex_json.open_object;
          apex_json.write('ok', false);
          apex_json.write('message', SQLERRM);
          apex_json.close_object;
      
          htp.p(apex_json.get_clob_output);
          apex_json.free_output;
      END;
      

  execution: 
    sequence: 20
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

