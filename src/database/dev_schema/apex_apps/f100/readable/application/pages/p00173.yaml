- # ====== Dynamic Action: RefreshCols =========================
  id: 259805616425422036
  identification: 
    name: RefreshCols

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P173_CURRENCY

  actions: 
  - # ====== Action: Set Minimum Amount in Currency ==============
    id: 259805777326422037
    identification: 
      name: Set Minimum Amount in Currency
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        CASE 
          WHEN :P173_CURRENCY != :P173_DEFCURRENCY 
          THEN ROUND(:P173_DEFPRICE / :P173_EXCHANGE_RATE, 2)
          ELSE :P173_ORGININAL_PRICE
        END
        
      items-to-submit: 
      - P173_EXCHANGE_RATE
      - P173_DEFPRICE
      - P173_CURRENCY
      - P173_DEFCURRENCY
      - P173_ORGININAL_PRICE
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P173_CUSTOM_PRICE_PER_NIGHT

    execution: 
      sequence: 40
      event: RefreshCols # 259805616425422036
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 259805839140422038
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P173_CURRENCY
        
      items-to-submit: 
      - P173_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P173_EXCHANGE_RATE

    execution: 
      sequence: 30
      event: RefreshCols # 259805616425422036
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: SetNightsCount ======================
  id: 259806002745422039
  identification: 
    name: SetNightsCount

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P173_DATE_FROM
    - P173_DATE_TO

  actions: 
  - # ====== Action: CalculateNights =============================
    id: 259806075533422040
    identification: 
      name: CalculateNights
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        TRUNC(TO_DATE(:P173_DATE_TO, 'DD-MM-YYYY')) - TRUNC(TO_DATE(:P173_DATE_FROM, 'DD-MM-YYYY'))
        
      items-to-submit: 
      - P173_DATE_FROM
      - P173_DATE_TO
      escape-special-characters: true
      suppress-change-event: true

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P173_NIGHT_COUNT

    execution: 
      sequence: 10
      event: SetNightsCount # 259806002745422039
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

