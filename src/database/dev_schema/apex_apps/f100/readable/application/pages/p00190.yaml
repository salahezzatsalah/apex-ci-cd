regions: 
- # ====== Region: Settlements Report ==========================
  id: 277030359246043658
  identification: 
    name: Settlements Report
    title: تقرير التسويات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        CURSOR c_drivers IS
          SELECT * 
          FROM VW_DRIVER_DUES_BALANCE 
          ORDER BY
            CASE
              WHEN RECORD_SETTLE_YN = 'Y' THEN 1
              WHEN RECORD_COLLECT_YN = 'Y' THEN 2
              ELSE 3
            END;
      
        l_output        CLOB := '';
        l_date_formatted VARCHAR2(100);
        l_type_label    VARCHAR2(100);
        l_arrow_class   VARCHAR2(100);
        l_color_bg      VARCHAR2(100);
        l_color_text    VARCHAR2(100);
        l_swap_colors   BOOLEAN := (:USER_TYPE != 'EMPLOYEE');
        l_is_employee   BOOLEAN := (:USER_TYPE = 'EMPLOYEE');
      
        -- Helper function: formats numbers with or without decimals
        FUNCTION format_number(p_value VARCHAR2) RETURN VARCHAR2 IS
          l_num NUMBER;
          l_result VARCHAR2(50);
        BEGIN
          l_num := TO_NUMBER(REPLACE(NVL(p_value, '0'), ',', ''));
          IF l_num = TRUNC(l_num) THEN
            l_result := TO_CHAR(l_num, 'FM999G999G999G990');
          ELSE
            l_result := TO_CHAR(l_num, 'FM999G999G999G990D00');
            l_result := REGEXP_REPLACE(l_result, '(\.\d*?)0+$', '\1');
            l_result := REGEXP_REPLACE(l_result, '\.$', '');
          END IF;
          RETURN l_result;
        EXCEPTION WHEN OTHERS THEN
          RETURN NVL(p_value, '0');
        END;
      
      BEGIN
        l_output := l_output || '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
      
        FOR rec IN c_drivers LOOP
          l_output := l_output || '
          <div class="driver-card bg-white rounded-xl shadow border border-gray-200 p-4 hover:shadow-md transition"
               data-name="' || rec.DRIVER_NAME || '"
               data-phone="' || rec.DRIVER_PHONE || '"
               data-product="' || rec.PRODUCT_ID || '"
               data-assignment="' || rec.ASSIGNMENT_ID || '"
               data-driver-id="' || rec.DRIVER_ID || '"
               data-type="' || rec.ASSIGNMENT_TYPE || '"
               data-record-collect="' || rec.RECORD_COLLECT_YN || '"
               data-record-settle="' || rec.RECORD_SETTLE_YN || '"
               dir="rtl">';
      
          -- Header
          l_output := l_output || '
            <div class="flex justify-between mb-4">
              <div class="flex items-center gap-3">
                <img src="' || NVL(rec.DRIVER_AVATAR, '#APP_FILES#placeholders/unknown.png') || '" class="w-12 h-12 rounded-full border object-cover ring-2 ring-blue-500" />
                <div>
                  <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':366:' || :APP_SESSION || '::::P366_DRIVER_ID:' || rec.DRIVER_ID) || '" class="font-bold text-base text-gray-900">' || rec.DRIVER_NAME || '</a>
                  <div class="text-xs text-gray-500">تقرير المستحقات</div>
                </div>
              </div>
              <div class="flex flex-col text-[10px] items-end text-gray-700 gap-1">
                <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6007:' || :APP_SESSION || '::::P6007_ASSIGNMENT_ID:' || rec.ASSIGNMENT_ID) || '" 
                   class="bg-blue-50 hover:bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-medium transition whitespace-nowrap">
                  كود التوزيعة: ' || rec.ASSIGNMENT_ID || '
                </a>
                <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6001:' || :APP_SESSION || '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID) || '" 
                   class="bg-blue-50 hover:bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-medium transition whitespace-nowrap">
                  كود الرحلة: ' || rec.PRODUCT_ID || '
                </a>
              </div>
            </div>';
      
          -- Dues to Driver (color swap only)
          IF rec.DRIVER_DUE_FROM_COMPANY_EGP > 0 THEN
            l_output := l_output || '
              <div class="text-sm font-semibold text-' || CASE WHEN l_swap_colors THEN 'green' ELSE 'red' END || '-700 mb-2">
                <i class="fa6 fa6-coins mr-1 text-' || CASE WHEN l_swap_colors THEN 'green' ELSE 'red' END || '-500"></i> المتبقي للسائق: 
                <span>' || format_number(rec.DRIVER_DUE_FROM_COMPANY_EGP) || ' EGP</span>
              </div>';
          ELSE
            l_output := l_output || '
              <div class="text-sm font-semibold text-gray-600 mb-2">
                <i class="fa6 fa6-coins mr-1 text-gray-400"></i> لا يوجد مستحقات متبقية للسائق.
              </div>';
          END IF;
      
          l_output := l_output || '
            <div class="text-xs text-gray-500 italic mb-2">
              إجمالي مستحقات السائق: ' || format_number(rec.DRIVER_TOTAL_PAYOUT_EGP) || ' EGP - 
              مصاريف التوزيعة: ' || format_number(rec.TOTAL_EXPENSES_EGP) || ' EGP
            </div>';
      
          -- Collections
          IF rec.COLLECTIONS_BY_CURRENCY_JSON IS NOT NULL THEN
            l_output := l_output || '
              <div class="text-sm font-semibold text-gray-800 mb-1">
                <i class="fa6 fa6-wallet mr-1 text-gray-600"></i> تحصيلات السائق:
              </div>
              <div class="border rounded-xl overflow-hidden text-xs text-gray-700 mb-3 shadow-sm">
                <div class="grid grid-cols-3 bg-gray-100 font-bold p-2 border-b text-center">
                  <div>العملة</div><div>المبلغ</div><div class="text-right">بالـEGP</div>
                </div>';
            FOR c IN (
              SELECT currency, amount, amount_egp
              FROM JSON_TABLE(rec.COLLECTIONS_BY_CURRENCY_JSON, '$[*]'
                COLUMNS (
                  currency VARCHAR2(10) PATH '$.currency',
                  amount VARCHAR2(50) PATH '$.amount',
                  amount_egp VARCHAR2(50) PATH '$.amount_egp'
                )
              )
            ) LOOP
              l_output := l_output || '
                <div class="grid grid-cols-3 p-2 border-b text-center">
                  <div>' || c.currency || '</div>
                  <div>' || format_number(c.amount) || '</div>
                  <div class="text-right">≈ ' || format_number(c.amount_egp) || '</div>
                </div>';
            END LOOP;
            l_output := l_output || '</div>';
          END IF;
      
          -- Dues to Company (color swap only)
          IF rec.REMAINING_DUES_BY_CURRENCY_JSON IS NOT NULL AND rec.REMAINING_DUES_BY_CURRENCY_JSON != '[]' THEN
            l_output := l_output || '<div class="text-sm font-semibold ' || CASE WHEN l_swap_colors THEN 'text-red-800' ELSE 'text-green-800' END || ' mt-3 mb-1" dir="rtl">
              <i class="fa6 fa6-building-columns mr-1 ' || CASE WHEN l_swap_colors THEN 'text-red-600' ELSE 'text-green-600' END || '"></i> المتبقي للشركة:
            </div>';
            FOR d IN (
              SELECT currency, remaining_amount, remaining_amount_egp
              FROM JSON_TABLE(rec.REMAINING_DUES_BY_CURRENCY_JSON, '$[*]'
                COLUMNS (
                  currency VARCHAR2(10) PATH '$.currency',
                  remaining_amount VARCHAR2(50) PATH '$.remaining_amount',
                  remaining_amount_egp VARCHAR2(50) PATH '$.remaining_amount_egp'
                )
              )
            ) LOOP
              l_output := l_output || '
                <div class="flex items-center justify-between text-xs ' || CASE WHEN l_swap_colors THEN 'bg-red-100 text-red-800' ELSE 'bg-green-100 text-green-800' END || ' font-medium mr-2 mb-2 px-3 py-1 rounded-full shadow-sm" dir="rtl">
                  <span>' || d.currency || ': ' || format_number(d.remaining_amount) || ' (≈ ' || format_number(d.remaining_amount_egp) || ' EGP)</span>';
              IF l_is_employee THEN
                l_output := l_output || '
                  <button type="button" class="ml-2 ' || CASE WHEN l_swap_colors THEN 'bg-red-600 hover:bg-red-700' ELSE 'bg-green-600 hover:bg-green-700' END || ' text-white text-[10px] px-2 py-0.5 rounded"
                          onclick="openCollectModal(''' || d.currency || ''', ''' || d.remaining_amount || ''', ''' || d.remaining_amount_egp || ''', ''' || rec.DRIVER_ID || ''', ''' || rec.ASSIGNMENT_ID || ''', ''' || rec.PRODUCT_ID || ''')">
                    <i class="fa6 fa6-hand-holding-dollar mr-1"></i> تحصيل
                  </button>';
              END IF;
              l_output := l_output || '</div>';
            END LOOP;
          END IF;
      
          -- Settle to Driver (color swap only)
          IF rec.DRIVER_DUE_FROM_COMPANY_EGP > 0 THEN
            l_output := l_output || '
              <div class="text-sm font-semibold text-gray-800 mt-4 mb-1" dir="rtl">
                <i class="fa6 fa6-money-bill-wave mr-1 ' || CASE WHEN l_swap_colors THEN 'text-green-600' ELSE 'text-red-600' END || '"></i> تسوية للسائق:
              </div>
              <div class="flex items-center justify-between text-xs ' || CASE WHEN l_swap_colors THEN 'bg-green-100 text-green-800' ELSE 'bg-red-100 text-red-800' END || ' font-semibold px-3 py-1 rounded-full shadow-sm" dir="rtl">
                <span>' || format_number(rec.DRIVER_DUE_FROM_COMPANY_EGP) || ' EGP</span>';
            IF l_is_employee THEN
              l_output := l_output || '
                <button type="button" class="ml-2 ' || CASE WHEN l_swap_colors THEN 'bg-green-600 hover:bg-green-700' ELSE 'bg-red-600 hover:bg-red-700' END || ' text-white text-[10px] px-3 py-1 rounded"
                        onclick="openSettleWithDriver(''' || rec.DRIVER_ID || ''', ''' || format_number(rec.DRIVER_DUE_FROM_COMPANY_EGP) || ''', ''' || rec.ASSIGNMENT_ID || ''', ''' || rec.PRODUCT_ID || ''')">
                  تسوية
                </button>';
            END IF;
            l_output := l_output || '</div>';
          END IF;
      
          -- Settlements History (ORDERED BY DATE, HANDLING INVALID FORMAT SAFELY)
          IF rec.SETTLEMENTS_HISTORY_JSON IS NOT NULL THEN
            l_output := l_output || '<div class="text-sm font-semibold text-gray-800 mt-4 mb-1" dir="rtl">
              <i class="fa6 fa6-clock-rotate-left mr-1"></i> تفاصيل التسويات السابقة:
            </div><div class="flex flex-col gap-2" dir="rtl">';
      
            FOR s IN (
              SELECT *
                FROM (
                  SELECT
                    type, currency, amount, notes, amount_egp, settlement_date, settled_by_name,
                    CASE
                      WHEN REGEXP_LIKE(settlement_date, '^\d{4}-\d{2}-\d{2}$')
                        THEN TO_DATE(settlement_date, 'YYYY-MM-DD')
                      ELSE NULL
                    END AS settlement_date_dt
                  FROM JSON_TABLE(rec.SETTLEMENTS_HISTORY_JSON, '$[*]'
                    COLUMNS (
                      type VARCHAR2(20) PATH '$.type',
                      currency VARCHAR2(10) PATH '$.currency',
                      amount VARCHAR2(50) PATH '$.amount',
                      notes VARCHAR2(100) PATH '$.notes',
                      amount_egp VARCHAR2(50) PATH '$.amount_egp',
                      settlement_date VARCHAR2(30) PATH '$.settlement_date',
                      settled_by_name VARCHAR2(200) PATH '$.settled_by_name'
                    )
                  )
                )
                ORDER BY settlement_date_dt DESC NULLS LAST
            ) LOOP
              BEGIN
                IF s.settlement_date IS NOT NULL AND REGEXP_LIKE(s.settlement_date, '^\d{4}-\d{2}-\d{2}$') THEN
                  l_date_formatted := TO_CHAR(TO_DATE(s.settlement_date, 'YYYY-MM-DD'), 'DD/MM/YYYY');
                ELSE
                  l_date_formatted := NVL(s.settlement_date, '-');
                END IF;
              EXCEPTION WHEN OTHERS THEN
                l_date_formatted := NVL(s.settlement_date, '-');
              END;
      
              IF s.type = 'TO_DRIVER' THEN
                l_type_label := 'من الشركة الى السائق';
                IF l_swap_colors THEN
                  l_arrow_class := 'fa6-circle-arrow-left text-green-600';
                  l_color_bg := 'bg-green-50 text-green-800 border border-green-300';
                  l_color_text := 'text-green-800';
                ELSE
                  l_arrow_class := 'fa6-circle-arrow-right text-red-600';
                  l_color_bg := 'bg-red-50 text-red-800 border border-red-300';
                  l_color_text := 'text-red-800';
                END IF;
              ELSIF s.type = 'FROM_DRIVER' THEN
                l_type_label := 'من السائق الى الشركة';
                IF l_swap_colors THEN
                  l_arrow_class := 'fa6-circle-arrow-right text-red-600';
                  l_color_bg := 'bg-red-50 text-red-800 border border-red-300';
                  l_color_text := 'text-red-800';
                ELSE
                  l_arrow_class := 'fa6-circle-arrow-left text-green-600';
                  l_color_bg := 'bg-green-50 text-green-800 border border-green-300';
                  l_color_text := 'text-green-800';
                END IF;
              ELSE
                l_type_label := s.type;
                l_arrow_class := '';
                l_color_bg := 'bg-gray-50 border';
                l_color_text := 'text-gray-800';
              END IF;
      
              l_output := l_output || '
              <div class="flex flex-col gap-1 px-3 py-2 rounded-lg shadow-sm text-xs ' || l_color_bg || '" dir="rtl">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2 ' || l_color_text || '">
                    ' || CASE WHEN l_arrow_class IS NOT NULL THEN '<i class="fa6 ' || l_arrow_class || '"></i>' ELSE '' END || '
                    <span>' || l_type_label || '</span>
                  </div>
                  <div class="font-bold ' || l_color_text || '">' || format_number(s.amount) || ' ' || s.currency || '</div>
                </div>
                <div class="flex justify-between text-gray-600 text-[11px]" dir="rtl">
                  <span>بتاريخ: ' || l_date_formatted || '</span>
                                          <span>ملاحظات:' || NVL(s.notes, '-') || '</span>
                  <span>مسجّل بواسطة: ' || NVL(s.settled_by_name, '-') || '</span>
      
                </div>
              </div>';
            END LOOP;
      
            l_output := l_output || '</div>';
          END IF;
      
          l_output := l_output || '</div>'; -- end of card
        END LOOP;
      
        l_output := l_output || '</div>'; -- grid end
        RETURN l_output;
      END;
      

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    static-id: driver-card
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

- # ====== Region: Search & Filter =============================
  id: 277030855252043663
  identification: 
    name: Search & Filter
    title: ادوات البحث
    type: Static Content

  source: 
    html-code: |
      <div class="mb-4 grid grid-cols-1 md:grid-cols-4 gap-3">
        <input type="text" id="searchInput" placeholder="بحث بالاسم أو الكود أو الهاتف"
               class="border rounded px-3 py-2 text-sm w-full"
               oninput="applyDriverFilter()" />
      
        <select id="driverTypeFilter" class="border rounded px-3 py-2 text-sm w-full"
                onchange="applyDriverFilter()">
          <option value="">كل أنواع السائقين</option>
          <option value="INSOURCE">كباتن</option>
          <option value="OUTSOURCE">سائق خارجي</option>
        </select>
      
        <select id="duesFilter" class="border rounded px-3 py-2 text-sm w-full"
                onchange="applyDriverFilter()">
          <option value="">كل الديون (الكل)</option>
          <option value="COLLECT">قابل للتحصيل فقط</option>
          <option value="SETTLE">قابل للتسوية فقط</option>
          <option value="BOTH">قابل للتحصيل أو التسوية</option>
