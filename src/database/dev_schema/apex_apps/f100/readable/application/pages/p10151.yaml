validations: 
- # ====== Validation: prevent delete of existing ==============
  id: 13903700654100101770
  identification: 
    name: prevent delete of existing

  execution: 
    sequence: 10

  validation: 
    type: No Rows returned
    sql-query: 'select 1 from sp_projects where focus_area_id = :P10151_ID'
    always-execute: false

  error: 
    error-message: Focus Area is in use can not be deleted.  You can hide from the user interface by setting the active flag to No.
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: DELETE # 13903699156766101769

- # ====== Validation: dups ====================================
  id: 13904035678093817735
  identification: 
    name: dups

  execution: 
    sequence: 20

  validation: 
    type: No Rows returned
    sql-query: |
      select 1
        from sp_initiative_focus_areas
       where initiative_id = :P10151_INITIATIVE_ID
         and lower(focus_area) = lower(:P10151_FOCUS_AREA)
         and (:P10151_ID is null or id != :P10151_ID)
    always-execute: false

  error: 
    error-message: This Focus Area already exists for this &NOMENCLATURE_INITIATIVE..
    display-location: Inline with Field and in Notification
    associated-item: P10151_FOCUS_AREA # 13904031894303817697

