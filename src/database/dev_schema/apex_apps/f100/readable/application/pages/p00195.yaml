    pl/sql-code: |
      DECLARE
          l_file_name    VARCHAR2(4000) := apex_application.g_x01; -- ZIP path from JS
          l_download_url VARCHAR2(4000);
      BEGIN
          -- Session-safe URL to DOWNLOAD_FILE
          l_download_url := 'wwv_flow.show?p_request=APPLICATION_PROCESS:DOWNLOAD_FILE' ||
