javascript: 
  function-and-global-variable-declaration: |
    function downloadCarZip() {
        const carId = apex.item('P195_ID').getValue();
        if (!carId) {
            apex.message.alert('Please select a car first');
            return;
        }
    const zipFileName = `COMPANY_REGISTERED_CARS_AVATAR/${apex.item('P195_ID').getValue()}/${apex.item('P195_ID').getValue()}_FILES.zip`;
    
    apex.server.process('GET_ZIP_DOWNLOAD_URL', { x01: zipFileName }, {
        dataType: 'text',
        success: function(downloadUrl) {
            window.open(downloadUrl, '_blank'); // triggers ZIP download
        },
        error: function(err) {
            console.error('Failed to get ZIP URL', err);
            apex.message.alert('Error: Could not get ZIP URL');
        }
    });
    
    }
    

