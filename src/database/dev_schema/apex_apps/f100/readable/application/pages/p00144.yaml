dynamic-actions: 
- # ====== Dynamic Action: when notification pref set to none ==
  id: 14300973944190178840
  identification: 
    name: when notification pref set to none

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Item(s)
    item(s): 
    - P144_NOTIFICATION_PREF

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      $v("P144_NOTIFICATION_PREF") == 'APP:NONE' || 
      $v("P144_NOTIFICATION_PREF") == 'APP:EMAIL:NONE' ||
      $v("P144_NOTIFICATION_PREF") == 'EMAIL:NONE'

  actions: 
  - # ====== Action: Set Value ===================================
    id: 14300974082485178841
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: NONE
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P144_NOTIFICATION_PREF

    execution: 
      sequence: 10
      event: when notification pref set to none # 14300973944190178840
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

