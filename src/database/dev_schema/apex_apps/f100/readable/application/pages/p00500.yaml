- # ====== Region: Search Results ==============================
  id: 29349806111300454681
  identification: 
    name: Search Results
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select task_type task_type,
             apex_page.get_url (
                 p_page   => 502,
                 p_items  => 'P502_TASK_ID,P502_RESERVATION_ID,P502_PREV_PAGE',
                 p_values => t.ID||','||p.reservation_id||',500') link,
             p.reservation_id,
             rt.task_type ||
                 case when t.task_sub_type_id is not null then ': ' end ||
                 (select task_type from res_task_types rt where rt.id = t.task_sub_type_id) name,
             task task_name,
             substr(t.description,1,200)||case when length(t.description) > 200 then '...' end details,
             t.UPDATED,
             lower(t.updated_by) updated_by,
             t.created,
             to_char(t.created,'YYYY.MM') month,
             lower(t.created_by) added_by,
             t.tags,
             case when t.owner_id is not null
                  then 'موكلة الى '||
                        (select first_name ||' '||last_name from bs_employees
                         where id = t.owner_id) 
                  end assigned_to_display,
            (select first_name ||' '||last_name from bs_employees
              where id = t.owner_id) assigned_to
        from RESERVATION_TASKS t,
             HOTEL_RESERVATIONS p,
             RES_TASK_TYPES rt
       where t.reservation_id = p.reservation_id
         and t.task_type_id = rt.id
         and p.ARCHIVED_YN = 'N'
      

  order-by: 
    type: None

