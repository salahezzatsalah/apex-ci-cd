- # ====== Validation: no delete if used =======================
  id: 14582815568182862031
  identification: 
    name: no delete if used

  execution: 
    sequence: 20

  validation: 
    type: No Rows returned
    sql-query: |
      select 1
        from reservation_tasks
       where status_id = :P10062_ID
    always-execute: false

  error: 
    error-message: لا يمكن حذف أي حالة طالما أنها مستخدمة في مهام حالية.
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: DELETE # 28751536532586564559

- # ====== Validation: only one default per task type ==========
  id: 14582815824017862034
  identification: 
    name: only one default per task type

  execution: 
    sequence: 30

  validation: 
    type: No Rows returned
    sql-query: |
      select 1
        from res_task_statuses
       where task_type_id = :P10062_TASK_TYPE_ID
         and is_default_yn = 'Y'
         and (id != :P10062_ID or :P10062_ID is null)
    always-execute: false

  error: 
    error-message: Can only have one default per task type.
    display-location: Inline with Field and in Notification
    associated-item: P10062_IS_DEFAULT_YN # 14582815773502862033

