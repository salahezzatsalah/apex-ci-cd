- # ====== Region: Task Types ==================================
  id: 30457254834575764454
  identification: 
    name: Task Types
    title: انواع المهام
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select ID,
             case when parent is not null then parent ||': '||task_type else task_type end task_type,
             DESCRIPTION,
             task_name_required,
             DISPLAY_SEQ,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             STATIC_ID,
             include,
             references,
          --    init_refs,
             status_count
        from (
      select ID,
             task_type,
             (select task_type from res_task_types where id = t.parent_type_id) parent,
             DESCRIPTION,
             decode(task_name_req_yn,'Y','نعم','N','لا',task_name_req_yn) task_name_required,
             DISPLAY_SEQ,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             STATIC_ID,
             decode(include_yn,'Y','نعم','N','لا',include_yn) include,
             (select count(*) from reservation_TASKS where task_type_id = t.id or task_sub_type_id = t.id) references,
          --    (select count(*) from SP_INITIATIVE_DEFAULT_TASKS where type_id = t.id) init_refs,
             case when parent_type_id is null then (select count(*) from res_task_statuses s
                                                     where task_type_id = t.id) end status_count
        from res_TASK_TYPES t
        )

