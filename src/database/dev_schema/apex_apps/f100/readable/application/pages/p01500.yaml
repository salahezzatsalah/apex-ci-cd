- # ====== Process: Building Json PassInfo =====================
  id: 192740898442241767
  identification: 
    name: Building Json PassInfo
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE 
          l_json CLOB := '['; 
          l_count NUMBER := NVL(:P1500_PASSENGERS_NO, 0); 
          l_name VARCHAR2(4000); 
          l_nat VARCHAR2(4000); 
          l_first BOOLEAN := TRUE;
      BEGIN 
          IF l_count < 1 THEN 
              :P1500_PASSENGERS_INFO := '[]'; 
              RETURN; 
          END IF; 
          
          FOR i IN 1..l_count LOOP 
              BEGIN
                  IF apex_application.g_f01.EXISTS(i) THEN
                      l_name := apex_application.g_f01(i);
                  ELSE
                      l_name := NULL;
                  END IF;
              EXCEPTION
                  WHEN OTHERS THEN
                      l_name := NULL;
              END;
              
              BEGIN
                  IF apex_application.g_f02.EXISTS(i) THEN
                      l_nat := apex_application.g_f02(i);
                  ELSE
                      l_nat := NULL;
                  END IF;
              EXCEPTION
                  WHEN OTHERS THEN
                      l_nat := NULL;
              END;
              
              IF NOT l_first THEN 
                  l_json := l_json || ','; 
              END IF;
              
              l_json := l_json || '{' ||
                  '"passenger_no":' || i || ',' ||
                  '"name":"' || REPLACE(REPLACE(NVL(l_name, ''), '"', '\"'), CHR(10), '\n') || '",' || 
                  '"nationality":"' || REPLACE(REPLACE(NVL(l_nat, ''), '"', '\"'), CHR(10), '\n') || '"' ||
                  '}';
              
              l_first := FALSE;
          END LOOP; 
          
          l_json := l_json || ']'; 
          :P1500_PASSENGERS_INFO := l_json; 
          
      END;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

