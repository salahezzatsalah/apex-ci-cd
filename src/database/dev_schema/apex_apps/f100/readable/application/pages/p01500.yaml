- # ====== Region: Passenger_Info ==============================
  id: 177083213380573197
  identification: 
    name: Passenger_Info
    title: بيانات الركاب
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE 
          l_html CLOB := ''; 
          l_count NUMBER := NVL(:P1500_PASSENGERS_NO, 0); 
          l_name_idx NUMBER := 1;  -- index للأسماء
          l_nat_idx NUMBER := 1;   -- index للجنسيات
      BEGIN 
          IF l_count > 0 THEN 
              l_html := '<div class="passengers-container">';
              
              FOR i IN 1..l_count LOOP 
                  l_html := l_html || 
                      '<div class="passenger-row" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">' ||
                      '<h4>الركاب ' || i || '</h4>' ||
                      '<div class="row">' ||
                      '<div class="col col-6">' ||
                      '<label for="P_NAME_'||i||'">الاسم <span style="color:red;">*</span></label>' ||
                      apex_item.text( 
                          p_idx => 1,  -- كل الأسماء في g_f01
                          p_value => NULL, 
                          p_size => 30,
                          p_maxlength => 200,
                          p_attributes => 'id="P_NAME_'||i||'" class="apex-item-text" placeholder="ادخل اسم الراكب"' 
                      ) || 
                      '</div>' ||
                      '<div class="col col-6">' ||
                      '<label for="P_NAT_'||i||'">الجنسية <span style="color:red;">*</span></label>' ||
                      apex_item.text( 
                          p_idx => 2,  -- كل الجنسيات في g_f02
                          p_value => NULL, 
                          p_size => 30,
                          p_maxlength => 100,
                          p_attributes => 'id="P_NAT_'||i||'" class="apex-item-text" placeholder="ادخل جنسية الراكب"' 
                      ) || 
                      '</div>' ||
                      '</div>' ||
                      '</div>'; 
              END LOOP; 
              
              l_html := l_html || '</div>'; 
          END IF; 
          
          RETURN l_html; 
      END;
    page-items-to-submit: 
    - P1500_PASSENGERS_NO

