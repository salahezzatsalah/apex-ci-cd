- # ====== Region: Supplier Details ============================
  id: 13405289997495095544
  identification: 
    name: Supplier Details
    title: تفاصيل ملف المورد
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         s.SUPPLIER_ID AS id,
         s.SUPPLIER_NAME AS name,
         s.EMAIL AS supplier_email,
         s.PHONE,
         --
         CASE 
           WHEN s.IS_COMPANY = 'Y' THEN 'شركة'
           ELSE 'فرد'
         END AS supplier_type,
         --
         (SELECT TYPE_NAME FROM SUPPLIER_TYPES t WHERE t.SUPPLIER_TYPE_ID = s.SUPPLIER_TYPE_ID) AS type_name,
         --
         CASE 
           WHEN s.IS_COMPANY = 'Y' THEN 
             'السجل التجاري: ' || NVL(s.COMPANY_REG_NO, 'غير محدد') || 
             ' - مسؤول التواصل: ' || NVL(s.CONTACT_PERSON, 'غير محدد')
           ELSE 
             'الرقم القومي: ' || NVL(s.NATIONAL_ID, 'غير محدد')
         END AS identity_info,
         --
         s.CITY || '، ' || (
           SELECT COUNTRY_NAME FROM SP_COUNTRIES c WHERE c.ID = s.COUNTRY_ID
         ) AS location,
         s.ADDRESS,
         s.STATUS,
         s.NOTES,
         TO_CHAR(s.CREATED, 'DD-MM-YYYY') AS created,
         TO_CHAR(s.UPDATED, 'DD-MM-YYYY') AS updated
      FROM SUPPLIERS s
      WHERE s.SUPPLIER_ID = :P158_SUPPLIER_ID;
      
    page-items-to-submit: 
    - P158_SUPPLIER_ID

