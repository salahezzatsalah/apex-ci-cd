  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         s.SUPPLIER_ID,
         s.SUPPLIER_NAME,
         --
         CASE 
           WHEN s.IS_COMPANY = 'Y' THEN 'شركة'
           ELSE 'فرد'
         END AS ENTITY_TYPE,
         --
         (SELECT TYPE_NAME FROM SUPPLIER_TYPES t WHERE t.SUPPLIER_TYPE_ID = s.SUPPLIER_TYPE_ID) AS SUPPLIER_TYPE,
         s.NATIONAL_ID,
         s.TAX_ID,
         s.PHONE,
         s.EMAIL,
         SUBSTR(s.EMAIL, INSTR(s.EMAIL, '@') + 1) AS EMAIL_DOMAIN,
         s.ADDRESS,
         s.CITY,
         (SELECT COUNTRY_NAME || ' (' || REGION || ')' 
            FROM SP_COUNTRIES c 
           WHERE c.ID = s.COUNTRY_ID) AS COUNTRY,
         s.NOTES,
         --
         CASE 
           WHEN s.PROFILE_PHOTO IS NOT NULL AND DBMS_LOB.GETLENGTH(s.PROFILE_PHOTO) > 0 THEN 'نعم'
           ELSE 'لا'
         END AS HAS_PROFILE_PHOTO,
         s.PHOTO_FILENAME,
         s.PHOTO_MIMETYPE,
         s.PHOTO_CHARSET,
         s.PHOTO_LAST_UPDATED,
         TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(s.CREATED), 'DD-MON-YYYY HH:MIPM') created ,
         
         s.CREATED_BY,
         s.UPDATED,
         s.UPDATED_BY,
         s.COMPANY_REG_NO,
         s.CONTACT_PERSON,
         --
         CASE 
           WHEN s.HAS_PORTAL_ACCESS = 'Y' AND s.STATUS = 'ACTIVE' THEN
             NVL((
               SELECT u.ROLE_IDS
               FROM APEX_APPL_ACL_USERS u
               WHERE u.APPLICATION_ID = :APP_ID
                 AND LOWER(u.USER_NAME) = LOWER(s.USERNAME)
               FETCH FIRST 1 ROWS ONLY
             ), 'غير مصدق عليه بقائمة المستخدمين')
           ELSE 'لا يوجد دخول'
         END AS APP_ROLE,
         --
         s.USERNAME,
         s.PASSWORD_HASH,
         (SELECT STATUS_NAME FROM SUPPLIER_STATUSES ss WHERE ss.STATUS_CODE = s.STATUS) AS STATUS_NAME
      FROM SUPPLIERS s;
      

