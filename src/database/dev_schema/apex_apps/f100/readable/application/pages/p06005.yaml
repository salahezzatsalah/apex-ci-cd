dynamic-actions: 
- # ====== Dynamic Action: Update Amount =======================
  id: 231787945307304126
  identification: 
    name: Update Amount

  execution: 
    sequence: 50
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P6005_CURRENCY

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 231788053390304127
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            v_egp_outstanding NUMBER;
            v_target_curr     VARCHAR2(10);
            v_rate            NUMBER := 1;
            v_equiv_amount    NUMBER;
        BEGIN
            -- Load outstanding amount in EGP (the reference value)
            SELECT OUTSTANDING_AMOUNT_EGP
              INTO v_egp_outstanding
              FROM VW_LIMO_TRIP_TRACKING
             WHERE TRIP_ID = :P6005_TRIP_ID;
        
            v_target_curr := :P6005_CURRENCY;
        
            -- If EGP, keep as is, else convert
            IF v_target_curr = 'EGP' THEN
                v_equiv_amount := v_egp_outstanding;
            ELSE
                SELECT EXCHANGE_RATE INTO v_rate
                  FROM V_LATEST_CURRENCY_RATES
                 WHERE CURRENCY_CODE = v_target_curr;
        
                IF v_rate IS NULL OR v_rate = 0 THEN
                    v_equiv_amount := NULL;
                ELSE
                    v_equiv_amount := ROUND(v_egp_outstanding / v_rate, 2);
                END IF;
            END IF;
        
            -- Assign back to the page item
            :P6005_AMOUNT_COLLECTED := v_equiv_amount;
        EXCEPTION
            WHEN NO_DATA_FOUND THEN
                :P6005_AMOUNT_COLLECTED := NULL;
            WHEN OTHERS THEN
                :P6005_AMOUNT_COLLECTED := NULL;
        END;
        
      items-to-submit: 
      - P6005_TRIP_ID
      - P6005_CURRENCY
      items-to-return: 
      - P6005_AMOUNT_COLLECTED
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Update Amount # 231787945307304126
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

