- # ====== Region: Account Summary Data Query ==================
  id: 336757844207030018
  identification: 
    name: Account Summary Data Query
    type: Form

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
        a.ACCOUNT_ID,
        a.ACCOUNT_NAME,
        a.ACCOUNT_CODE,
        a.ACCOUNT_TYPE,
        t.NAME_AR AS ACCOUNT_TYPE_NAME,
        a.CURRENCY_CODE,
        c.SYMBOL,
        'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/CURFLAG/' || c.CURRENCY_CODE AS FLAG_URL,
        NVL(vb.BALANCE, 0) AS BALANCE,
        a.STATUS,
        a.OWNER_TYPE,
        a.OWNER_ID
      FROM ACCOUNTS a
      JOIN ACCOUNT_TYPES t
        ON a.ACCOUNT_TYPE = t.ACCOUNT_TYPE_CODE
      JOIN CURRENCIES c
        ON a.CURRENCY_CODE = c.CURRENCY_CODE
      LEFT JOIN V_ACCOUNT_BALANCES vb
        ON a.ACCOUNT_ID = vb.ACCOUNT_ID
      WHERE a.ACCOUNT_ID = :P6008_ACCOUNT_ID
      
    page-items-to-submit: 
    - ':P6008_ACCOUNT_ID'

  layout: 
    sequence: 10
    parent-region: Account Summary # 336757714114030017
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: None
    render-components: Above Content

  advanced: 
    custom-attributes: 
    - class="hidden"
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    edit: 
      enabled: false

- # ====== Region: Transactions History ========================
  id: 337094844041072699
  identification: 
    name: Transactions History
    title: سجل العمليات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html        CLOB := '';
          l_account_id  VARCHAR2(40) := :P6008_ACCOUNT_ID;
          l_edit_url    VARCHAR2(4000);
          l_disable_edit BOOLEAN;
      BEGIN
          -- Responsive CSS for table/cards
          l_html := l_html || '
          <style>
            @media (max-width: 900px) {
              .desktop-table { display: none !important; }
              .mobile-cards { display: block !important; }
            }
            @media (min-width: 901px) {
              .desktop-table { display: block !important; }
              .mobile-cards { display: none !important; }
            }
          </style>
          <div class="w-full max-w-5xl mx-auto" style="margin-right: 0px; margin-left: 0px;" dir="rtl">
          ';
      
          -- Desktop Table
          l_html := l_html || '
          <div class="desktop-table" style="display:block">
            <table class="min-w-full bg-white rounded-2xl shadow border border-gray-100 overflow-hidden">
              <thead>
                <tr>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-calendar-days fa6-fw text-gray-400"></i> التاريخ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-file-lines fa6-fw text-gray-400"></i> الوصف</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-hashtag fa6-fw text-gray-400"></i> الرقم المرجعي</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-money-bill-wave fa6-fw text-gray-400"></i> المبلغ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-wallet fa6-fw text-gray-400"></i> الرصيد بعد المعاملة</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-user fa6-fw text-gray-400"></i> القائم بالتنفيذ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-clock fa6-fw text-gray-400"></i> تاريخ التنفيذ</th>
                </tr>
              </thead>
              <tbody>
          ';
      
          FOR rec IN (
              SELECT
                  ENTRY_ID,
                  TRANSACTION_DATE,
                  DESCRIPTION,
                  REFERENCE_NUMBER,
                  SIGNED_AMOUNT,
                  BALANCE_AFTER_TRANSACTION,
                  CURRENCY_CODE,
                  CREATED_BY_NAME,
                  CREATED
              FROM
                  V_TRANSACTION_HISTORY
              WHERE
                  ACCOUNT_ID = l_account_id
              ORDER BY
                  CREATED DESC
          ) LOOP
              -- Prepare Edit URL for Dialog Drawer
              IF rec.ENTRY_ID IS NOT NULL THEN
                  l_edit_url := APEX_UTIL.PREPARE_URL(
                      'f?p=' || :APP_ID || ':756:' || :APP_SESSION || '::::P756_ENTRY_ID:' || rec.ENTRY_ID
                  );
              ELSE
                  l_edit_url := NULL;
              END IF;
      
              -- Disable if 1 hour has passed since CREATED
              IF rec.CREATED IS NULL THEN
                  l_disable_edit := TRUE;
              ELSIF rec.CREATED + INTERVAL '1' HOUR < SYSTIMESTAMP THEN
                  l_disable_edit := TRUE;
              ELSE
                  l_disable_edit := FALSE;
              END IF;
      
              l_html := l_html || '
              <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                <td class="py-4 px-4 text-base text-gray-800 text-center font-semibold" title="تاريخ المعاملة">
                  <i class="fa6-solid fa6-calendar-days fa6-fw text-gray-400"></i>
                  <span class="align-middle">' || TO_CHAR(rec.TRANSACTION_DATE, 'DD/MM/YY') || '</span>
                </td>
                <td class="py-4 px-4 text-base text-gray-900 font-semibold max-w-xs break-words" title="الوصف">'
                  || APEX_ESCAPE.HTML(rec.DESCRIPTION) || '</td>
                <td class="py-4 px-4 text-base text-blue-700 text-center font-mono font-bold" title="الرقم المرجعي">
                  <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs font-bold font-mono">' || APEX_ESCAPE.HTML(rec.REFERENCE_NUMBER) || '</span>
                </td>
                <td class="py-4 px-4 text-lg text-center font-bold ' ||
                      CASE
                          WHEN rec.SIGNED_AMOUNT < 0 THEN 'text-red-500'
                          WHEN rec.SIGNED_AMOUNT > 0 THEN 'text-green-600'
                          ELSE 'text-gray-700'
                      END || '" title="المبلغ">'
                      || CASE WHEN rec.SIGNED_AMOUNT < 0 THEN '-' ELSE '' END
                      || NVL(TO_CHAR(ABS(rec.SIGNED_AMOUNT), 'TM9'), '0')
                      || '<span class="text-base text-gray-500 font-normal pl-1">'
                      || NVL(rec.CURRENCY_CODE, '') || '</span>
                  </td>
                <td class="py-4 px-4 text-lg text-center font-bold text-gray-900" title="الرصيد بعد المعاملة">'
                  || NVL(rec.CURRENCY_CODE, '') || ' '
                  || NVL(TO_CHAR(rec.BALANCE_AFTER_TRANSACTION, 'TM9'), '0')
                  || '</td>
                <td class="py-4 px-4 text-base text-gray-800 text-center" title="القائم بالتنفيذ">'
                  || NVL(APEX_ESCAPE.HTML(rec.CREATED_BY_NAME), '-') || '</td>
                <td class="py-4 px-4 text-base text-gray-500 text-center" title="تاريخ التنفيذ">'
                  || TO_CHAR(convert_to_local_timezone(rec.CREATED), 'DD/MM/YY HH24:MI') || '</td>
              </tr>
              ';
          END LOOP;
      
          l_html := l_html || '
              </tbody>
            </table>
          </div>
          ';
      
          -- Mobile Cards
          l_html := l_html || '
          <div class="mobile-cards" style="display:none">
          ';
      
          FOR rec IN (
              SELECT
                  ENTRY_ID,
                  TRANSACTION_DATE,
                  DESCRIPTION,
                  REFERENCE_NUMBER,
                  SIGNED_AMOUNT,
                  BALANCE_AFTER_TRANSACTION,
                  CURRENCY_CODE,
                  CREATED_BY_NAME,
                  CREATED
              FROM
                  V_TRANSACTION_HISTORY
              WHERE
                  ACCOUNT_ID = l_account_id
              ORDER BY
                  CREATED DESC
          ) LOOP
              -- Prepare Edit URL
              IF rec.ENTRY_ID IS NOT NULL THEN
                  l_edit_url := APEX_UTIL.PREPARE_URL(
                      'f?p=' || :APP_ID || ':756:' || :APP_SESSION || '::::P756_ENTRY_ID:' || rec.ENTRY_ID
                  );
              ELSE
                  l_edit_url := NULL;
              END IF;
      
              -- Disable if 1 hour has passed since CREATED
              IF rec.CREATED IS NULL THEN
                  l_disable_edit := TRUE;
              ELSIF rec.CREATED + INTERVAL '1' HOUR < SYSTIMESTAMP THEN
                  l_disable_edit := TRUE;
              ELSE
                  l_disable_edit := FALSE;
              END IF;
      
              l_html := l_html || '
              <div class="bg-white rounded-2xl border border-gray-100 shadow mb-6 p-5">
                  <!-- التاريخ وأيقونة -->
                  <div class="flex items-center gap-2 mb-2">
                      <i class="fa6-solid fa6-calendar-days fa6-fw text-gray-400"></i>
                      <span class="text-xl font-bold text-gray-700">' || TO_CHAR(rec.TRANSACTION_DATE, 'DD/MM/YY') || '</span>
                  </div>
                  <!-- الوصف -->
                  <div class="mb-2 text-base font-semibold text-gray-900" style="word-break:break-word;">
                      <i class="fa6-solid fa6-file-lines fa6-fw text-gray-400"></i>
                      ' || APEX_ESCAPE.HTML(rec.DESCRIPTION) || '
                  </div>
                  <!-- الرقم المرجعي -->
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-hashtag fa6-fw text-gray-400"></i> الرقم المرجعي</span>
                      <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs font-bold font-mono">' || APEX_ESCAPE.HTML(rec.REFERENCE_NUMBER) || '</span>
                  </div>
                  <!-- المبلغ -->
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-money-bill-wave fa6-fw text-gray-400"></i> المبلغ</span>
                      <span class="text-2xl font-bold ' ||
                      CASE
                          WHEN rec.SIGNED_AMOUNT < 0 THEN 'text-red-500'
                          WHEN rec.SIGNED_AMOUNT > 0 THEN 'text-green-600'
                          ELSE 'text-gray-700'
                      END || '">'
                      || CASE WHEN rec.SIGNED_AMOUNT < 0 THEN '-' ELSE '' END
                      || NVL(TO_CHAR(ABS(rec.SIGNED_AMOUNT), 'TM9'), '0')
                      || '<span class="text-base text-gray-500 font-normal pl-1">'
                      || NVL(rec.CURRENCY_CODE, '') || '</span>
                      </span>
                  </div>
                  <!-- الرصيد بعد المعاملة -->
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-wallet fa6-fw text-gray-400"></i> الرصيد بعد المعاملة</span>
                      <span class="text-base font-bold text-gray-900">'
                          || NVL(rec.CURRENCY_CODE, '') || ' '
                          || NVL(TO_CHAR(rec.BALANCE_AFTER_TRANSACTION, 'TM9'), '0') || '
                      </span>
                  </div>
                  <!-- القائم بالتنفيذ -->
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-user fa6-fw text-gray-400"></i> القائم بالتنفيذ</span>
                      <span class="text-xs text-gray-800 font-medium">' || NVL(APEX_ESCAPE.HTML(rec.CREATED_BY_NAME), '-') || '</span>
                  </div>
                  <!-- تاريخ التنفيذ -->
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-clock fa6-fw text-gray-400"></i> تاريخ التنفيذ</span>
                      <span class="text-xs text-gray-400">' || TO_CHAR(convert_to_local_timezone(rec.CREATED), 'DD/MM/YY HH24:MI') || '</span>
                  </div>
              </div>
              ';
          END LOOP;
      
          l_html := l_html || '</div>'; -- mobile-cards
      
          l_html := l_html || '</div>'; -- container
      
          RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6008_ACCOUNT_ID

