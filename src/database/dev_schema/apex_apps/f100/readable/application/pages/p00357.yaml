- # ====== Dynamic Action: RefreshCols =========================
  id: 266980129117901514
  identification: 
    name: RefreshCols

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P357_CURRENCY

  actions: 
  - # ====== Action: Refresh =====================================
    id: 266980654737901514
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P357_PRICE_PER_NIGHT

    execution: 
      sequence: 10
      event: RefreshCols # 266980129117901514
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Set Value ===================================
    id: 266981127824901514
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P357_CURRENCY
        
      items-to-submit: 
      - P357_CURRENCY
      escape-special-characters: true
      suppress-change-event: true

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P357_EXCHANGE_RATE

    execution: 
      sequence: 20
      event: RefreshCols # 266980129117901514
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

