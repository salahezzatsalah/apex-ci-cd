- # ====== Region: New =========================================
  id: 198748499620951804
  identification: 
    name: New
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         bt.BED_TYPE_ID     AS id,
         bt.BED_TYPE_NAME   AS bed_type,
         bt.DESCRIPTION,
         bt.CREATED, 
         bt.CREATED_BY,
         bt.UPDATED,
         bt.UPDATED_BY,
      
         CASE
           WHEN bt.ADULT_CAPACITY IS NOT NULL OR bt.CHILD_CAPACITY IS NOT NULL THEN 
             '<div style="font-weight:600;">' || NVL(bt.ADULT_CAPACITY, 0) || ' بالغ</div>' ||
             '<div style="color:#666;">' || NVL(bt.CHILD_CAPACITY, 0) || ' طفل</div>'
           ELSE 
             'غير محدد'
         END AS CAPACITY_HTML
      
      FROM ROOM_BED_TYPES bt
      ORDER BY bt.BED_TYPE_NAME;
      

