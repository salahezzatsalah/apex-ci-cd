validations: 
- # ====== Validation: Current Password is valid ===============
  id: 265929044787109238
  identification: 
    name: Current Password is valid

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      DECLARE
          v_current_pwd   varchar2(4000);
      BEGIN
          SELECT password_hash
          INTO v_current_pwd
          FROM bs_employees
          WHERE upper(username) = upper(:P10015_USERNAME);
      
          IF v_current_pwd = security_pkg.get_hashing(p_text => :P10015_CURRENT_PASSWORD) THEN
              return true;
          ELSE
              return false;
          END IF;
      
      END;
    always-execute: false

  error: 
    error-message: كلمة المرور الحالية غير صحيحة.
    display-location: Inline with Field and in Notification
    associated-item: P10015_CURRENT_PASSWORD # 265928460646109232

- # ====== Validation: New Password is valid ===================
  id: 265929144137109239
  identification: 
    name: New Password is valid

  execution: 
    sequence: 20

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      BEGIN
          IF LENGTH(:P10015_NEW_PASSWORD) < 4 THEN
              RETURN FALSE;
          END IF;
      
          RETURN TRUE;
      END;
    always-execute: false

  error: 
    error-message: يجب أن تتكون كلمة المرور الخاصة بك من 8 أحرف على الأقل ويجب أن تحتوي على حرف كبير واحد على الأقل وحرف صغير واحد ورقم واحد وحرف خاص واحد على الأقل.
    display-location: Inline with Field and in Notification
    associated-item: P10015_NEW_PASSWORD # 265928576227109233

