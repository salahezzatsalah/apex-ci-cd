javascript: 
  function-and-global-variable-declaration: |
    $(document).ready(function () {
        const changeText = function (element, text, color) {
            element.text(text).css("color", color);
        };
    
        const checkPasswordStrength = function (password) {
            const conditions = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[$@$!%*#?&]/.test(password),
            };
    
            const passedConditions = Object.values(conditions).filter(Boolean).length;
    
            if (passedConditions === 0) {
                return { message: "كلمة المرور الجديدة فارغة", color: "black", strength: 0 };
            } else if (passedConditions <= 2) {
                return { message: "ضعيف جدا", color: "#FF4B47", strength: 1 };
            } else if (passedConditions === 3 || passedConditions === 4) {
                return { message: "يمكن أن يكون أقوى", color: "#F9AE35", strength: 2 };
            } else {
                return { message: "كلمة مرور قوية", color: "#2DAF7D", strength: 3 };
            }
        };
    
        $("#P10015_NEW_PASSWORD").keyup(function () {
            const password = this.value;
            const pbText = $(".progress-bar_text");
            const result = checkPasswordStrength(password);
    
            // Update progress bar items
            $(".progress-bar_item").each(function (index) {
                if (index < result.strength) {
                    $(this).addClass("active").css("background-color", result.color);
                } else {
                    $(this).removeClass("active").css("background-color", "transparent");
                }
            });
    
            // Update the progress bar text
            changeText(pbText, result.message, result.color);
        });
    });

