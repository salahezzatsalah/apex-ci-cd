    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select JOB_NAME,
             JOB_CLASS,
             ENABLED,
             STATE,
             RUN_COUNT,
             FAILURE_COUNT,
             RETRY_COUNT,
             REPEAT_INTERVAL,
             LAST_START_DATE,
             LAST_RUN_DURATION,
             JOB_SUBNAME,
             JOB_STYLE,
             JOB_CREATOR,
             CLIENT_ID,
             GLOBAL_UID,
             PROGRAM_OWNER,
             PROGRAM_NAME,
             JOB_TYPE,
             JOB_ACTION,
             NUMBER_OF_ARGUMENTS,
             SCHEDULE_OWNER,
             SCHEDULE_NAME,
             SCHEDULE_TYPE,
             START_DATE,
             EVENT_QUEUE_OWNER,
             EVENT_QUEUE_NAME,
             EVENT_QUEUE_AGENT,
             EVENT_CONDITION,
             EVENT_RULE,
             FILE_WATCHER_OWNER,
             FILE_WATCHER_NAME,
             END_DATE,
             AUTO_DROP,
             RESTART_ON_RECOVERY,
             RESTART_ON_FAILURE,
             JOB_PRIORITY,
             MAX_RUNS,
             MAX_FAILURES,
             NEXT_RUN_DATE,
             SCHEDULE_LIMIT,
             MAX_RUN_DURATION,
             LOGGING_LEVEL,
             STORE_OUTPUT,
             STOP_ON_WINDOW_CLOSE,
             INSTANCE_STICKINESS,
             RAISE_EVENTS,
             SYSTEM,
             JOB_WEIGHT,
             NLS_ENV,
             SOURCE,
             NUMBER_OF_DESTINATIONS,
             DESTINATION_OWNER,
             DESTINATION,
             CREDENTIAL_OWNER,
             CREDENTIAL_NAME,
             INSTANCE_ID,
             DEFERRED_DROP,
             ALLOW_RUNS_IN_RESTRICTED_MODE,
             COMMENTS,
             FLAGS,
             RESTARTABLE,
             CONNECT_CREDENTIAL_OWNER,
             CONNECT_CREDENTIAL_NAME
        from user_scheduler_jobs  where job_name in ('SP_NOTIF_SUBSCRIPTIONS')

