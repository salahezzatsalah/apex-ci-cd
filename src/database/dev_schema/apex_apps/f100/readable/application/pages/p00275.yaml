processes: 
- # ====== Process: New_1 ======================================
  id: 220390401064441883
  identification: 
    name: New_1
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        -- car selection (from page 274)
        :P275_CAT_ITEM_ID := :P274_SELECTED_CAR_ID;
      
        -- data from page 273
        :P275_RES_DATE_FROM := :P273_ARRIVAL_DATE;
        :P275_RES_TIME      := :P273_ARRIVAL_TIME;
      
        IF NVL(:P273_IS_RETURN,'N') = 'Y' THEN
          :P275_RES_DATE_TO := :P273_RETURN_DATE;
        ELSE
          :P275_RES_DATE_TO := NULL; -- أو = :P273_ARRIVAL_DATE حسب ما تحبي
        END IF;
      
        :P275_FROM_LOCATION := :P273_AIRPORT_FROM;
        :P275_TO_LOCATION   := :P273_AIRPORT_TO;
      
        -- لو عندك items للسعر والعملة في 275 (مهم للباكدج)
        :P275_TRIP_PRICE := :P274_SELECTED_TOTAL;
        :P275_CURRENCY   := :P274_SELECTED_CURR;
      
      END;
      

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

- # ====== Process: New_2 ======================================
  id: 220390576774441884
  identification: 
    name: New_2
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_main_res_id   VARCHAR2(30) := :P275_MAIN_RES_ID;
        l_sub_res_id    VARCHAR2(30) := :P275_SUB_RES_ID;
        l_result        L_RESERVATION_PKG.t_result;
        l_return_sub_id VARCHAR2(30);
      
        l_trip_type     VARCHAR2(30);
        l_date_from     DATE;
        l_trip_price    NUMBER;
        l_currency      VARCHAR2(10);
        l_exrate        NUMBER;
        l_status        VARCHAR2(30);
      
        l_order_curr    VARCHAR2(10);
        l_service_class VARCHAR2(30);
      BEGIN
        /* =========================
           1) Inputs + defaults
        ========================= */
        l_trip_type  := NVL(:P275_TRIP_TYPE, :P273_SERVICETYPE);
        l_date_from  := NVL(:P275_RES_DATE_FROM, :P273_ARRIVAL_DATE);
        l_trip_price := NVL(:P275_TRIP_PRICE, :P274_SELECTED_TOTAL);
        l_currency   := NVL(:P275_CURRENCY,   :P274_SELECTED_CURR);
      
        l_exrate     := 1;
        l_status     := 'PENDING_ASSIGNMENT';
      
        -- ✅ service class based on service type
        l_service_class := CASE
          WHEN :P275_SERVICE_TYPE = 'DAILY' THEN 'DAILY'
          WHEN :P275_SERVICE_TYPE = 'TRANSFER' THEN 'TRANSFER'
          ELSE 'AIRPORT'
        END;
      
        /* =========================
           2) Guards
        ========================= */
        IF l_trip_type IS NULL THEN
          raise_application_error(-20001, 'Missing: TRIP_TYPE');
        END IF;
      
        IF l_date_from IS NULL THEN
          raise_application_error(-20001, 'Missing: RES_DATE_FROM');
        END IF;
      
        IF l_trip_price IS NULL THEN
          raise_application_error(-20001, 'Missing: TRIP_PRICE');
        END IF;
      
        IF l_currency IS NULL THEN
          raise_application_error(-20001, 'Missing: CURRENCY');
        END IF;
      
        IF :P275_CUSTOMER IS NULL THEN
          raise_application_error(-20001, 'Missing: CUSTOMER');
        END IF;
      
        -- ✅ DAILY لازم meeting point
          IF :P275_SERVICE_TYPE = 'DAILY' THEN
            :P275_FROM_LOCATION := :P273_AIRPORT_FROM;
            :P275_FROM_PLACE_ID := :P273_AIRPORT_FROM_PLACE_ID;
            :P275_TO_LOCATION   := NULL;
            :P275_TO_PLACE_ID   := NULL;
          END IF;
      
      
        /* =========================
           3) Currency mismatch fix
        ========================= */
        IF l_main_res_id IS NOT NULL THEN
          BEGIN
            SELECT currency_code
              INTO l_order_curr
              FROM main_reservations
             WHERE main_res_id = l_main_res_id
               AND status      = 'ACTIVE';
      
            IF NVL(l_order_curr,'X') <> NVL(l_currency,'X') THEN
              l_main_res_id := NULL;
            END IF;
      
          EXCEPTION
            WHEN NO_DATA_FOUND THEN
              l_main_res_id := NULL;
          END;
        END IF;
      
        /* =========================
           4) Create reservation
        ========================= */
        L_RESERVATION_PKG.create_limo_res(
          p_main_res_id     => l_main_res_id,
          p_sub_res_id      => l_sub_res_id,
          p_customer_id     => :P275_CUSTOMER,
      
          p_trip_type       => l_trip_type,
          p_from_location   => :P275_FROM_LOCATION,
          p_to_location     => :P275_TO_LOCATION,
      
          p_currency        => l_currency,
          p_exchange_rate   => l_exrate,
      
          p_ticket_number   => NULL,
          p_signage_details => NULL,
          p_notes           => :P275_NOTES,
          p_status          => l_status,
      
          p_cat_item_id     => :P275_CAT_ITEM_ID,
          p_res_date_from   => l_date_from,
          p_res_date_to     => :P275_RES_DATE_TO,
          p_res_time        => :P275_RES_TIME,
      
          p_service_class   => l_service_class,   -- ✅ مهم
          p_trip_price      => l_trip_price,
      
          p_passengers_no   => :P273_PASSENGERS,
          p_luggage_no      => :P273_LAGUAGE,
          p_request_type    => NULL,
      
          o_result          => l_result
        );
      
        IF l_result.status_message <> 'SUCCESS' THEN
          raise_application_error(-20001, 'Create failed: '||l_result.status_message);
        END IF;
      
        /* =========================
           5) Store results
        ========================= */
        :P275_MAIN_RES_ID := l_main_res_id;
        :P275_SUB_RES_ID  := l_sub_res_id;
      
        :P277_MAIN_RES_ID := l_main_res_id;
        :P277_SUB_RES_ID  := l_sub_res_id;
      
        /* =========================
           6) Return trip only for AIRPORT (زي ما كان)
        ========================= */
        IF :P275_SERVICE_TYPE <> 'DAILY' THEN
          IF NVL(:P273_IS_RETURN,'N') = 'Y' THEN
            IF :P273_RETURN_DATE IS NULL THEN
              raise_application_error(-20001, 'Missing: RETURN_DATE');
            END IF;
      
            L_RESERVATION_PKG.create_return_res(
              p_parent_sub_res_id => l_sub_res_id,
              p_res_date          => :P273_RETURN_DATE,
              p_res_time          => :P275_RES_TIME,
              p_trip_price        => l_trip_price,
              o_sub_res_id        => l_return_sub_id
            );
          END IF;
        END IF;
      
      END;
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: NEXT # 220284940231280363

- # ====== Process: New ========================================
  id: 220985723800987870
