    region: Breadcrumb # 13965094752583370128

- # ====== Dynamic Action: toggle favorite =====================
  id: 281062060155850395
  identification: 
    name: toggle favorite

  execution: 
    sequence: 60
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P650_RESERVATION_TO_FAVORITE

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 281062596931850395
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var favButton$ = $(".js-reservation-to-favorite");
        var favButtonIcon$ = favButton$.find(".t-Icon");
        
        // we use the class to get the active element, can be cleared now
        favButton$.removeClass("js-reservation-to-favorite"); 
        
        if ( favButtonIcon$.hasClass("fa-heart") ) {
            favButtonIcon$.removeClass("fa-heart u-danger-text").addClass("fa-heart-o");
            // hide success message, no API to do this so done with classes
            $( "#APEX_SUCCESS_MESSAGE" ).removeClass("u-visible").addClass("u-hidden"); 
        } else if ( favButtonIcon$.hasClass("fa-heart-o") ) {
            favButtonIcon$.removeClass("fa-heart-o").addClass("fa-heart u-danger-text");
            apex.message.showPageSuccess('تم اضافة الحجز في قائمة المفضل!');
        }
        apex.items.P650_RESERVATION_TO_FAVORITE.setValue('',undefined,true); //third parameter used to suppress change event

    execution: 
      sequence: 20
      event: toggle favorite # 281062060155850395
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 281063035725850396
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        RESERVATION_FAVORITE_TOGGLE(
            p_reservation_id  => :P650_RESERVATION_TO_FAVORITE, 
            p_user_id => :APP_USER_ID );
      items-to-submit: 
      - P650_RESERVATION_TO_FAVORITE
      - APP_USER_ID

    execution: 
      sequence: 10
      event: toggle favorite # 281062060155850395
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: dismiss notif =======================
  id: 281063483854850396
  identification: 
    name: dismiss notif

  execution: 
    sequence: 70
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P650_NOTIF_TO_DISMISS

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 281063970746850396
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        update sp_team_member_notifications
           set dismissed_yn = 'Y'
         where id = :P650_NOTIF_TO_DISMISS
           and team_member_id =  :APP_USER_ID;
      items-to-submit: 
      - P650_NOTIF_TO_DISMISS

    execution: 
      sequence: 10
      event: dismiss notif # 281063483854850396
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 281064498957850396
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: apex.items.P650_NOTIF_TO_DISMISS.setValue('',undefined,true);

    execution: 
      sequence: 20
      event: dismiss notif # 281063483854850396
      fire-when-event-result-is: True
      fire-on-initialization: false

