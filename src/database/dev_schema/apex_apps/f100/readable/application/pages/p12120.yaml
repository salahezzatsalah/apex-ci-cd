validations: 
- # ====== Validation: At least One Feedback Required ==========
  id: 18694110293042829560
  identification: 
    name: At least One Feedback Required

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      if :P12120_FEEDBACK is null and :P12120_RATING is null then
          return false;
      else
          return true;
      end if;
    always-execute: false

  error: 
    error-message: Please provide feedback or your experience.
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SUBMIT # 18694099929006829541

