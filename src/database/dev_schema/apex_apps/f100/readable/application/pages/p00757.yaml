dynamic-actions: 
- # ====== Dynamic Action: Currency Rates ======================
  id: 230535104799461329
  identification: 
    name: Currency Rates

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P757_FROM_ACC
    - P757_TO_ACC

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 230535205525461330
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            v_from_curr VARCHAR2(10);
            v_to_curr   VARCHAR2(10);
            v_rate      NUMBER := 1;
        BEGIN
            -- Get currencies
            SELECT CURRENCY_CODE INTO v_from_curr FROM ACCOUNTS WHERE ACCOUNT_ID = :P757_FROM_ACC;
            SELECT CURRENCY_CODE INTO v_to_curr   FROM ACCOUNTS WHERE ACCOUNT_ID = :P757_TO_ACC;
        
            IF v_from_curr = v_to_curr THEN
                -- Allowed: same currency (EGP↔EGP, USD↔USD, etc.)
                v_rate := 1;
        
            ELSIF v_from_curr <> 'EGP' AND v_to_curr = 'EGP' THEN
                -- Allowed: foreign currency to EGP
                SELECT EXCHANGE_RATE INTO v_rate
                  FROM V_LATEST_CURRENCY_RATES
                 WHERE CURRENCY_CODE = v_from_curr;
        
            ELSE
                -- Not allowed: EGP→FX, FX→FX (different currencies)
                :P757_RATE := NULL;
                APEX_ERROR.ADD_ERROR(
                    p_message => 'متقدرش تحول من العملة دي للعملة التانية! التحويل متاح بين نفس العملة أو من عملة أجنبية للجنيه المصري فقط.',
                    p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
                );
                RETURN;
            END IF;
        
            :P757_RATE := v_rate;
        
        EXCEPTION
            WHEN NO_DATA_FOUND THEN
                :P757_RATE := NULL;
                APEX_ERROR.ADD_ERROR(
                    p_message => 'مفيش سعر صرف متسجل للعملة دي! راجع الإدارة.',
                    p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
                );
            WHEN OTHERS THEN
                :P757_RATE := NULL;
                APEX_ERROR.ADD_ERROR(
                    p_message => 'حصل خطأ غير متوقع! حاول تاني أو كلم الدعم.',
                    p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
                );
        END;
        
      items-to-submit: 
      - P757_FROM_ACC
      - P757_TO_ACC
      items-to-return: 
      - P757_RATE
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Currency Rates # 230535104799461329
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

processes: 
- # ====== Process: TRANSFER_MONEY =============================
  id: 230535436386461332
  identification: 
    name: TRANSFER_MONEY
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        PROVISION_ACCOUNT_TRANSFER(
          p_from_account_id   => :P757_FROM_ACC,
          p_to_account_id     => :P757_TO_ACC,
          p_amount            => :P757_AMOUNT,
          p_exchange_rate     => :P757_RATE,
          p_description       => :P757_DESC,
          p_reference_number  => :P757_REF,
          p_created_by        => NVL(APEX_UTIL.GET_SESSION_STATE('APP_USER_ID'), USER)
        );
      EXCEPTION
        WHEN OTHERS THEN
          -- Show error in Egyptian Arabic (for notification region)
          APEX_ERROR.ADD_ERROR(
            p_message => 'حصلت مشكلة أثناء التحويل: ' || SQLERRM,
            p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
          RAISE;
      END;
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: تم التحويل بنجاح.

  error: 
    display-location: Inline in Notification

