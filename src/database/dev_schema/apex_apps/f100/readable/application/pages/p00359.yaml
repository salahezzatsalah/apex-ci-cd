- # ====== Dynamic Action: RefreshCols =========================
  id: 267683209067222784
  identification: 
    name: RefreshCols

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P359_CURRENCY

  actions: 
  - # ====== Action: Set Minimum Amount in Currency ==============
    id: 267683747760222785
    identification: 
      name: Set Minimum Amount in Currency
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        CASE 
          WHEN :P359_CURRENCY != :P359_DEFCURRENCY 
          THEN ROUND(:P359_DEFPRICE / :P359_EXCHANGE_RATE, 2)
          ELSE :P359_ORGININAL_PRICE
        END
        
      items-to-submit: 
      - P359_EXCHANGE_RATE
      - P359_DEFPRICE
      - P359_CURRENCY
      - P359_DEFCURRENCY
      - P359_ORGININAL_PRICE
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P359_CUSTOM_PRICE_PER_NIGHT

    execution: 
      sequence: 40
      event: RefreshCols # 267683209067222784
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 267684208508222785
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P359_CURRENCY
        
      items-to-submit: 
      - P359_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P359_EXCHANGE_RATE

    execution: 
      sequence: 30
      event: RefreshCols # 267683209067222784
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

