javascript: 
  function-and-global-variable-declaration: |
    // لو عندك form بتبعت البيانات للباك اند
    const limoData = {
      main_res_id: mainResId,
      customer_id: customerId,
      car_type_id: carTypeId,
      trip_type: tripType,
      trip_time: tripTime,
      from_location: fromLocation,
      to_location: toLocation,
      trip_date_from: tripDateFrom,
      trip_date_to: tripDateTo,
      price: price,
      currency: currency,
      exchange_rate: exchangeRate,
      classification_type: classificationType,
      ticket_number: ticketNumber,
      signage_details: signageDetails,
      notes: notes,
      status: status
    };
    
    // debug في الكونسول قبل الإرسال
    console.log('--- DEBUG CREATE LIMO PRODUCT ---');
    console.log('price =', limoData.price);
    console.log('exchange_rate =', limoData.exchange_rate);
    console.log('trip_time =', limoData.trip_time);
    console.log('trip_date_from =', limoData.trip_date_from);
    console.log('trip_date_to =', limoData.trip_date_to);
    console.log('currency =', limoData.currency);
    
    // إرسال البيانات للباك اند
    fetch('/api/create-limo-product', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(limoData)
    })
    .then(res => res.json())
    .then(data => {
      console.log('Response from server:', data);
    })
    .catch(err => console.error('Error:', err));
    
  execute-when-page-loads: |
