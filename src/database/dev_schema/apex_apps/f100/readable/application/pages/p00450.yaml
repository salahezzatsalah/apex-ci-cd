regions: 
- # ====== Region: Today's Reservations ========================
  id: 229969113173398208
  identification: 
    name: Today's Reservations
    title: تقرير شغل اليوم - مسار سريع
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html                 CLOB := '';
        l_row_class            VARCHAR2(200);
        l_PHONE_link           VARCHAR2(4000);
        l_PHONE_digits         VARCHAR2(100);
        l_status_display       VARCHAR2(100);
        l_passengers_html      CLOB;
      
        /* URLs */
        l_assign_url           VARCHAR2(4000);
        l_view_sub_url         VARCHAR2(4000);
        l_view_main_url        VARCHAR2(4000);
      
      BEGIN
        l_html := '
        <div class="today-trips-wrapper-followup">
          <div class="ft-table-container">
            <table class="min-w-full divide-y divide-gray-200 text-sm rtl text-right today-trips-table-followup">
              <thead>
                <tr>
                  <th>#</th>
                  <th>الخدمة</th>
                  <th>رقم الحجز</th>
                  <th>العميل</th>
                  <th>المطار / الصالة</th>
                  <th>اليوم</th>
                  <th>الحالة</th>
                  <th>الركاب</th>
                  <th>المورد</th>
                  <th>ملاحظات</th>
                  <th>الإجمالي</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>';
      
        FOR rec IN (
          SELECT
            ROW_NUMBER() OVER (
              ORDER BY
                r.RES_DATE +
                TO_DSINTERVAL('0 ' || NVL(r.RES_TIME,'00:00') || ':00')
            ) AS RES_INDEX,
      
            r.SUB_RES_ID,
            r.MAIN_RES_ID,
            r.PASSENGERS_NO,
            r.PASSENGERS_INFO,
            r.RES_DATE,
            r.RES_TIME,
      
            /* Combined DateTime */
            r.RES_DATE +
            TO_DSINTERVAL('0 ' || NVL(r.RES_TIME,'00:00') || ':00') AS RES_DATETIME,
      
            r.TOTAL_AMOUNT,
            r.CURRENCY,
            r.STATUS,
            r.NOTES,
            s.SERVICE_NAME,
            a.AIRPORT_NAME,
            a.AIRPORT_CODE,
            r.TERMINAL_NO,
      
            /* ✅ NEW CLIENT MODEL (like limo view) */
            c.CLIENT_ID,
            c.CLIENT_CODE      AS CLIENT_NAME,
            cc.CONTACT_VALUE   AS CLIENT_PHONE,
      
            sup.SUPPLIER_NAME
          FROM SUBLEVEL_FAST_TRACK_RES r
          JOIN FAST_TRACK_SERVICE_CATALOG s
            ON s.SERVICE_ID = r.CAT_ITEM_ID
          JOIN AIRPORTS a
            ON a.AIRPORT_ID = r.AIRPORT_ID
          JOIN MAIN_RESERVATIONS m
            ON m.MAIN_RES_ID = r.MAIN_RES_ID
      
          /* ✅ New client module */
          JOIN CLIENTS c
            ON m.CUSTOMER_ID = c.CLIENT_ID
          LEFT JOIN CLIENT_CONTACTS cc
            ON cc.CLIENT_ID = c.CLIENT_ID
           AND cc.CONTACT_TYPE = 'PHONE'
           AND cc.IS_PRIMARY   = 'Y'
      
          LEFT JOIN FAST_TRACK_ASSIGNMENTS fa
            ON fa.RESERVATION_ID = r.SUB_RES_ID
           AND fa.VENDOR_STATUS = 'CURRENT'
          LEFT JOIN SUPPLIERS sup
            ON sup.SUPPLIER_ID = fa.VENDOR_ID
      
          WHERE r.IS_DELETED = 'N'
          ORDER BY
            r.RES_DATE +
            TO_DSINTERVAL('0 ' || NVL(r.RES_TIME,'00:00') || ':00')
        ) LOOP
      
          /* ===== Status ===== */
          DECLARE
            l_count NUMBER;
          BEGIN
            SELECT COUNT(*)
            INTO l_count
            FROM FAST_TRACK_ASSIGNMENTS a
            WHERE a.RESERVATION_ID = rec.SUB_RES_ID
              AND a.VENDOR_STATUS = 'CURRENT';
      
            IF rec.STATUS = 'CANCELLED' THEN
              l_status_display := 'ملغية';
              l_row_class := 'row-cancelled';
            ELSIF l_count = 0 THEN
              l_status_display := 'في انتظار التوزيع';
              l_row_class := 'row-unassigned';
            ELSE
              l_status_display := 'تم التوزيع';
              l_row_class := 'row-assigned';
            END IF;
          END;
      
          /* ===== URLs ===== */
          l_assign_url := APEX_UTIL.PREPARE_URL(
            'f?p=' || :APP_ID || ':247:' || :APP_SESSION ||
            '::::P247_SUB_RES_ID:' || rec.SUB_RES_ID
          );
      
          l_view_sub_url := APEX_UTIL.PREPARE_URL(
            'f?p=' || :APP_ID || ':250:' || :APP_SESSION ||
            '::::P250_SUB_RES_ID:' || rec.SUB_RES_ID
          );
      
          l_view_main_url := APEX_UTIL.PREPARE_URL(
            'f?p=' || :APP_ID || ':251:' || :APP_SESSION ||
            '::::P251_MAIN_RES_ID:' || rec.MAIN_RES_ID
          );
      
          /* ===== Phone (NEW source) ===== */
          IF rec.CLIENT_PHONE IS NOT NULL THEN
            l_PHONE_digits := REGEXP_REPLACE(rec.CLIENT_PHONE,'[^0-9]','');
            l_PHONE_link :=
              '<button type="button" class="copy-phone-btn"
                 data-phone="'||l_PHONE_digits||'"
                 onclick="copyPhoneToClipboard(this)"
                 style="background:none;border:none;color:#22c55e;cursor:pointer">
                 <span dir="ltr">'||rec.CLIENT_PHONE||'</span> <i class="fa6 fa6-solid fa6-copy"></i>
               </button>';
          ELSE
            l_PHONE_link := '-';
          END IF;
      
          /* ===== Passengers Tooltip ===== */
          l_passengers_html := '<div class="passengers-tooltip-list">';
          FOR p IN (
            SELECT jt.name, jt.nationality
            FROM JSON_TABLE(
              rec.PASSENGERS_INFO,
              '$[*]' COLUMNS (
                name        VARCHAR2(200) PATH '$.name',
                nationality VARCHAR2(50)  PATH '$.nationality'
              )
            ) jt
          ) LOOP
            l_passengers_html := l_passengers_html ||
              '<div class="passenger-row">
                 <span class="p-name">'||p.name||'</span>
                 <span class="p-nationality">'||p.nationality||'</span>
               </div>';
          END LOOP;
          l_passengers_html := l_passengers_html || '</div>';
      
          IF l_passengers_html = '<div class="passengers-tooltip-list"></div>' THEN
            l_passengers_html := '<div class="text-xs">لا توجد بيانات ركاب</div>';
          END IF;
      
          /* ===== Row ===== */
          l_html := l_html || '
            <tr class="trip-row '||l_row_class||'">
      
              <td>'||rec.RES_INDEX||'</td>
              <td>'||rec.SERVICE_NAME||'</td>
              <td class="font-bold text-blue-700">'||rec.SUB_RES_ID||'</td>
      
              <td>
                <div>'||rec.CLIENT_NAME||'</div>
                <div class="text-xs">'||l_PHONE_link||'</div>
              </td>
      
              <td>'||rec.AIRPORT_NAME||' ('||rec.AIRPORT_CODE||') - صالة '||rec.TERMINAL_NO||'</td>
      
              <td>
                <div class="font-medium">
                  '||TO_CHAR(rec.RES_DATETIME,'YYYY-MM-DD')||'
                </div>
                <div class="text-xs text-gray-500">
                  '||TO_CHAR(rec.RES_DATETIME,'HH24:MI')||'
                </div>
              </td>
      
              <td>'||l_status_display||'</td>
      
              <td>
                <div class="ft-tooltip">
                  <strong>'||rec.PASSENGERS_NO||'</strong>
                  <div class="ft-tooltip-content passengers-tooltip">'||l_passengers_html||'</div>
                </div>
              </td>
      
              <td>'||NVL(rec.SUPPLIER_NAME,'<span class="text-xs text-gray-400">غير معين</span>')||'</td>
              <td>'||NVL(rec.NOTES,'<span class="notes-empty">لا توجد ملاحظات</span>')||'</td>
              <td>'||rec.TOTAL_AMOUNT||' '||rec.CURRENCY||'</td>
      
              <td class="text-center">
                <div class="ft-actions">
                  <button class="ft-actions-toggle" type="button">
                    <i class="fa6 fa6-solid fa6-ellipsis-vertical"></i>
                  </button>
                  <div class="ft-actions-menu">
                    <a href="'||l_view_sub_url||'" class="ft-action-link">
                      <i class="fa6 fa6-solid fa6-eye"></i> عرض تفاصيل الحجز
                    </a>
                    <a href="'||l_view_main_url||'" class="ft-action-link">
                      <i class="fa6 fa6-solid fa6-file-lines"></i> عرض الطلب الرئيسي
                    </a>
                    <a href="'||l_assign_url||'" class="ft-action-link">
                      <i class="fa6 fa6-solid fa6-user-gear"></i>
                      '||CASE WHEN rec.SUPPLIER_NAME IS NOT NULL THEN 'تغيير مورد' ELSE 'تعيين مورد' END||'
                    </a>
                  </div>
                </div>
              </td>
      
            </tr>';
        END LOOP;
      
        l_html := l_html || '
              </tbody>
            </table>
          </div>
        </div>';
      
        RETURN l_html;
      END;
      

