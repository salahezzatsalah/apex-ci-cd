---
# ====== Page: FastTrack Department Home =====================
id: 450
identification: 
  name: FastTrack Department Home
  alias: FASTTRACK-DEPARTMENT-HOME
  title: إدارة المسار السريع
  page-group: Home # 18677563246010402822

appearance: 
  page-mode: Normal
  page-template: Standard
  template-options: 
  - '#DEFAULT#'

navigation-menu: 
  override-user-interface-level: false

navigation: 
  cursor-focus: Do not focus cursor
  warn-on-unsaved-changes: false

javascript: 
  function-and-global-variable-declaration: |
    document.querySelectorAll('.ft-tooltip').forEach(el => {
      const tooltipHtml = el.querySelector('.passengers-tooltip-list').outerHTML;
      let tooltipDiv = document.createElement('div');
      tooltipDiv.className = 'passengers-tooltip-content';
      tooltipDiv.innerHTML = tooltipHtml;
      document.body.appendChild(tooltipDiv);
    
      el.addEventListener('mouseenter', () => {
        tooltipDiv.style.display = 'block'; // يظهر عند hover
      });
    
      el.addEventListener('mouseleave', () => {
        tooltipDiv.style.display = 'none';  // يختفي لما يخرج الماوس
      });
    
      el.addEventListener('mousemove', e => {
        tooltipDiv.style.top = (e.clientY + 15) + 'px';
        tooltipDiv.style.left = (e.clientX + 15) + 'px';
      });
    });
    
    /*************************************
     * FLOATING ACTIONS MENU
     *************************************/
    document.querySelectorAll('.ft-actions').forEach(el => {
      const toggleBtn = el.querySelector('.ft-actions-toggle');
      const menuTemplate = el.querySelector('.ft-actions-menu');
      if (!toggleBtn || !menuTemplate) return;
    
      const menuDiv = document.createElement('div');
      menuDiv.className = 'ft-actions-menu-float';
      menuDiv.innerHTML = menuTemplate.innerHTML;
      menuDiv.style.position = 'fixed';
      menuDiv.style.display = 'none';
      menuDiv.style.zIndex = 9999;
    
      // Attach row URLs
      const row = el.closest('tr');
      if (row) {
        menuDiv.querySelectorAll('button').forEach(btn => {
          btn.dataset.assignUrl   = row.dataset.assignUrl;
          btn.dataset.viewSubUrl  = row.dataset.viewSubUrl;
          btn.dataset.viewMainUrl = row.dataset.viewMainUrl;
        });
      }
    
      document.body.appendChild(menuDiv);
    
      toggleBtn.addEventListener('click', e => {
        e.stopPropagation();
    
        const rect = toggleBtn.getBoundingClientRect();
        const isVisible = menuDiv.style.display === 'block';
    
        document.querySelectorAll('.ft-actions-menu-float')
          .forEach(m => m.style.display = 'none');
    
        if (!isVisible) {
          menuDiv.style.top  = rect.bottom + window.scrollY + 5 + 'px';
          menuDiv.style.left = rect.left   + window.scrollX + 'px';
          menuDiv.style.display = 'block';
        }
      });
    });
    
    
    /*************************************
     * MENU + ASSIGN HANDLER (APEX SAFE)
     *************************************/
    document.addEventListener('click', function (e) {
    
      /* ===== Assign Vendor ===== */
      const assignBtn = e.target.closest('.assign-btn');
      if (assignBtn) {
        e.stopPropagation();
    
        const row = assignBtn.closest('tr');
        if (!row || !row.dataset.assignUrl) return;
    
        apex.navigation.dialog(row.dataset.assignUrl, {
          modal: true,
          width: "90%",
          height: "90%"
        });
        return;
      }
    
      /* ===== View Sub / Main ===== */
      const menuBtn = e.target.closest('.ft-actions-menu-float button');
      if (menuBtn) {
        e.stopPropagation();
    
        if (menuBtn.dataset.viewSubUrl) {
          apex.navigation.redirect(menuBtn.dataset.viewSubUrl);
        }
        else if (menuBtn.dataset.viewMainUrl) {
          apex.navigation.redirect(menuBtn.dataset.viewMainUrl);
        }
        return;
      }
    
      /* ===== Hide menus on outside click ===== */
      document.querySelectorAll('.ft-actions-menu-float')
        .forEach(menu => menu.style.display = 'none');
    });
    
  execute-when-page-loads: |
    document.addEventListener('click', function (e) {
      const btn = e.target.closest('.assign-btn');
      if (!btn) return;
    
      e.stopPropagation();
    
      const row = btn.closest('tr');
      if (!row) return;
    
      const assignUrl = row.dataset.assignUrl;
      if (!assignUrl) return;
    
      // نفس اللي بيحصل في LIMO
      apex.navigation.dialog(assignUrl, {
        modal: true,
        width: "90%",
        height: "90%"
      });
    });
    

css: 
  inline: |
    /* ===== Passengers Tooltip ===== */
    .ft-tooltip-content {
      position: fixed;      /* Fixed عشان يظهر فوق كل شيء */
      z-index: 9999;
      background: #111827;
      color: #f9fafb;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: opacity 0.2s ease;
      white-space: normal;
      pointer-events: none; /* عشان الماوس يمر عليه */
      opacity: 0;
      visibility: hidden;
    }
    
    /* .ft-tooltip:hover .ft-tooltip-content {
      opacity: 1;
      visibility: visible;
    }*/
    
    
    /* Passengers list */
    .passengers-tooltip-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .passenger-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #374151;
      padding: 8px 0;
      min-height: 34px;
    }
    
    .p-name { font-weight: 600; }
    .p-nationality {
      background: #2563eb;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
    }
    
    .ft-actions-menu-float {
      position: fixed;
      display: none;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      min-width: 180px;
      z-index: 9999;
      padding: 8px 0;
    }
    
    .ft-actions-menu-float button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      text-align: right;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    
    .ft-actions-menu-float button:hover {
      background-color: #f1f5f9;
    }
    
    
    
    /* Tooltip base */
    .passengers-tooltip-content {
      position: fixed;
      z-index: 9999;
      background: #111827;
      color: #f9fafb;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      white-space: normal;
      pointer-events: none;
      display: none; /* نخفيه بالافتراضي */
    }
    
    /* Passenger list */
    .passengers-tooltip-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .passenger-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #374151;
      padding: 8px 0;
      min-height: 34px;
    }
    .p-name { font-weight: 600; }
    .p-nationality {
      background: #2563eb;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
    }
    
    /* ========== TODAY & FOLLOW-UP TRIPS STYLES - Uber Base Design ========== */
    
    .today-trips-wrapper,
    .today-trips-wrapper-followup {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      font-size: 12px;
      direction: rtl;
      padding: 1.5rem;
      color: #2e2e2e;
      overflow-x: auto;
      background-color: #f9fafb;
    }
    
    .today-trips-table,
    .today-trips-table-followup {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      table-layout: auto;
      border-color: orange;
    }
    
    .today-trips-table thead th,
    .today-trips-table-followup thead th {
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #374151;
      background: orangered;
      color: black;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-color: orange;
    }
    
    .today-trips-table tbody td,
    .today-trips-table-followup tbody td {
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      color: #1f2937;
      padding: 0.6rem 0.75rem;
      background-color: #fff;
      border-bottom: 1px solid #f3f4f6;
      line-height: 1.4;
      white-space: normal;
      overflow-wrap: break-word;
      max-width: 200px;
      border-color: black;
      font-weight: bold;
      min-height: 48px; /* ✅ Uniform row height */
    }
    
    /* تكبير ارتفاع الصفوف في الجدول */
    .today-trips-table tbody tr,
    .today-trips-table-followup tbody tr {
      min-height: 100px;    /* زوّدي الارتفاع حسب الحاجة */
      height: auto;        /* خلي الصف يتوسع حسب محتوى الـ td */
    }
    
    .today-trips-table tbody td,
    .today-trips-table-followup tbody td {
      padding: 12px 10px;   /* يزيد المسافة الداخلية داخل كل خلية */
      line-height: 1.8;     /* لتكبير المسافة بين الأسطر داخل الـ td */
      vertical-align: middle; /* لضبط محتوى الخلية في المنتصف */
      font-size: 13px;       /* ممكن تزودي الخط شوية لو حابة */
    }
    
    
    .trip-row {
      transition: all 0.25s ease;
    }
    .trip-row:hover {
      transform: scale(1.002);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    
    .status-alert {
      color: #b91c1c;
      font-weight: 600;
    }
    
    /* ===== Context Menu ===== */
    .context-menu,
    .context-menu-followup {
      position: absolute;
      z-index: 1000;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      min-width: 160px;
      overflow: hidden;
      display: none;
    }
    
    .context-menu .menu-item,
    .context-menu-followup .menu-item-followup {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      color: #111827;
      transition: background-color 0.2s;
    }
    .context-menu .menu-item:hover,
    .context-menu-followup .menu-item-followup:hover {
      background-color: #f3f4f6;
    }
    
    /* ===== Overlay ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.85);
      font-size: 18px;
      font-weight: bold;
      color: #374151;
      z-index: 999;
    }
    
    /* ===== Time-based Highlighting ===== */
    .trip-row-past {
      background: linear-gradient(90deg, #e0e7ef 0%, #f3f4f6 100%);
      opacity: 0.6;
    }
    .trip-row-now {
      background: linear-gradient(90deg, #fdf6b2 10%, #fff9db 100%);
      box-shadow: 0 0 12px 0 #ffd90040, 0 0 0 2px #facc1530;
      animation: glow-now 2s infinite alternate;
    }
    @keyframes glow-now {
      0% { box-shadow: 0 0 8px 0 #ffd90020; }
      100% { box-shadow: 0 0 20px 0 #ffd90070, 0 0 0 3px #fde04740; }
    }
    .trip-row-future {
      background: linear-gradient(90deg, #f0fdf4 0%, #ecfdf5 100%);
      opacity: 0.9;
    }
    
    /* ===== Row Statuses ===== */
    .row-cancelled {
      background: linear-gradient(90deg, #ffe5e5 0%, #fff1f2 100%);
      border-left: 8px solid #ef4444;
      color: #991b1b;
      opacity: 0.85;
    }
    
    .row-unassigned {
      background: linear-gradient(90deg, #fef2f2 0%, #fff7ed 100%);
      border-left: 8px dashed #f59e42;
      color: #b45309;
      font-weight: 500;
    }
    
    .row-active {
      background: linear-gradient(90deg, #d1fae5 0%, #e0f2fe 100%);
      border-left: 8px solid #22d3ee;
      color: #065f46;
      animation: active-row-glow 2s infinite alternate;
    }
    @keyframes active-row-glow {
      from { box-shadow: 0 0 8px 0 #38bdf820; }
      to   { box-shadow: 0 0 32px 0 #38bdf870; }
    }
    
    .row-paused {
      background: linear-gradient(90deg, #fef9c3 0%, #fdf6b2 100%);
      border-left: 8px solid #facc15;
      color: #a16207;
    }
    
    .row-partial {
      background: linear-gradient(90deg, #f3e8ff 0%, #ede9fe 100%);
      border-left: 8px dashed #a78bfa;
      color: #6d28d9;
    }
    
    .row-completed {
      background: linear-gradient(90deg, #e0f2fe 0%, #d1fae5 100%);
      border-left: 8px solid #34d399;
      color: #166534;
      font-weight: 700;
    }
    
    .row-error {
      background: linear-gradient(90deg, #fcd34d 0%, #fecaca 100%);
      border-left: 8px solid #f87171;
      color: #b91c1c;
      font-style: italic;
    }
    
    /* ===== Status Badges ===== */
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 12px;
      color: #fff;
    }
    .status-badge.active { background: #10b981; }
    .status-badge.cancelled { background: #ef4444; }
    .status-badge.paused { background: #f59e0b; }
    .status-badge.completed { background: #3b82f6; }
    .status-badge.partial { background: #8b5cf6; }
    .status-badge.unassigned { background: #f97316; }
    .status-badge.error { background: #dc2626; }
    
    /* ===== Utility Labels ===== */
    .driver-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 2px;
    }
    
    .copy-btn {
      background-color: transparent;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #4b5563;
      transition: color 0.2s;
      vertical-align: middle;
    }
    .copy-btn:hover { color: #1d4ed8; }
    
    .tag,
    .requested-car,
    .client-code {
      display: inline-block;
      margin-top: 6px;
      margin-left: 4px;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 6px;
      font-weight: 600;
      vertical-align: middle;
    }
    .tag i { margin-left: 4px; }
    .tag.badge { background: #f3f4f6; color: #1f2937; }
    .requested-car,
    .client-code { background: #fb923c; color: #fff; }
    
    /* ===== Selection Control ===== */
    .today-trips-wrapper .trip-row,
    .today-trips-wrapper-followup .trip-row {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .selectable {
      user-select: text !important;
      -webkit-user-select: text !important;
    }
    
    /* ===== Responsive (Mobile) ===== */
    @media (max-width: 768px) {
      .today-trips-wrapper,
      .today-trips-wrapper-followup {
        padding: 1rem 0.5rem;
        font-size: 14px;
      }
      .today-trips-table thead th,
      .today-trips-table-followup thead th,
      .today-trips-table tbody td,
      .today-trips-table-followup tbody td {
        font-size: 12px;
        padding: 0.5rem 0.4rem;
      }
    }
    
    /* ===== Header & Search Enhancements ===== */
    .today-trips-wrapper h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .search-input-with-icon {
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      padding: 0.5rem 1rem 0.5rem 2.25rem;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background-color: #fff;
      color: #1f2937;
      direction: rtl;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .search-input-with-icon:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      outline: none;
    }
    .search-placeholder-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 14px;
      pointer-events: none;
    }
    
    /* ===== Flashing Tag ===== */
    .ft-today-tag {
      display: inline-block;
      background: linear-gradient(90deg, #FBBF24 60%, #fde68a 100%);
      color: #915c09;
      font-size: 11px;
      font-weight: 700;
      border-radius: 14px;
      padding: 2px 10px 2px 8px;
      margin-top: 4px;
      margin-bottom: 2px;
      letter-spacing: 0.2px;
      box-shadow: 0 1px 6px 0 #fbbf243a;
      border: 1px solid #f5e09a;
      vertical-align: middle;
      animation: flashft 1s infinite alternate;
    }
    @keyframes flashft {
      from { filter: brightness(1.07); }
      to   { filter: brightness(1.16); }
    }
    
    /* ===== Dark Mode Support ===== */
    .dark .today-trips-table,
    .dark .today-trips-table-followup {
      background: #1f2937;
      color: #f3f4f6;
    }
    .dark .today-trips-table thead th,
    .dark .today-trips-table-followup thead th {
      background: #111827;
      color: #f9fafb;
    }
    .dark .row-active {
      background: linear-gradient(90deg, #064e3b 0%, #065f46 100%);
      border-left-color: #10b981;
    }
    
    
    .ft-actions {
      position: relative;
      display: inline-block;
    }
    
    .ft-actions-menu {
      display: none;
      position: absolute;
      left: 0;
      top: 100%;
      background: #fff;
      min-width: 190px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,.15);
      z-index: 60;
      overflow: hidden;
    }
    
    .ft-actions-menu button {
      width: 100%;
      text-align: right;
      padding: 10px 14px;
      font-size: 13px;
      background: none;
      border: none;
      cursor: pointer;
    }
    
    .ft-actions-menu button:hover {
      background: #f3f4f6;
    }
    
    .ft-actions.open .ft-actions-menu {
      display: block;
    }
    
    
    
    
    /* ===== Scrollable Table Container ===== */
    .ft-table-container {
      max-height: 65vh;
      overflow-y: visible; /* بدل auto */
      overflow-x: auto;    /* لو محتاجين scroll أفقي نتركه */
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      position: relative; /* مهم لو هنعمل position:absolute للtooltip داخل body */
    }
    
    /* ===== Sticky Header ===== */
    .ft-table-container thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #f9fafb;
      border-bottom: 2px solid #e5e7eb;
    }
    
    /* Optional subtle shadow under header while scrolling */
    .ft-table-container thead th::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(0,0,0,0));
    }
    
    /* ===== Smooth scrolling ===== */
    .ft-table-container {
      scroll-behavior: smooth;
    }
    
    /* Keep dropdowns above scroll */
    .ft-actions-menu,
    .ft-tooltip-content {
      z-index: 50;
    }
    /* Assign as button-look link */
    .ft-actions-menu-float .assign-link,
    .ft-actions-menu .assign-link {
      display: flex;
      align-items: center;
      gap: 10px;              /* مسافة أحسن */
      width: 100%;
      padding: 10px 14px;     /* أكبر شوية */
    
      text-decoration: none;
      background: none;
      border: none;
    
      font-size: 14.5px;      /* تكبير الخط */
      font-weight: 500;       /* أوضح */
      color: #000;            /* النص أسود */
      cursor: pointer;
    }
    
    /* icon */
    .ft-actions-menu-float .assign-link i,
    .ft-actions-menu .assign-link i {
      font-size: 16px;       
      color: #000;            
    }
    
    /* hover */
    .ft-actions-menu-float .assign-link:hover,
    .ft-actions-menu .assign-link:hover {
      background: #f3f4f6;
    }
    

