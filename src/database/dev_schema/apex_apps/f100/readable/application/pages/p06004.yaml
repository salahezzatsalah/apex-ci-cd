dynamic-actions: 
- # ====== Dynamic Action: ShowRates ===========================
  id: 405300342466474013
  identification: 
    name: ShowRates

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P6004_CURRENCY

  client-side-condition: 
    type: Item = Value
    item: P6004_CURRENCY
    value: EGP

  actions: 
  - # ====== Action: Hide ========================================
    id: 405300455301474014
    identification: 
      action: Hide

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6004_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: ShowRates # 405300342466474013
      fire-when-event-result-is: True
      fire-on-initialization: true

  - # ====== Action: Show ========================================
    id: 405300614081474015
    identification: 
      action: Show

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6004_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: ShowRates # 405300342466474013
      fire-when-event-result-is: False
      fire-on-initialization: true

- # ====== Dynamic Action: RefreshCols =========================
  id: 405300626766474016
  identification: 
    name: RefreshCols

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P6004_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 405300737317474017
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P6004_CURRENCY
        
      items-to-submit: 
      - P6004_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6004_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: RefreshCols # 405300626766474016
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: SetUnitType =========================
  id: 405300882555474018
  identification: 
    name: SetUnitType

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P6004_SERVICE_TYPE_CODE

  actions: 
  - # ====== Action: Set Value ===================================
    id: 405300963734474019
    identification: 
