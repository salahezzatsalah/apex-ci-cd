- # ====== Dynamic Action: Change Driver Share Value Field Label
  id: 270244365000186738
  identification: 
    name: Change Driver Share Value Field Label

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P363_DRIVER_SHARE_TYPE

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 270244493541186739
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        // Update label and input field config based on share type
        var selectedValue = $v('P363_DRIVER_SHARE_TYPE');
        
        if (selectedValue === 'FIXED') {
            $('.share-label').text('المبلغ');
        
            $('#P363_DRIVER_SHARE_VALUE')
                .attr('type', 'text') // use text for more flexible formatting
                .removeAttr('max')
                .attr('step', '0.01')
                .val('')
                .off('input') // remove previous input handler
                .on('input', function () {
                    let v = this.value.replace(/[^\d.]/g, ''); // allow digits and dot
                    let parts = v.split('.');
                    // restrict to 2 decimals
                    if (parts.length > 1) {
                        parts[1] = parts[1].substring(0, 2);
                        v = parts[0] + '.' + parts[1];
                    }
                    this.value = v;
                });
        }
        else if (selectedValue === 'PERCENT') {
            $('.share-label').text('النسبة');
        
            $('#P363_DRIVER_SHARE_VALUE')
                .attr('type', 'text')
                .attr('step', '0.1')
                .val('')
                .off('input')
                .on('input', function () {
                    let v = this.value.replace(/[^\d.]/g, ''); // allow digits and dot
                    let parts = v.split('.');
                    // restrict to 1 decimal for percent
                    if (parts.length > 1) {
                        parts[1] = parts[1].substring(0, 1);
                        v = parts[0] + '.' + parts[1];
                    }
        
                    let percent = parseFloat(v);
                    if (!isNaN(percent) && percent > 100) {
                        percent = 100;
                    }
        
                    this.value = isNaN(percent) ? '' : percent;
                });
        }
        

    execution: 
      sequence: 10
      event: Change Driver Share Value Field Label # 270244365000186738
      fire-when-event-result-is: True
      fire-on-initialization: false

