- # ====== Page Item: P363_DRIVER_ID ===========================
  id: 270184168830398610
  identification: 
    name: P363_DRIVER_ID
    type: Select One

  label: 
    label: السائق
    alignment: Left

  settings: 
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  layout: 
    sequence: 20
    region: Driver File Selection # 270245743159186752
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Required - Floating
    template-options: 
    - '#DEFAULT#'
    icon: fa6-solid fa6-id-card
    width: 30

  validation: 
    value-required: true

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
          i.full_name  AS display_value,
          u.user_id    AS return_value
      FROM iam_users u
      JOIN iam_identities i
          ON i.identity_id = u.identity_id
      JOIN iam_user_security_groups ug
          ON ug.user_id = u.user_id
      JOIN iam_security_groups g
          ON g.group_id = ug.group_id
      WHERE g.group_code = :P363_ASSIGNMENT_TYPE
      AND ug.is_active_yn = 'Y'
      AND u.status = 'ACTIVE'
      ORDER BY display_value;
      

  cascading-list-of-values: 
    parent-item(s): 
    - P363_ASSIGNMENT_TYPE
    items-to-submit: 
    - P363_ASSIGNMENT_TYPE
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: Limo Product Assignment Form # 270182342372398593
    column: DRIVER_ID
    data-type: VARCHAR2
    query-only: false
    primary-key: false

  session-state: 
    data-type: VARCHAR2
    storage: Per Request (Memory Only)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

