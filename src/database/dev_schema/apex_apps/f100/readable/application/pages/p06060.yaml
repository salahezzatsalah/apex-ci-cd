- # ====== Region: Expense History =============================
  id: 356801522550750830
  identification: 
    name: Expense History
    title: مصروفات أخرى في نفس اليوم على الرحلة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html           CLOB := '';
        l_total_expense  NUMBER := 0;
        l_amount_disp    VARCHAR2(32);
        l_edit_url       VARCHAR2(4000);
      BEGIN
        l_html := l_html || '<div class="flex flex-col gap-1">';
      
        FOR e IN (
          SELECT e.EXPENSE_ID,
                 TO_CHAR(convert_to_local_timezone(e.UPDATED), 'DD/MM/YYYY HH24:MI') AS UPDATED_DATE,
                 et.EXPENSE_TYPE_NAME,
                 es.STATUS_NAME,
                 es.STATUS_CODE,
                 e.AMOUNT,
                 e.CURRENCY,
                 e.DETAILS,
                 e.EXPENSE_DATE
            FROM LIMO_TRIP_EXPENSES e
            JOIN LIMO_EXPENSE_TYPES et ON e.EXPENSE_TYPE = et.EXPENSE_TYPE_CODE
            JOIN LIMO_EXPENSE_STATUSES es ON e.STATUS = es.STATUS_CODE
           WHERE e.trip_id = :P6060_TRIP_ID
           AND e.expense_date = :P6060_EXPENSE_DATE
           ORDER BY e.EXPENSE_DATE DESC
        ) LOOP
          l_total_expense := l_total_expense + NVL(e.AMOUNT, 0);
      
          -- Format amount: strip decimals if .00, else show with up to 2 decimals
          IF MOD(e.AMOUNT, 1) = 0 THEN
            l_amount_disp := TO_CHAR(e.AMOUNT, '999G999G990');
          ELSE
            l_amount_disp := TO_CHAR(e.AMOUNT, '999G999G990D00');
          END IF;
      
          -- Build edit URL for modal dialog (page 6003)
          l_edit_url := APEX_UTIL.PREPARE_URL(
            p_url => 'f?p=' || :APP_ID || ':6003:' || :APP_SESSION ||
                     '::::P6060_EXPENSE_ID:' || e.EXPENSE_ID,
            p_checksum_type => 'SESSION'
          );
      
          l_html := l_html || '
            <div class="flex items-center gap-2 bg-neutral-50 dark:bg-neutral-800 rounded-xl p-2 shadow-sm border border-neutral-100 dark:border-neutral-700">
              <div class="flex-shrink-0 w-7 h-7 rounded-full bg-blue-50 flex items-center justify-center">
                <i class="fa6 fa6-receipt text-blue-600 text-[16px]"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between gap-1">
                  <div class="font-semibold text-xs text-black dark:text-white truncate">' || e.EXPENSE_TYPE_NAME || '</div>
                  <div class="text-[10px] px-2 py-0.5 rounded-full ' ||
                    CASE e.STATUS_CODE
                      WHEN 'PAID' THEN 'bg-green-50 text-green-700 border border-green-200'
                      WHEN 'PENDING' THEN 'bg-yellow-50 text-yellow-700 border border-yellow-200'
                      WHEN 'REJECTED' THEN 'bg-red-50 text-red-700 border border-red-200'
                      ELSE 'bg-gray-50 text-gray-700 border border-gray-200'
                    END || '">' || e.STATUS_NAME || '</div>
                </div>
                <div class="text-[10px] text-gray-500 flex items-center gap-1 mt-0.5">
                  <i class="fa6 fa6-calendar text-gray-400"></i>
                  <span>' || e.EXPENSE_DATE || '</span>
                </div>';
          IF e.DETAILS IS NOT NULL THEN
            l_html := l_html || '
                <div class="text-[11px] text-neutral-400 mt-1 flex items-center gap-1">
                  <i class="fa6 fa6-sticky-note text-neutral-300"></i>
                  <span>' || APEX_ESCAPE.HTML(e.DETAILS) || '</span>
                </div>';
          END IF;
          l_html := l_html || '
              </div>
              <div class="flex flex-col items-end min-w-[54px]">
                <div class="font-bold text-sm text-red-600">' || l_amount_disp || '</div>
                <div class="text-[10px] text-gray-500">' || e.CURRENCY || '</div>
              </div>
      
            </div>';
        END LOOP;
      
        -- Summary tile (smaller, on mobile)
        IF l_total_expense IS NOT NULL THEN
          IF MOD(l_total_expense, 1) = 0 THEN
            l_amount_disp := TO_CHAR(l_total_expense, '999G999G990');
          ELSE
            l_amount_disp := TO_CHAR(l_total_expense, '999G999G990D00');
          END IF;
      
          l_html := l_html || '
            <div class="flex items-center gap-2 bg-green-50 dark:bg-green-900 rounded-xl p-2 shadow border border-green-200 dark:border-green-800 mt-1">
              <div class="flex-shrink-0 w-7 h-7 rounded-full bg-green-100 flex items-center justify-center">
                <i class="fa6 fa6-sack-dollar text-green-700 text-[16px]"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-xs text-green-900 dark:text-green-100">إجمالي المصروفات</div>
              </div>
              <div class="font-extrabold text-sm text-green-700">' || l_amount_disp || ' EGP</div>
            </div>';
        END IF;
      
        l_html := l_html || '</div>';
        RETURN l_html;
      END;
      
      
              -- <div class="flex items-center ml-2">
              -- --   <a href="' || l_edit_url || '" target="dialog"
              -- --     class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-2 py-1 rounded-lg shadow-sm border border-blue-200 transition"
              -- --     data-dialog="6003" data-width="600" data-title="تعديل المصروف">
              -- --     <i class="fa fa-edit"></i> تعديل
              -- --   </a>
              -- </div>
