- # ====== Dynamic Action: onClick GET_CURRENT_POSITION ========
  id: 271669646378053235
  identification: 
    name: onClick GET_CURRENT_POSITION

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: submit # 271669456974053233

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 271669758865053236
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: lSpinner$ = apex.util.showSpinner( $( "#map" ) );

    execution: 
      sequence: 10
      event: onClick GET_CURRENT_POSITION # 271669646378053235
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Get Current Postion  ========================
    id: 271669892100053237
    identification: 
      name: 'Get Current Postion '
      action: Get Current Position

    settings: 
      return-type: Latitude and Longitude
      latitude-item: P191_LATITUDE
      longitude-item: P191_LONGITUDE
      enable-high-accuracy: true

    execution: 
      sequence: 20
      event: onClick GET_CURRENT_POSITION # 271669646378053235
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 271669984975053238
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |2
         const apiKey = 'PUT_YOUR_API_KEY_HERE';
                const translateButton = document.getElementById('GET_CURRENT_POSITION');
                const resultDiv = document.getElementById('result');
        
                translateButton.addEventListener('click', async () => {
                    const latitude = document.getElementById('P191_LATITUDE').value;
                    const longitude = document.getElementById('P191_LONGITUDE').value;
        
                    if (!latitude || !longitude) {
                        resultDiv.innerHTML = 'Please provide valid latitude and longitude.';
                        return;
                    }
        
                  const response = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${latitude},${longitude}&key=${apiKey}`);
                  const data = await response.json();
        
                    if (data.status === 'OK') {
                        const address = data.results[0].formatted_address;
                        var map = new google.maps.Map(document.getElementById('map'), {zoom: 15});
                        var geocoder = new google.maps.Geocoder();
                        geocoder.geocode({'address': address}, function(results, status) {
                           if (status === 'OK') {
                                map.setCenter(results[0].geometry.location);
                                var marker = new google.maps.Marker({map: map, position: results[0].geometry.location});
                                zoom: 15;
                           } else {
                                alert('Geocode was not successful for the following reason: ' + status);
                           }
                        });
                    } else {
                        resultDiv.innerHTML = 'Geocoding failed. Please check your coordinates or API key.';
                    }
                
                });
        
        
        

    execution: 
      sequence: 30
      event: onClick GET_CURRENT_POSITION # 271669646378053235
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute JavaScript Code =====================
    id: 271670011097053239
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: lSpinner$.remove();

    execution: 
      sequence: 40
      event: onClick GET_CURRENT_POSITION # 271669646378053235
      fire-when-event-result-is: True
      fire-on-initialization: false

