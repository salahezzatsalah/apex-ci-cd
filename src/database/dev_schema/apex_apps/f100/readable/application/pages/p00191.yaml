- # ====== Region: Map =========================================
  id: 271669540785053234
  identification: 
    name: Map
    type: Static Content

  source: 
    html-code: |
      <style>
         #map {
            height: 100%;
         }
         #mymap .t-Region-body {
            height: 500px !important;
         }
      </style>
      <div id="map"></div>
      <script>
         var map;
         function initMap() {
            map = new google.maps.Map(document.getElementById('map'), 
                        {center: {lat: 39.5,lng: -98.35}, zoom: 2});
         }
      </script>
      
      <script async defer 
            src="https://maps.googleapis.com/maps/api/js?key=PUT_YOUR_API_KEY_HERE&callback=initMap"> 
      </script>

