javascript: 
  execute-when-page-loads: |
    (function(){
      const root = document.querySelector(".res-success");
      if(!root) return;
    
      const n = 24;
      for(let i=0;i<n;i++){
        const s = document.createElement("span");
        s.style.position="fixed";
        s.style.left = (Math.random()*100)+"vw";
        s.style.top = (-10 - Math.random()*20)+"px";
        s.style.width = "8px";
        s.style.height="12px";
        s.style.opacity=".9";
        s.style.borderRadius="2px";
        s.style.background = "hsl("+(Math.random()*360)+",90%,60%)";
        s.style.zIndex="9999";
        s.style.transform = "rotate("+(Math.random()*90)+"deg)";
        document.body.appendChild(s);
    
        const dur = 1200 + Math.random()*1200;
        const endY = window.innerHeight + 50;
        s.animate([
          { transform: s.style.transform + " translateY(0)", opacity: 1 },
          { transform: s.style.transform + " translateY("+endY+"px)", opacity: 0.2 }
        ], { duration: dur, easing: "cubic-bezier(.2,.8,.2,1)", iterations: 1 });
    
        setTimeout(()=>s.remove(), dur+50);
      }
    })();
    

css: 
  inline: |
    /* لو حطيتي class للريجون نفسه في APEX: res-full-region */
    .res-full-region,
    .res-full-region .t-Region-bodyWrap,
    .res-full-region .t-Region-body{
      padding: 0 !important;
    }
    
    /* Wrapper يملى الريجون */
    .res-success.res-full{
      direction: rtl;
      width: 100%;
      min-height: clamp(420px, 70vh, 760px);
      display: flex;
      align-items: stretch;
    }
    
    /* الكارد بقى Full width/height داخل الريجون */
    .res-success.res-full .res-card{
      width: 100%;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, .10);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(2, 8, 23, .08);
      overflow: hidden;
      animation: resPop .55s ease-out both;
      display: flex;
      flex-direction: column;
    }
    
    /* Hero أكبر ويمسك مساحة محترمة */
    .res-success.res-full .res-hero{
      padding: 34px 22px 22px;
      background:
        radial-gradient(1000px 260px at 85% -20%, rgba(16,185,129,.20), transparent 60%),
        radial-gradient(900px 260px at 10% -10%, rgba(59,130,246,.18), transparent 55%),
        linear-gradient(180deg, #0b2a4a, #08243f);
      color: #fff;
      position: relative;
      flex: 1; /* يخلي الهيرو يملأ أغلب المساحة */
      display: grid;
      align-content: center;
      gap: 10px;
    }
    
    /* أيقونة أكبر + Glow */
    .res-check{
      width: 78px;
      height: 78px;
      border-radius: 20px;
      background: rgba(255,255,255,.14);
      display: grid;
      place-items: center;
      margin-bottom: 4px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 16px 40px rgba(0,0,0,.22);
      animation: resFloat 2.6s ease-in-out infinite;
    }
    
    .res-check svg{ width: 40px; height: 40px; }
    
    /* عنوان أكبر */
    .res-title{
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 900;
      letter-spacing: .2px;
    }
    
    .res-sub{
      opacity: .92;
      font-size: 13px;
      line-height: 1.9;
      max-width: 80ch;
    }
    
    /* IDs شكلهم كـ بطاقات أكبر */
    .res-ids{
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 14px;
      max-width: 820px;
    }
    
    @media (max-width: 720px){
      .res-ids{ grid-template-columns: 1fr; }
    }
    
    .res-pill{
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    
    .res-pill span{ font-size: 12px; opacity: .9; }
    .res-pill b{ font-size: 14px; font-weight: 900; direction: ltr; }
    
    /* Actions تبقى تحت وثابتة */
    .res-actions{
      padding: 16px 18px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
      background: #fff;
      border-top: 1px solid #eef2f7;
    }
    
    .res-btn{
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0b2a4a;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      transition: .15s ease;
    }
    
    .res-btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(2, 8, 23, .08);
    }
    
    .res-primary{
      background: linear-gradient(180deg, #f59e0b, #f97316);
      border-color: transparent;
      color: #0b2a4a;
    }
    
    /* Animations */
    @keyframes resPop{
      from{ opacity: 0; transform: translateY(14px) scale(.985); }
      to  { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    @keyframes resFloat{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-4px); }
    }
    
    
    
    
    
    
    
    .confirm-wrap{
      min-height: 70vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      direction: rtl;
    }
    
    .confirm-card{
      background: #fff;
      width: min(420px, 92%);
      padding: 28px 22px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(2,8,23,.12);
      animation: popIn .5s ease;
    }
    
    .confirm-icon{
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #22c55e;
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 25px rgba(34,197,94,.35);
    }
    
    .confirm-icon svg{
      width: 36px;
      height: 36px;
    }
    
    .confirm-title{
      font-size: 20px;
      font-weight: 900;
      color: #0b2a4a;
      margin-bottom: 6px;
    }
    
    .confirm-text{
      font-size: 13px;
      color: #475569;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    
    .confirm-ids{
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }
    
    .confirm-ids div{
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    
    .confirm-ids b{
      direction: ltr;
      font-weight: 900;
      color: #0b2a4a;
    }
    
    .confirm-actions{
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .btn{
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
      transition: .15s;
    }
    
    .btn:hover{
      transform: translateY(-1px);
    }
    
    .btn.primary{
      background: #F29D38;
      color: #fff;
      border-color: transparent;
    }
    
    @keyframes popIn{
      from{opacity:0; transform:scale(.95) translateY(10px);}
      to{opacity:1; transform:scale(1) translateY(0);}
    }
    

