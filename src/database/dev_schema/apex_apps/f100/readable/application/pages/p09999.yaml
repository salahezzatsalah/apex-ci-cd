- # ====== Region: Gate Body Open Up ===========================
  id: 183528314503203532
  identification: 
    name: Gate Body Open Up
    type: Static Content

  source: 
    html-code: |
      <!-- =========================================
           B.A.D.R REACTOR SECURITY GATE
      ========================================= -->
      
      <div id="reactorGate" class="reactor-gate">
      
        <!-- REACTOR CORE -->
        <div class="reactor-core">
      
          <div class="reactor-glow"></div>
      
          <div class="reactor-ring"></div>
          <div class="reactor-ring small"></div>
      
          <img
            src="r/elwagha50/203/files/static/v364/icons/app-icon-512.png"
            class="reactor-icon"
            alt=""
          >
      
        </div>
      
        <!-- DOORS -->
        <div class="reactor-door reactor-left"></div>
        <div class="reactor-door reactor-right"></div>
      
      </div>
      
      
      <style>
      
      /* =================================================
         APEX LOGIN VISIBILITY CONTROL
      ================================================= */
      
      .t-Login-container{
          position:relative;
          z-index:1;
      }
      
      body.reactor-active .t-Login-container{
          opacity:0;
      }
      
      
      /* =================================================
         REACTOR GATE
      ================================================= */
      
      .reactor-gate{
      
          position:fixed;
          inset:0;
      
          z-index:999999;
      
          overflow:hidden;
          pointer-events:none;
      
          background:
            radial-gradient(circle at center,#041a22,#010409 75%);
      }
      
      
      /* =================================================
         REACTOR CORE (HIDDEN UNTIL REVEAL)
      ================================================= */
      
      .reactor-core{
      
          position:absolute;
      
          top:50%;
          left:50%;
      
          transform:translate(-50%,-50%) scale(.95);
      
          width:180px;
          height:180px;
      
          display:flex;
          align-items:center;
          justify-content:center;
      
          opacity:0;
      
          transition:
              opacity .35s ease,
              transform .35s ease;
      
      }
      
      
      /* reveal core */
      
      .gate-reveal .reactor-core{
      
          opacity:1;
          transform:translate(-50%,-50%) scale(1);
      
      }
      
      
      /* =================================================
         PLASMA GLOW
      ================================================= */
      
      .reactor-glow{
      
          position:absolute;
      
          width:320px;
          height:320px;
      
          border-radius:50%;
      
          background:
            radial-gradient(circle,
            rgba(0,255,255,.4),
            rgba(0,255,255,.1),
            transparent 70%);
      
          filter:blur(35px);
      
          animation:reactorPulse 2.2s ease-in-out infinite;
      
      }
      
      
      /* =================================================
         REACTOR RINGS
      ================================================= */
      
      .reactor-ring{
      
          position:absolute;
      
          width:180px;
          height:180px;
      
          border-radius:50%;
      
          border:2px solid rgba(0,255,255,.5);
      
          box-shadow:
              0 0 30px rgba(0,255,255,.8),
              inset 0 0 25px rgba(0,255,255,.4);
      
          animation:spin 7s linear infinite;
      
      }
      
      .reactor-ring.small{
      
          width:140px;
          height:140px;
      
          border-color:rgba(0,255,255,.35);
      
          animation:spinReverse 10s linear infinite;
      
      }
      
      
      /* =================================================
         ICON
      ================================================= */
      
      .reactor-icon{
      
          width:92px;
          height:92px;
      
          display:block;
      
          filter:
              drop-shadow(0 0 18px rgba(0,255,255,1))
              drop-shadow(0 0 35px rgba(0,255,255,.7));
      
      }
      
      
      /* =================================================
         DOORS
      ================================================= */
      
      .reactor-door{
      
          position:absolute;
      
          top:0;
          bottom:0;
      
          width:50%;
      
          z-index:50;
      
          transform:translateX(0);
      
          background:
              linear-gradient(
                  180deg,
                  #0f172a,
                  #020617
              );
      
          transition:transform 1.7s cubic-bezier(.7,0,.2,1);
      
      }
      
      
      /* metal texture */
      
      .reactor-door:before{
      
          content:"";
      
          position:absolute;
          inset:0;
      
          background:
              repeating-linear-gradient(
                  0deg,
                  rgba(255,255,255,.03),
                  rgba(255,255,255,.03) 2px,
                  transparent 2px,
                  transparent 70px
              );
      
      }
      
      
      /* =================================================
         SEAM LIGHT
      ================================================= */
      
      .reactor-left::after,
      .reactor-right::after{
      
          content:"";
      
          position:absolute;
      
          top:0;
          bottom:0;
      
          width:3px;
      
          background:
              linear-gradient(
                  to bottom,
                  transparent,
                  rgba(0,255,255,1),
                  transparent
              );
      
          box-shadow:
              0 0 25px rgba(0,255,255,1),
              0 0 45px rgba(0,255,255,.6);
      
          animation:seamPulse 1.4s infinite;
      
      }
      
      .reactor-left::after{ right:0; }
      .reactor-right::after{ left:0; }
      
      
      /* LEFT DOOR */
      
      .reactor-left{
      
          left:0;
      
          box-shadow:
              inset -100px 0 140px rgba(0,0,0,.9),
              inset -2px 0 0 rgba(0,255,255,.35);
      
      }
      
      
      /* RIGHT DOOR */
      
      .reactor-right{
      
          right:0;
      
          box-shadow:
              inset 100px 0 140px rgba(0,0,0,.9),
              inset 2px 0 0 rgba(0,255,255,.35);
      
      }
      
      
      /* =================================================
         OPEN STATE
      ================================================= */
      
      .gate-open .reactor-left{
          transform:translateX(-100%);
      }
      
      .gate-open .reactor-right{
          transform:translateX(100%);
      }
      
      
      /* =================================================
         ANIMATIONS
      ================================================= */
      
      @keyframes spin{
          from{ transform:rotate(0deg); }
          to{ transform:rotate(360deg); }
      }
      
      @keyframes spinReverse{
          from{ transform:rotate(360deg); }
          to{ transform:rotate(0deg); }
      }
      
      @keyframes reactorPulse{
      
          0%{ transform:scale(.9); opacity:.6; }
      
          50%{ transform:scale(1.2); opacity:1; }
      
          100%{ transform:scale(.9); opacity:.6; }
      
      }
      
      @keyframes seamPulse{
      
          0%{ opacity:.6; }
      
          50%{ opacity:1; }
      
          100%{ opacity:.6; }
      
      }
      
      
      /* slight camera shake */
      
      .gate-open{
      
          animation:reactorShake .35s ease-in-out;
      
      }
      
      @keyframes reactorShake{
      
          0%{ transform:translate(0); }
          25%{ transform:translate(-2px,1px); }
          50%{ transform:translate(2px,-1px); }
          75%{ transform:translate(-1px,2px); }
          100%{ transform:translate(0); }
      
      }
      
      </style>
      
      
      <script>
      
      /* =========================================
         BADR REACTOR BOOT SEQUENCE
      ========================================= */
      
      document.body.classList.add("reactor-active");
      
      const gate  = document.getElementById("reactorGate");
      const login = document.querySelector(".t-Login-container");
      
      window.addEventListener("load", function(){
      
          /* reveal reactor core */
      
          setTimeout(function(){
      
              gate.classList.add("gate-reveal");
      
          },400);
      
      
          /* open doors */
      
          setTimeout(function(){
      
              gate.classList.add("gate-open");
      
              document.body.classList.remove("reactor-active");
      
              if(login){
                  login.style.transition="opacity .6s";
                  login.style.opacity="1";
              }
      
          },1300);
      
      
          /* remove gate and focus username */
      
          setTimeout(function(){
      
              gate.remove();
      
              const username = document.querySelector("#P9999_USERNAME");
      
              if(username){
                  username.focus();
              }
      
          },3000);
      
      });
      
      </script>

