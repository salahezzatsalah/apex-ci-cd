regions: 
- # ====== Region: Content Row =================================
  id: 10897984521900707655
  identification: 
    name: Content Row
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
        COUNT(*) OVER (PARTITION BY v.TRIP_DATE_FROM) AS TOTAL_TRIPS,
        v.RESERVATION_ID,
        v.CLIENT_ID,
        v.CLIENT_CODE,
        v.PRODUCT_ID,
        v.CLASSIFICATION_TYPE,
        v.TRIP_DATE_FROM,
         cl.COUNTRY AS CLIENT_COUNTRY,
        v.TRIP_DATE_TO,
      
        -- True client ID
        (SELECT client_id 
         FROM LIMO_RESERVATIONS lr 
         WHERE lr.RESERVATION_ID = v.RESERVATION_ID) AS client_true_id,
      
        -- Car Info
        v.REQUESTED_CAR,
        v.CAR_TYPE_ID,
        v.CAR_PHOTO_URL,
      
        -- Trip Info
        v.PICK_UP_TIME,
        v.FROM_LOCATION,
        v.TO_LOCATION,
        v.TRIP_TYPE,
        v.NUMBER_OF_DAYS,
        v.TRIP_NOTES,
        v.IMPORTANT_NOTES,
      
        -- Financial Info
        v.PRODUCT_PRICE,
        v.PRODUCT_CURRENCY,
        v.PRODUCT_EXCHANGE_RATE,
      
        -- Reservation Status
        v.PRODUCT_STATUS,
        v.STATUS_DESCRIPTION,
        v.ICON,
        v.PROGRESS_PCT,
      
        -- Favorite Info
        NVL((
            SELECT 'نعم'
            FROM RESERVATION_FAVORITES f
            WHERE f.RESERVATION_ID = v.RESERVATION_ID
              AND f.USER_ID = :APP_USER_ID
        ), 'لا') AS favorite,
      
        NVL((
            SELECT 'fa-heart u-danger-text'
            FROM RESERVATION_FAVORITES f
            WHERE f.RESERVATION_ID = v.RESERVATION_ID
              AND f.USER_ID = :APP_USER_ID
        ), 'fa-heart-o') AS favorite_icon,
      
        -- Audit Info
        r.SALES_REP_ID,
        r.OPS_REP_ID,
        r.CREATED,
        r.CREATED_BY,
        r.UPDATED,
        r.UPDATED_BY,
        r.NOTES,
      
        -- Period tracking
         TO_CHAR(v.TRIP_DATE_FROM, 'YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_year,
        TO_CHAR(v.TRIP_DATE_FROM, 'MM', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_month,
        TO_CHAR(v.TRIP_DATE_FROM, 'DAY / DD/MM/YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS days_filter,
      
        -- Driver Assignment Label
        CASE
          WHEN NOT EXISTS (
            SELECT 1
            FROM LIMO_PRODUCT_ASSIGNMENTS a
            WHERE a.RESERVATION_ID = v.RESERVATION_ID
              AND a.PRODUCT_ID = v.PRODUCT_ID
              AND a.DRIVER_STATUS = 'CURRENT'
          )
          THEN 'حالة التوزيع:'
          ELSE 'السائق الحالي:'
        END AS DRIVER_ASSIGNMENT_LABEL,
      
        -- Driver Assignment Status
        CASE
          WHEN NOT EXISTS (
            SELECT 1
            FROM LIMO_PRODUCT_ASSIGNMENTS a
            WHERE a.RESERVATION_ID = v.RESERVATION_ID
              AND a.PRODUCT_ID = v.PRODUCT_ID
              AND a.DRIVER_STATUS = 'CURRENT'
          )
          THEN 'في انتظار التوزيع'
          ELSE
             (
              SELECT s.SUPPLIER_NAME
              FROM LIMO_PRODUCT_ASSIGNMENTS a
              JOIN SUPPLIERS s ON s.SUPPLIER_ID = a.DRIVER_ID
              WHERE a.RESERVATION_ID = v.RESERVATION_ID
                AND a.PRODUCT_ID = v.PRODUCT_ID
                AND a.DRIVER_STATUS = 'CURRENT'
              ORDER BY a.CREATED DESC
              FETCH FIRST 1 ROWS ONLY
            )
        END AS DRIVER_ASSIGNMENT_VALUE,
      
        -- Assignment Class for Styling
        CASE
          WHEN NOT EXISTS (
            SELECT 1
            FROM LIMO_PRODUCT_ASSIGNMENTS a
            WHERE a.RESERVATION_ID = v.RESERVATION_ID
              AND a.PRODUCT_ID = v.PRODUCT_ID
              AND a.DRIVER_STATUS = 'CURRENT'
          )
          THEN 'unassigned'
          ELSE
            'assigned' || (
              SELECT e.USERNAME
              FROM LIMO_PRODUCT_ASSIGNMENTS a
              JOIN BS_EMPLOYEES e ON e.ID = a.DRIVER_ID
              WHERE a.RESERVATION_ID = v.RESERVATION_ID
                AND a.PRODUCT_ID = v.PRODUCT_ID
                AND a.DRIVER_STATUS = 'CURRENT'
              ORDER BY a.CREATED DESC
              FETCH FIRST 1 ROWS ONLY
            )
        END AS ASSIGNMENTCSS,
      
        v.SIGNAGE_DETAILS,
        v.TICKET_NUMBER
      
      FROM 
          VW_LIMO_TRIPS_REPORT v
          JOIN LIMO_RESERVATIONS r ON v.RESERVATION_ID = r.RESERVATION_ID
          JOIN CRM_CLIENTS cl ON v.CLIENT_ID = cl.CLIENT_ID
      
    page-items-to-submit: 
    - APP_USER_ID

  order-by: 
    type: Item
    item: 
      item-name: P362_ORDER_BY
      order-bys: 
      - key: PICK_UP_TIME
