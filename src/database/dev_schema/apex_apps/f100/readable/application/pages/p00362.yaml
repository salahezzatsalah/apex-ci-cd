javascript: 
  function-and-global-variable-declaration: |
    $(() => { 
        apex.actions.add({
            name: 'favoriteReservation',
            action: function(event, focusElement, args) {
                $(event.currentTarget).addClass('js-reservation-to-favorite');
                apex.item('P23_RESERVATION_TO_FAVORITE').setValue(args.id);
                return true;
                }
        });
    });
