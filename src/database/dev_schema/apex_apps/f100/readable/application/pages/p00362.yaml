              </span>
            </div>
        
        
        
          </div>
        </div>
        
        
      miscellaneous: |
        <div class="spaceint"></div>
        
        <div class="limo-misc">
        
          <!-- Group: Price & Assignment -->
        <div class="misc-group">
          <div class="misc-row">
            <i class="fa6 fa6-money-bill-wave"></i>
            <span class="misc-label">السعر:</span>
            <span class="misc-value">&PRODUCT_PRICE. &PRODUCT_CURRENCY.</span>
          </div>
          <div class="misc-row">
            <i class="fa6 fa6-id-card"></i>
            <span class="misc-label">&DRIVER_ASSIGNMENT_LABEL.</span>
            <span class="misc-value">&DRIVER_ASSIGNMENT_VALUE.</span>
          </div>
        </div>
        
        
          <!-- Group: Ticket + Signage -->
          {if TICKET_NUMBER/}
          <div class="misc-group misc-highlight">
