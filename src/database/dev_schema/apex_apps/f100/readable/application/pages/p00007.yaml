- # ====== Page Item: P7_GROUP_ID ==============================
  id: 183139671658387858
  identification: 
    name: P7_GROUP_ID
    type: Select Many

  label: 
    label: المجموعة
    alignment: Left

  settings: 
    fetch-on-search: false
    use-defaults: true

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  multiple-values: 
    type: Delimited List
    separator: ':'

  layout: 
    sequence: 20
    region: Assign to Security Group # 183139000910387847
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Required - Floating
    template-options: 
    - '#DEFAULT#'
    width: 30

  validation: 
    value-required: true

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT
          g.group_name  AS display_value,
          g.group_id    AS return_value
      FROM iam_security_groups g
      -- WHERE NOT EXISTS (
      --     SELECT 1
      --     FROM iam_user_security_groups ug
      --     WHERE ug.group_id = g.group_id
      --       AND ug.user_id  = :P7_USER_ID
      --       AND ug.is_active_yn = 'Y'
      -- )
      ORDER BY g.group_name;
      

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: Assign to Security Group # 183139000910387847
    column: GROUP_ID
    data-type: VARCHAR2
    query-only: false
    primary-key: false

  default: 
    type: SQL Query (return single value)
    sql-query-(return-single-value): |
      SELECT LISTAGG(group_id, ':') 
             WITHIN GROUP (ORDER BY group_id) AS group_ids
      FROM iam_user_security_groups
      WHERE user_id = :P7_USER_ID
      AND is_active_yn = 'Y';
      

  session-state: 
    storage: Per Request (Memory Only)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

