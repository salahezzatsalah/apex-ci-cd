      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        TRUNC(TO_DATE(:P279_DATE_TO, 'DD-MM-YYYY')) - TRUNC(TO_DATE(:P279_DATE_FROM, 'DD-MM-YYYY'))
        
