- # ====== Dynamic Action: RefreshCols =========================
  id: 220867732699480662
  identification: 
    name: RefreshCols

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P279_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 220868227435480664
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P279_CURRENCY
        
      items-to-submit: 
      - P279_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P279_EXCHANGE_RATE

    execution: 
      sequence: 30
      event: RefreshCols # 220867732699480662
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Minimum Amount in Currency ==============
    id: 220868760990480666
    identification: 
      name: Set Minimum Amount in Currency
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        CASE 
          WHEN :P279_CURRENCY != :P279_DEFCURRENCY 
          THEN ROUND(:P279_DEFPRICE / :P279_EXCHANGE_RATE, 2)
          ELSE :P279_ORGININAL_PRICE
        END
        
      items-to-submit: 
      - P279_EXCHANGE_RATE
      - P279_DEFPRICE
      - P279_CURRENCY
      - P279_DEFCURRENCY
      - P279_ORGININAL_PRICE
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P279_CUSTOM_PRICE_PER_NIGHT

    execution: 
      sequence: 40
      event: RefreshCols # 220867732699480662
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: SetNightsCount ======================
  id: 220869188329480667
  identification: 
    name: SetNightsCount

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P279_DATE_FROM
    - P279_DATE_TO

