- # ====== Region: Document Details ============================
  id: 46586311578621884343
  identification: 
    name: Document Details
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select d.ID,
             p.reservation_id,
             (select task_type from res_task_types rt where rt.id = t.task_type_id)||
                 case when t.task_sub_type_id is not null then ': ' end ||
                 (select task_type from res_task_types rt where rt.id = t.task_sub_type_id) type,
             t.id task_id,
             d.DOCUMENT_FILENAME,
             d.UPDATED,
             d.created,
             --d.doc_description,
             lower(d.created_by) author,
             dbms_lob.getlength(d.DOCUMENT_BLOB) doc_size,
             d.created date_created,
             substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1)) file_extension
        from res_task_DOCUMENTS d,
             reservation_tasks t,
             hotel_reservations p
       where d.id = :P505_ID and d.task_id = t.id and t.reservation_id = p.reservation_id
      
    page-items-to-submit: 
    - P505_ID

  order-by: 
    type: None

