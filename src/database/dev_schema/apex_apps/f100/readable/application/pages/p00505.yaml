- # ====== Computation: P505_PDF_LINK ==========================
  id: 28670388730573869225
  identification: 
    item-name: P505_PDF_LINK

  execution: 
    sequence: 60
    point: Before Header

  computation: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      return APEX_PAGE.GET_URL (
                  p_page      => 505,
                  p_request   => 'APPLICATION_PROCESS=viewTaskPDF',
                  p_plain_url => TRUE );

- # ====== Computation: P505_DOCUMENT_NAME =====================
  id: 28670389172425869225
  identification: 
    item-name: P505_DOCUMENT_NAME

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select DOCUMENT_FILENAME
        from RES_TASK_DOCUMENTS d
       where id = :P505_ID
      

- # ====== Computation: P505_NEXT_ID ===========================
  id: 28670389581664869225
  identification: 
    item-name: P505_NEXT_ID

  execution: 
    sequence: 30
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from RES_TASK_DOCUMENTS d
       where task_id = (select task_id from RES_TASK_DOCUMENTS d2 where d2.id = :P505_ID) and
             created < (select created from RES_TASK_DOCUMENTS d2 where d2.id = :P505_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created desc
      fetch first 1 rows only

- # ====== Computation: P505_PREV_ID ===========================
  id: 28670389972587869226
  identification: 
    item-name: P505_PREV_ID

  execution: 
    sequence: 40
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from res_task_DOCUMENTS d
       where task_id = (select task_id from res_task_DOCUMENTS d2 where d2.id = :P505_ID) and
             created > (select created from res_task_DOCUMENTS d2 where d2.id = :P505_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created 
      fetch first 1 rows only

- # ====== Computation: P505_FILE_EXTENSION ====================
  id: 28670390345384869226
  identification: 
    item-name: P505_FILE_EXTENSION

  execution: 
    sequence: 10
    point: Before Regions

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1))) ext
        from RES_TASK_DOCUMENTS d
       where id = :P505_ID

- # ====== Computation: P505_FILE_NAME =========================
  id: 28670390696670869226
  identification: 
    item-name: P505_FILE_NAME

  execution: 
    sequence: 50
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT DOCUMENT_FILENAME
        from RES_TASK_DOCUMENTS d
       where id = :P505_ID 

- # ====== Computation: P505_DOCUMENT_IS_IMAGE =================
  id: 28670391130147869226
  identification: 
    item-name: P505_DOCUMENT_IS_IMAGE

  execution: 
    sequence: 20
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select 'Y'
        from RES_TASK_DOCUMENTS d
       where id = :P505_ID
      and upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1)))
       in ('JPG','JPEG','PNG','GIF','AVIF','WEBP')
      

