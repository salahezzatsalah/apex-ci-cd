dynamic-actions: 
- # ====== Dynamic Action: Cancel Dialog =======================
  id: 195977632742966849
  identification: 
    name: Cancel Dialog

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: CANCEL # 195973957535966828

  actions: 
  - # ====== Action: Cancel Dialog ===============================
    id: 195978131586966852
    identification: 
      action: Cancel Dialog

    execution: 
      sequence: 10
      event: Cancel Dialog # 195977632742966849
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: updatecurrency ======================
  id: 195978539411966853
  identification: 
    name: updatecurrency

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P253_TRIP_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 195979061672966855
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P253_TRIP_CURRENCY
      items-to-submit: 
      - P253_TRIP_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P253_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: updatecurrency # 195978539411966853
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

