- # ====== Region: SQL =========================================
  id: 50009617333461543126
  identification: 
    name: SQL
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      declare
         s clob;
         l number;
         r clob;
         l_offset int := 1;
      begin
         for c1 in (
             select TO_CLOB(DOCUMENT_BLOB) x
             from SUPPLIERS_DOCUMENTS
             where id = :P167_ID) loop
                s := c1.x;
         end loop;
         l := dbms_lob.getlength(s);
         r := '<pre><code class="lang-sql">'||chr(10);
         for i in 1..2000 loop
             if l_offset > dbms_lob.getlength(s) then 
                exit;
             else
                r := r||apex_escape.html(dbms_lob.substr(s,5000,l_offset));
                l_offset := l_offset + 5000;
             end if;
         end loop;
         r := r||chr(10)||'</code></pre>';
         return r;
      end;
      
    page-items-to-submit: 
    - P167_ID

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: true
    exclude-title-from-translation: false

  server-side-condition: 
    type: Item is in colon delimited list
