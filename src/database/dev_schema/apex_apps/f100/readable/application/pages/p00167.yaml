- # ====== Dynamic Action: Load PDF ============================
  id: 264102992566584810
  identification: 
    name: Load PDF

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Item = Value
    item: P167_FILE_EXTENSION
    value: PDF

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 264103435429584811
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        $('#pdf_viewer').html('');
        var url = '&P167_PDF_LINK.';
        var preview = document.createElement('embed'); 
        preview.type = "application/pdf";
        preview.width="100%";
        preview.height="1000px";
        preview.src = url;
        $("#pdf_viewer").append(preview);

    execution: 
      sequence: 10
      event: Load PDF # 264102992566584810
      fire-when-event-result-is: True
      fire-on-initialization: false

