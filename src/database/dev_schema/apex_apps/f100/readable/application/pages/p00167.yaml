computations: 
- # ====== Computation: P167_PDF_LINK ==========================
  id: 264099348652584806
  identification: 
    item-name: P167_PDF_LINK

  execution: 
    sequence: 60
    point: Before Header

  computation: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      return APEX_PAGE.GET_URL (
                  p_page      => 167,
                  p_request   => 'APPLICATION_PROCESS=viewSupplierPDF',
                  p_plain_url => TRUE );

- # ====== Computation: P167_DOCUMENT_NAME =====================
  id: 264099775942584806
  identification: 
    item-name: P167_DOCUMENT_NAME

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select DOCUMENT_FILENAME
        from SUPPLIERS_DOCUMENTS d
       where id = :P167_ID
      

- # ====== Computation: P167_NEXT_ID ===========================
  id: 264100144315584807
  identification: 
    item-name: P167_NEXT_ID

  execution: 
    sequence: 30
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from SUPPLIERS_DOCUMENTS d
       where supplier_id = (select supplier_id from SUPPLIERS_DOCUMENTS d2 where d2.id = :P167_ID) and
             created < (select created from SUPPLIERS_DOCUMENTS d2 where d2.id = :P167_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created desc
      fetch first 1 rows only

- # ====== Computation: P167_PREV_ID ===========================
  id: 264100557763584807
  identification: 
    item-name: P167_PREV_ID

  execution: 
    sequence: 40
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from SUPPLIERS_DOCUMENTS d
       where supplier_id = (select supplier_id from SUPPLIERS_DOCUMENTS d2 where d2.id = :P167_ID) and
             created > (select created from SUPPLIERS_DOCUMENTS d2 where d2.id = :P167_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created 
      fetch first 1 rows only

- # ====== Computation: P167_FILE_EXTENSION ====================
  id: 264100977119584807
  identification: 
    item-name: P167_FILE_EXTENSION

  execution: 
    sequence: 10
    point: Before Regions

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1))) ext
        from SUPPLIERS_DOCUMENTS d
       where id = :P167_ID

- # ====== Computation: P167_FILE_NAME =========================
  id: 264101338671584807
  identification: 
    item-name: P167_FILE_NAME

  execution: 
    sequence: 50
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT DOCUMENT_FILENAME
        from SUPPLIERS_DOCUMENTS d
       where id = :P167_ID 

- # ====== Computation: P167_DOCUMENT_IS_IMAGE =================
  id: 264101789616584807
  identification: 
    item-name: P167_DOCUMENT_IS_IMAGE

  execution: 
    sequence: 20
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select 'Y'
        from SUPPLIERS_DOCUMENTS d
       where id = :P167_ID
      and upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1)))
       in ('JPG','JPEG','PNG','GIF','AVIF','WEBP')
      

