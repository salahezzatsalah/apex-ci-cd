- # ====== Region: Document Details ============================
  id: 46653290000010590666
  identification: 
    name: Document Details
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select d.ID,
             p.hotel_id,
             p.hotel_name || ' - ' || t.room_name type,
             t.room_type_id,
             d.DOCUMENT_FILENAME,
             d.UPDATED,
             d.created,
             --d.doc_description,
             lower(d.created_by) author,
             dbms_lob.getlength(d.DOCUMENT_BLOB) doc_size,
             d.created date_created,
             substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1)) file_extension
        from HOTELS_ROOMS_DOCUMENTS d,
             HOTEL_ROOM_TYPES t,
             HOTELS p
       where d.id = :P167_ID and d.room_id = t.room_type_id and t.hotel_id = p.hotel_id
    page-items-to-submit: 
    - P167_ID

