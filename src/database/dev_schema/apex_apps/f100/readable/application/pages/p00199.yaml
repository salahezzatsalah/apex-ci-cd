- # ====== Region: FastTrack Classic Report Region =============
  id: 326407343051807991
  identification: 
    name: FastTrack Classic Report Region
    title: تقرير التشغيلات
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          ROW_NUMBER() OVER (
              ORDER BY ftr.RESERVATION_DATE ASC, ftr.RES_TIME ASC
          ) AS "Row Number",
          
          ftr.RESERVATION_ID AS "Reservation ID",                       
          c.CLIENT_CODE AS "Client Code",                       
          c.PHONE AS "Client Number",                    
          NVL(ftc.SERVICE_NAME, ftr.RESERVATION_TYPE) AS "Reservation Type",                  
          ftr.notes AS "Reservation Details",             
          ftr.TICKET_NO AS "Ticket Number",                       
          TO_CHAR(ftr.RESERVATION_DATE, 'DD/MM/YYYY') || ' ' || ftr.RES_TIME AS "Reservation Date/Time",                    
          TO_CHAR(ftr.PRICE_PER_PERSON, 'FM999,990.00') || ' ' || ftr.CURRENCY AS "Price per Person (with Currency)",   
          ftr.PASSENGERS_NO AS "Passengers No",
          TO_CHAR(ftr.PRICE_PER_PERSON * ftr.PASSENGERS_NO, 'FM999,990.00') || ' ' || ftr.CURRENCY AS "Total Price (with Currency)",
          ftr.SIGNAGE_DETAILS AS "Signage Details"
      
      FROM 
          FAST_TRACK_RESERVATIONS ftr
      LEFT JOIN 
          CRM_CLIENTS c ON ftr.CLIENT_ID = c.CLIENT_ID
      LEFT JOIN 
          FAST_TRACK_SERVICE_CATALOG ftc ON ftr.SERVICE_ID = ftc.SERVICE_ID
      
      WHERE 
          TRUNC(ftr.RESERVATION_DATE) BETWEEN TO_DATE(:P199_STARTDATE, 'DD-MM-YYYY') 
                                         AND TO_DATE(:P199_ENDDATE, 'DD-MM-YYYY')
      ORDER BY 
          ftr.RESERVATION_DATE ASC, 
          ftr.RES_TIME ASC;
      
    page-items-to-submit: 
    - P199_STARTDATE
    - P199_ENDDATE
    - P199_REPORT_DATE
    - P199_FILTER_DATE_RANGE
    - P199_EMPLOYEE_NAME

