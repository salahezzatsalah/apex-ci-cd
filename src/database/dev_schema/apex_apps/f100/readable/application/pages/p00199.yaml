- # ====== Page Item: P199_FILTER_DATE_RANGE ===================
  id: 326408621043807994
  identification: 
    name: P199_FILTER_DATE_RANGE
    type: Display Only

  label: 
    label: تاريخ تقرير الشغل
    alignment: Left

  settings: 
    format: Plain Text
    based-on: Item Value
    show-line-breaks: true
    send-on-page-submit: true

  layout: 
    sequence: 70
    region: Container # 326406603213807983
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      CASE
        WHEN TO_DATE(:P199_STARTDATE, 'DD-MM-YYYY') = TO_DATE(:P199_ENDDATE, 'DD-MM-YYYY') THEN
          TO_CHAR(TO_DATE(:P199_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
        ELSE
          'من ' || TO_CHAR(TO_DATE(:P199_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY') ||
          ' إلى ' || TO_CHAR(TO_DATE(:P199_ENDDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
      END
    used: Always, replacing any existing value in session state

  default: 
    type: Expression
    language: PL/SQL
