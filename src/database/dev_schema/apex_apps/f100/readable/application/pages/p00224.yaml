computations: 
- # ====== Computation: P224_CAN_UPDATE_PARAMS =================
  id: 187875467052669913
  identification: 
    item-name: P224_CAN_UPDATE_PARAMS

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      case 
          when apex_human_task.is_allowed (
                  p_task_id   => :P224_TASK_ID,
                  p_operation => apex_human_task.c_task_op_set_params )
          then 'Y'
          else 'N'
      end

