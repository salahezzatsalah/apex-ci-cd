          'من ' || TO_CHAR(TO_DATE(:P183_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY') ||
          ' إلى ' || TO_CHAR(TO_DATE(:P183_ENDDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
      END
