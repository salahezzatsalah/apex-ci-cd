  source: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      CASE
        WHEN TO_DATE(:P183_STARTDATE, 'DD-MM-YYYY') = TO_DATE(:P183_ENDDATE, 'DD-MM-YYYY') THEN
          TO_CHAR(TO_DATE(:P183_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
