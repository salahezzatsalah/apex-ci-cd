- # ====== Region: Average Completion Time =====================
  id: 264325614873221962
  identification: 
    name: Average Completion Time
    type: Chart

  source: 
    location: None

  layout: 
    sequence: 10
    parent-region: Performance # 264325302501221962
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    static-id: performance-chart
    region-display-selector: false
    exclude-title-from-translation: false

  security: 
    escape-special-characters: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 264328863309221971
    chart: 
      type: Bar

    appearance: 
      orientation: Horizontal
      stack: false

    data-cursor: 
      cursor: Automatic
      behavior: Automatic
      dim-on-hover: true

    multi-series-chart-data: 
      fill-gaps-in-chart-data: true
      sort-order: Label - Ascending
      render-gap-as-zero: true

    settings: 
      time-axis-type: Automatic
      zoom-and-scroll: No

    animation: 
      on-display: Automatic
      on-data-change: Automatic

    tooltip: 
      show: true
      show-series-name: false
      show-group-name: true
      show-value: true

    legend: 
      show: false

    messages: 
      when-no-data-found: No Completed or Terminated Workflows found

    series: 
    - # ====== Series: Average Completion Time =====================
      id: 264329365919221971
      identification: 
        name: Average Completion Time

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select
            workflow_def_name,
            avg( duration_seconds ) / 
            case :P180_TIME_UNIT
                  when 'SEC' then 1
                  when 'MIN' then 60
                  when 'HOUR' then 3600
                  when 'DAY' then ( 3600 * 24 )
             end  as avg_time
           from table ( apex_workflow.get_workflows (
                             p_context => 'INITIATED_BY_ME'
                             --, p_application_id => :APP_ID
                             ) )    
          where state_code in ('COMPLETED','TERMINATED')        
          group by workflow_def_name
        page-items-to-submit: 
        - P180_TIME_UNIT

      order-by: 
        type: None

      column-mapping: 
        label: WORKFLOW_DEF_NAME
        value: AVG_TIME

      appearance: 
        assigned-to-y2-axis: false

      label: 
        show: false

      performance: 
        maximum-rows-to-process: 50

    axes: 
    - # ====== Axis: x =============================================
      id: 264329955076221972
      identification: 
        name: x
        show-axis: true
        title: Workflows

      value: 
        format-scaling: Automatic
        baseline-scaling: Zero
        scale: Linear

      major-ticks: 
        show: Automatic

      minor-ticks: 
        show: false

      tick-label: 
        show: true
        rotation: true
        position: Outside

    - # ====== Axis: y =============================================
      id: 264330553467221972
      identification: 
        name: y
        show-axis: true
        title: Average Completion Time

      value: 
        format-scaling: Automatic
        baseline-scaling: Zero
        scale: Linear

      appearance: 
        position: Automatic

      major-ticks: 
        show: Automatic

      minor-ticks: 
        show: false

      tick-label: 
        show: true

