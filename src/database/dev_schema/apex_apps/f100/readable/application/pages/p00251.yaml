- # ====== Region: Nav Menu ====================================
  id: 416788530828983897
  identification: 
    name: Nav Menu
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
        l_url  VARCHAR2(4000);
      BEGIN
        l_html := l_html ||
          '<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 p-6 text-right">';
      
        FOR r IN (
          SELECT
            MENU_LABEL,
            MENU_PAGE_ID,
            MENU_ICON,
            MENU_IMAGE_URL
          FROM SETTLEMENT_PORTAL_MENU
          WHERE PARENT_MENU_ID IS NULL
            AND IS_ACTIVE = 'Y'
          ORDER BY DISPLAY_ORDER
        )
        LOOP
          l_url := APEX_UTIL.PREPARE_URL(
            p_url => 'f?p=' || V('APP_ID') || ':' || r.MENU_PAGE_ID || ':' || V('APP_SESSION'),
            p_checksum_type => 'SESSION'
          );
      
          l_html := l_html ||
            CASE WHEN r.MENU_IMAGE_URL IS NOT NULL THEN
              '<a href="' || l_url || '" class="block bg-white rounded-lg shadow hover:shadow-lg transition p-4 text-center">' ||
              '<img src="' || r.MENU_IMAGE_URL || '" alt="' || r.MENU_LABEL || '" class="mx-auto h-20 w-20 object-contain mb-4">'
            ELSE
              '<a href="' || l_url || '" class="block bg-white rounded-lg shadow hover:shadow-lg transition p-4 text-center">' ||
              '<i class="' || r.MENU_ICON || ' text-4xl text-gray-600 mb-4"></i>'
            END ||
            '<div class="text-lg font-semibold text-gray-800">' || r.MENU_LABEL || '</div>' ||
            '</a>';
        END LOOP;
      
        l_html := l_html || '</div>';
      
        RETURN l_html;
      END;
      

