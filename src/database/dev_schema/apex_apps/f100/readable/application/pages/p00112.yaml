- # ====== Region: Clients =====================================
  id: 20891131005101571464
  identification: 
    name: Clients
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          c.client_id,
          c.client_code,
          c.full_name,
          NVL(c.country_name, '—') AS country_name,
          cc.contact_value         AS phone,
          cu.status                AS user_status,
          cu.verified,
          TO_CHAR(c.created_at, 'DD Mon YYYY') AS joined_on,
      
          /* created date breakdown */
          EXTRACT(YEAR  FROM CAST(c.created_at AS DATE)) AS created_year,
          EXTRACT(MONTH FROM CAST(c.created_at AS DATE)) AS created_month,
          EXTRACT(DAY   FROM CAST(c.created_at AS DATE)) AS created_day,
      
          /* active main reservation flag */
          CASE
            WHEN EXISTS (
              SELECT 1
                FROM main_reservations m
               WHERE m.customer_id = c.client_id
                 AND m.status = 'ACTIVE'
            )
            THEN 'Y'
            ELSE 'N'
          END AS has_active_main_reservation
      
      FROM clients c
      LEFT JOIN client_contacts cc
        ON cc.client_id = c.client_id
       AND cc.contact_type = 'PHONE'
       AND cc.is_primary = 'Y'
      LEFT JOIN customer_users cu
        ON cu.client_id = c.client_id;
      

  order-by: 
    type: None

  layout: 
    sequence: 33
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    - t-CardsRegion--styleC
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: true
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 205455359862406160
    appearance: 
      layout: Grid
      grid-columns: 5 Columns

    card: 
      primary-key-column-1: CLIENT_ID

    title: 
      advanced-formatting: false
