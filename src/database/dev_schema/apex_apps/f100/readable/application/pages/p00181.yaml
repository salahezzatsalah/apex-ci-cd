dynamic-actions: 
- # ====== Dynamic Action: Claim ===============================
  id: 264363250211674790
  identification: 
    name: Claim

  execution: 
    sequence: 10
    event-scope: Dynamic
    static-container-(jquery-selector): body
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: a.claim

  configuration: 
    build-option: Commented Out # 253764608978089549

  actions: 
  - # ====== Action: Set Value ===================================
    id: 264363633701674790
    identification: 
      action: Set Value

    settings: 
      set-type: JavaScript Expression
      javascript-expression: this.triggeringElement.dataset.id
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P181_TASK_ID

    execution: 
      sequence: 10
      event: Claim # 264363250211674790
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 264364673136674792
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var taskId = this.triggeringElement.dataset.id;
        
        // حفظ في عنصر الصفحة
        apex.item("P181_TASK_ID").setValue(taskId);
        
        // استدعاء Ajax Process
        apex.server.process("CLAIM_TASK", {
          x01: taskId
        }, {
          success: function(pData) {
            if (pData.success === "Y") {
              apex.message.showPageSuccess("تم قبول التعيين بنجاح");
              apex.region("my-tasks-report").refresh(); // اسم الـ region الحقيقي
            } else {
              apex.message.alert("لم يتم قبول التعيين. ربما تم تعيينه من قبل.");
            }
          },
          error: function(request, status, error) {
            apex.message.alert("حدث خطأ في الاتصال بالخادم.");
          }
        });
        

    execution: 
      sequence: 30
      event: Claim # 264363250211674790
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Refresh =====================================
    id: 264365176814674792
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: My Tasks - Smart Filters # 264344325537674768

    execution: 
      sequence: 40
      event: Claim # 264363250211674790
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Refresh =====================================
    id: 264365609007674793
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: My Tasks - Report # 264344487493674768

    execution: 
      sequence: 50
      event: Claim # 264363250211674790
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 276642686437756960
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
          l_result VARCHAR2(20);
        BEGIN
          BEGIN
            apex_human_task.claim_task(p_task_id => :P181_TASK_ID);
            l_result := 'Y';
          EXCEPTION
            WHEN OTHERS THEN
              IF SQLCODE = -20987 THEN
                l_result := 'N';
              ELSE
                RAISE;
              END IF;
          END;
        
          owa_util.mime_header('application/json', FALSE);
          owa_util.http_header_close;
        
          htp.p('{ "success": "' || l_result || '" }');
        END;
        

    execution: 
      sequence: 20
      event: Claim # 264363250211674790
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    configuration: 
      build-option: Commented Out # 253764608978089549

