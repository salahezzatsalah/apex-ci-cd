- # ====== Dynamic Action: Claim_1 =============================
  id: 276642979098756963
  identification: 
    name: Claim_1

  execution: 
    sequence: 20
    event-scope: Dynamic
    static-container-(jquery-selector): a.claim
    type: Immediate

  when: 
    event: Click
    selection-type: jQuery Selector
    jquery-selector: a.claim

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 276643537587756969
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var taskId = this.triggeringElement.dataset.id;
        
        // خزّنه في العنصر المخفي
        apex.item("P181_TASK_ID").setValue(taskId);
        
        // نفّذ عملية Ajax
        apex.server.process("CLAIM_TASK", {
          x01: taskId
        }, {
          success: function(pData) {
            if (pData.success === "Y") {
              apex.message.showPageSuccess("✅ تم قبول التعيين بنجاح");
              apex.region("my-tasks-report").refresh(); // عدّل الـ Static ID لو مختلف
            } else {
              apex.message.showErrors([{
                type: "error",
                location: "page",
                message: "❗ لم يتم قبول التعيين. ربما تم تعيينه من قبل.",
                unsafe: false
              }]);
            }
          },
          error: function() {
            apex.message.showErrors([{
              type: "error",
              location: "page",
              message: "❌ حدث خطأ في الاتصال بالخادم.",
              unsafe: false
            }]);
          }
        });
        

    execution: 
      sequence: 10
      event: Claim_1 # 276642979098756963
      fire-when-event-result-is: True
      fire-on-initialization: false

processes: 
- # ====== Process: CLAIM_TASK =================================
  id: 276642541499756959
  identification: 
    name: CLAIM_TASK
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_result VARCHAR2(1);
      BEGIN
        BEGIN
          apex_human_task.claim_task(p_task_id => apex_application.g_x01);
          l_result := 'Y';
        EXCEPTION
          WHEN OTHERS THEN
            IF SQLCODE = -20987 THEN
              l_result := 'N';
            ELSE
              RAISE;
            END IF;
        END;
      
        owa_util.mime_header('application/json', FALSE);
        owa_util.http_header_close;
      
        htp.p('{ "success": "' || l_result || '" }');
      END;
      

  execution: 
    sequence: 10
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

