- # ====== Region: My Tasks - Report ===========================
  id: 264344487493674768
  identification: 
    name: My Tasks - Report
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select task_id,
             task_type,
             task_def_name,
             details_app_name,
             details_link_target,
             subject,
             initiator,
             actual_owner,
             priority,
             due_on,
             due_in,
             due_in_hours,
             due_code,
             state_code,
             is_completed,
             outcome,
             created_on,
             created_ago,
             created_ago_hours,
             last_updated_on,
             badge_text,
             badge_state
        from table ( apex_human_task.get_tasks (
                         p_context            => 'MY_TASKS',
                         p_show_expired_tasks => :P181_SHOW_EXPIRED
                         --, p_application_id => :APP_ID
                         ) )
    page-items-to-submit: 
    - P181_SHOW_EXPIRED
    optimizer-hint: APEX$USE_NO_GROUPING_SETS

  order-by: 
    type: Item
    item: 
      item-name: P181_SORT_BY
      order-bys: 
      - key: CREATED_ON
        clause: created_on desc

      - key: DUE_ON
        clause: priority asc, due_on asc nulls last

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Main

  advanced: 
    static-id: my-tasks-report
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&SUBJECT.'
      description: |
        <strong>&TASK_DEF_NAME!HTML.</strong>
        {if INITIATOR/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &{APEX.TASK.INITIATED_BY_USER_SINCE 0=&INITIATOR!HTML. 1=&CREATED_AGO.}.
        {endif/}
        {if !IS_COMPLETED/}
            {case DUE_CODE/}
                {when OVERDUE/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <strong class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</strong>
                {when NEXT_HOUR/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <strong class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</strong>
                {when NEXT_24_HOURS/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <span class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</span>
                {otherwise/}
                    {if DUE_IN/}
                        <span role="separator" aria-label="&middot;"> &middot; </span>
                        &{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.
                    {endif/}
            {endcase/}
        {endif/}
        {if !IS_COMPLETED/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            {case PRIORITY/}
                {when 1/}
                    <strong class="u-danger-text">&{APEX.TASK.PRIORITY.1.DESCRIPTION}.</strong>
                {when 2/}
                    <span class="u-danger-text">&{APEX.TASK.PRIORITY.2.DESCRIPTION}.</span>
                {when 3/}
                    &{APEX.TASK.PRIORITY.3.DESCRIPTION}.
                {when 4/}
                    &{APEX.TASK.PRIORITY.4.DESCRIPTION}.
                {when 5/}
                    &{APEX.TASK.PRIORITY.5.DESCRIPTION}.
            {endcase/}
        {endif/}
        
