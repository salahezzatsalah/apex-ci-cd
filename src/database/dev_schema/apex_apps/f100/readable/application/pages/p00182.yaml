---
# ====== Page: Task Details ==================================
id: 182
identification: 
  name: Task Details
  title: Task Details

appearance: 
  page-mode: Modal Dialog
  dialog-template: Drawer
  template-options: 
  - '#DEFAULT#'
  - js-dialog-class-t-Drawer--pullOutEnd

dialog: 
  chained: true
  resizable: false

navigation-menu: 
  override-user-interface-level: false

navigation: 
  cursor-focus: Do not focus cursor
  warn-on-unsaved-changes: true

javascript: 
  function-and-global-variable-declaration: |
    apex.jQuery(() => {
        apex.jQuery("a.taskActionMenu").each((index, item) => {
            const element = apex.jQuery(item);
            const actionName = decodeURI(element.attr("href")).match(/\$([^?]+)/)[1];
            const actionLabel = element.text();
            apex.actions.add({
                name: actionName,
                label: actionLabel,
                action: (event, element, args) => {
                    if (args.do === "submit") {
                        apex.page.submit(actionName.toUpperCase());
                    }
                    else if (args.do === "openRegion") {
                        apex.theme.openRegion(actionName.toUpperCase());
                    }
                }
            });
        });
    });

security: 
  authentication: Page Requires Authentication
  deep-linking: Application Default
  page-access-protection: Arguments Must Have Checksum
  form-auto-complete: Off
  browser-cache: Application Default

session-management: 
  rejoin-sessions: Application Default

advanced: 
  enable-duplicate-page-submissions: No - Prevent page from being re-posted
  reload-on-submit: Only for Success

server-cache: 
  caching: Disabled

regions: 
- # ====== Region: Subject =====================================
  id: 264386216249514963
  identification: 
    name: Subject
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select task_id,
             task_type,
             task_def_name,
             details_app_name,
             details_link_target,
             subject,
             initiator,
             actual_owner,
             priority,
             due_on,
             due_in,
             due_in_hours,
             due_code,
             state_code,
             is_completed,
             outcome,
             created_on,
             created_ago,
             created_ago_hours,
             last_updated_on,
             badge_text,
             badge_state
        from table ( apex_human_task.get_tasks (
                         p_context => 'SINGLE_TASK',
                         p_task_id => :P182_TASK_ID ) );

  order-by: 
    type: None

  layout: 
    sequence: 30
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--noPadding
    - t-Region--hideHeader js-addHiddenHeadingRoleDesc
    - t-Region--noUI
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Single (Partial)

    settings: 
      title: '&SUBJECT.'
      description: |
        <strong>&TASK_DEF_NAME!HTML.</strong>
        {if INITIATOR/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &{APEX.TASK.INITIATED_BY_USER_SINCE 0=&INITIATOR!HTML. 1=&CREATED_AGO.}.
        {endif/}
        {if ACTUAL_OWNER/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &{APEX.TASK.ASSIGNED_TO_USER 0=&ACTUAL_OWNER!HTML.}.
        {endif/}
        {if !IS_COMPLETED/}
            {case DUE_CODE/}
                {when OVERDUE/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <strong class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</strong>
                {when NEXT_HOUR/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <strong class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</strong>
                {when NEXT_24_HOURS/}
                    <span role="separator" aria-label="&middot;"> &middot; </span>
                    <span class="u-danger-text">&{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.</span>
                {otherwise/}
                    {if DUE_IN/}
                        <span role="separator" aria-label="&middot;"> &middot; </span>
                        &{APEX.TASK.DUE_SINCE 0=&DUE_IN.}.
                    {endif/}
            {endcase/}
        {endif/}
        {if !IS_COMPLETED/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            {case PRIORITY/}
                {when 1/}
                    <strong class="u-danger-text">&{APEX.TASK.PRIORITY.1.DESCRIPTION}.</strong>
                {when 2/}
                    <span class="u-danger-text">&{APEX.TASK.PRIORITY.2.DESCRIPTION}.</span>
                {when 3/}
                    &{APEX.TASK.PRIORITY.3.DESCRIPTION}.
                {when 4/}
                    &{APEX.TASK.PRIORITY.4.DESCRIPTION}.
                {when 5/}
                    &{APEX.TASK.PRIORITY.5.DESCRIPTION}.
            {endcase/}
        {endif/}
        {if OUTCOME/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &OUTCOME.
        {endif/}
      display-avatar: false
      display-badge: true

