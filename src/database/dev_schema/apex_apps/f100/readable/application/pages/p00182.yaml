computations: 
- # ====== Computation: P182_CAN_UPDATE_PARAMS =================
  id: 264385814337514962
  identification: 
    item-name: P182_CAN_UPDATE_PARAMS

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      case 
          when apex_human_task.is_allowed (
                  p_task_id   => :P182_TASK_ID,
                  p_operation => apex_human_task.c_task_op_set_params )
          then 'Y'
          else 'N'
      end

