- # ====== Dynamic Action: Update Currency & Rates =============
  id: 261460190552890948
  identification: 
    name: Update Currency & Rates

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P175_ROOM_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 261460212430890949
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT CURRENCY
        FROM HOTEL_RESERVATION_ROOMS
        WHERE ID = :P175_ROOM_ID
        
      items-to-submit: 
      - P175_ROOM_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P175_CURRENCY

    execution: 
      sequence: 10
      event: Update Currency & Rates # 261460190552890948
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 261460375702890950
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE
        FROM HOTEL_RESERVATION_ROOMS
        WHERE ID = :P175_ROOM_ID
        
      items-to-submit: 
      - P175_ROOM_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P175_EXCHANGE_RATE

    execution: 
      sequence: 20
      event: Update Currency & Rates # 261460190552890948
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

