- # ====== Page Item: P175_ROOM_ID =============================
  id: 261443038802839932
  identification: 
    name: P175_ROOM_ID
    type: Select One

  label: 
    label: غرفة الحجز
    alignment: Left

  settings: 
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  layout: 
    sequence: 30
    region: Hotel Supplier Fee Form # 261441930301839924
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Required - Floating
    template-options: 
    - '#DEFAULT#'
    icon: fa6-solid fa6-bed
    width: 32

  validation: 
    value-required: true
    maximum-length: 255

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
          CASE WHEN room_type_count > 1 
               THEN room_name || ' (' || rn || ')' 
               ELSE room_name 
          END || ' - (' || night_count || ' ليلة)' AS display_value,
          id AS return_value
      FROM (
          SELECT 
              R.ID,
              RT.ROOM_NAME,
              R.ROOM_TYPE_ID,
              R.DATE_FROM,
              R.DATE_TO,
              -- Calculate number of nights from the room's own FROM/TO dates
              CASE 
                  WHEN R.DATE_FROM IS NOT NULL AND R.DATE_TO IS NOT NULL THEN 
                      TRUNC(R.DATE_TO) - TRUNC(R.DATE_FROM)
                  ELSE NULL 
              END AS night_count,
              COUNT(*) OVER (PARTITION BY R.ROOM_TYPE_ID, R.HOTEL_RESERVATION_ID) AS room_type_count,
              ROW_NUMBER() OVER (
                  PARTITION BY R.ROOM_TYPE_ID, R.HOTEL_RESERVATION_ID 
                  ORDER BY R.CREATED_DATE
              ) AS rn
          FROM HOTEL_RESERVATION_ROOMS R
          JOIN HOTEL_ROOM_TYPES RT ON R.ROOM_TYPE_ID = RT.ROOM_TYPE_ID
          WHERE R.HOTEL_RESERVATION_ID = :P175_RESERVATION_ID
      )
      ORDER BY display_value
      

  cascading-list-of-values: 
    parent-item(s): 
    - P175_RESERVATION_ID
    items-to-submit: 
    - P175_RESERVATION_ID
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: Hotel Supplier Fee Form # 261441930301839924
    column: ROOM_ID
    data-type: VARCHAR2
    query-only: false
    primary-key: false

