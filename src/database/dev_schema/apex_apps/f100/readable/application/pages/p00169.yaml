- # ====== Dynamic Action: SetCurrency Rates ===================
  id: 256923118688675834
  identification: 
    name: SetCurrency Rates

  execution: 
    sequence: 90
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P169_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 256923281144675835
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P169_CURRENCY
        
      items-to-submit: 
      - P169_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P169_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: SetCurrency Rates # 256923118688675834
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

