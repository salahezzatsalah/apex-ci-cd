- # ====== Region: Rooms Details ===============================
  id: 271976141888642139
  identification: 
    name: Rooms Details
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
        r.ROOM_ID AS ROOM_ID,
      
        -- Room photo
        'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/hotelrooms/' || r.ROOM_TYPE_ID AS ROOM_PHOTO_URL,
      
        -- Room data
        r.ROOM_NAME AS ROOM_NAME,
        r.NIGHT_COUNT AS NIGHT_COUNT,
        TO_CHAR(r.DATE_FROM, 'YYYY-MM-DD') AS DATE_FROM,
        TO_CHAR(r.DATE_TO, 'YYYY-MM-DD') AS DATE_TO,
        r.CURRENCY AS CURRENCY,
        r.CUSTOM_PRICE_PER_NIGHT AS PRICE_PER_NIGHT,
        r.TOTAL_PRICE AS TOTAL_PRICE,
        r.TOTAL_EGP AS TOTAL_EGP,
        r.NET_AMOUNT_EGP AS NET_AMOUNT_EGP,
      
        -- Room notes
        NVL(r.NOTES, '—') AS ROOM_NOTES,
      
        -- Room status
        r.ROOM_STATUS_LABEL AS ROOM_STATUS_LABEL,
        r.ROOM_STATUS_ICON AS ROOM_STATUS_ICON,
      
        -- Reservation meta
        r.HOTEL_RESERVATION_ID,
        r.CLIENT_ID,
        r.CLIENT_NAME,
        r.RESERVATION_STATUS AS RES_STATUS,
        r.RESERVATION_CURRENCY,
        r.RESERVATION_EXCHANGE_RATE,
      
        -- Created/Updated
        r.ROOM_CREATED,
        r.ROOM_UPDATED
      
      FROM VW_HOTEL_RESERVATION_ROOMS_INFO r
      WHERE r.HOTEL_RESERVATION_ID = :P169_RESERVATION_ID
      
    page-items-to-submit: 
    - P169_RESERVATION_ID

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: Rooms # 271975690083642134
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
