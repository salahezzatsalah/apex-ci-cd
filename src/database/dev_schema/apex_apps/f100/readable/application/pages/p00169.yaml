            <div>🚪 <strong>تاريخ الخروج:</strong> &DATE_TO.</div>
            <div>💰 <strong>السعر / ليلة:</strong> &PRICE_PER_NIGHT. &CURRENCY.</div>
            <div>💵 <strong>الإجمالي:</strong> &TOTAL_PRICE. &CURRENCY.</div>
          </div>
        </div>
        
      miscellaneous: |
