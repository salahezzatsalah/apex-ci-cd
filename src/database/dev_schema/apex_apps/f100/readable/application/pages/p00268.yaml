- # ====== Dynamic Action: Apply Invoice =======================
  id: 217371618714158355
  identification: 
    name: Apply Invoice

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: ApplyPromo # 217371588498158354

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 217371740334158356
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        utility_invoice.apply_promo(
          p_invoice_id => :P268_INV_ID,
          p_promo_code => :P268_PROMO_CODE,
          p_created_by => :APP_USER_ID
        );
        
      items-to-submit: 
      - P268_INV_ID
      - P268_PROMO_CODE

    execution: 
      sequence: 10
      event: Apply Invoice # 217371618714158355
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

