regions: 
- # ====== Region: Cart ========================================
  id: 185544885523262333
  identification: 
    name: Cart
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
      BEGIN
      
        /* ===============================
           No basket
           =============================== */
        IF :P268_MAIN_RES_ID IS NULL THEN
          RETURN '<div style="text-align:center;color:#64748b;padding:30px;font-weight:900">
                    لا يوجد سلة نشطة حالياً
                  </div>';
        END IF;
      
        /* ===============================
           STYLE + JS
           =============================== */
        l_html := l_html || '
      
        <style>
      
          .basket-modal{
            display:flex;
            flex-direction:column;
            height:100%;
            max-height:100%;
            overflow:hidden;
          }
      
          .basket-content{
            flex:1;
            overflow-y:auto;
            padding:12px;
            display:flex;
            flex-direction:column;
            gap:14px;
            -webkit-overflow-scrolling:touch;
          }
      
          .basket-item{
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:14px;
            border-radius:16px;
            border:1px solid rgba(15,23,42,.08);
            background:#fff;
            box-shadow:0 6px 20px rgba(0,0,0,.04);
          }
      
          .basket-title{
            font-size:15px;
            font-weight:1000;
            color:#0f172a;
          }
      
          .basket-sub{
            font-size:12px;
            color:#64748b;
          }
      
          .basket-bottom{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:6px;
          }
      
          .basket-actions{
            display:flex;
            gap:12px;
          }
      
          .basket-btn{
            font-size:12px;
            font-weight:1000;
            cursor:pointer;
          }
      
          .basket-delete{color:#ef4444;}
          .basket-edit{color:#f59e0b;}
      
          .basket-price{
            font-size:16px;
            font-weight:1000;
            color:#f59e0b;
          }
      
          .basket-qty{
            font-size:11px;
            color:#64748b;
          }
      
          .basket-summary{
            padding:14px;
            border-radius:16px;
            background:#f8fafc;
            border:1px dashed rgba(15,23,42,.15);
            display:flex;
            flex-direction:column;
            gap:8px;
          }
      
          .basket-row{
            display:flex;
            justify-content:space-between;
            font-size:13px;
            font-weight:900;
          }
      
          .basket-total{
            font-size:18px;
            font-weight:1000;
            color:#0b2a4a;
          }
      
          .basket-discount{color:#22c55e;}
      
          .basket-sticky{
            position:sticky;
            bottom:0;
            background:#fff;
            border-top:1px solid rgba(15,23,42,.1);
            padding:12px;
            display:flex;
            gap:10px;
          }
      
          .basket-btn-primary{
            flex:1;
            padding:14px;
            border-radius:14px;
            background:#f59e0b;
            color:#fff;
            text-align:center;
            font-weight:1000;
          }
      
          .basket-btn-secondary{
            flex:1;
            padding:14px;
            border-radius:14px;
            border:1px solid #0f172a;
            text-align:center;
            font-weight:1000;
          }
      
        </style>
      
        <script>
          function deleteItem(id){
            if(!confirm("هل تريد حذف هذه الخدمة؟")) return;
      
            apex.server.process("DELETE_ITEM", {
              x01: id
            },{
              success: function(){
                location.reload();
              }
            });
          }
        </script>
        ';
      
        /* ===============================
           WRAPPER START
           =============================== */
        l_html := l_html || '<div class="basket-modal" dir="rtl">';
        l_html := l_html || '<div class="basket-content">';
      
        /* ===============================
           ITEMS LOOP (FIXED JSON)
           =============================== */
        DECLARE
          v_total NUMBER := 0;
        BEGIN
      
          FOR it IN (
            SELECT
              i.order_item_id,
              NVL(i.display_title_ar, i.item_type) AS title_ar,
              i.display_subtitle_ar,
              i.amount_egp,
      
              /* ✅ FIXED JSON (NO ERROR) */
              COALESCE(
                JSON_VALUE(i.meta_json, '$.qty' RETURNING NUMBER),
                1
              ) qty
      
            FROM order_items i
            WHERE i.main_res_id = :P268_MAIN_RES_ID
              AND NVL(i.is_cancelled,'N') = 'N'
            ORDER BY i.order_item_id
          ) LOOP
      
            v_total := v_total + NVL(it.amount_egp,0);
      
            l_html := l_html || '
      
            <div class="basket-item">
      
              <div class="basket-title">'||esc(it.title_ar)||'</div>
      
              <div class="basket-sub">'
                ||esc(it.display_subtitle_ar)||'
              </div>
      
              <div class="basket-bottom">
      
                <div class="basket-actions">
                  <span class="basket-btn basket-edit">✏️ تعديل</span>
                  <span class="basket-btn basket-delete"
                    onclick="deleteItem('''||it.order_item_id||''')">
                    حذف
                  </span>
                </div>
      
                <div>
                  <div class="basket-price">
                    '||esc(TO_CHAR(NVL(it.amount_egp,0),'FM999G999G990'))||'$
                  </div>
                  <div class="basket-qty">x'||esc(it.qty)||'</div>
                </div>
      
              </div>
      
            </div>
            ';
      
          END LOOP;
      
          /* ===============================
             SUMMARY
             =============================== */
          l_html := l_html || '
      
          <div class="basket-summary">
      
            <div class="basket-row">
              <span>السعر الكلي</span>
              <span>'||esc(TO_CHAR(v_total,'FM999G999G990'))||'$</span>
            </div>
      
            <div class="basket-row basket-discount">
              <span>الخصم</span>
              <span>0$</span>
            </div>
      
            <hr/>
      
            <div class="basket-row basket-total">
              <span>الإجمالي</span>
              <span>'||esc(TO_CHAR(v_total,'FM999G999G990'))||'$</span>
            </div>
      
          </div>
          ';
      
        END;
      
        l_html := l_html || '</div>';
      
        /* ===============================
           FOOTER
           =============================== */
        l_html := l_html || '
      
        <div class="basket-sticky" dir="rtl">
      
          <div class="basket-btn-secondary"
               onclick="apex.navigation.redirect(''f?p=&APP_ID.:HOME:&SESSION.'')">
            إضافة خدمات
          </div>
      
          <div class="basket-btn-primary"
               onclick="apex.navigation.redirect(''f?p=&APP_ID.:CHECKOUT:&SESSION.'')">
            الدفع الآن
          </div>
      
        </div>
      
        </div>
        ';
      
        RETURN l_html;
      
      END;
    page-items-to-submit: 
    - P268_MAIN_RES_ID

  layout: 
    sequence: 70
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
