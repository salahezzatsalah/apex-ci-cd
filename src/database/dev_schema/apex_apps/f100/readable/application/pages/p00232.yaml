    sequence: 10
    point: Before Header

  computation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      case 
          when apex_human_task.is_allowed (
                  p_task_id   => :P232_TASK_ID,
                  p_operation => apex_human_task.c_task_op_set_params )
          then 'Y'
          else 'N'
      end

