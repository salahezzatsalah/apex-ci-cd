- # ====== Region: Comments ====================================
  id: 190455901549862046
  identification: 
    name: Comments
    type: Comments

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select apex_string.get_initials(created_by) as user_initials,
             'u-color-'||ora_hash(created_by,45)  as user_css_class,
             created_by                           as user_name,
             text                                 as comment_text,
             created_on                           as comment_date
        from apex_task_comments
       where nvl(:P232_ALL_COMMENTS, 'N') = 'N'
             and task_id = :P232_TASK_ID
          or nvl(:P232_ALL_COMMENTS, 'N') = 'Y'
             and task_id in ( 
                      select task_id
                        from apex_tasks
                     connect by prior previous_task_id = task_id
                       start with task_id = :P232_TASK_ID )
       order by created_on desc
    page-items-to-submit: 
    - P232_TASK_ID
    - P232_ALL_COMMENTS

  order-by: 
    type: None

  layout: 
