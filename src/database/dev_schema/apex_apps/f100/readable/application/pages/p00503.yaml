processes: 
- # ====== Process: log ========================================
  id: 11946407890072004609
  identification: 
    name: log
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      for c1 in (
          select project_id
            from sp_tasks
           where id = :P503_TASK_ID
      ) loop
          sp_log.log_interaction(
              p_project_id => c1.project_id);
      end loop;

  execution: 
    sequence: 60
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    type: Item is NOT NULL
    item: P503_TASK_ID

