processes: 
- # ====== Process: truncate log ===============================
  id: 15974601034939837462
  identification: 
    name: truncate log
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
          l_cnt number;
      begin
      
          select count(*) into l_cnt from sp_app_log;
      
          execute immediate 'truncate table sp_app_log';
      
          insert into sp_app_log (activity, details)
              values ('Log Purged', to_char(l_cnt,'999G999G999G999G999G999G990') ||' rows removed');
      
      end;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Log purged.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: PURGE_LOG # 15974599525773837457

