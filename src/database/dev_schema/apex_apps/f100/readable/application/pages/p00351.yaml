- # ====== Region: CAR TYPES ===================================
  id: 20931122368445371407
  identification: 
    name: CAR TYPES
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB;
      
        /* ================= Helper ================= */
      
        PROCEDURE add(p_txt IN CLOB) IS
        BEGIN
          IF p_txt IS NOT NULL THEN
            DBMS_LOB.APPEND(l_html, p_txt);
          END IF;
        END;
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
        FUNCTION jsq(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN REPLACE(NVL(p_txt,''), '''', '\''' );
        END;
      
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
      
        /* =====================================================
           CSS + JS
        ===================================================== */
      
        add(TO_CLOB(q'[
      <style>
      
      /* ================= Layout ================= */
      
      .car-wrap{
        direction:rtl;
        font-family:Cairo,Inter,sans-serif;
      }
      
      .car-top{
        display:grid;
        grid-template-columns:1fr 140px 140px auto;
        gap:8px;
        margin-bottom:14px;
      }
      
      .car-search,
      .car-filter{
        background:#fff;
        border:1px solid #cbd5e1;
        border-radius:9px;
        padding:7px 10px;
        font-size:11px;
      }
      
      .car-count{
        font-size:11px;
        color:#64748b;
        align-self:center;
      }
      
      .bulk-btn{
        background:#0f172a;
        color:#fff;
        border:none;
        border-radius:9px;
        font-size:11px;
        font-weight:800;
        cursor:pointer;
        padding:7px 12px;
      }
      
      
      /* ================= Grid ================= */
      
      .car-grid{
        display:grid;
        gap:12px;
      }
      
      @media(min-width:640px){
        .car-grid{grid-template-columns:repeat(2,1fr);}
      }
      
      @media(min-width:1280px){
        .car-grid{grid-template-columns:repeat(4,1fr);}
      }
      
      
      /* ================= Card ================= */
      
      .car-ticket{
        border-radius:14px;
        background:#fff;
        border:1px solid rgba(15,23,42,.1);
        box-shadow:0 6px 18px rgba(0,0,0,.06);
        overflow:hidden;
        transition:.15s;
        cursor:pointer;
      }
      
      .car-ticket:hover{
        transform:translateY(-2px);
      }
      
      .car-ticket:focus{
        outline:2px solid #0b2a4a;
      }
      
      
      /* ================= Header ================= */
      
      .car-head{
        display:flex;
        gap:10px;
        padding:12px;
      }
      
      .car-photo{
        width:56px;
        height:56px;
        border-radius:12px;
        border:1px solid #e2e8f0;
        object-fit:cover;
      }
      
      .car-title{
        font-size:13px;
        font-weight:900;
      }
      
      .car-id{
        font-size:10px;
        color:#64748b;
      }
      
      .car-meta{
        font-size:10px;
        color:#475569;
        margin-top:3px;
        font-weight:700;
      }
      
      
      /* ================= Badges ================= */
      
      .badge{
        display:inline-block;
        font-size:9px;
        padding:2px 6px;
        border-radius:999px;
        font-weight:800;
      }
      
      .badge-ok{background:#ecfdf5;color:#065f46;}
      .badge-warn{background:#fff7ed;color:#9a3412;}
      .badge-miss{background:#fee2e2;color:#991b1b;}
      
      
      /* ================= Prices ================= */
      
      .car-body{
        padding:0 12px 10px;
      }
      
      .car-prices{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:6px;
        border-top:1px dashed #cbd5e1;
        padding-top:8px;
      }
      
      .price-box{
        text-align:center;
        background:#f8fafc;
        border-radius:8px;
        padding:6px 4px;
      }
      
      .price-label{
        font-size:10px;
        color:#64748b;
      }
      
      .price-val{
        font-size:11px;
        font-weight:900;
      }
      
      .price-empty{
        color:#94a3b8;
      }
      
      
      /* ================= Actions ================= */
      
      .car-actions{
        display:flex;
        gap:6px;
        padding:10px;
        border-top:1px solid #f1f5f9;
      }
      
      .btn{
        flex:1;
        font-size:11px;
        font-weight:900;
        padding:7px;
        border-radius:9px;
        border:1px solid #cbd5e1;
        cursor:pointer;
        text-align:center;
      }
      
      .btn-edit{
        background:#0b2a4a;
        color:#fff;
      }
      
      .btn-price{
        background:#f59e0b;
        color:#000;
      }
      
      </style>
      
      
      <script>
      
      function filterCars(){
      
        let q   = document.getElementById("carSearch").value.toLowerCase();
        let cat = document.getElementById("catFilter").value;
        let cap = document.getElementById("capFilter").value;
      
        let cards = document.querySelectorAll(".car-ticket");
        let count = 0;
      
        cards.forEach(c=>{
      
          let s   = c.dataset.search || '';
          let c1  = c.dataset.cat || '';
          let c2  = c.dataset.cap || '0';
      
          let capVal = parseInt(c2,10)||0;
      
          let ok = true;
      
          if(q && !s.includes(q)) ok=false;
          if(cat && c1!==cat) ok=false;
          if(cap && capVal < parseInt(cap,10)) ok=false;
      
          c.style.display = ok?'':'none';
      
          if(ok) count++;
      
        });
      
        document.getElementById("carCount").innerHTML =
          "النتائج: " + count;
      }
      
      
      function openDialog(url,title,ev){
      
        ev.preventDefault();
        ev.stopPropagation();
      
        apex.navigation.dialog(
          url,
          { title:title, width:760, modal:true }
        );
      }
      
      
      function goTo(url,ev){
      
        ev.preventDefault();
        ev.stopPropagation();
      
        apex.navigation.redirect(url);
      }
      
      </script>
      ]'));
      
      
        /* =====================================================
           Filters
        ===================================================== */
      
        add(TO_CLOB('
      <div class="car-wrap">
      
        <div class="car-top">
      
          <input id="carSearch"
                 class="car-search"
                 placeholder="بحث..."
                 oninput="filterCars()"/>
      
          <select id="catFilter"
                  class="car-filter"
                  onchange="filterCars()">
      
            <option value="">كل الفئات</option>
      
          </select>
      
          <select id="capFilter"
                  class="car-filter"
                  onchange="filterCars()">
      
            <option value="">كل السعات</option>
            <option value="2">2+</option>
            <option value="4">4+</option>
            <option value="6">6+</option>
            <option value="8">8+</option>
      
          </select>
      
          <button class="bulk-btn">تسعير جماعي</button>
      
          <div class="car-count" id="carCount"></div>
      
        </div>
      
      
        <div class="car-grid">
      '));
      
      
        /* =====================================================
           Data Loop
        ===================================================== */
      
        FOR r IN (
      
          SELECT
      
            ct.car_type_id,
            ct.car_type_name,
            ct.category,
            ct.max_passengers,
            ct.main_photo_url,
      
            car_catalog_router_pkg.edit_url(ct.car_type_id)     AS edit_url,
            car_catalog_router_pkg.prices_url(ct.car_type_id)   AS prices_url,
            car_catalog_router_pkg.gallery_url(ct.car_type_id)  AS gallery_url,
      
            LIMO_CATALOG_PKG.get_hour_price(ct.car_type_id,1)  AS price_h,
            LIMO_CATALOG_PKG.get_trip_price(ct.car_type_id)    AS price_d,
            LIMO_CATALOG_PKG.get_km_price(ct.car_type_id)      AS price_km
      
          FROM limo_car_types ct
          WHERE NVL(ct.status,'ACTIVE')='ACTIVE'
          ORDER BY ct.created DESC
      
        ) LOOP
      
      
          DECLARE
            l_badge VARCHAR2(200);
          BEGIN
      
            IF r.price_h IS NULL
            OR r.price_d IS NULL
            OR r.price_km IS NULL THEN
      
              l_badge :=
                '<span class="badge badge-miss">ناقص تسعير</span>';
      
            ELSIF r.price_h < 50
               OR r.price_d < 500 THEN
      
              l_badge :=
                '<span class="badge badge-warn">سعر منخفض</span>';
      
            ELSE
      
              l_badge :=
                '<span class="badge badge-ok">مكتمل</span>';
      
            END IF;
      
      
      
            add(TO_CLOB('
      
      <div class="car-ticket"
           role="button"
           tabindex="0"
           onclick="goTo('''||jsq(r.gallery_url)||''',event)"
      
           data-search="'||LOWER(r.car_type_name||' '||r.car_type_id)||'"
           data-cat="'||esc(NVL(r.category,'NONE'))||'"
           data-cap="'||NVL(TO_CHAR(r.max_passengers),'0')||'">
      
      
        <div class="car-head">
      
          <img class="car-photo"
               src="'||NVL(r.main_photo_url,
                '#APP_FILES#placeholders/unknown-car.png')||'"/>
      
      
          <div>
      
            <div class="car-title">'||
              esc(r.car_type_name)||'</div>
      
            <div class="car-id">'||
              esc(r.car_type_id)||'</div>
      
            <div class="car-meta">
      
              فئة: '||esc(NVL(r.category,'-'))||'
              | ركاب: '||TO_CHAR(NVL(r.max_passengers,0))||'
      
            </div>
      
            '||l_badge||'
      
          </div>
      
        </div>
      
      
      
        <div class="car-body">
      
          <div class="car-prices">
      
      
            <div class="price-box">
      
              <div class="price-label">ساعة</div>
      
              <div class="price-val '||
              CASE WHEN r.price_h IS NULL
                   THEN 'price-empty' END||'">'||
      
              NVL(TO_CHAR(r.price_h),'—')||
      
              '</div>
      
            </div>
      
      
      
            <div class="price-box">
      
              <div class="price-label">يوم</div>
      
              <div class="price-val '||
              CASE WHEN r.price_d IS NULL
                   THEN 'price-empty' END||'">'||
      
              NVL(TO_CHAR(r.price_d),'—')||
      
              '</div>
      
            </div>
      
      
      
            <div class="price-box">
      
              <div class="price-label">KM</div>
      
              <div class="price-val '||
              CASE WHEN r.price_km IS NULL
                   THEN 'price-empty' END||'">'||
      
              NVL(TO_CHAR(r.price_km),'—')||
      
              '</div>
      
            </div>
      
      
          </div>
        </div>
      
      
      
        <div class="car-actions">
      
      
          <div class="btn btn-edit"
            onclick="openDialog('''||
            jsq(r.edit_url)||''',''تعديل'',event)">
      
            تعديل
      
          </div>
      
      
          <div class="btn btn-price"
            onclick="goTo('''||
            jsq(r.prices_url)||''',event)">
      
            الأسعار
      
          </div>
      
      
        </div>
      
      
      </div>
      '));
      
          END;
      
        END LOOP;
      
      
      
        /* =====================================================
           Close
        ===================================================== */
      
        add(TO_CLOB('
        </div>
      </div>
      '));
      
      
      
        RETURN l_html;
      
      END;
      

