    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         st.SUPPLIER_TYPE_ID AS id,
         st.TYPE_NAME         AS supplier_type,
         st.DESCRIPTION,
         st.CREATED,
         st.CREATED_BY,
         st.UPDATED,
         st.UPDATED_BY,
         --
         (SELECT COUNT(*) 
            FROM SUPPLIERS s 
           WHERE s.SUPPLIER_TYPE_ID = st.SUPPLIER_TYPE_ID
         ) AS supplier_count
      FROM SUPPLIER_TYPES st;
      

