regions: 
- # ====== Region: Todays New Reservation Report ===============
  id: 272524133890453935
  identification: 
    name: Todays New Reservation Report
    title: تقرير شغل اليوم - ليموزين
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html           CLOB := '';
        l_trip_status    VARCHAR2(500);
        l_trip_url       VARCHAR2(4000);
        l_edit_url       VARCHAR2(4000);
        l_assign_url     VARCHAR2(4000);
        l_edit_assignment_url VARCHAR2(4000);
        l_row_class      VARCHAR2(100);
        l_unassigned     BOOLEAN;
        l_client_name    VARCHAR2(1000);
        l_client_link    VARCHAR2(2000);
        l_client_phone   VARCHAR2(1000);
        l_client_phone_link VARCHAR2(1200);
        l_driver_phone   VARCHAR2(1000);
        l_driver_phone_link VARCHAR2(1200);
        l_car_type       VARCHAR2(500);
        l_trip_type      VARCHAR2(500);
        l_trip_class     VARCHAR2(500);
        l_ticket_no      VARCHAR2(500);
        l_signage        VARCHAR2(500);
        l_driver_cell    CLOB;
        l_driver_link    VARCHAR2(2000);
        l_notes          CLOB;
        l_route          CLOB;
        l_client_phone_digits VARCHAR2(100);
        l_driver_phone_digits VARCHAR2(100);
        l_assignment_notes    VARCHAR2(2000);
        l_assignment_id       VARCHAR2(2000);
        l_now            DATE := convert_to_local_timezone(SYSTIMESTAMP);
        l_row_time       DATE;
        l_time_class     VARCHAR2(30);
        l_safe_price     VARCHAR2(100);
        l_safe_trip_idx  VARCHAR2(100);
      BEGIN
        l_html := l_html || '
        <div class="today-trips-wrapper">
          <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2">
              <i class="fa6 fa6-solid fa6-list-ul text-blue-600"></i>
              تقرير رحلات اليوم
            </h2>
            <div class="relative w-full max-w-md">
              <input type="text"
                     class="search-input-with-icon"
                     placeholder="ابحث عن رحلة أو عميل...">
              <i class="fa6 fa6-solid fa6-magnifying-glass search-placeholder-icon"></i>
            </div>
          </div>
          <div id="loading-overlay" class="hidden">🔄 الرجاء الانتظار...</div>
          <div id="trip-context-menu" class="context-menu">
            <div class="menu-item" data-action="assign"><i class="fa6 fa6-solid fa6-taxi me-1.5"></i> توزيع التشغيل</div>
            <div class="menu-item" data-action="edit"><i class="fa6 fa6-solid fa6-pen-to-square me-1.5"></i> تعديل الحجز</div>
            <div class="menu-item" data-action="edit-assignment"><i class="fa6 fa6-solid fa6-user-edit me-1.5"></i> تعديل التوزيعة</div>
                  <div class="menu-item" data-action="easyrentmarket"><i class="fa6 fa6-solid fa6-taxi me-1.5"></i> سوق التوريد السهل</div>
          </div>
          <table class="today-trips-table compact-table" id="trips-table">
            <thead>
              <tr>
                <th>#</th>
                <th><i class="fa6 fa6-solid fa6-car-side me-1"></i> نوع التشغيلة</th>
                <th><i class="fa6 fa6-solid fa6-hashtag me-1"></i> كود التشغيلة</th>
                <th><i class="fa6 fa6-solid fa6-user me-1"></i> العميل</th>
                <th><i class="fa6 fa6-solid fa6-clock me-1"></i> الوقت</th>
                <th><i class="fa6 fa6-solid fa6-location-dot me-1"></i> المسار</th>
                <th><i class="fa6 fa6-solid fa6-id-badge me-1"></i> الكابتن</th>
                <th><i class="fa6 fa6-solid fa6-note-sticky me-1"></i> ملاحظات</th>
                <th><i class="fa6 fa6-solid fa6-money-bill-wave me-1"></i> السعر</th>
                <th><i class="fa6 fa6-solid fa6-rotate me-1"></i> الحالة</th>
                <th class="text-center"><i class="fa6 fa6-solid fa6-clipboard me-1"></i></th>
              </tr>
            </thead>
            <tbody>';
      
        FOR rec IN (
          SELECT TRIP_INDEX, REQUESTED_CAR, CLIENT_ID, CLIENT_NAME, CLIENT_PHONE, DRIVER_PHONE,
                 ASSIGNMENT_ID, ASSIGNMENTNOTES, DRIVER_ASSIGNMENT_VALUE, PICK_UP_TIME,
                 PRODUCT_ID, PRODUCT_STATUS, TRIPS_COUNT, NUMBER_OF_DAYS, LAST_TRIP_STATUS,
                 CLASSIFICATION_TYPE, TICKET_NUMBER, SIGNAGE_DETAILS, FROM_LOCATION, TO_LOCATION,
                 HAS_FAST_TRACK_RESERVATION_TODAY, PRODUCT_PRICE, PRODUCT_CURRENCY, TRIP_NOTES
            FROM VW_LIMO_TODAY_TRIPS
           ORDER BY TRIP_INDEX
        ) LOOP
          BEGIN
            BEGIN
              l_row_time := TO_DATE(rec.PICK_UP_TIME, 'DD/MM/YYYY HH24:MI');
            EXCEPTION WHEN OTHERS THEN l_row_time := NULL; END;
      
            IF l_row_time IS NULL THEN
              l_time_class := '';
            ELSIF l_row_time < l_now THEN
              l_time_class := 'trip-row-past';
            ELSIF l_row_time >= l_now AND l_row_time < (l_now + (20/1440)) THEN
              l_time_class := 'trip-row-now';
            ELSE
              l_time_class := 'trip-row-future';
            END IF;
      
            l_client_name := rec.CLIENT_NAME;
            l_client_link := '<a href="' || APEX_UTIL.PREPARE_URL(
                                'f?p=' || :APP_ID || ':98:' || :APP_SESSION || '::::P98_ID:' || rec.CLIENT_ID
                              ) || '" class="text-blue-700 hover:underline font-semibold">' || l_client_name || '</a>';
      
            l_client_phone := NULLIF(rec.CLIENT_PHONE, '-');
            IF l_client_phone IS NOT NULL THEN
              l_client_phone_digits := regexp_replace(l_client_phone, '[^0-9]', '');
              l_client_phone_link :=
                '<button type="button" class="copy-phone-btn" data-phone="'||l_client_phone_digits||'" '||
                'onclick="copyPhoneToClipboard(this)" '||
                'style="background:transparent;border:none;color:#22c55e;cursor:pointer;padding:0;font-family:monospace;" '||
                'title="اضغط لنسخ رقم العميل">'||
                '<span dir="ltr">'||l_client_phone||'</span> <i class="fa6 fa6-solid fa6-copy"></i></button>';
            ELSE
              l_client_phone_link := '-';
              l_client_phone_digits := '';
            END IF;
      
            l_driver_phone := NULLIF(rec.DRIVER_PHONE, '-');
            IF l_driver_phone IS NOT NULL THEN
              l_driver_phone_digits := regexp_replace(l_driver_phone, '[^0-9]', '');
              l_driver_phone_link :=
                '<button type="button" class="copy-phone-btn" data-phone="'||l_driver_phone_digits||'" '||
                'onclick="copyPhoneToClipboard(this)" '||
                'style="background:transparent;border:none;color:#22c55e;cursor:pointer;padding:0;font-family:monospace;" '||
                'title="اضغط لنسخ رقم الكابتن">'||
                '<span dir="ltr">'||l_driver_phone||'</span> <i class="fa6 fa6-solid fa6-copy"></i></button>';
            ELSE
              l_driver_phone_link := '-';
              l_driver_phone_digits := '';
            END IF;
      
            l_car_type := REGEXP_SUBSTR(rec.REQUESTED_CAR, '^[^/]+');
            l_trip_type := REGEXP_SUBSTR(rec.REQUESTED_CAR, '[^/]+$', 1);
            l_trip_class := NVL(rec.CLASSIFICATION_TYPE, '-');
            l_ticket_no := NVL(rec.TICKET_NUMBER, NULL);
            l_signage := NVL(rec.SIGNAGE_DETAILS, NULL);
            l_unassigned := (rec.DRIVER_ASSIGNMENT_VALUE = 'في انتظار التوزيع');
            l_route := NVL(rec.FROM_LOCATION, '-') || ' <i class="fa6 fa6-solid fa6-arrow-left-long mx-1 text-gray-400"></i> ' || NVL(rec.TO_LOCATION, '-');
      
            l_assignment_notes := TRIM(NVL(rec.ASSIGNMENTNOTES, ''));
            l_assignment_id := rec.ASSIGNMENT_ID;
            l_edit_assignment_url := '';
            IF l_assignment_id IS NOT NULL THEN
              l_edit_assignment_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':363:' || :APP_SESSION || '::::P363_ASSIGNMENT_ID:' || l_assignment_id);
            END IF;
      
            IF l_assignment_id IS NOT NULL THEN
              l_driver_link := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6007:' || :APP_SESSION || '::::P6007_ASSIGNMENT_ID:' || l_assignment_id);
              l_driver_cell := '<a href="' || l_driver_link || '" class="text-blue-700 hover:underline font-bold">' || rec.DRIVER_ASSIGNMENT_VALUE || '</a>';
            ELSE
              l_driver_cell := rec.DRIVER_ASSIGNMENT_VALUE;
            END IF;
      
            IF rec.PRODUCT_STATUS = 'CANCELLED' THEN
              l_trip_status := '<i class="fa6 fa6-solid fa6-ban text-red-500 me-1"></i> تم إلغاء الحجز';
              l_row_class := 'row-cancelled';
            ELSIF rec.TRIPS_COUNT = 0 THEN
              l_trip_status := 'لم تبدأ الرحلة';
              l_row_class := CASE WHEN l_unassigned THEN 'row-unassigned' ELSE 'row-paused' END;
            ELSIF rec.TRIPS_COUNT < rec.NUMBER_OF_DAYS THEN
              CASE rec.LAST_TRIP_STATUS
                WHEN 'ACTIVE' THEN l_trip_status := '<i class="fa6 fa6-solid fa6-play text-green-500 me-1"></i> رحلة نشطة'; l_row_class := 'row-active';
                WHEN 'PAUSED' THEN l_trip_status := '<i class="fa6 fa6-solid fa6-pause text-yellow-600 me-1"></i> رحلة متوقفة مؤقتاً'; l_row_class := 'row-paused';
                WHEN 'FINISHED' THEN l_trip_status := 'تم تنفيذ ' || rec.TRIPS_COUNT || ' / ' || rec.NUMBER_OF_DAYS; l_row_class := 'row-partial';
                ELSE l_trip_status := 'في انتظار التحديث'; l_row_class := 'row-error';
              END CASE;
            ELSIF rec.TRIPS_COUNT = rec.NUMBER_OF_DAYS THEN
              IF rec.LAST_TRIP_STATUS = 'FINISHED' THEN
                l_trip_status := '<i class="fa6 fa6-solid fa6-check-circle text-emerald-600 me-1"></i> اكتملت الرحلات';
                l_row_class := 'row-completed';
              ELSIF rec.LAST_TRIP_STATUS = 'ACTIVE' THEN
                l_trip_status := 'رحلة نشطة (أخيرة)';
                l_row_class := 'row-active';
              ELSIF rec.LAST_TRIP_STATUS = 'PAUSED' THEN
                l_trip_status := 'رحلة متوقفة مؤقتاً (أخيرة)';
                l_row_class := 'row-paused';
              ELSE
                l_trip_status := 'في انتظار استكمال الرحلة الأخيرة';
                l_row_class := 'row-error';
              END IF;
            ELSE
              l_trip_status := 'بيانات غير متطابقة';
              l_row_class := 'row-error';
            END IF;
      
            l_trip_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6001:' || :APP_SESSION || '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID);
            l_assign_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':363:' || :APP_SESSION || '::::P363_PRODUCT_ID:' || rec.PRODUCT_ID);
            l_edit_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':254:' || :APP_SESSION || '::::P254_SUB_RES_ID:' || rec.PRODUCT_ID);
      
            BEGIN l_safe_price := rec.PRODUCT_PRICE; EXCEPTION WHEN OTHERS THEN l_safe_price := 'ERR'; END;
            BEGIN l_safe_trip_idx := rec.TRIP_INDEX; EXCEPTION WHEN OTHERS THEN l_safe_trip_idx := 'ERR'; END;
      
            l_notes := '';
            IF rec.TRIP_NOTES IS NOT NULL THEN
              l_notes := l_notes || '<div>' || rec.TRIP_NOTES || '</div>';
            END IF;
            IF l_ticket_no IS NOT NULL THEN
              l_notes := l_notes || '<span class="tag badge bg-sky-100 text-sky-700 ms-1 mb-1"><i class="fa6 fa6-solid fa6-ticket me-1"></i>' || l_ticket_no || '</span>';
            END IF;
            IF l_signage IS NOT NULL THEN
              l_notes := l_notes || '<span class="tag badge bg-amber-100 text-amber-700 ms-1 mb-1"><i class="fa6 fa6-solid fa6-tag me-1"></i>' || l_signage || '</span>';
            END IF;
            IF l_notes IS NULL OR l_notes = '' THEN
              l_notes := '-';
            END IF;
      
            l_html := l_html || '
              <tr class="trip-row ' || l_row_class || ' ' || l_time_class || '" 
                  data-url="' || l_trip_url || '" 
                  data-assign-url="' || l_assign_url || '" 
                  data-edit-url="' || l_edit_url || '" 
                  data-edit-assignment-url="' || REPLACE(NVL(l_edit_assignment_url,''),'"','&quot;') || '"
                  data-assignment-id="' || NVL(l_assignment_id, '') || '" 
                  data-client="' || l_client_name || '" 
                  data-phone="' || l_client_phone || '" 
                  data-car="' || l_car_type || '" 
                  data-type="' || l_trip_type || '" 
                  data-classification="' || l_trip_class || '" 
                  data-time="' || rec.PICK_UP_TIME || '" 
                  data-route="' || NVL(rec.FROM_LOCATION, '-') || ' → ' || NVL(rec.TO_LOCATION, '-') || '" 
                  data-driver="' || rec.DRIVER_ASSIGNMENT_VALUE || '" 
                  data-trip="' || rec.PRODUCT_ID || '" 
                  data-signage="' || NVL(l_signage, '-') || '" 
                  data-ticket="' || NVL(l_ticket_no, '-') || '"
                  data-assigned="' || CASE WHEN l_assignment_id IS NOT NULL THEN 'Y' ELSE 'N' END || '">';
      
            l_html := l_html || '
                <td>' || l_safe_trip_idx || '</td>
                <td>' || l_car_type || '<br><span class="text-xs text-gray-500">' || l_trip_type || ' | ' || l_trip_class || '</span></td>
                <td>
                  <a href="' || l_trip_url || '" class="trip-code-link text-blue-700 hover:underline font-bold" data-trip-id="' || rec.PRODUCT_ID || '">' || rec.PRODUCT_ID || '</a>
                </td>
                <td>
                  <span class="selectable">' || l_client_link || '</span><br>
                  <span class="text-xs text-gray-500 selectable">' || l_client_phone_link || '</span>' ||
                  CASE WHEN rec.HAS_FAST_TRACK_RESERVATION_TODAY = 1
                       THEN '<br><span class="ft-today-tag" style="display:inline-block;background:#e0f2fe;color:#0284c7;font-size:11px;padding:2px 8px;border-radius:12px;margin-top:3px;border:1px solid #7dd3fc;" title="لديه حجز فاست تراك اليوم">حجز فاست تراك اليوم</span>'
                       ELSE ''
                  END
                  || '
                </td>
                <td>' || rec.PICK_UP_TIME || '</td>
                <td><span class="route-path">' || l_route || '</span></td>
                <td>' || l_driver_cell || '<br><span class="text-xs text-gray-500 selectable">' || l_driver_phone_link || '</span>';
      
            -- Assignment notes badge (show only if exists)
            IF l_assignment_notes IS NOT NULL THEN
              l_html := l_html || '<br><span style="display:inline-block;background:#e0f2fe;color:#0284c7;font-size:11px;padding:2px 8px;border-radius:12px;margin-top:3px;border:1px solid #7dd3fc;">' || l_assignment_notes || '</span>';
            END IF;
      
            l_html := l_html || '</td>
                <td>' || l_notes || '</td>
                <td>' || l_safe_price || ' ' || rec.PRODUCT_CURRENCY || '</td>
                <td>' || l_trip_status || '</td>
                <td class="text-center">
                  <button type="button" class="copy-btn inline-block mx-1" title="نسخ التفاصيل"
                    data-client="' || l_client_name || '"
                    data-phone="' || l_client_phone || '"
                    data-car="' || l_car_type || '"
                    data-type="' || l_trip_type || '"
                    data-classification="' || l_trip_class || '"
                    data-time="' || rec.PICK_UP_TIME  || '"
                    data-route="' || NVL(rec.FROM_LOCATION, '-') || ' → ' || NVL(rec.TO_LOCATION, '-') || '"
                    data-driver="' || rec.DRIVER_ASSIGNMENT_VALUE || '"
                    data-trip="' || rec.PRODUCT_ID || '"
                    data-signage="' || l_signage || '"
                    data-ticket="' || l_ticket_no || '"
                    data-notes="' || NVL(rec.TRIP_NOTES, '-') || '">
                    <i class="fa6 fa6-solid fa6-copy"></i>
                  </button>
                </td>
              </tr>';
          EXCEPTION
            WHEN OTHERS THEN
              l_html := l_html || '<tr style="background:#fee"><td colspan="11" style="color:red">خطأ في الرحلة رقم: '
                || NVL(rec.TRIP_INDEX, '؟') || '، المنتج: ' || NVL(rec.PRODUCT_ID, '؟') || ' : ' || SQLERRM || '</td></tr>';
          END;
        END LOOP;
      
        l_html := l_html || '</tbody></table></div>';
        RETURN l_html;
      END;
      

  layout: 
    sequence: 51
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Collapsible
    template-options: 
    - '#DEFAULT#'
    - is-expanded
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    static-id: todayTripsRegion
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

- # ====== Region: Ongoing Reservation Report ==================
  id: 272524653160453940
  identification: 
    name: Ongoing Reservation Report
    title: تقرير متابعة اليوميات - ليموزين
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html                 CLOB := '';
        l_trip_url             VARCHAR2(4000);
        l_edit_url             VARCHAR2(4000);
        l_assign_url           VARCHAR2(4000);
        l_edit_assignment_url  VARCHAR2(4000);
        l_row_class            VARCHAR2(1000);
        l_trip_status          VARCHAR2(2000);
        l_signage              VARCHAR2(4000);
        l_ticket               VARCHAR2(4000);
        l_driver_phone         VARCHAR2(4000);
        l_driver_phone_digits  VARCHAR2(4000);
        l_driver_phone_link    VARCHAR2(4000);
        l_client_phone         VARCHAR2(4000);
        l_client_phone_digits  VARCHAR2(4000);
        l_client_phone_link    VARCHAR2(4000);
        l_assignment_id        VARCHAR2(4000);
        l_safe_price           VARCHAR2(4000);
        l_safe_index           VARCHAR2(4000);
        l_safe_daydesc         VARCHAR2(4000);
        l_client_link          VARCHAR2(4000);
      BEGIN
        l_html := l_html || '
        <div class="today-trips-wrapper-followup">
          <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2">
              <i class="fa6 fa6-solid fa6-list-ul text-blue-600"></i>
              تقرير متابعة اليومية
            </h2>
            <div class="relative w-full max-w-md">
              <input type="text"
                     class="search-input-with-icon"
                     placeholder="ابحث عن رحلة أو عميل...">
              <i class="fa6 fa6-solid fa6-magnifying-glass search-placeholder-icon"></i>
            </div>
          </div>
          <div id="trip-context-menu-followup" class="context-menu">
            <div class="menu-item" data-action="assign"><i class="fa6 fa6-solid fa6-taxi me-1.5"></i> توزيع التشغيل</div>
            <div class="menu-item" data-action="edit"><i class="fa6 fa6-solid fa6-pen-to-square me-1.5"></i> تعديل الحجز</div>
            <div class="menu-item" data-action="edit-assignment"><i class="fa6 fa6-solid fa6-user-edit me-1.5"></i> تعديل التوزيعة</div>
          </div>
          <table class="min-w-full divide-y divide-gray-200 text-sm rtl text-right shadow-sm rounded-md overflow-hidden today-trips-table-followup">
            <thead class="bg-gray-50 text-xs font-semibold text-gray-600">
              <tr>
                <th class="px-4 py-3">#</th>
                <th class="px-4 py-3">نوع التشغيلة</th>
                <th class="px-4 py-3">كود التشغيلة</th>
                <th class="px-4 py-3">العميل</th>
                <th class="px-4 py-3">المسار</th>
                <th class="px-4 py-3">السائق</th>
                <th class="px-4 py-3">اليوم</th>
                <th class="px-4 py-3">الحالة</th>
                <th class="px-4 py-3">السعر</th>
                <th class="px-4 py-3 text-center"></th>
              </tr>
            </thead>
            <tbody class="bg-white">';
      
        FOR rec IN (
          SELECT CLIENT_ID, TRIP_INDEX, CAR_TYPE_NAME, TRIP_TYPE_NAME, CLASSIFICATION_NAME, PRODUCT_ID, CLIENT_NAME, CLIENT_PHONE, DRIVER_NAME, DRIVER_PHONE, ASSIGNMENT_ID,
                 SIGNAGE_DETAILS, TICKET_NUMBER, FROM_LOCATION, TO_LOCATION, PRODUCT_PRICE, PRODUCT_CURRENCY, DAY_DESCRIPTION_AR, LAST_SESSION_STATUS
            FROM VW_LIMO_ONGOING_DAILY_TRIPS
           ORDER BY TRIP_INDEX
        ) LOOP
          BEGIN
            l_signage       := NULLIF(rec.SIGNAGE_DETAILS, '-');
            l_ticket        := NULLIF(rec.TICKET_NUMBER, '-');
            l_client_phone  := NULLIF(rec.CLIENT_PHONE, '-');
            l_driver_phone  := NULLIF(rec.DRIVER_PHONE, '-');
            l_assignment_id := NULLIF(rec.ASSIGNMENT_ID, '-');
      
            IF l_client_phone IS NOT NULL THEN
              l_client_phone_digits := regexp_replace(l_client_phone, '[^0-9]', '');
              l_client_phone_link :=
                '<a href="https://web.whatsapp.com/send?phone='||l_client_phone_digits||'" target="_blank" title="تواصل مع العميل عبر واتساب ويب" style="color:#22c55e;text-decoration:none"><span dir="ltr" style="font-family:monospace">'||l_client_phone||'</span></a>';
            ELSE
              l_client_phone_link := '-';
            END IF;
      
            l_client_link := '<a href="' || APEX_UTIL.PREPARE_URL(
                                'f?p=' || :APP_ID || ':98:' || :APP_SESSION || '::::P98_ID:' || rec.CLIENT_ID
                              ) || '" class="text-blue-700 hover:underline font-semibold">' || rec.CLIENT_NAME || '</a>';
      
            IF l_driver_phone IS NOT NULL THEN
              l_driver_phone_digits := regexp_replace(l_driver_phone, '[^0-9]', '');
              l_driver_phone_link :=
                '<a href="https://web.whatsapp.com/send?phone='||l_driver_phone_digits||'" target="_blank" title="تواصل مع السائق عبر واتساب ويب" style="color:#22c55e;text-decoration:none"><span dir="ltr" style="font-family:monospace">'||l_driver_phone||'</span></a>';
            ELSE
              l_driver_phone_link := '-';
            END IF;
      
            BEGIN l_safe_price := rec.PRODUCT_PRICE; EXCEPTION WHEN OTHERS THEN l_safe_price := 'ERR'; END;
            BEGIN l_safe_index := rec.TRIP_INDEX;   EXCEPTION WHEN OTHERS THEN l_safe_index := 'ERR'; END;
            BEGIN l_safe_daydesc := rec.DAY_DESCRIPTION_AR; EXCEPTION WHEN OTHERS THEN l_safe_daydesc := 'ERR'; END;
      
            -- Determine status and row class
            CASE rec.LAST_SESSION_STATUS
              WHEN 'ACTIVE' THEN
                l_trip_status := '<i class="fa6 fa6-solid fa6-play text-green-500 me-1"></i> الرحلة نشطة';
                l_row_class := 'row-active';
              WHEN 'PAUSED' THEN
                l_trip_status := '<i class="fa6 fa6-solid fa6-pause text-yellow-600 me-1"></i> الرحلة متوقفة مؤقتاً';
                l_row_class := 'row-paused';
              WHEN 'FINISHED' THEN
                l_trip_status := '<i class="fa6 fa6-solid fa6-check-circle text-emerald-600 me-1"></i> الرحلة مكتملة';
                l_row_class := 'row-completed';
              ELSE
                IF rec.DAY_DESCRIPTION_AR IS NOT NULL AND INSTR(rec.DAY_DESCRIPTION_AR, 'اليوم الأول') > 0 THEN
                  l_trip_status := 'بانتظار بدء الرحلة';
                  l_row_class := 'row-unassigned';
                ELSE
                  l_trip_status := 'بيانات غير متطابقة';
                  l_row_class := 'row-error';
                END IF;
            END CASE;
      
            l_trip_url   := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6001:' || :APP_SESSION || '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID);
            l_assign_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':363:'  || :APP_SESSION || '::::P363_PRODUCT_ID:'  || rec.PRODUCT_ID);
            l_edit_url   := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':359:'  || :APP_SESSION || '::::P359_PRODUCT_ID:'  || rec.PRODUCT_ID);
            IF l_assignment_id IS NOT NULL THEN
              l_edit_assignment_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':363:' || :APP_SESSION || '::::P363_ASSIGNMENT_ID:' || l_assignment_id);
            ELSE
              l_edit_assignment_url := '';
            END IF;
      
            l_html := l_html || '
              <tr class="trip-row ' || l_row_class || ' hover:bg-gray-50 cursor-pointer"
                  data-url="' || l_trip_url || '"
                  data-assign-url="' || l_assign_url || '"
                  data-edit-url="' || l_edit_url || '"
                  data-edit-assignment-url="' || REPLACE(NVL(l_edit_assignment_url,''),'"','&quot;') || '"
                  data-assignment-id="' || NVL(l_assignment_id, '') || '"
                  data-client="' || rec.CLIENT_NAME || '"
                  data-phone="' || NVL(l_client_phone, '') || '"
                  data-car="' || rec.CAR_TYPE_NAME || '"
                  data-type="' || rec.TRIP_TYPE_NAME || '"
                  data-classification="' || rec.CLASSIFICATION_NAME || '"
                  data-route="' || NVL(rec.FROM_LOCATION, '-') || ' → ' || NVL(rec.TO_LOCATION, '-') || '"
                  data-driver="' || rec.DRIVER_NAME || '"
                  data-trip="' || rec.PRODUCT_ID || '"
                  data-signage="' || NVL(l_signage, '-') || '"
                  data-ticket="' || NVL(l_ticket, '-') || '"
                  data-assigned="' || CASE WHEN l_assignment_id IS NOT NULL THEN 'Y' ELSE 'N' END || '">
                <td class="px-4 py-3">' || l_safe_index || '</td>
                <td class="px-4 py-3">
                  <div class="font-semibold text-gray-900">' || rec.CAR_TYPE_NAME || '</div>
                  <div class="text-xs text-gray-500">' || rec.TRIP_TYPE_NAME || ' | ' || rec.CLASSIFICATION_NAME || '</div>
                </td>
                <td class="px-4 py-3">
                  <a href="' || l_trip_url || '" class="trip-code-link text-blue-700 hover:underline font-bold" data-trip-id="' || rec.PRODUCT_ID || '">' || rec.PRODUCT_ID || '</a>
                </td>
                <td class="px-4 py-3">
                  <div class="selectable font-medium text-gray-900">' || l_client_link || '</div>
                  <div class="selectable text-xs text-gray-500">' || l_client_phone_link || '</div>
                </td>
                <td class="px-4 py-3">
                  <span class="route-path">' || NVL(rec.FROM_LOCATION, '-') || ' <i class="fa6 fa6-solid fa6-arrow-left-long mx-1 text-gray-400"></i> ' || NVL(rec.TO_LOCATION, '-') || '</span>
                </td>
                <td class="px-4 py-3">';
            IF l_assignment_id IS NOT NULL THEN
              l_html := l_html ||
                '<a href="' || APEX_UTIL.PREPARE_URL(
                  'f?p=' || :APP_ID || ':6007:' || :APP_SESSION || '::::P6007_ASSIGNMENT_ID:' || l_assignment_id
                ) || '" class="font-semibold text-blue-700 hover:underline" title="عرض التعيين">' || rec.DRIVER_NAME || '</a>';
            ELSE
              l_html := l_html || rec.DRIVER_NAME;
            END IF;
            l_html := l_html || '<br><span class="text-xs text-gray-500">' || l_driver_phone_link || '</span>
                </td>
                <td class="px-4 py-3">' || l_safe_daydesc || '</td>
                <td class="px-4 py-3">' || l_trip_status || '</td>
                <td class="px-4 py-3">' || l_safe_price || ' ' || rec.PRODUCT_CURRENCY || '</td>
                <td class="px-4 py-3 text-center">
                  <button type="button" class="copy-btn inline-block mx-1" title="نسخ التفاصيل"
                          data-client="' || rec.CLIENT_NAME || '"
                          data-phone="' || NVL(l_client_phone, '') || '"
                          data-car="' || rec.CAR_TYPE_NAME || '"
                          data-type="' || rec.TRIP_TYPE_NAME || '"
                          data-classification="' || rec.CLASSIFICATION_NAME || '"
                          data-route="' || NVL(rec.FROM_LOCATION, '-') || ' → ' || NVL(rec.TO_LOCATION, '-') || '"
                          data-driver="' || rec.DRIVER_NAME || '"
                          data-trip="' || rec.PRODUCT_ID || '"
                          data-signage="' || NVL(l_signage, '-') || '"
                          data-ticket="' || NVL(l_ticket, '-') || '">
                    <i class="fa6 fa6-solid fa6-copy"></i>
                  </button>
                </td>
              </tr>';
      
          EXCEPTION
            WHEN OTHERS THEN
              l_html := l_html || '<tr style="background:#fee"><td colspan="10" style="color:red">خطأ في الرحلة رقم: '
                || NVL(rec.TRIP_INDEX, '؟') || '، المنتج: ' || NVL(rec.PRODUCT_ID, '؟') || ' : ' || SQLERRM || '</td></tr>';
          END;
        END LOOP;
      
        l_html := l_html || '</tbody></table></div>';
        RETURN l_html;
      END;
      

