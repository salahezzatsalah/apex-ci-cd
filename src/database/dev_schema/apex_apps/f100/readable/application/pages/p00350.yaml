javascript: 
  function-and-global-variable-declaration: |
    function copyPhoneToClipboard(btn) {
      var phone = btn.getAttribute('data-phone');
      if (phone) {
        navigator.clipboard.writeText(phone).then(function() {
          btn.title = "تم نسخ الرقم!";
          btn.classList.add("copied");
          setTimeout(function() {
            btn.title = btn.title.includes("الكابتن") ? "اضغط لنسخ رقم الكابتن" : "اضغط لنسخ رقم العميل";
            btn.classList.remove("copied");
          }, 1500);
        }, function() {
          alert("تعذر نسخ الرقم، برجاء المحاولة مرة أخرى.");
        });
      }
    }
    
    
  execute-when-page-loads: |
    // --- WebSocket to trigger region refreshes ---
    let ws = new WebSocket('wss://ecdtai.com:443');
    ws.onmessage = (e) => {
      if (e.data === 'refresh') {
        apex.region("todayTripsRegion").refresh();
        apex.region("ongoingTripsRegion").refresh();
      }
    };
    
    // --- Initialization of features per region wrapper ---
    function initTripTableFeatures(wrapperSelector, contextMenuSelector) {
      const $ = apex.jQuery;
      const wrapper = $(wrapperSelector);
      const table = wrapper.find('table');
      const contextMenu = $(contextMenuSelector);
      const searchInput = wrapper.find('.search-input-with-icon');
    
      // Unbind only handlers that need re-init
      table.off('.tripcustom');
      contextMenu.off('.tripcustom');
      if (searchInput.length) searchInput.off('.tripcustom');
    
      // --- Long press on mobile ---
      let touchTimer = null;
      const LONG_PRESS_MS = 500;
    
      table.on('touchstart.tripcustom', '.trip-row', function (e) {
        const $row = $(this);
        if (touchTimer) clearTimeout(touchTimer);
        touchTimer = setTimeout(() => {
          showContextMenu($row, e.originalEvent.touches ? e.originalEvent.touches[0] : e);
          touchTimer = null;
        }, LONG_PRESS_MS);
      });
      table.on('touchend.tripcustom touchmove.tripcustom touchcancel.tripcustom', '.trip-row', function () {
        if (touchTimer) clearTimeout(touchTimer);
        touchTimer = null;
      });
    
      // --- Right click on desktop ---
      table.on('contextmenu.tripcustom', '.trip-row', function (e) {
        e.preventDefault();
        const $row = $(this);
        showContextMenu($row, e);
      });
    
      // --- Copy button ---
      table.on('click.tripcustom', '.copy-btn', function (e) {
        e.stopPropagation();
        const d = $(this).data();
        let msg = `بيانات الرحلة\n\n` +
          `العميل: ${d.client} (${d.phone})\n` +
          `رقم الرحلة: ${d.trip}\n` +
          `نوع السيارة: ${d.car}\n` +
          `نوع الرحلة: ${d.type}\n` +
          `السائق: ${d.driver}\n` +
          `من: ${d.route}\n`;
        if (d.ticket && d.ticket !== '-') {
          msg += `رقم التذكرة: ${d.ticket}\n`;
        }
        if (d.signage && d.signage !== '-') {
          msg += `لافتة الترحيب: ${d.signage}\n`;
        }
        navigator.clipboard.writeText(msg).then(
          () => apex.message.showPageSuccess("تم نسخ تفاصيل الرحلة"),
          () => apex.message.alert("تعذر نسخ التفاصيل")
        );
      });
    
      // --- Context menu actions ---
      contextMenu.on('click.tripcustom', '.menu-item', function (e) {
        e.stopPropagation();
        const action = $(this).data('action');
        let targetUrl = contextMenu.data(`${action}-url`);
        if (action === "edit-assignment") {
          targetUrl = contextMenu.data('edit-assignment-url');
        }
        hideContextMenu();
        if (targetUrl) {
          apex.navigation.dialog(targetUrl, {});
        }
      });
    
      // --- Search filter ---
      if (searchInput.length) {
        searchInput.on('input.tripcustom', function () {
          const val = $(this).val().toLowerCase();
          table.find('tbody tr').each(function () {
            const rowText = $(this).text().toLowerCase();
            $(this).toggle(rowText.indexOf(val) > -1);
          });
        });
      }
    
      function showContextMenu($row, e) {
        const offsetTop = (e.pageY || e.clientY || (e.touches && e.touches[0].pageY) || 100) - wrapper.offset().top;
        const offsetLeft = (e.pageX || e.clientX || (e.touches && e.touches[0].pageX) || 100) - wrapper.offset().left;
        const assigned = $row.data('assigned');
        const assignMenuItem = contextMenu.find('[data-action="assign"]');
        if (assigned === 'Y') {
          assignMenuItem.html('<i class="fa6 fa6-solid fa6-taxi me-1.5"></i> تغيير السائق');
        } else {
          assignMenuItem.html('<i class="fa6 fa6-solid fa6-taxi me-1.5"></i> توزيع التشغيل');
        }
        const editAssignmentUrl = $row.data('edit-assignment-url');
        const editAssignmentMenuItem = contextMenu.find('[data-action="edit-assignment"]');
        if (editAssignmentUrl) {
          editAssignmentMenuItem.show();
        } else {
          editAssignmentMenuItem.hide();
        }
        if ("vibrate" in navigator) navigator.vibrate(15);
    
        // Measure menu width
        contextMenu.css({ display: 'block', visibility: 'hidden' });
        const menuWidth = contextMenu.outerWidth();
        let menuLeft = offsetLeft - menuWidth;
        if (menuLeft < 0) menuLeft = 2;
    
        contextMenu
          .css({ top: offsetTop, left: menuLeft, visibility: 'visible' })
          .stop(true, true)
          .fadeIn(150)
          .data('assign-url', $row.data('assign-url'))
          .data('edit-url', $row.data('edit-url'))
          .data('edit-assignment-url', editAssignmentUrl);
      }
    
      function hideContextMenu() {
        $('.context-menu:visible').stop(true, true).fadeOut(150);
      }
    }
    
    // --- Attach document-level outside click handler ONCE ---
    $(document).off('.tripcontext').on('click.tripcontext touchstart.tripcontext', function (e) {
      if ($(e.target).closest('.context-menu').length === 0) {
        $('.context-menu:visible').fadeOut(150);
      }
    });
    
    // --- Region refresh re-init ---
    $(document).on("apexafterrefresh", function(event) {
      const refreshedRegionId = event.target.id;
      if (refreshedRegionId === "todayTripsRegion") {
        initTripTableFeatures('.today-trips-wrapper', '#trip-context-menu');
      }
      if (refreshedRegionId === "ongoingTripsRegion") {
        initTripTableFeatures('.today-trips-wrapper-followup', '#trip-context-menu-followup');
      }
    });
    
    // --- Initial page load ---
    apex.jQuery(document).ready(function() {
      setTimeout(function() {
        initTripTableFeatures('.today-trips-wrapper', '#trip-context-menu');
        initTripTableFeatures('.today-trips-wrapper-followup', '#trip-context-menu-followup');
      }, 200);
    });
    

css: 
  inline: |
    /* ========== TODAY & FOLLOW-UP TRIPS STYLES - Uber Base Design ========== */
    
    .today-trips-wrapper,
    .today-trips-wrapper-followup {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      font-size: 12px;
      direction: rtl;
      padding: 1.5rem;
      color: #2e2e2e;
      overflow-x: auto;
      background-color: #f9fafb;
    }
    
    .today-trips-table,
    .today-trips-table-followup {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      table-layout: auto;
      border-color: orange;
    }
    
    .today-trips-table thead th,
    .today-trips-table-followup thead th {
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #374151;
      background: orangered;
      color: black;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-color: orange;
    }
    
    .today-trips-table tbody td,
    .today-trips-table-followup tbody td {
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      color: #1f2937;
      padding: 0.6rem 0.75rem;
      background-color: #fff;
      border-bottom: 1px solid #f3f4f6;
      line-height: 1.4;
      white-space: normal;
      overflow-wrap: break-word;
      max-width: 200px;
      border-color: black;
      font-weight: bold;
      min-height: 48px; /* ✅ Uniform row height */
    }
    
    .today-trips-table tbody tr:nth-child(even) td,
    .today-trips-table-followup tbody tr:nth-child(even) td {
      background-color: #f9fafb;
    }
    
    .trip-row {
      transition: all 0.25s ease;
    }
    .trip-row:hover {
      transform: scale(1.002);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    
    .status-alert {
      color: #b91c1c;
      font-weight: 600;
    }
    
    /* ===== Context Menu ===== */
    .context-menu,
    .context-menu-followup {
      position: absolute;
      z-index: 1000;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      min-width: 160px;
      overflow: hidden;
      display: none;
    }
    
    .context-menu .menu-item,
    .context-menu-followup .menu-item-followup {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      color: #111827;
      transition: background-color 0.2s;
    }
    .context-menu .menu-item:hover,
    .context-menu-followup .menu-item-followup:hover {
      background-color: #f3f4f6;
    }
    
    /* ===== Overlay ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.85);
      font-size: 18px;
      font-weight: bold;
      color: #374151;
      z-index: 999;
    }
    
    /* ===== Time-based Highlighting ===== */
    .trip-row-past {
      background: linear-gradient(90deg, #e0e7ef 0%, #f3f4f6 100%);
      opacity: 0.6;
    }
    .trip-row-now {
      background: linear-gradient(90deg, #fdf6b2 10%, #fff9db 100%);
      box-shadow: 0 0 12px 0 #ffd90040, 0 0 0 2px #facc1530;
      animation: glow-now 2s infinite alternate;
    }
    @keyframes glow-now {
      0% { box-shadow: 0 0 8px 0 #ffd90020; }
      100% { box-shadow: 0 0 20px 0 #ffd90070, 0 0 0 3px #fde04740; }
    }
    .trip-row-future {
      background: linear-gradient(90deg, #f0fdf4 0%, #ecfdf5 100%);
      opacity: 0.9;
    }
    
    /* ===== Row Statuses ===== */
    .row-cancelled {
      background: linear-gradient(90deg, #ffe5e5 0%, #fff1f2 100%);
      border-left: 8px solid #ef4444;
      color: #991b1b;
      opacity: 0.85;
    }
    
    .row-unassigned {
      background: linear-gradient(90deg, #fef2f2 0%, #fff7ed 100%);
      border-left: 8px dashed #f59e42;
      color: #b45309;
      font-weight: 500;
    }
    
    .row-active {
      background: linear-gradient(90deg, #d1fae5 0%, #e0f2fe 100%);
      border-left: 8px solid #22d3ee;
      color: #065f46;
      animation: active-row-glow 2s infinite alternate;
    }
    @keyframes active-row-glow {
      from { box-shadow: 0 0 8px 0 #38bdf820; }
      to   { box-shadow: 0 0 32px 0 #38bdf870; }
    }
    
    .row-paused {
      background: linear-gradient(90deg, #fef9c3 0%, #fdf6b2 100%);
      border-left: 8px solid #facc15;
      color: #a16207;
    }
    
    .row-partial {
      background: linear-gradient(90deg, #f3e8ff 0%, #ede9fe 100%);
      border-left: 8px dashed #a78bfa;
      color: #6d28d9;
    }
    
    .row-completed {
      background: linear-gradient(90deg, #e0f2fe 0%, #d1fae5 100%);
      border-left: 8px solid #34d399;
      color: #166534;
      font-weight: 700;
    }
    
    .row-error {
      background: linear-gradient(90deg, #fcd34d 0%, #fecaca 100%);
      border-left: 8px solid #f87171;
      color: #b91c1c;
      font-style: italic;
    }
    
    /* ===== Status Badges ===== */
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 12px;
      color: #fff;
    }
    .status-badge.active { background: #10b981; }
    .status-badge.cancelled { background: #ef4444; }
    .status-badge.paused { background: #f59e0b; }
    .status-badge.completed { background: #3b82f6; }
    .status-badge.partial { background: #8b5cf6; }
    .status-badge.unassigned { background: #f97316; }
    .status-badge.error { background: #dc2626; }
    
    /* ===== Utility Labels ===== */
    .driver-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 2px;
    }
    
    .copy-btn {
      background-color: transparent;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #4b5563;
      transition: color 0.2s;
      vertical-align: middle;
    }
    .copy-btn:hover { color: #1d4ed8; }
    
    .tag,
    .requested-car,
    .client-code {
      display: inline-block;
      margin-top: 6px;
      margin-left: 4px;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 6px;
      font-weight: 600;
      vertical-align: middle;
    }
    .tag i { margin-left: 4px; }
    .tag.badge { background: #f3f4f6; color: #1f2937; }
    .requested-car,
    .client-code { background: #fb923c; color: #fff; }
    
    /* ===== Selection Control ===== */
    .today-trips-wrapper .trip-row,
    .today-trips-wrapper-followup .trip-row {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .selectable {
      user-select: text !important;
      -webkit-user-select: text !important;
    }
    
    /* ===== Responsive (Mobile) ===== */
    @media (max-width: 768px) {
      .today-trips-wrapper,
      .today-trips-wrapper-followup {
        padding: 1rem 0.5rem;
        font-size: 14px;
      }
      .today-trips-table thead th,
      .today-trips-table-followup thead th,
      .today-trips-table tbody td,
      .today-trips-table-followup tbody td {
        font-size: 12px;
        padding: 0.5rem 0.4rem;
      }
    }
    
    /* ===== Header & Search Enhancements ===== */
    .today-trips-wrapper h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .search-input-with-icon {
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      padding: 0.5rem 1rem 0.5rem 2.25rem;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background-color: #fff;
      color: #1f2937;
      direction: rtl;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .search-input-with-icon:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      outline: none;
    }
    .search-placeholder-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 14px;
      pointer-events: none;
    }
    
    /* ===== Flashing Tag ===== */
    .ft-today-tag {
      display: inline-block;
      background: linear-gradient(90deg, #FBBF24 60%, #fde68a 100%);
      color: #915c09;
      font-size: 11px;
      font-weight: 700;
      border-radius: 14px;
      padding: 2px 10px 2px 8px;
      margin-top: 4px;
      margin-bottom: 2px;
      letter-spacing: 0.2px;
      box-shadow: 0 1px 6px 0 #fbbf243a;
      border: 1px solid #f5e09a;
      vertical-align: middle;
      animation: flashft 1s infinite alternate;
    }
    @keyframes flashft {
      from { filter: brightness(1.07); }
      to   { filter: brightness(1.16); }
    }
    
    /* ===== Dark Mode Support ===== */
    .dark .today-trips-table,
    .dark .today-trips-table-followup {
      background: #1f2937;
      color: #f3f4f6;
    }
    .dark .today-trips-table thead th,
    .dark .today-trips-table-followup thead th {
      background: #111827;
      color: #f9fafb;
    }
    .dark .row-active {
      background: linear-gradient(90deg, #064e3b 0%, #065f46 100%);
      border-left-color: #10b981;
    }
    

