- # ====== Region: Gamified Scores Board =======================
  id: 313027026099897522
  identification: 
    name: Gamified Scores Board
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html                CLOB;
      
        -- Period (July 2025)
        l_from                DATE := DATE '2025-07-01';
        l_to                  DATE := LAST_DAY(DATE '2025-07-01');
      
        -- KPI cards
        l_count_today         NUMBER := 0;
        l_count_ongoing       NUMBER := 0;
        l_count_fasttrack     NUMBER := 0;
      
        -- July totals (all)
        l_office_net_total    NUMBER := 0;
        l_commission_pool     NUMBER := 0;
      
        -- Leaderboard top employee (for the crown)
        l_top_emp_id          VARCHAR2(300);
      
        -- Personal stats (current user / creator)
        l_me_id               VARCHAR2(300) := APEX_UTIL.GET_SESSION_STATE('APP_USER_ID');
        l_me_name             VARCHAR2(400);
        l_me_trips            NUMBER := 0;
        l_me_office_net       NUMBER := 0;
        l_me_commission_due   NUMBER := 0;
      
        -- Goal for gamified progress (tweakable)
        l_goal_egp            NUMBER := 100000; -- milestone goal EGP for progress bar
        l_progress_pct        NUMBER := 0;
      
        -- Helpers
        FUNCTION fmt(p_num NUMBER) RETURN VARCHAR2 IS
        BEGIN
          RETURN TO_CHAR(NVL(p_num,0), 'FM999G999G999G990D00', 'NLS_NUMERIC_CHARACTERS=.,');
        END;
      
        FUNCTION pct(p_num NUMBER, p_den NUMBER) RETURN NUMBER IS
        BEGIN
          IF NVL(p_den,0) = 0 THEN
            RETURN 0;
          ELSE
            RETURN LEAST(100, ROUND(100 * NVL(p_num,0) / p_den, 0));
          END IF;
        END;
      
      BEGIN
        l_html := '';
      
        /* ========== KPIs (today/ongoing/fast-track) ========== */
        BEGIN
          SELECT COUNT(*) INTO l_count_today   FROM VW_LIMO_TODAY_TRIPS;
        EXCEPTION WHEN OTHERS THEN l_count_today := 0; END;
      
        BEGIN
          SELECT COUNT(*) INTO l_count_ongoing FROM VW_LIMO_ONGOING_DAILY_TRIPS;
        EXCEPTION WHEN OTHERS THEN l_count_ongoing := 0; END;
      
        BEGIN
          SELECT COUNT(*) INTO l_count_fasttrack FROM VW_FAST_TRACK_TODAY_RESERVATIONS;
        EXCEPTION WHEN OTHERS THEN l_count_fasttrack := 0; END;
      
        /* ========== July totals (exclude cancelled) ========== */
        BEGIN
          SELECT NVL(SUM(v.office_net_egp),0),
                 NVL(ROUND(SUM(v.office_net_egp) * 0.005, 2), 0)
            INTO l_office_net_total, l_commission_pool
          FROM vw_limo_trip_accounting v
          JOIN limo_products p
            ON p.product_id = v.product_id
          WHERE p.status != 'تم الإلغاء'
            AND TRUNC(CAST(v.start_datetime AS DATE)) BETWEEN l_from AND l_to;
        EXCEPTION WHEN OTHERS THEN
          l_office_net_total := 0;
          l_commission_pool  := 0;
        END;
      
        /* ========== Leaderboard top employee id ========== */
        BEGIN
          SELECT employee_id
            INTO l_top_emp_id
          FROM (
            SELECT c.employee_id,
                   SUM(c.commission_egp) AS total_comm
              FROM vw_emp_trip_commissions c
             WHERE TRUNC(CAST(c.start_datetime AS DATE)) BETWEEN l_from AND l_to
             GROUP BY c.employee_id
             ORDER BY total_comm DESC
          )
          WHERE ROWNUM = 1;
        EXCEPTION WHEN NO_DATA_FOUND THEN
          l_top_emp_id := NULL;
        END;
      
        /* ========== Personal stats (current user) ========== */
        IF l_me_id IS NOT NULL THEN
          BEGIN
            SELECT NVL(e.screen_name, e.first_name || ' ' || e.last_name)
              INTO l_me_name
            FROM bs_employees e
            WHERE e.id = l_me_id;
          EXCEPTION WHEN OTHERS THEN
            l_me_name := NVL(V('APP_USER'), 'You');
          END;
      
          BEGIN
            SELECT NVL(COUNT(DISTINCT c.trip_id), 0),
                   NVL(ROUND(SUM(c.office_net_egp), 2), 0),
                   NVL(ROUND(SUM(c.commission_egp), 2), 0)
              INTO l_me_trips, l_me_office_net, l_me_commission_due
            FROM vw_emp_trip_commissions c
            WHERE c.employee_id = l_me_id
              AND TRUNC(CAST(c.start_datetime AS DATE)) BETWEEN l_from AND l_to;
          EXCEPTION WHEN OTHERS THEN
            l_me_trips := 0; l_me_office_net := 0; l_me_commission_due := 0;
          END;
        ELSE
          l_me_name := NVL(V('APP_USER'), 'You');
        END IF;
      
        l_progress_pct := pct(l_me_office_net, l_goal_egp);
      
        /* ========== Inline micro styles for gamified bits (safe) ========== */
        l_html := l_html || '
        <style>
          .shine{background:linear-gradient(110deg,rgba(255,255,255,.0) 0%,rgba(255,255,255,.6) 20%,rgba(255,255,255,.0) 40%) no-repeat;background-size:200% 100%;animation:shine 3s linear infinite;}
          @keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
          .trophy{filter: drop-shadow(0 1px 1px rgba(0,0,0,.15));}
          .ring{height:84px;width:84px;border-radius:9999px;position:relative;background:#f3f4f6}
          .ring>.bar{position:absolute;inset:0;border-radius:9999px;background:
            conic-gradient(#f59e0b ' || l_progress_pct || '%, #e5e7eb ' || l_progress_pct || '%);}
          .ring>.center{position:absolute;inset:10px;border-radius:9999px;background:white;display:flex;align-items:center;justify-content:center;font-weight:800;}
        </style>';
      
        /* ========== Header banner ========== */
        l_html := l_html || '
        <div class="space-y-6 p-6">
          <div class="relative rounded-3xl bg-gradient-to-br from-yellow-50 via-white to-yellow-100 border border-yellow-200 p-6 overflow-hidden">
            <div class="absolute -top-6 -left-6 rotate-12 opacity-20">
              <svg class="h-28 w-28 trophy text-yellow-400" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4h10v2h3v3a5 5 0 0 1-4 4.9V15a3 3 0 0 1-3 3v2h3v2H8v-2h3v-2a3 3 0 0 1-3-3v-1.1A5 5 0 0 1 4 9V6h3V4Zm-1 5a3 3 0 0 0 2 2.816V6H6v3Zm12-3h-2v5.816A3 3 0 0 0 18 9V6Z"/></svg>
            </div>
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
              <div>
                <div class="text-2xl md:text-3xl font-extrabold text-gray-800">لوحة الإنجازات - يوليو 2025</div>
                <div class="text-gray-600">مكافآت 0.5% من صافي المكتب (EGP)</div>
              </div>
      
              <div class="flex items-center gap-6">
                <div class="ring shadow">
                  <div class="bar rounded-full"></div>
                  <div class="center text-yellow-600">
                    ' || l_progress_pct || '%
                  </div>
                </div>
                <div class="text-right">
                  <div class="text-sm text-gray-500">هدفك الشهري</div>
                  <div class="font-bold text-gray-800">' || fmt(l_me_office_net) || ' / ' || fmt(l_goal_egp) || ' EGP</div>
                  <div class="text-xs text-gray-500">رحلاتك: ' || NVL(l_me_trips,0) || ' | عمولتك: ' || fmt(l_me_commission_due) || ' EGP</div>
                </div>
              </div>
            </div>
          </div>';
      
        /* ========== KPI cards row ========== */
        l_html := l_html || '
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="rounded-2xl border border-gray-200 p-4 bg-white shadow">
              <div class="text-sm text-gray-500">حجوزات اليوم</div>
              <div class="text-3xl font-extrabold text-gray-800">' || NVL(l_count_today,0) || '</div>
            </div>
            <div class="rounded-2xl border border-gray-200 p-4 bg-white shadow">
              <div class="text-sm text-gray-500">متابعة اليوم</div>
              <div class="text-3xl font-extrabold text-gray-800">' || NVL(l_count_ongoing,0) || '</div>
            </div>
            <div class="rounded-2xl border border-gray-200 p-4 bg-white shadow">
              <div class="text-sm text-gray-500">صافي المكتب (يوليو)</div>
              <div class="text-3xl font-extrabold text-gray-800">' || fmt(l_office_net_total) || ' <span class="text-base font-bold">EGP</span></div>
            </div>
            <div class="rounded-2xl border border-gray-200 p-4 bg-white shadow">
              <div class="text-sm text-gray-500">صندوق العمولات (0.5%)</div>
              <div class="text-3xl font-extrabold text-yellow-600">' || fmt(l_commission_pool) || ' <span class="text-base font-bold">EGP</span></div>
            </div>
          </div>';
      
        /* ========== Achievements (simple rules) ========== */
        l_html := l_html || '
          <div class="flex flex-wrap gap-2">
            ' || CASE WHEN l_me_trips >= 10 THEN '<span class="shine inline-flex items-center gap-2 rounded-full bg-green-100 text-green-700 px-4 py-1 text-sm font-bold border border-green-200">🏁 عشرة رحلات</span>' ELSE '' END || '
            ' || CASE WHEN l_me_office_net >= 50000 THEN '<span class="shine inline-flex items-center gap-2 rounded-full bg-yellow-100 text-yellow-700 px-4 py-1 text-sm font-bold border border-yellow-200">💎 صافي 50K+</span>' ELSE '' END || '
            ' || CASE WHEN l_me_id = l_top_emp_id AND l_top_emp_id IS NOT NULL THEN '<span class="shine inline-flex items-center gap-2 rounded-full bg-purple-100 text-purple-700 px-4 py-1 text-sm font-bold border border-purple-200">👑 متصدر الشهر</span>' ELSE '' END || '
          </div>';
      
        /* ========== Leaderboard (Top 5) ========== */
        l_html := l_html || '
          <div class="rounded-3xl border border-gray-200 bg-white shadow p-4">
            <div class="flex items-center justify-between mb-3">
              <div class="text-xl font-extrabold text-gray-800">لوحة المتصدرين (يوليو)</div>
              <div class="text-sm text-gray-500">أعلى 5 حسب العمولات</div>
            </div>
            <div class="divide-y divide-gray-100">';
      
        FOR r IN (
          SELECT * FROM (
            SELECT
              c.employee_id,
              COALESCE(e.screen_name, e.first_name || ' ' || e.last_name, e.username) AS employee_name,
              COUNT(DISTINCT c.trip_id) AS trips,
              ROUND(SUM(c.office_net_egp), 2) AS office_net_egp_total,
              ROUND(SUM(c.commission_egp), 2) AS commission_due_egp
            FROM vw_emp_trip_commissions c
            JOIN bs_employees e ON e.id = c.employee_id
            WHERE TRUNC(CAST(c.start_datetime AS DATE)) BETWEEN l_from AND l_to
            GROUP BY c.employee_id, COALESCE(e.screen_name, e.first_name || ' ' || e.last_name, e.username)
            ORDER BY commission_due_egp DESC
          )
          WHERE ROWNUM <= 5
        )
        LOOP
          l_html := l_html || '
            <div class="flex items-center justify-between py-3">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-gradient-to-br from-yellow-100 to-white border border-yellow-200 flex items-center justify-center text-yellow-700 font-extrabold">
                  ' || SUBSTR(NVL(r.employee_name, '؟'), 1, 1) || '
                </div>
                <div>
                  <div class="font-bold text-gray-800">' || r.employee_name || CASE WHEN r.employee_id = l_top_emp_id THEN ' <span class="text-yellow-500">👑</span>' ELSE '' END || '</div>
                  <div class="text-xs text-gray-500">رحلات: ' || r.trips || ' · صافي: ' || fmt(r.office_net_egp_total) || ' EGP</div>
                </div>
              </div>
              <div class="text-right">
                <div class="text-base font-extrabold text-yellow-600">' || fmt(r.commission_due_egp) || ' EGP</div>
                <div class="text-xs text-gray-500">عمولة مستحقة</div>
              </div>
            </div>';
        END LOOP;
      
        l_html := l_html || '
            </div>
          </div>';
      
        /* ========== Existing Menu Tiles (with your counts) ========== */
        l_html := l_html || '
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 text-right">';
      
        FOR r IN (
          SELECT MENU_ID, MENU_LABEL, MENU_PAGE_ID, MENU_ICON, MENU_IMAGE_URL
            FROM APP_MENU_HOME
           WHERE PARENT_MENU_ID IS NULL
             AND IS_ACTIVE = 'Y'
           ORDER BY DISPLAY_ORDER
        )
        LOOP
          -- Badge counts reset
          l_count_today := NULL; l_count_ongoing := NULL; l_count_fasttrack := NULL;
      
          IF r.MENU_PAGE_ID = 350 THEN
            BEGIN
              SELECT COUNT(*) INTO l_count_today   FROM VW_LIMO_TODAY_TRIPS;
              SELECT COUNT(*) INTO l_count_ongoing FROM VW_LIMO_ONGOING_DAILY_TRIPS;
            EXCEPTION WHEN OTHERS THEN l_count_today := 0; l_count_ongoing := 0; END;
          ELSIF r.MENU_PAGE_ID = 450 THEN
            BEGIN
              SELECT COUNT(*) INTO l_count_fasttrack FROM VW_FAST_TRACK_TODAY_RESERVATIONS;
            EXCEPTION WHEN OTHERS THEN l_count_fasttrack := 0; END;
          END IF;
      
          -- URL
          DECLARE
            l_url VARCHAR2(4000);
          BEGIN
            l_url := APEX_UTIL.PREPARE_URL(
              p_url => 'f?p=' || V('APP_ID') || ':' || r.MENU_PAGE_ID || ':' || V('APP_SESSION'),
              p_checksum_type => 'SESSION'
            );
      
            l_html := l_html ||
              '<a href="' || l_url || '" class="menu-tile relative group block rounded-2xl shadow-xl border border-gray-200 hover:shadow-2xl transition transform hover:scale-105 active:scale-100 bg-gradient-to-br from-white to-gray-100 p-4 text-center overflow-hidden">';
      
            -- Crown sparkle
            l_html := l_html ||
              '<span class="absolute -top-3 -right-3 z-10"><svg class="h-7 w-7 text-yellow-400 drop-shadow-lg opacity-80" fill="none" viewBox="0 0 24 24"><path d="M12 3l2.09 6.26L21 9.27l-5 4.87L17.18 21 12 17.77 6.82 21 8 14.14l-5-4.87 6.91-1.01z" fill="currentColor"/></svg></span>';
      
            -- Icon or image
            IF r.MENU_IMAGE_URL IS NOT NULL THEN
              l_html := l_html ||
              '<div class="flex items-center justify-center mb-3">'||
                '<img src="' || r.MENU_IMAGE_URL || '" alt="' || r.MENU_LABEL || '" class="rounded-full h-20 w-20 object-contain shadow-md bg-gradient-to-tr from-yellow-50 to-white p-2 border-2 border-yellow-300 group-hover:scale-110 transition" />'||
              '</div>';
            ELSE
              l_html := l_html ||
              '<div class="flex items-center justify-center mb-3">'||
                '<span class="flex items-center justify-center rounded-full h-20 w-20 bg-gradient-to-tr from-yellow-100 via-white to-yellow-50 shadow-md border-2 border-yellow-200 group-hover:scale-110 transition">'||
                  '<i class="' || r.MENU_ICON || ' text-5xl text-yellow-500 drop-shadow-lg"></i>'||
                '</span>'||
              '</div>';
            END IF;
      
            -- Label
            l_html := l_html ||
              '<div class="text-xl font-extrabold text-gray-800 tracking-tight mb-2 group-hover:text-yellow-600 transition">' || r.MENU_LABEL || '</div>';
      
            -- Badges
            IF r.MENU_PAGE_ID = 350 THEN
              l_html := l_html ||
                '<div class="flex flex-row justify-center gap-2 mb-2">'||
                  '<span class="inline-block bg-green-100 text-green-700 text-base font-bold rounded-full px-4 py-1 shadow group-hover:bg-yellow-100 group-hover:text-yellow-600 transition">حجوزات اليوم: '|| NVL(TO_CHAR(l_count_today), '0') ||'</span>'||
                  '<span class="inline-block bg-blue-100 text-blue-700 text-base font-bold rounded-full px-4 py-1 shadow group-hover:bg-yellow-100 group-hover:text-yellow-600 transition">متابعة اليوم: '|| NVL(TO_CHAR(l_count_ongoing), '0') ||'</span>'||
                '</div>';
            ELSIF r.MENU_PAGE_ID = 450 THEN
              l_html := l_html ||
                '<div class="flex justify-center mb-2">'||
                  '<span class="inline-block bg-green-100 text-green-700 text-base font-bold rounded-full px-4 py-1 shadow group-hover:bg-yellow-100 group-hover:text-yellow-600 transition">حجوزات اليوم: '|| NVL(TO_CHAR(l_count_fasttrack), '0') ||'</span>'||
                '</div>';
            END IF;
      
            l_html := l_html || '</a>';
          END;
        END LOOP;
      
        l_html := l_html || '</div>'; -- end tiles grid
        l_html := l_html || '</div>'; -- end page container
      
        RETURN l_html;
      END;
      

