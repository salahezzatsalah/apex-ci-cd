- # ====== Dynamic Action: Load PDF ============================
  id: 266943131228772029
  identification: 
    name: Load PDF

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Item = Value
    item: P356_FILE_EXTENSION
    value: PDF

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 266943609860772029
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        $('#pdf_viewer').html('');
        var url = '&P356_PDF_LINK.';
        var preview = document.createElement('embed'); 
        preview.type = "application/pdf";
        preview.width="100%";
        preview.height="1000px";
        preview.src = url;
        $("#pdf_viewer").append(preview);

