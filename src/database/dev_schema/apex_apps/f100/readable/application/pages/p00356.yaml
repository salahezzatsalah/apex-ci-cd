computations: 
- # ====== Computation: P356_PDF_LINK ==========================
  id: 266939581234772024
  identification: 
    item-name: P356_PDF_LINK

  execution: 
    sequence: 60
    point: Before Header

  computation: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      return APEX_PAGE.GET_URL (
                  p_page      => 356,
                  p_request   => 'APPLICATION_PROCESS=viewCarTypePDF',
                  p_plain_url => TRUE );

- # ====== Computation: P356_DOCUMENT_NAME =====================
  id: 266939942282772025
  identification: 
    item-name: P356_DOCUMENT_NAME

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select DOCUMENT_FILENAME
        from CARS_CATALOG_DOCUMENTS d
       where id = :P356_ID
      

- # ====== Computation: P356_NEXT_ID ===========================
  id: 266940355963772025
  identification: 
    item-name: P356_NEXT_ID

  execution: 
    sequence: 30
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from CARS_CATALOG_DOCUMENTS d
       where car_type_id = (select car_type_id from CARS_CATALOG_DOCUMENTS d2 where d2.id = :P356_ID) and
             created < (select created from CARS_CATALOG_DOCUMENTS d2 where d2.id = :P356_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created desc
      fetch first 1 rows only

- # ====== Computation: P356_PREV_ID ===========================
  id: 266940738297772025
  identification: 
    item-name: P356_PREV_ID

  execution: 
    sequence: 40
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT id
        from CARS_CATALOG_DOCUMENTS d
       where car_type_id = (select car_type_id from CARS_CATALOG_DOCUMENTS d2 where d2.id = :P356_ID) and
             created > (select created from CARS_CATALOG_DOCUMENTS d2 where d2.id = :P356_ID) and
                dbms_lob.getlength(DOCUMENT_BLOB) > 0 
      order by created 
      fetch first 1 rows only

- # ====== Computation: P356_FILE_EXTENSION ====================
  id: 266941193937772025
  identification: 
    item-name: P356_FILE_EXTENSION

  execution: 
    sequence: 10
    point: Before Regions

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1))) ext
        from CARS_CATALOG_DOCUMENTS d
       where id = :P356_ID

- # ====== Computation: P356_FILE_NAME =========================
  id: 266941591288772026
  identification: 
    item-name: P356_FILE_NAME

  execution: 
    sequence: 50
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT DOCUMENT_FILENAME
        from CARS_CATALOG_DOCUMENTS d
       where id = :P356_ID 

- # ====== Computation: P356_DOCUMENT_IS_IMAGE =================
  id: 266941976718772026
  identification: 
    item-name: P356_DOCUMENT_IS_IMAGE

  execution: 
    sequence: 20
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select 'Y'
        from CARS_CATALOG_DOCUMENTS d
       where id = :P356_ID
      and upper(substr(d.DOCUMENT_FILENAME,instr(d.DOCUMENT_FILENAME,'.',-1)+1,length(d.DOCUMENT_FILENAME)-instr(d.DOCUMENT_FILENAME,'.',-1)))
       in ('JPG','JPEG','PNG','GIF','AVIF','WEBP')
      

