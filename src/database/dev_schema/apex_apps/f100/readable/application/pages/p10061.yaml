- # ====== Region: Task Statuses ===============================
  id: 30447232793826516182
  identification: 
    name: Task Statuses
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select s.ID,
             s.task_type_id,
             t.task_type,
             s.STATUS,
             s.STATIC_ID,
             s.DISPLAY_SEQ,
             s.CREATED,
             s.CREATED_BY,
             s.UPDATED,
             s.UPDATED_BY,
             decode(s.is_default_yn,'Y','نعم','N','لا',s.is_default_yn) is_default,
             decode(s.indicates_complete_yn,'Y','نعم','N','لا',s.indicates_complete_yn) indicates_complete,
             decode(s.include_yn,'Y','نعم','N','لا',s.include_yn) include,
             (select count(*) from reservation_TASKS where status_id = s.id) references
        from res_TASK_STATUSES s,
             res_task_types t
       where task_type_id = t.id (+)

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

