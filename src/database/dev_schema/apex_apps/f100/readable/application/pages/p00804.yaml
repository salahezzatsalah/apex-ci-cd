- # ====== Region: reservation_Details =========================
  id: 182296186419205224
  identification: 
    name: reservation_Details
    title: خدمات مضافة على الحجز
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          R.ADDEDSERVICEID,
          R.RELATEDRESERVATIONID,
          R.SERVICEDATE,
          R.COMMENTS,
          R.CURRENCY,
          C.CURRENCY_NAME_AR,
          R.AMOUNT,
          R.POSTED_BY,
          B.FIRST_NAME || ' '|| B.LAST_NAME AS FULL_NAME,
          R.POST_DATE,
          R.CURRECYRATES,
          R.AMOUNTEGP
      FROM APRTADDEDSERVICES R
      LEFT JOIN CURRENCIES C 
          ON R.CURRENCY = C.CURRENCY_CODE
          LEFT JOIN BS_EMPLOYEES B
          ON R.POSTED_BY=B.ID
      WHERE R.RELATEDRESERVATIONID = :P804_RESERVATIONID
      

