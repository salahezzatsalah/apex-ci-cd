          R.TOTAL_RESERVATION_PRICE_EGP,
          R.CALCULATION_METHOD,
          R.REPORTDATE,
          R.RESERVATION_DURATION_AR,
          R.REGISTER_RESPONSIBLE_AR,
          R.PAID_AMOUNTS_EGP,
          R.TOTAL_ADDED_SERVICES_EGP,
          R.TOTAL_WITH_ADDED_SERVICES_EGP,
          R.REMAINING_AMOUNTS_EGP,
          R.REMAINING_AMOUNTS_WITH_CURRENCY,
          R.REMAINING_CALCULATION_METHOD_AR,
          R.OFFICENETPRECOM,
          R.OFFICENETPRECOM_EGP,
          R.CONFIRMATIONSTATUS,
          R.TOTAL_COMMISSIONS,
          R.TOTAL_COMMISSIONS_EGP,
          R.OFFICENETPOSTCOM,
          R.OFFICENETPOSTCOM_EGP,
      
          REGEXP_REPLACE(
            COALESCE(C.PHONE, B.DRIVER_NAME),
            '[^0-9+]',
            ''
          ) AS REQUESTER_PHONE,
      '<a href="#" onclick="window.open(' ||
          '''https://api.whatsapp.com/send?phone=' || 
          REGEXP_REPLACE(COALESCE(C.PHONE, B.DRIVER_NAME), '[^0-9]', '') || 
          ''', ''_blank'')">💬</a>' ||
      
      '<a href="f?p=&APP_ID.:18:&SESSION.::&DEBUG.::P18_ENTITY_ID:' || R.REQUESTERID || 
      '" title="عرض تفاصيل"><span style="margin: 0 8px; font-weight: bold;">' || 
      R.REQUESTER_NAME || '</span></a>' ||
      
      '<a href="tel:' || 
        REGEXP_REPLACE(COALESCE(C.PHONE, B.DRIVER_NAME), '[^0-9]', '') || 
      '" title="اتصال مباشر">📞</a>' 
      AS REQUESTER_CONTACT_INFO
      
      
      
      FROM APRT_RESERVATIONS_VIEW R
      LEFT JOIN CURRENCIES F
             ON r.CURRENCY = F.CURRENCY_CODE
      
      LEFT JOIN CRM_CLIENTS C
          ON R.REQUESTERID = C.CLIENT_ID
      LEFT JOIN COMPANY_DRIVERS B
          ON R.REQUESTERID = B.DRIVER_ID
      WHERE R.RESERVATIONID = :P804_RESERVATIONID

