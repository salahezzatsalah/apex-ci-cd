javascript: 
  function-and-global-variable-declaration: |
    async function filePopup(element) {
        const url = element.getAttribute('data-url');
        const type = element.getAttribute('data-type');
        const ext  = element.getAttribute('data-ext') || '';
        const filename = element.getAttribute('title') || 'file';
    
        if (!url) return alert("No file available.");
    
        const finalFilename = filename.includes('.') ? filename : filename + (ext.startsWith('.') ? ext : '.' + ext);
    
        // Remove any existing modal
        const existing = document.getElementById('file-display');
        if (existing) existing.remove();
        document.body.style.overflow = 'hidden';
    
        // Modal overlay
        const modal = document.createElement('div');
        modal.id = 'file-display';
        Object.assign(modal.style, {
            position:'fixed', top:0, left:0, width:'100%', height:'100%',
            backgroundColor:'rgba(0,0,0,0.6)', display:'flex',
            justifyContent:'center', alignItems:'center', zIndex:10000,
            animation:'fadeIn 0.3s', overflow:'auto'
        });
    
        // Modal card
        const card = document.createElement('div');
        Object.assign(card.style, {
            position: 'relative',
            backgroundColor: '#fff',
            borderRadius: '12px',
            boxShadow: '0 8px 24px rgba(0,0,0,0.3)',
            width: '90%',
            maxWidth: '900px',
            maxHeight: '90%',
            display: 'flex',
            flexDirection: 'column',
            overflow: 'hidden',
            animation: 'slideIn 0.3s'
        });
        modal.appendChild(card);
    
        // Close button
        const closeBtn = document.createElement('span');
        closeBtn.innerHTML = '&times;';
        Object.assign(closeBtn.style, {
            position:'absolute', top:'15px', right:'20px', fontSize:'28px',
            color:'#333', cursor:'pointer', fontWeight:'bold', zIndex:10
        });
        card.appendChild(closeBtn);
    
        // File info bar
        const infoBar = document.createElement('div');
        Object.assign(infoBar.style, {
            padding: '12px 20px',
            backgroundColor: '#f1f3f5',
            borderBottom: '1px solid #ddd',
            display: 'flex', justifyContent:'space-between', alignItems:'center'
        });
        const infoText = document.createElement('div');
        infoText.innerHTML = `<strong>${finalFilename}</strong> (${type.toUpperCase()})`;
        infoBar.appendChild(infoText);
    
        // Download button
        const downloadBtn = document.createElement('button');
        downloadBtn.innerText = '📥 Download';
        Object.assign(downloadBtn.style, {
            fontSize:'14px', color:'#fff', backgroundColor:'#1d72b8',
            padding:'6px 14px', borderRadius:'6px', border:'none',
            cursor:'pointer', fontWeight:'600', boxShadow:'0 3px 8px rgba(0,0,0,0.2)',
            transition:'all 0.3s'
        });
        downloadBtn.onmouseover = () => { downloadBtn.style.backgroundColor='#155a8a'; downloadBtn.style.transform='scale(1.05)'; };
        downloadBtn.onmouseout = () => { downloadBtn.style.backgroundColor='#1d72b8'; downloadBtn.style.transform='scale(1)'; };
        downloadBtn.onclick = async () => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = finalFilename;
                link.click();
                window.URL.revokeObjectURL(link.href);
            } catch { alert('Download failed.'); }
        };
        infoBar.appendChild(downloadBtn);
        card.appendChild(infoBar);
    
        // Content container
        const content = document.createElement('div');
        Object.assign(content.style, {
            flex: '1', display:'flex', justifyContent:'center', alignItems:'center',
            position:'relative', backgroundColor:'#000'
        });
        card.appendChild(content);
    
        const loading = document.createElement('div');
        loading.innerHTML = '🔄 Loading...';
        Object.assign(loading.style, { color:'#fff', fontSize:'18px', textAlign:'center' });
        content.appendChild(loading);
    
        // Render based on file type
        if(type === 'image'){
            const img = document.createElement('img');
            img.src = url;
            img.crossOrigin = 'anonymous';
            Object.assign(img.style, { maxWidth:'100%', maxHeight:'100%', objectFit:'contain' });
            img.onload = () => { loading.remove(); content.appendChild(img); };
            img.onerror = () => {
                loading.remove();
                const errMsg = document.createElement('div');
                errMsg.innerHTML = '❌ Failed to load image.';
                Object.assign(errMsg.style, { color:'#ff6b6b', fontSize:'18px', textAlign:'center' });
                content.appendChild(errMsg);
            };
        }
        else if(type === 'pdf'){
            const canvas = document.createElement('canvas');
            content.removeChild(loading);
            content.appendChild(canvas);
    
            const pdf = await pdfjsLib.getDocument(url).promise;
            let currentPage = 1, zoom = 1.2;
    
            const renderPage = (pageNum) => {
                pdf.getPage(pageNum).then(page => {
                    const viewport = page.getViewport({ scale: zoom });
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    page.render({ canvasContext: ctx, viewport: viewport });
                });
            };
            renderPage(currentPage);
    
            // PDF toolbar
            const toolbar = document.createElement('div');
            Object.assign(toolbar.style, {
                position:'absolute', bottom:'10px', left:'50%', transform:'translateX(-50%)',
                display:'flex', gap:'8px', backgroundColor:'rgba(0,0,0,0.6)', padding:'6px 10px',
                borderRadius:'6px'
            });
            const buttons = [
                {text:'⬅', action:()=>{ if(currentPage>1) currentPage--; renderPage(currentPage); }},
                {text:'➡', action:()=>{ if(currentPage<pdf.numPages) currentPage++; renderPage(currentPage); }},
                {text:'➕', action:()=>{ zoom+=0.2; renderPage(currentPage); }},
                {text:'➖', action:()=>{ zoom-=0.2; renderPage(currentPage); }}
            ];
            buttons.forEach(b=>{
                const btn = document.createElement('button');
                btn.textContent = b.text;
                Object.assign(btn.style, {
                    padding:'6px 10px', borderRadius:'6px', border:'none', cursor:'pointer',
                    backgroundColor:'#1d72b8', color:'#fff', fontWeight:'600', boxShadow:'0 2px 6px rgba(0,0,0,0.2)',
                    transition:'all 0.3s'
                });
                btn.onmouseover = ()=>{ btn.style.backgroundColor='#155a8a'; btn.style.transform='scale(1.1)'; };
                btn.onmouseout = ()=>{ btn.style.backgroundColor='#1d72b8'; btn.style.transform='scale(1)'; };
                btn.onclick = b.action;
                toolbar.appendChild(btn);
            });
            card.appendChild(toolbar);
        }
        else if(['word','excel','powerpoint'].includes(type)){
            const iframe = document.createElement('iframe');
            iframe.src = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(url);
            Object.assign(iframe.style, { width:'100%', height:'100%', border:'none' });
            loading.remove();
            content.appendChild(iframe);
        }
        else {
            loading.remove();
            const msg = document.createElement('div');
            msg.innerHTML = `<div style="text-align:center;color:#fff;"><div style="font-size:48px;margin-bottom:20px;">📄</div><h3>Preview Not Available</h3><p>Use download button to save the file.</p></div>`;
            content.appendChild(msg);
        }
    
        // Append modal
        document.body.appendChild(modal);
    
        // Close function
        const closeModal = () => {
            modal.remove();
            document.body.style.overflow = '';
            document.removeEventListener('keydown', escListener);
        };
    
        // Close events
        modal.onclick = e => { if(e.target === modal) closeModal(); };
        closeBtn.onclick = closeModal;
    
        // Escape key
        const escListener = e => { if(e.key === 'Escape') closeModal(); };
        document.addEventListener('keydown', escListener);
    
        // Animations
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn { from{opacity:0} to{opacity:1} }
            @keyframes slideIn { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
        `;
        document.head.appendChild(style);
    }
    

