- # ====== Region: DOCUMENTS ===================================
  id: 182329690915145512
  identification: 
    name: DOCUMENTS
    title: مستندات علي الحجز
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          R.ID,
          R.RESERVATIONID,
          R.DOCTYPE,
          R.POSTEDBY,
          E.FIRST_NAME || ' ' || E.LAST_NAME AS FULL_NAME,
          R.POSTDATETIME,
          COALESCE(JT.FILENAME_JSON, R.FILENAME) AS FILENAME,
          COALESCE(JT.DOC_URL_JSON, R.DOC_URL) AS DOC_URL,
          JT.JSON_ID AS JSON_ID,
          COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) AS FILE_EXT,
          CASE
              WHEN COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) IN ('jpg','jpeg','png','gif','bmp','webp') THEN
                  '<i class="fa fa-file-image-o fa-lg" style="color:#007bff; cursor:pointer;" ' ||
                  'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
                  'data-type="image" ' ||
                  'data-ext="' || COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) || '" ' ||
                  'onclick="filePopup(this)" ' ||
                  'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
              WHEN COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) = 'pdf' THEN
                  '<i class="fa fa-file-pdf-o fa-lg" style="color:#d9534f; cursor:pointer;" ' ||
                  'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
                  'data-type="pdf" ' ||
                  'data-ext="pdf" ' ||
                  'onclick="filePopup(this)" ' ||
                  'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
              WHEN COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) IN ('doc','docx') THEN
                  '<i class="fa fa-file-word-o fa-lg" style="color:#007bff; cursor:pointer;" ' ||
                  'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
                  'data-type="word" ' ||
                  'data-ext="docx" ' ||
                  'onclick="filePopup(this)" ' ||
                  'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
              WHEN COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) IN ('xls','xlsx','xlsm') THEN
                  '<i class="fa fa-file-excel-o fa-lg" style="color:#28a745; cursor:pointer;" ' ||
                  'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
                  'data-type="excel" ' ||
                  'data-ext="xlsx" ' ||
                  'onclick="filePopup(this)" ' ||
                  'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
              WHEN COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) IN ('ppt','pptx') THEN
                  '<i class="fa fa-file-powerpoint-o fa-lg" style="color:#ff5722; cursor:pointer;" ' ||
                  'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
                  'data-type="powerpoint" ' ||
                  'data-ext="pptx" ' ||
                  'onclick="filePopup(this)" ' ||
                  'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
      ELSE
          '<i class="fa fa-file-o fa-lg" style="color:#6c757d; cursor:pointer;" ' ||
          'data-url="' || COALESCE(JT.DOC_URL_JSON, R.DOC_URL) || '" ' ||
          'data-type="other" ' ||
          'data-ext="' || COALESCE(JT.FILE_EXT_JSON, R.FILE_EXT) || '" ' ||
          'onclick="filePopup(this)" ' ||
          'title="' || COALESCE(JT.FILENAME_JSON, R.FILENAME) || '"></i>'
          END AS DISPLAY_IMAGE
      FROM RESERVATIONDOCUMENT R
      JOIN BS_EMPLOYEES E ON R.POSTEDBY = E.ID
      LEFT JOIN JSON_TABLE(
          R.FILES_JSON,
          '$[*]' COLUMNS (
              JSON_ID       VARCHAR2(60) PATH '$.json_id',
              FILENAME_JSON VARCHAR2(200) PATH '$.filename',
              DOC_URL_JSON  VARCHAR2(4000) PATH '$.url',
              FILE_EXT_JSON VARCHAR2(20) PATH '$.file_ext'
          )
      ) JT ON 1=1
      WHERE R.RESERVATIONID = :P804_RESERVATIONID;
      

