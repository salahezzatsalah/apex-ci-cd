- # ====== Region: ReservationCollection =======================
  id: 182328353578145499
  identification: 
    name: ReservationCollection
    title: تحصيلات على الحجز
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
             R.COLLECTIONID,
             R.RELATEDRESID,
             R.PAYMENTDATE,
             R.CURRENCY,
             R.AMOUNT,
             R.NOTES,
             R.COLLECTEDBY,
             E1.FIRST_NAME || ' '|| E1.LAST_NAME AS COLLECTEDBY_NAME,
             R.POSTEDBY,
             E2.FIRST_NAME || ' '|| E2.LAST_NAME AS POSTEDBY_NAME,
             R.POSTDATETIME,
             R.METHOD,
             R.CURRENCYRATES,
             R.AMOUNT_EGP,
             F.CURRENCY_NAME_AR
      FROM COLLECTIONS R
      LEFT JOIN CURRENCIES F 
             ON R.CURRENCY = F.CURRENCY_CODE
      LEFT JOIN BS_EMPLOYEES E1 
             ON R.COLLECTEDBY = E1.ID
      LEFT JOIN BS_EMPLOYEES E2 
             ON R.POSTEDBY = E2.ID
      WHERE R.RELATEDRESID = :P804_RESERVATIONID;
      

  order-by: 
    type: None

