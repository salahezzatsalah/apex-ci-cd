- # ====== Region: ReservationComs =============================
  id: 182297339853205235
  identification: 
    name: ReservationComs
    title: عمولات على الحجز
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT  
          C.COMID,  
          C.RESERVATIONID,  
          C.COMTYPE,  
          C.COMNATURE,  
          C.PERCENTAGE,  
          C.CURRENCY,  
          F.CURRENCY_NAME_AR,
          C.CURRENCYRATES,  
          C.AMOUNT,  
          C.AMOUNT_EGP,  
          C.NOTES,  
          C.POSTEDBY,  
          C.POSTTIMEDATE,  
          C.RECEIVERID,  
          E.FIRST_NAME||' '|| E.LAST_NAME AS FULLNAME,
      
          -- ✅ Directly from join
          NVL(R.OfficeNetPreCom, 0)       AS OfficeNetPreCom,
          NVL(R.OfficeNetPreCom_EGP, 0)   AS OfficeNetPreCom_EGP,
          NVL(R.NIGHTS, 0)                AS NIGHTS,
      
          -- ✅ CommissionTotal in original currency
          CASE  
              WHEN C.COMNATURE = 'مبلغ محدد' THEN C.AMOUNT  
              WHEN C.COMNATURE = 'فرق سعر'  THEN C.AMOUNT * NVL(R.NIGHTS, 0)  
              WHEN C.COMNATURE = 'نسبة'     THEN (C.PERCENTAGE / 100) * NVL(R.OfficeNetPreCom, 0)  
              ELSE 0  
          END AS CommissionTotal,
      
          -- ✅ CommissionTotal in EGP
          CASE  
              WHEN C.COMNATURE = 'مبلغ محدد' THEN C.AMOUNT * C.CURRENCYRATES  
              WHEN C.COMNATURE = 'فرق سعر'  THEN C.AMOUNT * NVL(R.NIGHTS, 0) * C.CURRENCYRATES  
              WHEN C.COMNATURE = 'نسبة'     THEN (C.PERCENTAGE / 100) * NVL(R.OfficeNetPreCom_EGP, 0)  
              ELSE 0  
          END AS CommissionTotal_EGP,
      
          CASE 
              WHEN C.COMNATURE = 'نسبة' THEN TO_CHAR(C.PERCENTAGE) || ' %'
              ELSE TO_CHAR(C.AMOUNT) || ' ' || C.CURRENCY
          END AS DISPLAY_AMOUNT
      
      FROM APRTRESCOMMISSIONS C
      JOIN BS_EMPLOYEES E ON
      C.POSTEDBY=E.ID
      JOIN  CURRENCIES F ON
      C.CURRENCY=F.CURRENCY_CODE
      JOIN APARTMENTRESERVATIONS R 
        ON R.RESERVATIONID = C.RESERVATIONID
      WHERE R.RESERVATIONID = :P804_RESERVATIONID;
      

  order-by: 
    type: None

  layout: 
    sequence: 50
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: false
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    layout: 
      number-of-rows-type: Static Value
      number-of-rows: 5

    appearance: 
      template-type: Theme
      template: Standard
