- # ====== Region: Drivers Accounts  ===========================
  id: 20940385890582716152
  identification: 
    name: 'Drivers Accounts '
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         d.DRIVER_ID AS id,
         d.DRIVER_NAME,
         d.NATIONAL_ID,
         d.LICENSE_NUMBER,
         d.LICENSE_EXPIRY_DATE,
         d.PHONE,
         d.EMAIL,
         SUBSTR(d.EMAIL, INSTR(d.EMAIL, '@') + 1) AS email_domain,
         d.CITY,
         (
           SELECT COUNTRY_NAME || ' (' || REGION || ')' 
           FROM SP_COUNTRIES c 
           WHERE c.ID = d.COUNTRY_ID
         ) AS country,
         d.ADDRESS,
         d.STATUS,
         d.HAS_PORTAL_ACCESS,
         d.USERNAME,
         d.CREATED,
         d.CREATED_BY,
         d.UPDATED,
         d.UPDATED_BY,
         d.NOTES,
         d.PHOTO_URL,
        
         CASE 
           WHEN d.PHOTO_URL IS NOT NULL AND DBMS_LOB.GETLENGTH(d.PROFILE_PHOTO) > 0 THEN 'نعم'
           ELSE 'لا'
         END AS has_profile_photo,
         d.EMPLOYEE_CODE,
         d.JOIN_DATE,
         d.DRIVER_LEVEL,
         d.CONTRACT_TYPE,
         d.IS_ACTIVE_EMPLOYEE,
         d.DEPARTMENT_ID,
         (
           SELECT u.ROLE_IDS
           FROM APEX_APPL_ACL_USERS u
           WHERE u.APPLICATION_ID = :APP_ID
             AND LOWER(u.USER_NAME) = LOWER(d.USERNAME)
           FETCH FIRST 1 ROWS ONLY
         ) AS app_role
      FROM COMPANY_DRIVERS d;
      

  order-by: 
    type: Item
    item: 
      item-name: P364_ORDER_BY
      order-bys: 
      - key: EMAIL
        clause: email

  layout: 
    sequence: 33
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: true
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&SUPPLIER_NAME!HTML.'
      description: |
        &PHONE. - &EMAIL!HTML.
        {if SUPPLIER_TYPE_ID/}<br>تصنيف الملف: &SUPPLIER_TYPE_ID.{endif/}
        {if NOTES/}<br>ملاحظات: &NOTES.{endif/}
        
      miscellaneous: 'عدد مرفقات: <strong>&ATTACHMENTS_COUNT.</strong><br>'
      display-avatar: true
      display-badge: false

    avatar: 
      type: Image
      image: 
        url: '&PHOTO_URL.'

      shape: Rounded
      size: Default

    appearance: 
      apply-theme-colors: true
      style: Default
      hide-borders: false
      remove-padding: false

    row-selection: 
      type: None

    performance: 
      lazy-loading: false

    pagination: 
      type: Page
      entities-per-page: 15
      show-total-count: false

