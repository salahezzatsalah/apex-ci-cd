- # ====== Region: Current Active Trip =========================
  id: 277027816414043633
  identification: 
    name: Current Active Trip
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html               CLOB;
        v_trip_index         INTEGER := 0;
        v_car_photo_url      VARCHAR2(1000);
        v_is_active          INTEGER;
        v_classification_ar  VARCHAR2(100);
        v_trip_type_ar       VARCHAR2(100);
          l_today_local DATE;
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
          l_today_local := TRUNC(CONVERT_TO_LOCAL_TIMEZONE(SYSTIMESTAMP));
      
        FOR rec IN (
          SELECT *
          FROM VW_LIMO_PRODUCT_OVERVIEW
          WHERE CURRENT_DRIVER_ID = :APP_USER_ID
            AND TRUNC(CONVERT_TO_LOCAL_TIMEZONE(SYSTIMESTAMP)) BETWEEN 
                TRUNC(CONVERT_TO_LOCAL_TIMEZONE(TRIP_DATE_FROM)) 
                AND TRUNC(NVL(CONVERT_TO_LOCAL_TIMEZONE(TRIP_DATE_TO), CONVERT_TO_LOCAL_TIMEZONE(TRIP_DATE_FROM)))
          ORDER BY PICK_UP_TIME
        ) LOOP
          v_trip_index := v_trip_index + 1;
      
          -- Check if active trip exists for this product
          SELECT CASE WHEN COUNT(*) > 0 THEN 1 ELSE 0 END INTO v_is_active
          FROM VW_CURRENT_ACTIVE_LIMO_TRIP
          WHERE PRODUCT_ID = rec.PRODUCT_ID;
      
          -- Car image URL
          v_car_photo_url := CASE
            WHEN rec.CAR_TYPE_ID IS NOT NULL THEN
              'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/car-catalog-pic/' || rec.CAR_TYPE_ID
            ELSE
              'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/car-catalog-pic/placeholder'
          END;
      
          -- Translate trip and classification types
          v_classification_ar := CASE rec.CLASSIFICATION_TYPE
            WHEN 'WELCOME' THEN 'استقبال'
            WHEN 'LOCAL' THEN 'داخلي'
            ELSE rec.CLASSIFICATION_TYPE
          END;
      
          v_trip_type_ar := CASE rec.TRIP_TYPE
            WHEN 'TRANSFER' THEN 'توصيلة'
            WHEN 'DAILY' THEN 'يومية'
            ELSE rec.TRIP_TYPE
          END;
      
          -- Append HTML
          DBMS_LOB.APPEND(l_html, '
          <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6001:' || :APP_SESSION || '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID) || '" 
             class="block transition hover:shadow-md bg-white rounded-xl border border-gray-200 p-4 mb-4 space-y-2">
            
            <div class="flex items-center gap-3">
              <img src="' || v_car_photo_url || '" class="w-14 h-12 object-contain rounded border">
              <div class="flex-1 text-sm text-gray-800">
                <div class="font-bold text-gray-900">' || rec.FULL_NAME || '</div>
                <div class="text-xs text-gray-500 mt-0.5">
                  <i class="fa6 fa6-id-card ml-1"></i> كود العميل: ' || rec.CLIENT_CODE || '
                  &nbsp; <i class="fa6 fa6-hashtag ml-1"></i> رقم الرحلة: ' || rec.PRODUCT_ID || '
                  ' || CASE WHEN rec.CLASSIFICATION_TYPE = 'WELCOME' THEN
                    '<br><span class="text-gray-400 text-xs">🎟 ' || NVL(rec.TICKET_NUMBER,'') || 
                    ' &nbsp; 🪧 ' || NVL(rec.SIGNAGE_DETAILS,'') || 
                    ' &nbsp; 📝 ' || NVL(rec.TRIP_NOTES,'') || '</span>'
                  ELSE '' END || '
                </div>
              </div>
              ' || CASE WHEN v_is_active = 1 THEN
                '<div class="ml-auto text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded-full">🚘 نشطة الآن</div>'
              ELSE '' END || '
            </div>
      
            <div class="flex flex-wrap items-center justify-between text-sm text-gray-700 gap-2 mt-2">
              <div class="flex items-center gap-2">
                <i class="fa6 fa6-clock ml-1 text-gray-500"></i> ' || TO_CHAR(rec.PICK_UP_TIME_LOCAL, 'HH24:MI') || '
                <span class="text-gray-400 mx-1">|</span>
                <i class="fa6 fa6-map-location-dot ml-1 text-gray-500"></i> ' || rec.FROM_LOCATION || '
                <i class="fa6 fa6-arrow-left-long mx-1 text-gray-400"></i>
                ' || rec.TO_LOCATION || '
              </div>
      
              <div class="flex items-center gap-2 text-xs font-semibold">
                <span class="bg-blue-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-layer-group text-white"></i> ' || v_classification_ar || '
                </span>
                <span class="bg-blue-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-car-side text-white"></i> ' || v_trip_type_ar || '
                </span>
                ' || CASE WHEN rec.TRIP_TYPE = 'DAILY' THEN
                  '<span class="bg-gray-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                    <i class="fa6 fa6-calendar-day text-white"></i> ' || rec.TRIPS_COUNT || ' / ' || rec.TOTAL_DAYS || '
                  </span>'
                ELSE '' END || '
              </div>
            </div>
      
            <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden mt-2">
              <div class="h-full bg-blue-600 transition-all" style="width:' || rec.TRIP_PROGRESS_PCT || '%"></div>
            </div>
          </a>');
        END LOOP;
      
        IF v_trip_index = 0 THEN
          DBMS_LOB.APPEND(l_html, '
          <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-center font-semibold flex flex-col items-center gap-2 mt-6">
            <i class="fa6 fa6-circle-exclamation text-2xl"></i>
            لا توجد أي رحلات نشطة حالياً.
          </div>');
        END IF;
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - APP_USER_ID

  layout: 
    sequence: 95
    parent-region: Current Trips # 270246556282186760
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: None
    render-components: Above Content

  advanced: 
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

- # ====== Region: Previous Trips ==============================
  id: 277027906580043634
  identification: 
    name: Previous Trips
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html               CLOB;
        v_trip_index         INTEGER := 0;
        v_classification_ar  VARCHAR2(100);
        v_trip_type_ar       VARCHAR2(100);
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        -- Start container with required region ID
        DBMS_LOB.APPEND(l_html, q'[
          <div id="previous-trips-region">
      
            <div class="mb-3">
              <input type="text" id="searchPreviousTrips" placeholder="ابحث عن الرحلة..." 
                     class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300 text-right" 
                     onkeyup="filterPreviousTrips(this.value)">
            </div>
      
            <script>
              function filterPreviousTrips(term) {
                const cards = document.querySelectorAll('#previous-trips-region .previous-trip-card');
                term = term.trim().toLowerCase();
                cards.forEach(card => {
                  card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
                });
              }
            </script>
        ]');
      
        FOR rec IN (
      SELECT
        p.*,
        a.DRIVER_STATUS
      FROM
        VW_LIMO_PRODUCT_OVERVIEW p
      JOIN
        LIMO_PRODUCT_ASSIGNMENTS a
        ON a.PRODUCT_ID = p.PRODUCT_ID
      WHERE
        a.DRIVER_ID = :APP_USER_ID
        AND (
          -- Either not current assignment
          a.DRIVER_STATUS <> 'CURRENT'
          OR
          (
            a.DRIVER_STATUS = 'CURRENT'
            AND (
              -- All trips completed
              (p.TOTAL_DAYS IS NOT NULL AND p.TRIPS_COUNT >= p.TOTAL_DAYS)
             
            ) or TRIP_DATE_TO < SYSDATE
          )
        )
      ORDER BY
        p.PICK_UP_TIME DESC
      
        ) LOOP
          v_trip_index := v_trip_index + 1;
      
          v_classification_ar := CASE rec.CLASSIFICATION_TYPE
            WHEN 'WELCOME' THEN 'استقبال'
            WHEN 'LOCAL' THEN 'داخلي'
            ELSE rec.CLASSIFICATION_TYPE
          END;
      
          v_trip_type_ar := CASE rec.TRIP_TYPE
            WHEN 'TRANSFER' THEN 'توصيلة'
            WHEN 'DAILY' THEN 'يومية'
            ELSE rec.TRIP_TYPE
          END;
      
          DBMS_LOB.APPEND(l_html, '
          <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6001:' || :APP_SESSION || '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID) || '" 
             class="block previous-trip-card transition hover:shadow-md bg-white rounded-xl border border-gray-200 p-4 mb-4 space-y-2">
            
            <div class="flex items-center gap-3">
              <img src="' || rec.CAR_PHOTO_URL || '" class="w-14 h-12 object-contain rounded border">
              <div class="flex-1 text-sm text-gray-800">
                <div class="font-bold text-gray-900">' || rec.FULL_NAME || '</div>
                <div class="text-xs text-gray-500 mt-0.5">
                  <i class="fa6 fa6-id-card ml-1"></i> كود العميل: ' || rec.CLIENT_CODE || '
                  &nbsp; <i class="fa6 fa6-hashtag ml-1"></i> رقم الرحلة: ' || rec.PRODUCT_ID || '
                  ' || CASE WHEN rec.CLASSIFICATION_TYPE = 'WELCOME' THEN
                    '<br><span class="text-gray-400 text-xs">🎟 ' || NVL(rec.TICKET_NUMBER,'') || 
                    ' &nbsp; 🪧 ' || NVL(rec.SIGNAGE_DETAILS,'') || 
                    ' &nbsp; 📝 ' || NVL(rec.TRIP_NOTES,'') || '</span>'
                  ELSE '' END || '
                </div>
              </div>
            </div>
      
            <div class="flex flex-wrap items-center justify-between text-sm text-gray-700 gap-2 mt-2">
              <div class="flex items-center gap-2">
                <i class="fa6 fa6-clock ml-1 text-gray-500"></i> ' || TO_CHAR(rec.PICK_UP_TIME_LOCAL, 'HH24:MI') || '
                <span class="text-gray-400 mx-1">|</span>
                <i class="fa6 fa6-map-location-dot ml-1 text-gray-500"></i> ' || rec.FROM_LOCATION || '
                <i class="fa6 fa6-arrow-left-long mx-1 text-gray-400"></i>
                ' || rec.TO_LOCATION || '
              </div>
      
              <div class="flex items-center gap-2 text-xs font-semibold">
                <span class="bg-gray-500 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-layer-group text-white"></i> ' || v_classification_ar || '
                </span>
                <span class="bg-gray-500 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-car-side text-white"></i> ' || v_trip_type_ar || '
                </span>
                ' || CASE WHEN rec.TRIP_TYPE = 'DAILY' THEN
                  '<span class="bg-gray-700 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                    <i class="fa6 fa6-calendar-day text-white"></i> ' || rec.TRIPS_COUNT || ' / ' || rec.TOTAL_DAYS || '
                  </span>'
                ELSE '' END || '
              </div>
            </div>
      
            <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden mt-2">
              <div class="h-full bg-gray-400 transition-all" style="width:' || rec.TRIP_PROGRESS_PCT || '%"></div>
            </div>
          </a>');
        END LOOP;
      
        IF v_trip_index = 0 THEN
          DBMS_LOB.APPEND(l_html, '
          <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-center font-semibold flex flex-col items-center gap-2 mt-6">
            <i class="fa6 fa6-circle-info text-2xl"></i>
            لا توجد أي رحلات سابقة مرتبطة بك.
          </div>');
        END IF;
      
        -- Close outer region div
        DBMS_LOB.APPEND(l_html, '</div>');
      
        RETURN l_html;
      END;
      
