- # ====== Region: Notifications ===============================
  id: 15028467440445548563
  identification: 
    name: Notifications
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      declare
         l_return clob;
         l_count  int := 0;
         l_user_tags varchar2(4000) := null;
      begin
         for c1 in (select upper(tags) tags from sp_team_members where id = :APP_USER_ID and tags is not null) loop
             l_user_tags := c1.tags;
         end loop;
         for c1 in (
            select notification_description 
            from SP_APPLICATION_NOTIFICATIONS 
            where (from_date is null or sysdate >= from_date) and
                  (to_date   is null or sysdate <= to_date) and 
                  (required_user_tag is null or instr(l_user_tags,required_user_tag) > 0) and
                  is_active_yn = 'Y') loop
            --
            --
            --
            l_count := l_count + 1;
            if l_count = 2 then 
                l_return := '<ul><li>'||l_return||'</li>';
            end if;
            if l_count >= 2 then
               l_return := l_return||'<li>';
            end if;
            l_return := l_return||apex_escape.html(c1.notification_description);
            if l_count >= 2 then
               l_return := l_return||'</li>';
            end if;
         end loop;
         --
         --
         --
         if l_count >= 2 then
            l_return := l_return||'</ul>';
         end if;
         --
         --
         --
         return l_return;
      end;
      

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Alert
    template-options: 
    - '#DEFAULT#'
    - t-Alert--horizontal
    - t-Alert--defaultIcons
    - t-Alert--info
    - t-Alert--accessibleHeading
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-side-condition: 
    type: Rows returned
    sql-query: |
      select 1 
      from SP_APPLICATION_NOTIFICATIONS n
      where (from_date is null or sysdate >= from_date) and
            (to_date   is null or sysdate <= to_date) and 
            is_active_yn = 'Y' and
            (n.required_user_tag is null or exists (
                select 1
                from sp_team_members tm
                where tm.id = :APP_USER_ID and 
                      tm.tags is not null and
                      instr(upper(tm.tags),upper(n.required_user_tag)) > 0
            )
            )

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

