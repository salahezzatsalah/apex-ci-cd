- # ====== Process: log create =================================
  id: 14582813251320862008
  identification: 
    name: log create
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      for c1 in (
          select role_name
            from APEX_APPL_ACL_ROLES
           where application_id = :APP_ID 
             and role_id = :P10012_ROLE_IDS
      ) loop
          insert into sp_app_log
              (activity, details)
          values
              ('Added User', lower(:P10012_USER_NAME)||' (role: '||c1.role_name||')');
      end loop;

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 149832839242328023847

- # ====== Process: log update =================================
  id: 14582813391806862009
  identification: 
    name: log update
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      for c1 in (
          select role_name
            from APEX_APPL_ACL_ROLES
           where application_id = :APP_ID 
             and role_id = :P10012_ROLE_IDS
      ) loop
          if :P10012_OLD_ROLE_NAME != c1.role_name then
              insert into sp_app_log
                  (activity, details)
              values
                  ('Updated User', lower(:P10012_USER_NAME) ||' (role changed from '||:P10012_OLD_ROLE_NAME ||' to '||c1.role_name||')');
          end if;
      end loop;

  execution: 
    sequence: 40
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SAVE # 149832838892195023847

