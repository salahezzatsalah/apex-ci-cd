validations: 
- # ====== Validation: email valid =============================
  id: 27407620534533940914
  identification: 
    name: email valid

  execution: 
    sequence: 20

  validation: 
    type: Item matches Regular Expression
    item: P10012_USER_NAME
    regular-expression: '[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}'
    always-execute: false

  error: 
    error-message: Username must be a valid email
    display-location: Inline with Field and in Notification
    associated-item: P10012_USER_NAME # 149832840378422023848

  server-side-condition: 
    when-button-pressed: CREATE # 149832839242328023847
    type: Never

- # ====== Validation: Cannot remove yourself from administrator
  id: 149832842037313023857
  identification: 
    name: Cannot remove yourself from administrator

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      if :P10012_USER_NAME = :APP_USER and
          apex_acl.is_role_removed_from_user (
              p_application_id => :APP_ID,
              p_user_name      => :APP_USER,
              p_role_static_id => 'ADMINISTRATOR',
              p_role_ids       => apex_string.split_numbers(
                                      p_str => case when :REQUEST = 'DELETE' then
                                                   null
                                               else
                                                   :P10012_ROLE_IDS
                                               end,
                                      p_sep => ':') ) then
          return false;
      else
          return true;
      end if;
    always-execute: false

  error: 
    error-message: You cannot remove administrator role from yourself.
    display-location: Inline in Notification

