- # ====== Region: result ======================================
  id: 337062371001299872
  identification: 
    name: result
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html   CLOB;
      
        l_km     NUMBER := NVL(:P273_DISTANCE_KM, 0);
      
        l_is_airport VARCHAR2(1) := CASE WHEN :P273_SERVICETYPE = 'AIRPORT' THEN 'Y' ELSE 'N' END;
      
        l_ret_yn VARCHAR2(1) := CASE
          WHEN :P273_SERVICETYPE = 'AIRPORT' THEN NVL(:P273_IS_RETURN,'N')
          ELSE 'N'
        END;
      
        l_mult NUMBER := CASE
          WHEN :P273_SERVICETYPE = 'AIRPORT' AND NVL(:P273_IS_RETURN,'N') = 'Y' THEN 2
          ELSE 1
        END;
      
        l_daily_hours CONSTANT NUMBER := 12;
      
        PROCEDURE add(p_txt IN CLOB) IS
        BEGIN
          IF p_txt IS NOT NULL THEN
            DBMS_LOB.APPEND(l_html, p_txt);
          END IF;
        END;
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
        FUNCTION jsq(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN REPLACE(NVL(p_txt,''), '''', '\''' );
        END;
      
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        /* ====== CSS + JS ====== */
        add(TO_CLOB(q'~
      <style>
      .car-wrap{direction:rtl;font-family:Cairo,Inter,sans-serif;}
      .car-top{display:grid;grid-template-columns:1fr 160px 160px auto;gap:8px;margin-bottom:14px;}
      .car-search,.car-filter{background:#fff;border:1px solid #cbd5e1;border-radius:9px;padding:7px 10px;font-size:11px;}
      .car-count{font-size:11px;color:#64748b;align-self:center;}
      .bulk-btn{background:#0f172a;color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:800;cursor:pointer;padding:7px 12px;}
      
      .car-grid{display:grid;gap:12px;}
      @media(min-width:640px){.car-grid{grid-template-columns:repeat(2,1fr);}}
      @media(min-width:1280px){.car-grid{grid-template-columns:repeat(3,1fr);}}
      
      .car-ticket{border-radius:14px;background:#fff;border:1px solid rgba(15,23,42,.1);box-shadow:0 6px 18px rgba(0,0,0,.06);overflow:hidden;transition:.15s;cursor:pointer;}
      .car-ticket:hover{transform:translateY(-2px);}
      .car-head{display:flex;gap:10px;padding:12px;}
      .car-photo{width:56px;height:56px;border-radius:12px;border:1px solid #e2e8f0;object-fit:cover;}
      .car-title{font-size:13px;font-weight:900;}
      .car-meta{font-size:10px;color:#475569;margin-top:3px;font-weight:700;line-height:1.6}
      
      .badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:999px;font-weight:800;margin-top:6px;}
      .badge-ok{background:#ecfdf5;color:#065f46;}
      .badge-warn{background:#fff7ed;color:#9a3412;}
      .badge-miss{background:#fee2e2;color:#991b1b;}
      
      .car-body{padding:0 12px 10px;}
      .car-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px dashed #cbd5e1;padding-top:8px;}
      .price-box{text-align:center;background:#f8fafc;border-radius:8px;padding:6px 4px;}
      .price-label{font-size:10px;color:#64748b;}
      .price-val{font-size:11px;font-weight:900;}
      .price-empty{color:#94a3b8;}
      
      .car-actions{display:flex;gap:6px;padding:10px;border-top:1px solid #f1f5f9;}
      .btn{flex:1;font-size:11px;font-weight:900;padding:7px;border-radius:9px;border:1px solid #cbd5e1;cursor:pointer;text-align:center;}
      .btn-select{background:#0b2a4a;color:#fff;}
      .btn-details{background:#fff;color:#0b2a4a;}
      
      .car-ticket.is-selected{
        outline:2px solid #0b2a4a;
        box-shadow:0 10px 24px rgba(11,42,74,.18);
      }
      </style>
      
      <script>
      (function () {
        function getApex(){
          var w = window;
          for (var i=0; i<10; i++){
            if (w && w.apex) return w.apex;
            if (!w || !w.parent || w === w.parent) break;
            w = w.parent;
          }
          return null;
        }
      
        window.filterCars = function(){
          var q   = (document.getElementById("carSearch").value||'').toLowerCase();
          var cat = document.getElementById("catFilter").value;
          var cap = document.getElementById("capFilter").value;
      
          var cards = document.querySelectorAll(".car-ticket");
          var count = 0;
      
          cards.forEach(function(c){
            var s  = (c.dataset.search||'');
            var c1 = (c.dataset.cat||'');
            var c2 = (c.dataset.cap||'0');
            var capVal = parseInt(c2,10)||0;
      
            var ok = true;
            if(q && !s.includes(q)) ok=false;
            if(cat && c1!==cat) ok=false;
            if(cap && capVal < parseInt(cap,10)) ok=false;
      
            c.style.display = ok ? '' : 'none';
            if(ok) count++;
          });
      
          var cc = document.getElementById("carCount");
          if(cc) cc.innerHTML = "النتائج: " + count;
        };
      
        function initFilters(){
          var catSel = document.getElementById("catFilter");
          if(!catSel) return;
      
          var cats = new Set();
          document.querySelectorAll(".car-ticket").forEach(function(c){
            if(c.dataset.cat) cats.add(c.dataset.cat);
          });
      
          Array.from(cats).sort().forEach(function(v){
            var o=document.createElement("option");
            o.value=v; o.textContent=v;
            catSel.appendChild(o);
          });
      
          window.filterCars();
        }
      
        window.openDetails = function(url, ev){
          if(ev){ ev.preventDefault(); ev.stopPropagation(); }
          var A = getApex();
          if(!A){ alert("APEX is not loaded"); return; }
          A.navigation.redirect(url);
        };
      
        window.selectCar = function(carId, total, curr, ev){
          if(ev){ ev.preventDefault(); ev.stopPropagation(); }
      
          document.querySelectorAll(".car-ticket").forEach(function(x){
            x.classList.remove("is-selected");
          });
      
          var card = document.querySelector('.car-ticket[data-id="'+ carId +'"]')
          if(card) card.classList.add("is-selected");
      
          var A = getApex();
          if(A){
            if(A.item("P274_SELECTED_CAR_ID")) A.item("P274_SELECTED_CAR_ID").setValue(carId);
            if(A.item("P274_SELECTED_TOTAL"))  A.item("P274_SELECTED_TOTAL").setValue(total);
            if(A.item("P274_SELECTED_CURR"))   A.item("P274_SELECTED_CURR").setValue(curr);
          }
        };
      
        document.addEventListener("DOMContentLoaded", initFilters);
      })();
      </script>
      ~'));
      
        /* ====== Wrapper + Filters UI ====== */
        add(TO_CLOB('
      <div class="car-wrap">
        <div class="car-top">
          <input id="carSearch" class="car-search" placeholder="بحث..." oninput="filterCars()"/>
          <select id="catFilter" class="car-filter" onchange="filterCars()">
            <option value="">كل الفئات</option>
          </select>
          <select id="capFilter" class="car-filter" onchange="filterCars()">
            <option value="">كل السعات</option>
            <option value="2">2+</option>
            <option value="4">4+</option>
            <option value="6">6+</option>
            <option value="8">8+</option>
          </select>
          <button class="bulk-btn" type="button">تسعير جماعي</button>
          <div class="car-count" id="carCount"></div>
        </div>
      
        <div class="car-grid">
      '));
      
        /* ====== Cards Loop ====== */
        FOR r IN (
          SELECT
            v.ID,
            v.CAR_TYPE_NAME,
            v.CATEGORY,
            v.SEATS,
      
            /* KM price from view */
            v.CURRENT_PRICE_NUMERIC AS PRICE_PER_KM,
      
            /* Hour price from pricing pkg */
            LIMO_CATALOG_PKG.get_hour_price(v.ID, 1) AS PRICE_PER_HOUR,
      
            v.CURRENT_CURRENCY AS CURR,
            NVL(v.MAIN_PHOTO_URL, '#APP_FILES#placeholders/unknown-car.png') AS IMG_URL,
      
            ROUND(
              CASE
                WHEN :P273_SERVICETYPE = 'DAILY'
                  THEN NVL(LIMO_CATALOG_PKG.get_hour_price(v.ID,1),0) * l_daily_hours
                ELSE
                  l_km * NVL(v.CURRENT_PRICE_NUMERIC,0) * l_mult
              END
            , 2) AS TOTAL_PRICE
      
          FROM VW_ALL_CAR_TYPES v
          WHERE UPPER(TRIM(NVL(v.STATUS,'ACTIVE'))) = 'ACTIVE'
          ORDER BY TOTAL_PRICE NULLS LAST, v.CAR_TYPE_NAME
        ) LOOP
      
          DECLARE
            l_badge VARCHAR2(400);
            l_price_label VARCHAR2(50);
            l_price_value VARCHAR2(200);
            l_middle_label VARCHAR2(50);
            l_middle_value VARCHAR2(50);
          BEGIN
      
            /* Labels depending on service type */
            IF :P273_SERVICETYPE = 'DAILY' THEN
              l_price_label := 'السعر / ساعة';
              l_price_value := NVL(TO_CHAR(r.PRICE_PER_HOUR),'—') || ' ' || esc(NVL(r.CURR,''));
              l_middle_label := 'عدد الساعات';
              l_middle_value := TO_CHAR(l_daily_hours);
            ELSE
              l_price_label := 'السعر / KM';
              l_price_value := NVL(TO_CHAR(r.PRICE_PER_KM),'—') || ' ' || esc(NVL(r.CURR,''));
              l_middle_label := 'Return';
              l_middle_value := CASE WHEN l_ret_yn='Y' THEN 'نعم' ELSE 'لا' END;
            END IF;
      
            /* Badge */
            IF :P273_SERVICETYPE = 'DAILY' THEN
              IF r.PRICE_PER_HOUR IS NULL THEN
                l_badge := '<span class="badge badge-miss">لا يوجد سعر / ساعة</span>';
              ELSE
                l_badge := '<span class="badge badge-ok">متاح</span>';
              END IF;
            ELSE
              IF r.PRICE_PER_KM IS NULL THEN
                l_badge := '<span class="badge badge-miss">لا يوجد سعر / KM</span>';
              ELSIF l_ret_yn = 'Y' THEN
                l_badge := '<span class="badge badge-warn">Return x2</span>';
              ELSE
                l_badge := '<span class="badge badge-ok">متاح</span>';
              END IF;
            END IF;
      
            add(TO_CLOB('
      <div class="car-ticket"
           data-id="'||esc(r.ID)||'"
           data-search="'||LOWER(esc(r.CAR_TYPE_NAME||' '||r.ID))||'"
           data-cat="'||esc(NVL(r.CATEGORY,'-'))||'"
           data-cap="'||NVL(TO_CHAR(r.SEATS),'0')||'"
           onclick="selectCar(&quot;'||jsq(r.ID)||'&quot;,'||NVL(TO_CHAR(r.TOTAL_PRICE),'0')||',&quot;'||jsq(r.CURR)||'&quot;,event)">
      
        <div class="car-head">
          <img class="car-photo" src="'||esc(r.IMG_URL)||'" />
          <div>
            <div class="car-title">'||esc(r.CAR_TYPE_NAME)||'</div>
      
            <div class="car-meta">
              الفئة: '||esc(NVL(r.CATEGORY,'-'))||' |
              المقاعد: '||esc(NVL(TO_CHAR(r.SEATS),'-'))||'<br>
              '||CASE WHEN :P273_SERVICETYPE <> 'DAILY'
                     THEN 'المسافة: '||esc(TO_CHAR(l_km))||' KM'
                     ELSE 'خدمة يومية (12 ساعة)'
                END||'
            </div>
      
            '||l_badge||'
          </div>
        </div>
      
        <div class="car-body">
          <div class="car-prices">
      
            <div class="price-box">
              <div class="price-label">'||esc(l_price_label)||'</div>
              <div class="price-val '||
                CASE
                  WHEN (:P273_SERVICETYPE = 'DAILY' AND r.PRICE_PER_HOUR IS NULL) OR
                       (:P273_SERVICETYPE <> 'DAILY' AND r.PRICE_PER_KM IS NULL)
                  THEN 'price-empty'
                END
              ||'">'||l_price_value||'</div>
            </div>
      
            <div class="price-box">
              <div class="price-label">'||esc(l_middle_label)||'</div>
              <div class="price-val">'||esc(l_middle_value)||'</div>
            </div>
      
            <div class="price-box">
              <div class="price-label">الإجمالي</div>
              <div class="price-val">'||TO_CHAR(NVL(r.TOTAL_PRICE,0))||' '||esc(NVL(r.CURR,''))||'</div>
            </div>
      
          </div>
        </div>
      
        <div class="car-actions">
      
          <div class="btn btn-select"
               onclick="selectCar(&quot;'||jsq(r.ID)||'&quot;,'||NVL(TO_CHAR(r.TOTAL_PRICE),'0')||',&quot;'||jsq(r.CURR)||'&quot;,event)">
            اختيار
          </div>
      
          <div class="btn btn-details"
               onclick="openDetails(&quot;'||
                 jsq('f?p='||:APP_ID||':279:'||:APP_SESSION||'::NO::P279_CAR_TYPE_ID:'||r.ID)
               ||'&quot;,event)">
            تفاصيل
          </div>
      
        </div>
      
      </div>
      '));
          END;
        END LOOP;
      
        /* ====== Close Wrapper ====== */
        add(TO_CLOB('
        </div>
      </div>
      '));
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P273_DISTANCE_KM
    - P273_IS_RETURN

