javascript: 
  file-urls: 
  - 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCHHyMsTG-SA9k9A4WKo_jGMd3e7uR5zxU&libraries=places&loading=async'
  execute-when-page-loads: |
    (async function () {
      async function waitForGoogle() {
        for (let i = 0; i < 60; i++) {
          if (window.google && google.maps && google.maps.importLibrary) return;
          await new Promise(r => setTimeout(r, 200));
        }
        throw new Error("Google Maps JS not ready");
      }
    
      async function mountPAC(slotId, textItem, placeIdItem, placeholder, cfg) {
        const slot = document.getElementById(slotId);
        if (!slot) {
          console.warn("Slot not found:", slotId);
          return;
        }
    
        await waitForGoogle();
        const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");
    
        slot.innerHTML = "";
    
        // ✅ أنشئ الويدجت
        const pac = new PlaceAutocompleteElement();
    
        // ✅ إعدادات حسب المطلوب
        if (cfg?.includedPrimaryTypes) pac.includedPrimaryTypes = cfg.includedPrimaryTypes;
        if (cfg?.includedRegionCodes)  pac.includedRegionCodes  = cfg.includedRegionCodes;
    
        pac.placeholder = placeholder || "";
        pac.style.width = "100%";
        slot.appendChild(pac);
    
        pac.addEventListener("gmp-select", async (e) => {
          const pred = e.placePrediction;
          if (!pred) return;
    
          const place = pred.toPlace();
          await place.fetchFields({ fields: ["formattedAddress", "displayName"] });
    
          const label = place.formattedAddress || place.displayName || "";
          const pid   = place.id || pred.placeId || "";
    
          // ✅ عبّي الـ items القديمة (زي ما انتي عايزة)
          apex.item(textItem).setValue(label);
          apex.item(placeIdItem).setValue(pid);
        });
      }
    
      apex.jQuery(async function () {
        // ✅ FROM: مطارات داخل مصر فقط
        await mountPAC(
          "PAC_FROM_SLOT",
          "P273_AIRPORT_FROM",
          "P273_FROM_PLACE_ID",
          "من (مطار داخل مصر)",
          {
            includedPrimaryTypes: ["airport"],
            includedRegionCodes: ["eg"]
          }
        );
    
        // ✅ TO: أي مكان عادي (بدون قيود)
        await mountPAC(
          "PAC_TO_SLOT",
          "P273_AIRPORT_TO",
          "P273_TO_PLACE_ID",
          "إلى (أي مكان)",
          {
            // لا نمرر أي includedPrimaryTypes ولا includedRegionCodes
          }
        );
    
        console.log("✅ FROM airports(EG) + TO any place");
      });
    })();
    
    
    
    

css: 
  inline: |
    .airport-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    
    /* كل فيلد */
    .airport-field {
      background: #ffffff;
      color: #000;       /* أسود أنيق */
      border-radius: 12px;
      padding: 14px 16px;
      position: relative;
      box-shadow: 0 6px 18px rgba(0,0,0,.35);
    }
    
    /* الليبل */
    .airport-label {
      display: block;
      font-size: 13px;
      color: #cfcfcf;
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    /* عنصر Google نفسه */
    .airport-field gmp-place-autocomplete,
    .airport-field input {
      width: 100%;
      background: transparent !important;
      border: none !important;
      color: #fff !important;
      font-size: 15px;
      outline: none;
    }
    
    /* placeholder */
    .airport-field ::placeholder {
      color: #9a9a9a;
    }
    
    /* hover / focus */
    .airport-field:focus-within {
      box-shadow: 0 0 0 2px #caa24d; /* دهبي خفيف */
    }
    .airport-field.from {
      border-right: 4px solid #4caf50; /* أخضر */
    }
    
    .airport-field.to {
      border-right: 4px solid #2196f3; /* أزرق */
    }
    
    
    /* أيقونة البحث */
    .airport-field::after {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .6;
    }
    
    /* padding بسبب الأيقونة */
    .airport-field gmp-place-autocomplete {
      padding-left: 26px;
    }
    
    /* موبايل */
    @media (max-width: 768px) {
      .airport-grid {
        grid-template-columns: 1fr;
      }
    }
    
    
    
    /* 1. تغيير الدائرة والأيقونة اللي جواها */
    .t-Stepper-item.is-complete .t-Stepper-circle,
    .t-Stepper-item.is-complete .t-Stepper-icon,
    .t-Stepper-item.is-complete .t-Stepper-circle .t-Icon {
        background-color: #f29d38 !important;
        border-color: #f29d38 !important;
        color: #ffffff !important;
    }
    
    /* 2. تغيير لون الخط الواصل بين الدوائر */
    .t-Stepper-item.is-complete:before,
    .t-Stepper-item.is-active:before {
        background-color: #f29d38 !important;
    }
    
    /* 3. إلغاء أي لون أخضر جاي من الـ Theme */
    .u-color-success, 
    .is-complete .t-Stepper-circle {
        background-color: #f29d38 !important;
        border-color: #f29d38 !important;
    }
    
    /* 4. تلوين النص (Label) المكتمل */
    .t-Stepper-item.is-complete .t-Stepper-label {
        color: #f29d38 !important;
    }

