- # ====== Region: Activities ==================================
  id: 264269535498221917
  identification: 
    name: Activities
    title: الانشطة
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          activity_id,
          type,
          name,
          state,
          error_message,
          due_on,
          retry_count,
          start_time,
          end_time,
      
          -- Arabic Display Text
          CASE state
              WHEN 'WAITING'    THEN 'قيد الانتظار'
              WHEN 'COMPLETED'  THEN 'مكتمل'
              WHEN 'TERMINATED' THEN 'تم الإنهاء'
              WHEN 'FAULTED'    THEN 'فشل'
              ELSE INITCAP(state)
          END AS badge_text,
      
          -- APEX Badge Color
          CASE state
              WHEN 'WAITING'    THEN 'danger'
              WHEN 'COMPLETED'  THEN 'success'
              WHEN 'TERMINATED' THEN 'warning'
              WHEN 'FAULTED'    THEN 'danger'
              ELSE 'default'
          END AS badge_state,
      
          (SELECT MAX(workflow_id)
             FROM apex_workflows w
            WHERE w.parent_workflow_id = :P179_WORKFLOW_ID
              AND w.parent_activity_id = a.activity_id) AS invoked_workflow_id
      
      FROM apex_workflow_activities a
      WHERE workflow_id = :P179_WORKFLOW_ID
      
      
    page-items-to-submit: 
    - P179_WORKFLOW_ID

  order-by: 
    type: None

  layout: 
    sequence: 70
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--noPadding
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&NAME.'
      description: '&ERROR_MESSAGE.'
      miscellaneous: |
        {case STATE/}
            {when COMPLETED/}
                &{APEX.WORKFLOW.COMPLETED_SINCE 0=&END_TIME.}.
            {otherwise/}
                &{APEX.WORKFLOW.STARTED_SINCE 0=&START_TIME.}.
        {endcase/}
        {if DUE_ON/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &{APEX.WORKFLOW.DUE_SINCE 0=&DUE_ON.}.
        {endif/}
        {if RETRY_COUNT/}
            {case RETRY_COUNT/}
                {when 0/}
                {when 1/}
                <span role="separator" aria-label="&middot;"> &middot; </span>
                    &{APEX.WORKFLOW.RETRY_COUNT.EQUALS_ONE 0=&RETRY_COUNT.}.
                {otherwise/}
                <span role="separator" aria-label="&middot;"> &middot; </span>
                    &{APEX.WORKFLOW.RETRY_COUNT.NOT_EQUALS_ONE 0=&RETRY_COUNT.}.
            {endcase/}
        {endif/}
      display-avatar: false
      display-badge: true

    badge: 
