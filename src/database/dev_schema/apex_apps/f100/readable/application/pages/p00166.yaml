javascript: 
  function-and-global-variable-declaration: |
    function imagepopup(element) {
      // Get the image URL from the data-url attribute
      const imageUrl = element.getAttribute('data-url');
      
      // Remove existing popup if one is already open
      const existingPopup = document.getElementById('image-display');
      if (existingPopup) existingPopup.remove();
    
      // Create the popup container
      const div = document.createElement('div');
      div.id = 'image-display';
      Object.assign(div.style, {
        position: 'fixed',
        top: 0,
        left: 0,
        width: '100%',
        height: '100%',
        backgroundColor: 'rgba(0,0,0,0.9)',
        zIndex: 10000,
        display: 'flex',
        justifyContent: 'center',
        alignItems: 'center',
      });
    
      // Create the image element
      const img = document.createElement('img');
      img.src = imageUrl;
      Object.assign(img.style, {
        maxWidth: '90vw',
        maxHeight: '90vh',
        border: '3px solid white',
        objectFit: 'contain',
      });
    
      // Create close button
      const closeBtn = document.createElement('span');
      closeBtn.innerHTML = '&times;';
      Object.assign(closeBtn.style, {
        position: 'absolute',
        top: '20px',
        right: '30px',
        fontSize: '30px',
        color: '#fff',
        cursor: 'pointer',
      });
      closeBtn.onclick = () => div.remove();
    
      // Close when clicking outside the image
      div.onclick = (e) => {
        if (e.target === div) div.remove();
      };
    
      // Append content and close button to the popup container
      div.appendChild(img);
      div.appendChild(closeBtn);
    
      // Add the popup container to the body
      document.body.appendChild(div);
    
      // Prevent scrolling when popup is open
      document.body.style.overflow = 'hidden';
      
      // Restore scrolling when popup is closed
      div.addEventListener('remove', () => {
        document.body.style.overflow = '';
      });
    }

