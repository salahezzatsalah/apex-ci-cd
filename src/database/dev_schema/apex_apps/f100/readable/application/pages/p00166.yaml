- # ====== Region: Supplier Documents ==========================
  id: 159238939816996695846
  identification: 
    name: Supplier Documents
    title: مستندات [&P166_DOCUMENTCOUNT.]
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select d.ID,
             d.DOCUMENT_FILENAME,
             d.UPDATED,
             d.created,
             case when length(d.doc_description) > 200
                  then substr(d.doc_description,1,200)||'...'
                  else d.doc_description
                  end doc_description,
             d.tags,
             lower(created_by) created_by,
             dbms_lob.getlength(d.DOCUMENT_BLOB) doc_size,
             created date_created,
             substr(DOCUMENT_FILENAME,instr(DOCUMENT_FILENAME,'.',-1)+1,length(DOCUMENT_FILENAME)-instr(DOCUMENT_FILENAME,'.',-1)) file_extension,
             decode(important_yn,'Y','نعم','لا') important
        from SUPPLIERS_DOCUMENTS d
       where supplier_id = :P166_ID
      order by created desc
      
    page-items-to-submit: 
    - P166_ID

