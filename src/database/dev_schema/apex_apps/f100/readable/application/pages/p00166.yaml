- # ====== Region: Supplier Details ============================
  id: 19003779347921196496
  identification: 
    name: Supplier Details
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          s.SUPPLIER_ID AS id,
          s.SUPPLIER_NAME AS name,
          s.PHONE,
          s.EMAIL,
          s.ADDRESS,
          s.CITY || ', ' || (
            SELECT COUNTRY_NAME || ' (' || REGION || ')'
            FROM SP_COUNTRIES
            WHERE ID = s.COUNTRY_ID
          ) AS location,
          --
          CASE 
            WHEN s.IS_COMPANY = 'Y' THEN 'شركة'
            ELSE 'فرد'
          END AS is_company,
          --
          (SELECT TYPE_NAME 
           FROM SUPPLIER_TYPES t 
           WHERE t.SUPPLIER_TYPE_ID = s.SUPPLIER_TYPE_ID) AS supplier_type,
          --
          CASE 
            WHEN s.IS_COMPANY = 'Y' THEN 
              'السجل التجاري: ' || NVL(s.COMPANY_REG_NO, 'غير محدد') || 
              ' - مسؤول التواصل: ' || NVL(s.CONTACT_PERSON, 'غير محدد')
            ELSE 
              'الرقم القومي: ' || NVL(s.NATIONAL_ID, 'غير محدد')
          END AS identity_info,
          --
          s.NOTES,
          -- TO_CHAR(s.CREATED, 'DD-MM-YYYY') AS created,
          -- TO_CHAR(s.UPDATED, 'DD-MM-YYYY') AS updated,
          TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(s.CREATED), 'DD-MM-YYYY') AS created,
          TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(s.UPDATED), 'DD-MM-YYYY') AS updated,
      
          --
          CASE 
              WHEN s.PROFILE_PHOTO IS NOT NULL AND DBMS_LOB.GETLENGTH(s.PROFILE_PHOTO) > 0 THEN 'نعم'
              ELSE 'لا'
          END AS has_profile_photo,
          s.PHOTO_FILENAME,
          s.PHOTO_MIMETYPE,
          --
          -- Attachments count
          (
            SELECT COUNT(*) 
            FROM SUPPLIERS_DOCUMENTS a 
            WHERE a.SUPPLIER_ID = s.SUPPLIER_ID
          ) AS attachments_count
      FROM SUPPLIERS s
      WHERE s.SUPPLIER_ID = :P166_ID;
      

  order-by: 
    type: None

  layout: 
    sequence: 50
    parent-region: Profile # 19367869843601332064
    slot: BODY
