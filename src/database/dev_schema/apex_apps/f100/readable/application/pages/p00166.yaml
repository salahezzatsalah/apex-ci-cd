- # ====== Region: Supplier Assignments ========================
  id: 207285490841489381
  identification: 
    name: Supplier Assignments
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          a.ASSIGNMENT_ID,
          'Fast Track' as SERVICE_CATEGORY,
          r.RESERVATION_TYPE,
          a.VENDOR_STATUS as STATUS,
          a.TOTAL_SERVICE_AMOUNT_EGP as AMOUNT,
          a.CURRENCY,
          a.CREATED,
          a.NOTES
      FROM FAST_TRACK_ASSIGNMENTS a
      LEFT JOIN FAST_TRACK_RESERVATIONS r ON a.RESERVATION_ID = r.RESERVATION_ID
      WHERE a.VENDOR_ID = :P166_ID
      
      UNION ALL
      
      SELECT 
          l.ASSIGNMENT_ID,
          'Limo Service' as SERVICE_CATEGORY,
          'Limo Trip' as RESERVATION_TYPE,
          l.DRIVER_STATUS as STATUS,
          l.TOTAL_TRIPS_AMOUNT_EGP as AMOUNT,
          l.CURRENCY,
          l.CREATED,
          l.NOTES
      FROM LIMO_PRODUCT_ASSIGNMENTS l
      WHERE l.DRIVER_ID = :P166_ID
      
      ORDER BY 7 DESC
    page-items-to-submit: 
    - P166_ID

