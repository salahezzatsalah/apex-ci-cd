- # ====== Dynamic Action: RefreshFieldsREPORT =================
  id: 234622522359843036
  identification: 
    name: RefreshFieldsREPORT

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P759_STARTDATE
    - P759_ENDDATE

  actions: 
  - # ====== Action: Set Value ===================================
    id: 232071762865888010
    identification: 
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        CASE
          WHEN TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY') = TO_DATE(:P759_ENDDATE, 'DD-MM-YYYY') THEN
            TO_CHAR(TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
          ELSE
            'من ' || TO_CHAR(TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY') ||
            ' إلى ' || TO_CHAR(TO_DATE(:P759_ENDDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
        END
      items-to-submit: 
      - P759_STARTDATE
      - P759_ENDDATE
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P759_FILTER_DATE_RANGE

    execution: 
      sequence: 10
      event: RefreshFieldsREPORT # 234622522359843036
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Refresh =====================================
    id: 234622971001843040
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P759_REPORT_DATE
      - P759_FILTER_DATE_RANGE

    execution: 
      sequence: 20
      event: RefreshFieldsREPORT # 234622522359843036
      fire-when-event-result-is: True
      fire-on-initialization: false

