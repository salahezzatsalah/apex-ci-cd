  source: 
    type: Null
    used: Only when current value in session state is null

  default: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      TO_CHAR(
        CAST(FROM_TZ(CAST(SYSDATE AS TIMESTAMP), 'UTC') AT TIME ZONE 'Africa/Cairo' AS DATE),
        'DD/MM/YYYY HH24:MI'
      )

