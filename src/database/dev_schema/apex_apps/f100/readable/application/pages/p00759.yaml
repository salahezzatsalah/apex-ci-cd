- # ====== Page Item: P759_FILTER_DATE_RANGE ===================
  id: 232071417769888007
  identification: 
    name: P759_FILTER_DATE_RANGE
    type: Display Only

  label: 
    label: 'فترة كشف الحساب '
    alignment: Left

  settings: 
    format: Plain Text
    based-on: Item Value
    show-line-breaks: true
    send-on-page-submit: true

  layout: 
    sequence: 80
    region: Account Information Display # 232070324389887996
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Null
    used: Only when current value in session state is null

  default: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: |
      CASE
        WHEN TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY') = TO_DATE(:P759_ENDDATE, 'DD-MM-YYYY') THEN
          TO_CHAR(TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
        ELSE
          'من ' || TO_CHAR(TO_DATE(:P759_STARTDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY') ||
          ' إلى ' || TO_CHAR(TO_DATE(:P759_ENDDATE, 'DD-MM-YYYY'), 'DD-MM-YYYY')
      END

  session-state: 
    data-type: VARCHAR2
    storage: Per Session (Persistent)

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

