- # ====== Region: FastTrack Products Details ==================
  id: 229970919287398226
  identification: 
    name: FastTrack Products Details
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |2
       SELECT
        SERVICE_TYPE_NAME,
        PRODUCT_IMAGE_URL,
        RESERVATION_ID,
        CLIENT_CODE,
        CLIENT_NUMBER,
        COUNTRY,
        CLIENT_NAME,
        RESERVATION_DATE,
        RES_TIME,
        TICKET_NO,
        SIGNAGE_DETAILS,
        PASSENGERS_NO,
        CURRENCY,
        PRICE_PER_PERSON,
        TOTAL_AMOUNT,
        NOTES,
        COLLECTION_BY,
        FULFILLED_BY_NAME,
        CREATED_BY_NAME,
        RELATED_RESERVATION,
          -- Period tracking
         TO_CHAR(RESERVATION_DATE, 'YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_year,
        TO_CHAR(RESERVATION_DATE, 'MM', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS trip_month,
        TO_CHAR(RESERVATION_DATE, 'DAY / DD/MM/YYYY', 'NLS_DATE_LANGUAGE = ''ARABIC''') AS days_filter
      
      FROM FAST_TRACK_RESERVATIONS_VW
      
      WHERE 
          RELATED_RESERVATION = :P358_RESERVATION_ID;
      
    page-items-to-submit: 
    - P358_RESERVATION_ID

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: Fast Track Services Details # 229970686699398224
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
