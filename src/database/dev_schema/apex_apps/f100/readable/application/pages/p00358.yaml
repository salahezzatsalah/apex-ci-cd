css: 
  inline: |
    /* Subtle glowing border or background to draw attention */
    .attention-effect {
      box-shadow: 0 0 6px 2px #ffc107cc, 0 0 16px 2px #fffbe8cc;
      border-radius: 12px;
      animation: attention-pulse 1.6s infinite;
    }
    @keyframes attention-pulse {
      0%   { box-shadow: 0 0 8px 2px #ffc107cc, 0 0 16px 2px #fffbe8cc; }
      50%  { box-shadow: 0 0 18px 6px #c1200eaa, 0 0 32px 8px #4c4628aa; }
      100% { box-shadow: 0 0 8px 2px #ffc107cc, 0 0 16px 2px #fffbe8cc; }
    }
    
    
      .pushable {
        background: hsl(340deg 100% 32%);
        border-radius: 12px;
        border: none;
        padding: 0;
        cursor: pointer;
        outline-offset: 4px;
      }
    
        .front {
        display: block;
        padding: 12px 42px;
        border-radius: 12px;
        font-size: 1.25rem;
        background: hsl(345deg 100% 47%);
        color: white;
        transform: translateY(-6px);
      }
      
      .pushable:active .front {
        transform: translateY(-2px);
      }
    
    
    
    
    no-item-ui {
      --a-field-input-border-width: 0px;
      --a-field-input-background-color: transparent;
    }
    
    .overline {
      color: var(--ut-region-text-color, var(--ut-component-text-default-color));
    }
    
    .a-FS-facetsDashboard {
      --a-fs-chart-grid-gap: 0px;
      --a-fs-chart-border-width: 0px;
      --a-fs-chart-shadow: none;
    }
    
    @media (max-width: 768px) {
      .t-ContentRow-wrap.unassigned {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
    
      .t-ContentRow-body,
      .t-ContentRow-misc,
      .t-ContentRow-actions {
        width: 100%;
        max-width: 100%;
      }
    
      .t-ContentRow-misc {
        order: 2; /* place after main body */
      }
    
      .t-ContentRow-actions {
        order: 3; /* actions come last */
      }
    }
    
    
    .limo-overline {
      font-size: 1em;
      color: #030101;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      direction: rtl;
      margin-bottom: 6px;
    }
    
    .limo-overline .overline-item {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .limo-overline .label {
      font-weight: 600;
      color: #444;
    }
    .limo-overline .overline-separator {
      color: #ccc;
    }
    
    .limo-title.nowrap-wrap {
      display: flex;
      flex-wrap: wrap; /* allow wrapping on very small screens if needed */
      direction: rtl;
      gap: 10px;
      font-size: clamp(0.8rem, 2vw, 0.95rem); /* ✅ responsive font size */
      line-height: 1.4;
    }
    
    .limo-title .title-group {
      display: inline-flex;
      align-items: center;
      background: #f3f6f9;
      border-radius: 10px;
      padding: 6px 10px;
      white-space: nowrap;
      max-width: 100%;
      flex-shrink: 1; /* allow shrink within container */
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .limo-title i {
      margin-left: 6px;
      color: #23598c;
      font-size: 1em;
    }
    
    .title-label {
      font-weight: 600;
      margin-left: 4px;
      color: #333;
    }
    
    .title-value {
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    
    /* Row layout: image + description */
    .limo-row {
      display: flex;
    
      gap: 1px;
      align-items: flex-start;
          margin-top: 10px;
    
      max-width: 900px;
    }
    
    .limo-avatar {
      justify-content: center;
    }
    
    /* Avatar */
    .limo-avatar img {
      width: 120px;
      height: 90px;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    
    
    
    /* Description container */
    .limo-description {
        flex: 1;
        font-size: 0.95em;
        line-height: 1.6;
        color: #333;
        direction: rtl;
        margin-right: 20px;
    
        height: 90px;
    }
    
    /* Trip card */
    .trip-location-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }
    .location-block {
      display: flex;
      flex-direction: column;
    }
    .location-name {
      font-weight: 600;
      color: #444;
    }
    .location-datetime {
      font-size: 0.85em;
      color: #888;
    }
    .location-arrow svg {
      fill: #009688;
      width: 18px;
      height: 18px;
    }
    
    /* Badges */
    .limo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .limo-meta .badge {
      background: #008234;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size:0.85em;
      display: flex;
      align-items: center;
      font-weight: bold;
      gap: 4px;
    }
    .badge-classification {
      background: #e0f7fa;
      color: #00695c;
    }
    .badge-triptype {
      background: #f1f8e9;
      color: #558b2f;
    }
    .badge-days {
      background: #fff3e0;
      color: #ef6c00;
    }
    
    /* Ticket & Signage */
    .limo-ticket,
    .limo-signage {
      font-size: 0.88em;
      margin-bottom: 4px;
      color: #444;
    }
    .limo-ticket i,
    .limo-signage i {
      margin-left: 5px;
      color: #7d4c18;
    }
    
    .trip-location-card {
        display: flex
    ;
        align-items: right;
        /* justify-content: space-between; */
        gap: 10px;
        /* padding: 10px 16px; */
        padding-bottom: 10px;
        /* border: 1px solid #f5b400; */
        border-radius: 8px;
        /* background: #fff; */
        direction: rtl;
        font-family: 'Cairo', sans-serif;
        width: fit-content;
    }
    
    .trip-location-card .location-block {
      display: flex;
      flex-direction: column;
      text-align: right;
    }
    
    .trip-location-card .location-name {
      font-weight: bold;
      font-size: 1em;
      color: #000;
      margin-bottom: 4px;
    }
    
    .trip-location-card .location-datetime {
      font-size: 0.9em;
      color: #555;
    }
    
    .trip-location-card .location-arrow {
      flex-shrink: 0;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .trip-location-card .location-arrow svg {
      transform: scaleX(-1); /* Flip for RTL */
      fill: #999;
      width: 20px;
      height: 20px;
    }
    
    
    
    
    
    .limo-misc {
      width: 250px;
      max-width: 250px;
      padding: 10px 12px;
      padding-top: 25px;
      background-color: transparent;
    
      font-size: 0.88em;
      direction: rtl;
      color: #2d2d2d;
      display: flex;
      flex-direction: column;
      margin-top: 10px;
      gap: 12px;
    }
    
    /* Group block with same margin/padding rules */
    .misc-group {
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #e2e2e2;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    /* Attention group styling */
    .misc-highlight {
      border-color: #ffca28;
      background-color: #fffde7;
      box-shadow: inset 0 0 0 1px #ffe08244;
    }
    
    /* Row layout */
    .misc-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.6;
    }
    
    /* Icons */
    .misc-row i {
      color: #23598c;
      flex-shrink: 0;
      margin-top: 2px;
    }
    
    /* Label */
    .misc-label {
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }
    
    /* Value */
    .misc-value {
      flex: 1;
      color: #111;
      overflow-wrap: break-word;
    }
    
    /* Notes (separated block style) */
    .misc-notes {
      background: #fff;
      border: 1px dashed #ccc;
      border-radius: 8px;
      padding: 6px 8px;
      margin-top: 4px;
      font-style: italic;
      line-height: 1.6;
    }
    
    

