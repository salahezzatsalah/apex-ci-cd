    execution: 
      sequence: 10
      event: ShowRates # 201353514445423433
      fire-when-event-result-is: False
      fire-on-initialization: true

- # ====== Dynamic Action: RefreshCols =========================
  id: 201354841347423437
  identification: 
    name: RefreshCols

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P254_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 201355329640423438
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P254_CURRENCY
        
      items-to-submit: 
      - P254_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P254_EXCHANGE_RATE

    execution: 
      sequence: 30
      event: RefreshCols # 201354841347423437
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Minimum Amount in Currency ==============
    id: 201355860437423440
    identification: 
      name: Set Minimum Amount in Currency
      action: Set Value

    settings: 
      set-type: PL/SQL Expression
      pl/sql-expression: |
        CASE 
          WHEN :P254_CURRENCY != :P254_DEFCURRENCY 
          THEN ROUND(:P254_DEFPRICE / :P254_EXCHANGE_RATE, 2)
          ELSE :P254_ORGININAL_PRICE
        END
        
      items-to-submit: 
      - P254_EXCHANGE_RATE
      - P254_DEFPRICE
      - P254_CURRENCY
      - P254_DEFCURRENCY
      - P254_ORGININAL_PRICE
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
