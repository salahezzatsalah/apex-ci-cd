    id: 201353117106423432
    identification: 
      action: Cancel Dialog

    execution: 
      sequence: 10
      event: Cancel Dialog # 201352651339423429
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: ShowRates ===========================
  id: 201353514445423433
  identification: 
    name: ShowRates

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P254_CURRENCY

  client-side-condition: 
    type: Item = Value
    item: P254_CURRENCY
    value: EGP

  actions: 
  - # ====== Action: Hide ========================================
    id: 201354073546423434
    identification: 
      action: Hide

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P254_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: ShowRates # 201353514445423433
      fire-when-event-result-is: True
      fire-on-initialization: true

  - # ====== Action: Show ========================================
    id: 201354432447423436
    identification: 
      action: Show

    affected-elements: 
      selection-type: Item(s)
