- # ====== Region: Users  ======================================
  id: 16498524075855681363
  identification: 
    name: 'Users '
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
         x.id, 
         x.username,
         x.name,
         x.email_domain,
         x.email,
         x.phone_number,
         x.tags,
         x.updated,
         x.created,
         x.activities,
         x.reviews,
         x.competencies,
         x.screen_name,
         DECODE(x.screen_name, NULL, 'لا', 'نعم') AS has_screen_name,
         x.total,
         DECODE(NVL(x.project_leads, 0), 0, 'No', 'Yes') AS project_lead,
         x.comment_mentions,
         (
           SELECT u.role_ids
           FROM apex_appl_acl_users u
           WHERE u.application_id = :APP_ID
             AND LOWER(u.user_name) = LOWER(x.username)
           FETCH FIRST 1 ROWS ONLY
         ) AS app_role,
         x.location,
         NVL((SELECT department_name FROM bs_departments d WHERE d.id = x.department_id), 'غير محدد') AS department,
         'N/A' AS region,
         x.has_activities,
         x.has_profile_photo,
         DECODE(NVL(x.reviews, 0), 0, 'No', 'Yes') AS has_open_reviews,
         x.group_membership
      FROM (
        SELECT 
            t.ID,
            t.USERNAME,
            t.FIRST_NAME || ' ' || t.LAST_NAME AS name,
            t.PHONE_NUMBER,
            t.LOCATION,
            t.DEPARTMENT_ID,
            LOWER(t.TAGS) AS tags,
            t.UPDATED,
            t.CREATED,
            t.EMAIL,
            t.COMPETENCIES,
            t.EMAIL_DOMAIN,
            t.PHOTO,
            t.PHOTO_MIMETYPE,
            t.SCREEN_NAME,
            (SELECT COUNT(*) 
               FROM SP_ACTIVITIES ap 
              WHERE TO_CHAR(ap.TEAM_MEMBER_ID) = t.id 
                AND ap.END_DATE >= TRUNC(SYSDATE)
            ) AS activities,
            (SELECT COUNT(*) 
               FROM SP_TASKS r, SP_TASK_TYPES tt, SP_TASK_STATUSES s
              WHERE TO_CHAR(r.OWNER_ID) = t.ID 
                AND NVL(r.TASK_SUB_TYPE_ID, r.TASK_TYPE_ID) = tt.ID
                AND tt.STATIC_ID LIKE 'REVIEW%'
                AND r.STATUS_ID = s.ID
                AND s.INDICATES_COMPLETE_YN != 'Y'
            ) AS reviews,
            (SELECT COUNT(*) FROM SP_AREAS f WHERE TO_CHAR(f.OWNER_ID) = t.id) AS focus_area_leads,
            (SELECT COUNT(*) FROM SP_INITIATIVES i WHERE TO_CHAR(i.SPONSOR_ID) = t.id) AS initiatives_leads,
            (SELECT COUNT(*) FROM SP_PROJECTS p WHERE TO_CHAR(p.OWNER_ID) = t.id AND p.ARCHIVED_YN = 'N') AS project_leads,
            (SELECT COUNT(*) 
               FROM SP_TASKS tk, SP_PROJECTS p 
              WHERE TO_CHAR(tk.OWNER_ID) = t.id 
                AND tk.PROJECT_ID = p.id 
                AND p.ARCHIVED_YN = 'N'
            ) AS tasks,
            (SELECT COUNT(*) FROM SP_PROJECT_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)) AS proj_docs,
            (SELECT COUNT(*) FROM SP_RELEASE_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)) AS rel_docs,
            (SELECT COUNT(*) FROM SP_TASK_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)) AS task_docs,
            (SELECT COUNT(*) FROM SP_PROJECT_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id) AS proj_comments,
            (SELECT COUNT(*) FROM SP_RELEASE_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id) AS rel_comments,
            (SELECT COUNT(*) FROM SP_TASK_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id) AS task_comments,
            NVL((SELECT 'Yes' FROM dual WHERE EXISTS (
                  SELECT 1 
                    FROM SP_ACTIVITIES ap 
                   WHERE TO_CHAR(ap.TEAM_MEMBER_ID) = t.id 
                     AND ap.END_DATE >= TRUNC(SYSDATE)
            )), 'No') AS has_activities,
            DECODE(DBMS_LOB.GETLENGTH(t.PHOTO), NULL, 'لا', DECODE(DBMS_LOB.GETLENGTH(t.PHOTO), 0, 'لا', 'نعم')) AS has_profile_photo,
            (SELECT COUNT(DISTINCT p.id)
               FROM SP_PROJECT_COMMENTS_EMAILS e,
                    SP_PROJECTS p, 
                    BS_EMPLOYEES tm,
                    SP_PROJECT_COMMENTS c
              WHERE t.ID = tm.ID
                AND e.EMAIL = tm.EMAIL
                AND c.ID = e.COMMENT_ID
                AND c.PROJECT_ID = p.ID
            ) AS comment_mentions,
            (SELECT LISTAGG(g.GROUP_NAME, ', ') WITHIN GROUP (ORDER BY 1)
               FROM SP_GROUP_MEMBERS gm, SP_GROUPS g
              WHERE gm.GROUP_ID = g.ID 
                AND TO_CHAR(gm.TEAM_MEMBER_ID) = t.ID
            ) AS group_membership,
            (
              NVL((SELECT COUNT(*) FROM SP_AREAS f WHERE TO_CHAR(f.OWNER_ID) = t.id), 0) +
              NVL((SELECT COUNT(*) FROM SP_INITIATIVES i WHERE TO_CHAR(i.SPONSOR_ID) = t.id), 0) +
              NVL((SELECT COUNT(*) FROM SP_PROJECTS p WHERE TO_CHAR(p.OWNER_ID) = t.id AND p.ARCHIVED_YN = 'N'), 0) +
              NVL((SELECT COUNT(*) FROM SP_TASKS tk, SP_PROJECTS p 
                    WHERE TO_CHAR(tk.OWNER_ID) = t.id 
                      AND tk.PROJECT_ID = p.id 
                      AND p.ARCHIVED_YN = 'N'), 0) +
              NVL((SELECT COUNT(*) FROM SP_PROJECT_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)), 0) +
              NVL((SELECT COUNT(*) FROM SP_RELEASE_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)), 0) +
              NVL((SELECT COUNT(*) FROM SP_TASK_DOCUMENTS d WHERE d.CREATED_BY = UPPER(t.EMAIL)), 0) +
              NVL((SELECT COUNT(*) FROM SP_PROJECT_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id), 0) +
              NVL((SELECT COUNT(*) FROM SP_RELEASE_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id), 0) +
              NVL((SELECT COUNT(*) FROM SP_TASK_COMMENTS c WHERE TO_CHAR(c.AUTHOR_ID) = t.id), 0) +
              NVL((SELECT COUNT(*) FROM SP_ACTIVITIES ap 
                    WHERE TO_CHAR(ap.TEAM_MEMBER_ID) = t.id 
                      AND ap.END_DATE >= TRUNC(SYSDATE)
              ), 0) +
              NVL((SELECT COUNT(*) 
                    FROM SP_TASKS r, SP_TASK_TYPES tt, SP_TASK_STATUSES s
                   WHERE TO_CHAR(r.OWNER_ID) = t.ID 
                     AND NVL(r.TASK_SUB_TYPE_ID, r.TASK_TYPE_ID) = tt.ID
                     AND tt.STATIC_ID LIKE 'REVIEW%'
                     AND r.STATUS_ID = s.ID
                     AND s.INDICATES_COMPLETE_YN != 'Y'
              ), 0) +
              NVL((SELECT COUNT(DISTINCT p.ID)
                     FROM SP_PROJECT_COMMENTS_EMAILS e,
                          SP_PROJECTS p, 
                          BS_EMPLOYEES tm,
                          SP_PROJECT_COMMENTS c
                    WHERE t.ID = tm.ID
                      AND e.EMAIL = tm.EMAIL
                      AND c.ID = e.COMMENT_ID
                      AND c.PROJECT_ID = p.ID
              ), 0)
            ) AS total
        FROM BS_EMPLOYEES t
        WHERE NVL(t.IS_CURRENT_YN, 'Y') = 'Y'
      ) x;
      

