  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      declare
          l_clob clob;
      begin
          l_clob := '
      <p>
      الوحدة دي بتعرض الحجوزات. اللي انت ليك علاقة بيها، سواء كنت صاحب الطلب أو ليك دور تاني في تنفيذ الحجز أو متابعته.
      </p>
      <ul>
          <li><strong>صاحب الحجز</strong>: لو انت اللي قدمت طلب الـ حجز أو مسؤول عنه.</li>
          <li><strong>مسؤول عمليات</strong>: لو انت متابع تنفيذ الـ حجز أو بتراجع الطلبات مع الفندق أو الموردين.</li>
          <li><strong>مورد</strong>: لو انت المزود أو جهة التعامل مع الفندق، ومسؤول عن تنفيذ أو توفير الخدمة.</li>
          <li><strong>عميل</strong>: لو انت صاحب الـ حجز أو الشخص اللي هيستفيد من الخدمة.</li>
      </ul>
      <p>
      القائمة دي بتساعدك تتابع كل الحجوزات. ليك علاقة بيها، وتقدر تراجع منها الملاحظات، المدفوعات، أو أي تحديثات بتتم على الـ حجز بسهولة.
      </p>
      <p>
      الـ حجز المفتوح هو اللي لسه تحت التنفيذ أو في انتظار التأكيد أو السداد، ولسه مخلصش بالكامل.
      </p>
      <br />
      <br />';
          return l_clob;
      end;
      

