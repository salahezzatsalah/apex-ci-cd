- # ====== Region: Fast Track Services =========================
  id: 20983239417671268407
  identification: 
    name: Fast Track Services
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          c.SERVICE_ID,
          c.SERVICE_NAME,
      
          (SELECT p.PRICE || ' ' || p.CURRENCY_CODE
           FROM FAST_TRACK_SERVICE_PRICES p
           WHERE p.SERVICE_ID = c.SERVICE_ID
           ORDER BY ABS(TRUNC(p.EFFECTIVE_DATE) - TRUNC(SYSDATE)) ASC
           FETCH FIRST 1 ROW ONLY
          ) AS CURRENT_PRICE,
      
      
          (SELECT TO_CHAR(ROUND(p.PRICE * r.EXCHANGE_RATE, 2)) || ' EGP'
           FROM FAST_TRACK_SERVICE_PRICES p
           JOIN CURRENCY_RATES r
             ON r.CURRENCY_CODE = p.CURRENCY_CODE
           WHERE p.SERVICE_ID = c.SERVICE_ID
             AND r.RATE_DATE = (SELECT MAX(RATE_DATE) 
                                FROM CURRENCY_RATES
                                WHERE CURRENCY_CODE = p.CURRENCY_CODE)
           ORDER BY ABS(TRUNC(p.EFFECTIVE_DATE) - TRUNC(SYSDATE)) ASC
           FETCH FIRST 1 ROW ONLY
          ) AS PRICE_EGP,
      
          -- تاريخ السعر
          (SELECT TO_CHAR(p.EFFECTIVE_DATE,'DD-MON-YYYY')
           FROM FAST_TRACK_SERVICE_PRICES p
           WHERE p.SERVICE_ID = c.SERVICE_ID
           ORDER BY ABS(TRUNC(p.EFFECTIVE_DATE) - TRUNC(SYSDATE)) ASC
           FETCH FIRST 1 ROW ONLY
          ) AS PRICE_EFFECTIVE_DATE
      
      FROM FAST_TRACK_SERVICE_CATALOG c
      WHERE c.ACTIVE = 'Y'
      ;
      

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    css-classes: 
    - car-content-row
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

