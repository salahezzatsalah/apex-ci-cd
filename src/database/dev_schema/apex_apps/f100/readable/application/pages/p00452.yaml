processes: 
- # ====== Process: create =====================================
  id: 194085490150499758
  identification: 
    name: create
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          l_blob        BLOB;
          l_filename    VARCHAR2(255);
          l_extension   VARCHAR2(20);
          l_object_name VARCHAR2(400);
          l_public_url  VARCHAR2(4000);
      BEGIN
          -- افترض أن اسم الملف في APEX Temp Files
          SELECT blob_content, filename
            INTO l_blob, l_filename
            FROM apex_application_temp_files
           WHERE name = :P1_UPLOAD_FILE;  -- عنصر رفع الصورة في الصفحة
      
          l_extension   := LOWER(NVL(REGEXP_SUBSTR(l_filename, '\.[[:alnum:]]+$'), '.jpg'));
          l_object_name := 'SERVICE_IMAGES/' || :P1_SERVICE_ID || l_extension;
      
          -- ضبط الـ bucket
          drive_crud_api.set_bucket(app_config.g_default_bucket);
      
          -- رفع الصورة
          drive_crud_api.upload_file(
              p_parent_name => 'SERVICE_IMAGES',
              p_filename    => :P1_SERVICE_ID || l_extension,
              p_blob        => l_blob
          );
      
          -- إنشاء URL عام للصورة
          l_public_url := 'https://objectstorage.me-jeddah-1.oraclecloud.com' ||
                          drive_crud_api.create_par(
                              p_object_name  => l_object_name,
                              p_par_name     => 'service-' || :P1_SERVICE_ID || '-par',
                              p_time_expires => ADD_MONTHS(SYSTIMESTAMP, 12)
                          );
      
          -- تحديث الجدول بالـ URL
          UPDATE FAST_TRACK_SERVICE_CATALOG
             SET SERVICE_PIC_URL = l_public_url,
                 SERVICE_PIC_LASTUPD = SYSTIMESTAMP
           WHERE SERVICE_ID = :P1_SERVICE_ID;
      
          COMMIT;
      EXCEPTION
          WHEN OTHERS THEN
              ROLLBACK;
              RAISE_APPLICATION_ERROR(-20001, 'Upload failed: ' || SQLERRM);
      END;
      

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

