processes: 
- # ====== Process: Fetch Entry Transaction Data ===============
  id: 230533672739461314
  identification: 
    name: Fetch Entry Transaction Data
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          -- Variables to hold parent transaction id
          v_transaction_id TRANSACTION_ENTRIES.TRANSACTION_ID%TYPE;
      BEGIN
          -- Fetch from TRANSACTION_ENTRIES
          SELECT
              ACCOUNT_ID,
              CURRENCY_CODE,
              TRANSACTION_TYPE,
              DEBIT_AMOUNT,
              CREDIT_AMOUNT,
              NOTES,
              TRANSACTION_ID
          INTO
              :P756_ACCOUNT_ID,
              :P756_CURRENCY_CODE,
              :P756_TRANSACTION_TYPE,
              :P756_DEBIT_AMOUNT,
              :P756_CREDIT_AMOUNT,
              :P756_NOTES,
              v_transaction_id
          FROM
              TRANSACTION_ENTRIES
          WHERE
              ENTRY_ID = :P756_ENTRY_ID;
      
          -- Fetch header (TRANSACTIONS)
          SELECT
              TRANSACTION_DATE,
              DESCRIPTION,
              REFERENCE_NUMBER
          INTO
              :P756_TRANSACTION_DATE,
              :P756_DESCRIPTION,
              :P756_REFERENCE_NUMBER
          FROM
              TRANSACTIONS
          WHERE
              TRANSACTION_ID = v_transaction_id;
      
      EXCEPTION
          WHEN NO_DATA_FOUND THEN
              -- If nothing found, clear everything (optional)
