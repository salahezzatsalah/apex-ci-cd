    name: Insert Transaction
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_transaction_id TRANSACTIONS.TRANSACTION_ID%TYPE;
      BEGIN
        -- Insert into TRANSACTIONS
        INSERT INTO TRANSACTIONS (
          TRANSACTION_DATE,
          DESCRIPTION,
          REFERENCE_NUMBER,
          STATUS,
          CREATED,
          CREATED_BY
        )
        VALUES (
          TO_TIMESTAMP(:P756_TRANSACTION_DATE, 'DD-MM-YYYY HH:MI PM'),
          :P756_DESCRIPTION,
          :P756_REFERENCE_NUMBER,
          'POSTED',
          SYSTIMESTAMP,
          NVL(APEX_UTIL.GET_SESSION_STATE('APP_USER_ID'), USER)
        )
        RETURNING TRANSACTION_ID INTO v_transaction_id;
      
        -- Insert into TRANSACTION_ENTRIES
        INSERT INTO TRANSACTION_ENTRIES (
          TRANSACTION_ID,
          ACCOUNT_ID,
          CURRENCY_CODE,
          DEBIT_AMOUNT,
          CREDIT_AMOUNT,
          NOTES,
          TRANSACTION_TYPE,
          CREATED,
          CREATED_BY
        )
        VALUES (
          v_transaction_id,
          :P756_ACCOUNT_ID,
          :P756_CURRENCY_CODE,
          CASE WHEN :P756_TRANSACTION_TYPE = 'DEBIT' THEN :P756_DEBIT_AMOUNT ELSE NULL END,
          CASE WHEN :P756_TRANSACTION_TYPE = 'CREDIT' THEN :P756_CREDIT_AMOUNT ELSE NULL END,
          :P756_NOTES,
          :P756_TRANSACTION_TYPE,
          SYSTIMESTAMP,
          NVL(APEX_UTIL.GET_SESSION_STATE('APP_USER_ID'), USER)
        );
      END;
      

