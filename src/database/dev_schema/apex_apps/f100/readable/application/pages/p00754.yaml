- # ====== Region: Account Summary Data Query ==================
  id: 281250592955651376
  identification: 
    name: Account Summary Data Query
    type: Form

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
        a.ACCOUNT_ID,
        a.ACCOUNT_NAME,
        a.ACCOUNT_CODE,
        a.ACCOUNT_TYPE,
        t.NAME_AR AS ACCOUNT_TYPE_NAME,
        a.CURRENCY_CODE,
        c.SYMBOL,
        'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/CURFLAG/' || c.CURRENCY_CODE AS FLAG_URL,
        NVL(vb.BALANCE, 0) AS BALANCE,
        a.STATUS,
        a.OWNER_TYPE,
        a.OWNER_ID
      FROM ACCOUNTS a
      JOIN ACCOUNT_TYPES t
        ON a.ACCOUNT_TYPE = t.ACCOUNT_TYPE_CODE
      JOIN CURRENCIES c
        ON a.CURRENCY_CODE = c.CURRENCY_CODE
      LEFT JOIN V_ACCOUNT_BALANCES vb
        ON a.ACCOUNT_ID = vb.ACCOUNT_ID
      WHERE a.ACCOUNT_ID = :P754_ACCOUNT_ID
      
    page-items-to-submit: 
    - ':P754_ACCOUNT_ID'

  layout: 
    sequence: 10
    parent-region: Account Summary # 281250462862651375
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: None
    render-components: Above Content

  advanced: 
    custom-attributes: 
    - class="hidden"
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    edit: 
      enabled: false

