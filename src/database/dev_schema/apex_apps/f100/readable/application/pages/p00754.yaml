- # ====== Region: Account Summary =============================
  id: 281250462862651375
  identification: 
    name: Account Summary
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html          CLOB;
        l_flag          VARCHAR2(4000);
        l_balance       NUMBER;
        l_currencycode  VARCHAR2(10);
        l_balance_disp  VARCHAR2(100);
      BEGIN
        SELECT
          'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/CURFLAG/' || CURRENCY_CODE,
          NVL((SELECT BALANCE FROM V_ACCOUNT_BALANCES WHERE ACCOUNT_ID = :P754_ACCOUNT_ID), 0),
          currency_code
        INTO l_flag, l_balance, l_currencycode
        FROM ACCOUNTS
        WHERE ACCOUNT_ID = :P754_ACCOUNT_ID;
      
        -- Format conditionally
        IF TRUNC(l_balance) = l_balance THEN
          -- No decimals: remove them
          l_balance_disp := TO_CHAR(l_balance, 'FM999G999G999G999');
        ELSE
          -- With decimals: show 2 decimals
          l_balance_disp := TO_CHAR(l_balance, 'FM999G999G999G999D00');
        END IF;
      
        l_html := '
          <div class="w-full max-w-2xl bg-white border rounded-2xl shadow-lg p-7 mb-5 flex items-center justify-between" dir="rtl">
            <div class="flex flex-col flex-1 text-right pr-4">
              <div class="text-2xl font-bold text-gray-900 mb-1">' || :P754_ACCOUNT_NAME || '</div>
              <div class="text-base text-gray-500 mb-2">' || :P754_ACCOUNT_CODE || '</div>
              <div class="text-3xl font-extrabold mb-1 ' ||
                CASE WHEN l_balance < 0 THEN 'text-red-600' ELSE 'text-green-600' END || '">'
                || l_balance_disp ||
                '<span class="text-lg text-gray-600 font-normal ml-2">' || l_currencycode || '</span>
              </div>
              <div class="text-base text-gray-500">الرصيد الحالي</div>
            </div>
            <div class="ml-6 flex-shrink-0 flex items-center justify-center">
              <img src="' || l_flag || '" alt="Flag" class="w-16 h-16 rounded-full border border-gray-300 shadow object-cover">
            </div>
          </div>
        ';
      
        RETURN l_html;
      END;
      

  layout: 
    sequence: 30
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
