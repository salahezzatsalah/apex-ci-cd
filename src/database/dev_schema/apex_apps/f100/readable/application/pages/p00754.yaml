- # ====== Region: Transactions History ========================
  id: 281587592789694057
  identification: 
    name: Transactions History
    title: سجل العمليات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html        CLOB := '';
          l_account_id  VARCHAR2(40) := :P754_ACCOUNT_ID;
          l_edit_url    VARCHAR2(4000);
          l_disable_edit BOOLEAN;
      
          -- Format amount with commas, decimals only if needed
          FUNCTION format_amount(p_value NUMBER) RETURN VARCHAR2 IS
          BEGIN
              IF p_value IS NULL THEN
                  RETURN '0';
              ELSIF TRUNC(p_value) = p_value THEN
                  RETURN TO_CHAR(p_value, 'FM999G999G999G990');
              ELSE
                  RETURN TO_CHAR(p_value, 'FM999G999G999G990D00');
              END IF;
          END;
      BEGIN
          l_html := l_html || '
          <style>
            @media (max-width: 900px) {
              .desktop-table { display: none !important; }
              .mobile-cards { display: block !important; }
            }
            @media (min-width: 901px) {
              .desktop-table { display: block !important; }
              .mobile-cards { display: none !important; }
            }
          </style>
          <div class="w-full max-w-5xl mx-auto" style="margin-right: 0px; margin-left: 0px;" dir="rtl">
          ';
      
          -- Desktop Table
          l_html := l_html || '
          <div class="desktop-table" style="display:block">
            <table class="min-w-full bg-white rounded-2xl shadow border border-gray-100 overflow-hidden">
              <thead>
                <tr>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-calendar-days fa6-fw text-gray-400"></i> التاريخ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-file-lines fa6-fw text-gray-400"></i> الوصف</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-hashtag fa6-fw text-gray-400"></i> الرقم المرجعي</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-money-bill-wave fa6-fw text-gray-400"></i> المبلغ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-wallet fa6-fw text-gray-400"></i> الرصيد بعد المعاملة</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-user fa6-fw text-gray-400"></i> القائم بالتنفيذ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-clock fa6-fw text-gray-400"></i> تاريخ التنفيذ</th>
                  <th class="py-4 px-4 text-base font-bold text-gray-700 text-center"><i class="fa6-solid fa6-pen-to-square fa6-fw text-gray-400"></i> إجراء</th>
                </tr>
              </thead>
              <tbody>
          ';
      
          FOR rec IN (
              SELECT ENTRY_ID, TRANSACTION_DATE, DESCRIPTION, REFERENCE_NUMBER, SIGNED_AMOUNT,
                     BALANCE_AFTER_TRANSACTION, CURRENCY_CODE, CREATED_BY_NAME, CREATED
              FROM V_TRANSACTION_HISTORY
              WHERE ACCOUNT_ID = l_account_id
              ORDER BY CREATED DESC
          ) LOOP
              IF rec.ENTRY_ID IS NOT NULL THEN
                  l_edit_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':756:' || :APP_SESSION || '::::P756_ENTRY_ID:' || rec.ENTRY_ID);
              ELSE
                  l_edit_url := NULL;
              END IF;
      
              l_disable_edit := rec.CREATED IS NULL OR rec.CREATED + INTERVAL '24' HOUR < SYSTIMESTAMP;
      
              l_html := l_html || '
              <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                <td class="py-4 px-4 text-base text-gray-800 text-center font-semibold">' || TO_CHAR(rec.TRANSACTION_DATE, 'DD/MM/YY') || '</td>
                <td class="py-4 px-4 text-base text-gray-900 font-semibold max-w-xs break-words">' || APEX_ESCAPE.HTML(rec.DESCRIPTION) || '</td>
                <td class="py-4 px-4 text-base text-blue-700 text-center font-mono font-bold">
                  <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs font-bold font-mono">' || APEX_ESCAPE.HTML(rec.REFERENCE_NUMBER) || '</span>
                </td>
                <td class="py-4 px-4 text-lg text-center font-bold ' ||
                    CASE WHEN rec.SIGNED_AMOUNT < 0 THEN 'text-red-500'
                         WHEN rec.SIGNED_AMOUNT > 0 THEN 'text-green-600'
                         ELSE 'text-gray-700' END || '">'
                    || CASE WHEN rec.SIGNED_AMOUNT < 0 THEN '-' ELSE '' END
                    || format_amount(ABS(rec.SIGNED_AMOUNT)) || 
                    '<span class="text-base text-gray-500 font-normal pl-1">' || NVL(rec.CURRENCY_CODE, '') || '</span>
                </td>
                <td class="py-4 px-4 text-lg text-center font-bold text-gray-900">'
                    || NVL(rec.CURRENCY_CODE, '') || ' ' || format_amount(rec.BALANCE_AFTER_TRANSACTION) || '</td>
                <td class="py-4 px-4 text-base text-gray-800 text-center">' || NVL(APEX_ESCAPE.HTML(rec.CREATED_BY_NAME), '-') || '</td>
                <td class="py-4 px-4 text-base text-gray-500 text-center">' || TO_CHAR(convert_to_local_timezone(rec.CREATED), 'DD/MM/YY HH24:MI') || '</td>
                <td class="py-4 px-2 text-center">' || 
                    CASE 
                        WHEN l_edit_url IS NOT NULL THEN
                            '<a href="' || l_edit_url || '"'
                            || CASE WHEN l_disable_edit THEN ' tabindex="-1" class="inline-flex items-center px-3 py-1.5 rounded-lg bg-gray-300 text-white font-bold shadow transition cursor-not-allowed pointer-events-none" title="تجاوزت مدة السماح بالتعديل (ساعة)"'
                                    ELSE ' class="inline-flex items-center px-3 py-1.5 rounded-lg bg-yellow-400 hover:bg-yellow-500 text-white font-bold shadow transition" title="تعديل"' END
                            || '><i class="fa6-solid fa6-pen-to-square fa6-fw"></i> تعديل</a>'
                        ELSE ''
                    END || '
                </td>
              </tr>';
          END LOOP;
      
          l_html := l_html || '
              </tbody>
            </table>
          </div>'; -- Close desktop table
      
          -- Mobile Cards
          l_html := l_html || '
          <div class="mobile-cards" style="display:none">';
      
          FOR rec IN (
              SELECT ENTRY_ID, TRANSACTION_DATE, DESCRIPTION, REFERENCE_NUMBER, SIGNED_AMOUNT,
                     BALANCE_AFTER_TRANSACTION, CURRENCY_CODE, CREATED_BY_NAME, CREATED
              FROM V_TRANSACTION_HISTORY
              WHERE ACCOUNT_ID = l_account_id
              ORDER BY CREATED DESC
          ) LOOP
              IF rec.ENTRY_ID IS NOT NULL THEN
                  l_edit_url := APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':756:' || :APP_SESSION || '::::P756_ENTRY_ID:' || rec.ENTRY_ID);
              ELSE
                  l_edit_url := NULL;
              END IF;
      
              l_disable_edit := rec.CREATED IS NULL OR rec.CREATED + INTERVAL '5' HOUR < SYSTIMESTAMP;
      
              l_html := l_html || '
              <div class="bg-white rounded-2xl border border-gray-100 shadow mb-6 p-5">
                  <div class="flex items-center gap-2 mb-2">
                      <i class="fa6-solid fa6-calendar-days fa6-fw text-gray-400"></i>
                      <span class="text-xl font-bold text-gray-700">' || TO_CHAR(rec.TRANSACTION_DATE, 'DD/MM/YY') || '</span>
                  </div>
                  <div class="mb-2 text-base font-semibold text-gray-900" style="word-break:break-word;">
                      <i class="fa6-solid fa6-file-lines fa6-fw text-gray-400"></i> ' || APEX_ESCAPE.HTML(rec.DESCRIPTION) || '
                  </div>
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-hashtag fa6-fw text-gray-400"></i> الرقم المرجعي</span>
                      <span class="px-2 py-0.5 bg-blue-50 text-blue-700 rounded text-xs font-bold font-mono">' || APEX_ESCAPE.HTML(rec.REFERENCE_NUMBER) || '</span>
                  </div>
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-money-bill-wave fa6-fw text-gray-400"></i> المبلغ</span>
                      <span class="text-2xl font-bold ' || CASE WHEN rec.SIGNED_AMOUNT < 0 THEN 'text-red-500'
                                                             WHEN rec.SIGNED_AMOUNT > 0 THEN 'text-green-600'
                                                             ELSE 'text-gray-700' END || '">'
                      || CASE WHEN rec.SIGNED_AMOUNT < 0 THEN '-' ELSE '' END || format_amount(ABS(rec.SIGNED_AMOUNT)) || 
                      '<span class="text-base text-gray-500 font-normal pl-1">' || NVL(rec.CURRENCY_CODE, '') || '</span></span>
                  </div>
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-wallet fa6-fw text-gray-400"></i> الرصيد بعد المعاملة</span>
                      <span class="text-base font-bold text-gray-900">' || NVL(rec.CURRENCY_CODE, '') || ' ' || format_amount(rec.BALANCE_AFTER_TRANSACTION) || '</span>
                  </div>
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-user fa6-fw text-gray-400"></i> القائم بالتنفيذ</span>
                      <span class="text-xs text-gray-800 font-medium">' || NVL(APEX_ESCAPE.HTML(rec.CREATED_BY_NAME), '-') || '</span>
                  </div>
                  <div class="flex items-center justify-between mb-1">
                      <span class="text-xs text-gray-500"><i class="fa6-solid fa6-clock fa6-fw text-gray-400"></i> تاريخ التنفيذ</span>
                      <span class="text-xs text-gray-400">' || TO_CHAR(convert_to_local_timezone(rec.CREATED), 'DD/MM/YY HH24:MI') || '</span>
                  </div>' ||
                  CASE 
                      WHEN l_edit_url IS NOT NULL THEN
                          '<div class="mt-3 flex justify-end"><a href="' || l_edit_url || '"'
                          || CASE WHEN l_disable_edit THEN ' tabindex="-1" class="inline-flex items-center px-4 py-1.5 rounded-lg bg-gray-300 text-white font-bold shadow transition cursor-not-allowed pointer-events-none" title="تجاوزت مدة السماح بالتعديل (ساعة)"'
                                  ELSE ' class="inline-flex items-center px-4 py-1.5 rounded-lg bg-yellow-400 hover:bg-yellow-500 text-white font-bold shadow transition" title="تعديل"' END
                          || '><i class="fa6-solid fa6-pen-to-square fa6-fw mr-1"></i> تعديل</a></div>'
                      ELSE ''
                  END || '
              </div>';
          END LOOP;
      
          l_html := l_html || '</div></div>'; -- Close both views
      
          RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P754_ACCOUNT_ID

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
