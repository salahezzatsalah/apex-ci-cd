- # ====== Region: Image Gallery  ==============================
  id: 218369647893325184
  identification: 
    name: 'Image Gallery '
    title: معرص الصور
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html        CLOB := '';
        l_photos      CLOB;
        l_count       NUMBER := 0;
      
        /* Escape HTML */
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
      BEGIN
        /* ============================================
           Get Gallery URLs
           ============================================ */
        SELECT photo_url
        INTO   l_photos
        FROM   limo_car_types
        WHERE  car_type_id = :P354_ID;
      
        /* ============================================
           CSS + JS
           ============================================ */
        l_html := l_html || '
      
      <style>
      
      /* Grid */
      .car-gallery{
        display:grid;
        gap:12px;
        grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
      }
      
      /* Card */
      .car-img{
        position:relative;
        overflow:hidden;
        border-radius:12px;
        background:#f8fafc;
        cursor:pointer;
        border:1px solid #e2e8f0;
        aspect-ratio:1/1;
      }
      
      /* Image */
      .car-img img{
        width:100%;
        height:100%;
        object-fit:cover;
        transition:.3s;
      }
      
      .car-img:hover img{
        transform:scale(1.05);
      }
      
      /* Overlay */
      .car-img::after{
        content:"🔍";
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background:rgba(0,0,0,.35);
        color:#fff;
        font-size:26px;
        opacity:0;
        transition:.2s;
      }
      
      .car-img:hover::after{
        opacity:1;
      }
      
      /* Lightbox */
      #galleryLightbox{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.85);
        display:none;
        z-index:99999;
        align-items:center;
        justify-content:center;
      }
      
      #galleryLightbox img{
        max-width:92%;
        max-height:92%;
        border-radius:12px;
        box-shadow:0 20px 60px rgba(0,0,0,.5);
      }
      
      #galleryClose{
        position:absolute;
        top:20px;
        right:25px;
        color:#fff;
        font-size:28px;
        cursor:pointer;
      }
      
      </style>
      
      
      <script>
      
      function openGallery(src){
        var box = document.getElementById("galleryLightbox");
        var img = document.getElementById("galleryLightboxImg");
      
        img.src = src;
        box.style.display = "flex";
      }
      
      function closeGallery(){
        document.getElementById("galleryLightbox").style.display="none";
      }
      
      document.addEventListener("keydown",function(e){
        if(e.key==="Escape"){
          closeGallery();
        }
      });
      
      </script>
      
      ';
      
      
        /* ============================================
           Container
           ============================================ */
        l_html := l_html || '<div class="car-gallery">';
      
      
        /* ============================================
           Split CSV → Images
           ============================================ */
      FOR r IN (
        SELECT
          TRIM(
            REPLACE(
              REPLACE(
                REPLACE(
                  REGEXP_SUBSTR(l_photos,'[^,]+',1,LEVEL),
                '"',''),
              '[',''),
            ']','')
          ) AS url
        FROM dual
        CONNECT BY REGEXP_SUBSTR(l_photos,'[^,]+',1,LEVEL) IS NOT NULL
      )
      
        LOOP
          l_count := l_count + 1;
      
          l_html := l_html || '
      
            <div class="car-img"
                 onclick="openGallery('''||esc(r.url)||''')">
      
              <img src="'||esc(r.url)||'"
                   loading="lazy"
                   alt="Car Image '||l_count||'">
      
            </div>
      
          ';
        END LOOP;
      
      
        l_html := l_html || '</div>';
      
      
        /* ============================================
           Empty Case
           ============================================ */
        IF l_count = 0 THEN
      
          l_html := '
      
            <div style="
              padding:20px;
              text-align:center;
              color:#64748b;
              font-size:14px;
            ">
      
              No gallery images uploaded.
      
            </div>
      
          ';
      
        END IF;
      
      
        /* ============================================
           Lightbox
           ============================================ */
        l_html := l_html || '
      
      <div id="galleryLightbox" onclick="closeGallery()">
      
        <span id="galleryClose">✕</span>
      
        <img id="galleryLightboxImg" src="">
      
      </div>
      
      ';
      
      
        /* ============================================
           Output
           ============================================ */
        htp.p(l_html);
      
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
      
          htp.p('
            <div style="padding:15px;color:#dc2626;">
              Car record not found.
            </div>
          ');
      
      END;
      
    page-items-to-submit: 
    - P354_ID

