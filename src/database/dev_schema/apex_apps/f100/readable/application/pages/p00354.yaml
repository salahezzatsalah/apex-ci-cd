- # ====== Button: view_images =================================
  id: 266833356350429849
  identification: 
    button-name: view_images
    label: معرض الصور

  layout: 
    sequence: 10
    region: Car Catalog Documents # 159280989476077681747
    slot: RIGHT_OF_IR_SEARCH_BAR
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text
    hot: false
    template-options: 
    - '#DEFAULT#'
    - t-Button--noUI

  behavior: 
    action: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:355:&SESSION.::&DEBUG.:355:P355_CAR_TYPE_ID:&P354_ID.'
      page: 355 # Car Type Images Gallery
      clear-cache: 355
      values: 
        p355_car_type_id: '&P354_ID.'

    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Rows returned
    sql-query: |
      select 1 
        from CARS_CATALOG_DOCUMENTS d
       where car_type_id = :P354_ID and 
             (
                 lower(DOCUMENT_FILENAME) like '%.png' or 
                 lower(DOCUMENT_FILENAME) like '%.jpg' or 
                 lower(DOCUMENT_FILENAME) like '%.jpeg' or 
                 lower(DOCUMENT_FILENAME) like '%.gif' or 
                 lower(DOCUMENT_FILENAME) like '%.tiff' or 
                 lower(DOCUMENT_FILENAME) like '%.ai' 
             )

