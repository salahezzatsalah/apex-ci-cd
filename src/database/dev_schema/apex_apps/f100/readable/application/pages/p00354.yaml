- # ====== Region: Prices List =================================
  id: 331618575871664054
  identification: 
    name: Prices List
    title: التسعيرات
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      /* ======================================================
         TRIP / DAILY PRICES
      ====================================================== */
      SELECT
          'TRIP'                              AS price_type_code,
      
          'رحلة / يوم كامل'                  AS price_type,
      
          '-'                                 AS hours_package,
      
          TO_CHAR(p.price_per_trip,'FM999G999G990D00')
            || ' ' || p.currency             AS price,
      
          p.start_date                        AS valid_from,
      
          p.end_date                          AS valid_to,
      
          CASE
            WHEN p.end_date IS NULL
             OR p.end_date >= SYSDATE
            THEN 'نشط'
            ELSE 'منتهي'
          END                                 AS status,
      
          p.notes,
      
          p.created,
          p.created_by,
          p.updated,
          p.updated_by
      
      FROM limo_car_type_prices p
      WHERE p.car_type_id = :P354_ID
      
      
      
      UNION ALL
      
      
      
      /* ======================================================
         HOURLY PACKAGES
      ====================================================== */
      SELECT
          'HOUR'                             AS price_type_code,
      
          'بالساعة'                          AS price_type,
      
          h.hours || ' ساعة'                AS hours_package,
      
          TO_CHAR(h.base_price,'FM999G999G990D00')
            || ' ' || h.currency            AS price,
      
          h.effective_from                  AS valid_from,
      
          h.effective_to                    AS valid_to,
      
          CASE
            WHEN h.is_active = 'Y'
            THEN 'نشط'
            ELSE 'غير نشط'
          END                                AS status,
      
          h.notes,
      
          h.created,
          h.created_by,
          h.updated,
          h.updated_by
      
      FROM limo_car_type_hourly_rates h
      WHERE h.car_type_id = :P354_ID
      
      
      
      UNION ALL
      
      
      
      /* ======================================================
         KM PRICES
      ====================================================== */
      SELECT
          'KM'                              AS price_type_code,
      
          'لكل كيلومتر'                     AS price_type,
      
          '-'                                AS hours_package,
      
          TO_CHAR(k.price_per_km,'FM999G999G990D00')
            || ' ' || k.currency            AS price,
      
          k.effective_from                 AS valid_from,
      
          k.effective_to                   AS valid_to,
      
          CASE
            WHEN k.is_active = 'Y'
            THEN 'نشط'
            ELSE 'غير نشط'
          END                                AS status,
      
          k.notes,
      
          k.created,
          k.created_by,
          k.updated,
          k.updated_by
      
      FROM limo_car_type_km_prices k
      WHERE k.car_type_id = :P354_ID
      
      
      
    page-items-to-submit: 
    - P354_ID

