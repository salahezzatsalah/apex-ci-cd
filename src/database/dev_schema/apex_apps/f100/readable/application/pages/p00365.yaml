  identification: 
    name: Driver Account Form
    title: استمارة ملف كابتن داخلي - نموذج 365
    type: Form

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select DRIVER_NAME,
             NATIONAL_ID,
             LICENSE_NUMBER,
             LICENSE_EXPIRY_DATE,
             PHONE,
             EMAIL,
             ADDRESS,
             CITY,
             COUNTRY_ID,
             STATUS,
             EMPLOYEE_CODE,
             JOIN_DATE,
             DRIVER_LEVEL,
             CONTRACT_TYPE,
             IS_ACTIVE_EMPLOYEE,
             DEPARTMENT_ID,
             PROFILE_PHOTO,
             PHOTO_FILENAME,
             PHOTO_MIMETYPE,
             PHOTO_CHARSET,
             PHOTO_LAST_UPDATED,
             NOTES,
             HAS_PORTAL_ACCESS,
             USERNAME,
             PASSWORD_HASH,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             DRIVER_ID,
             DRIVER_AVATAR
        from COMPANY_DRIVERS

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
