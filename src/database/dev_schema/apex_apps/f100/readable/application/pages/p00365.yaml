    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
        department_name || 
        CASE 
          WHEN department_code IS NOT NULL THEN ' (' || department_code || ')' 
          ELSE '' 
        END AS d,
        id AS r
      FROM bs_departments
      ORDER BY 1;
      
    display-extra-values: false

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: Driver Account Form # 301051964538839946
