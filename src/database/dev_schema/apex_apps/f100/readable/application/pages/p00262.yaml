dynamic-actions: 
- # ====== Dynamic Action: make_payment ========================
  id: 192984436183998195
  identification: 
    name: make_payment

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: Pay # 192984367749998194

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 161563356656425206
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var pToken = apex.item("P262_PAYEMENT_TOKEN").getValue();
        var iframeId = "996215"; 
        
        if (pToken && pToken.length > 20) {
            var url = "https://accept.paymob.com/api/acceptance/iframes/" + iframeId + "?payment_token=" + pToken;
            //  var url="https://paymob.link/44Q6A";
            // تحديد خصائص النافذة الجديدة (العرض، الارتفاع، والمكان)
            var width = 600;
            var height = 700;
            var left = (screen.width - width) / 2;
            var top = (screen.height - height) / 2;
            var features = "width=" + width + ",height=" + height + ",top=" + top + ",left=" + left + ",scrollbars=yes,resizable=yes";
        
            // فتح الرابط في نافذة جديدة (Window)
            var payWindow = window.open(url, "PaymobPayment", features);
        
            // التحقق إذا كان المتصفح حظر النافذة المنبثقة
            if (!payWindow) {
                apex.message.alert("يرجى السماح بالنوافذ المنبثقة (Popups) لإتمام عملية الدفع.");
            }
        
        } else {
            apex.message.alert("عفواً، حدث خطأ في تجهيز بيانات الدفع، يرجى المحاولة مرة أخرى.");
        }

    execution: 
      sequence: 40
      event: make_payment # 192984436183998195
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 192984601704998197
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        INSERT INTO paymob_orders (amount, status)
        VALUES (:P262_AMOUNT, 'PENDING')
        RETURNING order_id INTO :P262_ORDER_ID;
        
      items-to-submit: 
      - P262_AMOUNT
      items-to-return: 
      - P262_ORDER_ID
      suppress-change-event: false

    execution: 
      sequence: 20
      event: make_payment # 192984436183998195
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute Server-side Code ====================
    id: 212682790945938353
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            l_response_clob  CLOB;
            l_auth_token     VARCHAR2(4000);
            l_order_id       NUMBER;           -- ده order_id بتاع Paymob
            l_payment_token  VARCHAR2(4000);
        
            -- إعدادات Paymob
            v_api_key        VARCHAR2(500) := 'ZXlKaGJHY2lPaUpJVXpVeE1pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SmpiR0Z6Y3lJNklrMWxjbU5vWVc1MElpd2ljSEp2Wm1sc1pWOXdheUk2TVRFeU1qSXdNeXdpYm1GdFpTSTZJakUzTnpFeU16UTBORGt1TURRMk1UazFJbjAuU3loUTVvM21DUURveDJEQVNLSHVWaHlWSWVxMm8tUEUxbkFONUZKZVlYTUZGT21kWllkZW1nOC1GazZCRThXdDBQMmJiTkF5TGFXZmJwMUF6MXRyekE=';
            v_integration_id NUMBER        := 5467116;
            v_amount         NUMBER        := NVL(ROUND(:P262_AMOUNT * 100), 0);  -- السعر بالقرش
        
        BEGIN
            -- 1) Auth Token
            apex_web_service.g_request_headers(1).name  := 'Content-Type';
            apex_web_service.g_request_headers(1).value := 'application/json';
            apex_web_service.g_request_headers(2).name  := 'Accept';
            apex_web_service.g_request_headers(2).value := 'application/json';
        
            l_response_clob := apex_web_service.make_rest_request(
                p_url         => 'https://accept.paymob.com/api/auth/tokens',
                p_http_method => 'POST',
                p_body        => '{"api_key": "' || v_api_key || '"}'
            );
            apex_json.parse(l_response_clob);
            l_auth_token := apex_json.get_varchar2(p_path => 'token');
        
            -- 2) Order Registration
            l_response_clob := apex_web_service.make_rest_request(
                p_url         => 'https://accept.paymob.com/api/ecommerce/orders',
                p_http_method => 'POST',
                p_body        => '{
                    "auth_token": "' || l_auth_token || '",
                    "delivery_needed": "false",
                    "amount_cents": ' || v_amount || ',
                    "currency": "EGP",
                    "merchant_order_id": "' || :P262_ORDER_ID || '",
                    "items": [{"name":"Item1","amount_cents":' || v_amount || ',"quantity":1}]
                }'
            );
            apex_json.parse(l_response_clob);
            l_order_id := apex_json.get_number(p_path => 'id');
        
            -- 3) Payment Key
            l_response_clob := apex_web_service.make_rest_request(
                p_url         => 'https://accept.paymob.com/api/acceptance/payment_keys',
                p_http_method => 'POST',
                p_body        => '{
                    "auth_token": "' || l_auth_token || '",
                    "amount_cents": ' || v_amount || ',
                    "expiration": 3600,
                    "order_id": ' || l_order_id || ',
                    "billing_data": {
                        "apartment": "NA",
                        "email": "'|| NVL(:P262_EMAIL,'test@example.com') ||'",
                        "floor": "NA",
                        "first_name": "'|| NVL(:P262_FIRST_NAME,'NA') ||'",
                        "street": "NA",
