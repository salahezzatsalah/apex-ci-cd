javascript: 
  function-and-global-variable-declaration: |
    window.addEventListener("message", function(event) {
        // التأكد من أن البيانات قادمة من Paymob وبها حالة النجاح
        if (event.data.success === true || event.data.type === "TRANSACTION_SUCCESSFUL") {
            
            var trxId = event.data.id; // الحصول على رقم العملية من Paymob
    
            // 1. وضع رقم العملية داخل الـ Item الذي أنشأتِه
            $s("P262_PAYMENT_RESULT", trxId);
    
            // 2. إغلاق نافذة الدفع (الـ Modal)
            apex.theme.closeRegion("PAY_MODAL_STATIC_ID"); 
    
            // 3. إظهار رسالة تأكيد للمستخدم
            apex.message.showPageSuccess("✅ تم تسجيل العملية بنجاح! رقم المعاملة: " + trxId);
    
            // 4. تحديث التقرير (Transactions Summary) ليظهر السطر الجديد فوراً
            
            // (اختياري) إذا كنتِ تريدين تنفيذ أكشن PL/SQL فور وضع القيمة في الـ Item
            // apex.event.trigger('#P262_PAYMENT_RESULT', 'change');
        }
    }, false);

