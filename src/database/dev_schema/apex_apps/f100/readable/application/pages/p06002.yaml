- # ====== Region: TimeLine ====================================
  id: 277028535928043640
  identification: 
    name: TimeLine
    title: تقرير جلسات الرحلة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
      BEGIN
        l_html := l_html || '
        <section class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm">
          <div class="flex items-center gap-2 text-lg font-semibold text-black dark:text-white mb-1">
            <i class="fa6 fa6-clock text-amber-600"></i>
            <span>خط سير الرحلة</span>
          </div>
      
          <ol class="relative border-s border-neutral-200 dark:border-neutral-700 mt-4 ps-5 space-y-6">';
      
        FOR rec IN (
          SELECT SESSION_TYPE, STARTED_AT
          FROM LIMO_TRIP_SESSIONS
          WHERE TRIP_ID = :P6002_TRIP_ID
          ORDER BY STARTED_AT
        ) LOOP
          l_html := l_html || '
            <li class="relative">
              <div class="absolute -start-[0.45rem] top-1 w-3 h-3 rounded-full ' ||
                CASE rec.SESSION_TYPE
                  WHEN 'START' THEN 'bg-green-600'
                  WHEN 'PAUSE' THEN 'bg-yellow-500'
                  WHEN 'RESUME' THEN 'bg-blue-600'
                  ELSE 'bg-neutral-400'
                END || ' border border-white dark:border-neutral-900"></div>
      
              <div class="ms-4">
                <div class="flex items-center gap-2 text-sm font-medium leading-tight text-neutral-800 dark:text-white">
                  <i class="fa6 ' ||
                    CASE rec.SESSION_TYPE
                      WHEN 'START' THEN 'fa6-play'
                      WHEN 'PAUSE' THEN 'fa6-pause'
                      WHEN 'RESUME' THEN 'fa6-forward'
                      ELSE 'fa6-circle-dot'
                    END || '"></i>
                  ' || 
                    CASE rec.SESSION_TYPE
                      WHEN 'START' THEN 'بدأت الرحلة'
                      WHEN 'PAUSE' THEN 'تم الإيقاف المؤقت'
                      WHEN 'RESUME' THEN 'استئناف الرحلة'
                      ELSE rec.SESSION_TYPE
                    END || '
                </div>
                <div class="text-xs text-neutral-500 dark:text-neutral-400 mt-1">' ||
                  TO_CHAR(rec.STARTED_AT, 'DY DD Mon YYYY - HH24:MI', 'NLS_DATE_LANGUAGE=ARABIC') || '</div>
              </div>
            </li>';
        END LOOP;
      
        -- Final END session, if exists
        FOR rec2 IN (
          SELECT END_DATETIME FROM LIMO_TRIPS_TRACKER
          WHERE TRIP_ID = :P6002_TRIP_ID AND END_DATETIME IS NOT NULL
        ) LOOP
          l_html := l_html || '
            <li class="relative">
              <div class="absolute -start-[0.45rem] top-1 w-3 h-3 rounded-full bg-lime-600 border border-white dark:border-neutral-900"></div>
              <div class="ms-4">
                <div class="flex items-center gap-2 text-sm font-medium text-neutral-800 dark:text-white">
                  <i class="fa6 fa6-flag-checkered"></i>
                  تم إنهاء الرحلة
                </div>
                <div class="text-xs text-neutral-500 dark:text-neutral-400 mt-1">' ||
                  TO_CHAR(rec2.END_DATETIME, 'DY DD Mon YYYY - HH24:MI', 'NLS_DATE_LANGUAGE=ARABIC') || '</div>
              </div>
            </li>';
        END LOOP;
      
        l_html := l_html || '</ol></section>';
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6002_TRIP_ID

  layout: 
    sequence: 10
