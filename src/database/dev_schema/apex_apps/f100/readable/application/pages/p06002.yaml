- # ====== Region: Expenses Report =============================
  id: 277028963479043644
  identification: 
    name: Expenses Report
    title: تقرير المصروفات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
        l_total_expense NUMBER := 0;
      BEGIN
        l_html := l_html || '
        <div class="bg-white">
          <div class="space-y-1">
            <div class="flex items-center gap-2 text-lg font-semibold text-black dark:text-white">
              <i class="fa6 fa6-file-invoice-dollar text-red-500"></i>
              <span>تقرير المصروفات</span>
            </div>
            <div class="text-sm text-neutral-500">قائمة بجميع المصروفات الخاصة بالرحلة</div>
          </div>
      
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">';
      
        FOR e IN (
          SELECT TO_CHAR(e.EXPENSE_DATE, 'DD/MM/YYYY') AS EXP_DATE,
                 et.EXPENSE_TYPE_NAME,
                 es.STATUS_NAME,
                 e.AMOUNT,
                 e.CURRENCY
          FROM LIMO_TRIP_EXPENSES e
          JOIN LIMO_EXPENSE_TYPES et ON e.EXPENSE_TYPE = et.EXPENSE_TYPE_CODE
          JOIN LIMO_EXPENSE_STATUSES es ON e.STATUS = es.STATUS_CODE
          WHERE e.TRIP_ID = :P6002_TRIP_ID
          ORDER BY e.EXPENSE_DATE DESC
        ) LOOP
          l_total_expense := l_total_expense + NVL(e.AMOUNT, 0);
      
          l_html := l_html || '
            <div class="bg-neutral-50 dark:bg-neutral-800 rounded-xl p-3 shadow-sm">
              <div class="flex items-center gap-2 text-sm text-neutral-700 dark:text-neutral-300">
                <i class="fa6 fa6-receipt text-blue-600"></i>
                <span>' || e.EXPENSE_TYPE_NAME || '</span>
              </div>
              <div class="text-xs text-neutral-500 mt-1">
                <span>📅 ' || e.EXP_DATE || '</span> · <span>الحالة: ' || e.STATUS_NAME || '</span>
              </div>
              <div class="text-sm font-semibold text-end text-black dark:text-white mt-2">
                ' || TO_CHAR(e.AMOUNT, '999G999G990D00') || ' ' || e.CURRENCY || '
              </div>
            </div>';
        END LOOP;
      
        l_html := l_html || '
            <!-- Summary -->
            <div class="bg-neutral-50 dark:bg-neutral-800 rounded-xl p-3 shadow-sm sm:col-span-2">
