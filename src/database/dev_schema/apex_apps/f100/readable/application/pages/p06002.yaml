- # ====== Region: Collections Report ==========================
  id: 277029360058043648
  identification: 
    name: Collections Report
    title: تقرير التحصيلات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
        l_total_egp NUMBER := 0;
      BEGIN
        l_html := l_html || '
        <section class="bg-white dark:bg-neutral-900 rounded-2xl p-5 shadow-sm space-y-4">
          <div class="flex items-center gap-2 text-lg font-semibold text-black dark:text-white">
            <i class="fa6 fa6-money-check-dollar text-green-600"></i>
            <span>المدفوعات المُحصّلة</span>
          </div>
          <div class="space-y-3">';
      
        FOR p IN (
          SELECT 
            c.COLLECTION_DATETIME,
            cm.METHOD_NAME,
            cm.METHOD_ICON,
            c.COLLECTED_BY_TYPE,
            c.COLLECTOR_NAME,
            c.AMOUNT_COLLECTED,
            c.CURRENCY,
            c.EXCHANGE_RATE_USED,
            c.AMOUNT_EGP,
            c.RECEIPT_NOTE
          FROM LIMO_TRIP_COLLECTIONS c
          LEFT JOIN LIMO_COLLECTION_METHODS cm ON c.COLLECTION_METHOD = cm.METHOD_ID
          WHERE c.TRIP_ID = :P6002_TRIP_ID
          ORDER BY c.COLLECTION_DATETIME DESC
        ) LOOP
          l_total_egp := l_total_egp + NVL(p.AMOUNT_EGP, 0);
      
          l_html := l_html || '
            <div class="flex items-start justify-between bg-neutral-50 dark:bg-neutral-800 rounded-xl p-3 shadow-sm">
              <div class="flex flex-col space-y-1 text-sm text-neutral-700 dark:text-neutral-300">
                <div class="font-medium flex items-center gap-2">
                  <i class="fa6 ' || NVL(p.METHOD_ICON, 'fa6-credit-card') || ' text-blue-600"></i>
                  <span>' || NVL(p.METHOD_NAME, 'طريقة غير معروفة') || '</span>
                </div>
                <div class="text-xs text-neutral-500">
                  التاريخ: ' || TO_CHAR(p.COLLECTION_DATETIME, 'DD/MM/YYYY HH24:MI') || '<br>
                  بواسطة: ' ||
                  CASE p.COLLECTED_BY_TYPE
                    WHEN 'DRIVER' THEN 'السائق'
                    WHEN 'OFFICE' THEN 'المكتب'
                    ELSE NVL(p.COLLECTED_BY_TYPE, 'غير محدد')
                  END || ' - ' || NVL(p.COLLECTOR_NAME, 'غير معروف') || '
                </div>';
      
          IF p.RECEIPT_NOTE IS NOT NULL THEN
            l_html := l_html || '<div class="text-xs text-neutral-400 mt-1"><i class="fa6 fa6-note-sticky me-1"></i>' || p.RECEIPT_NOTE || '</div>';
          END IF;
      
          l_html := l_html || '
              </div>
              <div class="text-sm font-semibold text-end text-black dark:text-white whitespace-nowrap">'
              || TO_CHAR(p.AMOUNT_COLLECTED, '999G999G990D00') || ' ' || p.CURRENCY;
      
          IF p.CURRENCY != 'EGP' THEN
            l_html := l_html || '<div class="text-xs text-neutral-400 text-end">(≈ ' || TO_CHAR(p.AMOUNT_EGP, '999G999G990D00') || ' EGP)</div>';
          END IF;
      
          l_html := l_html || '</div></div>';
        END LOOP;
      
        -- Summary (Total in EGP)
        l_html := l_html || '
          </div>
          <div class="border-t border-dashed border-neutral-200 dark:border-neutral-700 pt-4 text-end space-y-1">
            <div class="text-sm font-bold text-neutral-800 dark:text-neutral-100">
              <i class="fa6 fa6-wallet text-green-600 me-1"></i>
              إجمالي المحصل: ' || TO_CHAR(l_total_egp, '999G999G990D00') || ' EGP
            </div>';
      
        -- Currency breakdown
        FOR cur IN (
          SELECT CURRENCY, SUM(AMOUNT_COLLECTED) AS AMT
          FROM LIMO_TRIP_COLLECTIONS
          WHERE TRIP_ID = :P6002_TRIP_ID
          GROUP BY CURRENCY
        ) LOOP
          l_html := l_html || '
            <div class="text-xs text-neutral-400 text-end">
              <i class="fa6 fa6-coins me-1 text-neutral-400"></i>' || TO_CHAR(cur.AMT, '999G999G990D00') || ' ' || cur.CURRENCY || '
            </div>';
        END LOOP;
      
        l_html := l_html || '
          </div>
        </section>';
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6002_TRIP_ID

  layout: 
    sequence: 10
    parent-region: 💵 Collections Section # 277029272148043647
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
