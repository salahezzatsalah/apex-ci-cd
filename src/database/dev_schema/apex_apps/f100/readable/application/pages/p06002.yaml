# ====== Page: Trip Tracked Details ==========================
id: 6002
identification: 
  name: Trip Tracked Details
  alias: TRIP-TRACKED-DETAILS
  title: استمارة بيانات الرحلة - نموذج 6002

appearance: 
  page-mode: Modal Dialog
  dialog-template: Theme Default
  template-options: 
  - '#DEFAULT#'

dialog: 
  chained: true
  resizable: true

navigation-menu: 
  override-user-interface-level: true
  list: Do not show Navigation Menu List

navigation: 
  cursor-focus: Do not focus cursor
  warn-on-unsaved-changes: true

javascript: 
  file-urls: 
  - 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
  - null
  execute-when-page-loads: |
    window.loadTripMap = function(tripId) {
      if (!tripId) return;
    
      apex.server.process("GET_TRIP_GPS", {}, {
        success: function(data) {
          if (typeof data === "string") data = JSON.parse(data);
          if (!data || data.length === 0) {
            document.getElementById("gps-map").innerHTML = "⚠️ لا توجد بيانات GPS.";
            return;
          }
    
          document.getElementById("gps-map").innerHTML = "";
          var map = L.map('gps-map');
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);
    
          var latlngs = data.map(p => [p.lat, p.lon]);
          var polyline = L.polyline(latlngs, { color: 'blue', weight: 4 }).addTo(map);
          map.fitBounds(polyline.getBounds());
    
          L.marker(latlngs[0]).addTo(map).bindPopup("🚀 بداية الرحلة");
          L.marker(latlngs[latlngs.length - 1]).addTo(map).bindPopup("🏁 نهاية الرحلة");
    
          data.forEach(p => {
            L.circleMarker([p.lat, p.lon], {
              radius: 5,
              color: "#333",
              fillColor: "#38f",
              fillOpacity: 0.7
            }).addTo(map).bindPopup("🕓 " + p.ts + "<br>🚗 " + (p.speed || 0).toFixed(1) + " كم/س");
          });
        }
      });
    };
    

css: 
  file-urls: 
  - 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'
  - null

security: 
  authentication: Page Requires Authentication
  deep-linking: Application Default
