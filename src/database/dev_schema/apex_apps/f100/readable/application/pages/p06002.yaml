- # ====== Process: GET_TRIP_GPS ===============================
  id: 271415619961671077
  identification: 
    name: GET_TRIP_GPS
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_trip_id VARCHAR2(50) := TRIM(:P6002_TRIP_ID);
        l_json    CLOB;
      BEGIN
        SELECT JSON_ARRAYAGG(
                 JSON_OBJECT(
                   'lat'   VALUE LATITUDE,
                   'lon'   VALUE LONGITUDE,
                   'ts'    VALUE TO_CHAR(TRACK_DATETIME, 'YYYY-MM-DD\"T\"HH24:MI:SS'),
                   'speed' VALUE SPEED_KM_HR
                 )
                 RETURNING CLOB
               )
        INTO l_json
        FROM VW_TRIP_GPS_TRACK_LOGS
        WHERE TRIP_ID = l_trip_id;
      
        IF l_json IS NULL THEN
          l_json := '[]';
        END IF;
      
        OWA_UTIL.mime_header('application/json', FALSE);
        HTP.p('Cache-Control: no-cache');
        OWA_UTIL.http_header_close;
        HTP.p(l_json);
      END;
      

  execution: 
    sequence: 10
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

