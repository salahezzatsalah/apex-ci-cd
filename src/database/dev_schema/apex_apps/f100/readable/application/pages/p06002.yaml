- # ====== Region: Added Services Report =======================
  id: 277029154588043646
  identification: 
    name: Added Services Report
    title: تقرير الخدمات المضافة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
        l_total_services NUMBER := 0;
      BEGIN
        l_html := l_html || '
        <div class="w-full sm:px-0 px-4">
          <section class="bg-white dark:bg-neutral-900 rounded-2xl p-5 sm:p-6 shadow-sm space-y-5">
      
            <!-- Header -->
            <div class="space-y-1">
              <div class="flex items-center gap-2 text-lg font-semibold text-black dark:text-white">
                <i class="fa6 fa6-screwdriver-wrench text-yellow-500"></i>
                <span>الخدمات الإضافية</span>
              </div>
              <div class="text-sm text-neutral-500">قائمة الخدمات الإضافية المقدمة خلال الرحلة</div>
            </div>
      
            <!-- Services Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">';
      
        FOR s IN (
          SELECT
            s.SERVICE_DATE,
            ast.SERVICE_TYPE_NAME,
            s.QUANTITY,
            s.RATE_PER_UNIT,
            s.UNIT_TYPE,
            s.CURRENCY,
            s.AMOUNT,
            s.AMOUNT_EGP
          FROM LIMO_ADD_SERVICES s
          JOIN LIMO_ADDITIONAL_SERVICE_TYPES ast ON s.SERVICE_TYPE_CODE = ast.SERVICE_TYPE_CODE
          WHERE s.TRIP_ID = :P6002_TRIP_ID
          ORDER BY s.SERVICE_DATE DESC
        ) LOOP
          l_total_services := l_total_services + NVL(s.AMOUNT_EGP, 0);
      
          l_html := l_html || '
              <div class="bg-neutral-50 dark:bg-neutral-800 rounded-xl p-4 shadow-sm flex flex-col justify-between h-full">
                <div class="flex items-center gap-2 text-sm font-medium text-neutral-700 dark:text-neutral-200">
                  <i class="fa6 fa6-puzzle-piece text-blue-600"></i>
                  <span>' || s.SERVICE_TYPE_NAME || '</span>
                </div>
                <div class="text-xs text-neutral-500 mt-1 leading-relaxed">
                  التاريخ: ' || TO_CHAR(s.SERVICE_DATE, 'DD/MM/YYYY') || '<br>
                  الكمية: ' || s.QUANTITY || ' × ' || TO_CHAR(s.RATE_PER_UNIT, '999G990D00') || ' ' || s.CURRENCY || ' / ' || s.UNIT_TYPE || '
                </div>
                <div class="text-sm font-bold text-end text-black dark:text-white mt-3 whitespace-nowrap">'
                || TO_CHAR(s.AMOUNT, '999G999G990D00') || ' ' || s.CURRENCY;
      
          IF s.CURRENCY != 'EGP' THEN
            l_html := l_html || '<div class="text-xs text-neutral-400 text-end">(≈ ' ||
                         TO_CHAR(s.AMOUNT_EGP, '999G999G990D00') || ' EGP)</div>';
          END IF;
      
          l_html := l_html || '</div></div>';
        END LOOP;
      
        -- Total Summary
        l_html := l_html || '
            </div>
      
            <div class="border-t border-dashed border-neutral-200 dark:border-neutral-700 pt-4 text-end text-sm font-bold text-neutral-800 dark:text-neutral-100">
              <i class="fa6 fa6-layer-group text-green-600 me-1"></i>
              إجمالي الخدمات: ' || TO_CHAR(l_total_services, '999G999G990D00') || ' EGP
            </div>
      
          </section>
        </div>';
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6002_TRIP_ID

  layout: 
    sequence: 10
