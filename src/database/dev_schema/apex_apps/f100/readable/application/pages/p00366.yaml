          --       <i class="fa6 fa-building-columns text-xl text-red-400"></i>
          --       <div class="flex-1 text-right">
          --         <div class="font-semibold text-red-700 mb-1">'||
          --           CASE
          --             WHEN :USER_TYPE = 'EMPLOYEE' THEN 'مستحق للشركة'
          --             ELSE 'عليك'
          --           END ||'</div>
          --         <div class="font-bold text-lg text-red-900">'||c.currency||' '||c.remaining_amount||'</div>
          --         <div class="text-xs text-gray-500">≈ '||c.remaining_amount_egp||' جنيه</div>
          --       </div>
