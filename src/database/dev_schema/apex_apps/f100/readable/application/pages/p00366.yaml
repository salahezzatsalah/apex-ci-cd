      BEGIN
        FOR rec IN c_driver LOOP
          l_found := TRUE;
      
          l_photo_url := NVL(rec.PROFILE_PHOTO, '#APP_FILES#placeholders/unknown.png');
      
          IF rec.TOTAL_TRIPS_MADE > 0 THEN
            l_trips_str := TO_CHAR(rec.TOTAL_TRIPS_MADE) || ' رحلة مكتملة';
          ELSE
