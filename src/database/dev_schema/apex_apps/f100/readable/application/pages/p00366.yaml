  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        CURSOR c_driver IS
          SELECT *
          FROM VW_DRIVER_ACCOUNTING
          WHERE DRIVER_ID = :P366_DRIVER_ID;
      
        l_output       CLOB := '';
        l_photo_url    VARCHAR2(2000);
