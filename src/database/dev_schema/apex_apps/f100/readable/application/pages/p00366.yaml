- # ====== Region: Previous Trips ==============================
  id: 327138895768445458
  identification: 
    name: Previous Trips
    title: توزيعات سابقة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html        CLOB;
        v_trip_index  INTEGER := 0;
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        -- Search box
        DBMS_LOB.APPEND(l_html, q'[
          <div id="previous-trips-region">
            <div class="mb-3">
              <input type="text" id="searchPreviousTrips" placeholder="ابحث عن الرحلة..." 
                     class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300 text-right" 
                     onkeyup="filterPreviousTrips(this.value)">
            </div>
            <script>
              function filterPreviousTrips(term) {
                const cards = document.querySelectorAll('.previous-trip-card');
                term = term.trim().toLowerCase();
                cards.forEach(card => {
                  card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
                });
              }
            </script>
        ]');
      FOR rec IN (
        SELECT *
        FROM (
          SELECT v.*,
                 ROW_NUMBER() OVER (
                   PARTITION BY v.PRODUCT_ID 
                   ORDER BY v.TRIP_DATE_FROM DESC, v.TRIP_TIME DESC
                 ) rn
          FROM LIMO_PAST_DRIVERS_V v
          WHERE v.DRIVER_ID = :P366_DRIVER_ID
        )
        WHERE rn = 1
        ORDER BY TRIP_DATE_FROM DESC , TRIP_TIME DESC
      ) LOOP
      
      
          BEGIN
            v_trip_index := v_trip_index + 1;
      
            DBMS_LOB.APPEND(l_html, '
          <a href="' || APEX_UTIL.PREPARE_URL(
                         'f?p=' || :APP_ID || ':6001:' || :APP_SESSION ||
                         '::::P6001_PRODUCT_ID:' || NVL(rec.PRODUCT_ID, '-')) || '" 
             class="block previous-trip-card transition hover:shadow-md bg-white rounded-xl border border-gray-200 p-4 mb-4 space-y-2">
            
            <div class="flex items-center gap-3">
              <img src="' || NVL(rec.CAR_PHOTO_URL, '#APP_FILES#placeholders/car-default.png') || '" 
                   class="w-14 h-12 object-contain rounded border">
              <div class="flex-1 text-sm text-gray-800">
                <div class="font-bold text-gray-900">' || NVL(rec.CLIENT_CODE, '-') || '</div>
                <div class="text-xs text-gray-500 mt-0.5">
                  <i class="fa6 fa6-hashtag ml-1"></i> رقم الرحلة: ' || NVL(rec.PRODUCT_ID, '-') || '
                  ' || NVL(rec.DETAILS_HTML, '') || '
                </div>
              </div>
            </div>
      
            <!-- Dates, Time, and Locations -->
            <div class="flex flex-wrap items-center justify-between text-sm text-gray-700 gap-2 mt-2">
              <div class="flex items-center gap-2 flex-wrap">
                <i class="fa6 fa6-calendar-days ml-1 text-gray-500"></i> 
                <span class="font-mono text-red-900 font-bold text-xs">
                  ' || NVL(TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(rec.TRIP_DATE_FROM), 'YYYY-MM-DD'), '-') || '
                </span>
                <span class="text-gray-500">الي</span>
                <span class="font-mono text-red-900 font-bold text-xs">
                  ' || NVL(TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(rec.TRIP_DATE_TO), 'YYYY-MM-DD'), '-') || '
                </span>
                <span class="text-gray-400 mx-1">|</span>
                <i class="fa6 fa6-clock ml-1 text-gray-500"></i> 
                <span class="font-mono text-xs">' || NVL(rec.TRIP_TIME, '-') || '</span>
              </div>
      
              <div class="flex items-center gap-2 text-xs font-semibold">
                <span class="bg-gray-500 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-layer-group text-white"></i> ' || NVL(rec.CLASSIFICATION_LABEL_AR, '-') || '
                </span>
                <span class="bg-gray-500 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                  <i class="fa6 fa6-car-side text-white"></i> ' || NVL(rec.TRIP_TYPE_NAME_AR, '-') || '
                </span>' ||
                CASE WHEN rec.TRIP_TYPE = 'DAILY' THEN
                  '<span class="bg-gray-700 text-white rounded-full px-2 py-0.5 flex items-center gap-1">
                    <i class="fa6 fa6-calendar-day text-white"></i> ' || rec.TRIPS_COUNT || ' / ' || rec.NOD || '
                  </span>'
                ELSE '' END || '
              </div>
            </div>
      
            <!-- Progress Bar -->
            <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden mt-2">
              <div class="h-full bg-gray-400 transition-all" style="width:' || rec.TRIP_PROGRESS_PCT || '%"></div>
            </div>
          </a>');
      
          EXCEPTION
            WHEN OTHERS THEN
              DBMS_LOB.APPEND(l_html, 
                '<div style="color:red;background:#fee;padding:8px;margin:6px 0;border-radius:8px;">
                   خطأ: '||SQLERRM||' <br>Product: '||NVL(rec.PRODUCT_ID,'?')||'
                 </div>');
          END;
        END LOOP;
      
        -- No trips fallback
        IF v_trip_index = 0 THEN
          DBMS_LOB.APPEND(l_html, '
          <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-center font-semibold flex flex-col items-center gap-2 mt-6">
            <i class="fa6 fa6-circle-info text-2xl"></i>
            لا توجد أي رحلات سابقة مرتبطة بك.
          </div>');
        END IF;
      
        DBMS_LOB.APPEND(l_html, '</div>');
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - APP_USER_ID

  layout: 
    sequence: 20
    parent-region: Assignment Records # 279056150352864247
