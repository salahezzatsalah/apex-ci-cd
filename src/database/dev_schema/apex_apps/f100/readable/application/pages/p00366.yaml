  source: 
    html-code: |
      <!-- GAMIFIED COLLECT MODAL -->
      <div id="collectModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80 transition-opacity duration-300" ontouchstart="">
        <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl p-6 sm:p-8 space-y-6 flex flex-col items-center animate__animated animate__fadeInDown"
          style="direction: rtl; touch-action: none;"
          ontouchstart="handleTouchStart(event, 'collectModal')"
          ontouchmove="handleTouchMove(event, 'collectModal')"
          ontouchend="handleTouchEnd(event, 'collectModal')">
          
          <div class="flex flex-col items-center w-full mb-2">
            <div class="bg-yellow-100 rounded-full w-16 h-16 sm:w-20 sm:h-20 flex items-center justify-center shadow-lg border-4 border-yellow-300 mb-2 animate__animated animate__tada">
              <i class="fa6 fa6-coins text-4xl sm:text-5xl text-yellow-500"></i>
            </div>
          </div>
          <div class="w-full text-center text-base sm:text-lg font-extrabold text-yellow-700 mb-2">🏆 مع كل تحصيلة ومتابعة كاملة للتشغيلة، رصيد حافز التوزيع والمتابعة بتاعك هيزد</div>
       <div class="text-xs text-gray-600 text-right mt-1">يرجي التأكد من ملف حساب السائق بالضغط على اسم السائق في كرت التسوية لعرض الحساب الاجمالى عن كل التشغيلات</div>
          <input type="hidden" id="collectDriverId">
          <input type="hidden" id="collectExchangeRate">
          <input type="hidden" id="collectAssignmentId">
          <input type="hidden" id="collectProductId">
      
          <div class="w-full">
            <label class="block text-sm sm:text-base font-bold mb-2 text-gray-800">العملة</label>
            <input id="collectCurrency" type="text" readonly
              class="w-full rounded-xl border-2 border-yellow-400 bg-yellow-50 text-yellow-800 font-bold p-2 sm:p-3 text-lg text-center shadow-inner"/>
           
          </div>
