javascript: 
  function-and-global-variable-declaration: |
    // Utility to clean numbers
    function cleanAmount(val) {
      if (typeof val !== "string") val = String(val ?? '');
      val = val.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
      val = val.replace(/[^0-9.\-]/g, "");
      const parts = val.split(".");
      if (parts.length > 2) val = parts[0] + "." + parts.slice(1).join("");
      return val;
    }
    
    // Open Collect Modal
    window.openCollectModal = function (currency, amount, amount_egp, driverId, assignmentId, productId) {
      const modal = document.getElementById("collectModal");
      modal.classList.remove("hidden");
      document.getElementById("collectCurrency").value = currency;
      document.getElementById("collectCurrencyLabel").textContent = currency;
      document.getElementById("collectAmount").value = cleanAmount(amount);
      document.getElementById("collectDriverId").value = driverId;
      document.getElementById("collectAssignmentId").value = assignmentId;
      document.getElementById("collectProductId").value = productId;
    
      // Calculate exchange rate
      const rate = (parseFloat(cleanAmount(amount_egp)) / parseFloat(cleanAmount(amount)));
      document.getElementById("collectExchangeRate").value = isFinite(rate) ? rate.toFixed(2) : "";
    
      // Load accounts
      apex.server.process("P190_FETCH_ACCOUNTS", { x01: currency }, {
        success: function (data) {
          const sel = document.getElementById("collectAccountId");
          sel.innerHTML = '<option value="">-- اختر الحساب --</option>';
          data.accounts.forEach(acc => {
            const opt = document.createElement("option");
            opt.value = acc.id;
            opt.textContent = acc.name;
            sel.appendChild(opt);
          });
        }
      });
    };
    
    window.closeCollectModal = function () {
      document.getElementById("collectModal").classList.add("hidden");
    };
    
    window.closeSettleModal = function () {
      document.getElementById("settleModal").classList.add("hidden");
    };
    
    // Open Settle Modal
    window.openSettleWithDriver = function (driverId, amount, assignmentId, productId) {
      const modal = document.getElementById("settleModal");
      modal.classList.remove("hidden");
      document.getElementById("settleAmount").value = cleanAmount(amount);
      document.getElementById("settleDriverId").value = driverId;
      document.getElementById("settleAssignmentId").value = assignmentId;
      document.getElementById("settleProductId").value = productId;
    
      apex.server.process("P190_FETCH_ACCOUNTS", { x01: "EGP" }, {
        success: function (data) {
          const sel = document.getElementById("settleAccountId");
          sel.innerHTML = '<option value="">-- اختر الحساب --</option>';
          data.accounts.forEach(acc => {
            const opt = document.createElement("option");
            opt.value = acc.id;
            opt.textContent = acc.name;
            sel.appendChild(opt);
          });
        }
      });
    };
    
    // Submit Collect
    window.submitCollect = function () {
      const accountId = document.getElementById("collectAccountId").value;
      if (!accountId) {
        apex.message.showErrors([{ type: "error", message: "يجب اختيار الحساب." }]);
        return;
      }
      const payload = {
        type: "FROM_DRIVER",
        driver_id: document.getElementById("collectDriverId").value,
        currency: document.getElementById("collectCurrency").value,
        amount: cleanAmount(document.getElementById("collectAmount").value),
        exchange_rate: document.getElementById("collectExchangeRate").value,
        notes: document.getElementById("collectNotes").value,
        assignment_id: document.getElementById("collectAssignmentId").value,
        product_id: document.getElementById("collectProductId").value,
        account_id: accountId
      };
    
      apex.server.process("P190_INSERT_SETTLEMENT", { x01: JSON.stringify(payload) }, {
        success: function (data) {
          if (data.status === "error") {
            apex.message.showErrors([{ type: "error", message: data.sqlerrm }]);
            return;
          }
          closeCollectModal();
          apex.message.showPageSuccess("تم تسجيل التحصيل بنجاح");
          apex.region("driver-card").refresh();
        }
      });
    };
    
    // Submit Settle
    window.submitSettle = function () {
      const accountId = document.getElementById("settleAccountId").value;
      if (!accountId) {
        apex.message.showErrors([{ type: "error", message: "يجب اختيار الحساب." }]);
        return;
      }
      const payload = {
        type: "TO_DRIVER",
        driver_id: document.getElementById("settleDriverId").value,
        currency: "EGP",
        amount: cleanAmount(document.getElementById("settleAmount").value),
        notes: document.getElementById("settleNotes").value,
        assignment_id: document.getElementById("settleAssignmentId").value,
        product_id: document.getElementById("settleProductId").value,
        account_id: accountId
      };
    
      apex.server.process("P190_INSERT_SETTLEMENT", { x01: JSON.stringify(payload) }, {
        success: function (data) {
          if (data.status === "error") {
            apex.message.showErrors([{ type: "error", message: data.sqlerrm }]);
            return;
          }
          closeSettleModal();
          apex.message.showPageSuccess("تمت التسوية بنجاح");
          apex.region("driver-card").refresh();
        }
      });
    };
    

