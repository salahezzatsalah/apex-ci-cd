- # ====== Region: Current Active Trip =========================
  id: 176417529646661014
  identification: 
    name: Current Active Trip
    title: 'تشغيلات نشطة '
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html        CLOB;
        v_trip_index  INTEGER := 0;
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        FOR rec IN (
          SELECT *
          FROM LIMO_CURRENT_DRIVERS_V
          WHERE DRIVER_ID = :P366_DRIVER_ID
          ORDER BY STATUS_ORDER, TRIP_TIME
        ) LOOP
          BEGIN
            v_trip_index := v_trip_index + 1;
      
            DBMS_LOB.APPEND(l_html, '
      <a href="' || APEX_UTIL.PREPARE_URL(
                     'f?p=' || :APP_ID || ':6001:' || :APP_SESSION || 
                     '::::P6001_PRODUCT_ID:' || rec.PRODUCT_ID) || '" 
         class="block transition hover:shadow-md bg-white rounded-xl border border-gray-200 p-4 mb-4 space-y-3">
      
        <!-- Top Row -->
        <div class="flex items-center gap-3 flex-wrap">
          <img src="' || NVL(rec.CAR_PHOTO_URL, '#APP_FILES#placeholders/car-default.png') || '" 
               class="w-16 h-14 object-contain rounded border" alt="Car">
          <div class="flex-1 min-w-0">
            <div class="text-base font-bold text-gray-900">' || NVL(rec.CLIENT_CODE, '-') || '</div>
            <div class="flex flex-wrap text-xs text-gray-500 mt-1 gap-1">
              <span> كود التشغيلة: ' || NVL(rec.PRODUCT_ID, '-') || ' - </span>
              <span> كود التوزيعة: ' || NVL(rec.ASSIGNMENT_ID, '-') || '</span>
            </div>
          </div>
          <div class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded-full mt-2 sm:mt-0 whitespace-nowrap">' 
            || rec.STATUS_LABEL_AR || '
          </div>
        </div>
      
        <!-- Date and Location -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mt-2 text-sm text-gray-700">
          <div class="flex items-center gap-1 flex-wrap">
            <i class="fa6 fa6-calendar-days text-gray-500 text-base"></i>
            <span class="text-red-900 font-bold px-2 py-0.5 rounded text-xs tracking-widest" 
                  style="font-family:monospace;">' 
                  || NVL(TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(rec.TRIP_DATE_FROM), 'YYYY-MM-DD'), '-') 
                  || ' ' || NVL(rec.TRIP_TIME, '-') || '</span>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <i class="fa6 fa6-map-location-dot ml-1 text-gray-500"></i>
            <span>' || NVL(rec.FROM_LOCATION, '-') || '</span>
            <i class="fa6 fa6-arrow-left-long text-gray-400"></i>
            <span>' || NVL(rec.TO_LOCATION, '-') || '</span>
          </div>
        </div>
      
        <!-- Trip Types -->
        <div class="flex flex-wrap gap-2 mt-2">
          <span class="bg-blue-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1 text-xs font-semibold">
            <i class="fa6 fa6-headset"></i>' || NVL(rec.CREATED_BY, '-') ||'
          </span>
          <span class="bg-blue-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1 text-xs font-semibold">
            <i class="fa6 fa6-layer-group"></i>' || NVL(rec.CLASSIFICATION_LABEL_AR, '-') || '
          </span>
          <span class="bg-blue-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1 text-xs font-semibold">
            <i class="fa6 fa6-car-side"></i>' || NVL(rec.TRIP_TYPE_NAME_AR, '-') || '
          </span>' ||
          CASE WHEN rec.TRIP_TYPE = 'DAILY' THEN
            '<span class="bg-gray-800 text-white rounded-full px-2 py-0.5 flex items-center gap-1 text-xs font-semibold">
              <i class="fa6 fa6-calendar-day"></i>' || NVL(rec.TRIPS_COUNT,0) || ' / ' || NVL(rec.NOD,0) || '
            </span>'
          ELSE '' END || '
        </div>');
      
            -- Prebuilt details (ticket, signage, notes, assignment notes)
            IF rec.DETAILS_HTML IS NOT NULL THEN
              DBMS_LOB.APPEND(l_html, '
            <div class="flex flex-col sm:flex-row flex-wrap gap-2 text-xs text-gray-500 mt-2">'
            || rec.DETAILS_HTML || '
            </div>');
            END IF;
      
            -- Progress Bar
            DBMS_LOB.APPEND(l_html, '
        <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden mt-3">
          <div class="h-full bg-blue-600 transition-all" style="width:' || rec.TRIP_PROGRESS_PCT || '%"></div>
        </div>
      </a>');
      
          EXCEPTION
            WHEN OTHERS THEN
              DBMS_LOB.APPEND(l_html, '
                <div style="color:red;background:#fee;border:1px solid #faa;margin:10px 0;padding:8px;border-radius:8px;">
                خطأ في الرحلة رقم: '|| v_trip_index ||'، المنتج: '|| NVL(rec.PRODUCT_ID,'?') ||'<br>'||SQLERRM||'
                </div>');
          END;
        END LOOP;
      
        -- If no trips found
        IF v_trip_index = 0 THEN
          DBMS_LOB.APPEND(l_html, '
      <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-center font-semibold flex flex-col items-center gap-2 mt-6">
        <i class="fa6 fa6-circle-exclamation text-2xl"></i>
        لا توجد أي رحلات حالياً.
      </div>');
        END IF;
      
        RETURN l_html;
      END;
      

  layout: 
    sequence: 20
    parent-region: Assignment Records # 279056150352864247
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
