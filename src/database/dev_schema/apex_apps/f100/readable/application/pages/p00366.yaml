          -- Driver Info
          l_driver_info := '
          <section class="w-full bg-white rounded-2xl shadow border border-gray-200 p-5 mt-5">
            <h3 class="text-base font-bold text-gray-900 mb-4 flex items-center gap-2">
              <i class="fa6 fa-id-card-clip text-blue-500"></i>
              معلومات السائق
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm text-gray-700">
              <div><span class="font-medium">الاسم:</span> '||rec.DRIVER_NAME||'</div>
              <div><span class="font-medium">النوع:</span> '||rec.ASSIGNMENT_TYPE||'</div>
              <div><span class="font-medium">البريد الإلكتروني:</span> '||NVL(rec.CONTACT_EMAIL, 'غير متوفر')||'</div>
              <div><span class="font-medium">العنوان:</span> '||NVL(rec.CONTACT_ADDRESS, 'غير متوفر')||'</div>
              <div><span class="font-medium">الحالة:</span> '||rec.STATUS||'</div>
              <div><span class="font-medium">تاريخ الانضمام:</span> '||TO_CHAR(rec.JOIN_DATE, 'YYYY-MM-DD')||'</div>
              <div class="sm:col-span-2"><span class="font-medium">الملاحظات:</span> '||NVL(rec.NOTES, 'لا توجد ملاحظات')||'</div>
            </div>
          </section>';
      
          l_output := l_output || l_dues_tiles || l_driver_info;
        END LOOP;
      
        IF NOT l_found THEN
          l_output := '
          <div class="w-full bg-white rounded-2xl shadow p-4 flex flex-col items-center mt-3 border text-red-700 text-center">
            <i class="fa6 fa-user-xmark text-4xl mb-2"></i>
            لم يتم العثور على بيانات هذا السائق.
