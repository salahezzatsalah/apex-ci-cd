processes: 
- # ====== Process: P190_FETCH_ACCOUNTS ========================
  id: 229055229348227604
  identification: 
    name: P190_FETCH_ACCOUNTS
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_currency VARCHAR2(10) := APEX_APPLICATION.g_x01;
      BEGIN
        APEX_JSON.OPEN_OBJECT;
        APEX_JSON.OPEN_ARRAY('accounts');
        FOR r IN (
          SELECT ACCOUNT_ID, ACCOUNT_NAME
          FROM ACCOUNTS
          WHERE CURRENCY_CODE = l_currency AND STATUS = 'ACTIVE' AND OWNER_TYPE = 'Company'
        ) LOOP
          APEX_JSON.OPEN_OBJECT;
          APEX_JSON.WRITE('id', r.ACCOUNT_ID);
          APEX_JSON.WRITE('name', r.ACCOUNT_NAME);
          APEX_JSON.CLOSE_OBJECT;
        END LOOP;
        APEX_JSON.CLOSE_ARRAY;
        APEX_JSON.CLOSE_OBJECT;
      END;
      

  execution: 
    sequence: 20
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

- # ====== Process: P190_INSERT_SETTLEMENT =====================
  id: 279096882525504574
  identification: 
    name: P190_INSERT_SETTLEMENT
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_json           CLOB := APEX_APPLICATION.g_x01;
        l_data           JSON_OBJECT_T;
        l_type           VARCHAR2(30);
        l_driver_id      VARCHAR2(30);
        l_assignment     VARCHAR2(30);
        l_product        VARCHAR2(30);
        l_account_id     VARCHAR2(30);
        l_currency       VARCHAR2(10);
        l_amount         NUMBER := 0;
        l_notes          VARCHAR2(4000);
        l_exchange_rate  NUMBER := 1;
        l_id             VARCHAR2(50);
        l_transaction_id TRANSACTIONS.TRANSACTION_ID%TYPE;
        l_account_name   VARCHAR2(4000);
        l_desc           VARCHAR2(200);
        l_ref            VARCHAR2(400);
      BEGIN
        l_data := JSON_OBJECT_T.parse(l_json);
        l_type := l_data.get_string('type');
        l_driver_id := l_data.get_string('driver_id');
        l_assignment := l_data.get_string('assignment_id');
        l_product := l_data.get_string('product_id');
        l_currency := l_data.get_string('currency');
        l_account_id := l_data.get_string('account_id');
        l_notes := l_data.get_string('notes');
      
        BEGIN
          l_amount := TO_NUMBER(REPLACE(l_data.get_string('amount'), ',', ''), '9999999990.9999');
        EXCEPTION
          WHEN OTHERS THEN l_amount := 0;
        END;
      
        IF l_data.has('exchange_rate') THEN
          BEGIN
            l_exchange_rate := TO_NUMBER(REPLACE(l_data.get_string('exchange_rate'), ',', ''), '9999999990.9999');
          EXCEPTION
            WHEN OTHERS THEN l_exchange_rate := 1;
          END;
        END IF;
      
        SELECT ACCOUNT_NAME INTO l_account_name FROM ACCOUNTS WHERE ACCOUNT_ID = l_account_id;
      
        l_desc := CASE WHEN l_type = 'TO_DRIVER' THEN 'تسوية للسائق' ELSE 'تحصيل من السائق' END;
        l_ref := l_product || ' : ' || l_assignment || ' : ' || l_driver_id;
        l_notes := NVL(l_notes, '') || ' | تم تنفيذ العملية على حساب ' || l_account_name;
      
        l_id := 'LDS-' || TO_CHAR(SYSDATE, 'YYYYMMDDHH24MISS') || '-' || DBMS_RANDOM.STRING('U', 4);
        INSERT INTO LIMO_DRIVER_SETTLEMENTS (
          ID, DRIVER_ID, ASSIGNMENT_ID, PRODUCT_ID, SETTLEMENT_DATE, SETTLEMENT_TYPE,
          CURRENCY, AMOUNT, EXCHANGE_RATE, SETTLED_BY, CREATED_BY, NOTES
        ) VALUES (
          l_id, l_driver_id, l_assignment, l_product, SYSDATE, l_type, l_currency,
          l_amount, l_exchange_rate, :APP_USER_ID, :APP_USER_ID, l_notes
        );
      
        INSERT INTO TRANSACTIONS (
          TRANSACTION_DATE, DESCRIPTION, REFERENCE_NUMBER, STATUS, CREATED, CREATED_BY
        ) VALUES (
          SYSTIMESTAMP, l_desc, l_ref, 'POSTED', SYSTIMESTAMP, :APP_USER_ID
        ) RETURNING TRANSACTION_ID INTO l_transaction_id;
      
        INSERT INTO TRANSACTION_ENTRIES (
          TRANSACTION_ID, ACCOUNT_ID, CURRENCY_CODE, DEBIT_AMOUNT, CREDIT_AMOUNT,
          NOTES, TRANSACTION_TYPE, CREATED, CREATED_BY
        ) VALUES (
          l_transaction_id,
          l_account_id,
          l_currency,
          CASE WHEN l_type = 'TO_DRIVER' THEN l_amount ELSE NULL END,
          CASE WHEN l_type = 'FROM_DRIVER' THEN l_amount ELSE NULL END,
          l_notes,
          CASE WHEN l_type = 'TO_DRIVER' THEN 'DEBIT' ELSE 'CREDIT' END,
          SYSTIMESTAMP,
          :APP_USER_ID
        );
      
        APEX_JSON.OPEN_OBJECT;
        APEX_JSON.WRITE('status', 'success');
        APEX_JSON.WRITE('id', l_id);
        APEX_JSON.CLOSE_OBJECT;
      
      EXCEPTION
        WHEN OTHERS THEN
          APEX_JSON.OPEN_OBJECT;
          APEX_JSON.WRITE('status', 'error');
          APEX_JSON.WRITE('sqlerrm', SQLERRM);
          APEX_JSON.CLOSE_OBJECT;
      END;
      

  execution: 
    sequence: 10
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

