          END IF;
      
          -- Driver Card
          l_output := l_output || '
          <section class="w-full bg-white rounded-2xl shadow border border-gray-200 p-5 mt-5" dir="rtl">
            <div class="flex flex-col items-center text-center">
              <div class="w-24 h-24 rounded-full border-4 border-blue-100 shadow-md overflow-hidden -mt-12 mb-3 bg-white">
                <img src="'||l_photo_url||'" class="object-cover w-full h-full" alt="صورة السائق"
                  onerror="this.onerror=null;this.src=''#APP_FILES#placeholders/unknown.png'';">
              </div>
              <h2 class="text-xl font-bold text-gray-900 mb-1">'||rec.DRIVER_NAME||'</h2>
              <div class="flex flex-wrap justify-center items-center gap-2 text-sm text-gray-600 mb-2">
                <a href="tel:'||rec.CONTACT_PHONE||'" class="flex items-center gap-1 hover:underline text-blue-600">
                  <i class="fa6 fa-phone"></i>'||rec.CONTACT_PHONE||'
                </a>
              </div>
              <div class="flex flex-wrap justify-center items-center gap-2 mt-2">
                <span class="inline-flex items-center gap-1 text-blue-700 bg-blue-50 rounded-full px-2 py-1 text-xs font-medium">
                  <i class="fa6 fa-car-side"></i>'||l_trips_str||'
                </span>
              </div>
            </div>
          </section>';
      
          -- Dues Tiles
          -- l_dues_tiles := '
          -- <section class="w-full mt-4">
          --   <h3 class="text-base font-bold text-gray-900 mb-3 flex items-center gap-2">
