          --     <div class="bg-green-50 border border-green-200 rounded-2xl shadow flex items-center gap-3 px-4 py-3 w-full">
          --       <i class="fa6 fa-coins text-xl text-green-500"></i>
          --       <div class="flex-1 text-right">
          --         <div class="font-semibold text-green-700 mb-1">'||
          --           CASE
          --             WHEN :USER_TYPE = 'EMPLOYEE' THEN 'مستحق للسائق'
          --             ELSE 'مستحق لك'
          --           END ||'</div>
          --         <div class="font-bold text-lg text-green-900">'||
          --           TO_CHAR(ABS(TO_NUMBER(REPLACE(c.remaining_amount, ',', ''))),'999G999G990D00')||' '||c.currency||'</div>
