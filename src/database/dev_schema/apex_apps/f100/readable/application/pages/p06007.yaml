- # ====== Region: Assignment Trips Records ====================
  id: 277032223169043677
  identification: 
    name: Assignment Trips Records
    title: ' تقرير الرحلات'
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html     CLOB;
        l_index    INTEGER := 0;
        l_count    INTEGER := 0;
        l_driver   VARCHAR2(4000);
        l_val_disp VARCHAR2(40);
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        -- Count trips for the assignment
        SELECT COUNT(*) INTO l_count
        FROM VW_LIMO_TRIP_TRACKING
        WHERE ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID;
      
        -- Get current driver for this assignment
        BEGIN
          SELECT 
            CASE a.ASSIGNMENT_TYPE
              WHEN 'INSOURCE' THEN d.DRIVER_NAME || ' (' || d.DRIVER_ID || ')'
              WHEN 'OUTSOURCE' THEN s.SUPPLIER_NAME || ' (' || s.SUPPLIER_ID || ')'
              ELSE 'غير معروف'
            END
          INTO l_driver
          FROM LIMO_PRODUCT_ASSIGNMENTS a
          LEFT JOIN COMPANY_DRIVERS d ON a.ASSIGNMENT_TYPE = 'INSOURCE' AND d.DRIVER_ID = a.DRIVER_ID
          LEFT JOIN SUPPLIERS s ON a.ASSIGNMENT_TYPE = 'OUTSOURCE' AND TO_CHAR(s.SUPPLIER_ID) = a.DRIVER_ID
          WHERE a.ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID
            AND a.DRIVER_STATUS = 'CURRENT'
            AND ROWNUM = 1;
        EXCEPTION
          WHEN NO_DATA_FOUND THEN
            l_driver := NULL;
        END;
      
        DBMS_LOB.APPEND(l_html, '<div class="space-y-3">');
      
        IF l_count = 0 THEN
          DBMS_LOB.APPEND(l_html, '
            <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-2xl text-sm flex flex-col items-start">
              <div class="font-medium">🚫 لا توجد رحلات مسجلة</div>
              <div class="text-xs mt-1">' || 
              CASE 
                WHEN l_driver IS NOT NULL THEN 'تم تعيين السائق: <strong>' || l_driver || '</strong> ولكن لم تسجل أي رحلات.'
                ELSE 'لم يتم تسجيل أي سائق أو رحلة على هذا التعيين.'
              END || '</div>
            </div>');
        ELSE
          FOR rec IN (
            SELECT * FROM VW_LIMO_TRIP_TRACKING
            WHERE ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID
            ORDER BY START_DATETIME ASC
          ) LOOP
            l_index := l_index + 1;
      
            DBMS_LOB.APPEND(l_html, '
            <div class="bg-white border border-gray-100 rounded-2xl shadow-sm px-2 py-3 flex flex-col gap-3 max-w-md mx-auto">
              <div class="flex items-center gap-3">
                <img src="' || NVL(rec.DRIVER_AVATAR, '#APP_FILES#placeholders/unknown.png') || '" 
                     onerror="this.onerror=null;this.src=''#APP_FILES#placeholders/unknown.png'';" 
                     class="w-11 h-11 rounded-full object-cover border border-gray-200 shadow-sm flex-shrink-0" 
                     alt="Driver" />
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between gap-3">
                    <div class="font-semibold text-base text-gray-900 flex items-center gap-1">
                      <i class="fa6 fa6-car-side text-indigo-600"></i>
                      <span>الرحلة رقم ' || l_index || '</span>
                    </div>
                    <div>' ||
                      CASE UPPER(NVL(rec.STATUS, 'UNKNOWN'))
                        WHEN 'FINISHED' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200">منتهية</span>'
                        WHEN 'ACTIVE' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200">نشطة</span>'
                        WHEN 'PAUSED' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-50 text-yellow-700 border border-yellow-200">متوقفة</span>'
                        WHEN 'RESUMED' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-200">مستأنفة</span>'
                        ELSE '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-gray-50 text-gray-500 border border-gray-200">غير معروف</span>'
                      END || '
                    </div>
                  </div>
                  <div class="text-xs text-gray-500 mt-1 truncate">' || NVL(rec.DRIVER_NAME, '-') || '</div>
                </div>
              </div>
      
              <!-- Timeline/metrics (Uber Base section: Tiles) -->
              <div class="grid grid-cols-2 gap-2 sm:grid-cols-3 text-xs">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-gray-400 mb-0.5"><i class="fa6 fa6-clock"></i></span>
                  <span class="font-semibold text-gray-800">' || TO_CHAR(convert_to_local_timezone(rec.START_DATETIME), 'DD-MM-YYYY HH24:MI') || '</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">البداية</span>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-yellow-400 mb-0.5"><i class="fa6 fa6-clock-rotate-left"></i></span>
                  <span class="font-semibold text-yellow-700">' || NVL(rec.TIME_SPENT_MINUTES,0) || ' دقيقة</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">المدة</span>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-indigo-400 mb-0.5"><i class="fa6 fa6-road"></i></span>
                  <span class="font-semibold text-indigo-700">' || 
                  (CASE WHEN rec.DISTANCE_KM IS NULL THEN '-' 
                        WHEN MOD(rec.DISTANCE_KM, 1) = 0 THEN TO_CHAR(rec.DISTANCE_KM, '999G990') 
                        ELSE TO_CHAR(rec.DISTANCE_KM, '999G990D00') END) || ' كم</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">المسافة</span>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-red-400 mb-0.5"><i class="fa6 fa6-money-bill"></i></span>
                  <span class="font-semibold text-red-700">' || 
                  (CASE WHEN rec.TOTAL_EXPENSES IS NULL THEN '-' 
                        WHEN MOD(rec.TOTAL_EXPENSES, 1) = 0 THEN TO_CHAR(rec.TOTAL_EXPENSES, '999G990') 
                        ELSE TO_CHAR(rec.TOTAL_EXPENSES, '999G990D00') END) || ' EGP</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">المصروفات</span>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-yellow-500 mb-0.5"><i class="fa6 fa6-bell-concierge"></i></span>
                  <span class="font-semibold text-yellow-700">' || 
                  (CASE WHEN rec.TOTAL_SERVICES IS NULL THEN '-' 
                        WHEN MOD(rec.TOTAL_SERVICES, 1) = 0 THEN TO_CHAR(rec.TOTAL_SERVICES, '999G990') 
                        ELSE TO_CHAR(rec.TOTAL_SERVICES, '999G990D00') END) || ' EGP</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">الخدمات</span>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-2 flex flex-col items-center">
                  <span class="text-blue-500 mb-0.5"><i class="fa6 fa6-wallet"></i></span>
                  <span class="font-semibold text-blue-700">' || 
                  (CASE WHEN rec.TOTAL_DRIVER_PAYOUT_EGP IS NULL THEN '-' 
                        WHEN MOD(rec.TOTAL_DRIVER_PAYOUT_EGP, 1) = 0 THEN TO_CHAR(rec.TOTAL_DRIVER_PAYOUT_EGP, '999G990') 
                        ELSE TO_CHAR(rec.TOTAL_DRIVER_PAYOUT_EGP, '999G990D00') END) || ' EGP</span>
                  <span class="text-[10px] text-gray-500 mt-0.5">نصيب السائق</span>
                </div>
              </div>
      
              <!-- Uber Base Design: Actions as navigation -->
              <div class="grid grid-cols-2 sm:flex sm:justify-center flex-wrap gap-2 pt-3 border-t border-gray-100 mt-3">
                <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6002:' || :APP_SESSION || '::::P6002_TRIP_ID:' || rec.TRIP_ID) || '"
                  class="inline-flex items-center gap-1 px-3 py-2 rounded-xl bg-gray-900 text-white text-xs font-semibold hover:bg-black transition shadow-sm">
                  <i class="fa6 fa6-file-lines"></i>عرض التفاصيل
                </a>
                 <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6003:' || :APP_SESSION || '::::P6003_TRIP_ID:' || rec.TRIP_ID) || '"
                  class="inline-flex items-center gap-1 px-3 py-2 rounded-xl bg-gray-900 text-white text-xs font-semibold hover:bg-black transition shadow-sm">
                  <i class="fa6 fa6-file-lines"></i>تسجيل مصروف
                </a>
                <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6004:' || :APP_SESSION || '::::P6004_TRIP_ID:' || rec.TRIP_ID) || '"
                  class="inline-flex items-center gap-1 px-3 py-2 rounded-xl bg-yellow-600 text-white text-xs font-semibold hover:bg-yellow-700 transition shadow-sm">
                  <i class="fa6 fa6-bell-concierge"></i>نسجيل خدمات
                </a>
                <a href="' || APEX_UTIL.PREPARE_URL('f?p=' || :APP_ID || ':6005:' || :APP_SESSION || '::::P6005_TRIP_ID:' || rec.TRIP_ID) || '"
                  class="inline-flex items-center gap-1 px-3 py-2 rounded-xl bg-blue-700 text-white text-xs font-semibold hover:bg-blue-900 transition shadow-sm">
                  <i class="fa6 fa6-cash-register"></i>تسجيل تحصيل
                </a>
              </div>
            </div>
            ');
          END LOOP;
        END IF;
      
        DBMS_LOB.APPEND(l_html, '</div>');
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6007_ASSIGNMENT_ID

  layout: 
    sequence: 60
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
