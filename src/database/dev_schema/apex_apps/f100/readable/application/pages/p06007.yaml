- # ====== Region: Assignment Details ==========================
  id: 277032106865043676
  identification: 
    name: Assignment Details
    title: تفاصيل التوزيعة - &P6007_ASSIGNMENT_ID.
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        rec VW_DRIVER_ASSIGNMENT_ACCOUNTING%ROWTYPE;
        l_html           CLOB := '';
        l_status_class   VARCHAR2(100);
        l_type_class     VARCHAR2(100);
        l_currency_count NUMBER := 0;
      
        -- Helper for pretty formatting
        FUNCTION format_amt(n NUMBER) RETURN VARCHAR2 IS
        BEGIN
          IF n IS NULL THEN RETURN '0'; END IF;
          IF MOD(n, 1) = 0 THEN
            RETURN TO_CHAR(n, '999G999G990');
          ELSE
            RETURN TO_CHAR(n, '999G999G990D00');
          END IF;
        END;
      
        FUNCTION strip_zeros(s VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          -- Remove trailing .00 (from JSON or char values)
          IF s IS NULL THEN RETURN '0'; END IF;
          IF INSTR(s, '.') > 0 AND REGEXP_SUBSTR(s, '\.0+$') IS NOT NULL THEN
            RETURN REGEXP_REPLACE(s, '\.0+$', '');
          ELSE
            RETURN s;
          END IF;
        END;
      BEGIN
        BEGIN
          SELECT *
            INTO rec
            FROM VW_DRIVER_ASSIGNMENT_ACCOUNTING
           WHERE ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID;
      
          -- Status color
          l_status_class :=
            CASE rec.DRIVER_STATUS
              WHEN 'حالي'   THEN 'bg-emerald-100 text-emerald-700'
              WHEN 'سابق'   THEN 'bg-gray-100 text-gray-600'
              ELSE 'bg-yellow-100 text-yellow-700'
            END;
      
          -- Assignment type color
          l_type_class :=
            CASE rec.ASSIGNMENT_TYPE
              WHEN 'INSOURCE'  THEN 'bg-indigo-100 text-indigo-700'
              WHEN 'OUTSOURCE' THEN 'bg-blue-100 text-blue-700'
              ELSE 'bg-slate-100 text-slate-700'
            END;
      
          -- Count the number of collected currencies
          IF rec.COLLECTIONS_BY_CURRENCY_JSON IS NOT NULL AND rec.COLLECTIONS_BY_CURRENCY_JSON != '[]' THEN
            SELECT COUNT(*)
              INTO l_currency_count
              FROM JSON_TABLE(
                rec.COLLECTIONS_BY_CURRENCY_JSON,
                '$[*]' COLUMNS (
                  currency     VARCHAR2(10)  PATH '$.currency'
                )
              );
          END IF;
      
          l_html := l_html || '
          <div class="bg-white dark:bg-neutral-900 border border-gray-100 rounded-2xl shadow-sm flex flex-col md:flex-row overflow-hidden mb-3 max-w-full">';
      
          -- Avatar/Info
          l_html := l_html || '
            <div class="flex flex-col items-center justify-center w-full md:w-36 bg-gray-50 dark:bg-neutral-800 p-2 sm:p-3">
              <img src="' || rec.DRIVER_AVATAR || '" class="rounded-full w-12 h-12 object-cover border border-gray-200 mb-1 shadow" alt="Driver" />
              <div class="text-center w-full">
                <div class="font-bold text-[14px] text-blue-700 dark:text-blue-300 truncate">
                  <a href="' || APEX_UTIL.PREPARE_URL(
                    'f?p=' || :APP_ID || ':366:' || :APP_SESSION || '::::P366_DRIVER_ID:' || rec.DRIVER_ID
                  ) || '" class="hover:underline" target="_blank">'|| rec.DRIVER_NAME ||'</a>
                </div>
                <div class="flex justify-center gap-1 mt-1 mb-1">
                  <span class="text-[10px] px-1 py-0.5 rounded-full '|| l_status_class || '">' || rec.DRIVER_STATUS || '</span>
                  <span class="text-[10px] px-1 py-0.5 rounded-full '|| l_type_class   || '">' || rec.ASSIGNMENT_TYPE_AR || '</span>
                </div>
                <div class="flex items-center justify-center gap-1 text-[11px] text-gray-500 ltr:text-left rtl:text-right mt-0.5">
                  <span>'|| rec.ASSIGNMENT_NOTE ||'</span>
                </div>
                <div class="flex items-center justify-center gap-1 text-[10px] text-gray-400 mt-0.5 ltr:text-left rtl:text-right">
                  <span dir="ltr" style="unicode-bidi: plaintext;">'|| NVL(rec.COLLECTION_NOTE, '') ||'</span>
                </div>';
      
          -- Edit Assignment button (if assignment id present)
          IF rec.ASSIGNMENT_ID IS NOT NULL THEN
            l_html := l_html || '
                <div class="flex justify-center mt-2">
                  <a href="' || APEX_UTIL.PREPARE_URL(
                    'f?p=' || :APP_ID || ':363:' || :APP_SESSION || '::::P363_ASSIGNMENT_ID:' || rec.ASSIGNMENT_ID
                  ) || '" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg border border-blue-300 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-semibold transition" style="margin-top:2px;">
                    <i class="fa6 fa6-solid fa6-pen-to-square"></i> تعديل التعيين
                  </a>
                </div>';
          END IF;
      
          l_html := l_html || '
              </div>
            </div>';
      
          -- Main Tiles Grid
          l_html := l_html || '
            <div class="flex-1 p-2 grid grid-cols-2 sm:grid-cols-3 gap-2 bg-white dark:bg-neutral-900">';
      
          l_html := l_html ||
            -- Trip count
            '<div class="rounded-xl bg-indigo-50 dark:bg-indigo-900 border border-indigo-100 dark:border-indigo-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-indigo-700 dark:text-indigo-100 mb-0.5"><i class="fa6 fa6-road"></i></div>
                <div class="font-bold text-xs text-indigo-900 dark:text-indigo-50">'|| NVL(rec.TRIPS_MADE, 0) ||'</div>
                <div class="text-[10px] text-indigo-700 dark:text-indigo-200 mt-0.5">عدد الرحلات</div>
            </div>' ||
      
            -- Total trips amount (original currency)
            '<div class="rounded-xl bg-emerald-50 dark:bg-emerald-900 border border-emerald-100 dark:border-emerald-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-emerald-700 dark:text-emerald-100 mb-0.5"><i class="fa6 fa6-money-bill-wave"></i></div>
                <div class="font-bold text-xs text-emerald-900 dark:text-emerald-50">'|| format_amt(rec.TOTAL_TRIPS_AMOUNT) ||' '|| rec.PRODUCT_CURRENCY ||'</div>
                <div class="text-[10px] text-emerald-700 dark:text-emerald-200 mt-0.5">إجمالي الرحلات</div>
            </div>' ||
      
            -- Expenses
            '<div class="rounded-xl bg-red-50 dark:bg-red-900 border border-red-100 dark:border-red-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-red-700 dark:text-red-100 mb-0.5"><i class="fa6 fa6-screwdriver-wrench"></i></div>
                <div class="font-bold text-xs text-red-900 dark:text-red-50">'|| format_amt(rec.TOTAL_EXPENSES_EGP) ||' EGP</div>
                <div class="text-[10px] text-red-700 dark:text-red-200 mt-0.5">المصروفات</div>
            </div>' ||
      
            -- Added services
            '<div class="rounded-xl bg-amber-50 dark:bg-amber-900 border border-amber-100 dark:border-amber-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-amber-700 dark:text-amber-100 mb-0.5"><i class="fa6 fa6-bell-concierge"></i></div>
                <div class="font-bold text-xs text-amber-900 dark:text-amber-50">'|| format_amt(rec.TOTAL_ADDED_SERVICES_EGP) ||' EGP</div>
                <div class="text-[10px] text-amber-700 dark:text-amber-200 mt-0.5">الخدمات</div>
            </div>' ||
      
            -- Driver payout
            '<div class="rounded-xl bg-blue-50 dark:bg-blue-900 border border-blue-100 dark:border-blue-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-blue-700 dark:text-blue-100 mb-0.5"><i class="fa6 fa6-money-bill-trend-up"></i></div>
                <div class="font-bold text-xs text-blue-900 dark:text-blue-50">'|| format_amt(rec.DRIVER_TOTAL_PAYOUT_EGP) ||' EGP</div>
                <div class="text-[10px] text-blue-700 dark:text-blue-200 mt-0.5">نصيب السائق</div>
            </div>' ||
      
            -- Office net
            '<div class="rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 p-2 flex flex-col items-center shadow-sm min-w-[88px]">
                <div class="flex items-center gap-1 text-slate-700 dark:text-slate-100 mb-0.5"><i class="fa6 fa6-building-columns"></i></div>
                <div class="font-bold text-xs text-slate-900 dark:text-slate-50">'|| format_amt(rec.OFFICE_NET_EGP) ||' EGP</div>
                <div class="text-[10px] text-slate-700 dark:text-slate-200 mt-0.5">صافي المكتب</div>
            </div>';
      
          l_html := l_html || '</div>'; -- close grid
      
          -- Improved Currency breakdown section
          IF l_currency_count > 0 THEN
            l_html := l_html || '
            <div class="flex flex-col gap-2 mt-4">
              <div class="flex items-center gap-2 mb-1">
                <span class="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center border border-amber-100 shadow-sm">
                  <i class="fa6 fa-wallet text-amber-600 text-lg"></i>
                </span>
                <span class="font-bold text-amber-900 text-sm">اجمالي التحصيلات التي قام بها السائق</span>
              </div>
              <div class="flex flex-wrap gap-2 px-1">';
            
            -- Calculate and show total across all currencies (sum EGP equivalents)
            DECLARE
              l_total_collected_egp NUMBER := 0;
            BEGIN
              FOR curr_rec IN (
                SELECT jt.*
                FROM JSON_TABLE(
                  rec.COLLECTIONS_BY_CURRENCY_JSON,
                  '$[*]'
                  COLUMNS (
                    currency     VARCHAR2(10)  PATH '$.currency',
                    amount       VARCHAR2(50)  PATH '$.amount',
                    amount_egp   VARCHAR2(50)  PATH '$.amount_egp'
                  )
                ) jt
              ) LOOP
                l_total_collected_egp := l_total_collected_egp + NVL(TO_NUMBER(REPLACE(curr_rec.amount_egp,',','')),0);
                l_html := l_html || '
                  <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-amber-100 text-amber-900 border border-amber-200 text-[13px] font-semibold shadow-sm">
                    <i class="fa6 fa-money-bill-wave text-amber-500"></i>
                    <span>' || strip_zeros(curr_rec.amount) || ' <span class="font-bold uppercase">' || curr_rec.currency || '</span></span>
                    <span class="text-neutral-400 mx-1">|</span>
                    <span class="font-normal">' || strip_zeros(curr_rec.amount_egp) || ' EGP</span>
                  </span>';
              END LOOP;
              l_html := l_html || '
                <span class="inline-flex items-center gap-1 px-4 py-1 rounded-full bg-green-50 text-green-900 border border-green-200 text-[13px] font-extrabold shadow-sm ml-1">
                  <i class="fa6 fa-coins text-green-600"></i>
                  <span>الاجمالي بالـEGP</span>
                  <span class="font-bold">' || format_amt(l_total_collected_egp) || ' EGP</span>
                </span>';
            END;
            l_html := l_html || '</div></div>';
          END IF;
      
          l_html := l_html || '</div>'; -- close driver card
      
        EXCEPTION
          WHEN NO_DATA_FOUND THEN
            l_html := '
            <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-sm mt-4">
              <div class="font-medium">🚫 لا توجد بيانات لهذا التعيين</div>
              <div class="text-xs mt-1">لم يتم العثور على تعيين سائق برقم المعرف المحدد.</div>
            </div>';
        END;
      
        RETURN l_html;
      END;
      
