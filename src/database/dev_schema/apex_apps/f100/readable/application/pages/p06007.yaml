- # ====== Region: Client Request Details ======================
  id: 277032070392043675
  identification: 
    name: Client Request Details
    title: تفاصيل طلب العميل - &P6007_PRODUCT_ID.
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        rec VW_LIMO_PRODUCT_OVERVIEW%ROWTYPE;
        l_html CLOB := '';
      BEGIN
        BEGIN
          SELECT *
            INTO rec
            FROM VW_LIMO_PRODUCT_OVERVIEW
           WHERE PRODUCT_ID = :P6007_PRODUCT_ID;
      
          l_html := l_html || '
          <!-- Compact Client Request Card -->
          <div class="bg-white dark:bg-neutral-900 rounded-xl border border-gray-100 p-2 md:p-3 max-w-2xl w-full mx-auto mb-3 shadow-sm flex flex-col gap-2">
      
            <!-- Top Row: Codes, Name, Phone, Time -->
            <div class="flex flex-wrap gap-2 items-center text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 leading-snug">
      
              <!-- Client Code -->
              <span class="flex items-center gap-1"><span class="font-bold">كود العميل:</span> '|| rec.CLIENT_CODE ||'</span>
              <span class="hidden sm:inline mx-1">|</span>
              <!-- Reservation -->
              <span class="flex items-center gap-1"><span class="font-bold">الحجز:</span> '|| rec.RESERVATION_ID ||'</span>
              <span class="hidden sm:inline mx-1">|</span>
              <!-- Trip -->
              <span class="flex items-center gap-1"><span class="font-bold">الرحلة:</span> '|| rec.PRODUCT_ID ||'</span>
            </div>
            
            <!-- Row 2: Avatar + Name + Phone + Time -->
            <div class="flex items-center gap-2 mt-1 mb-1">
      
              <!-- Avatar/Car Photo -->
              <div class="relative flex-shrink-0">
                <img src="'|| rec.CAR_PHOTO_URL ||'" alt="سيارة"
                  onerror="this.onerror=null;this.src=''#APP_FILES#placeholders/unknown-car.png''"
                  class="w-16 h-12 sm:w-20 sm:h-16 object-cover rounded-md border border-gray-200 shadow-sm" />
              </div>
      
              <!-- Name, Phone, Time -->
              <div class="flex flex-col flex-1 min-w-0 gap-0.5">
      
                <div class="flex flex-wrap gap-2 items-center">
                  <i class="fa6 fa6-user text-blue-800"></i>
                  <span class="font-bold text-gray-800 dark:text-white">العميل:</span>
                  <span class="truncate text-gray-900 dark:text-white" style="max-width:110px;display:inline-block;">'|| rec.FULL_NAME ||'</span>
                </div>
      
                <div class="flex flex-wrap gap-2 items-center text-xs mt-0.5">
                  <i class="fa6 fa6-phone-volume text-blue-800"></i>
                  <span class="font-bold text-gray-800 dark:text-white">جوال:</span>
                  <span class="truncate">'|| rec.PHONE ||'</span>
                  <a href="tel:'|| rec.PHONE_CLEAN ||'" class="text-blue-700 hover:text-blue-900" title="اتصال"><i class="fa6 fa6-phone"></i></a>
                  <a href="https://wa.me/'|| rec.PHONE_CLEAN ||'?text=مرحباً%20'|| apex_escape.html(rec.FULL_NAME) ||'" class="text-green-600 hover:text-green-800" target="_blank" title="واتساب"><i class="fa6 fa6-paper-plane"></i></a>
                </div>
                
                <div class="flex flex-wrap gap-2 items-center text-xs mt-0.5">
                  <i class="fa6 fa6-clock text-blue-800"></i>
                  <span class="font-bold text-gray-800 dark:text-white">الموعد:</span>
                  <span>'|| NVL(rec.PICK_UP_TIME, '-') ||'</span>
                </div>
              </div>
            </div>
            
            <!-- Locations (compact) -->
            <div class="flex flex-row flex-wrap items-center gap-2 bg-gray-50 dark:bg-neutral-800 rounded px-2 py-1 mb-1">
              <div class="flex flex-col items-center min-w-[60px]">
                <span class="font-bold text-black dark:text-white text-xs">'|| rec.FROM_LOCATION ||'</span>
                <span class="text-[11px] text-gray-500">'|| NVL(rec.PICK_UP_TIME, '-') ||'</span>
              </div>
              <span class="flex items-center justify-center mx-1 text-gray-400">
                <svg viewBox="0 0 24 24" class="w-4 h-4 fill-gray-500"><path d="M14.55 6c-.2 0-.39.078-.53.22l-5 5a1.1 1.1 0 0 0 0 1.56l5 5a.75.75 0 0 0 1.06-1.06L10.36 12l4.72-4.72a.75.75 0 0 0-.53-1.28z"/></svg>
              </span>
              <div class="flex flex-col items-center min-w-[60px]">
                <span class="font-bold text-black dark:text-white text-xs">'|| rec.TO_LOCATION ||'</span>
                <span class="text-[11px] text-gray-500">'|| 
                  CASE 
                    WHEN rec.TRIP_DATE_TO IS NOT NULL 
                    THEN TO_CHAR(rec.TRIP_DATE_TO, 'DD/MM/YYYY HH24:MI') 
                    ELSE '-' 
                  END 
                ||'</span>
              </div>
            </div>
      
            <!-- Meta Badges -->
            <div class="flex flex-wrap gap-1 mb-1 text-xs">
              <span class="inline-flex items-center gap-1 bg-blue-900 text-white px-2 py-0.5 rounded-full">
                <i class="fa6 fa6-tag"></i> '|| rec.CLASSIFICATION_TYPE ||'
              </span>
              <span class="inline-flex items-center gap-1 bg-blue-900 text-white px-2 py-0.5 rounded-full">
                <i class="fa6 fa6-car-side"></i> '|| rec.TRIP_TYPE ||'
              </span>
              <span class="inline-flex items-center gap-1 bg-blue-900 text-white px-2 py-0.5 rounded-full">
                <i class="fa6 fa6-calendar-day"></i> '|| rec.NUMBER_OF_DAYS ||' يوم
              </span>
              <span class="inline-flex items-center gap-1 bg-blue-900 text-white px-2 py-0.5 rounded-full">
                <i class="fa6 fa6-car"></i> '|| rec.REQUESTED_CAR ||'
              </span>
              <span class="inline-flex items-center gap-1 bg-yellow-400 text-gray-800 px-2 py-0.5 rounded-full font-semibold border border-yellow-600">
                <i class="fa6 fa6-location-arrow text-yellow-800"></i>
                '|| rec.TRIPS_COUNT ||' / '|| rec.TOTAL_DAYS ||'
                <span class="ml-1 text-[10px] font-normal text-gray-600">رحلات</span>
              </span>
            </div>
      
            <!-- Sidebar/Misc (below main on mobile) -->
            <div class="flex flex-wrap gap-2 mt-1">
              <div class="flex flex-col gap-1 text-xs bg-white dark:bg-neutral-800 rounded-lg border border-gray-200 dark:border-neutral-700 p-2 flex-1 min-w-[140px]">
                <div class="flex items-center gap-1"><i class="fa6 fa6-money-bill-wave text-blue-800"></i><span class="font-bold">سعر:</span><span>'|| rec.PRODUCT_PRICE ||' '|| rec.PRODUCT_CURRENCY ||'</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-file-invoice text-blue-800"></i><span class="font-bold">إجمالي:</span><span>'|| rec.TOTAL_AMOUNT ||' '|| rec.PRODUCT_CURRENCY ||'</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-plus-circle text-blue-800"></i><span class="font-bold">خدمات إضافية:</span><span>'|| rec.TOTAL_ADDED_SERVICES_EGP ||' EGP</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-file-invoice text-blue-800"></i><span class="font-bold">الفتورة:</span><span>'|| rec.TOTAL_INVOICE_ORIG_CURR ||' '|| rec.PRODUCT_CURRENCY ||'</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-sack-dollar text-blue-800"></i><span class="font-bold">المدفوع:</span><span>'|| rec.TOTAL_PAID_ORIG_CURR ||' '|| rec.PRODUCT_CURRENCY ||'</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-wallet text-blue-800"></i><span class="font-bold">المتبقي:</span><span>'|| rec.TOTAL_OUTSTANDING_ORIG_CURR ||' '|| rec.PRODUCT_CURRENCY ||'</span></div>
              </div>
      
              <div class="flex flex-col gap-1 text-xs bg-white dark:bg-neutral-800 rounded-lg border border-gray-200 dark:border-neutral-700 p-2 flex-1 min-w-[140px]">
                <div class="flex items-center gap-1"><i class="fa6 fa6-user-check text-blue-800"></i><span class="font-bold">السائق:</span><span>'|| rec.CURRENT_DRIVER_NAME ||'</span></div>
                <div class="flex items-center gap-1"><i class="fa6 fa6-phone text-blue-800"></i><span class="font-bold">جوال السائق:</span><span>'|| NVL(rec.CURRENT_DRIVER_PHONE, '-') ||'</span></div>
              </div>
            </div>';
      
          -- Ticket/Signage Section (optional)
          IF rec.TICKET_NUMBER IS NOT NULL THEN
            l_html := l_html || '
            <div class="flex flex-wrap gap-2 bg-yellow-50 border border-yellow-300 rounded-lg p-2 text-xs mt-1">
              <div class="flex items-center gap-1"><i class="fa6 fa6-ticket-alt text-yellow-800"></i><span class="font-bold">تذكرة:</span><span>'|| rec.TICKET_NUMBER ||'</span></div>';
            IF rec.SIGNAGE_DETAILS IS NOT NULL THEN
              l_html := l_html || '
              <div class="flex items-center gap-1"><i class="fa6 fa6-sign text-yellow-800"></i><span class="font-bold">لافتة:</span><span>'|| rec.SIGNAGE_DETAILS ||'</span></div>';
            END IF;
            l_html := l_html || '</div>';
          END IF;
      
          -- Trip Notes (optional)
          IF rec.TRIP_NOTES IS NOT NULL THEN
            l_html := l_html || '
            <div class="border border-dashed border-gray-300 bg-white dark:bg-neutral-900 rounded-md px-2 py-1 italic text-xs flex items-center gap-1 mt-1">
              <i class="fa6 fa6-sticky-note text-blue-800"></i>
              <span class="font-bold">ملاحظات:</span>
              <span>'|| rec.TRIP_NOTES ||'</span>
            </div>';
          END IF;
      
          l_html := l_html || '
          </div> <!-- END Card -->';
      
        EXCEPTION
          WHEN NO_DATA_FOUND THEN
            l_html := '<div class="bg-yellow-100 text-yellow-800 rounded-xl p-4 text-center my-6">لا يوجد بيانات لهذا الحجز.</div>';
        END;
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6007_PRODUCT_ID

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Collapsible
    template-options: 
    - '#DEFAULT#'
    - is-collapsed
    - t-Region--scrollBody
    css-classes: 
    - whitebackground
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

