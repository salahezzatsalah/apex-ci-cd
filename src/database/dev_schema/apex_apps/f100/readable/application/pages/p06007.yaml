- # ====== Region: Assignment Added Services Report ============
  id: 277032405783043679
  identification: 
    name: Assignment Added Services Report
    title: تقرير الخدمات المضافة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html           CLOB := '';
        l_total_services NUMBER := 0;
        l_amt_disp       VARCHAR2(32);
        l_amt_egp_disp   VARCHAR2(32);
      BEGIN
        l_html := l_html || '<div class="flex flex-col gap-1">';
      
        FOR s IN (
          SELECT
            s.SERVICE_DATE,
            ast.SERVICE_TYPE_NAME,
            s.QUANTITY,
            s.RATE_PER_UNIT,
            s.UNIT_TYPE,
            s.CURRENCY,
            s.AMOUNT,
            s.AMOUNT_EGP
          FROM LIMO_ADD_SERVICES s
          JOIN LIMO_ADDITIONAL_SERVICE_TYPES ast ON s.SERVICE_TYPE_CODE = ast.SERVICE_TYPE_CODE
          WHERE s.ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID
          ORDER BY s.SERVICE_DATE DESC
        ) LOOP
          l_total_services := l_total_services + NVL(s.AMOUNT_EGP, 0);
      
          -- Format numbers: remove .00 if integer
          IF MOD(s.AMOUNT, 1) = 0 THEN
            l_amt_disp := TO_CHAR(s.AMOUNT, '999G999G990');
          ELSE
            l_amt_disp := TO_CHAR(s.AMOUNT, '999G999G990D00');
          END IF;
      
          IF MOD(s.AMOUNT_EGP, 1) = 0 THEN
            l_amt_egp_disp := TO_CHAR(s.AMOUNT_EGP, '999G999G990');
          ELSE
            l_amt_egp_disp := TO_CHAR(s.AMOUNT_EGP, '999G999G990D00');
          END IF;
      
          l_html := l_html || '
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 bg-neutral-50 dark:bg-neutral-800 rounded-xl p-2 shadow-sm border border-neutral-100 dark:border-neutral-700">
      
              <div class="flex-shrink-0 w-7 h-7 rounded-full bg-blue-50 flex items-center justify-center">
                <i class="fa6 fa6-puzzle-piece text-blue-600 text-[16px]"></i>
              </div>
      
              <div class="flex-1 min-w-0 flex flex-col gap-0.5">
                <span class="font-semibold text-xs text-black dark:text-white truncate">' || s.SERVICE_TYPE_NAME || '</span>
                <span class="flex flex-wrap items-center gap-1 text-[10px] text-gray-500 mt-0.5">
                  <span class="flex items-center gap-1"><i class="fa6 fa6-calendar text-gray-400"></i>' || TO_CHAR(s.SERVICE_DATE, 'DD/MM/YYYY') || '</span>
                  <span class="hidden sm:inline-block text-gray-300">|</span>
                  ' ||
                  CASE 
                    WHEN s.QUANTITY IS NULL AND s.RATE_PER_UNIT IS NULL THEN
                      '<span class="text-gray-700">مبلغ اجمالي</span>'
                    ELSE
                      '<span>الكمية: ' || NVL(TO_CHAR(s.QUANTITY), '-') || ' × ' ||
                      (CASE WHEN s.RATE_PER_UNIT IS NULL THEN '-' 
                            WHEN MOD(s.RATE_PER_UNIT, 1) = 0
                            THEN TO_CHAR(s.RATE_PER_UNIT, '999G999G990')
                            ELSE TO_CHAR(s.RATE_PER_UNIT, '999G999G990D00')
                      END) || ' ' || NVL(s.CURRENCY,'') || ' / ' || NVL(s.UNIT_TYPE,'') || '</span>'
                  END
                  || '
                </span>
              </div>
      
              <div class="flex flex-col items-end min-w-[54px] mt-1 sm:mt-0">
                <span class="font-bold text-sm text-amber-600">' || l_amt_disp || '</span>
                <span class="text-[10px] text-gray-500">' || s.CURRENCY || '</span>';
          IF s.CURRENCY != 'EGP' THEN
            l_html := l_html || '<span class="text-[10px] text-neutral-400 text-end">(≈ ' || l_amt_egp_disp || ' EGP)</span>';
          END IF;
          l_html := l_html || '</div>
            </div>';
        END LOOP;
      
        -- Total Summary
        IF l_total_services IS NOT NULL THEN
          IF MOD(l_total_services, 1) = 0 THEN
            l_amt_egp_disp := TO_CHAR(l_total_services, '999G999G990');
          ELSE
            l_amt_egp_disp := TO_CHAR(l_total_services, '999G999G990D00');
          END IF;
      
          l_html := l_html || '
            <div class="flex items-center gap-2 bg-green-50 dark:bg-green-900 rounded-xl p-2 shadow border border-green-200 dark:border-green-800 mt-1">
              <div class="flex-shrink-0 w-7 h-7 rounded-full bg-green-100 flex items-center justify-center">
                <i class="fa6 fa6-layer-group text-green-700 text-[16px]"></i>
              </div>
              <div class="flex-1 min-w-0">
                <span class="font-semibold text-xs text-green-900 dark:text-green-100">إجمالي الخدمات</span>
              </div>
