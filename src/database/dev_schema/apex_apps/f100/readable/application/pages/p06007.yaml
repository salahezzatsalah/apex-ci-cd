- # ====== Region: Assignment Collections Report ===============
  id: 279044136208380730
  identification: 
    name: Assignment Collections Report
    title: تقرير التحصيلات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html         CLOB := '';
        l_total_egp    NUMBER := 0;
        l_amt_disp     VARCHAR2(32);
        l_amt_egp_disp VARCHAR2(32);
        l_badge_bg     VARCHAR2(30);
        l_badge_fg     VARCHAR2(30);
        l_edit_url     VARCHAR2(4000);
      BEGIN
        l_html := '<div class="flex flex-col gap-1">';
      
        /* =========================================================
           1. Collections for all trips under assignment (V2)
           ========================================================= */
        FOR p IN (
          SELECT 
            c.COLLECTION_ID,
            c.COLLECTION_DATETIME,
            cm.METHOD_NAME,
            UPPER(cm.METHOD_NAME) AS METHOD_NAME_UPPER,
            cm.METHOD_ICON,
            c.COLLECTED_BY_TYPE,
            c.COLLECTOR_NAME,
            c.AMOUNT_COLLECTED,
            c.CURRENCY,
            c.EXCHANGE_RATE_USED,
            c.AMOUNT_EGP,
            c.RECEIPT_NOTE
          FROM LIMO_TRIP_COLLECTIONS c
          LEFT JOIN LIMO_COLLECTION_METHODS cm
                 ON c.COLLECTION_METHOD = cm.METHOD_ID
          WHERE c.TRIP_ID IN (
            SELECT t.TRIP_ID
            FROM LIMO_TRIPS_TRACKER_V2 t
            WHERE t.ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID
          )
          ORDER BY c.COLLECTION_DATETIME DESC
        ) LOOP
      
          l_total_egp := l_total_egp + NVL(p.AMOUNT_EGP, 0);
      
          /* ---------- Number formatting ---------- */
          l_amt_disp :=
            CASE
              WHEN MOD(p.AMOUNT_COLLECTED,1)=0
              THEN TO_CHAR(p.AMOUNT_COLLECTED,'999G999G990')
              ELSE TO_CHAR(p.AMOUNT_COLLECTED,'999G999G990D00')
            END;
      
          l_amt_egp_disp :=
            CASE
              WHEN MOD(p.AMOUNT_EGP,1)=0
              THEN TO_CHAR(p.AMOUNT_EGP,'999G999G990')
              ELSE TO_CHAR(p.AMOUNT_EGP,'999G999G990D00')
            END;
      
          /* ---------- Method color logic ---------- */
          IF p.METHOD_NAME_UPPER LIKE '%CASH%' OR p.METHOD_NAME_UPPER LIKE '%نقد%' THEN
            l_badge_bg := 'bg-green-100';  l_badge_fg := 'text-green-700';
          ELSIF p.METHOD_NAME_UPPER LIKE '%BANK%' OR p.METHOD_NAME_UPPER LIKE '%تحويل%' THEN
            l_badge_bg := 'bg-blue-100';   l_badge_fg := 'text-blue-700';
          ELSIF p.METHOD_NAME_UPPER LIKE '%POS%' OR p.METHOD_NAME_UPPER LIKE '%ماكينة%' THEN
            l_badge_bg := 'bg-indigo-100'; l_badge_fg := 'text-indigo-700';
          ELSIF p.METHOD_NAME_UPPER LIKE '%EWALLET%' OR p.METHOD_NAME_UPPER LIKE '%محفظة%' THEN
            l_badge_bg := 'bg-amber-100';  l_badge_fg := 'text-amber-700';
          ELSIF p.METHOD_NAME_UPPER LIKE '%INSTAPAY%' OR p.METHOD_NAME_UPPER LIKE '%إنستا%' THEN
            l_badge_bg := 'bg-pink-100';    l_badge_fg := 'text-pink-700';
          ELSE
            l_badge_bg := 'bg-gray-100';    l_badge_fg := 'text-gray-600';
          END IF;
      
          /* ---------- Edit dialog URL ---------- */
          l_edit_url := APEX_UTIL.PREPARE_URL(
            p_url => 'f?p=' || :APP_ID || ':6005:' || :APP_SESSION ||
                     '::::P6005_COLLECTION_ID:' || p.COLLECTION_ID,
            p_checksum_type => 'SESSION'
          );
      
          /* ---------- Card HTML ---------- */
          l_html := l_html || '
            <div class="flex items-center gap-2 bg-neutral-50 rounded-xl p-2 shadow-sm border">
              <div class="w-8 h-8 rounded-full '||l_badge_bg||' flex items-center justify-center text-[18px]">'
                || NVL(p.METHOD_ICON,'❓') || '
              </div>
      
              <div class="flex-1 min-w-0">
                <div class="font-bold text-xs uppercase truncate">'
                  || NVL(p.METHOD_NAME,'غير معروف') || '
                </div>
      
                <div class="text-[10px] text-gray-500 flex gap-2">
                  <span>📅 '
                    || TO_CHAR(convert_to_local_timezone(p.COLLECTION_DATETIME),'DD/MM/YYYY HH24:MI')
                    || '</span>
                  <span>|</span>
                  <span>'
                    || CASE p.COLLECTED_BY_TYPE
                         WHEN 'DRIVER' THEN 'السائق'
                         WHEN 'OFFICE' THEN 'المكتب'
                         ELSE 'غير محدد'
                       END
                    || ' - ' || NVL(p.COLLECTOR_NAME,'غير معروف') || '
                  </span>
                </div>'
                || CASE WHEN p.RECEIPT_NOTE IS NOT NULL
                        THEN '<div class="text-[10px] text-neutral-400 mt-1">🗒️ '
                             || p.RECEIPT_NOTE || '</div>'
                        ELSE '' END || '
              </div>
      
              <div class="text-right min-w-[70px]">
                <div class="font-extrabold text-base text-green-700">'
                  || l_amt_disp || '</div>
                <div class="text-[10px] text-gray-500">'||p.CURRENCY||'</div>'
                || CASE WHEN p.CURRENCY <> 'EGP'
                        THEN '<div class="text-[10px] text-neutral-400">(≈ '
                             || l_amt_egp_disp || ' EGP)</div>'
                        ELSE '' END || '
              </div>
      
              <a href="'||l_edit_url||'" target="dialog"
                 class="ml-2 bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-2 py-1 rounded-lg">
                <i class="fa fa-edit"></i>
              </a>
            </div>';
        END LOOP;
      
        /* =========================================================
           2. Total Summary
           ========================================================= */
        IF l_total_egp > 0 THEN
          l_html := l_html || '
            <div class="flex items-center gap-2 bg-green-50 rounded-xl p-2 mt-2 border">
              <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center">💰</div>
              <div class="flex-1 font-bold text-xs">إجمالي المحصل</div>
              <div class="font-extrabold text-base text-green-700">'
                || TO_CHAR(l_total_egp,'999G999G990D00') || ' EGP</div>
            </div>';
        END IF;
      
        /* =========================================================
           3. Currency Breakdown
           ========================================================= */
        l_html := l_html || '<div class="flex flex-wrap gap-1 pt-2">';
        FOR cur IN (
          SELECT c.CURRENCY, SUM(c.AMOUNT_COLLECTED) AMT
          FROM LIMO_TRIP_COLLECTIONS c
          WHERE c.TRIP_ID IN (
            SELECT t.TRIP_ID
            FROM LIMO_TRIPS_TRACKER_V2 t
            WHERE t.ASSIGNMENT_ID = :P6007_ASSIGNMENT_ID
          )
          GROUP BY c.CURRENCY
        ) LOOP
          l_html := l_html || '
            <span class="px-2 py-0.5 rounded-full bg-gray-100 text-[11px] font-semibold">
              💲 '|| TO_CHAR(cur.AMT,'999G999G990D00') || ' '||cur.CURRENCY||'
            </span>';
        END LOOP;
      
        l_html := l_html || '</div></div>';
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6007_ASSIGNMENT_ID

