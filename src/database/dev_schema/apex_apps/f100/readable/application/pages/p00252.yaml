- # ====== Region: Trip Header =================================
  id: 195904819085899284
  identification: 
    name: Trip Header
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html CLOB := '';
      
          /* ===== Meta ===== */
          l_trip_date DATE;
      
          /* ===== Trip values ===== */
          l_trip_price             NUMBER := 0;
          l_trip_currency          VARCHAR2(10);
          l_added_services_egp     NUMBER := 0;
          l_total_invoice_egp      NUMBER := 0;
          l_total_invoice_currency NUMBER := 0;
      
          /* ===== Collections ===== */
          l_collected_egp           NUMBER := 0;
          l_collections_by_currency CLOB := '';
      
          /* ===== Settlement ===== */
          l_total_expenses_egp      NUMBER := 0;
          l_total_driver_payout_egp NUMBER := 0;
          l_company_due_egp         NUMBER := 0;
          l_company_pay_driver_egp  NUMBER := 0;
          l_egp_available           NUMBER := 0;
      
          /* ===== Alert ===== */
          l_invoice_not_fully_collected BOOLEAN := FALSE;
      
      BEGIN
          /* =====================================================
             1. Trip core values
             ===================================================== */
          SELECT
              EXECUTED_DATE
              -- NVL(TRIP_PRICE,0)
              -- TRIP_CURRENCY
              -- NVL(ADDED_SERVICES_EGP,0)
              -- NVL(TOTAL_INVOICE_EGP,0)
              -- NVL(TOTAL_INVOICE_CURRENCY,0)
              -- NVL(TRIP_EXPENSES_EGP,0)
              -- NVL(TOTAL_DRIVER_PAYOUT_EGP,0)
          INTO
              l_trip_date
              -- l_trip_price,
              -- l_trip_currency,
              -- l_added_services_egp,
              -- l_total_invoice_egp,
              -- l_total_invoice_currency,
              -- l_total_expenses_egp,
              -- l_total_driver_payout_egp
          FROM LIMO_TRIPS_TRACKER_V2
          WHERE TRIP_ID = :P252_TRIP_ID;
      
          /* =====================================================
             2. Collections (ONE scan only)
             ===================================================== */
      /* =====================================================
         2. Collections (optimized & correct)
         ===================================================== */
          SELECT
              NVL(SUM(total_egp),0),
              LISTAGG(
                  '<span class="currency-line">'||
                  TO_CHAR(total_amount,'FM999G999G999D00')||
                  ' '||currency||'</span>',
                  ''
              ) WITHIN GROUP (ORDER BY currency)
          INTO
              l_collected_egp,
              l_collections_by_currency
          FROM (
              SELECT
                  CURRENCY,
                  SUM(AMOUNT_COLLECTED) AS total_amount,
                  SUM(AMOUNT_EGP)       AS total_egp
              FROM LIMO_TRIP_COLLECTIONS
              WHERE TRIP_ID = :P252_TRIP_ID
              GROUP BY CURRENCY
          );
      
      
          /* =====================================================
             3. Invoice completion check
             ===================================================== */
          IF l_collected_egp < l_total_invoice_egp THEN
              l_invoice_not_fully_collected := TRUE;
          END IF;
      
          /* =====================================================
             4. Settlement logic
             ===================================================== */
          l_egp_available :=
                l_collected_egp
              - l_total_driver_payout_egp
              - l_total_expenses_egp;
      
          IF l_egp_available >= 0 THEN
              l_company_due_egp        := l_egp_available;
              l_company_pay_driver_egp := 0;
          ELSE
              l_company_due_egp        := 0;
              l_company_pay_driver_egp := ABS(l_egp_available);
          END IF;
      
          /* =====================================================
             5. Render HTML
             ===================================================== */
          l_html := '
          <div class="settlement-box">
      
              <div class="settlement-title">
                  ملخص تسوية الرحلة
              </div>
      
              <div class="settlement-sub">
                  كود الرحلة: <b>'||:P252_TRIP_ID||'</b><br>
                  تاريخ التنفيذ: '||TO_CHAR(l_trip_date,'DD Mon YYYY')||'
              </div>';
      
          IF l_invoice_not_fully_collected THEN
              l_html := l_html || '
              <div class="settle-warning" style="margin-bottom:12px;">
                  ⚠️ لم يتم تحصيل كامل قيمة فاتورة الرحلة.<br>
                  إجمالي الفاتورة: <b>'||
                      TO_CHAR(l_total_invoice_egp,'FM999G999G999D00')||' EGP</b><br>
                  إجمالي المحصل: <b>'||
                      TO_CHAR(l_collected_egp,'FM999G999G999D00')||' EGP</b>
              </div>';
          END IF;
      
          l_html := l_html || '
              <table class="settlement-table">
      
                  <tr>
                      <td class="label">سعر الرحلة الأساسي</td>
                      <td class="value">'||
                          TO_CHAR(l_trip_price,'FM999G999G999D00')||' '||l_trip_currency||'
                      </td>
                  </tr>
      
                  <tr>
                      <td class="label">الخدمات الإضافية</td>
                      <td class="value">'||
                          TO_CHAR(l_added_services_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
      
                  <tr class="total-row">
                      <td class="label">إجمالي فاتورة الرحلة</td>
                      <td class="value">'||
                          TO_CHAR(l_total_invoice_currency,'FM999G999G999D00')||
                          ' '||l_trip_currency||'
                      </td>
                  </tr>
      
                  <tr>
                      <td class="label">إجمالي التحصيلات</td>
                      <td class="value">'||NVL(l_collections_by_currency,'—')||'</td>
                  </tr>
      
                  <tr>
                      <td class="label">مصروفات التشغيل (تُعاد للسائق)</td>
                      <td class="value negative">'||
                          TO_CHAR(l_total_expenses_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
      
                  <tr>
                      <td class="label">مستحق السائق</td>
                      <td class="value">'||
                          TO_CHAR(l_total_driver_payout_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
      
                  <tr class="total-row">
                      <td class="label">نتيجة التسوية النهائية</td>
                      <td class="value '||
                      CASE WHEN l_company_pay_driver_egp > 0 THEN 'negative' ELSE 'positive' END||'">'||
                      CASE
                          WHEN l_company_pay_driver_egp > 0 THEN
                              'على الشركة دفع '||
                              TO_CHAR(l_company_pay_driver_egp,'FM999G999G999D00')||' EGP للسائق'
                          ELSE
                              'على السائق تسليم '||
                              TO_CHAR(l_company_due_egp,'FM999G999G999D00')||' EGP للشركة'
                      END||'</td>
                  </tr>
      
              </table>
      
              <div class="note">
                  * المقارنة الخاصة باكتمال التحصيل تتم بالـ EGP لأغراض محاسبية فقط.
              </div>
      
          </div>';
      
          RETURN l_html;
      END;
      

