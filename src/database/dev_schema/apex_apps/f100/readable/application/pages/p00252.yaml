  - # ====== Action: SAVE_TRIP_FINANCE ===========================
    id: 191324270116545455
    identification: 
      name: SAVE_TRIP_FINANCE
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        UPDATE limo_trips_tracker_v2
        SET total_invoice_currency = :P252_EDIT_INVOICE,
            trip_expenses_egp = :P252_EDIT_EXPENSES
        WHERE trip_id = :P252_TRIP_ID;
        
      items-to-submit: 
      - P252_TRIP_ID
      - P252_EDIT_INVOICE
      - P252_EDIT_EXPENSES

    execution: 
