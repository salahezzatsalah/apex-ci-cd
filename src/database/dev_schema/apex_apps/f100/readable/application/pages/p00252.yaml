- # ====== Region: Trip Collections Report =====================
  id: 195905882516899294
  identification: 
    name: Trip Collections Report
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE 
          l_html CLOB := ''; 
          l_grand_total_egp NUMBER := 0; 
          l_totals_by_currency CLOB := ''; 
      BEGIN 
          /* ===================================================== Guard clause ===================================================== */ 
          IF :P252_TRIP_ID IS NULL THEN 
              RETURN ' <div class="settle-warning"> ⚠️ لا يوجد رقم رحلة محدد لعرض التحصيلات. </div>'; 
          END IF; 
      
          /* ===================================================== Totals by original currency ===================================================== */ 
          BEGIN 
              SELECT LISTAGG( 
                         '<span class="currency-pill">' || TO_CHAR(SUM(c.AMOUNT_COLLECTED),'FM999G999G999D00') || ' ' || c.CURRENCY || '</span>', ' ' 
                     ) WITHIN GROUP (ORDER BY c.CURRENCY) 
              INTO l_totals_by_currency 
              FROM LIMO_TRIP_COLLECTIONS c 
              WHERE c.TRIP_ID = :P252_TRIP_ID 
              GROUP BY c.CURRENCY; 
          EXCEPTION 
              WHEN NO_DATA_FOUND THEN 
                  l_totals_by_currency := '—'; 
          END; 
      
          /* ===================================================== HTML + CSS ===================================================== */ 
          l_html := ' 
          <style> 
              .settlement-box { max-width: 760px; margin: auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; direction: rtl; font-family: Tahoma, Arial; } 
              .settlement-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; } 
              .settlement-sub { font-size: 12px; color: #6b7280; margin-bottom: 14px; } 
              .currency-pill { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid #e5e7eb; background: #f9fafb; margin-left: 6px; white-space: nowrap; } 
              table.settlement-table { width: 100%; border-collapse: collapse; font-size: 13px; } 
              table.settlement-table th { background: #f9fafb; font-weight: 800; padding: 8px; border-bottom: 1px solid #e5e7eb; text-align: right; } 
              table.settlement-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; vertical-align: top; } 
              td.amount { text-align: left; font-weight: 800; white-space: nowrap; } 
              td.total-egp { text-align: left; font-weight: 900; color: #065f46; white-space: nowrap; } 
              td.breakdown { font-size: 12px; line-height: 1.7; } 
              .pill-driver { background: #ecfeff; color: #0369a1; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; } 
              .pill-office { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; } 
              .muted { font-size: 11px; color: #6b7280; } 
              tr.total-row td { border-top: 2px solid #111827; font-weight: 900; background: #f9fafb; } 
              .settle-warning { padding: 16px; border-radius: 12px; background: #fffbeb; border: 1px solid #fde68a; color: #92400e; direction: rtl; font-family: Tahoma, Arial; } 
          </style> 
          <div class="settlement-box"> 
              <div class="settlement-title">🪙 تفصيل التحصيلات للرحلة</div> 
              <div class="settlement-sub"> إجمالي التحصيلات حسب العملة: '||NVL(l_totals_by_currency,'—')||' </div> 
              <table class="settlement-table"> 
                  <thead> 
                      <tr> 
                          <th style="width:140px;">📆 التاريخ</th> 
                          <th>تفصيل التحصيل</th> 
                          <th style="width:170px;text-align:left;">إجمالي اليوم (EGP)</th> 
                      </tr> 
                  </thead> 
                  <tbody> 
          '; 
      
          /* ===================================================== Loop – collections grouped by day ===================================================== */ 
          FOR r IN ( 
              SELECT TRUNC(CAST(c.COLLECTION_DATETIME AS DATE)) AS COLLECTION_DAY, 
                     SUM(NVL(c.AMOUNT_EGP, c.AMOUNT_COLLECTED * NVL(c.EXCHANGE_RATE_USED,1) )) AS TOTAL_DAY_EGP, 
                     LISTAGG( 
                         '• <b>'||TO_CHAR(c.AMOUNT_COLLECTED,'FM999G999G999D00')|| ' '||c.CURRENCY||'</b>'|| 
                         ' <span class="'|| CASE c.COLLECTED_BY_TYPE WHEN 'DRIVER' THEN 'pill-driver' ELSE 'pill-office' END ||'">'|| 
                         CASE c.COLLECTED_BY_TYPE WHEN 'DRIVER' THEN 'السائق' ELSE 'المكتب' END ||'</span>'|| 
                         CASE WHEN m.METHOD_NAME IS NOT NULL THEN ' — '||m.METHOD_NAME ELSE '' END|| 
                         CASE WHEN c.RECEIPT_NOTE IS NOT NULL THEN ' <span class="muted">('||c.RECEIPT_NOTE||')</span>' ELSE '' END, 
                         '<br>' 
                     ) WITHIN GROUP (ORDER BY c.COLLECTION_DATETIME) AS COLLECTION_BREAKDOWN 
              FROM LIMO_TRIP_COLLECTIONS c 
              LEFT JOIN LIMO_COLLECTION_METHODS m ON m.METHOD_ID = c.COLLECTION_METHOD 
              WHERE c.TRIP_ID = :P252_TRIP_ID 
              GROUP BY TRUNC(CAST(c.COLLECTION_DATETIME AS DATE)) 
              ORDER BY COLLECTION_DAY 
          ) LOOP 
              l_grand_total_egp := l_grand_total_egp + NVL(r.TOTAL_DAY_EGP,0); 
              l_html := l_html || ' 
                  <tr> 
                      <td>'||TO_CHAR(r.COLLECTION_DAY,'DD Mon YYYY')||'</td> 
                      <td class="breakdown">'||NVL(r.COLLECTION_BREAKDOWN,'—')||'</td> 
                      <td class="total-egp">'|| TO_CHAR(r.TOTAL_DAY_EGP,'FM999G999G999D00')||' EGP </td> 
                  </tr>'; 
          END LOOP; 
      
          /* ===================================================== Grand total ===================================================== */ 
          l_html := l_html || ' 
              <tr class="total-row"> 
                  <td colspan="2">إجمالي التحصيلات (EGP)</td> 
                  <td class="total-egp">'|| TO_CHAR(l_grand_total_egp,'FM999G999G999D00')||' EGP </td> 
              </tr> 
              </tbody> 
          </table> 
          <div class="muted" style="margin-top:10px;"> * تم تحويل جميع التحصيلات إلى EGP باستخدام سعر الصرف المسجل لكل عملية. </div> 
          </div>'; 
      
          RETURN l_html; 
      END;
      

