- # ====== Region: Trip AddServices Report =====================
  id: 195905759792899293
  identification: 
    name: Trip AddServices Report
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE 
          l_html CLOB := ''; 
          l_grand_total_egp NUMBER := 0; 
          l_totals_by_curr CLOB := ''; 
      BEGIN 
          /* ===================================================== Guard clause ===================================================== */ 
          IF :P252_TRIP_ID IS NULL THEN 
              RETURN ' <div class="settle-warning"> ⚠️ لا يوجد رقم رحلة محدد لعرض الخدمات الإضافية. </div>'; 
          END IF; 
      
          /* ===================================================== Totals by currency (original currencies) ===================================================== */ 
          BEGIN 
              SELECT LISTAGG(
                         '<span class="currency-pill">' || TO_CHAR(SUM(s.TOTAL_AMOUNT), 'FM999G999G999D00') || ' ' || s.CURRENCY || '</span>', ' '
                     ) WITHIN GROUP (ORDER BY s.CURRENCY)
              INTO l_totals_by_curr
              FROM (
                  SELECT s.CURRENCY,
                         NVL(s.AMOUNT, NVL(s.QUANTITY,1)*NVL(s.RATE_PER_UNIT,0)) AS TOTAL_AMOUNT
                  FROM LIMO_ADD_SERVICES s
                  WHERE s.TRIP_ID = :P252_TRIP_ID
                    AND NVL(s.AMOUNT, NVL(s.QUANTITY,1)*NVL(s.RATE_PER_UNIT,0)) > 0
              ) s
              GROUP BY s.CURRENCY; 
          EXCEPTION 
              WHEN NO_DATA_FOUND THEN 
                  l_totals_by_curr := '—'; 
          END; 
      
          /* ===================================================== HTML + CSS (Settlement Table Style) ===================================================== */ 
          l_html := ' 
          <style> 
              .settlement-box { max-width: 760px; margin: auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; direction: rtl; font-family: Tahoma, Arial; } 
              .settlement-title { font-size: 16px; font-weight: 800; margin-bottom: 10px; } 
              .settlement-sub { font-size: 12px; color: #6b7280; margin-bottom: 14px; line-height: 1.6; } 
              .currency-pill { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid #e5e7eb; background: #f9fafb; color: #111827; margin-left: 6px; white-space: nowrap; } 
              table.settlement-table { width: 100%; border-collapse: collapse; font-size: 13px; } 
              table.settlement-table th { background: #f9fafb; color: #374151; font-weight: 800; text-align: right; padding: 8px; border-bottom: 1px solid #e5e7eb; } 
              table.settlement-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; vertical-align: top; } 
              table.settlement-table td.amount { text-align: left; font-weight: 800; color: #1f2937; white-space: nowrap; } 
              table.settlement-table td.total-egp { text-align: left; font-weight: 900; color: #065f46; white-space: nowrap; } 
              table.settlement-table td.breakdown { font-size: 12px; color: #374151; line-height: 1.7; } 
              tr.total-row td { border-top: 2px solid #111827; font-weight: 900; background: #f9fafb; } 
              .muted { color: #6b7280; font-size: 11px; } 
              .settle-warning { padding: 16px; border-radius: 12px; background: #fffbeb; border: 1px solid #fde68a; color: #92400e; direction: rtl; font-family: Tahoma, Arial; } 
          </style> 
          <div class="settlement-box"> 
              <div class="settlement-title">➕ تفصيل الخدمات الإضافية للرحلة</div> 
              <div class="settlement-sub"> 
                  <div class="muted">إجمالي الخدمات حسب العملة الأصلية: '||NVL(l_totals_by_curr,'—')||'</div> 
              </div> 
              <table class="settlement-table"> 
                  <thead> 
                      <tr> 
                          <th style="width:140px;">📆 التاريخ</th> 
                          <th>تفصيل الخدمات</th> 
                          <th style="width:170px;text-align:left;">إجمالي اليوم (EGP)</th> 
                      </tr> 
                  </thead> 
                  <tbody> 
          '; 
      
          /* ===================================================== Loop – services grouped by working day ===================================================== */ 
          FOR r IN (
              SELECT s.SERVICE_DAY,
                     SUM(s.TOTAL_EGP) AS TOTAL_DAY_EGP,
                     LISTAGG(
                         '• ' || NVL(st.SERVICE_TYPE_NAME, s.SERVICE_TYPE_CODE) ||
                         CASE WHEN NVL(s.QUANTITY,0) > 0 OR NVL(s.RATE_PER_UNIT,0) > 0
                              THEN ' — ' || TO_CHAR(NVL(s.QUANTITY,1),'FM999G999G999D00') || ' ' || NVL(s.UNIT_TYPE, st.UNIT_TYPE) || ' × ' || TO_CHAR(NVL(s.RATE_PER_UNIT,0),'FM999G999G999D00') || ' ' || s.CURRENCY
                              ELSE ''
                         END ||
                         CASE WHEN s.SERVICE_DETAILS IS NOT NULL THEN ' <span class="muted">('||s.SERVICE_DETAILS||')</span>' ELSE '' END ||
                         ' — <b>'|| TO_CHAR(s.TOTAL_AMOUNT,'FM999G999G999D00')||' '||s.CURRENCY||'</b>',
                         '<br>'
                     ) WITHIN GROUP (ORDER BY NVL(st.DISPLAY_ORDER,999), NVL(st.SERVICE_TYPE_NAME, s.SERVICE_TYPE_CODE)) AS SERVICES_BREAKDOWN
              FROM (
                  SELECT s.TRIP_ID,
                         s.SERVICE_TYPE_CODE,
                         s.SERVICE_DATE,
                         s.CREATED,
                         s.SERVICE_DETAILS,
                         s.QUANTITY,
                         s.RATE_PER_UNIT,
                         s.CURRENCY,
                         NVL(s.AMOUNT, NVL(s.QUANTITY,1)*NVL(s.RATE_PER_UNIT,0)) AS TOTAL_AMOUNT,
                         NVL(s.AMOUNT_EGP, NVL(s.AMOUNT, NVL(s.QUANTITY,1)*NVL(s.RATE_PER_UNIT,0)) * NVL(s.EXCHANGE_RATE,1)) AS TOTAL_EGP,
                         TRUNC(CAST(NVL(s.SERVICE_DATE, s.CREATED) AS DATE)) AS SERVICE_DAY,
                         s.UNIT_TYPE
                  FROM LIMO_ADD_SERVICES s
                  WHERE s.TRIP_ID = :P252_TRIP_ID
                    AND NVL(s.AMOUNT, NVL(s.QUANTITY,1)*NVL(s.RATE_PER_UNIT,0)) > 0
              ) s
              LEFT JOIN LIMO_ADDITIONAL_SERVICE_TYPES st ON st.SERVICE_TYPE_CODE = s.SERVICE_TYPE_CODE
              GROUP BY s.SERVICE_DAY
              ORDER BY s.SERVICE_DAY
          ) LOOP
              l_grand_total_egp := l_grand_total_egp + NVL(r.TOTAL_DAY_EGP,0); 
              l_html := l_html || '
                  <tr>
                      <td>'||TO_CHAR(r.SERVICE_DAY,'DD Mon YYYY')||'</td>
                      <td class="breakdown">'||NVL(r.SERVICES_BREAKDOWN,'—')||'</td>
                      <td class="total-egp">'|| TO_CHAR(r.TOTAL_DAY_EGP,'FM999G999G999D00')||' EGP </td>
                  </tr>';
          END LOOP; 
      
          /* ===================================================== Grand total row ===================================================== */ 
          l_html := l_html || '
              <tr class="total-row">
                  <td colspan="2">إجمالي الخدمات الإضافية (EGP)</td>
                  <td class="total-egp">'|| TO_CHAR(l_grand_total_egp,'FM999G999G999D00')||' EGP </td>
              </tr>
              </tbody>
          </table>
          </div>';
      
          RETURN l_html; 
      END;
      

