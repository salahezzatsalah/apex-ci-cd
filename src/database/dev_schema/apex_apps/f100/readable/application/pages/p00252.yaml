- # ====== Region: Trip Detail =================================
  id: 191323838028545451
  identification: 
    name: Trip Detail
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html CLOB := '';
          l_trip_id VARCHAR2(50) := :P252_TRIP_ID;
      
          -- Trip fields  
          v_date DATE;
          v_car VARCHAR2(200);
          v_driver VARCHAR2(200);
          v_currency VARCHAR2(10);
          v_invoice_amount NUMBER;
          v_exp_egp NUMBER;
          v_driver_payout NUMBER;
      BEGIN
          /* ===========================================
             1. Load trip data
             =========================================== */
          SELECT 
              t.EXECUTED_DATE,
              c.car_name || ' - ' || c.license_plate AS car_display,
              COALESCE(d.driver_name, s.supplier_name, '—') AS driver_name,
              t.TRIP_CURRENCY,
              t.TOTAL_INVOICE_CURRENCY,
              t.TRIP_EXPENSES_EGP,
              t.TOTAL_DRIVER_PAYOUT_EGP
          INTO 
              v_date, v_car, v_driver, v_currency,
              v_invoice_amount, v_exp_egp, v_driver_payout
          FROM LIMO_TRIPS_TRACKER_V2 t
          LEFT JOIN COMPANY_REGISTERED_CARS c 
              ON c.id = t.used_car_id
          LEFT JOIN COMPANY_DRIVERS d 
              ON d.driver_id = t.driver_id
          LEFT JOIN suppliers s 
              ON TO_CHAR(s.supplier_id)=t.driver_id
          WHERE t.trip_id = l_trip_id;
      
          /* ===========================================
             2. Start HTML
             =========================================== */
          l_html :=
          '<div class="p-5 bg-white rounded-xl shadow text-sm space-y-4">
      
              <h2 class="text-lg font-bold text-gray-800">📄 تفاصيل الرحلة</h2>
      
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      
                  <div>
                      <div class="label">📆 التاريخ</div>
                      <div class="value">'||TO_CHAR(v_date, 'DD Mon YYYY')||'</div>
                  </div>
      
                  <div>
                      <div class="label">🚗 السيارة</div>
                      <div class="value">'||v_car||'</div>
                  </div>
      
                  <div>
                      <div class="label">🧑‍✈️ السائق</div>
                      <div class="value">'||v_driver||'</div>
                  </div>
      
                  <div>
                      <div class="label">💰 عملة الرحلة</div>
                      <div class="value">'||v_currency||'</div>
                  </div>
      
              </div>
      
              <hr>
      
              <h3 class="text-md font-semibold">✏️ تعديل البيانات المالية</h3>
      
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      
                  <div>
                      <label class="font-medium">🎯 قيمة الرحلة</label>
                      <input type="number" id="edit_invoice"
                             value="'||v_invoice_amount||'"
                             class="apex-item-text p-2 w-full border rounded">
                  </div>
      
                  <div>
                      <label class="font-medium">🔻 مصروفات الرحلة (EGP)</label>
                      <input type="number" id="edit_expenses"
                             value="'||v_exp_egp||'"
                             class="apex-item-text p-2 w-full border rounded">
                  </div>
      
              </div>
      
              <hr>
      
              <h3 class="text-md font-semibold">🪙 تحصيلات الرحلة</h3>
              <div">';
      
          /* ===========================================
             3. Collections grouped by currency
             =========================================== */
          FOR c IN (
              SELECT currency, SUM(amount_collected) AS total_amount
              FROM limo_trip_collections
              WHERE trip_id = l_trip_id
              GROUP BY currency
          ) LOOP
              l_html := l_html ||
              '<div class="p-2 bg-gray-50 rounded border">
                  <b>'||c.currency||'</b> : '||TO_CHAR(c.total_amount, 'FM999G999D00')||'
              </div>';
          END LOOP;
      
          /* ===========================================
             4. Driver payout and net
             =========================================== */
          l_html := l_html ||
              '<hr>
      
               <h3 class="text-md font-semibold">💼 المستحقات</h3>
      
               <div class="space-y-2">
      
                  <div class="p-2 bg-blue-50 border rounded">
                      <b>إجمالي مستحقات السائق:</b> '
                      ||TO_CHAR(v_driver_payout, 'FM999G999D00')||' EGP
                  </div>
      
                  <div class="p-2 bg-green-50 border rounded">
                      <b>الصافي (رحلة - مصروفات):</b> '
                      ||TO_CHAR(v_invoice_amount - v_exp_egp, 'FM999G999D00')||'
                  </div>
      
               </div>
      
               <hr>
      
               <div class="flex gap-3 mt-4">
      
                  <!-- Save Button -->
                  <button class="t-Button t-Button--icon t-Button--hot"
                          onclick="updateFinanceItems(); apex.event.trigger(document, ''SAVE_TRIP_FINANCE'');">
                      💾 حفظ التعديلات
                  </button>
      
                  <!-- Close Button -->
                  <button class="t-Button t-Button--danger"
                          onclick="apex.event.trigger(document, ''CLOSE_TRIP'')">
                      ✔ إغلاق الرحلة
                  </button>
      
               </div>
      
          </div>';
      
          RETURN l_html;
      END;
      

