- # ====== Region: Trip Expenses Report ========================
  id: 195905311475899289
  identification: 
    name: Trip Expenses Report
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html            CLOB := '';
          l_grand_total_egp NUMBER := 0;
      BEGIN
          /* =====================================================
             HTML + CSS
             ===================================================== */
          l_html := '
          <style>
              .settlement-box {
                  max-width: 760px;
                  margin: auto;
                  background: #ffffff;
                  border: 1px solid #e5e7eb;
                  border-radius: 12px;
                  padding: 20px;
                  direction: rtl;
                  font-family: Tahoma, Arial;
              }
              .settlement-title {
                  font-size: 16px;
                  font-weight: 800;
                  margin-bottom: 14px;
              }
              table.settlement-table {
                  width: 100%;
                  border-collapse: collapse;
                  font-size: 13px;
              }
              table.settlement-table th {
                  background: #f9fafb;
                  color: #374151;
                  font-weight: 700;
                  text-align: right;
                  padding: 8px;
                  border-bottom: 1px solid #e5e7eb;
              }
              table.settlement-table td {
                  padding: 8px;
                  border-bottom: 1px solid #e5e7eb;
                  vertical-align: top;
              }
              table.settlement-table td.amount {
                  text-align: left;
                  font-weight: 700;
                  color: #b91c1c;
                  white-space: nowrap;
              }
              table.settlement-table td.breakdown {
                  font-size: 12px;
                  color: #374151;
                  line-height: 1.6;
              }
              tr.total-row td {
                  border-top: 2px solid #111827;
                  font-weight: 800;
                  background: #f9fafb;
              }
          </style>
      
          <div class="settlement-box">
              <div class="settlement-title"> 🔻 تفصيل مصروفات الرحلة </div>
      
              <table class="settlement-table">
                  <thead>
                      <tr>
                          <th style="width:140px;">📆 تاريخ التشغيل</th>
                          <th>تفصيل المصروفات</th>
                          <th style="width:160px;text-align:left;">إجمالي اليوم (EGP)</th>
                      </tr>
                  </thead>
                  <tbody>
          ';
      
          /* =====================================================
             Expenses grouped by day (OPTIMIZED – single query)
             ===================================================== */
          FOR r IN (
              SELECT
                  TRUNC(e.EXPENSE_DATE) AS EXPENSE_DAY,
                  SUM(e.AMOUNT * NVL(e.EXCHANGE_RATE,1)) AS TOTAL_EXPENSE_EGP,
                  LISTAGG(
                      '• ' || et.EXPENSE_TYPE_NAME || ': ' ||
                      TO_CHAR(e.AMOUNT,'FM999G999G999D00') || ' ' || e.CURRENCY,
                      '<br>'
                  ) WITHIN GROUP (
                      ORDER BY NVL(et.SORTNO,999), et.EXPENSE_TYPE_NAME
                  ) AS EXPENSE_BREAKDOWN
              FROM LIMO_TRIP_EXPENSES e
              LEFT JOIN LIMO_EXPENSE_TYPES et
                  ON et.EXPENSE_TYPE_CODE = e.EXPENSE_TYPE
              WHERE e.TRIP_ID = :P252_TRIP_ID
                AND e.EXPENSE_DATE IS NOT NULL
                AND e.AMOUNT > 0
              GROUP BY TRUNC(e.EXPENSE_DATE)
              ORDER BY EXPENSE_DAY
          ) LOOP
      
              l_grand_total_egp := l_grand_total_egp + NVL(r.TOTAL_EXPENSE_EGP,0);
      
              l_html := l_html || '
                  <tr>
                      <td>'|| TO_CHAR(r.EXPENSE_DAY,'DD Mon YYYY') ||'</td>
                      <td class="breakdown">'|| NVL(r.EXPENSE_BREAKDOWN,'—') ||'</td>
                      <td class="amount">'||
                          TO_CHAR(r.TOTAL_EXPENSE_EGP,'FM999G999G999D00') ||' EGP
                      </td>
                  </tr>';
          END LOOP;
      
          /* =====================================================
             Grand total
             ===================================================== */
          l_html := l_html || '
                  <tr class="total-row">
                      <td colspan="2">إجمالي المصروفات</td>
                      <td class="amount">'||
                          TO_CHAR(l_grand_total_egp,'FM999G999G999D00') ||' EGP
                      </td>
                  </tr>
                  </tbody>
              </table>
          </div>';
      
          RETURN l_html;
      END;
      

