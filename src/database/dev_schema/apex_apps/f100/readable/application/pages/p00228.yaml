javascript: 
  execute-when-page-loads: |
    const officeLat = 30.97271;
    const officeLon = 31.94712;
    const CHECKIN_RADIUS = 1000000; // meters
    
    const checkInButton = document.getElementById("checkInBtn");
    const checkOutButton = document.getElementById("checkOutBtn");
    const statusDisplay = document.getElementById("STATUS_DISPLAY");
    const locationDisplay = document.getElementById("LOCATION_DISPLAY");
    
    const timeInSpan     = document.getElementById("time_in");
    const timeOutSpan    = document.getElementById("time_out");
    const totalHoursSpan = document.getElementById("total_hours");
    
    checkInButton.style.display = "none";
    checkOutButton.style.display = "none";
    
    // Show spinner
    let spinner = document.getElementById("loadingSpinner");
    if (!spinner) {
      spinner = document.createElement("div");
      spinner.id = "loadingSpinner";
      spinner.innerHTML = `
        <div class="spinner"></div>
        <div class="spinner-text">جاري التحقق من موقعك...</div>
      `;
      Object.assign(spinner.style, {
        position: "fixed",
        top: "0",
        left: "0",
        width: "100%",
        height: "100%",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        background: "rgba(255,255,255,0.9)",
        zIndex: "9999"
      });
      document.body.appendChild(spinner);
    }
    
    // Helper to get APEX page item
    function getItemValue(name) {
      try { return $v(name) || ""; } catch { return ""; }
    }
    
    // Update time fields
    function updateTimeFields() {
      const timeIn  = getItemValue("P228_TIMEIN");
      const timeOut = getItemValue("P228_TIMEOUT");
      const totalH  = getItemValue("P228_TOTALHOURS");
    
      timeInSpan.textContent     = timeIn || "--:--";
      timeOutSpan.textContent    = timeOut || "--:--";
      totalHoursSpan.textContent = totalH || "--";
    }
    
    // Update status and button states
    function updateCheckInStatus(isInsideOffice) {
      const checkinDisabled  = getItemValue("P228_CHECKIN_DISABLED") === "Y";
      const checkoutDisabled = getItemValue("P228__CHECKOUT_DISABLED") === "Y";
    
      checkInButton.disabled  = checkinDisabled || !isInsideOffice;
      checkOutButton.disabled = checkoutDisabled || !isInsideOffice;
    
      checkInButton.style.display = "inline-block";
      checkOutButton.style.display = "inline-block";
    
      let text = "";
      if (!isInsideOffice) text = "أنت خارج نطاق المكتب حالياً.";
      else if (!checkinDisabled && checkoutDisabled) text = "يمكنك تسجيل الدخول الآن";
      else if (checkinDisabled && !checkoutDisabled) text = "يمكنك تسجيل الخروج الآن";
      else text = "تم تسجيل حضورك اليوم مسبقاً";
    
      statusDisplay.textContent = text;
    
      if (!isInsideOffice) statusDisplay.className = "status-display out-range";
      else if (!checkinDisabled && checkoutDisabled) statusDisplay.className = "status-display ready";
      else statusDisplay.className = "status-display checked-in";
    
      updateTimeFields(); // update the times on status change
    }
    
    function waitForItemsAndLocation() {
      const checkinVal  = getItemValue("P228_CHECKIN_DISABLED");
      const checkoutVal = getItemValue("P228__CHECKOUT_DISABLED");
    
      if (checkinVal !== "" && checkoutVal !== "") {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              const dist = getDistance(latitude, longitude, officeLat, officeLon);
              const isInsideOffice = dist <= CHECKIN_RADIUS;
    
              // Make location message more user-friendly
              let locationMsg = "";
              if (isInsideOffice) {
                locationMsg = "أنت حالياً داخل نطاق المكتب ✅";
              } else if (dist < 1000) {
                locationMsg = `أنت خارج المكتب بحوالي ${Math.round(dist)} متر ⚠️`;
              } else {
                locationMsg = "أنت بعيد جداً عن المكتب ❌";
              }
    
              locationDisplay.textContent = locationMsg;
              locationDisplay.className = `location-display ${isInsideOffice ? "in-range" : "out-range"}`;
    
              updateCheckInStatus(isInsideOffice);
    
              spinner.remove();
            },
            () => {
              locationDisplay.textContent = "تعذر الحصول على موقعك الحالي ❌";
              updateCheckInStatus(false);
              spinner.remove();
            }
          );
        } else {
          locationDisplay.textContent = "ميزة تحديد الموقع غير مدعومة في هذا المتصفح ❌";
          updateCheckInStatus(false);
          spinner.remove();
        }
      } else {
        setTimeout(waitForItemsAndLocation, 100); // retry
      }
    }
    
    // Start waiting
    waitForItemsAndLocation();
    
    // Helper to calculate distance
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // meters
      const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180;
      const Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    

css: 
  inline: |
    /* ===== Attendance Card Container ===== */
    .attendance-card {
        max-width: 480px;
        margin: 20px auto;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        font-family: 'Tajawal', sans-serif;
        border: 1px solid #e5e7eb;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .attendance-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }
    
    /* ===== User Header ===== */
    .user-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .user-header .avatar {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        overflow: hidden;
        border: 2px solid #e5e7eb;
        flex-shrink: 0;
    }
    
    .user-header .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .user-details {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    
    .user-name {
        font-weight: 600;
        font-size: 18px;
        color: #1f2937;
    }
    
    .user-title {
        font-size: 14px;
        color: #6b7280;
    }
    
    /* ===== Status & Location Row ===== */
    .status-location-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .location-display,
    .status-display {
        border-radius: 8px;
        padding: 12px 16px;
        font-weight: 500;
        font-size: 14px;
        text-align: center;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        color: #1f2937;
    }
    
    /* Optional subtle colors */
    .location-display.in-range { color: #15803d; }
    .location-display.out-range { color: #b91c1c; }
    .status-display.ready { color: #1e40af; }
    .status-display.checked-in { color: #92400e; }
    
    /* ===== Time Row ===== */
    .time-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .time-box {
        background: #f9fafb;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
        border: 1px solid #e5e7eb;
    }
    
    .time-box label {
        display: block;
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 4px;
        font-weight: 500;
    }
    
    .time-box .time-value {
        font-size: 16px;
        font-weight: 600;
        color: #1f2937;
    }
    
    /* ===== Action Buttons ===== */
    .action-buttons button {
        flex: 1;
        border: none;
        border-radius: 8px;
        padding: 13px 24px; /* bigger buttons */
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #ffffff;
    }
    
    .action-buttons button {
        flex: 1;             /* buttons stretch equally */
        border: none;
        border-radius: 8px;
        padding: 14px 20px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #ffffff;
    }
    
    /* Buttons colors */
    .btn-checkin { background: #2563eb; }   /* blue */
    .btn-checkout { background: #ef4444; }  /* red */
    .btn-approve { background: #10b981; }   /* green */
    .btn-reject { background: #f59e0b; }    /* amber */
    
    .action-buttons button:hover:not(:disabled) {
        filter: brightness(1.1);
    }
    
    button:disabled {
        background: #e5e7eb;
        color: #9ca3af;
        cursor: not-allowed;
    }
    
    /* ===== Responsive ===== */
    @media (max-width: 480px) {
        .attendance-card {
            width: 95%;
            margin: 15px auto;
        }
    
        .status-location-row,
        .time-row {
            grid-template-columns: 1fr;
        }
    
        .action-buttons {
            flex-direction: column;  /* stack buttons vertically */
        }
    
        .action-buttons button {
            width: 100%;            /* full width on mobile */
        }
    }
    

