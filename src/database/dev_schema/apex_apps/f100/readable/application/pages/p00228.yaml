- # ====== Region: user-info ===================================
  id: 187836163231702308
  identification: 
    name: user-info
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE  
        l_html       CLOB := '';
        l_first_name BS_EMPLOYEES.FIRST_NAME%TYPE;
        l_last_name  BS_EMPLOYEES.LAST_NAME%TYPE;
        l_job_title  BS_EMPLOYEES.JOB_TITLE%TYPE;
        l_photo_url  BS_EMPLOYEES.PHOTO_URL%TYPE;
      BEGIN
        -- Get user info
        SELECT FIRST_NAME, LAST_NAME, JOB_TITLE, PHOTO_URL
          INTO l_first_name, l_last_name, l_job_title, l_photo_url
          FROM BS_EMPLOYEES
         WHERE ID = :APP_USER_ID;
      
        -- Build HTML with orderead card layout
        l_html := 
      '
              <!-- Header: Avatar & Details -->
              <div class="user-header" style="display: flex; align-items: center; gap: 15px;">
                <!-- Avatar -->
                <div class="avatar" style="
                      width: 90px; 
                      height: 90px; 
                      flex-shrink: 0; 
                      border-radius: 50%; 
                      overflow: hidden; 
                      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                      border: 2px solid #1cc88a;">
                  <img src="' || l_photo_url || '" 
                       alt="Avatar" 
                       style="width: 100%; height: 100%; object-fit: cover;"
                       onerror="this.onerror=null;this.src=''https://via.placeholder.com/90?text=👤''">
                </div>
                
                <!-- User Details -->
                <div class="user-details" style="display: flex; flex-direction: column; justify-content: center;">
                  <div class="user-name" style="font-weight: 700; font-size: 18px; color: #333;">
                    ' || l_first_name || ' ' || l_last_name || '
                  </div>
                  <div class="user-title" style="font-size: 14px; color: #555; margin-top: 4px;">
                    المسمى الوظيفي: ' || l_job_title || '
                  </div>
                </div>
              </div>';
      
        RETURN l_html;
      END;
      

  layout: 
    sequence: 10
    parent-region: div-header # 187836137239702307
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--removeHeader js-removeLandmark
    - t-Region--noUI
    - t-Region--scrollBody
    css-classes: 
    - user-info
    render-components: Above Content

