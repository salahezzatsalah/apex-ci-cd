dynamic-actions: 
- # ====== Dynamic Action: New_1 ===============================
  id: 183342987990417038
  identification: 
    name: New_1

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 183343125331417039
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            v_user_id       VARCHAR2(300) := :APP_USER_ID;
            v_attend_id     VARCHAR2(300);
            v_last_checkin  DATE;
            v_last_checkout DATE;
            v_total_hours   NUMBER;
            v_complete      VARCHAR2(1);
            v_task_id       VARCHAR2(300);
        BEGIN
            BEGIN
                SELECT ATTENDANCE_ID, CHECKIN, CHECKOUT, COMPLETE, TOTAL_HOURS, TASK_ID
                INTO v_attend_id, v_last_checkin, v_last_checkout, v_complete, v_total_hours, v_task_id
                FROM AS_ATTENDANCE
                WHERE USER_ID = v_user_id
                ORDER BY CHECKIN DESC
                FETCH FIRST 1 ROWS ONLY;
        
                :P228_ATTEND_ID := v_attend_id;
                :P228_TASK_ID := v_task_id;  
        
                IF v_complete = 'F' THEN
                    :P228_TIMEIN := TO_CHAR(v_last_checkin, 'HH24:MI');
                    :P228_TIMEOUT := NULL;
                    :P228_TOTALHOURS := NULL;
                    :P228_CHECKIN_DISABLED := 'Y';
                    :P228__CHECKOUT_DISABLED := 'F';
                ELSE
                    IF TRUNC(v_last_checkin) = TRUNC(SYSTIMESTAMP AT TIME ZONE 'Africa/Cairo') THEN
                        :P228_TIMEIN := TO_CHAR(v_last_checkin, 'HH24:MI');
                        :P228_TIMEOUT := TO_CHAR(v_last_checkout, 'HH24:MI');
                        :P228_TOTALHOURS := FLOOR(v_total_hours) || ' ساعة ' || ROUND(MOD(v_total_hours*60,60)) || ' دقيقة' ;
                        :P228_CHECKIN_DISABLED := 'Y';
                        :P228__CHECKOUT_DISABLED := 'Y';
                    ELSE
                        :P228_TIMEIN := NULL;
                        :P228_TIMEOUT := NULL;
                        :P228_CHECKIN_DISABLED := 'F';
                        :P228__CHECKOUT_DISABLED := 'Y';
                    END IF;
                END IF;
        
            EXCEPTION
                WHEN NO_DATA_FOUND THEN
                    :P228_ATTEND_ID := NULL;
                    :P228_TASK_ID := NULL;
                    :P228_TIMEIN := NULL;
                    :P228_TIMEOUT := NULL;
                    :P228_TOTALHOURS := NULL;
                    :P228_CHECKIN_DISABLED := 'F';
                    :P228__CHECKOUT_DISABLED := 'Y';
            END;
        END;
        
      items-to-submit: 
      - P228_ATTEND_ID
      items-to-return: 
      - P228__CHECKOUT_DISABLED
      - P228_CHECKIN_DISABLED
      - P228_ATTEND_ID
      - P228_TIMEIN
      - P228_TIMEOUT
      - P228_TOTALHOURS
      - P228_TASK_ID
      suppress-change-event: false

    execution: 
      sequence: 10
      event: New_1 # 183342987990417038
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: New =================================
  id: 187838668621702333
  identification: 
    name: New

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: CheckIn # 187836974352702316

  configuration: 
    build-option: Commented Out # 253764608978089549

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 187838780889702334
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            l_instance_id NUMBER;
            l_params      apex_workflow.t_workflow_parameters;
            l_task_id     VARCHAR2(4000);
        BEGIN
            l_params := apex_workflow.t_workflow_parameters(
                           apex_workflow.t_workflow_parameter(
                               static_id => 'USER_ID',
                               string_value => :APP_USER_ID
                           )
                        );
        
            l_instance_id := apex_workflow.start_workflow(
                p_application_id => :APP_ID,
                p_static_id      => 'Attendance_Workflow',
                p_parameters     => l_params,
                p_initiator      => :APP_USER
            );
        
            :P228_WORK_FLOW_ID := l_instance_id;
        END;
        
      items-to-return: 
      - P228_WORK_FLOW_ID
      suppress-change-event: false

    execution: 
      sequence: 10
      event: New # 187838668621702333
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

