- # ====== Page Item: P10760_REQUIRED_INITIATIVE_ID ============
  id: 18911424298508411729
  identification: 
    name: P10760_REQUIRED_INITIATIVE_ID
    type: Popup LOV

  label: 
    label: Required &NOMENCLATURE_INITIATIVE.
    alignment: Left

  settings: 
    display-as: Inline Popup
    initial-fetch: Automatic
    manual-entry: false
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  multiple-values: 
    type: No

  layout: 
    sequence: 70
    region: External System Link # 14983213112087552259
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    width: 30

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      select a.area ||' - '|| i.initiative d, i.id 
        from sp_areas a,
             sp_initiatives i
       where a.id = i.area_id
       order by 1
    display-extra-values: true
    display-null-value: true
    null-display-value: '- Any -'

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: External System Link # 14983213112087552259
