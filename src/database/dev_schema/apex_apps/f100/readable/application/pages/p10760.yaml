                    https://jira.mycompany.com/jira/browse/#TICKET_NUMERIC#

- # ====== Page Item: P10760_TICKET_ID_REGEX ===================
  id: 16108245371898772602
  identification: 
    name: P10760_TICKET_ID_REGEX
    type: Text Field

  label: 
    label: Identify Ticket ID REGEXP
    alignment: Left

  settings: 
    subtype: Text
    trim-spaces: Leading and Trailing
    text-case: NO CHANGE
    submit-when-enter-pressed: false
    disabled: false

  layout: 
    sequence: 50
    region: External System Link # 14983213112087552259
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Required - Floating
    template-options: 
    - '#DEFAULT#'
    width: 30

  validation: 
    value-required: true
    maximum-length: 255

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: External System Link # 14983213112087552259
    column: TICKET_ID_REGEX
    data-type: VARCHAR2
    query-only: false
    primary-key: false

  default: 
    type: Static
    static-value: '[Aa][Bb][Cc][Dd][-: ]\d{4,5}'

  session-state: 
    storage: Per Request (Memory Only)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

  help: 
    help-text: |
      Use this regular expression to identify the pattern containing the ticket ID that is to be used to link to the external system.  For example: 
      
      <pre>[Aa][Bb][Cc][Dd][-: ]\d{4,5}</pre>
      
      which searches for case insensitive "ABCD" followed by a dash, colon or space and then 4 or 5 numbers.  This entire string, or just the numeric portion, can then used in the Link.

