- # ====== Computation: P502_TASK ==============================
  id: 28639061543856291223
  identification: 
    item-name: P502_TASK

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      select (select task_type from res_task_types rt where rt.id = task_type_id)||
                 case when task_sub_type_id is not null then ': ' end ||
                 (select task_type from res_task_types rt where rt.id = task_sub_type_id) ||
             case when task is not null then ' - '||task end type
        from reservation_tasks
       where id = :P502_TASK_ID

