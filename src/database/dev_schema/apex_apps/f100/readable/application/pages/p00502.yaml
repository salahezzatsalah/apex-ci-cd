- # ====== Region: Comments ====================================
  id: 147386364431365195419
  identification: 
    name: Comments
    title: تعليقات [&P502_COMMENTSCOUNT.]
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select ic.ID,
             -- Display Columns
             tm.initials user_icon,
             apex_util.get_since(ic.created) comment_date,
             tm.first_name || ' ' || tm.last_name user_name,
             --
             ic.body_html comment_text,
             case when lower(ic.created_by) = lower(:app_user_id)
                  then '<a href="'||apex_util.prepare_URL(
                                    p_url => 'f?p='||:APP_ID||':503:'||:APP_SESSION||'::NO:503:P503_ID:'||ic.id,
                                    p_checksum_type => '3')||'">تعديل</a>' 
                  end actions,
             ' ' attribute_1,
             ' ' attribute_2,
             ' ' attribute_3,
             ' ' attribute_4,
             'u-color-'||ora_hash(ic.created_by,45) icon_modifier,
             --
             --
             --
             decode(ic.private_yn,null,null,'N',null,'Y',' Private Comment') private_comment_label,
             --
             -- Data Columns
             --
             ic.BODY,
             ic.BODY_HTML,
             ic.AUTHOR_ID,
             --
             ic.CREATED,
             ic.CREATED_BY,
             ic.UPDATED,
             ic.UPDATED_BY,
             tm.id team_member_id
        from res_task_comments ic, 
             bs_employees tm
      where ic.author_id = tm.id and
            ic.task_id = :P502_TASK_ID and  
            (nvl(ic.private_yn,'N') = 'N' or lower(ic.created_by) = lower(:app_user_id) )
      order by created desc
    page-items-to-submit: 
    - P502_TASK_ID

