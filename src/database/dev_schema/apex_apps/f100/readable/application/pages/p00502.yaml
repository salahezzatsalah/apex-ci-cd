- # ====== Region: Task ========================================
  id: 64782704458160822026
  identification: 
    name: Task
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      with today as (select trunc(sysdate) day from dual)
      select r.ID,
          --    p.INITIATIVE_ID,
          --    i.initiative,
          --    f.area focus_area,
          --    f.id focus_area_id,
             (select reservation_id from hotel_reservations where RESERVATION_ID = r.reservation_id) reservation_id,
             r.reservation_type,
             (select case when first_name is not null or last_name is not null
                          then first_name||' '||last_name
                          else email
                          end
                     from bs_employees t where t.id = r.owner_id) the_owner,
             r.owner_id,
             s.status,
             r.start_date,
             r.target_complete,
             case when s.indicates_complete_yn = 'N' and
                       r.target_complete is not null
                  then least(5, trunc(r.target_complete) - trunc(r.target_complete, 'iw') + 1)
                       - least(5, today.day - trunc(today.day, 'iw') + 1)
                       + (trunc(r.target_complete, 'iw') - trunc(today.day, 'iw')) * 5 / 7
             end weekdays_left,
             r.updated
        from reservation_tasks r,
             res_task_statuses s,
             today,
             HOTEL_RESERVATIONs p
          --    SP_INITIATIVES i,
          --    SP_AREAS f
       where r.id = :P502_TASK_ID
         and r.status_id = s.id
         and r.reservation_id = p.RESERVATION_ID
      --    and p.initiative_id = i.id
      --    and i.area_id = f.id
    page-items-to-submit: 
    - P502_TASK_ID

