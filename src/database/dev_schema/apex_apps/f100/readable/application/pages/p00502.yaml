    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: add_link # 28639034853354291184

  actions: 
  - # ====== Action: Alert =======================================
    id: 28639067781489291228
    identification: 
      action: Alert

    settings: 
      title: ناقص حاجة!
      message: يرجى إدخال رابط URL واسم الرابط.
      style: Default

    execution: 
      sequence: 10
      event: add link # 28639067208932291228
      fire-when-event-result-is: True
      fire-on-initialization: false

    client-side-condition: 
      type: JavaScript expression
      javascript-expression: $v('P502_LINK') === '' || $v('P502_LINK_NAME') === ''

  - # ====== Action: Execute Server-side Code ====================
    id: 28639068239555291228
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        if :P502_LINK_NAME is not null and :P502_LINK is not null then
        insert into res_TASK_LINKS (
            task_id, link_name, link_url)
        values (
            :P502_TASK_ID, :P502_LINK_NAME, :P502_LINK);
        :P502_LINK_NAME := null;
        :P502_LINK := null;
        end if;
      items-to-submit: 
      - P502_LINK_NAME
      - P502_LINK
      - P502_TASK_ID
      items-to-return: 
      - P502_LINK_NAME
      - P502_LINK
      suppress-change-event: false

    execution: 
      sequence: 20
      event: add link # 28639067208932291228
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

