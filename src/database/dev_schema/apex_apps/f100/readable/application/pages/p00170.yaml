- # ====== Dynamic Action: New =================================
  id: 196977941513534751
  identification: 
    name: New

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Custom
    custom-event: menuAction
    selection-type: JavaScript Expression
    javascript-expression: document

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 196978305771534722
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        // ✅ تأكد أن dataRowCalled تم تعيينها عند فتح القائمة (global variable)
        const rowData = dataRowCalled;
        
        if (!rowData) {
            console.warn("❌ لم يتم تعيين dataRowCalled أو العنصر غير موجود.");
            return;
        }
        
        // استخراج البيانات من الزر
        const rowID       = rowData.getAttribute('data-id');
        const hotelID     = rowData.getAttribute('data-hotel-id');
        const clientID    = rowData.getAttribute('data-client-id');
        const checkin     = rowData.getAttribute('data-checkin');
        const checkout    = rowData.getAttribute('data-checkout');
        const status      = rowData.getAttribute('data-status'); // ✅ التصحيح هنا
        
        console.log({ rowID, hotelID, clientID, checkin, checkout, status });
        
        // تحقق أساسي
        if (!rowID) {
            apex.message.alert("لم يتم العثور على رقم الحجز.", null, {
                title: "خطأ في الاختيار",
                style: "warning",
                okLabel: "حسناً"
            });
            return;
        }
        
        // تنفيذ الأكشن بناءً على الاختيار
        switch (this.data.action) {
            case 'CheckIn':
                CallChangeStatus(rowID, 'CHECKED_IN');
                break;
        
            case 'CheckOut':
                CallChangeStatus(rowID, 'CHECKED_OUT');
                break;
        
            case 'CancelProduct':
                CallCancelProduct(rowID);
                break;
        
            case 'Reactiviate':
                CallReactiviate(rowID);
                break;
        
            case 'AddTranscation':
                CallAddTranscation(rowID);
                break;
        
            case 'AddDocument':
                CallAddDocument(rowID);
                break;
        
            case 'EditProduct':
                CallEditProduct(rowID);
                break;
        case 'ConfrimResrvation':
        
                CallChangeStatus(rowID, 'CONFIRMED');
                break;
        
            default:
                apex.message.alert("تم اختيار إجراء غير معروف.");
                break;
        }
        

    execution: 
      sequence: 20
      event: New # 196977941513534751
      fire-when-event-result-is: True
      fire-on-initialization: false

