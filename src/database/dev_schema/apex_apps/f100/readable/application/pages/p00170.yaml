- # ====== Region: Services Interactive Report =================
  id: 258931446804700145
  identification: 
    name: Services Interactive Report
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          -- =====================
          -- تفاصيل مستوى الغرفة
          -- =====================
          l.LOOKUP_ID AS room_id,
          r.RESERVATION_ID AS reservation_id,
          rt.ROOM_NAME AS room_type,
          CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_IN_DATE) AS DATE_FROM,
          CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_OUT_DATE) AS DATE_TO,
          r.NIGHTS AS NIGHT_COUNT,
          p.FINAL_PRICE AS CUSTOM_PRICE_PER_NIGHT,
          p.CURRENCY,
          p.EXCHANGE_RATE,
          r.TOTAL_RESERVATION_PRICE AS TOTAL_PRICE,
          r.TOTAL_RESERVATION_PRICE_EGP AS TOTAL_EGP,
      
          -- =====================
          -- تفاصيل مستوى الحجز
          -- =====================
          r.REQUESTER_ID AS CLIENT_ID,
          (SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = r.REQUESTER_ID) AS client_name,
          r.HOTEL_ID,
          (SELECT HOTEL_NAME FROM HOTELS h WHERE h.HOTEL_ID = r.HOTEL_ID) AS hotel_name,
          r.TOTAL_RESERVATION_PRICE AS TOTAL_INVOICE_AMOUNT,
          NULL AS TOTAL_PAYMENT,
          NULL AS REMAINING_AMOUNT,
          NULL AS MIN_PAYMENT_REQUIRED,
          r.STATUS,
      
          -- =====================
          -- منطق التقدم
          -- =====================
          CASE r.STATUS
              WHEN 'PENDING'     THEN 'fa-pie-chart-30'
              WHEN 'CONFIRMED'   THEN 'fa-pie-chart-60'
              WHEN 'CHECKED_IN'  THEN 'fa-pie-chart-100'
              ELSE 'fa-pie-chart-0'
          END AS icon,
      
          CASE r.STATUS
              WHEN 'PENDING'     THEN 'قيد المعالجة (30%)'
              WHEN 'CONFIRMED'   THEN 'في انتظار الوصول (60%)'
              WHEN 'CHECKED_IN'  THEN 'تم التأكيد (100%)'
              ELSE 'غير محدد (0%)'
          END AS status_description,
      
          -- =====================
          -- ممثلو المبيعات والعمليات
          -- =====================
          -- r.SALES_REP_ID,
          -- (SELECT FIRST_NAME || ' ' || LAST_NAME FROM BS_EMPLOYEES e WHERE e.ID = r.SALES_REP_ID) AS sales_rep_name,
          -- r.OPS_REP_ID,
          -- (SELECT FIRST_NAME || ' ' || LAST_NAME FROM BS_EMPLOYEES e WHERE e.ID = r.OPS_REP_ID) AS ops_rep_name,
      
          -- =====================
          -- المراجعة والتتبع
          -- =====================
          r.POSTDATETIME AS reservation_created,
          r.REGISTERED_BY AS reservation_created_by,
          r.LAST_EDIT_DATE AS reservation_updated,
          r.LAST_UPDATED_TIME AS reservation_updated_by,
          r.NOTES,
      
          -- =====================
          -- حالة الغرفة
          -- =====================
          CASE r.STATUS
              WHEN 'CHECKED_IN'  THEN 'تم تسجيل الدخول'
              WHEN 'CHECKED_OUT' THEN 'تم تسجيل الخروج'
              WHEN 'CANCELED'    THEN 'ملغاة'
              ELSE 'قيد الانتظار'
          END AS room_status_label,
      
          CASE r.STATUS
              WHEN 'CHECKED_IN'  THEN 'fa-sign-in text-success'
              WHEN 'CHECKED_OUT' THEN 'fa-sign-out text-primary'
              WHEN 'CANCELED'    THEN 'fa-times-circle text-danger'
              ELSE 'fa-circle-o text-muted'
          END AS room_status_icon,
      
          -- =====================
          -- التقارير والتجميع
          -- =====================
          TO_CHAR(r.LAST_UPDATED_TIME, 'YYYY.MM') AS updated_month
      
      FROM 
          HOTELS_RESERVATIONS r
          JOIN UNIT_ROOM_LOOKUP l ON r.LOOKUP_ID = l.LOOKUP_ID
          LEFT JOIN UNIT_ROOM_TYPES rt ON l.ROOM_TYPE_ID = rt.ROOM_TYPE_ID
          LEFT JOIN UNIT_ROOM_PRICE p ON l.PRICE_ID = p.PRICE_ID
      
      ORDER BY 
          r.CHECK_IN_DATE DESC;
      

