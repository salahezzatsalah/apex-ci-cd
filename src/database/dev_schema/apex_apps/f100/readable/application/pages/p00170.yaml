processes: 
- # ====== Process: CANCELPRODUCT ==============================
  id: 196954771475988603
  identification: 
    name: CANCELPRODUCT
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          v_reservation_id CONSTANT VARCHAR2(200) := apex_application.g_x01; -- معرّف الحجز القادم من JavaScript
          v_employee_id    CONSTANT VARCHAR2(200) := apex_application.g_x02; -- معرّف الموظف القادم من JavaScript
      BEGIN
          -- تحديث حالة الحجز وتعيين الموظف الذي قام بالإلغاء
          UPDATE HOTELS_RESERVATIONS
             SET STATUS          = 'CANCELED',
                 LAST_EDIT_DATE   = SYSTIMESTAMP,
                 CANCELLED_BY     = v_employee_id
           WHERE RESERVATION_ID  = v_reservation_id;
      
          IF SQL%ROWCOUNT > 0 THEN
              -- ✅ تم الإلغاء بنجاح
              apex_json.open_object; 
              apex_json.write('status', 1); 
              apex_json.write('msg', 'تم إلغاء الحجز بنجاح'); 
              apex_json.close_all;
          ELSE
              -- ⚠️ لم يتم العثور على الحجز
              apex_json.open_object; 
              apex_json.write('status', 0); 
              apex_json.write('msg', 'لم يتم العثور على الحجز بالمعرّف المحدد'); 
              apex_json.close_all;
          END IF;
      
          COMMIT;
      
      EXCEPTION
          WHEN OTHERS THEN
              -- ❌ حدث خطأ أثناء العملية
              apex_json.open_object; 
              apex_json.write('status', 0); 
              apex_json.write('msg', 'حدث خطأ أثناء إلغاء الحجز: ' || SQLERRM); 
              apex_json.close_all;
      END;
      

  execution: 
    sequence: 10
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

- # ====== Process: REACTIVIATEPRODUCT =========================
  id: 196954881713988604
  identification: 
    name: REACTIVIATEPRODUCT
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          v_reservation_id CONSTANT VARCHAR2(200) := apex_application.g_x01; -- المعرّف القادم من JavaScript
      BEGIN
          -- تحديث حالة الحجز وإعادة تفعيله
          UPDATE HOTELS_RESERVATIONS
             SET STATUS          = 'PENDING',   -- إعادة تفعيل الحجز
                 LAST_EDIT_DATE   = SYSTIMESTAMP,  -- تحديث آخر تعديل
                 CANCELLED_BY     = NULL           -- مسح خانة الملغي بواسطة
           WHERE RESERVATION_ID   = v_reservation_id;
      
          IF SQL%ROWCOUNT > 0 THEN
              -- ✅ نجاح العملية
              apex_json.open_object; 
              apex_json.write('status', 1); 
              apex_json.write('msg', 'تم إعادة تنشيط الحجز بنجاح'); 
              apex_json.close_all;
          ELSE
              -- ⚠️ لم يتم العثور على الحجز
              apex_json.open_object; 
              apex_json.write('status', 0); 
              apex_json.write('msg', 'لم يتم العثور على الحجز بالمعرّف المحدد'); 
              apex_json.close_all;
          END IF;
      
          COMMIT;
      
      EXCEPTION
          WHEN OTHERS THEN
              -- ❌ في حال حدوث خطأ
              apex_json.open_object; 
              apex_json.write('status', 0); 
              apex_json.write('msg', 'حدث خطأ أثناء إعادة تنشيط الحجز: ' || SQLERRM); 
              apex_json.close_all;
      END;
      

  execution: 
    sequence: 20
    point: Ajax Callback
    run-process: Once Per Page Visit (default)

