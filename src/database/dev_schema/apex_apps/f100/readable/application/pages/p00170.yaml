regions: 
- # ====== Region: New =========================================
  id: 196635965882065645
  identification: 
    name: New
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          r.RESERVATION_ID         AS "معرّف الحجز",
          h.HOTEL_NAME             AS "اسم الفندق",
          rt.ROOM_NAME             AS "نوع الغرفة",
          CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_IN_DATE)  AS "تاريخ الدخول",
          CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_OUT_DATE) AS "تاريخ الخروج",
          r.NIGHTS                 AS "عدد الليالي",
      
          r.REQUESTER_ID           AS "معرّف العميل",
          (SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = r.REQUESTER_ID) AS "اسم العميل",
      
          p.FINAL_PRICE            AS "سعر الليلة",
          p.CURRENCY               AS "العملة",
          r.TOTAL_RESERVATION_PRICE     AS "الإجمالي",
          r.TOTAL_RESERVATION_PRICE_EGP AS "الإجمالي بالجنيه",
      
          NVL(SUM(c.AMOUNT * c.CURRENCYRATES), 0) AS "المدفوع بالجنيه",
          NVL(r.TOTAL_RESERVATION_PRICE_EGP, 0) - NVL(SUM(c.AMOUNT * c.CURRENCYRATES), 0) AS "المتبقي بالجنيه",
      
          r.STATUS AS "CODE_STATUS",
          CASE r.STATUS
              WHEN 'PENDING'     THEN 'قيد المعالجة'
              WHEN 'CONFIRMED'   THEN 'تحت التنفيذ'
              WHEN 'CHECKED_IN'  THEN 'تم التسكين'
              WHEN 'CHECKED_OUT' THEN 'تم الخروج'
              WHEN 'CANCELED'    THEN 'تم الإلغاء'
              ELSE 'غير محددة'
          END AS "STATUS",
          r.REGISTERED_BY    AS "تم التسجيل بواسطة",
          r.NOTES            AS "ملاحظات",
          h.HOTEL_ID
      
      FROM 
          HOTELS_RESERVATIONS r
          JOIN UNIT_ROOM_LOOKUP l ON r.LOOKUP_ID = l.LOOKUP_ID
          JOIN HOTELS h ON r.HOTEL_ID = h.HOTEL_ID
          LEFT JOIN UNIT_ROOM_TYPES rt ON l.ROOM_TYPE_ID = rt.ROOM_TYPE_ID
          LEFT JOIN UNIT_ROOM_PRICE p ON l.PRICE_ID = p.PRICE_ID
          LEFT JOIN COLLECTIONS c ON c.RELATEDRESID = r.RESERVATION_ID
      
      WHERE 
          r.STATUS IN ('CHECKED_IN', 'PENDING')
      
      GROUP BY 
          r.RESERVATION_ID,
          h.HOTEL_NAME,
          rt.ROOM_NAME,
          r.CHECK_IN_DATE,
          r.CHECK_OUT_DATE,
          r.NIGHTS,
          r.REQUESTER_ID,
          p.FINAL_PRICE,
          p.CURRENCY,
          r.TOTAL_RESERVATION_PRICE,
          r.TOTAL_RESERVATION_PRICE_EGP,
          r.STATUS,
          r.POSTDATETIME,
          r.LAST_EDIT_DATE,
          r.REGISTERED_BY,
          r.NOTES,
          h.HOTEL_ID
      
      ORDER BY 
          r.CHECK_IN_DATE DESC;
      

