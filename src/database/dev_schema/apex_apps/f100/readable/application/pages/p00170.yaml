- # ====== Region: Services Interactive ReportS ================
  id: 198078226947747310
  identification: 
    name: Services Interactive ReportS
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      WITH price_summary AS (
        SELECT 
          RESERVATION_ID,
          COUNT(*) AS total_days,
          COUNT(CASE WHEN SPECIAL_PRICE IS NOT NULL AND SPECIAL_PRICE > 0 THEN 1 END) AS special_days,
          COUNT(CASE WHEN BASE_PRICE IS NOT NULL AND (SPECIAL_PRICE IS NULL OR SPECIAL_PRICE = 0) THEN 1 END) AS base_days,
          COUNT(CASE WHEN NVL(DAY_ADDON,0) > 0 THEN 1 END) AS addon_days,
          SUM(NVL(EFFECTIVE_PRICE,0)) AS total_effective,
          SUM(NVL(SPECIAL_PRICE,0)) AS total_special,
          SUM(CASE WHEN BASE_PRICE IS NOT NULL AND (SPECIAL_PRICE IS NULL OR SPECIAL_PRICE = 0) THEN BASE_PRICE ELSE 0 END) AS total_base,
          SUM(CASE WHEN NVL(DAY_ADDON,0) > 0 THEN NVL(DAY_ADDON,0) ELSE 0 END) AS total_addon
        FROM RESERVATION_CALCULATION_LOG
        GROUP BY RESERVATION_ID
      )
      SELECT 
        '<div class="reservation-card">
      
          <div class="res-header">
            <div>
           <h3>
        حجز رقم #' || NVL(r.res_num,r.RESERVATION_ID) || '
        ' || CASE 
              WHEN r.res_num IS NOT NULL THEN
                '<i class="fa fa-copy" 
                   title="Copy info"
                   style="cursor:pointer;color:#2563eb;margin-left:8px;"
               onclick="copyReservationHeaderInfo(
        ''' || NVL(r.res_num,'-') || ''',
        ''' || NVL((SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = r.REQUESTER_ID), '-')  || ''',
        ''' || REPLACE(h.HOTEL_NAME, '''', '’') || ''',
        ''' || REPLACE(rt.ROOM_NAME, '''', '’') || ''',
        ''' || NVL(REPLACE(rt.DESCRIPTION, '''', '’'), '-') || ''',
        ''' || TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_IN_DATE), 'DD-MM-YYYY') || ''',
        ''' || TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_OUT_DATE), 'DD-MM-YYYY') || ''',
        ''' || r.NIGHTS || ''',
        ''' || NVL(v.USERNAME, '-') || '''
      )"
      ></i>'
              ELSE ''
            END || '
      </h3>
      
              <div class="res-sub">
                <i class="fa fa-user icon"></i>' || NVL((SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = r.REQUESTER_ID), '-') || '
              </div>
            </div>
            <div>' || 
              CASE r.STATUS
                WHEN 'PENDING'     THEN '<span class="status-tag status-pending">قيد المعالجة</span>'
                WHEN 'CONFIRMED'   THEN '<span class="status-tag status-confirmed">تحت التنفيذ</span>'
                WHEN 'CHECKED_IN'  THEN '<span class="status-tag status-checkedin">تم التسكين</span>'
                WHEN 'CHECKED_OUT' THEN '<span class="status-tag status-checkedout">تم الخروج</span>'
                WHEN 'CANCELED'    THEN '<span class="status-tag status-canceled">تم الإلغاء</span>'
                ELSE '<span class="status-tag status-unknown">غير محددة</span>'
              END || '
            </div>
          </div>
      
          <div class="res-info">
            <div><i class="fa fa-calendar icon"></i><strong>الدخول:</strong> ' || TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_IN_DATE), 'DD-MM-YYYY') || '</div>
            <div><i class="fa fa-calendar-check-o icon"></i><strong>الخروج:</strong> ' || TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_OUT_DATE), 'DD-MM-YYYY') || '</div>
            <div><i class="fa fa-moon-o icon"></i><strong>الليالي:</strong> ' || r.NIGHTS || '</div>
            <div><i class="fa fa-users icon"></i><strong>النزلاء:</strong> بالغين ' || NVL(r.ADULT,0) || ' - أطفال ' || NVL(r.CHILDERN,0) || '</div>
          </div>
      
          <div><i class="fa fa-coffee icon"></i><strong>الإفطار:</strong> ' ||
            CASE 
              WHEN rt.BREAKFAST_INCLUDED THEN '<span style="color:#16a34a;font-weight:600;">شامل</span>'
              WHEN s.SERVICE_NAME IS NOT NULL THEN 
                '<span style="color:#2563eb;font-weight:600;">إفطار إضافي</span>'
              ELSE '<span style="color:#dc2626;">غير مشمول</span>'
            END || '
          </div>
      
          <!-- 🟢🔵🟠 Arabic daily summary section -->
          <div class="price-summary" style="margin-top:10px;background:#f9fafb;padding:10px;border-radius:10px;">
            <div style="font-weight:600;color:#111827;margin-bottom:5px;">
              <i class="fa fa-calendar icon"></i> ملخص الأسعار اليومية
            </div>
      
            <div style="color:#15803d;">🟢 الأيام الخاصة: ' || NVL(ps.special_days,0) || ' يوم × ' ||
              TO_CHAR(NVL(ps.total_special,0)/NULLIF(ps.special_days,0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'دولار') || '</div>
      
            <div style="color:#2563eb;">🔵 الأيام الأساسية: ' || NVL(ps.base_days,0) || ' يوم × ' ||
              TO_CHAR(NVL(ps.total_base,0)/NULLIF(ps.base_days,0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'دولار') || '</div>
      
            <div style="color:#ea580c;">🟠 الأيام الإضافية (عطلات): ' || NVL(ps.addon_days,0) || ' يوم اضافة ' ||
              TO_CHAR(NVL(ps.total_addon,0)/NULLIF(ps.addon_days,0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'دولار') || '</div>
          </div>
          <!-- ✅ End Arabic summary section -->
      
          <div class="price-grid" style="display:grid;gap:8px;margin-top:10px;">
            <div class="price-box" style="color:#2563eb;">
              <i class="fa fa-tag icon"></i>
              <strong>سعر الليلة :</strong>
              <span>' || TO_CHAR(NVL(l.BASE_PRICE, 0), '999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span>
            </div>
      
            <div class="price-box" style="color:#7e22ce;">
              <i class="fa fa-percent icon"></i>
              <strong>عمولة المكتب الوسيط :</strong>
              <span>' || TO_CHAR(NVL(l.COMMISSION_VALUE, 0), '999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span>
            </div>
      
            <div class="price-box" style="color:#ea580c;">
              <i class="fa fa-money icon"></i>
              <strong>رسوم الشركة :</strong>
              <span>' || TO_CHAR(NVL(l.FEE_VALUE, 0), '999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span>
            </div>
      
            <div class="price-box" style="color:#16a34a;">
              <i class="fa fa-cutlery icon"></i>
              <strong>الإفطار لليلة :</strong>
              <span>' || 
      TO_CHAR(
        CASE 
          WHEN NVL(l.BREAKFAST_INCLUDED, 0) = 1 THEN 0
          ELSE NVL(TO_NUMBER(l.BREAKFAST_PRICE), 0)
        END,
        '999,999.99'
      )
       || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '
              </span>
            </div>
          </div>
      
          <div class="totals" style="margin-top:10px;padding-top:10px;border-top:1px solid #e5e7eb;">
            <div>
              <i class="fa fa-sun-o icon" style="color:#1d4ed8;"></i>
              <strong>السعر النهائي لاول ليلة :</strong>
              <span style="color:#1d4ed8;font-weight:bold;">' ||
                TO_CHAR(NVL(l.EFFECTIVE_PRICE, 0), '999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '
              </span>
            </div>
            <div><i class="fa fa-calculator icon" style="color:#15803d;"></i><strong>الإجمالي الكلي:</strong> <span style="color:#15803d;font-weight:bold;">' || TO_CHAR(NVL(r.TOTAL_RESERVATION_PRICE,0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span></div>
            <div><i class="fa fa-credit-card icon" style="color:#2563eb;"></i><strong>المدفوع:</strong> <span style="color:#2563eb;">' || TO_CHAR(NVL(SUM(c.AMOUNT),0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span></div>
            <div><i class="fa fa-exclamation-circle icon" style="color:#dc2626;"></i><strong>المتبقي:</strong> <span style="color:#dc2626;font-weight:bold;">' || TO_CHAR((NVL(r.TOTAL_RESERVATION_PRICE,0))-NVL(SUM(c.AMOUNT),0),'999,999.99') || ' ' || NVL(cb.CURRENCY_NAME_AR,'EGP') || '</span></div>
         <div style="text-align:end;margin-top:10px;">
          <button 
        onclick="copyReservationInfo(
          ''' || REPLACE(h.HOTEL_NAME, '''', '’') || ''',
          ''' || REPLACE(rt.ROOM_NAME, '''', '’') || ''',
          ''' || NVL(REPLACE(rt.DESCRIPTION, '''', '’'), '-') || ''',
          ''' || TO_CHAR(NVL(r.TOTAL_RESERVATION_PRICE, 0), '999,999.99') || ''',
          ''' || r.NIGHTS || ''',
          ''' || NVL(ps.addon_days, 0) || '''
        )"
        style="background:#059669;
               color:#fff;
               font-weight:600;
               padding:10px 18px;
               border:none;
               border-radius:8px;
               cursor:pointer;
               box-shadow:0 3px 6px rgba(0,0,0,0.2);
               transition:transform 0.2s;">
        <i class="fa fa-copy" style="margin-left:6px;"></i> نسخ التفاصيل
      </button>
      
            </div>
         
          </div>
      
      <div class="res-btn" style="text-align:end;margin-top:12px;">
        <button class="t-Button js-menuButton"
          type="button"
          data-menu="AprtResOptionsList_menu"
          data-id="' || r.RESERVATION_ID || '"
          data-hotel-id="' || h.HOTEL_ID || '"
          data-client-id="' || r.REQUESTER_ID || '"
          data-status="' || r.STATUS || '"
          style="background:linear-gradient(90deg,#2563eb,#1e40af);
                 color:#fff;
                 font-weight:700;
                 font-size:17px;
                 padding:14px 28px;
                 border:none;
                 border-radius:14px;
                 box-shadow:0 4px 10px rgba(0,0,0,0.2);
                 cursor:pointer;
                 transition:transform 0.2s, box-shadow 0.2s;">
          <i class="fa fa-cog icon" style="margin-left:6px;"></i> خيارات
        </button>
      </div>
      
      
          <div class="res-footer">
            <div><i class="fa fa-user-circle icon"></i><strong>المسجل:</strong> ' || NVL(v.USERNAME,'-') || '</div>
            <div><i class="fa fa-sticky-note icon"></i><strong>ملاحظات:</strong> ' || NVL(r.NOTES,'-') || '</div>
          </div>
        </div>' AS "تفاصيل الحجز",
        r.RESERVATION_ID AS ID,
        h.hotel_name AS NAME,
      CASE 
        WHEN (NVL(r.TOTAL_RESERVATION_PRICE,0) - NVL(SUM(c.AMOUNT),0)) <> 0 
          THEN NVL(h.HOTEL_NAME || ' - ' || rt.ROOM_NAME,'-')
        ELSE NULL
      END AS remaining,
      CASE
        WHEN r.RES_NUM IS NULL 
          THEN NVL(h.HOTEL_NAME || ' - ' || rt.ROOM_NAME, '-')
        ELSE NULL
      END AS no_res_num,
      
        rt.ROOM_NAME AS ROOM_NAME,
        r.ADULT+ r.CHILDERN AS GUEST,
        CASE r.STATUS
                WHEN 'PENDING'     THEN 'قيد المعالجة'
                WHEN 'CONFIRMED'   THEN 'تحت التنفيذ'
                WHEN 'CHECKED_IN'  THEN 'تم التسكين'
                WHEN 'CHECKED_OUT' THEN 'تم الخروج'
                WHEN 'CANCELED'    THEN 'تم الإلغاء'
                ELSE 'غير محددة'
              END  AS status,
              r.CHECK_IN_DATE AS START_DATE,
              r.CHECK_OUT_DATE AS END_DATE,
      rt.DESCRIPTION as DESCRIPTION,
       r.REQUESTER_ID as client_id
      FROM 
        HOTELS_RESERVATIONS r
        JOIN UNIT_ROOM_LOOKUP l ON r.LOOKUP_ID = l.LOOKUP_ID
        JOIN HOTELS h ON r.HOTEL_ID = h.HOTEL_ID
        LEFT JOIN UNIT_ROOM_TYPES rt ON l.ROOM_TYPE_ID = rt.ROOM_TYPE_ID
        LEFT JOIN UNIT_ROOM_PRICE p ON l.PRICE_ID = p.PRICE_ID
        LEFT JOIN UNIT_COMPANY_COMMISSION cc ON p.COMMISSION_ID = cc.COMMISSION_ID
        LEFT JOIN OUR_FEES f ON p.FEE_ID = f.FEE_ID
        LEFT JOIN HOTEL_RESERVATION_SERVICES s ON s.RESERVATION_ID = r.RESERVATION_ID AND UPPER(s.SERVICE_NAME) LIKE 'BREAKFAST%' AND ROWNUM = 1
        LEFT JOIN COLLECTIONS c ON c.RELATEDRESID = r.RESERVATION_ID
        LEFT JOIN price_summary ps ON ps.RESERVATION_ID = r.RESERVATION_ID
        left  join RESERVATION_CALCULATION_LOG l
        on l.RESERVATION_ID = r.RESERVATION_ID
          AND TRUNC(l.CALC_DATE) = TRUNC(r.CHECK_IN_DATE)
          AND ROWNUM = 1
      
        JOIN BS_EMPLOYEES v ON v.ID = r.REGISTERED_BY
        LEFT JOIN CURRENCIES cb ON cb.CURRENCY_CODE = p.CURRENCY
      -- WHERE
      --   (
      --     :P170_ENTERDATE IS NULL 
      --     OR :P170_EXITDATE IS NULL 
      --     OR (
      --          r.CHECK_IN_DATE >= TO_DATE(:P170_ENTERDATE, 'YYYY-MM-DD')
      --      AND r.CHECK_OUT_DATE <= TO_DATE(:P170_EXITDATE, 'YYYY-MM-DD')
      --        )
        
      
      --   )
      
        GROUP BY 
        r.RESERVATION_ID, r.CHECK_IN_DATE, r.CHECK_OUT_DATE, r.NIGHTS,rt.room_name,
        r.ADULT, r.CHILDERN, r.REQUESTER_ID, r.STATUS,COMMISSION_TYPE,cc.COMMISSION_VALUE,F.FEE_TYPE,F.FEE_VALUE
      ,S.TOTAL_AMOUNT,rt.description,r.res_num,
        p.PRICE_PER_NIGHT, p.CURRENCY, S.SERVICE_NAME,
        cb.CURRENCY_NAME_AR, v.USERNAME, r.TOTAL_RESERVATION_PRICE,
        rt.BREAKFAST_INCLUDED, h.HOTEL_ID, r.NOTES,h.hotel_name,
        ps.special_days, ps.base_days, ps.addon_days,l.EFFECTIVE_PRICE,
        ps.total_special, ps.total_base, ps.total_addon,l.BREAKFAST_INCLUDED,l.COMMISSION_VALUE,l.BREAKFAST_PRICE,l.FEE_VALUE,l.base_price
      
      
      ORDER BY 
        CASE 
          WHEN r.STATUS = 'PENDING' THEN 1
          WHEN r.STATUS = 'CONFIRMED' AND TRUNC(r.CHECK_in_DATE) <= TRUNC(SYSDATE - 1) THEN 2
          WHEN r.STATUS = 'CHECKED_IN' 
                   AND TRUNC(r.CHECK_OUT_DATE) <= TRUNC(SYSDATE + 1) THEN 3 -- near or today
      WHEN r.STATUS = 'CHECKED_OUT' THEN 4 
        
          WHEN r.STATUS = 'CANCELED' THEN 5
          ELSE 6
        END,
        CASE 
          WHEN r.STATUS IN ('PENDING', 'CONFIRMED') THEN r.CHECK_IN_DATE
          ELSE r.CHECK_OUT_DATE
        END DESC;
      
      
    page-items-to-submit: 
    - P170_EXITDATE
    - P170_ENTERDATE
    - P170_NUMBEROFDAYS

  order-by: 
    type: None

  layout: 
    sequence: 70
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    static-id: report-table
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

