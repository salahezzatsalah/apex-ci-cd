javascript: 
  function-and-global-variable-declaration: |
    var dataRowCalled = null;
    function defineGlobalVariable(buttonElement) {
        dataRowCalled = buttonElement;
    }
    window.copyReservationInfo = function (hotel, room, description, total, nights, addonDays) {
      const days = parseInt(addonDays, 10) || 0;
      let weekendText;
    
      if (days === 0) {
        weekendText = "❌ لا تشمل ويكند";
      } else if (days === 1) {
        weekendText = "✅ تشمل يوم ويكند واحد";
      } else {
        weekendText = `✅ تشمل ${days} أيام ويكند`;
      }
    
      const info = `📋 *تفاصيل الحجز:*
    
    🏨 *الفندق:* ${hotel}
    🚪 *نوع الغرفة:* ${room}
    📝 *الوصف:* ${description}
    🌙 *عدد الليالي:* ${nights}
    ${weekendText}
    💰 *الإجمالي الكلي:* ${total}
    
    💼 السعر شامل الخدمة والضريبة`;
    if (window.apex && apex.message) {
          apex.message.showPageSuccess("✅ تم نسخ تفاصيل الحجز!");
        } else {
          alert("✅ تم نسخ تفاصيل الحجز!");
        }
      navigator.clipboard.writeText(info).catch(() => {
        alert("حدث خطأ أثناء النسخ");
      });
    };
    
    window.copyReservationHeaderInfo = function (resNum, clientName, hotel, room, description, checkIn, checkOut, nights, user) {
      const info = `📋 *معلومات الحجز :*
    
    🔢 *رقم الحجز:* ${resNum}
    👤 *اسم العميل:* ${clientName}
    🏨 *الفندق:* ${hotel}
    🚪 *نوع الغرفة:* ${room}
    📝 *الوصف:* ${description}
    📅 *تاريخ الدخول:* ${checkIn}
    📅 *تاريخ الخروج:* ${checkOut}
    🌙 *عدد الليالي:* ${nights}
    
    🧾 *تم الحجز بواسطة:* ${user}
    `;
    
      navigator.clipboard.writeText(info).then(() => {
        if (window.apex && apex.message) {
          apex.message.showPageSuccess("✅ تم نسخ معلومات الحجز!");
        } else {
          alert("✅ تم نسخ معلومات الحجز!");
        }
      }).catch(() => {
        alert("حدث خطأ أثناء النسخ");
      });
    };
    
    function CallCancelProduct(rowID) {
        const processName = "CANCELPRODUCT";
        const employeeID = apex.item("P170_EMPLOYEE_ID").getValue();
        console.log("Cancel Product Request - Row ID:", rowID, "Employee ID:", employeeID);
    
        const dataSent = { x01: rowID, x02: employeeID };
    
        const displaySuccessMsg = (response) => {
            if (response.status === 1) {
                apex.message.showPageSuccess(response.msg);
                setTimeout(() => location.reload(), 1000);
            } else {
                apex.message.clearErrors();
                apex.message.showErrors([{ type: "error", location: ["page"], message: response.msg }]);
            }
        };
    
        const callback = {
            success: displaySuccessMsg,
            error: (jqXHR, textStatus, errorThrown) => {
                console.error("Error during server process:", textStatus, errorThrown);
                apex.message.alert("Something went wrong.");
            },
        };
    
        apex.server.process(processName, dataSent, callback);
    }
    
