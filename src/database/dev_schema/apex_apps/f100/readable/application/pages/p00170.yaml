- # ====== Region: Services Interactive Report =================
  id: 198081224867747340
  identification: 
    name: Services Interactive Report
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          r.RESERVATION_ID         AS "كود الحجز",
      
          '<span class="hotel-name">' || h.HOTEL_NAME || '</span>' AS "اسم الفندق",
          '<span class="room-name">'  || rt.ROOM_NAME || '</span>' AS "نوع الغرفة",
      
          TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_IN_DATE), 'DD-MM-YYYY')  AS "تاريخ الدخول",
          TO_CHAR(CONVERT_TO_LOCAL_TIMEZONE(r.CHECK_OUT_DATE), 'DD-MM-YYYY') AS "تاريخ الخروج",
          r.NIGHTS                 AS "عدد الليالي",
      
          '<span class="client-name">' || 
              (SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = r.REQUESTER_ID) || 
          '</span>' AS "اسم العميل",
      
          '<span class="price">' || TO_CHAR(p.FINAL_PRICE, '999,999.99') || '</span>' AS "سعر الليلة",
          '<span class="currency">' || p.CURRENCY || '</span>' AS "العملة",
      
          '<span class="total-price">' || TO_CHAR(r.TOTAL_RESERVATION_PRICE, '999,999.99') || '</span>' AS "الإجمالي",
          '<span class="total-price-egp">' || TO_CHAR(r.TOTAL_RESERVATION_PRICE_EGP, '999,999.99') || '</span>' AS "الإجمالي بالجنيه",
      
          '<span class="paid-amount">' || TO_CHAR(NVL(SUM(c.AMOUNT * c.CURRENCYRATES), 0), '999,999.99') || '</span>' AS "المدفوع بالجنيه",
      
          '<span class="remaining-amount">' || 
          TO_CHAR(NVL(r.TOTAL_RESERVATION_PRICE_EGP, 0) - NVL(SUM(c.AMOUNT * c.CURRENCYRATES), 0), '999,999.99') || 
          '</span>' AS "المتبقي بالجنيه",
      
          CASE r.STATUS
              WHEN 'PENDING'     THEN '<span class="status pending">قيد المعالجة</span>'
              WHEN 'CONFIRMED'   THEN '<span class="status confirmed">تحت التنفيذ</span>'
              WHEN 'CHECKED_IN'  THEN '<span class="status checkedin">تم التسكين</span>'
              WHEN 'CHECKED_OUT' THEN '<span class="status checkedout">تم الخروج</span>'
              WHEN 'CANCELED'    THEN '<span class="status canceled">تم الإلغاء</span>'
              ELSE '<span class="status unknown">غير محددة</span>'
          END AS "الحالة",
      CASE r.STATUS WHEN 'PENDING' THEN 'قيد المعالجة' WHEN 'CONFIRMED' THEN 'تحت التنفيذ' WHEN 'CHECKED_IN' THEN 'تم التسكين' WHEN 'CHECKED_OUT' THEN 'تم الخروج' WHEN 'CANCELED' THEN 'تم الإلغاء' ELSE 'غير محددة' END AS "STATUS",
          r.REGISTERED_BY AS "تم التسجيل بواسطة",
          r.NOTES         AS "ملاحظات",
          h.HOTEL_ID
      
      FROM 
          HOTELS_RESERVATIONS r
          JOIN UNIT_ROOM_LOOKUP l ON r.LOOKUP_ID = l.LOOKUP_ID
          JOIN HOTELS h ON r.HOTEL_ID = h.HOTEL_ID
          LEFT JOIN UNIT_ROOM_TYPES rt ON l.ROOM_TYPE_ID = rt.ROOM_TYPE_ID
          LEFT JOIN UNIT_ROOM_PRICE p ON l.PRICE_ID = p.PRICE_ID
          LEFT JOIN COLLECTIONS c ON c.RELATEDRESID = r.RESERVATION_ID
      
      WHERE 
          r.STATUS IN ('CHECKED_IN', 'PENDING')
      
      GROUP BY 
          r.RESERVATION_ID,
          h.HOTEL_NAME,
          rt.ROOM_NAME,
