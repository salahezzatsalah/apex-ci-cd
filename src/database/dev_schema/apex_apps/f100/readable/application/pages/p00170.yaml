  execute-when-page-loads: |
    (function ($) {
      function initReservationMenu() {
        // 🟡 Block clicks on .res-footer
        $(document)
          .off("click.resFooterBlock")
          .on("click.resFooterBlock", ".res-footer", function (e) {
            e.stopPropagation();
            e.preventDefault();
            return false;
          });
    
        // 🟡 Block clicks on .totals
        $(document)
          .off("click.totals")
          .on("click.totals", ".totals", function (e) {
            e.stopPropagation();
            e.preventDefault();
            return false;
          });
    
        $(document)
          .off("click.resTitleBlock")
          .on("click.resTitleBlock", ".res-header h3", function (e) {
            e.stopPropagation();
            e.preventDefault();
            return false;
          });
    
        // ⚙️ Menu button logic
        $(document)
          .off("click.resMenu")
          .on("click.resMenu", ".js-menuButton", function (e) {
            e.stopPropagation();
            e.preventDefault();
    
            const $btn = $(this);
            const status = $btn.data("status");
            const $menu = $("#AprtResOptionsList_menu");
    
            $menu.find("li").hide();
            $("#AprtResOptionsList_menu_5, #AprtResOptionsList_menu_6, #AprtResOptionsList_menu_7").show();
    
            if (status === "PENDING") {
              $("#AprtResOptionsList_menu_0, #AprtResOptionsList_menu_3").show();
            } 
            if (status === "CONFIRMED") {
              $("#AprtResOptionsList_menu_1, #AprtResOptionsList_menu_3").show();
            } else if (status === "CHECKED_IN") {
              $("#AprtResOptionsList_menu_2").show();
            } else if (status === "CANCELED") {
              $("#AprtResOptionsList_menu_4").show();
            }
    
            // 🔹 Smart positioning logic
            setTimeout(() => {
              const btnOffset = $btn.offset();
              const btnHeight = $btn.outerHeight();
              const menuWidth = $menu.outerWidth();
              const menuHeight = $menu.outerHeight();
              const scrollTop = $(window).scrollTop();
              const scrollLeft = $(window).scrollLeft();
              const windowWidth = $(window).width();
              const windowHeight = $(window).height();
    
              let top = btnOffset.top + btnHeight + 6;
              let left = btnOffset.left;
    
              if (top + menuHeight > scrollTop + windowHeight) {
                top = btnOffset.top - menuHeight - 6;
              }
              if (left + menuWidth > scrollLeft + windowWidth) {
                left = Math.max(scrollLeft + windowWidth - menuWidth - 10, scrollLeft + 10);
              }
              if (left < 10) left = 10;
    
              $menu.css({
                position: "absolute",
                top,
                left,
                zIndex: 9999,
                display: "block"
              }).show();
    
              $(document).off("click.hideMenu keydown.hideMenu");
    
              $(document).on("click.hideMenu", function (event) {
                if (
                  !$menu.is(event.target) &&
                  $menu.has(event.target).length === 0 &&
                  !$btn.is(event.target)
                ) {
                  $menu.hide();
                  $(document).off("click.hideMenu keydown.hideMenu");
                }
              });
    
              $(document).on("keydown.hideMenu", function (event) {
                if (event.key === "Escape") {
                  $menu.hide();
                  $(document).off("click.hideMenu keydown.hideMenu");
                }
              });
            }, 0);
          });
      }
    
      $(initReservationMenu);
      $(document).on("apexafterrefresh", initReservationMenu);
    })(apex.jQuery);
    

css: 
  inline: |
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    /* 🔒 Make the surrounding area not clickable */
    .res-btn-area {
      pointer-events: none; /* Disable clicks in the area */
    }
    
    /* ✅ Re-enable clicks only on the actual button */
    .res-btn-area .js-menuButton {
      pointer-events: auto;
    }
    
    
    /* ========== Reservation Card Styles ========== */
    .reservation-card {  
          font-family: 'Cairo', sans-serif;
    
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      direction: rtl;
      transition: box-shadow 0.25s ease;
    }
    .reservation-card:hover {
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
    }
    
    /* Header */
    .res-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .res-header h3 {
      margin: 0;
      font-size: 1.1rem;
      color: #111827;
    }
    .res-sub {
      font-size: 0.9rem;
      color: #4b5563;
      margin-top: 3px;
    }
    
    /* Status tags */
    .status-tag {
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status-pending     { background: #fef3c7; color: #92400e; }
    .status-confirmed   { background: #dbeafe; color: #1e3a8a; }
    .status-checkedin   { background: #dcfce7; color: #166534; }
    .status-checkedout  { background: #e5e7eb; color: #1f2937; }
    .status-canceled    { background: #fee2e2; color: #991b1b; }
    .status-unknown     { background: #f3f4f6; color: #111827; }
    
    /* Info section */
    .res-info {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #374151;
    }
    .res-info div {
      display: flex;
      align-items: center;
    }
    
    /* Icons */
    .icon {
      margin-left: 6px;
      color: #6b7280;
    }
    
    /* Price Boxes */
    .price-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .price-box {
      background: #f9fafb;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
    }
    .price-box span {
      display: block;
      color: inherit;
    }
    
    /* Totals */
    .totals {
      margin-top: 14px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .totals div {
      display: flex;
      align-items: center;
    }
    
    /* Action button */
    .res-btn {
      margin-top: 10px;
      text-align: left;
    }
    .res-btn button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .res-btn button:hover {
      background: #1d4ed8;
    }
    
    /* Footer */
    .res-footer {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #4b5563;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
    

