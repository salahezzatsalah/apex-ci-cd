    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          ID,
          CAR_NAME,
          CAR_TYPE_ID,
          MODEL_NAME,
          YEAR,
          LICENSE_PLATE,
          COLOR,
          CHASSIS_NUMBER,
          CREATED_BY,
          CREATED,
          STATUS,
          NOTES,
          PROFILE_PHOTO_LASTUPD,
          PHOTO_URL,
          CASE
              WHEN PHOTO_URL IS NOT NULL THEN 'نعم'
              ELSE 'لا'
          END AS HAS_PROFILE_PICTURE,
          CASE
              WHEN PHOTO_URL IS NOT NULL THEN
                  PHOTO_URL
              ELSE
                  '#APP_FILES#placeholders/ownedcar.png'
          END AS IMAGE_URL
      FROM
          COMPANY_REGISTERED_CARS;
      

  order-by: 
