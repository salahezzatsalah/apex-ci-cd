  - # ====== Facet: P367_YEAR ====================================
    id: 178405216669226831
    identification: 
      name: P367_YEAR
      type: Checkbox Group

    label: 
      label: السنة
      show-label-for-current-facet: true

    layout: 
      sequence: 110

    appearance: 
      display: Inline

    list-of-values: 
      type: SQL Query
      sql-query: |
        SELECT 1990 + LEVEL - 1 AS DISPLAY_VALUE,
               1990 + LEVEL - 1 AS RETURN_VALUE
        FROM dual
        CONNECT BY 1990 + LEVEL - 1 <= EXTRACT(YEAR FROM SYSDATE)
        ORDER BY RETURN_VALUE DESC;
        
      include-null-option: false

    list-entries: 
      compute-counts: true
      show-counts: true
      zero-count-entries: Hide
      sort-by-top-counts: true
