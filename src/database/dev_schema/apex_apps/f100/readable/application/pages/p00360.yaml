- # ====== Region: activity content ============================
  id: 24843761529585297377
  identification: 
    name: activity content
    title: Activity
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select ap.id, 
             at.activity_type,
             ap.comments,
             ap.start_date,
             ap.end_date,
             to_char(ap.end_date,'Day DD-MON-YYYY') end_date_formatted,
             to_char(ap.start_date,'Day DD-MON-YYYY')||' to '||to_char(ap.end_date,'Day DD-MON-YYYY') TIMELINE,
             ap.end_date - ap.start_date days,
             round(ap.end_date - sysdate) days_remaining,
             ap.url,
             tm.first_name||' '||tm.last_name name,
             --
             p.project,
             p.friendly_identifier,
             p.PROJECT_URL_NAME,
             apex_util.get_since(ap.updated) last_updated,
             --
             tm.first_name||' '||tm.last_name owner,
             --
             -- optional initiative
             --
             decode(ap.initiative_id,null,null,(
                 select initiative from sp_initiatives where id = ap.initiative_id
             )) initiative,
             ap.initiative_id,
             --
             -- timeframe
             --
              decode(
                 greatest(trunc(sysdate),trunc(ap.end_date)),
                 trunc(sysdate),
                 'Past',
                 decode(
                     greatest(trunc(sysdate),trunc(ap.start_date)),
                     trunc(sysdate),
                     'Current',
                     'Future')
                 ) timeframe,
             --
             -- pie chart icon in 10% chunks that show time percent complete
             --
             'fa-pie-chart-'||sp_date_range_pct_comp(ap.start_date, ap.end_date) icon
      from sp_activities ap,
           sp_projects p,
           sp_activity_types at,
           sp_team_members tm
      where ap.project_id = p.id and
            p.id = :P360_PROJECT_ID and
            ap.activity_type_id = at.id and
            ap.team_member_id = tm.id and
            --
            --
            --
            (  
               trunc(sysdate) between ap.start_date and ap.end_date or 
               (nvl(:P360_INCLUDE_FUTURE,'N') = 'Y' and ap.start_date >= trunc(sysdate)) or
               (nvl(:P360_INCLUDE_PAST,'N') = 'Y' and ap.end_date < trunc(sysdate))
            )
      order by ap.updated desc
      
    page-items-to-submit: 
    - P360_RESERVATION_ID
    - P360_INCLUDE_FUTURE
    - P360_INCLUDE_PAST

  order-by: 
    type: None

  layout: 
    sequence: 121
    parent-region: Activity # 24893417133281748515
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--hideHeader js-addHiddenHeadingRoleDesc
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  configuration: 
    build-option: Activity Planning # 24793266618951063217

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&COMMENTS.'
      description: |
        <strong>Owner</strong>: &OWNER.<br>
        <strong>&ACTIVITY_TYPE.</strong>: &TIMELINE.<br>
        {if PROJECT/}<strong>&NOMENCLATURE_PROJECT.</strong>: &PROJECT.<br>{endif/}
        {if INITIATIVE/}<strong>&NOMENCLATURE_INITIATIVE.</strong>: &INITIATIVE.<br>{endif/}
      miscellaneous: Updated &LAST_UPDATED.
      display-avatar: true
      display-badge: true

    avatar: 
      type: Icon
      icon: '&ICON.'
      shape: No Shape
      size: Medium

    badge: 
