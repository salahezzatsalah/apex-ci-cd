- # ====== Region: Documents ===================================
  id: 125049927138383922793
  identification: 
    name: Documents
    title: مستندات [&P3_DOCUMENTSCOUNT.]
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          'حجز' type,
          '12' edit_page,
          '30' display_page,
          d.ID,
          d.DOCUMENT_FILENAME,
          d.UPDATED,
          d.CREATED,
          CASE 
              WHEN LENGTH(d.DOC_DESCRIPTION) > 200 
              THEN SUBSTR(d.DOC_DESCRIPTION, 1, 200) || '...' 
              ELSE d.DOC_DESCRIPTION 
          END doc_description,
          d.TAGS,
          LOWER(d.CREATED_BY) created_by,
          DBMS_LOB.GETLENGTH(d.DOCUMENT_BLOB) doc_size,
          d.CREATED date_created,
          SUBSTR(d.DOCUMENT_FILENAME, INSTR(d.DOCUMENT_FILENAME, '.', -1) + 1) file_extension,
          DECODE(d.IMPORTANT_YN, 'Y', 'نعم', 'لا') important
      FROM RESERVATION_DOCUMENTS d
      WHERE d.RESERVATION_ID = :P360_RESERVATION_ID
      
      UNION ALL
      
      SELECT 
          CASE 
              WHEN t.TASK_SUB_TYPE_ID IS NOT NULL THEN 
                  (SELECT TASK_TYPE FROM RES_TASK_TYPES WHERE ID = t.TASK_TYPE_ID) || ': '
              ELSE ''
          END ||
          tt.TASK_TYPE || 
          CASE 
              WHEN t.TASK IS NOT NULL THEN ' - ' || t.TASK 
              ELSE '' 
          END type,
          '504' edit_page,
          '505' display_page,
          d.ID,
          d.DOCUMENT_FILENAME,
          d.UPDATED,
          d.CREATED,
          CASE 
              WHEN LENGTH(d.DOC_DESCRIPTION) > 200 
              THEN SUBSTR(d.DOC_DESCRIPTION, 1, 200) || '...' 
              ELSE d.DOC_DESCRIPTION 
          END doc_description,
          d.TAGS,
          LOWER(d.CREATED_BY) created_by,
          DBMS_LOB.GETLENGTH(d.DOCUMENT_BLOB) doc_size,
          d.CREATED date_created,
          SUBSTR(d.DOCUMENT_FILENAME, INSTR(d.DOCUMENT_FILENAME, '.', -1) + 1) file_extension,
          DECODE(d.IMPORTANT_YN, 'Y', 'نعم', 'لا') important
      FROM 
          RES_TASK_DOCUMENTS d
          JOIN RESERVATION_TASKS t ON t.ID = d.TASK_ID
          JOIN RES_TASK_TYPES tt ON NVL(t.TASK_SUB_TYPE_ID, t.TASK_TYPE_ID) = tt.ID
      WHERE 
          t.RESERVATION_ID = :P360_RESERVATION_ID
      
      ORDER BY date_created DESC;
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

