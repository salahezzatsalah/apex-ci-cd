- # ====== Region: Limo Services Interactive Report ============
  id: 307477426674724956
  identification: 
    name: Limo Services Interactive Report
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          -- Product-level fields
          p.PRODUCT_ID,
          p.RESERVATION_ID,
          ct.CAR_TYPE_NAME,
          ct.CATEGORY AS car_category,
          ct.SEATS AS car_seats,
          p.TRIP_TYPE,
          p.TRIP_DATE_FROM,
          p.TRIP_DATE_TO,
          p.TRIP_TIME,
          p.FROM_LOCATION,
          p.TO_LOCATION,
          p.NOD AS num_of_days,
          p.PRICE,
          p.CURRENCY AS product_currency,
          p.EXCHANGE_RATE AS product_exchange_rate,
          p.AMOUNT_EGP,
          p.TOTAL_PRICE,
          p.STATUS AS product_status,
          p.NOTES AS product_notes,
      
          -- Reservation-level details
          lr.CLIENT_ID,
          (SELECT FULL_NAME FROM CRM_CLIENTS c WHERE c.CLIENT_ID = lr.CLIENT_ID) AS client_name,
          lr.CLASSIFICATION_TYPE,
      NVL(lr.TICKET_NUMBER, 'لا يوجد') AS ticket_number,
      NVL(lr.SIGNAGE_DETAILS, 'لا يوجد') AS signage_details,
          lr.FROM_DATE AS reservation_from_date,
          lr.TO_DATE AS reservation_to_date,
          lr.CURRENCY AS reservation_currency,
          lr.EXCHANGE_RATE AS reservation_exchange_rate,
          lr.STATUS AS reservation_status,
          lr.NOTES AS reservation_notes,
          lr.TAGS AS reservation_tags,
          lr.RESERVATION_URL_NAME,
      
          -- Progress logic (icon and description)
          CASE lr.STATUS
              WHEN 'PENDINGOPS' THEN 'fa-pie-chart-30'
              WHEN 'PENDINGPAY' THEN 'fa-pie-chart-60'
              WHEN 'CONFIRMED'  THEN 'fa-pie-chart-100'
              ELSE 'fa-pie-chart-0'
          END AS icon,
      
          CASE lr.STATUS
              WHEN 'PENDINGOPS' THEN 'Operational Processing (30%)'
              WHEN 'PENDINGPAY' THEN 'Awaiting Payment (60%)'
              WHEN 'CONFIRMED'  THEN 'Confirmed (100%)'
              ELSE 'Not Started (0%)'
          END AS status_description,
      
          -- Assigned reps
          lr.SALES_REP_ID,
          (SELECT FIRST_NAME || ' ' || LAST_NAME FROM BS_EMPLOYEES e WHERE e.ID = lr.SALES_REP_ID) AS sales_rep_name,
          lr.OPS_REP_ID,
          (SELECT FIRST_NAME || ' ' || LAST_NAME FROM BS_EMPLOYEES e WHERE e.ID = lr.OPS_REP_ID) AS ops_rep_name,
      
          -- Audit info
          p.CREATED AS product_created,
          p.CREATED_BY AS product_created_by,
          p.UPDATED AS product_updated,
          p.UPDATED_BY AS product_updated_by,
          p.CREATED AS reservation_created,
          p.CREATED_BY AS reservation_created_by,
          p.UPDATED AS reservation_updated,
          p.UPDATED_BY AS reservation_updated_by,
          lr.ARCHIVED_YN,
          lr.ARCHIVED_BY,
          lr.ARCHIVED_DATE,
      
          -- Status labels/icons for trips (customize further if you have trip statuses)
          CASE p.STATUS
              WHEN 'ACTIVE'    THEN 'نشطة'
              WHEN 'CANCELLED' THEN 'ملغاة'
              WHEN 'COMPLETED' THEN 'مكتملة'
              ELSE 'غير محددة'
          END AS product_status_label,
      
          CASE p.STATUS
              WHEN 'ACTIVE'    THEN 'fa-car text-success'
              WHEN 'CANCELLED' THEN 'fa-times-circle text-danger'
              WHEN 'COMPLETED' THEN 'fa-check-circle text-primary'
              ELSE 'fa-ban text-secondary'
          END AS product_status_icon,
      
          -- For reporting/grouping
          TO_CHAR(lr.UPDATED, 'YYYY.MM') AS updated_month
      
      FROM 
          LIMO_PRODUCTS p
          JOIN LIMO_RESERVATIONS lr ON p.RESERVATION_ID = lr.RESERVATION_ID
          LEFT JOIN LIMO_CAR_TYPES ct ON p.CAR_TYPE_ID = ct.CAR_TYPE_ID
      
      WHERE p.RESERVATION_ID = :P360_RESERVATION_ID
      
      
      ORDER BY p.TRIP_DATE_FROM DESC;
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

