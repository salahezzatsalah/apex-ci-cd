javascript: 
  execute-when-page-loads: |
    (function() {
      const rdsSelector = '.project-rds-region ul.apex-rds';
      const storageKey = 'rds-scroll-left';
    
      function saveScrollPosition(el) {
        if (el) {
          sessionStorage.setItem(storageKey, el.scrollLeft);
        }
      }
    
      function restoreScrollPosition(el) {
        const saved = sessionStorage.getItem(storageKey);
        if (el && saved !== null) {
          el.scrollLeft = parseInt(saved, 10);
        }
      }
    
      function init() {
        const rds = document.querySelector(rdsSelector);
        if (!rds) return;
    
        // Restore scroll position initially
        restoreScrollPosition(rds);
    
        // Save scroll position before click
        rds.addEventListener('click', function(e) {
          if (e.target.closest('a.a-RDS-link')) {
            saveScrollPosition(rds);
          }
        }, true);
    
        // Restore scroll again after APEX refresh (if any)
        apex.jQuery(document).on('apexafterrefresh', rdsSelector, function() {
          const refreshed = document.querySelector(rdsSelector);
          setTimeout(() => restoreScrollPosition(refreshed), 50);
        });
      }
    
      document.addEventListener('DOMContentLoaded', init);
    })();
    

