- # ====== Region: contributors content ========================
  id: 11739967855752145116
  identification: 
    name: contributors content
    title: Contributors
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select c.ID,
             t.first_name||' '||t.last_name name,
             c.TEAM_MEMBER_ID,
             (select RESOURCE_TYPE from RES_RESOURCE_TYPES r where r.id = c.RESPONSIBILITY_ID) responsibility,
             c.tags,
             c.CREATED,
             c.updated,
             c.responsibility comments,
             --
             nvl((select count(*) from RESERVATION_COMMENTS pc where pc.RESERVATION_ID = c.RESERVATION_ID and pc.AUTHOR_ID = c.team_member_id),0) +
             nvl((select count(*) from RESERVATION_DOCUMENTS pd where pd.RESERVATION_ID = c.RESERVATION_ID and pd.created_by = upper(t.ID)),0) +
             nvl((select count(*) from RES_RESERVATION_LINKS l where l.RESERVATION_ID = c.RESERVATION_ID and l.created_by = upper(t.ID)),0) 
             contributions
        from RESERVATION_CONTRIBUTORS c,
             BS_EMPLOYEES t
      where c.RESERVATION_ID = :P360_RESERVATION_ID and
            t.id = c.TEAM_MEMBER_ID
    page-items-to-submit: 
    - P360_RESERVATION_ID

