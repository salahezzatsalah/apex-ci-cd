- # ====== Button: view_images =================================
  id: 268461004352771379
  identification: 
    button-name: view_images
    label: معرض الصور

  layout: 
    sequence: 10
    region: Documents # 125049927138383922793
    slot: RIGHT_OF_IR_SEARCH_BAR
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text
    hot: false
    template-options: 
    - '#DEFAULT#'
    - t-Button--noUI

  behavior: 
    action: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:29:&SESSION.::&DEBUG.:29:P29_RESERVATION_ID:&P360_RESERVATION_ID.'
      page: 29
      clear-cache: 29
      values: 
        p29_reservation_id: '&P360_RESERVATION_ID.'

    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Rows returned
    sql-query: |
      select 1 
        from RESERVATION_DOCUMENTS d
       where reservation_id = :P360_RESERVATION_ID and 
             (
                 lower(DOCUMENT_FILENAME) like '%.png' or 
                 lower(DOCUMENT_FILENAME) like '%.jpg' or 
                 lower(DOCUMENT_FILENAME) like '%.jpeg' or 
                 lower(DOCUMENT_FILENAME) like '%.gif' or 
                 lower(DOCUMENT_FILENAME) like '%.tiff' or 
                 lower(DOCUMENT_FILENAME) like '%.ai' 
             )
      union all
      select 1 
        from res_task_DOCUMENTS d,
             reservation_tasks t
