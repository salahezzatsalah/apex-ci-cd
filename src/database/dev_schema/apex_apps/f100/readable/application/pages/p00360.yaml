- # ====== Region: Reservation Details =========================
  id: 297575273982565563
  identification: 
    name: Reservation Details
    title: تفاصيل الحجز
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          -- Service Type
          'حجز ليموزين' AS service_label,
      
          -- IDs and Basic Info
          r.RESERVATION_ID,
      
          -- If you want only one product/car per reservation (first), use MIN/MAX or a subquery
          -- Otherwise, aggregate for summary
          LISTAGG(ct.CAR_TYPE_NAME, ', ') WITHIN GROUP (ORDER BY p.PRODUCT_ID) AS car_type_names,
          LISTAGG(p.TRIP_TYPE, ', ') WITHIN GROUP (ORDER BY p.PRODUCT_ID) AS trip_types,
          LISTAGG(p.FROM_LOCATION, ', ') WITHIN GROUP (ORDER BY p.PRODUCT_ID) AS from_locations,
          LISTAGG(p.TO_LOCATION, ', ') WITHIN GROUP (ORDER BY p.PRODUCT_ID) AS to_locations,
      
          -- Owner (Client)
          r.CLIENT_ID,
          c.FULL_NAME AS client_name,
      
          -- Dates
          r.FROM_DATE,
          r.TO_DATE,
          NVL(SUM(p.NOD), 
              CASE 
                  WHEN r.FROM_DATE IS NOT NULL AND r.TO_DATE IS NOT NULL 
                  THEN TRUNC(r.TO_DATE) - TRUNC(r.FROM_DATE) + 1
                  ELSE 1 
              END
          ) AS day_count,
      
          -- Financial Summary (aggregate over products)
          SUM(p.TOTAL_PRICE) AS TOTAL_INVOICE_AMOUNT,
          NULL AS TOTAL_PAYMENT,        -- Replace with actual logic if you have payments
          NULL AS REMAINING_AMOUNT,     -- Replace with actual logic if you have payments
          NULL AS MIN_PAYMENT_REQUIRED, -- Replace with actual logic if you need it
          r.CURRENCY,
          r.EXCHANGE_RATE,
          SUM(p.AMOUNT_EGP) AS TOTAL_AMOUNT_EGP,
      
          -- Reservation Status
          r.STATUS,
          CASE r.STATUS
              WHEN 'PENDINGOPS' THEN 'في انتظار العرض المالي (30%)'
              WHEN 'PENDINGPAY' THEN 'في انتظار الدفع (60%)'
              WHEN 'CONFIRMED' THEN 'مؤكد (100%)'
              WHEN 'CANCELLED' THEN 'ملغي'
              ELSE 'لم يتم التعين'
          END AS status_label,
          CASE r.STATUS
              WHEN 'PENDINGOPS' THEN 'fa-pie-chart-30'
              WHEN 'PENDINGPAY' THEN 'fa-pie-chart-60'
              WHEN 'CONFIRMED' THEN 'fa-pie-chart-100'
              WHEN 'CANCELLED' THEN 'fa-times-circle'
              ELSE 'fa-circle-o'
          END AS status_icon,
      
          -- Sales Rep
          r.SALES_REP_ID,
          s.FIRST_NAME || ' ' || s.LAST_NAME AS sales_rep_name,
      
          -- Operations Rep
          r.OPS_REP_ID,
          o.FIRST_NAME || ' ' || o.LAST_NAME AS ops_rep_name,
      
          -- Audit
          r.CREATED,
          r.CREATED_BY,
          r.UPDATED,
          r.UPDATED_BY,
          r.NOTES,
      
          -- Permalink
          r.RESERVATION_ID || 
          ' <button type="button" title="Copy Permalink" aria-label="Copy Permalink" data-clipboard-source="'||:P360_PERMALINK_PREFIX||r.RESERVATION_ID||'" class="t-Button t-Button--noLabel t-Button--icon t-Button--link padding-none">'||
          '<span class="fa fa-copy" aria-hidden="true"></span></button>' AS perma_link,
      
          -- Favorite Icon
          CASE 
              WHEN EXISTS (
                  SELECT 1 
                    FROM RESERVATION_FAVORITES f 
                   WHERE f.RESERVATION_ID = r.RESERVATION_ID 
                     AND f.USER_ID = :APP_USER_ID
              )
              THEN '<span class="fa fa-heart u-danger-text" aria-hidden="true"></span>'
              ELSE '<span class="fa fa-heart-o" aria-hidden="true"></span>'
          END AS favorite_icon
      
      FROM 
          LIMO_RESERVATIONS r
          LEFT JOIN CRM_CLIENTS c ON r.CLIENT_ID = c.CLIENT_ID
          LEFT JOIN BS_EMPLOYEES s ON r.SALES_REP_ID = s.ID
          LEFT JOIN BS_EMPLOYEES o ON r.OPS_REP_ID = o.ID
          LEFT JOIN LIMO_PRODUCTS p ON r.RESERVATION_ID = p.RESERVATION_ID
          LEFT JOIN LIMO_CAR_TYPES ct ON p.CAR_TYPE_ID = ct.CAR_TYPE_ID
      
      WHERE 
          r.RESERVATION_ID = :P360_RESERVATION_ID
      
      GROUP BY
          r.RESERVATION_ID,
          r.CLIENT_ID,
          c.FULL_NAME,
          r.FROM_DATE,
          r.TO_DATE,
          r.CURRENCY,
          r.EXCHANGE_RATE,
          r.STATUS,
          r.SALES_REP_ID,
          s.FIRST_NAME,
          s.LAST_NAME,
          r.OPS_REP_ID,
          o.FIRST_NAME,
          o.LAST_NAME,
          r.CREATED,
          r.CREATED_BY,
          r.UPDATED,
          r.UPDATED_BY,
          r.NOTES
      
    page-items-to-submit: 
    - APP_USER_ID
    - P360_RESERVATION_ID

