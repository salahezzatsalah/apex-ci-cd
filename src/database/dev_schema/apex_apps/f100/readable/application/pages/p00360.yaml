- # ====== Region: task content ================================
  id: 27447001096857715320
  identification: 
    name: task content
    title: Tasks
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      with today as (select trunc(sysdate) day from dual)
      select r.ID,
             --
             (select case when first_name is not null or last_name is not null
                          then first_name||' '||last_name
                          else email
                          end
                     from bs_employees t where t.id = r.owner_id) owner,
             --
             (select task_type from res_task_types rt where rt.id = r.task_type_id)||
                 case when r.task_sub_type_id is not null then ': ' end ||
                 (select task_type from res_task_types rt where rt.id = r.task_sub_type_id) ||
                 case when r.task is not null then ' - '||r.task end type,
             --
             case when length(r.description) > 200
                  then substr(r.description,1,200)||'...'
                  else r.description
                  end description,
             --
             s.status,
             s.display_seq,
             r.start_date,
             r.target_complete,
             case when s.indicates_complete_yn = 'N' and
                       r.target_complete is not null
                  then least(5, trunc(r.target_complete) - trunc(r.target_complete, 'iw') + 1)
                       - least(5, today.day - trunc(today.day, 'iw') + 1)
                       + (trunc(r.target_complete, 'iw') - trunc(today.day, 'iw')) * 5 / 7
             end weekdays_left,
             --
             r.updated,
             --
             (select count(*) from res_task_comments 
               where task_id = r.id
                and (nvl(private_yn,'N') = 'N'  or lower(created_by) = lower(:app_user) )) nbr_comments,
             --
             (select count(*) from res_task_documents where task_id = r.id) nbr_docs,
             (select count(*) from res_task_links where task_id = r.id) nbr_links,
             t.display_seq ob
        from reservation_tasks r,
             res_task_types t,
             res_task_statuses s,
             today
       where reservation_id = :P360_reservation_ID
         and nvl(r.task_sub_type_id,r.task_type_id) = t.id
         and r.status_id = s.id (+)
         and t.static_id not like 'MILESTONE%'
         and t.static_id not like 'REVIEW%'
    page-items-to-submit: 
    - P360_RESERVATION_ID

