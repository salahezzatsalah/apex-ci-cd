- # ====== Region: Links =======================================
  id: 125049925352208922775
  identification: 
    name: Links
    title: روابط الكترونية [&P3_LINKSCOUNT.]
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          'حجز' AS type,
          '6' AS edit_page,
          l.ID,
          l.LINK_NAME,
          CASE 
              WHEN LENGTH(l.LINK_URL) > 80 THEN 
                  SUBSTR(l.LINK_URL, 1, 39) || '...' || SUBSTR(l.LINK_URL, LENGTH(l.LINK_URL) - 39)
              ELSE 
                  l.LINK_URL 
          END AS link_url,
          l.LINK_URL AS full_url,
          l.CREATED,
          l.UPDATED,
          LOWER(l.CREATED_BY) AS added_by,
          DECODE(l.IMPORTANT_YN, 'Y', 'نعم', 'N', 'لا', NULL, 'لا') AS important,
                 case when lower(link_url) not like 'http%' then 'http://' end || link_url link_url_link
      FROM 
          RES_RESERVATION_LINKS l
      WHERE 
          l.RESERVATION_ID = :P360_RESERVATION_ID
      
      UNION ALL
      
      SELECT 
          CASE 
              WHEN t.TASK_SUB_TYPE_ID IS NOT NULL THEN 
                  (SELECT TASK_TYPE FROM RES_TASK_TYPES WHERE ID = t.TASK_TYPE_ID) || ': '
              ELSE '' 
          END || 
          tt.TASK_TYPE || 
          CASE 
              WHEN t.TASK IS NOT NULL THEN ' - ' || t.TASK 
              ELSE '' 
          END AS type,
          '506' AS edit_page,
          l.ID,
          l.LINK_NAME,
          CASE 
              WHEN LENGTH(l.LINK_URL) > 80 THEN 
                  SUBSTR(l.LINK_URL, 1, 39) || '...' || SUBSTR(l.LINK_URL, LENGTH(l.LINK_URL) - 39)
              ELSE 
                  l.LINK_URL 
          END AS link_url,
          l.LINK_URL AS full_url,
          l.CREATED,
          l.UPDATED,
          LOWER(l.CREATED_BY) AS added_by,
          DECODE(l.IMPORTANT_YN, 'Y', 'نعم', 'N', 'لا', NULL, 'لا') AS important,
                 case when lower(link_url) not like 'http%' then 'http://' end || link_url link_url_link
      FROM 
          RES_TASK_LINKS l
          JOIN RESERVATION_TASKS t ON t.ID = l.TASK_ID
          JOIN RES_TASK_TYPES tt ON NVL(t.TASK_SUB_TYPE_ID, t.TASK_TYPE_ID) = tt.ID
      WHERE 
          t.RESERVATION_ID = :P360_RESERVATION_ID
      ORDER BY 
          CREATED DESC;
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

