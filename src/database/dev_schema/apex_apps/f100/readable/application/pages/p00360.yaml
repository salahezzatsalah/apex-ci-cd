- # ====== Region: Additional Attriubtes =======================
  id: 12105220020798956805
  identification: 
    name: Additional Attriubtes
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          r.RESERVATION_ID AS id,
          r.CREATED,
          
          --
          -- Created By Info
          --
          r.CREATED_BY,
          (SELECT FIRST_NAME || ' ' || LAST_NAME 
           FROM BS_EMPLOYEES e 
           WHERE e.ID = r.CREATED_BY) AS created_by_name,
          r.CREATED_BY AS created_by_id,
      
          --
          -- Updated By Info
          --
          r.UPDATED,
          r.UPDATED_BY,
          (SELECT FIRST_NAME || ' ' || LAST_NAME 
           FROM BS_EMPLOYEES e 
           WHERE e.ID = r.UPDATED_BY) AS updated_by_name,
          r.UPDATED_BY AS updated_by_id,
      
          --
          -- Favorite Count
          --
          (SELECT COUNT(*) 
           FROM RESERVATION_FAVORITES f 
           WHERE f.RESERVATION_ID = r.RESERVATION_ID) AS favorited,
      
          --
          -- Interaction Summary (filtered by type)
          --
          (SELECT COUNT(*) 
           FROM RESERVATION_INTERACTIONS_LOG l 
           WHERE l.RESERVATION_ID = r.RESERVATION_ID 
             AND l.RESERVATION_TYPE = 'HOTEL') 
          || ' من ' ||
          (SELECT COUNT(DISTINCT USER_ID) 
           FROM RESERVATION_INTERACTIONS_LOG l 
           WHERE l.RESERVATION_ID = r.RESERVATION_ID 
             AND l.RESERVATION_TYPE = 'HOTEL') || ' مستخدم ' AS interactions
      
          -- Note: Add reservation change history count here if implemented
      FROM 
          HOTEL_RESERVATIONS r
      WHERE 
          r.RESERVATION_ID = :P360_RESERVATION_ID
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

