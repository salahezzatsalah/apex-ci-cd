- # ====== Dynamic Action: Add Comment =========================
  id: 268505378655771436
  identification: 
    name: Add Comment

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: POST_COMMENT # 268386259433771302

  client-side-condition: 
    type: Item is not null
    item: P360_COMMENT

  actions: 
  - # ====== Action: reset comment ===============================
    id: 268505814480771438
    identification: 
      name: reset comment
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: ':P360_COMMENT := null;'
      items-to-submit: 
      - P360_COMMENT
      items-to-return: 
      - P360_COMMENT
      suppress-change-event: false

    execution: 
      sequence: 40
      event: Add Comment # 268505378655771436
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Refresh =====================================
    id: 268506378609771439
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: Comments Report # 116510068563155142689

    execution: 
      sequence: 50
      event: Add Comment # 268505378655771436
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute JavaScript Code =====================
    id: 268506876541771440
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: apex.message.ariaAlertMessage("تم اضافة التعليق");

    execution: 
      sequence: 60
      event: Add Comment # 268505378655771436
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: send alerts =================================
    id: 268507387018771440
    identification: 
      name: send alerts
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_project_link  varchar2(4000);
            l_mentions      varchar2(4000);
        begin
        for c1 in (
            select p.project, p.friendly_identifier fi, p.project_url_name, p.owner_id, t.first_name, t.screen_name
              from sp_projects p,
                   sp_team_members t
             where p.id = :P360_PROJECT_ID
               and p.owner_id = t.id (+)
        ) loop
            l_project_link := :P360_PERMALINK_PREFIX||c1.fi||'&pn='||c1.project_url_name;
        
            if apex_util.get_build_option_status (p_application_id => :APP_ID, p_build_option_name => 'Comment Tagging') = 'INCLUDE' then
            l_mentions := sp_strategic_proj_util.find_mentions(:P360_COMMENT);
            -- mentions (not current user)
            if l_mentions is not null then
                for c2 in (
                    select id, first_name
                      from sp_team_members
                     where instr(':'||l_mentions||':',':'||screen_name||':') > 0
                       and id != :APP_USER_ID
                ) loop
                    sp_strategic_proj_util.comment_notification (
                        p_team_member_id => c2.id,
                        p_app_name       => :NOMENCLATURE_STRATEGIC_PLANNER, p_app_id => :APP_ID,
                        p_title          => 'You were mentioned in a comment added to '||c1.project,
                        p_project_id     => :P360_PROJECT_ID, p_project_link => l_project_link,
                        p_email_contents => 'Hi '||c2.first_name||'<br/><br/>'||
                                            'You were mentioned in a new comment added to <a  style="font-weight:bold" href="'||l_project_link||'">'||c1.project||'</a><br/>'||
                                            'Comment by: '||lower(:APP_USER)||'<br/>'||
                                            substr(:P360_COMMENT,1,3600)||case when length(:P360_COMMENT) > 3600 then ' ...' end );
                end loop;
            end if;
            end if;
        
            -- owner (not current user and not tagged in comment)
            if c1.owner_id is not null and c1.owner_id != :APP_USER_ID and instr(':'||l_mentions||':',':'||c1.screen_name||':') = 0 then
                sp_strategic_proj_util.comment_notification (
                    p_team_member_id => c1.owner_id,
                    p_app_name       => :NOMENCLATURE_STRATEGIC_PLANNER, p_app_id => :APP_ID,
                    p_title          => 'New comment added to '||c1.project,
                    p_project_id     => :P360_PROJECT_ID, p_project_link => l_project_link,
                    p_email_contents => 'Hi '||c1.first_name||'<br/><br/>'||
                                        'A new comment was just added to <a  style="font-weight:bold" href="'||l_project_link||'">'||c1.project||'</a><br/>'||
                                        'Comment by: '||lower(:APP_USER)||'<br/>'||
                                        substr(:P360_COMMENT,1,3600)||case when length(:P360_COMMENT) > 3600 then ' ...' end );
            end if;
        
            -- favorited (not owner, not current user and not tagged in comment)
            for c2 in (
                select f.team_member_id, t.first_name
                  from sp_favorites f,
                       sp_team_members t
                 where f.project_id = :P360_PROJECT_ID
                   and f.team_member_id = t.id
                   and f.team_member_id != :APP_USER_ID
                   and f.team_member_id != c1.owner_id
                   and instr(':'||l_mentions||':',':'||t.screen_name||':') = 0
            ) loop
                sp_strategic_proj_util.comment_notification (
                    p_team_member_id => c2.team_member_id,
                    p_app_name       => :NOMENCLATURE_STRATEGIC_PLANNER, p_app_id => :APP_ID,
                    p_title          => 'New comment added to '||c1.project,
                    p_project_id     => :P360_PROJECT_ID, p_project_link => l_project_link,
                    p_email_contents => 'Hi '||c2.first_name||'<br/><br/>'||
                                        'A new comment was just added to <a  style="font-weight:bold" href="'||l_project_link||'">'||c1.project||'</a><br/>'||
                                        'Comment by: '||lower(:APP_USER)||'<br/>'||
                                        substr(:P360_COMMENT,1,3600)||case when length(:P360_COMMENT) > 3600 then ' ...' end );
            end loop;
        end loop;
        end;
      items-to-submit: 
      - P360_COMMENT
      - P360_PRIVATE_YN
      - P360_RESERVATION_ID
      - APP_USER_ID
      - APP_USER

    execution: 
      sequence: 30
      event: Add Comment # 268505378655771436
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: false

    client-side-condition: 
      type: Item != Value
      item: P360_PRIVATE_YN
      value: Y

  - # ====== Action: add comment =================================
    id: 268507822028771441
    identification: 
      name: add comment
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        blitz_util.add_reservation_comment (
            p_app_user         => :APP_USER,
            p_comment          => :P360_COMMENT,
            p_reservation_id   => :P360_RESERVATION_ID,
            p_reservation_type => 'HOTEL',
            p_component_id     => NULL,
            p_private_yn       => NVL(:P360_PRIVATE_YN, 'N')
        );
        
      items-to-submit: 
      - P360_COMMENT
      - P360_PRIVATE_YN
      - P360_RESERVATION_ID

    execution: 
      sequence: 10
      event: Add Comment # 268505378655771436
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

