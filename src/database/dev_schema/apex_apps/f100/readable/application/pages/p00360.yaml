- # ====== Region: Invoice Details =============================
  id: 303617744107859641
  identification: 
    name: Invoice Details
    title: الفتورة والمدفوعات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html       CLOB;
          l_summary    VW_HOTEL_RESERVATION_SUMMARY%ROWTYPE;
          l_paid_total_in_res NUMBER := 0;
      
          l_res_currency VARCHAR2(10);
          l_res_rate_to_egp NUMBER := 1;
      
          TYPE t_currency IS RECORD (
              amount          NUMBER,
              res_equivalent  NUMBER
          );
          TYPE t_currency_map IS TABLE OF t_currency INDEX BY VARCHAR2(10);
          l_currency_map t_currency_map;
      
          CURSOR c_rooms IS
              SELECT 
                  rt.ROOM_NAME,
                  rr.DATE_FROM,
                  rr.DATE_TO,
                  rr.NIGHT_COUNT,
                  rr.CUSTOM_PRICE_PER_NIGHT,
                  rr.CURRENCY,
                  rr.NIGHT_COUNT * rr.CUSTOM_PRICE_PER_NIGHT AS TOTAL_PRICE
              FROM HOTEL_RESERVATION_ROOMS rr
              LEFT JOIN HOTEL_ROOM_TYPES rt ON rt.ROOM_TYPE_ID = rr.ROOM_TYPE_ID
              WHERE rr.HOTEL_RESERVATION_ID = :P360_RESERVATION_ID;
      
          CURSOR c_payments IS
              SELECT PAYMENT_AMOUNT, PAYMENT_CURRENCY, NVL(EXCHANGE_RATE,1) AS PAYMENT_RATE, PAYMENT_METHOD, PAYMENT_DATE, REFERENCE_NUMBER
              FROM PAYMENTS
              WHERE RESERVATION_ID = :P360_RESERVATION_ID
              ORDER BY PAYMENT_DATE;
      
      BEGIN
          -- Load reservation summary
          SELECT * INTO l_summary
          FROM VW_HOTEL_RESERVATION_SUMMARY
          WHERE RESERVATION_ID = :P360_RESERVATION_ID;
      
          l_res_currency := l_summary.RESERVATION_CURRENCY;
      
          -- Get reservation currency EGP rate
          SELECT NVL(EXCHANGE_RATE_VALUE,1)
            INTO l_res_rate_to_egp
            FROM V_CURRENCY_DETAILS
           WHERE CURRENCY_CODE = l_res_currency;
      
          -- Compute payment breakdown by currency with smart conversion
          FOR p IN c_payments LOOP
              DECLARE
                  v_amount_in_egp NUMBER;
                  v_amount_in_res NUMBER;
                  v_pay_cur VARCHAR2(10) := NVL(p.PAYMENT_CURRENCY, 'EGP');
                  v_pay_rate NUMBER := NVL(p.PAYMENT_RATE, 1);
              BEGIN
                  IF v_pay_cur = l_res_currency THEN
                      v_amount_in_res := p.PAYMENT_AMOUNT;
                      v_amount_in_egp := p.PAYMENT_AMOUNT * l_res_rate_to_egp;
                  ELSE
                      v_amount_in_egp := p.PAYMENT_AMOUNT * v_pay_rate;
                      v_amount_in_res := v_amount_in_egp / l_res_rate_to_egp;
                  END IF;
                  l_paid_total_in_res := l_paid_total_in_res + v_amount_in_res;
                  IF l_currency_map.EXISTS(v_pay_cur) THEN
                      l_currency_map(v_pay_cur).amount := l_currency_map(v_pay_cur).amount + p.PAYMENT_AMOUNT;
                      l_currency_map(v_pay_cur).res_equivalent := l_currency_map(v_pay_cur).res_equivalent + v_amount_in_res;
                  ELSE
                      l_currency_map(v_pay_cur).amount := p.PAYMENT_AMOUNT;
                      l_currency_map(v_pay_cur).res_equivalent := v_amount_in_res;
                  END IF;
              END;
          END LOOP;
      
          -- Start HTML (NO inline <style>)
          l_html := '<div class="invoice-box">'
              || '<div class="main-head"><i class="fa fa-file-invoice-dollar"></i> فاتورة الحجز <span style="font-size:15px;color:#999;">[' || l_summary.RESERVATION_ID || ']</span></div>'
              || '<div class="details-bar"></div>'
              || '<div class="inv-box" style="margin-bottom:18px;"><i class="fa fa-user"></i> <b>العميل:</b> ' || l_summary.CLIENT_NAME
              || ' &nbsp; <i class="fa fa-hotel"></i> <b>الفندق:</b> ' || l_summary.HOTEL_NAME
              || '<br><i class="fa fa-users"></i> <b>عدد النزلاء:</b> ' || l_summary.NUMBER_OF_GUESTS
              || ' &nbsp; <i class="fa fa-calendar-alt"></i> <b>الفترة:</b> من ' || TO_CHAR(l_summary.FROM_DATE, 'DD-MM-YYYY') || ' إلى ' || TO_CHAR(l_summary.TO_DATE, 'DD-MM-YYYY')
              || '</div>';
      
          -- Room Details
          l_html := l_html || '<h3 class="section-title"><i class="fa fa-bed"></i> تفاصيل الغرف</h3>'
                    || '<div style="overflow-x:auto;"><table class="inv-table"><thead><tr>'
                    || '<th>الغرفة</th><th>الفترة</th><th>الليالي</th><th>السعر</th><th>الإجمالي</th>'
                    || '</tr></thead><tbody>';
          FOR r IN c_rooms LOOP
              l_html := l_html || '<tr>'
                || '<td>' || r.ROOM_NAME || '</td>'
                || '<td>' || TO_CHAR(r.DATE_FROM, 'DD-MM') || '~' || TO_CHAR(r.DATE_TO, 'DD-MM') || '</td>'
                || '<td>' || r.NIGHT_COUNT || '</td>'
                || '<td>' || TO_CHAR(r.CUSTOM_PRICE_PER_NIGHT, 'FM999G999D00') || ' ' || r.CURRENCY || '</td>'
                || '<td>' || TO_CHAR(r.TOTAL_PRICE, 'FM999G999D00') || ' ' || r.CURRENCY || '</td>'
                || '</tr>';
          END LOOP;
          l_html := l_html || '</tbody></table></div>';
      
          -- Financial Summary
          l_html := l_html
              || '<h3 class="section-title"><i class="fa fa-coins"></i> ملخص الحساب</h3>'
              || '<div class="inv-box"><table style="width:100%;font-size:15px;border-collapse:collapse;">'
              || '<tr><td><i class="fa fa-money-bill-wave"></i> <b>الإجمالي بعملة الحجز</b></td><td style="text-align:right;"><b>' || TO_CHAR(l_summary.TOTAL_ORIGINAL_AMOUNT, 'FM999G999D00') || ' ' || l_res_currency || '</b></td></tr>'
              || '<tr><td><i class="fa fa-calculator"></i> الرسوم التشغيلية</td><td style="text-align:right;">' || TO_CHAR(NVL(l_summary.TOTAL_OPERATIONAL_FEES_EGP, 0), 'FM999G999D00') || ' EGP</td></tr>'
              || '<tr><td><i class="fa fa-chart-line"></i> <b>صافي الربح</b></td><td class="text-green" style="text-align:right;"><b>' || TO_CHAR(NVL(l_summary.NET_PROFIT_EGP, 0), 'FM999G999D00') || ' EGP</b></td></tr>'
              || '</table></div>';
      
          -- Payment summary
          l_html := l_html
              || '<h3 class="section-title"><i class="fa fa-credit-card"></i> ملخص الدفعات</h3>'
              || '<div class="inv-box"><div style="overflow-x:auto;"><table class="inv-table">'
              || '<thead><tr><th>العملة</th><th>المدفوع</th><th>ما يعادله بعملة الحجز</th></tr></thead>';
          DECLARE
              k VARCHAR2(10);
          BEGIN
              k := l_currency_map.FIRST;
              WHILE k IS NOT NULL LOOP
                  l_html := l_html
                      || '<tr>'
                      || '<td>' || k || '</td>'
                      || '<td>' || TO_CHAR(l_currency_map(k).amount, 'FM999G999D00') || ' ' || k || '</td>'
                      || '<td>' || TO_CHAR(l_currency_map(k).res_equivalent, 'FM999G999D00') || ' ' || l_res_currency || '</td>'
                      || '</tr>';
                  k := l_currency_map.NEXT(k);
              END LOOP;
          END;
          l_html := l_html
              || '<tr><th>الإجمالي المدفوع</th><td colspan="2" style="background:#f1f8e8;"><b>' || TO_CHAR(l_paid_total_in_res, 'FM999G999D00') || ' ' || l_res_currency || '</b></td></tr>'
              || '<tr><th>إجمالي الحجز</th><td colspan="2">' || TO_CHAR(l_summary.TOTAL_ORIGINAL_AMOUNT, 'FM999G999D00') || ' ' || l_res_currency || '</td></tr>'
              || '<tr><th>المبلغ المتبقي</th><td colspan="2" class="text-red" style="background:#fbeaea;">' || TO_CHAR(l_summary.TOTAL_ORIGINAL_AMOUNT - l_paid_total_in_res, 'FM999G999D00') || ' ' || l_res_currency || '</td></tr>'
              || '</table></div></div>';
      
          -- Payment history RTL row
          l_html := l_html
              || '<h4 class="section-title" style="font-size:15px;"><i class="fa fa-history"></i> سجل الدفعات</h4>'
              || '<ul class="pay-history" style="direction:rtl;">';
          FOR p IN c_payments LOOP
              l_html := l_html
                || '<li>'
                || '<span style="min-width:110px;font-weight:bold;margin-left:10px;">'
                || TO_CHAR(p.PAYMENT_AMOUNT, 'FM999G999D00') || ' ' || p.PAYMENT_CURRENCY
                || '</span>'
                || '<span style="color:#777;min-width:60px;margin-left:10px;">(' || p.PAYMENT_METHOD || ')</span>'
                || '<span style="color:#555;font-size:13px;min-width:140px;">'
                || TO_CHAR(p.PAYMENT_DATE, 'DD-MM-YYYY HH24:MI')
                || '</span>';
              IF p.REFERENCE_NUMBER IS NOT NULL THEN
                  l_html := l_html || '<span style="color:#b59c63;font-size:13px;margin-left:8px;"><i class="fa fa-barcode"></i> ' || p.REFERENCE_NUMBER || '</span>';
              END IF;
              l_html := l_html || '</li>';
          END LOOP;
          l_html := l_html || '</ul>';
      
          -- END
          l_html := l_html || '</div>';
      
          RETURN l_html;
      
      EXCEPTION
          WHEN NO_DATA_FOUND THEN
              RETURN '<div style="color:red;font-weight:bold;">لم يتم العثور على تفاصيل الفاتورة لهذا الحجز.</div>';
          WHEN OTHERS THEN
              RETURN '<div style="color:red;">حدث خطأ أثناء عرض البيانات: ' || SQLERRM || '</div>';
      END;
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

