- # ====== Dynamic Action: add contributor =====================
  id: 268532293722771453
  identification: 
    name: add contributor

  execution: 
    sequence: 250
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: add_contributor # 268379569287771295

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 268532743093771453
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            c INT := 0;
        BEGIN
            -- Check if contributor already exists for the reservation
            SELECT COUNT(*) 
              INTO c 
              FROM RESERVATION_CONTRIBUTORS 
             WHERE RESERVATION_ID = :P360_RESERVATION_ID 
               AND TEAM_MEMBER_ID = :P360_CONTRIBUTOR;
        
            -- Insert if not already assigned
            IF c = 0 THEN
                INSERT INTO RESERVATION_CONTRIBUTORS (
                    RESERVATION_ID, TEAM_MEMBER_ID, RESPONSIBILITY_ID
                ) VALUES (
                    :P360_RESERVATION_ID, :P360_CONTRIBUTOR, :P360_CONTRIBUTOR_ROLE
                );
            END IF;
        
            -- Reset contributor field
            :P360_CONTRIBUTOR := NULL;
        
            -- Set default role again if needed
            FOR c1 IN (
                SELECT MAX(ID) AS ID 
                  FROM SP_RESOURCE_TYPES 
                 WHERE IS_DEFAULT_YN = 'Y'
            ) LOOP
                :P360_CONTRIBUTOR_ROLE := c1.ID;
            END LOOP;
        END;
      items-to-submit: 
      - P360_RESERVATION_ID
      - P360_CONTRIBUTOR
      - P360_CONTRIBUTOR_ROLE
      items-to-return: 
      - P360_CONTRIBUTOR
      - P360_CONTRIBUTOR_ROLE
      suppress-change-event: false

    execution: 
      sequence: 10
      event: add contributor # 268532293722771453
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Refresh =====================================
    id: 268533253317771454
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: contributors content # 11739967855752145116

    execution: 
      sequence: 20
      event: add contributor # 268532293722771453
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute JavaScript Code =====================
    id: 268533787671771454
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: apex.message.ariaAlertMessage("Contributor Added Successfully");

    execution: 
      sequence: 30
      event: add contributor # 268532293722771453
      fire-when-event-result-is: True
      fire-on-initialization: false

