- # ====== Region: Comments Report =============================
  id: 116510068563155142689
  identification: 
    name: Comments Report
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 
          rc.ID,
          --
          -- Display Data
          --
          e.INITIALS AS user_icon,
          rc.CREATED AS comment_date,
          e.FIRST_NAME || ' ' || e.LAST_NAME AS user_name,
          rc.BODY_HTML AS comment_text,
          --
          CASE 
              WHEN rc.CREATED_BY = :APP_USER_ID THEN 
                  '<a href="' || apex_util.prepare_URL(
                      p_url => 'f?p=' || :APP_ID || ':28:' || :APP_SESSION || '::NO:28:P28_ID:' || rc.ID,
                      p_checksum_type => '3') || '">تعديل</a>' 
          END AS actions,
          --
          DECODE(rc.PRIVATE_YN, 'Y', 'Private Comment') AS private_comment_label,
          ' ' AS attribute_1,
          ' ' AS attribute_2,
          ' ' AS attribute_3,
          ' ' AS attribute_4,
          'u-color-' || ora_hash(rc.CREATED_BY, 45) AS icon_modifier,
          --
          -- Data Columns
          rc.RESERVATION_ID,
          rc.RESERVATION_TYPE,
          rc.COMPONENT_ID,
          rc.BODY,
          rc.BODY_HTML,
          rc.PRIVATE_YN,
          rc.AUTHOR_ID,
          rc.AUTHOR,
          rc.CREATED,
          rc.CREATED_BY,
          rc.UPDATED,
          rc.UPDATED_BY,
          e.ID AS team_member_id
      FROM 
          RESERVATION_COMMENTS rc
      JOIN 
          BS_EMPLOYEES e ON rc.AUTHOR_ID = e.ID
      WHERE 
          rc.RESERVATION_ID = :P360_RESERVATION_ID
          AND rc.RESERVATION_TYPE = 'HOTEL'
          AND (NVL(rc.PRIVATE_YN, 'N') = 'N' OR rc.CREATED_BY = :APP_USER_ID)
      ORDER BY 
          rc.CREATED DESC;
      
    page-items-to-submit: 
    - P360_RESERVATION_ID

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: Comments # 14921201974731014527
