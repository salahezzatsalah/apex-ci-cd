- # ====== Region: Search Results (Identity) ===================
  id: 169096581812639018
  identification: 
    name: Search Results (Identity)
    title: الهويات المسجلة
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          i.identity_id,
          i.identity_type,
          i.full_name,
          i.email,
          i.phone_number,
          i.status,
          i.created,
      
          u.user_id,
          u.username,
          u.global_role,
          u.account_locked_yn,
      
          /* Groups as colon-separated IDs */
          (
              SELECT LISTAGG(ug.group_id, ':')
                     WITHIN GROUP (ORDER BY ug.group_id)
              FROM iam_user_security_groups ug
              WHERE ug.user_id = u.user_id
                AND ug.is_active_yn = 'Y'
          ) AS group_ids,
      
          CASE
              WHEN u.user_id IS NOT NULL THEN 'Y'
              ELSE 'N'
          END AS has_user
      
      FROM iam_identities i
      
      LEFT JOIN iam_users u
             ON u.identity_id = i.identity_id
             AND u.tenant_id  = i.tenant_id
      
      WHERE i.tenant_id = :TENANT_ID;

  order-by: 
    type: Static Value
    order-by-clause: IDENTITY_ID

  layout: 
    sequence: 20
    parent-region: Identity and Users # 181142229592280050
    slot: SUB_REGIONS
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic

