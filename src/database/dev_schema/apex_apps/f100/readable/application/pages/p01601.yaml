- # ====== Dynamic Action: RefreshCols =========================
  id: 194073513247357545
  identification: 
    name: RefreshCols

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P1601_CURRENCY

  actions: 
  - # ====== Action: Refresh =====================================
    id: 194074067811357547
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P1601_PRICE_PER_NIGHT

    execution: 
      sequence: 10
      event: RefreshCols # 194073513247357545
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Set Value ===================================
    id: 194074542101357549
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P1601_CURRENCY
        
      items-to-submit: 
      - P1601_CURRENCY
      escape-special-characters: true
      suppress-change-event: true

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P1601_EXCHANGE_RATE

    execution: 
      sequence: 20
      event: RefreshCols # 194073513247357545
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: SetEndDate ==========================
  id: 194074894201357550
  identification: 
