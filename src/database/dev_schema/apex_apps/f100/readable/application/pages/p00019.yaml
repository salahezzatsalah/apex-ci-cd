javascript: 
  file-urls: 
  - '#PLUGIN_FILES#utils.js'
  execute-when-page-loads: |
    // 1. استدعاء الملفات الأساسية بروابط خارجية مباشرة
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css';
    document.head.appendChild(link);
    
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js';
    script.onload = function() {
        var input = document.querySelector("#P19_PHONE_NUMBER2");
        if (input) {
            var iti = window.intlTelInput(input, {
                initialCountry: "eg",
                separateDialCode: true,
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
            });
    
            // منع الـ APEX من إنه يعمل Validation على الحقل ده نهائياً
            input.setAttribute('data-apex-ignore', 'true');
            
            // معالجة الرقم
            if (input.value) {
                let val = input.value.replace(/\D/g, '');
                if (val.startsWith('20')) {
                    iti.setNumber('+' + val);
                } else {
                    iti.setNumber('+20' + val.replace(/^0/, ''));
                }
            }
        }
    };
    document.head.appendChild(script);

css: 
  inline: |
    
    .iti__flag {background-image: url("#APP_FILES#flags.png");}
    
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .iti__flag {background-image: url("#APP_FILES#flags@2x.png");}
    }
    
    
    .iti__selected-flag {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
    }
    
    .iti__selected-dial-code { 
        direction: ltr;
    }
    
    
    
    
    
    
    
    
    
    
    /* تنسيق منطقة العلم والكود */
    .iti__selected-flag {
        display: flex;
        flex-direction: row-reverse;
        align-items: center;
        background-color: transparent !important; /* شيلنا الرمادي */
        padding-left: 10px !important;
        padding-right: 12px !important;
      
    
    /* تنسيق كود الدولة (+20) */
    .iti__selected-dial-code { 
        direction: ltr;
        margin-left: 10px;
        margin-right: 10px;
        font-weight: 500;
        color: #444;
    }
    
    /* إزاحة نص رقم التليفون عشان ميتداخلش مع العلم */
    input#P19_PHONE_NUMBER {
        padding-left: 100px !important; /* جربي 100 أو 110 لحد ما تظبط */
        height: 40px;
    }
    
    /* تأثير بسيط عند الوقوف بالماوس */
    .iti__selected-flag:hover {
        background-color: #f8f9fa !important;
    }
    

