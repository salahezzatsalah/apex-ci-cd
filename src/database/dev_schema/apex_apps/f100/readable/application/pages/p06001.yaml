- # ====== Region: Assignment Reports ==========================
  id: 276382876280639959
  identification: 
    name: Assignment Reports
    title: الكباتن المعينة على الرحلة
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html   CLOB;
        l_last_assignment_type VARCHAR2(20) := NULL;
        l_count INTEGER := 0;
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        -- Count assignments
        SELECT COUNT(*) INTO l_count
        FROM VW_DRIVER_ASSIGNMENT_ACCOUNTING
        WHERE PRODUCT_ID = :P6001_PRODUCT_ID;
      
        IF l_count = 0 THEN
          l_html := '
            <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-sm mt-6">
              <div class="font-medium">🚫 لا توجد بيانات تعيين للسائقين</div>
              <div class="text-xs mt-1">لم يتم تسجيل أي تعيينات سائقين حتى الآن على هذه التشغيلة.</div>
            </div>';
        ELSE
          FOR rec IN (
            SELECT * FROM VW_DRIVER_ASSIGNMENT_ACCOUNTING
            WHERE PRODUCT_ID = :P6001_PRODUCT_ID
            ORDER BY ASSIGNMENT_TYPE, CREATED_AT DESC
          ) LOOP
      
            IF l_last_assignment_type IS NULL OR l_last_assignment_type != rec.ASSIGNMENT_TYPE THEN
              l_html := l_html || '
                <div class="driver-group-label mb-4 mt-10 text-sm font-semibold text-gray-700 flex items-center gap-2">
                  <i class="fa6 fa6-' || 
                  CASE rec.ASSIGNMENT_TYPE
                    WHEN 'INSOURCE' THEN 'car text-indigo-600'
                    WHEN 'OUTSOURCE' THEN 'globe text-blue-600'
                    ELSE 'circle-question text-gray-400'
                  END || '"></i>
                  <span>' || 
                  CASE rec.ASSIGNMENT_TYPE
                    WHEN 'INSOURCE' THEN 'سائق داخلي'
                    WHEN 'OUTSOURCE' THEN 'سائق خارجي'
                    ELSE 'تعيين غير معروف'
                  END || '</span>
                </div>';
              l_last_assignment_type := rec.ASSIGNMENT_TYPE;
            END IF;
      
            -- Driver Card
            l_html := l_html || '
            <div class="driver-card block-container mb-6 shadow-sm rounded-2xl border border-gray-200 bg-white overflow-hidden flex flex-col lg:flex-row rtl text-right">
      
              <!-- Avatar -->
              <div class="avatar-wrapper bg-gray-50 lg:w-40 flex items-center justify-center p-4">
                <img src="' || rec.DRIVER_AVATAR || '" class="rounded-full w-24 h-24 object-cover border border-gray-300 shadow-sm" alt="Driver" />
              </div>
      
              <!-- Driver Content -->
              <div class="flex-1 p-4 flex flex-col gap-4">
      
                <!-- Overline -->
                <div class="text-xs text-gray-500 flex items-center gap-1">
                  <i class="fa6 fa6-id-card text-indigo-500"></i>
                  <span>بيانات السائق</span>
                </div>
      
                <!-- Title -->
                <div class="flex items-center justify-between flex-wrap gap-2">
                  <div class="text-lg font-bold text-gray-900">' || rec.DRIVER_NAME || '</div>
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full ' || 
                    CASE rec.DRIVER_STATUS
                      WHEN 'حالي' THEN 'bg-emerald-100 text-emerald-700'
                      WHEN 'سابق' THEN 'bg-gray-100 text-gray-600'
                      ELSE 'bg-yellow-100 text-yellow-700'
                    END || '">' || rec.DRIVER_STATUS || '</span>
                </div>
      
                <!-- Description -->
                <div class="text-xs text-gray-500">
                  ' || rec.SHARE_TYPE_AR || ' — ' || rec.SHARE_DISPLAY || '
                </div>
      
                <!-- Metrics -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm pt-2 border-t border-gray-100">
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-road"></i> عدد الرحلات</div>
                    <div class="font-semibold text-gray-900">' || rec.TRIPS_MADE || '</div>
                  </div>
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-money-bill-wave text-green-600"></i> نصيب السائق</div>
                    <div class="font-semibold text-green-700">' || TO_CHAR(rec.DRIVER_TOTAL_PAYOUT_EGP, '999G999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-building-columns text-gray-500"></i> صافي المكتب</div>
                    <div class="font-semibold text-gray-700">' || TO_CHAR(rec.OFFICE_NET_EGP, '999G999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-screwdriver-wrench text-red-600"></i> المصروفات</div>
                    <div class="font-semibold text-red-600">' || TO_CHAR(rec.TOTAL_EXPENSES_EGP, '999G999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-bell-concierge text-yellow-600"></i> الخدمات</div>
                    <div class="font-semibold text-yellow-700">' || TO_CHAR(rec.TOTAL_ADDED_SERVICES_EGP, '999G999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="metric-tag">
                    <div class="text-xs text-gray-500"><i class="fa6 fa6-cash-register text-green-600"></i> إجمالي التحصيل</div>
                    <div class="font-semibold text-green-600">' || TO_CHAR(rec.TOTAL_COLLECTED_EGP, '999G999G990D00') || ' EGP</div>
                  </div>
                </div>';
      
            -- Currency Breakdown
            IF rec.COLLECTIONS_BY_CURRENCY_JSON IS NOT NULL AND rec.COLLECTIONS_BY_CURRENCY_JSON != '[]' THEN
              l_html := l_html || '
                <div class="mt-4">
                  <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-2">
                    <i class="fa6 fa6-coins text-amber-600"></i><span>التحصيل حسب العملة</span>
                  </div>
                  <table class="w-full text-sm bg-white border border-gray-200 rounded-xl overflow-hidden">
                    <thead class="bg-gray-50 text-xs text-gray-600">
                      <tr>
                        <th class="px-3 py-2 text-right">العملة</th>
                        <th class="px-3 py-2 text-right">المبلغ</th>
                        <th class="px-3 py-2 text-right">بالجنيه</th>
                      </tr>
                    </thead>
                    <tbody>';
      
              FOR curr_rec IN (
                SELECT jt.*
                FROM JSON_TABLE(
                  rec.COLLECTIONS_BY_CURRENCY_JSON,
                  '$[*]'
                  COLUMNS (
                    currency     VARCHAR2(10)  PATH '$.currency',
                    amount       VARCHAR2(50)  PATH '$.amount',
                    amount_egp   VARCHAR2(50)  PATH '$.amount_egp'
                  )
                ) jt
              ) LOOP
                l_html := l_html || '
                      <tr class="border-t border-gray-100 hover:bg-gray-50 transition">
                        <td class="px-3 py-2 text-right">' || curr_rec.currency || '</td>
                        <td class="px-3 py-2 text-right">' || curr_rec.amount || '</td>
                        <td class="px-3 py-2 text-right text-gray-600">' || curr_rec.amount_egp || ' EGP</td>
                      </tr>';
              END LOOP;
      
              l_html := l_html || '
                    </tbody>
                  </table>
                </div>';
            END IF;
      
            -- Assignment buttons (if ASSIGNMENT_ID exists)
            IF rec.ASSIGNMENT_ID IS NOT NULL THEN
              l_html := l_html || '
                <div class="flex flex-row gap-3 mt-6">
                  <a href="' || APEX_UTIL.PREPARE_URL('f?p='||:APP_ID||':363:'||:APP_SESSION||'::::P363_ASSIGNMENT_ID:'||rec.ASSIGNMENT_ID) || '" 
                     class="btn btn-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-800 font-semibold rounded-xl px-4 py-2 flex items-center gap-1"
                     style="text-decoration:none;">
                    <i class="fa6 fa6-user-edit"></i> تعديل التوزيعة
                  </a>
                  <a href="' || APEX_UTIL.PREPARE_URL('f?p='||:APP_ID||':6007:'||:APP_SESSION||'::::P6007_ASSIGNMENT_ID:'||rec.ASSIGNMENT_ID) || '" 
                     class="btn btn-sm bg-gray-50 hover:bg-gray-100 text-gray-700 font-semibold rounded-xl px-4 py-2 flex items-center gap-1"
                     style="text-decoration:none;">
                    <i class="fa6 fa6-address-card"></i> عرض تفاصيل التوزيعة
                  </a>
                </div>
              ';
            END IF;
      
            l_html := l_html || '</div></div>'; -- Close card
      
          END LOOP;
        END IF;
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6001_PRODUCT_ID

