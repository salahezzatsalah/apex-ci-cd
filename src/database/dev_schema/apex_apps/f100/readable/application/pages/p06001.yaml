              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-plus-circle text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">الخدمات الإضافية:</span><span class="misc-value flex-1 text-gray-900">&TOTAL_ADDED_SERVICES_EGP. EGP</span></div>
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-file-invoice text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">إجمالي الفتورة:</span><span class="misc-value flex-1 text-gray-900">&TOTAL_INVOICE_ORIG_CURR. &PRODUCT_CURRENCY.</span></div>
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-sack-dollar text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">المدفوع:</span><span class="misc-value flex-1 text-gray-900">&TOTAL_PAID_ORIG_CURR. &PRODUCT_CURRENCY.</span></div>
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-wallet text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">المتبقي:</span><span class="misc-value flex-1 text-gray-900">&TOTAL_OUTSTANDING_ORIG_CURR. &PRODUCT_CURRENCY.</span></div>
            </div>
        
            <div class="misc-group bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-2">
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-user-check text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">السائق الحالي:</span><span class="misc-value flex-1 text-gray-900">&CURRENT_DRIVER_NAME.</span></div>
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-phone text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">جوال السائق:</span><span class="misc-value flex-1 text-gray-900">&CURRENT_DRIVER_PHONE.</span></div>
