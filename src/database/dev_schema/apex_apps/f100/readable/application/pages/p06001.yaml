    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)
      css-classes: 
      - limo-card

    settings: 
      overline: |2
          <div class="limo-overline flex flex-wrap items-center gap-2 text-sm text-gray-900 mb-1">
            <span class="flex items-center gap-1 whitespace-nowrap">
              <span class="label font-semibold text-gray-700">كود العميل:</span> &CLIENT_CODE.
            </span>
            <span class="overline-separator text-gray-400">|</span>
            <span class="flex items-center gap-1 whitespace-nowrap">
              <span class="label font-semibold text-gray-700">رقم الحجز:</span> &RESERVATION_ID.
            </span>
            <span class="overline-separator text-gray-400">|</span>
            <span class="flex items-center gap-1 whitespace-nowrap">
              <span class="label font-semibold text-gray-700">كود الرحلة:</span> &PRODUCT_ID.
            </span>
          </div>
      title: |
        <div class="limo-title flex flex-col sm:flex-row sm:flex-wrap gap-2 text-[clamp(0.85rem,2vw,0.95rem)] leading-snug">
          <!-- Client Name -->
          <div class="title-group inline-flex items-center bg-gray-100 rounded-xl px-3 py-1 max-w-full truncate">
            <i class="fa6 fa6-user text-blue-800 ml-2"></i>
            <span class="title-label font-semibold text-gray-700 ml-1">العميل:</span>
            <span class="title-value text-gray-900 truncate">&FULL_NAME.</span>
          </div>
        
          <!-- Client Phone with Actions -->
          <div class="title-group inline-flex items-center bg-gray-100 rounded-xl px-3 py-1 max-w-full truncate gap-2">
            <span class="title-label font-semibold text-gray-700">جوال العميل:</span>
            <span class="title-value text-gray-900 truncate">&PHONE.</span>
            <a href="tel:&PHONE_CLEAN." class="text-blue-700 hover:text-blue-900" title="اتصال">
              <span class="sr-only">اتصال</span>
              <i class="fa6 fa6-phone-volume"></i>
            </a>
            <a href="https://wa.me/&PHONE_CLEAN.?text=مرحباً%20&FULL_NAME." class="text-green-600 hover:text-green-800" title="واتساب" target="_blank">
              <span class="sr-only">واتساب</span>
              <i class="fa6 fa6-paper-plane"></i>
            </a>
          </div>
        
          <!-- Trip Time -->
          <div class="title-group inline-flex items-center bg-gray-100 rounded-xl px-3 py-1 max-w-full truncate">
            <i class="fa6 fa6-clock text-blue-800 ml-2"></i>
            <span class="title-label font-semibold text-gray-700 ml-1">الموعد:</span>
            <span class="title-value text-gray-900">&PICK_UP_TIME.</span>
          </div>
        </div>
        
      description: |
        <div class="limo-row flex flex-col sm:flex-row gap-4 mt-4 max-w-full">
          <!-- Car Image -->
          <div class="limo-avatar relative flex items-center justify-center sm:block w-full sm:w-auto">
            <img src="&CAR_PHOTO_URL." alt="صورة السيارة"
                 onerror="this.onerror=null;this.src='#APP_FILES#placeholders/unknown-car.png'"
                 class="w-[120px] h-[90px] object-contain rounded-md shadow" />
            <div class="trip-progress-badge absolute -bottom-2 left-1/2 -translate-x-1/2 bg-yellow-50 border border-yellow-300 text-brown-700 rounded-xl px-2 py-0.5 text-xs text-center shadow min-w-[60px]">
              <div class="progress-value font-semibold text-orange-600">&TRIPS_COUNT./&TOTAL_DAYS.</div>
              <div class="progress-label text-[0.65em] text-brown-600">رحلات</div>
            </div>
          </div>
        
          <!-- Description -->
          <div class="limo-description flex-1 text-sm text-gray-800 leading-relaxed">
            <!-- Location Inline Row -->
            <div class="trip-location-card flex flex-row items-center justify-center flex-wrap gap-4 rounded-md px-3 py-2 mb-3 text-center sm:justify-start">
              <div class="location-block flex flex-col min-w-[120px]">
                <div class="location-name font-bold text-base text-black">&FROM_LOCATION.</div>
                <div class="location-datetime text-xs text-gray-600">&PICK_UP_TIME.</div>
              </div>
              <div class="location-arrow flex items-center justify-center text-gray-400">
                <svg viewBox="0 0 24 24" class="w-5 h-5 fill-gray-500">
                  <path d="M14.55 6c-.2 0-.39.078-.53.22l-5 5a1.1 1.1 0 0 0 0 1.56l5 5a.75.75 0 0 0 1.06-1.06L10.36 12l4.72-4.72a.75.75 0 0 0-.53-1.28z"/>
                </svg>
              </div>
              <div class="location-block flex flex-col min-w-[120px]">
                <div class="location-name font-bold text-base text-black">&TO_LOCATION.</div>
                <div class="location-datetime text-xs text-gray-600">&TRIP_DATE_TO.</div>
              </div>
            </div>
        
            <!-- Meta Badges -->
            <div class="limo-meta flex flex-wrap gap-2">
              <span class="badge inline-flex items-center gap-1 bg-blue-900 text-white text-xs font-semibold px-2.5 py-1 rounded-full">
                <i class="fa6 fa6-tag"></i> &CLASSIFICATION_TYPE.
              </span>
              <span class="badge inline-flex items-center gap-1 bg-blue-900 text-white text-xs font-semibold px-2.5 py-1 rounded-full">
                <i class="fa6 fa6-car-side"></i> &TRIP_TYPE.
              </span>
              <span class="badge inline-flex items-center gap-1 bg-blue-900 text-white text-xs font-semibold px-2.5 py-1 rounded-full">
                <i class="fa6 fa6-calendar-day"></i> &NUMBER_OF_DAYS. يوم
              </span>
              <span class="badge inline-flex items-center gap-1 bg-blue-900 text-white text-xs font-semibold px-2.5 py-1 rounded-full">
                <i class="fa6 fa6-car"></i> &REQUESTED_CAR.
              </span>
            </div>
          </div>
        </div>
        
      miscellaneous: |2
          <div class="limo-misc w-full lg:w-[270px] flex flex-col gap-3 mt-5 text-sm text-gray-900">
            <div class="misc-group bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-2">
              <div class="misc-row flex items-start gap-2"><i class="fa6 fa6-money-bill-wave text-blue-800 mt-0.5"></i><span class="misc-label font-semibold text-gray-700">سعر الرحلة:</span><span class="misc-value flex-1 text-gray-900">&PRODUCT_PRICE. &PRODUCT_CURRENCY.</span></div>
