- # ====== Region: Product's Trip Report =======================
  id: 270247607790186771
  identification: 
    name: Product's Trip Report
    title: تقرير الرحلات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html     CLOB;
        l_index    INTEGER := 0;
        l_count    INTEGER := 0;
        l_driver   VARCHAR2(4000);
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        -- Count trips for the product
        SELECT COUNT(*) INTO l_count
        FROM LIMO_TRIPS_TRACKER_V2
        WHERE PRODUCT_ID = :P6001_PRODUCT_ID;
      
        -- Get assigned driver (current)
        BEGIN
          SELECT 
            CASE a.ASSIGNMENT_TYPE
              WHEN 'INSOURCE' THEN d.DRIVER_NAME || ' (' || d.DRIVER_ID || ')'
              WHEN 'OUTSOURCE' THEN s.SUPPLIER_NAME || ' (' || s.SUPPLIER_ID || ')'
              ELSE 'غير معروف'
            END
          INTO l_driver
          FROM LIMO_PRODUCT_ASSIGNMENTS a
          LEFT JOIN COMPANY_DRIVERS d
            ON a.ASSIGNMENT_TYPE = 'INSOURCE'
           AND d.DRIVER_ID = a.DRIVER_ID
          LEFT JOIN SUPPLIERS s
            ON a.ASSIGNMENT_TYPE = 'OUTSOURCE'
           AND TO_CHAR(s.SUPPLIER_ID) = a.DRIVER_ID
          WHERE a.PRODUCT_ID = :P6001_PRODUCT_ID
            AND a.DRIVER_STATUS = 'CURRENT'
            AND ROWNUM = 1;
        EXCEPTION
          WHEN NO_DATA_FOUND THEN
            l_driver := NULL;
        END;
      
        DBMS_LOB.APPEND(l_html, '<div class="space-y-4" id="tripAccordion">');
      
        IF l_count = 0 THEN
      
          DBMS_LOB.APPEND(l_html, '
            <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-xl text-sm">
              <div class="font-medium">🚫 لا توجد رحلات مسجلة</div>
              <div class="text-xs mt-1">' || 
              CASE 
                WHEN l_driver IS NOT NULL THEN
                  'تم تعيين السائق: <strong>' || l_driver || '</strong> ولكن لم تسجل أي رحلات.'
                ELSE
                  'لم يتم تسجيل أي سائق أو رحلة على هذه التشغيلة.'
              END || '</div>
            </div>');
      
        ELSE
      
          FOR rec IN (
      
            SELECT
              t.*,
      
              CASE a.assignment_type
                WHEN 'INSOURCE' THEN cd.driver_name
                WHEN 'OUTSOURCE' THEN s.supplier_name
                ELSE 'غير معروف'
              END AS driver_name,
      
              CASE a.assignment_type
                WHEN 'INSOURCE' THEN NVL(cd.driver_avatar, '#APP_FILES#placeholders/companydriver.png')
                WHEN 'OUTSOURCE' THEN '#APP_FILES#placeholders/suppliers.png'
                ELSE '#APP_FILES#placeholders/unknown.png'
              END AS driver_avatar,
      
              (SELECT car_name || ' - ' || license_plate || ' - ' || year
               FROM company_registered_cars c
               WHERE c.id = t.used_car_id) AS used_car_display,
      
              -- NEW: Accounting
              acc.expenses_egp,
              acc.added_services_egp,
              acc.driver_payout_egp,
              acc.office_net_egp,
      
              NVL(t.executed_date, t.start_datetime) AS trip_sort_date
      
            FROM LIMO_TRIPS_TRACKER_V2 t
      
            JOIN limo_product_assignments a
              ON a.assignment_id = t.assignment_id
      
            LEFT JOIN company_drivers cd
              ON a.assignment_type = 'INSOURCE'
             AND cd.driver_id = a.driver_id
      
            LEFT JOIN suppliers s
              ON a.assignment_type = 'OUTSOURCE'
             AND TO_CHAR(s.supplier_id) = a.driver_id
      
            -- NEW
            LEFT JOIN limo_trip_accounting acc
              ON acc.trip_id = t.trip_id
      
            WHERE t.product_id = :P6001_PRODUCT_ID
      
            ORDER BY NVL(t.executed_date, t.start_datetime)
      
          ) LOOP
      
            l_index := l_index + 1;
      
            DBMS_LOB.APPEND(l_html, '
            <div class="accordion-item border border-gray-200 rounded-lg overflow-hidden">
              <!-- Header -->
              <button type="button" 
                      class="accordion-header w-full flex justify-between items-center p-4 text-sm font-bold text-gray-800 bg-gray-50 hover:bg-gray-100"
                      onclick="toggleAccordion(this)">
                <span><i class="fa6 fa6-car-side text-indigo-600"></i> الرحلة رقم ' || l_index || 
                ' - ' || 
                  CASE 
                    WHEN rec.executed_date IS NOT NULL THEN TO_CHAR(rec.executed_date, 'DD-MM-YYYY')
                    WHEN rec.start_datetime IS NOT NULL THEN TO_CHAR(rec.start_datetime, 'DD-MM-YYYY')
                    ELSE '-'
                  END || '</span>
                <span>' ||
                  CASE UPPER(NVL(rec.STATUS, 'UNKNOWN'))
                    WHEN 'FINISHED' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">منتهية</span>'
                    WHEN 'ACTIVE' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700">نشطة</span>'
                    WHEN 'PAUSED' THEN '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">متوقفة</span>'
                    ELSE '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">غير معروف</span>'
                  END || '</span>
              </button>
      
              <!-- Content -->
              <div class="accordion-content hidden p-4 bg-white">
      
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 text-sm">
      
                  <div class="bg-gray-50 p-3 rounded-lg border">
                    <div class="text-xs text-gray-500 mb-1"><i class="fa6 fa6-money-bill text-red-500"></i> المصروفات</div>
                    <div class="font-semibold text-red-700">' ||
                      TO_CHAR(NVL(rec.expenses_egp,0),'999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="bg-gray-50 p-3 rounded-lg border">
                    <div class="text-xs text-gray-500 mb-1"><i class="fa6 fa6-bell-concierge text-yellow-600"></i> الخدمات</div>
                    <div class="font-semibold text-yellow-700">' ||
                      TO_CHAR(NVL(rec.added_services_egp,0),'999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="bg-gray-50 p-3 rounded-lg border">
                    <div class="text-xs text-gray-500 mb-1"><i class="fa6 fa6-wallet text-green-600"></i> نصيب السائق</div>
                    <div class="font-semibold text-green-700">' ||
                      TO_CHAR(NVL(rec.driver_payout_egp,0),'999G990D00') || ' EGP</div>
                  </div>
      
                  <div class="bg-gray-50 p-3 rounded-lg border"> 
                    <div class="text-xs text-gray-500 mb-1"><i class="fa6 fa6-building-columns text-indigo-600"></i> صافي المكتب</div> 
                    <div class="font-semibold text-indigo-700">' ||
                      TO_CHAR(NVL(rec.office_net_egp,0),'999G990D00') || ' EGP</div> 
                  </div> 
      
                </div>
      
              </div>
            </div>');
      
          END LOOP;
      
        END IF;
      
        DBMS_LOB.APPEND(l_html, '</div>');
      
        RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P6001_PRODUCT_ID

  layout: 
    sequence: 10
    parent-region: Product's Trip Report # 276692654210178468
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
