buttons: 
- # ====== Button: StartTripView ===============================
  id: 176324868314440409
  identification: 
    button-name: StartTripView
    label: بدء الرحلة

  layout: 
    sequence: 20
    region: Trip Control and Active Current Trip # 276692843978178470
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    alignment: Left center

  appearance: 
    button-template: Text
    hot: false
    template-options: 
    - '#DEFAULT#'
    - t-Button--large
    - t-Button--success
    - t-Button--stretch

  behavior: 
    action: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:2:&SESSION.::&DEBUG.::P2_PRODUCT_ID,P2_ASSIGNMENT_ID:&P6001_PRODUCT_ID.,&P6001_APP_USER_ASSIGNMENT_ID.'
      page: 2 # Identity Profile
      values: 
        p2_product_id: '&P6001_PRODUCT_ID.'
        p2_assignment_id: '&P6001_APP_USER_ASSIGNMENT_ID.'

    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Rows returned
    sql-query: |
      SELECT 1
      FROM DUAL
      WHERE 
        -- 🟥 Ensure no active or paused trips exist
        NOT EXISTS (
          SELECT 1
          FROM LIMO_TRIPS_TRACKER_V2
          WHERE PRODUCT_ID = :P6001_PRODUCT_ID
            AND STATUS IN ('ACTIVE', 'PAUSED')
        )
      
        -- 🟩 Ensure product is accessible (employee or current driver)
        AND EXISTS (
          SELECT 1
          FROM sublevel_limo_res p
          WHERE p.sub_res_id = :P6001_PRODUCT_ID
      
            AND (
              -- ✅ EMPLOYEE: always access
              :P6001_USER_TYPE = 'EMPLOYEE'
      
              -- ✅ DRIVER: must be current driver and trip date not expired
              OR EXISTS (
                SELECT 1
                FROM LIMO_PRODUCT_ASSIGNMENTS a
                WHERE a.PRODUCT_ID = p.SUB_RES_ID
                  AND a.DRIVER_ID = :P6001_DRIVER_ID
                  AND a.DRIVER_STATUS = 'CURRENT'
      
              )
            )
      
            -- 🟨 Ensure fewer trips than days
            AND (
              SELECT COUNT(*)
              FROM LIMO_TRIPS_TRACKER_V2 t
              WHERE t.PRODUCT_ID = p.SUB_RES_ID
                AND t.STATUS = 'FINISHED'
            ) < (TRUNC(p.RES_DATE_TO) - TRUNC(p.RES_DATE_FROM) + 1)
      
            -- ✅ Ensure at least one assignment exists (any status)
            AND EXISTS (
              SELECT 1
              FROM LIMO_PRODUCT_ASSIGNMENTS x
              WHERE x.PRODUCT_ID = p.SUB_RES_ID
            )
        );

