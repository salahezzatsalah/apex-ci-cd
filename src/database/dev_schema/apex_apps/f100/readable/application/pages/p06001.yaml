- # ====== Region: Active Trip Region ==========================
  id: 276693067686178472
  identification: 
    name: Active Trip Region
    title: تقرير الرحلات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html        CLOB;
        l_product_id  VARCHAR2(100) := :P6001_PRODUCT_ID;
        l_count       INTEGER := 0;
      
        c_btn_primary   CONSTANT VARCHAR2(4000) :=
          'flex items-center justify-center gap-2 min-h-[48px] h-12 px-4 rounded-lg text-base font-semibold bg-black text-white hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-black transition';
      
        c_btn_secondary CONSTANT VARCHAR2(4000) :=
          'flex items-center justify-center gap-2 min-h-[48px] h-12 px-4 rounded-lg text-base font-semibold bg-gray-200 text-black hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-black transition';
      
      BEGIN
        DBMS_LOB.CREATETEMPORARY(l_html, TRUE);
      
        /* Count active/paused trips */
        SELECT COUNT(*)
        INTO l_count
        FROM LIMO_TRIPS_TRACKER_V2 t
        JOIN LIMO_PRODUCT_ASSIGNMENTS a
          ON a.ASSIGNMENT_ID = t.ASSIGNMENT_ID
        WHERE t.PRODUCT_ID = l_product_id
          AND t.STATUS IN ('ACTIVE','PAUSED')
          AND ( :P6001_USER_TYPE <> 'DRIVER'
                OR UPPER(a.DRIVER_ID) = UPPER(:P6001_DRIVER_ID) );
      
        /* No trips */
        IF l_count = 0 THEN
      
          l_html := '
      <div class="w-full flex justify-center items-center my-2">
        <section class="space-y-4 mt-4 max-w-md w-full">
          <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 rounded-2xl text-center font-semibold flex flex-col items-center gap-2">
            <i class="fa6 fa6-circle-exclamation text-2xl"></i>
            لا توجد أي رحلات نشطة حالياً.
          </div>
        </section>
      </div>';
      
          RETURN l_html;
      
        END IF;
      
        DBMS_LOB.APPEND(l_html, '<div class="w-full flex flex-col gap-3">');
      
        /* Main loop */
        FOR rec IN (
      
          SELECT
            t.TRIP_ID,
            t.STATUS,
            t.EXECUTED_DATE,
            t.USED_CAR_ID,
      
            /* Accounting */
            acc.EXPENSES_EGP,
            acc.ADDED_SERVICES_EGP,
            acc.DRIVER_PAYOUT_EGP,
            acc.OFFICE_NET_EGP,
            acc.OUTSTANDING_EGP,
            acc.OUTSTANDING_ORIG_CURR,
            acc.CURRENCY,
      
            /* Driver name */
            CASE a.ASSIGNMENT_TYPE
              WHEN 'INSOURCE'  THEN NVL(cd.DRIVER_NAME,'غير معروف')
              WHEN 'OUTSOURCE' THEN NVL(s.SUPPLIER_NAME,'غير معروف')
              ELSE 'غير معروف'
            END AS DRIVER_NAME,
      
            /* Driver type AR */
            CASE a.ASSIGNMENT_TYPE
              WHEN 'INSOURCE'  THEN 'سائق داخلي'
              WHEN 'OUTSOURCE' THEN 'سائق خارجي'
              ELSE 'غير محدد'
            END AS DRIVER_TYPE_AR,
      
            /* Avatar */
            CASE a.ASSIGNMENT_TYPE
              WHEN 'INSOURCE' THEN
                CASE
                  WHEN cd.PROFILE_PHOTO IS NOT NULL THEN
                    'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/company-drivers-pic/' || cd.DRIVER_ID
                  ELSE '#APP_FILES#placeholders/companydriver.png'
                END
      
              WHEN 'OUTSOURCE' THEN
                CASE
                  WHEN s.PROFILE_PHOTO IS NOT NULL THEN
                    'https://g84c211b3b16868-apexadb1.adb.me-jeddah-1.oraclecloudapps.com/ords/blitzlayali333/profilephotosapi/suppliers-pic/' || s.SUPPLIER_ID
                  ELSE '#APP_FILES#placeholders/suppliers.png'
                END
      
              ELSE '#APP_FILES#placeholders/unknown.png'
            END AS DRIVER_AVATAR,
      
            /* Car display */
            ( SELECT c.car_name || ' - ' || c.license_plate || ' - ' || c.year
                FROM COMPANY_REGISTERED_CARS c
               WHERE c.id = t.USED_CAR_ID
            ) AS USED_CAR_DISPLAY
      
          FROM LIMO_TRIPS_TRACKER_V2 t
      
          JOIN LIMO_PRODUCT_ASSIGNMENTS a
            ON a.ASSIGNMENT_ID = t.ASSIGNMENT_ID
      
          LEFT JOIN COMPANY_DRIVERS cd
            ON a.ASSIGNMENT_TYPE = 'INSOURCE'
           AND cd.DRIVER_ID = a.DRIVER_ID
      
          LEFT JOIN SUPPLIERS s
            ON a.ASSIGNMENT_TYPE = 'OUTSOURCE'
           AND TO_CHAR(s.SUPPLIER_ID) = a.DRIVER_ID
      
          /* Accounting join */
          LEFT JOIN LIMO_TRIP_ACCOUNTING acc
            ON acc.TRIP_ID = t.TRIP_ID
      
          WHERE t.PRODUCT_ID = l_product_id
            AND t.STATUS IN ('ACTIVE','PAUSED')
            AND ( :P6001_USER_TYPE <> 'DRIVER'
                  OR UPPER(a.DRIVER_ID) = UPPER(:P6001_DRIVER_ID) )
      
          ORDER BY NVL(t.EXECUTED_DATE, DATE '1900-01-01') DESC,
                   t.CREATED DESC
        )
      
        LOOP
      
          DBMS_LOB.APPEND(l_html, '
      
      <div class="w-full flex justify-center items-center my-2">
      
        <section class="w-full sm:max-w-lg lg:max-w-xl bg-white border border-gray-200 shadow-lg rounded-2xl p-4 flex flex-col gap-3">
      
          <header class="flex flex-row items-center gap-3 pb-2 border-b border-gray-100">
      
            <div class="flex-shrink-0">
              <img src="' || rec.DRIVER_AVATAR || '"
                   onerror="this.onerror=null;this.src=''#APP_FILES#placeholders/unknown.png'';"
                   class="w-14 h-14 rounded-xl object-cover border border-gray-200 shadow-sm" />
            </div>
      
            <div class="flex flex-col flex-1 gap-1">
      
              <div class="flex items-center gap-1 text-xs text-gray-500">
                <i class="fa6 fa6-location-dot text-black"></i>
                <span class="font-bold">رحلة</span>
              </div>
      
              <span class="text-[1.05rem] font-bold text-gray-900 flex items-center gap-1">
                <i class="fa6 fa6-car-side text-black"></i> ' || rec.DRIVER_NAME || '
              </span>
      
              <span class="text-xs text-gray-400">' || rec.DRIVER_TYPE_AR || '</span>
      
            </div>
      
            <div class="flex flex-col items-end">
      
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-semibold ' ||
      
                CASE rec.STATUS
                  WHEN 'ACTIVE' THEN 'bg-black text-white'
                  WHEN 'PAUSED' THEN 'bg-yellow-400 text-black'
                  ELSE 'bg-gray-200 text-gray-600'
                END ||
      
              '">
      
                <i class="fa6 fa6-circle-dot mr-1"></i>' || rec.STATUS || '
      
              </span>
      
            </div>
      
          </header>
      
      
          <section class="grid grid-cols-2 sm:grid-cols-3 gap-3 pt-2">
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-calendar-day text-indigo-500"></i> تاريخ التنفيذ
              </label>
      
              <span class="font-semibold text-gray-900">' ||
      
                CASE
                  WHEN rec.EXECUTED_DATE IS NOT NULL
                  THEN TO_CHAR(rec.EXECUTED_DATE, 'DD-MM-YYYY')
                  ELSE '-'
                END ||
      
              '</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-car text-rose-500"></i> السيارة المستخدمة
              </label>
      
              <span class="font-semibold text-gray-900">' ||
                NVL(rec.USED_CAR_DISPLAY,'-') || '</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-money-bill text-red-500"></i> المصروفات
              </label>
      
              <span class="font-semibold text-red-700">' ||
                TO_CHAR(NVL(rec.EXPENSES_EGP,0),'999G999G990D00') || ' EGP</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-bell-concierge text-yellow-600"></i> الخدمات
              </label>
      
              <span class="font-semibold text-yellow-700">' ||
                TO_CHAR(NVL(rec.ADDED_SERVICES_EGP,0),'999G999G990D00') || ' EGP</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-wallet text-green-600"></i> نصيب السائق
              </label>
      
              <span class="font-semibold text-green-700">' ||
                TO_CHAR(NVL(rec.DRIVER_PAYOUT_EGP,0),'999G999G990D00') || ' EGP</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-building-columns text-gray-600"></i> صافي المكتب
              </label>
      
              <span class="font-semibold text-gray-800">' ||
                TO_CHAR(NVL(rec.OFFICE_NET_EGP,0),'999G999G990D00') || ' EGP</span>
      
            </div>
      
      
            <div class="bg-gray-50 rounded-lg p-3 border col-span-2 sm:col-span-3">
      
              <label class="text-xs text-gray-500 mb-1">
                <i class="fa6 fa6-calculator text-emerald-600"></i> التحصيلات المتبقية
              </label>
      
              <span class="font-semibold text-emerald-700">' ||
                TO_CHAR(NVL(rec.OUTSTANDING_ORIG_CURR,0),'999G999G990D00') ||
                ' ' || rec.CURRENCY || '</span>
      
              <div class="text-xs text-gray-400 mt-1">(≈ ' ||
                TO_CHAR(NVL(rec.OUTSTANDING_EGP,0),'999G999G990D00') || ' EGP)</div>
      
            </div>
      
          </section>
      
      
          <section class="w-full mt-2">
      
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
      
      
              <a class="' || c_btn_primary || '" href="' ||
                APEX_UTIL.PREPARE_URL(
                  'f?p='||:APP_ID||':6002:'||:APP_SESSION||
                  '::::P6002_TRIP_ID:'||rec.TRIP_ID
                ) || '">
      
                <i class="fa6 fa6-file-lines"></i> عرض التفاصيل
      
              </a>
      
      
              <a class="' || c_btn_secondary || '" href="' ||
                APEX_UTIL.PREPARE_URL(
                  'f?p='||:APP_ID||':6005:'||:APP_SESSION||
                  '::::P6005_TRIP_ID:'||rec.TRIP_ID
                ) || '">
      
                <i class="fa6 fa6-cash-register"></i> تسجيل تحصيل
      
              </a>
      
      
              <a class="' || c_btn_secondary || '" href="' ||
                APEX_UTIL.PREPARE_URL(
                  'f?p='||:APP_ID||':6003:'||:APP_SESSION||
                  '::::P6003_TRIP_ID:'||rec.TRIP_ID
                ) || '">
      
                <i class="fa6 fa6-money-bill-transfer"></i> اضافة مصروفات
      
              </a>
      
      
              <a class="' || c_btn_secondary || '" href="' ||
                APEX_UTIL.PREPARE_URL(
                  'f?p='||:APP_ID||':6004:'||:APP_SESSION||
                  '::::P6004_TRIP_ID:'||rec.TRIP_ID
                ) || '">
      
                <i class="fa6 fa6-bell-concierge"></i> اضافة خدمة
      
              </a>
      
      
            </div>
      
          </section>
      
        </section>
      
      </div>');
      
        END LOOP;
      
        DBMS_LOB.APPEND(l_html, '</div>');
      
        RETURN l_html;
      
      END;
      
    page-items-to-submit: 
    - P6001_PRODUCT_ID
    - P6001_USER_TYPE
    - P6001_ASSIGNMENT_ID
    - P6001_APP_USER_ASSIGNMENT_ID
    - P6001_DRIVER_ID

