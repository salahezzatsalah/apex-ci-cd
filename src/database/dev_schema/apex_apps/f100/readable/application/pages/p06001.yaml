- # ====== Region: loader ======================================
  id: 279057814021864264
  identification: 
    name: loader
    type: Static Content

  source: 
    html-code: |
      
      <!-- Loader Overlay -->
      <div id="swipe-loader"
           class="fixed inset-0 bg-white bg-opacity-90 z-[9999] hidden flex flex-col items-center justify-center text-xl font-bold text-emerald-700 space-y-4 transition-opacity duration-500 backdrop-blur-md">
        <div class="flex items-center space-x-2 rtl:space-x-reverse">
          <i class="fa6 fa6-car fa-bounce text-3xl"></i>
          <span>جاري بدء الرحلة...</span>
        </div>
      </div>
      
      <!-- Success Overlay -->
      <div id="swipe-success"
