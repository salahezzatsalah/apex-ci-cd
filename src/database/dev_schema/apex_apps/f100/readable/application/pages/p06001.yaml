- # ====== Page Item: P6001_APP_USER_ASSIGNMENT_ID =============
  id: 270628590507999854
  identification: 
    name: P6001_APP_USER_ASSIGNMENT_ID
    type: Select One

  label: 
    label: التوزيعة التي سيتم عليها بدء الرحلة
    alignment: Left

  settings: 
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  layout: 
    sequence: 80
    region: Items Holder Container # 276692954393178471
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    width: 30

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
        driver_name || ' (' || driver_id || ' - ' || driver_status || ')' AS display_value,
        assignment_id AS return_value
      FROM (
        /* ================= OUTSOURCE drivers ================= */
        SELECT 
          s.SUPPLIER_NAME AS driver_name,
          a.DRIVER_ID,
          a.DRIVER_STATUS,
          a.ASSIGNMENT_ID
        FROM LIMO_PRODUCT_ASSIGNMENTS a
        JOIN SUPPLIERS s 
          ON TO_CHAR(s.SUPPLIER_ID) = a.DRIVER_ID
        WHERE a.ASSIGNMENT_TYPE = 'OUTSOURCE'
          AND a.PRODUCT_ID = :P6001_PRODUCT_ID
      
        UNION ALL
      
        /* ================= INSOURCE drivers ================= */
        SELECT 
          d.DRIVER_NAME AS driver_name,
          a.DRIVER_ID,
          a.DRIVER_STATUS,
          a.ASSIGNMENT_ID
        FROM LIMO_PRODUCT_ASSIGNMENTS a
        JOIN COMPANY_DRIVERS d 
          ON d.DRIVER_ID = a.DRIVER_ID
        WHERE a.ASSIGNMENT_TYPE = 'INSOURCE'
          AND a.PRODUCT_ID = :P6001_PRODUCT_ID
      )
      ORDER BY
        /* 🔥 Current driver always first */
        CASE 
          WHEN DRIVER_STATUS = 'CURRENT' THEN 0
          ELSE 1
        END,
        /* Then alphabetical */
        driver_name;
      

  advanced: 
    warn-on-unsaved-changes: Ignore

  source: 
    type: Null
    used: Only when current value in session state is null

  default: 
    type: SQL Query (return single value)
    sql-query-(return-single-value): "select assignment_id from limo_product_assignments where product_id = :P6001_PRODUCT_ID and DRIVER_STATUS = 'CURRENT';"

  session-state: 
    data-type: VARCHAR2
    storage: Per Session (Persistent)

  read-only: 
    type: Item = Value
    item: P6001_USER_TYPE
    value: DRIVER

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

