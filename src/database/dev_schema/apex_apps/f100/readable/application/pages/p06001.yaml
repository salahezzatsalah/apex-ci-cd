- # ====== Page Item: P6001_DRIVER_ID ==========================
  id: 270247879262186773
  identification: 
    name: P6001_DRIVER_ID
    type: Select One

  label: 
    label: السائق المعين في التوزيعة
    alignment: Left

  settings: 
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  layout: 
    sequence: 90
    region: Items Holder Container # 276692954393178471
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    width: 30

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
        CASE a.ASSIGNMENT_TYPE
          WHEN 'INSOURCE' THEN d.DRIVER_NAME || ' (' || d.DRIVER_ID || ' - ' || a.DRIVER_STATUS || ')'
          WHEN 'OUTSOURCE' THEN s.SUPPLIER_NAME || ' (' || TO_CHAR(s.SUPPLIER_ID) || ' - ' || a.DRIVER_STATUS || ')'
          ELSE 'غير معروف'
        END AS display_value,
        a.DRIVER_ID AS return_value
      FROM LIMO_PRODUCT_ASSIGNMENTS a
      LEFT JOIN COMPANY_DRIVERS d ON a.ASSIGNMENT_TYPE = 'INSOURCE' AND d.DRIVER_ID = a.DRIVER_ID
      LEFT JOIN SUPPLIERS s ON a.ASSIGNMENT_TYPE = 'OUTSOURCE' AND TO_CHAR(s.SUPPLIER_ID) = a.DRIVER_ID
      WHERE a.ASSIGNMENT_ID = :P6001_APP_USER_ASSIGNMENT_ID
      

  cascading-list-of-values: 
    parent-item(s): 
    - P6001_APP_USER_ASSIGNMENT_ID
    items-to-submit: 
    - P6001_APP_USER_ASSIGNMENT_ID
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Ignore

  source: 
    type: Null
    used: Only when current value in session state is null

  default: 
    type: SQL Query (return single value)
    sql-query-(return-single-value): 'select driver_id from limo_product_assignments where assignment_id = :P6001_APP_USER_ASSIGNMENT_ID'

  session-state: 
    data-type: VARCHAR2
    storage: Per Session (Persistent)

  read-only: 
    type: Item = Value
    item: P6001_USER_TYPE
    value: DRIVER

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

  configuration: 
    build-option: Commented Out # 253764608978089549

