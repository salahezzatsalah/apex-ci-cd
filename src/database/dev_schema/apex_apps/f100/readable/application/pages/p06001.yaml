dynamic-actions: 
- # ====== Dynamic Action: EndTripV2 ===========================
  id: 176325077454440411
  identification: 
    name: EndTripV2

  execution: 
    sequence: 101
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: EndTripView # 176324993557440410

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 176325214731440412
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
          v_trip_id VARCHAR2(50) := :P6001_ACTIVETRIP;
        BEGIN
          -- 🟢 Step 1: Mark the trip as FINISHED
          UPDATE limo_trips_tracker_v2
          SET status      = 'FINISHED',
              end_datetime = NVL(end_datetime, SYSTIMESTAMP)  -- ensure end time is set
          WHERE trip_id = v_trip_id
            AND status IN ('ACTIVE', 'PAUSED');
        
          COMMIT;
        END;
        

    execution: 
      sequence: 10
      event: EndTripV2 # 176325077454440411
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

