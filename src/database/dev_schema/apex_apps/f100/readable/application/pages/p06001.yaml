- # ====== Region: Trip Details ================================
  id: 10981179589263010997
  identification: 
    name: Trip Details
    title: تفاصيل الطلب
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select SUB_RES_ID,
             ORDER_ITEM_ID,
             CAT_ITEM_ID,
             TRIP_TYPE,
             FROM_LOCATION,
             TO_LOCATION,
             RES_DATE_FROM,
             RES_TIME,
             RES_DATE_TO,
             SERVICE_CLASS,
             TICKET_NUMBER,
             SIGNAGE_DETAILS,
             TRIP_PRICE,
             CURRENCY,
             EXCHANGE_RATE,
             NOD,
             TOTAL_AMOUNT,
             TOTAL_AMOUNT_EGP,
      
             STATUS,
             NOTES,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             IS_DELETED,
             DELETED,
             DELETED_BY,
             MAIN_RES_ID,
             STATUS_CODE,
             PASSENGERS_NO,
             LUGGAGE_NO,
             REQUEST_TYPE
        from SUBLEVEL_LIMO_RES
        where sub_res_id = :P6001_PRODUCT_ID
    page-items-to-submit: 
    - APP_USER_ID
    - P6001_PRODUCT_ID

  order-by: 
    type: Item
    item: 
      item-name: P6001_ORDER_BY
      order-bys: 
      - key: PICK_UP_TIME
        clause: PICK_UP_TIME

      - key: RESERVATION_ID
        clause: RESERVATION_ID

  layout: 
    sequence: 10
    parent-region: Product Request Details # 276692781861178469
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Blank with Attributes (No Grid)
    template-options: 
    - '#DEFAULT#'
    - margin-bottom-none
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
