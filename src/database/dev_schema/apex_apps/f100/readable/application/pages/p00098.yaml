- # ====== Region: Client Events ===============================
  id: 206739756205892971
  identification: 
    name: Client Events
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html CLOB := '';
      BEGIN
          l_html := l_html || '
          <div class="client-events-timeline">';
      
          FOR r IN (
              SELECT
                  event_id,
                  event_type,
                  event_source,
                  related_entity,
                  related_id,
                  event_date,
                  event_data_json,
                  created_by
              FROM client_events
              WHERE client_id = :P98_ID
              ORDER BY event_date DESC
          ) LOOP
      
              l_html := l_html || '
              <div class="event-row">
                  <div class="event-dot"></div>
      
                  <div class="event-card">
                      <div class="event-header">
                          <span class="event-type">' || apex_escape.html(r.event_type) || '</span>
                          <span class="event-source">' || apex_escape.html(r.event_source) || '</span>
                      </div>
      
                      <div class="event-meta">
                          <span class="event-date">'
                              || TO_CHAR(r.event_date, 'DD Mon YYYY HH24:MI') ||
                          '</span>';
      
              IF r.related_entity IS NOT NULL THEN
                  l_html := l_html || '
                          <span class="event-related">'
                              || apex_escape.html(r.related_entity)
                              || NVL2(r.related_id, ' #' || apex_escape.html(r.related_id), '') ||
                          '</span>';
              END IF;
      
              l_html := l_html || '
                      </div>';
      
              IF r.event_data_json IS NOT NULL THEN
                  l_html := l_html || '
                      <details class="event-json">
                          <summary>View details</summary>
                          <pre>'
                              || apex_escape.html(r.event_data_json) ||
                          '</pre>
                      </details>';
              END IF;
      
              l_html := l_html || '
                      <div class="event-footer">
                          Created by: ' || apex_escape.html(r.created_by) || '
                      </div>
                  </div>
              </div>';
          END LOOP;
      
          l_html := l_html || '</div>';
      
          RETURN l_html;
      END;

