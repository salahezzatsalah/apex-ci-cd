- # ====== Region: Main Reservations ===========================
  id: 215026692754397474
  identification: 
    name: Main Reservations
    title: طلبات العميل
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
        FUNCTION jsq(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN REPLACE(NVL(p_txt,''), '''', '\''' );
        END;
      
      BEGIN
        /* ==========================================================
           Ticket CSS + JS
           ========================================================== */
        l_html := l_html || '
        <style>
          .ticket-grid{ display:grid; gap:10px; }
          @media (min-width: 640px){ .ticket-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
          @media (min-width: 1280px){ .ticket-grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); } }
      
          .ticket{
            position:relative; border-radius:14px; background:#fff;
            border:1px solid rgba(15,23,42,.10);
            box-shadow: 0 10px 30px rgba(15,23,42,.06);
            overflow:hidden; min-height: 148px; cursor:pointer;
          }
      
          .ticket:before, .ticket:after{
            content:""; position:absolute; top:52%;
            width:18px; height:18px; background:#f6f7fb;
            border:1px solid rgba(15,23,42,.10);
            border-radius:999px; transform: translateY(-50%);
            z-index:3;
          }
          .ticket:before{ left:-9px; }
          .ticket:after{ right:-9px; }
      
          .ticket-topbar{ height:6px; background: linear-gradient(90deg, #0b2a4a, #f59e0b); }
      
          /* ✅ UPDATED: head with optional photo */
          .ticket-head{
            padding:10px 12px 8px 12px;
            display:flex;
            gap:10px;
            align-items:flex-start;
          }
      
          .ticket-photo{
            width:54px;
            height:54px;
            border-radius:12px;
            object-fit:cover;
            border:1px solid rgba(15,23,42,.10);
            background:#f6f7fb;
            flex:0 0 auto;
          }
          .ticket-head-content{
            flex:1;
            min-width:0;
          }
      
          /* ===== NEW aligned header grid ===== */
          .ticket-head-grid{
            display:grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            gap:6px 10px;
            align-items:center;
          }
          .ticket-head-title{
            grid-column:1;
            grid-row:1;
            min-width:0;
          }
          .ticket-head-status{
            grid-column:2;
            grid-row:1;
            align-self:center;
          }
          .ticket-head-ids{
            grid-column:1;
            grid-row:2;
            min-width:0;
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
          }
          .ticket-head-copy{
            grid-column:2;
            grid-row:2;
            align-self:center;
          }
      
          .ticket-type{
            font-size:12px; font-weight:800; color:#0f172a;
            display:flex; align-items:center; gap:6px; min-width:0;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
          }
          .ticket-mainid{
            font-size:10px; font-weight:900; color:#64748b;
            background:rgba(15,23,42,.06);
            border:1px solid rgba(15,23,42,.10);
            padding:2px 8px; border-radius:999px;
            flex:0 0 auto;
          }
      
          .ticket-id{ font-size:10px; color:#64748b; font-weight:700; }
      
          .ticket-link{
            font-size:10px; font-weight:900; color:#2563eb;
            text-decoration:underline;
            cursor:pointer;
            user-select:none;
          }
      
          .copy-chip{
            display:inline-flex; align-items:center; justify-content:center;
            gap:6px;
            font-size:10px; font-weight:900;
            padding:6px 10px;
            border-radius:999px;
            border:1px solid rgba(15,23,42,.12);
            background:#fff;
            cursor:pointer;
            user-select:none;
            transition:.12s;
            height:28px;
            line-height:1;
            white-space:nowrap;
          }
          .copy-chip:hover{ transform: translateY(-1px); }
          .copy-chip:active{ transform: translateY(0px); }
      
          .pill{
            font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px;
            border:1px solid rgba(15,23,42,.10);
            display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
            height:28px;
            line-height:1;
          }
          .pill-dot{ width:6px;height:6px;border-radius:999px; background:#94a3b8; }
      
          .ticket-body{ padding:0 12px 10px 12px; }
          .ticket-title{ font-size:12px; font-weight:900; color:#0f172a; line-height:1.25; margin-bottom:6px; }
          .ticket-subtitle{ font-size:11px; font-weight:800; color:#334155; line-height:1.25; margin-bottom:6px; }
      
          .ticket-meta{
            display:flex; justify-content:space-between; gap:8px;
            border-top:1px dashed rgba(15,23,42,.18);
            padding-top:8px; margin-top:8px;
          }
      
          .meta-col{ min-width:0; }
          .meta-label{ font-size:10px; color:#64748b; font-weight:700; }
          .meta-value{ font-size:11px; color:#0f172a; font-weight:800; }
      
          .ticket-price{ font-size:12px; font-weight:900; color:#0b2a4a; }
          .ticket-price-egp{ font-size:10px; font-weight:800; color:#64748b; margin-top:2px; }
      
          .ticket-actions{ display:flex; gap:8px; padding:10px 12px 12px 12px; justify-content:space-between; }
          .btn{
            flex:1; font-size:11px; font-weight:900; padding:8px 10px;
            border-radius:10px; border:1px solid rgba(15,23,42,.12);
            cursor:pointer; transition:.15s; text-align:center; user-select:none;
          }
          .btn:hover{ transform: translateY(-1px); }
          .btn-assign{ background:#0b2a4a; color:#fff; }
          .btn-complete{ background:#f59e0b; color:#111827; }
          .btn-disabled{ opacity:.45; cursor:not-allowed; transform:none !important; }
      
          .ticket-bg-new{ background: linear-gradient(180deg, rgba(245,158,11,.10), rgba(255,255,255,1) 55%); }
          .ticket-bg-progress{ background: linear-gradient(180deg, rgba(11,42,74,.12), rgba(255,255,255,1) 55%); }
          .ticket-bg-done{ background: linear-gradient(180deg, rgba(34,197,94,.10), rgba(255,255,255,1) 55%); }
          .ticket-bg-cancel{ background: linear-gradient(180deg, rgba(239,68,68,.10), rgba(255,255,255,1) 55%); }
        </style>
      
        <script>
          function goToUrl(url){
            if(!url){ return; }
            apex.navigation.redirect(url);
          }
      
          function openAssignUrl(url, ev){
            if(ev){ ev.stopPropagation(); ev.preventDefault(); }
            if(!url){
              apex.message.showErrors([{
                type: "error",
                location: "page",
                message: "لا يوجد رابط توزيع لهذه الخدمة.",
                unsafe: false
              }]);
              return;
            }
            apex.navigation.dialog(
              url,
              { title: "استمارة التوزيع", height: "auto", width: 720, maxWidth: 960, modal: true },
              "t-Dialog-page--standard"
            );
          }
      
          function completeService(orderItemId, ev){
            if(ev){ ev.stopPropagation(); ev.preventDefault(); }
            apex.message.showPageSuccess("تم إرسال طلب إكمال الخدمة للعنصر: " + orderItemId);
          }
      
          function copyText(txt, ev){
            if(ev){ ev.stopPropagation(); ev.preventDefault(); }
            if(!txt){ return; }
      
            try{
              if(navigator && navigator.clipboard && navigator.clipboard.writeText){
                navigator.clipboard.writeText(txt).then(function(){
                  apex.message.showPageSuccess("تم النسخ: " + txt);
                }).catch(function(){
                  fallbackCopy(txt);
                });
              }else{
                fallbackCopy(txt);
              }
            }catch(e){
              fallbackCopy(txt);
            }
          }
      
          function fallbackCopy(txt){
            var ta = document.createElement("textarea");
            ta.value = txt;
            ta.setAttribute("readonly","");
            ta.style.position = "fixed";
            ta.style.top = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            try{ document.execCommand("copy"); }catch(e){}
            document.body.removeChild(ta);
            apex.message.showPageSuccess("تم النسخ: " + txt);
          }
        </script>
        ';
      
        /* ==========================================================
           Grid container
           ========================================================== */
        l_html := l_html || '<div class="ticket-grid" dir="rtl">';
      
        /* ==========================================================
           Items Loop (snapshot-driven + client info + limo photo)
           ========================================================== */
        FOR it IN (
          SELECT
            i.order_item_id,
            i.item_type,
            i.ref_table,
            i.ref_id,
      
            /* Amounts */
            i.amount_orig,
            i.currency,
            i.amount_egp,
      
            i.created,
            i.fulfillment_status,
            i.fulfillment_updated_at,
            i.fulfillment_updated_by,
      
            /* Snapshot fields */
            i.display_title_ar,
            i.display_subtitle_ar,
            i.service_start_ts,
            i.service_end_ts,
            i.assigned_to_name,
            i.meta_json,
      
            /* Main order info */
            m.main_res_id,
            m.customer_id,
      
            /* Client info */
            c.client_code,
            ph.contact_value AS client_phone,
      
            /* ✅ NEW: limo car type + main photo */
            lr.cat_item_id      AS car_type_id,
            ct.main_photo_url   AS service_photo_url
      
          FROM order_items i
          JOIN main_reservations m
            ON m.main_res_id = i.main_res_id
          LEFT JOIN clients c
            ON c.client_id = m.customer_id
          LEFT JOIN client_contacts ph
            ON ph.client_id = c.client_id
           AND ph.contact_type = 'PHONE'
      
          /* limo sublevel -> car type */
          LEFT JOIN sublevel_limo_res lr
            ON i.ref_table = 'SUBLEVEL_LIMO_RES'
           AND lr.sub_res_id = i.ref_id
          LEFT JOIN limo_car_types ct
            ON ct.car_type_id = lr.cat_item_id
      
          WHERE i.main_res_id = :P98_ACTIVEORDER
            AND NVL(i.is_cancelled,'N') = 'N'
          ORDER BY i.created DESC
        ) LOOP
      
          /* ===============================
             Status mapping + routing URLs
             =============================== */
          DECLARE
            v_status_code VARCHAR2(30) := NVL(it.fulfillment_status,'NEW');
            v_status_ar   VARCHAR2(100);
            v_bg_class    VARCHAR2(200);
            v_dot_color   VARCHAR2(50);
      
            v_assign_on   BOOLEAN := FALSE;
            v_complete_on BOOLEAN := FALSE;
      
            v_details_url VARCHAR2(4000);
            v_assign_url  VARCHAR2(4000);
      
            v_start_label VARCHAR2(200);
            v_title_ar    VARCHAR2(500);
            v_sub_ar      VARCHAR2(1000);
      
            v_nod         VARCHAR2(50);
            v_ticket_no   VARCHAR2(300);
            v_signage     VARCHAR2(300);
      
            v_phone       VARCHAR2(200);
            v_client_code VARCHAR2(200);
            v_copy_text   VARCHAR2(4000);
      
            /* ✅ NEW: image url */
            v_img_url     VARCHAR2(4000);
          BEGIN
            v_details_url := order_router_util.details_url(
              p_ref_table => it.ref_table,
              p_ref_id    => it.ref_id
            );
      
            v_assign_url := order_router_util.assign_url(
              p_ref_table => it.ref_table,
              p_ref_id    => it.ref_id
            );
      
            IF v_status_code IN ('NEW','PENDING_OPS') THEN
              v_status_ar := 'جديد';
              v_bg_class  := 'ticket-bg-new';
              v_dot_color := '#f59e0b';
              v_assign_on := TRUE;
      
            ELSIF v_status_code IN ('ASSIGNED') THEN
              v_status_ar   := 'تم التوزيع';
              v_bg_class    := 'ticket-bg-progress';
              v_dot_color   := '#0b2a4a';
              v_complete_on := TRUE;
      
            ELSIF v_status_code IN ('IN_PROGRESS') THEN
              v_status_ar   := 'قيد التنفيذ';
              v_bg_class    := 'ticket-bg-progress';
              v_dot_color   := '#0b2a4a';
              v_complete_on := TRUE;
      
            ELSIF v_status_code IN ('COMPLETED') THEN
              v_status_ar := 'مكتملة';
              v_bg_class  := 'ticket-bg-done';
              v_dot_color := '#22c55e';
      
            ELSIF v_status_code IN ('CANCELLED','FAILED') THEN
              v_status_ar := 'ملغية';
              v_bg_class  := 'ticket-bg-cancel';
              v_dot_color := '#ef4444';
      
            ELSE
              v_status_ar := v_status_code;
              v_bg_class  := 'ticket-bg-new';
              v_dot_color := '#94a3b8';
            END IF;
      
            /* fallback titles */
            v_title_ar := NVL(it.display_title_ar,
                              CASE
                                WHEN it.ref_table = 'SUBLEVEL_LIMO_RES' THEN '🚗 ليموزين'
                                WHEN it.ref_table = 'SUBLEVEL_FAST_TRACK_RES' THEN '✈️ فاست تراك'
                                WHEN it.ref_table = 'SUBLEVEL_APARTMENT_RES' THEN '🏠 شقق'
                                ELSE NVL(it.item_type,'خدمة')
                              END);
      
            v_sub_ar := NVL(it.display_subtitle_ar, '');
      
            /* start label */
            v_start_label :=
              CASE
                WHEN it.service_start_ts IS NOT NULL THEN TO_CHAR(it.service_start_ts,'DD/MM/YYYY HH24:MI')
              END;
      
            /* client */
            v_phone       := it.client_phone;
            v_client_code := it.client_code;
      
            /* ✅ image url logic (LIMO only) */
            v_img_url :=
              CASE
                WHEN it.ref_table = 'SUBLEVEL_LIMO_RES' AND it.service_photo_url IS NOT NULL THEN it.service_photo_url
                WHEN it.ref_table = 'SUBLEVEL_LIMO_RES' THEN '#APP_FILES#placeholders/unknown-car.png'
                ELSE NULL
              END;
      
            /* read meta_json (optional) */
            BEGIN
              v_nod := JSON_VALUE(it.meta_json, '$.nod');
            EXCEPTION WHEN OTHERS THEN
              v_nod := NULL;
            END;
      
            BEGIN
              v_ticket_no := JSON_VALUE(it.meta_json, '$.ticketNumber');
            EXCEPTION WHEN OTHERS THEN
              v_ticket_no := NULL;
            END;
      
            BEGIN
              v_signage := JSON_VALUE(it.meta_json, '$.signage');
            EXCEPTION WHEN OTHERS THEN
              v_signage := NULL;
            END;
      
            /* copy payload */
            v_copy_text :=
              'MAIN: '||it.main_res_id
              ||' | ITEM: '||it.order_item_id
              ||CASE WHEN v_phone IS NOT NULL THEN ' | PHONE: '||v_phone ELSE '' END
              ||CASE WHEN v_client_code IS NOT NULL THEN ' | CODE: '||v_client_code ELSE '' END;
      
            /* ===============================
               Ticket HTML
               =============================== */
            l_html := l_html || '
            <div class="ticket '||v_bg_class||'" onclick="goToUrl('''||jsq(v_details_url)||''')">
              <div class="ticket-topbar"></div>
      
              <div class="ticket-head">
                '|| CASE
                      WHEN v_img_url IS NOT NULL THEN
                        '<img class="ticket-photo" src="'||esc(v_img_url)||'" alt="service"/>'
                      ELSE
                        ''
                    END ||'
                <div class="ticket-head-content">
                  <div class="ticket-head-grid">
      
                    <div class="ticket-head-title">
                      <div class="ticket-type">
                        <span>'||esc(v_title_ar)||'</span>
                        <span class="ticket-mainid">('||esc(it.main_res_id)||')</span>
                      </div>
                    </div>
      
                    <div class="ticket-head-status">
                      <div class="pill">
                        <span class="pill-dot" style="background:'||v_dot_color||'"></span>
                        <span>'||esc(v_status_ar)||'</span>
                      </div>
                    </div>
      
                    <div class="ticket-head-ids">
                      <span class="ticket-id">#'||esc(it.order_item_id)||'</span>
            ';
      
            /* phone as clickable copy (same style as order id) */
            IF v_phone IS NOT NULL AND LENGTH(TRIM(v_phone)) > 0 THEN
              l_html := l_html || '
                      <span class="ticket-link" onclick="copyText('''||jsq(v_phone)||''', event)">'||esc(v_phone)||'</span>
              ';
            END IF;
      
            /* client code */
            IF v_client_code IS NOT NULL AND LENGTH(TRIM(v_client_code)) > 0 THEN
              l_html := l_html || '
                      <span class="ticket-id">'||esc(v_client_code)||'</span>
              ';
            END IF;
      
            l_html := l_html || '
                    </div>
      
                    <div class="ticket-head-copy">
                      <span class="copy-chip" onclick="copyText('''||jsq(v_copy_text)||''', event)">نسخ البيانات</span>
                    </div>
      
                  </div>
                </div>
              </div>
      
              <div class="ticket-body">
            ';
      
            IF v_sub_ar IS NOT NULL AND LENGTH(TRIM(v_sub_ar)) > 0 THEN
              l_html := l_html || '
                <div class="ticket-subtitle">'||esc(v_sub_ar)||'</div>
              ';
            END IF;
      
            l_html := l_html || '
                <div class="ticket-meta">
                  <div class="meta-col">
                    <div class="meta-label">تاريخ البداية</div>
                    <div class="meta-value">'||esc(v_start_label)||'</div>
            ';
      
            /* show assigned to (if any) */
            IF it.assigned_to_name IS NOT NULL THEN
              l_html := l_html || '
                    <div style="margin-top:6px">
                      <div class="meta-label">تم التوزيع إلى</div>
                      <div class="meta-value">'||esc(it.assigned_to_name)||'</div>
                    </div>
              ';
            END IF;
      
            l_html := l_html || '
                  </div>
      
                  <div class="meta-col" style="text-align:left">
                    <div class="meta-label">السعر</div>
      
                    <div class="ticket-price">'
                      || esc(TO_CHAR(NVL(it.amount_orig,0),'FM999G999G990D00'))
                      || ' ' || esc(it.currency) ||
                    '</div>
      
                    <div class="ticket-price-egp">≈ '
                      || esc(TO_CHAR(NVL(it.amount_egp,0),'FM999G999G990D00'))
                      || ' EGP</div>
                  </div>
                </div>
            ';
      
            /* extra small info from JSON */
            IF v_nod IS NOT NULL OR v_ticket_no IS NOT NULL OR v_signage IS NOT NULL THEN
              l_html := l_html || '
                <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
              ';
      
              IF v_nod IS NOT NULL THEN
                l_html := l_html || '
                  <span class="pill" style="font-size:10px;padding:3px 8px;height:auto;">
                    <span class="pill-dot" style="background:#94a3b8"></span>
                    <span>'||esc('عدد الأيام: '||v_nod)||'</span>
                  </span>
                ';
              END IF;
      
              IF v_ticket_no IS NOT NULL AND LENGTH(TRIM(v_ticket_no)) > 0 THEN
                l_html := l_html || '
                  <span class="pill" style="font-size:10px;padding:3px 8px;height:auto;">
                    <span class="pill-dot" style="background:#0b2a4a"></span>
                    <span>'||esc('رقم التذكرة: '||v_ticket_no)||'</span>
                  </span>
                ';
              END IF;
      
              IF v_signage IS NOT NULL AND LENGTH(TRIM(v_signage)) > 0 THEN
                l_html := l_html || '
                  <span class="pill" style="font-size:10px;padding:3px 8px;height:auto;">
                    <span class="pill-dot" style="background:#f59e0b"></span>
                    <span>'||esc('اللافتة: '||v_signage)||'</span>
                  </span>
                ';
              END IF;
      
              l_html := l_html || '
                </div>
              ';
            END IF;
      
            l_html := l_html || '
              </div>
      
              <div class="ticket-actions">
            ';
      
            /* Assign Button */
            IF v_assign_on THEN
              l_html := l_html || '
                <div class="btn btn-assign" onclick="openAssignUrl('''||jsq(v_assign_url)||''', event)">توزيع</div>
              ';
            ELSE
              l_html := l_html || '
                <div class="btn btn-assign btn-disabled" onclick="event.stopPropagation();event.preventDefault();">توزيع</div>
              ';
            END IF;
      
            /* Complete Button */
            IF v_complete_on THEN
              l_html := l_html || '
                <div class="btn btn-complete" onclick="completeService('''||jsq(it.order_item_id)||''', event)">إكمال</div>
              ';
            ELSE
              l_html := l_html || '
                <div class="btn btn-complete btn-disabled" onclick="event.stopPropagation();event.preventDefault();">إكمال</div>
              ';
            END IF;
      
            l_html := l_html || '
              </div>
            </div>
            ';
      
          END;
        END LOOP;
      
        l_html := l_html || '</div>';
      
        IF l_html IS NULL OR LENGTH(l_html) < 200 THEN
          l_html := '<div style="text-align:center;color:#64748b;padding:20px;font-weight:800">لا توجد خدمات في هذا الطلب</div>';
        END IF;
      
        RETURN l_html;
      END;

