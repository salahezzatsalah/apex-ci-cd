- # ====== Region: تفاصيل ملف العميل ===========================
  id: 18977021883601085552
  identification: 
    name: تفاصيل ملف العميل
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          c.client_id,
          c.client_code,
          c.full_name,
          NVL(c.country_name, '—') AS country_name,
          cc.contact_value         AS phone,
          cu.status                AS user_status,
          cu.verified,
          TO_CHAR(c.created_at, 'DD Mon YYYY') AS joined_on
      FROM clients c
      LEFT JOIN client_contacts cc
        ON cc.client_id = c.client_id
       AND cc.contact_type = 'PHONE'
       AND cc.is_primary = 'Y'
      LEFT JOIN customer_users cu
        ON cu.client_id = c.client_id
       where cc.client_id = :P98_ID
