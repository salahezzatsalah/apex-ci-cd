- # ====== Region: Main Reservations ===========================
  id: 201397469460641769
  identification: 
    name: Main Reservations
    title: طلبات العميل
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
        FUNCTION jsq(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN REPLACE(NVL(p_txt,''), '''', '\''' );
        END;
      
      BEGIN
        /* ===============================
           If no customer selected
           =============================== */
        IF :P98_ID IS NULL THEN
          RETURN '<div style="text-align:center;color:#64748b;padding:20px;font-weight:1000">
                    اختر عميل أولاً لعرض سجل الطلبات
                  </div>';
        END IF;
      
        l_html := l_html || '
        <style>
          .tb-wrap{display:flex;flex-direction:column;gap:14px;}
      
          .tb-card{
            background:#fff;border:1px solid rgba(15,23,42,.10);
            border-radius:18px;overflow:hidden;
            box-shadow:0 10px 30px rgba(15,23,42,.06);
          }
      
          .tb-head{
            padding:14px 14px 10px 14px;
            display:flex;justify-content:space-between;gap:12px;
            cursor:pointer;user-select:none;
            background:linear-gradient(180deg, rgba(15,23,42,.02), rgba(255,255,255,1) 60%);
          }
      
          .tb-left{min-width:0;display:flex;flex-direction:column;gap:6px;}
      
          .tb-title{
            display:flex;align-items:center;gap:10px;flex-wrap:wrap;
            font-size:13px;font-weight:1000;color:#0f172a;
          }
      
          .tb-id{
            font-size:11px;font-weight:900;color:#64748b;
            padding:2px 8px;border-radius:999px;
            background:rgba(15,23,42,.06);
            border:1px solid rgba(15,23,42,.10);
          }
      
          .tb-pill{
            display:inline-flex;align-items:center;gap:6px;
            padding:5px 10px;border-radius:999px;
            font-size:11px;font-weight:900;
            border:1px solid rgba(15,23,42,.12);
            background:#fff;white-space:nowrap;
          }
          .tb-dot{width:6px;height:6px;border-radius:999px;background:#94a3b8;}
      
          .tb-sub{
            display:flex;gap:10px;flex-wrap:wrap;
            font-size:11px;font-weight:800;color:#334155;
          }
      
          .tb-right{
            flex:0 0 auto;display:flex;flex-direction:column;
            align-items:flex-end;justify-content:space-between;
            gap:8px;min-width:170px;
          }
      
          .tb-total{text-align:left;font-size:13px;font-weight:1000;color:#0b2a4a;}
          .tb-total small{
            display:block;font-size:10px;font-weight:800;color:#64748b;margin-top:2px;
          }
      
          .tb-action{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:1000;color:#0b2a4a;}
          .tb-arrow{
            width:34px;height:34px;border-radius:14px;
            border:1px solid rgba(15,23,42,.12);
            display:flex;align-items:center;justify-content:center;
            background:#fff;transition:.15s;
            font-size:14px;font-weight:900;
          }
          .tb-card.open .tb-arrow{transform:rotate(180deg);}
      
          .tb-body{
            display:none;padding:10px 14px 14px 14px;
            border-top:1px dashed rgba(15,23,42,.18);background:#fff;
          }
          .tb-card.open .tb-body{display:block;}
      
          .tb-items{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
      
          .tb-item{
            display:flex;justify-content:space-between;gap:12px;
            padding:10px 12px;border-radius:14px;
            border:1px solid rgba(15,23,42,.08);
            background:rgba(15,23,42,.02);
            cursor:pointer;
            transition:.12s;
          }
          .tb-item:hover{
            transform: translateY(-1px);
            box-shadow:0 10px 24px rgba(15,23,42,.06);
            background:rgba(245,158,11,.08);
          }
      
          .tb-item-left{min-width:0;display:flex;flex-direction:column;gap:6px;}
      
          .tb-item-title-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
          }
      
          .tb-item-title{
            font-size:12px;font-weight:1000;color:#0f172a;line-height:1.25;
            min-width:0;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
          }
      
          .tb-item-time{
            flex:0 0 auto;
            font-size:11px;
            font-weight:900;
            color:#64748b;
            white-space:nowrap;
            text-align:left;
          }
      
          .tb-item-subtitle{
            font-size:11px;
            font-weight:800;
            color:#334155;
            line-height:1.25;
            opacity:.95;
          }
      
          /* ===== Compact pills under subtitle (ticket-style) ===== */
          .tb-mini-pills{
            display:flex;
            gap:6px;
            flex-wrap:wrap;
            margin-top:2px;
          }
          .tb-mini-pill{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:3px 8px;
            border-radius:999px;
            border:1px solid rgba(15,23,42,.10);
            background:#fff;
            font-size:10px;
            font-weight:900;
            color:#334155;
            line-height:1;
            white-space:nowrap;
            max-width:100%;
          }
          .tb-mini-dot{
            width:6px;height:6px;border-radius:999px;background:#94a3b8;
            flex:0 0 auto;
          }
      
          .tb-item-pricebox{
            text-align:left;
            min-width:150px;
            display:flex;
            flex-direction:column;
            align-items:flex-end;
            gap:4px;
            white-space:nowrap;
          }
      
          .tb-item-price{
            font-size:12px;font-weight:1000;color:#0b2a4a;
          }
      
          .tb-item-price-orig{
            font-size:10px;
            font-weight:900;
            color:#64748b;
          }
      
          .tb-item-qty-right{
            font-size:10px;
            font-weight:1000;
            color:#64748b;
          }
      
          .tb-summary{
            margin-top:12px;padding:12px;border-radius:16px;
            border:1px solid rgba(15,23,42,.10);
            background:rgba(245,158,11,.10);
            display:flex;flex-direction:column;gap:6px;
          }
          .tb-row{display:flex;justify-content:space-between;gap:10px;font-size:11px;font-weight:900;color:#334155;}
          .tb-row strong{font-size:12px;font-weight:1000;color:#0f172a;}
        </style>
      
        <script>
          function tbToggle(el){
            var card = el.closest(".tb-card");
            if(!card){ return; }
            card.classList.toggle("open");
          }
      
          function goToUrl(url){
            if(!url){ return; }
            apex.navigation.redirect(url);
          }
        </script>
        ';
      
        l_html := l_html || '<div class="tb-wrap" dir="rtl">';
      
        /* ===============================
           MAIN ORDERS
           =============================== */
        FOR m IN (
          SELECT
            m.main_res_id,
            m.customer_id,
            m.status,
            m.created,
            m.opened_at,
      
            ( SELECT NVL(SUM(NVL(i.amount_egp,0)),0)
                FROM order_items i
               WHERE i.main_res_id = m.main_res_id
                 AND NVL(i.is_cancelled,'N') = 'N'
            ) AS total_amount_egp,
      
            ( SELECT COUNT(*)
                FROM order_items i
               WHERE i.main_res_id = m.main_res_id
                 AND NVL(i.is_cancelled,'N') = 'N'
            ) AS items_count
      
          FROM main_reservations m
          WHERE m.customer_id = :P98_ID
          ORDER BY m.created DESC
        ) LOOP
      
          DECLARE
            v_status_ar VARCHAR2(100);
            v_dot       VARCHAR2(20);
            v_when_txt  VARCHAR2(200);
          BEGIN
            IF UPPER(NVL(m.status,'X')) IN ('COMPLETED','DONE','FINISHED') THEN
              v_status_ar := 'مكتمل';
              v_dot := '#22c55e';
            ELSIF UPPER(NVL(m.status,'X')) IN ('CANCELLED','CANCELED') THEN
              v_status_ar := 'ملغي';
              v_dot := '#ef4444';
            ELSE
              v_status_ar := NVL(m.status,'نشط');
              v_dot := '#f59e0b';
            END IF;
      
            v_when_txt :=
              CASE
                WHEN m.opened_at IS NOT NULL THEN TO_CHAR(m.opened_at,'DD/MM/YYYY HH24:MI')
                WHEN m.created   IS NOT NULL THEN TO_CHAR(m.created,'DD/MM/YYYY HH24:MI')
                ELSE NULL
              END;
      
            l_html := l_html || '
            <div class="tb-card">
              <div class="tb-head" onclick="tbToggle(this)">
      
                <div class="tb-left">
                  <div class="tb-title">
                    <span>طلب</span>
                    <span class="tb-id">'||esc(m.main_res_id)||'</span>
                    '||CASE
                        WHEN v_when_txt IS NOT NULL THEN
                          '<span class="tb-pill"><span class="tb-dot"></span><span>'||esc(v_when_txt)||'</span></span>'
                        ELSE
                          ''
                      END||'
                  </div>
      
                  <div class="tb-sub">
                    <span class="tb-pill">
                      <span class="tb-dot" style="background:'||v_dot||'"></span>
                      <span>'||esc(v_status_ar)||'</span>
                    </span>
      
                    <span class="tb-pill">
                      <span class="tb-dot"></span>
                      <span>عدد الخدمات: '||esc(m.items_count)||'</span>
                    </span>
                  </div>
                </div>
      
                <div class="tb-right">
                  <div class="tb-total">
                    '||esc(TO_CHAR(NVL(m.total_amount_egp,0),'FM999G999G990D00'))||' EGP
                    <small>الإجمالي</small>
                  </div>
      
                  <div class="tb-action">
                    <span>عرض التفاصيل</span>
                    <div class="tb-arrow">⌄</div>
                  </div>
                </div>
      
              </div>
      
              <div class="tb-body">
                <div class="tb-items">
            ';
      
            /* ===============================
               ORDER ITEMS
               =============================== */
            FOR it IN (
              SELECT
                i.order_item_id,
                i.ref_table,
                i.ref_id,
      
                NVL(i.display_title_ar, i.item_type) AS title_ar,
                i.display_subtitle_ar AS subtitle_ar,
      
                i.amount_egp,
                i.amount_orig,
                i.currency,
      
                i.service_start_ts,
                i.meta_json,
      
                NVL(
                  TO_NUMBER(
                    JSON_VALUE(i.meta_json, '$.qty' RETURNING VARCHAR2(50) DEFAULT '1' ON ERROR)
                  ),
                  1
                ) AS qty
              FROM order_items i
              WHERE i.main_res_id = m.main_res_id
                AND NVL(i.is_cancelled,'N') = 'N'
              ORDER BY i.order_item_id
            ) LOOP
      
              DECLARE
                v_details_url VARCHAR2(4000);
      
                v_nod       VARCHAR2(50);
                v_ticket_no VARCHAR2(300);
                v_signage   VARCHAR2(300);
              BEGIN
                v_details_url := order_router_util.details_url(
                                   p_ref_table => it.ref_table,
                                   p_ref_id    => it.ref_id
                                 );
      
                /* meta pills */
                BEGIN
                  v_nod := JSON_VALUE(it.meta_json, '$.nod');
                EXCEPTION WHEN OTHERS THEN
                  v_nod := NULL;
                END;
      
                BEGIN
                  v_ticket_no := JSON_VALUE(it.meta_json, '$.ticketNumber');
                EXCEPTION WHEN OTHERS THEN
                  v_ticket_no := NULL;
                END;
      
                BEGIN
                  v_signage := JSON_VALUE(it.meta_json, '$.signage');
                EXCEPTION WHEN OTHERS THEN
                  v_signage := NULL;
                END;
      
                l_html := l_html || '
                  <div class="tb-item" onclick="goToUrl('''||jsq(v_details_url)||''')">
                    <div class="tb-item-left">
      
                      <div class="tb-item-title-row">
                        <div class="tb-item-title">'||esc(NVL(it.title_ar,'خدمة'))||'</div>
                        <div class="tb-item-time">'
                          ||esc(
                            CASE
                              WHEN it.service_start_ts IS NOT NULL THEN TO_CHAR(it.service_start_ts,'DD/MM/YYYY HH24:MI')
                              ELSE ''
                            END
                          )||
                        '</div>
                      </div>
                ';
      
                IF it.subtitle_ar IS NOT NULL AND LENGTH(TRIM(it.subtitle_ar)) > 0 THEN
                  l_html := l_html || '
                      <div class="tb-item-subtitle">'||esc(it.subtitle_ar)||'</div>
                  ';
                END IF;
      
                /* ===== Pills under subtitle (nod / ticket / signage) ===== */
                IF (v_nod IS NOT NULL AND LENGTH(TRIM(v_nod)) > 0)
                   OR (v_ticket_no IS NOT NULL AND LENGTH(TRIM(v_ticket_no)) > 0)
                   OR (v_signage IS NOT NULL AND LENGTH(TRIM(v_signage)) > 0) THEN
      
                  l_html := l_html || '
                      <div class="tb-mini-pills">
                  ';
      
                  IF v_nod IS NOT NULL AND LENGTH(TRIM(v_nod)) > 0 THEN
                    l_html := l_html || '
                        <span class="tb-mini-pill">
                          <span class="tb-mini-dot" style="background:#94a3b8"></span>
                          <span>'||esc('عدد الأيام: '||v_nod)||'</span>
                        </span>
                    ';
                  END IF;
      
                  IF v_ticket_no IS NOT NULL AND LENGTH(TRIM(v_ticket_no)) > 0 THEN
                    l_html := l_html || '
                        <span class="tb-mini-pill">
                          <span class="tb-mini-dot" style="background:#0b2a4a"></span>
                          <span>'||esc('رقم التذكرة: '||v_ticket_no)||'</span>
                        </span>
                    ';
                  END IF;
      
                  IF v_signage IS NOT NULL AND LENGTH(TRIM(v_signage)) > 0 THEN
                    l_html := l_html || '
                        <span class="tb-mini-pill">
                          <span class="tb-mini-dot" style="background:#f59e0b"></span>
                          <span>'||esc('اللافتة: '||v_signage)||'</span>
                        </span>
                    ';
                  END IF;
      
                  l_html := l_html || '
                      </div>
                  ';
                END IF;
      
                l_html := l_html || '
                    </div>
      
                    <div class="tb-item-pricebox">
                      <div class="tb-item-price">'
                        ||esc(TO_CHAR(NVL(it.amount_egp,0),'FM999G999G990D00'))||' EGP
                      </div>
      
                      <div class="tb-item-qty-right">x'||esc(it.qty)||'</div>
                ';
      
                IF NVL(UPPER(it.currency),'EGP') <> 'EGP' THEN
                  l_html := l_html || '
                      <div class="tb-item-price-orig">'
                        ||esc(TO_CHAR(NVL(it.amount_orig,0),'FM999G999G990D00'))||' '||esc(it.currency)||
                      '</div>
                  ';
                END IF;
      
                l_html := l_html || '
                    </div>
                  </div>
                ';
              END;
      
            END LOOP;
      
            l_html := l_html || '
                </div>
      
                <div class="tb-summary">
                  <div class="tb-row">
                    <span>عدد الخدمات</span>
                    <strong>'||esc(m.items_count)||'</strong>
                  </div>
      
                  <div class="tb-row">
                    <span>الإجمالي</span>
                    <strong>'||esc(TO_CHAR(NVL(m.total_amount_egp,0),'FM999G999G990D00'))||' EGP</strong>
                  </div>
                </div>
      
              </div>
            </div>
            ';
          END;
      
        END LOOP;
      
        l_html := l_html || '</div>';
      
        RETURN l_html;
      END;
      

