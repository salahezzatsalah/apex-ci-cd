- # ====== Region: Menubar =====================================
  id: 20297995619413170957
  identification: 
    name: Menubar
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          1 AS actions,
          REGEXP_REPLACE(
              REGEXP_REPLACE(cc.contact_value, '[^0-9]', ''),
              '^0',
              ''
          ) AS phone
      FROM client_contacts cc
      WHERE cc.client_id   = :P98_ID
        AND cc.contact_type = 'PHONE'
        AND cc.is_primary   = 'Y'
        AND ROWNUM = 1;
      
