- # ====== Region: Invoice Report ==============================
  id: 214999896195836357
  identification: 
    name: Invoice Report
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          i.invoice_id,
          i.invoice_no,
          i.status,
          i.invoice_date,
          i.due_date,
      
          i.main_res_id,
          m.customer_id,
      
          i.currency_code,
      
          i.vat_included,
          NVL(i.vat_rate, 0) AS vat_rate,
      
          /* ===== line summary ===== */
          ln.lines_count,
          ln.subtotal_lines,
      
          /* ===== net before vat ===== */
          ln.subtotal_lines AS net_before_vat,
      
          /* ===== VAT calc ===== */
          CASE
            WHEN NVL(i.vat_included,'Y') = 'Y'
              THEN ROUND(ln.subtotal_lines * NVL(i.vat_rate,0), 2)
            ELSE 0
          END AS vat_calc,
      
          /* ===== grand total calc ===== */
          ROUND(
            ln.subtotal_lines +
            CASE
              WHEN NVL(i.vat_included,'Y') = 'Y'
                THEN ROUND(ln.subtotal_lines * NVL(i.vat_rate,0), 2)
              ELSE 0
            END
          , 2) AS grand_calc,
      
          /* ===== stored totals ===== */
          i.total_amount,
          i.tax_amount,
          i.grand_total,
      
          /* ===== reconciliation ===== */
          ROUND(i.total_amount - ln.subtotal_lines, 2) AS diff_total,
      
          ROUND(
            i.tax_amount -
            CASE
              WHEN NVL(i.vat_included,'Y') = 'Y'
                THEN ROUND(ln.subtotal_lines * NVL(i.vat_rate,0), 2)
              ELSE 0
            END
          , 2) AS diff_tax,
      
          ROUND(
            i.grand_total -
            ROUND(
              ln.subtotal_lines +
              CASE
                WHEN NVL(i.vat_included,'Y') = 'Y'
                  THEN ROUND(ln.subtotal_lines * NVL(i.vat_rate,0), 2)
                ELSE 0
              END
            , 2)
          , 2) AS diff_grand,
      
          CASE
            WHEN ROUND(
              i.grand_total -
              ROUND(
                ln.subtotal_lines +
                CASE
                  WHEN NVL(i.vat_included,'Y') = 'Y'
                    THEN ROUND(ln.subtotal_lines * NVL(i.vat_rate,0), 2)
                  ELSE 0
                END
              , 2)
            , 2) = 0
            THEN 'OK'
            ELSE 'MISMATCH'
          END AS totals_check
      
      FROM invoices i
      
      JOIN main_reservations m
        ON m.main_res_id = i.main_res_id
      
      JOIN (
          SELECT
              invoice_id,
              COUNT(*) AS lines_count,
              NVL(SUM(total_price),0) AS subtotal_lines
          FROM invoice_lines
          GROUP BY invoice_id
      ) ln
        ON ln.invoice_id = i.invoice_id
      
      WHERE i.invoice_id = :P98_INVOICE_ID;
    page-items-to-submit: 
    - P98_INVOICE_ID

