dynamic-actions: 
- # ====== Dynamic Action: updatecurrency ======================
  id: 195831015447579186
  identification: 
    name: updatecurrency

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P250_TRIP_CURRENCY

  actions: 
  - # ====== Action: Set Value ===================================
    id: 195831153878579187
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT EXCHANGE_RATE_VALUE
        FROM V_CURRENCY_DETAILS
        WHERE CURRENCY_CODE = :P250_TRIP_CURRENCY
      items-to-submit: 
      - P250_TRIP_CURRENCY
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P250_EXCHANGE_RATE

    execution: 
      sequence: 10
      event: updatecurrency # 195831015447579186
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: Cancel Dialog =======================
  id: 195866555636695008
  identification: 
