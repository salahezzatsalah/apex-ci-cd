- # ====== Region: Expenses Break Down =========================
  id: 195904251676899278
  identification: 
    name: Expenses Break Down
    title: ملخص المصاريف
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html            CLOB := '';
          l_grand_total_egp NUMBER := 0;
      BEGIN
          /* =====================================================
             Guard clause
             ===================================================== */
          IF :P248_CARFILE IS NULL
             AND :P248_DRIVERID IS NULL
          THEN
              RETURN '
              <div class="settle-warning">
                  ⚠️ من فضلك اختر <b>السائق</b> أو <b>السيارة</b> لعرض تفصيل المصروفات.
              </div>';
          END IF;
      
          /* =====================================================
             HTML + CSS (Settlement Table Style)
             ===================================================== */
          l_html := '
          <style>
              .settlement-box {
                  max-width: 760px;
                  margin: auto;
                  background: #ffffff;
                  border: 1px solid #e5e7eb;
                  border-radius: 12px;
                  padding: 20px;
                  direction: rtl;
                  font-family: Tahoma, Arial;
              }
              .settlement-title {
                  font-size: 16px;
                  font-weight: 800;
                  margin-bottom: 14px;
              }
              table.settlement-table {
                  width: 100%;
                  border-collapse: collapse;
                  font-size: 13px;
              }
              table.settlement-table th {
                  background: #f9fafb;
                  color: #374151;
                  font-weight: 700;
                  text-align: right;
                  padding: 8px;
                  border-bottom: 1px solid #e5e7eb;
              }
              table.settlement-table td {
                  padding: 8px;
                  border-bottom: 1px solid #e5e7eb;
                  vertical-align: top;
              }
              table.settlement-table td.amount {
                  text-align: left;
                  font-weight: 700;
                  color: #b91c1c;
                  white-space: nowrap;
              }
              table.settlement-table td.breakdown {
                  font-size: 12px;
                  color: #374151;
                  line-height: 1.6;
              }
              tr.total-row td {
                  border-top: 2px solid #111827;
                  font-weight: 800;
                  background: #f9fafb;
              }
              .settle-warning {
                  padding: 16px;
                  border-radius: 12px;
                  background: #fffbeb;
                  border: 1px solid #fde68a;
                  color: #92400e;
                  direction: rtl;
              }
          </style>
      
          <div class="settlement-box">
              <div class="settlement-title">
                  🔻 تفصيل مصروفات التشغيل (حسب أيام العمل)
              </div>
      
              <table class="settlement-table">
                  <thead>
                      <tr>
                          <th style="width:140px;">📆 تاريخ التشغيل</th>
                          <th>تفصيل المصروفات</th>
                          <th style="width:160px;text-align:left;">إجمالي اليوم (EGP)</th>
                      </tr>
                  </thead>
                  <tbody>
          ';
      
          /* =====================================================
             Loop – expenses grouped by working day
             ===================================================== */
          FOR r IN (
              SELECT
                  TRUNC(e.EXPENSE_DATE) AS EXPENSE_DAY,
      
                  /* إجمالي مصروفات اليوم (محولة) */
                  SUM(NVL(e.AMOUNT,0) * NVL(e.EXCHANGE_RATE,1)) AS TOTAL_EXPENSE_EGP,
      
                  /* Breakdown باستخدام الاسم العربي */
                  LISTAGG(
                      '• ' || et.EXPENSE_TYPE_NAME || ': ' ||
                      TO_CHAR(e.AMOUNT,'FM999G999G999D00') || ' ' || e.CURRENCY,
                      '<br>'
                  ) WITHIN GROUP (ORDER BY NVL(et.SORTNO,999), et.EXPENSE_TYPE_NAME)
                  AS EXPENSE_BREAKDOWN
      
              FROM LIMO_TRIP_EXPENSES e
              JOIN LIMO_TRIPS_TRACKER_V2 t
                ON t.TRIP_ID = e.TRIP_ID
              LEFT JOIN LIMO_EXPENSE_TYPES et
                ON et.EXPENSE_TYPE_CODE = e.EXPENSE_TYPE
      
              WHERE e.EXPENSE_DATE IS NOT NULL
                AND NVL(e.AMOUNT,0) > 0
                AND t.SATTLE_STATUS <> 'SETTLED'
                AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
                AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
      
              GROUP BY TRUNC(e.EXPENSE_DATE)
              ORDER BY EXPENSE_DAY
          ) LOOP
      
              l_grand_total_egp := l_grand_total_egp + NVL(r.TOTAL_EXPENSE_EGP,0);
      
              l_html := l_html || '
                  <tr>
                      <td>'||TO_CHAR(r.EXPENSE_DAY,'DD Mon YYYY')||'</td>
                      <td class="breakdown">'||NVL(r.EXPENSE_BREAKDOWN,'—')||'</td>
                      <td class="amount">'||
                          TO_CHAR(r.TOTAL_EXPENSE_EGP,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>';
          END LOOP;
      
          /* =====================================================
             Grand total row
             ===================================================== */
          l_html := l_html || '
                  <tr class="total-row">
                      <td colspan="2">إجمالي المصروفات خلال فترة التسوية</td>
                      <td class="amount">'||
                          TO_CHAR(l_grand_total_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
              </tbody>
              </table>
      
              <div style="margin-top:8px;font-size:11px;color:#6b7280;">
                  * تم تجميع المصروفات حسب أيام التشغيل الفعلية وباستخدام أنواع المصروفات المعتمدة.
              </div>
          </div>';
      
          RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P248_DRIVERID
    - P248_CARFILE

  layout: 
    sequence: 70
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
