- # ====== Region: Expenses Break Down =========================
  id: 195768010196387886
  identification: 
    name: Expenses Break Down
    title: ملخص المصاريف
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          e.TRIP_ID,
          TRUNC(e.EXPENSE_DATE) AS EXPENSE_DAY,
      
          /* إجمالي المصروفات لليوم (محولة) */
          SUM(e.AMOUNT * NVL(e.EXCHANGE_RATE, 1)) AS TOTAL_EXPENSE_AMOUNT,
      
          /* تفصيل المصروفات حسب النوع والعملة */
          LISTAGG(
              e.EXPENSE_TYPE || ': ' ||
              TO_CHAR(e.AMOUNT, 'FM999G999G990D00') || ' ' || e.CURRENCY,
              ' | '
          ) WITHIN GROUP (ORDER BY e.EXPENSE_TYPE) AS EXPENSE_BREAKDOWN
      
      FROM LIMO_TRIP_EXPENSES e
      
      JOIN LIMO_TRIPS_TRACKER_V2 t
        ON t.TRIP_ID = e.TRIP_ID
      
      WHERE
          e.STATUS = 'APPROVED'
      AND (:P248_CARFILE IS NULL OR t.USED_CAR_ID = :P248_CARFILE)
      AND (:P248_DRIVERID IS NULL OR t.DRIVER_ID = :P248_DRIVERID)
      
      GROUP BY
          e.TRIP_ID,
          TRUNC(e.EXPENSE_DATE)
      
      ORDER BY
          e.TRIP_ID,
          EXPENSE_DAY;
      

  order-by: 
    type: None

