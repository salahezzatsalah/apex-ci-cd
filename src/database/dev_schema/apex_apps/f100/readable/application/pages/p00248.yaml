    exclude-title-from-translation: false

  header-and-footer: 
    footer-text: '#TIMING#'

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

