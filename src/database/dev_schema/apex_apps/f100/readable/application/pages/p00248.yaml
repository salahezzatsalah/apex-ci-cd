    name: Trips Report
    title: ملخص الرحلات
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select TRIP_ID,
             PRODUCT_ID,
             ASSIGNMENT_ID,
             DRIVER_ID,
             STATUS,
             START_DATETIME,
             END_DATETIME,
             USED_CAR_ID,
             USED_CAR_TYPE,
             EXECUTED_DATE,
             TRIP_CURRENCY,
             EXCHANGE_RATE,
             BASE_PRICE_EGP,
             ADDED_SERVICES_EGP,
             ADDED_SERVICES_CURRENCY,
            
             'ج.م' || TRIP_EXPENSES_EGP AS TRIP_EXPENSES_EGP,
             REVENUE_AFTER_EXPENSES_EGP,
             DRIVER_SHARE_TYPE,
             DRIVER_SHARE_VALUE,
             DRIVER_SHARE_FROM_TRIP_EGP,
             DRIVER_SHARE_FROM_SERVICES_EGP,
             TOTAL_DRIVER_PAYOUT_EGP,
             TOTAL_INVOICE_EGP,
             TOTAL_INVOICE_CURRENCY,
             OFFICE_NET_EGP,
             OFFICE_NET_CURRENCY,
             PAID_AMOUNT_EGP,
             PAID_AMOUNT_ORIG_CURR,
             OUTSTANDING_AMOUNT_EGP,
             OUTSTANDING_AMOUNT_ORIG_CURR,
             CREATED,
             CREATED_BY,
             UPDATED,
             UPDATED_BY,
             TRIP_PRICE,
             SATTLE_STATUS
        from LIMO_TRIPS_TRACKER_V2
      
        where 
      
                  (:P248_CARFILE IS NULL OR USED_CAR_ID = :P248_CARFILE)
              AND (:P248_DRIVERID IS NULL OR DRIVER_ID = :P248_DRIVERID)
      
       

  order-by: 
