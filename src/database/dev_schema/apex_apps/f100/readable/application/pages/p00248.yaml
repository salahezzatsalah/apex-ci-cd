appearance: 
  page-mode: Normal
  page-template: Theme Default
  template-options: 
  - '#DEFAULT#'

navigation-menu: 
  override-user-interface-level: false

navigation: 
  cursor-focus: Do not focus cursor
  warn-on-unsaved-changes: true

css: 
  inline: |
    .trip-table th,
    .trip-table td {
      padding: 12px 14px;
      white-space: nowrap;
    }
    
    .trip-table th {
      font-size: 12px;
      font-weight: 700;
    }
    
    .mission-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      transition: all .15s ease;
    }
    .mission-btn:hover {
      transform: scale(1.06);
    }
    
    .mission-cleared {
      background: #dcfce7;
      color: #166534;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    
    .edit-btn {
      margin-right: 6px;
      background: #f1f5f9;
      color: #334155;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
    }
    .edit-btn:hover {
      background: #e2e8f0;
    }
    
    .trip-row {
      transition: background .2s ease;
    }
    
    
    /* Container */
    .collections-cell {
      line-height: 1.8;
    }
    /* تحصيلات الكابتن */
    .collections-cell {
      line-height: 1.8;
    }
    
    .collection-tag {
      display: inline-block;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      padding: 4px 10px;
      margin: 2px 4px 2px 0;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    
    /* صافي المكتب */
    .office-net-positive {
      color: #166534;
      background: #dcfce7;
      padding: 4px 10px;
      border-radius: 10px;
    }
    
    .office-net-zero {
      color: #64748b;
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 10px;
    }
    
    .office-net-negative {
      color: #991b1b;
      background: #fee2e2;
      padding: 4px 10px;
      border-radius: 10px;
    }
    
    
    .settlement-box{
        max-width:760px;
        margin:auto;
        background:#fff;
        border:1px solid #e5e7eb;
        border-radius:14px;
        padding:22px;
        direction:rtl;
        font-family:"Tahoma","Arial";
    }
    .settlement-title{
        font-size:20px;
        font-weight:800;
        margin-bottom:4px;
    }
    .settlement-sub{
        font-size:12px;
        color:#6b7280;
        margin-bottom:16px;
    }
    .settlement-table{
        width:100%;
        border-collapse:collapse;
        font-size:14px;
    }
    .settlement-table tr{
        border-bottom:1px solid #e5e7eb;
    }
    .settlement-table td{
        padding:10px 6px;
    }
    .label{
        font-weight:600;
        color:#374151;
    }
    .value{
        text-align:left;
        font-weight:700;
    }
    .currency-line{
        display:block;
        line-height:1.4;
    }
    .negative{color:#b91c1c;}
    .positive{color:#047857;}
    .total-row{
        border-top:2px solid #111827;
    }
    .note{
        margin-top:12px;
        font-size:11px;
        color:#6b7280;
    }
    .settle-warning{
        padding:16px;
        border-radius:12px;
        background:#fffbeb;
        border:1px solid #fde68a;
        color:#92400e;
        direction:rtl;
    }

