- # ====== Region: Trips Report ================================
  id: 195831282290579188
  identification: 
    name: Trips Report
    title: ملخص الرحلات
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html CLOB := '';
      BEGIN
          /* =====================================================
             0. Guard clause – no filters selected
             ===================================================== */
          IF :P248_CARFILE IS NULL
             AND :P248_DRIVERID IS NULL
          THEN
              RETURN '
              <div class="p-6 rounded-xl bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm">
                  ⚠️ من فضلك اختر <b>السائق</b> أو <b>السيارة</b> لعرض الرحلات غير المُغلقة.
              </div>';
          END IF;
      
          l_html := '
          <div class="overflow-x-auto">
          <table class="trip-table w-full border-collapse text-sm text-right">
              <thead>
                  <tr class="bg-gray-100 text-gray-700">
                      <th>📆 التاريخ</th>
                      <th>🚗 السيارة</th>
                      <th>🧑‍✈️ السائق</th>
                      <th class="text-left">🎯 قيمة الرحلة</th>
                      <th class="text-left">🪙 تحصيل الكابتن</th>
                      <th class="text-left text-red-600">🔻 المصروفات</th>
                      <th class="text-left font-semibold">🏆 المستحقات</th>
                      <th class="text-center">🎮 المهمة</th>
                  </tr>
              </thead>
              <tbody>';
      
          FOR r IN (
              SELECT
                  t.TRIP_ID,
                  t.TRIP_CURRENCY,
                  t.EXECUTED_DATE,
                  COALESCE(
                      d.DRIVER_NAME,
                      s.SUPPLIER_NAME,
                      'غير معروف'
                  ) AS DRIVER_NAME,
                  t.TOTAL_INVOICE_CURRENCY,
                  NVL(t.TRIP_EXPENSES_EGP,0) AS TRIP_EXPENSES_EGP,
                  t.SATTLE_STATUS,
                  c.car_name || ' - ' || c.license_plate || ' - ' || c.year AS CAR_DISPLAY,
                  NVL(driver_coll.COLLECTIONS_BY_CURR,'—') AS CAPTAIN_COLLECTIONS,
                  NVL(office_coll.OFFICE_COLLECTIONS_TAGS,'—') AS OFFICE_COLLECTIONS
              FROM LIMO_TRIPS_TRACKER_V2 t
              LEFT JOIN COMPANY_REGISTERED_CARS c ON c.id = t.USED_CAR_ID
              LEFT JOIN COMPANY_DRIVERS d ON d.DRIVER_ID = t.DRIVER_ID
              LEFT JOIN SUPPLIERS s ON TO_CHAR(s.SUPPLIER_ID) = t.DRIVER_ID
              LEFT JOIN (
                  SELECT
                      TRIP_ID,
                      LISTAGG(
                          '<span class="collection-tag">' ||
                          TO_CHAR(TOTAL_AMOUNT,'FM999G999G999D00') || ' ' || CURRENCY ||
                          '</span>',
                          ' '
                      ) WITHIN GROUP (ORDER BY CURRENCY) AS COLLECTIONS_BY_CURR
                  FROM (
                      SELECT TRIP_ID, CURRENCY, SUM(AMOUNT_COLLECTED) TOTAL_AMOUNT
                      FROM LIMO_TRIP_COLLECTIONS
                      GROUP BY TRIP_ID, CURRENCY
                  )
                  GROUP BY TRIP_ID
              ) driver_coll ON driver_coll.TRIP_ID = t.TRIP_ID
              LEFT JOIN (
                  SELECT
                      x.TRIP_ID,
                      LISTAGG(
                          '<span class="collection-tag ' ||
                          CASE
                              WHEN x.CURRENCY = 'EGP' AND x.NET_AMOUNT < 0 THEN 'office-net-negative'
                              WHEN x.CURRENCY = 'EGP' AND x.NET_AMOUNT = 0 THEN 'office-net-zero'
                              ELSE 'office-net-positive'
                          END || '">' ||
                          TO_CHAR(x.NET_AMOUNT,'FM999G999G999D00') || ' ' || x.CURRENCY ||
                          '</span>',
                          ' '
                      ) WITHIN GROUP (ORDER BY x.CURRENCY) AS OFFICE_COLLECTIONS_TAGS
                  FROM (
                      SELECT
                          col.TRIP_ID,
                          col.CURRENCY,
                          CASE
                              WHEN col.CURRENCY = 'EGP'
                              THEN col.TOTAL_AMOUNT - NVL(t.TOTAL_DRIVER_PAYOUT_EGP,0)
                              ELSE col.TOTAL_AMOUNT
                          END AS NET_AMOUNT
                      FROM (
                          SELECT TRIP_ID, CURRENCY, SUM(AMOUNT_COLLECTED) TOTAL_AMOUNT
                          FROM LIMO_TRIP_COLLECTIONS
                          GROUP BY TRIP_ID, CURRENCY
                      ) col
                      JOIN LIMO_TRIPS_TRACKER_V2 t
                        ON t.TRIP_ID = col.TRIP_ID
                      UNION ALL
                      SELECT
                          t.TRIP_ID,
                          'EGP',
                          - NVL(t.TOTAL_DRIVER_PAYOUT_EGP,0)
                      FROM LIMO_TRIPS_TRACKER_V2 t
                      WHERE t.TOTAL_DRIVER_PAYOUT_EGP > 0
                        AND NOT EXISTS (
                            SELECT 1
                            FROM LIMO_TRIP_COLLECTIONS c
                            WHERE c.TRIP_ID = t.TRIP_ID
                              AND c.CURRENCY = 'EGP'
                        )
                  ) x
                  GROUP BY x.TRIP_ID
              ) office_coll ON office_coll.TRIP_ID = t.TRIP_ID
              WHERE t.SATTLE_STATUS <> 'SETTLED'
                AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
                AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
              ORDER BY t.EXECUTED_DATE
          ) LOOP
      
              l_html := l_html || '
              <tr class="border-b hover:bg-gray-50">
                  <td>' || TO_CHAR(r.EXECUTED_DATE,'DD Mon YYYY') || '</td>
                  <td>' || NVL(r.CAR_DISPLAY,'—') || '</td>
                  <td>' || r.DRIVER_NAME || '</td>
      
                  <td class="text-left font-semibold">
                      ' || TO_CHAR(NVL(r.TOTAL_INVOICE_CURRENCY,0),'FM999G999G999D00') || '
                      <span class="text-xs text-gray-500">' || r.TRIP_CURRENCY || '</span>
                  </td>
      
                  <td class="text-left">' || r.CAPTAIN_COLLECTIONS || '</td>
      
                  <td class="text-left text-red-600">
                      EGP ' || TO_CHAR(r.TRIP_EXPENSES_EGP,'FM999G999G999D00') || '
                  </td>
      
                  <td class="text-left">' || r.OFFICE_COLLECTIONS || '</td>
      
                  <td class="text-center">';
      
              IF r.SATTLE_STATUS = 'SETTLED' THEN
                  l_html := l_html || '<span class="mission-cleared">✅ رحلة مُغلقة</span>';
              ELSE
                  l_html := l_html || '
                      <button class="mission-btn" data-trip-id="'||r.TRIP_ID||'">
                          🟢 إنهاء الرحلة
                      </button>
      
                      <!-- زر تعديل الرحلة بعد الإصلاح -->
                      <a class="edit-btn"
                         href="f?p='||:APP_ID||':252:'||:APP_SESSION||
                              '::NO::P252_TRIP_ID:'||r.TRIP_ID||'">
                          ⚙️ تعديل
                      </a>';
              END IF;
      
              l_html := l_html || '</td></tr>';
          END LOOP;
      
          l_html := l_html || '
              </tbody>
          </table>
          </div>';
      
          RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P248_CARFILE
    - P248_DRIVERID

  layout: 
    sequence: 80
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  header-and-footer: 
    footer-text: '#TIMING#'

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    performance: 
      lazy-loading: false

- # ====== Region: Summary Breakdown ===========================
  id: 195904121747899277
  identification: 
    name: Summary Breakdown
    title: ملخص اجمالي التسويات المتبقية
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
          l_html CLOB := '';
      
          /* ===== Meta ===== */
          l_trip_count      NUMBER := 0;
          l_start_date      DATE;
          l_end_date        DATE;
          l_working_days    NUMBER := 0;
      
          /* ===== Core totals ===== */
          l_total_expenses_egp        NUMBER := 0;
          l_total_driver_payout_egp   NUMBER := 0;
          l_collected_egp             NUMBER := 0;
      
          /* ===== Settlement results ===== */
          l_company_due_egp           NUMBER := 0;
          l_company_pay_driver_egp    NUMBER := 0;
          l_egp_available             NUMBER := 0;
      
          /* ===== Display blocks ===== */
          l_trip_totals_by_currency   CLOB := '';
          l_collections_by_currency  CLOB := '';
          l_company_currency_due     CLOB := '';
      
      BEGIN
          /* =====================================================
             0. Guard clause
             ===================================================== */
          IF :P248_CARFILE IS NULL
             AND :P248_DRIVERID IS NULL
          THEN
              RETURN '
              <div class="settle-warning">
                  ⚠️ من فضلك اختر <b>السائق</b> أو <b>السيارة</b> لعرض ملخص التسوية.
              </div>';
          END IF;
      
          /* =====================================================
             1. Trips meta + working days
             ===================================================== */
          SELECT
              COUNT(*),
              MIN(EXECUTED_DATE),
              MAX(EXECUTED_DATE),
              COUNT(DISTINCT EXECUTED_DATE),
              SUM(NVL(TRIP_EXPENSES_EGP,0)),
              SUM(NVL(TOTAL_DRIVER_PAYOUT_EGP,0))
          INTO
              l_trip_count,
              l_start_date,
              l_end_date,
              l_working_days,
              l_total_expenses_egp,
              l_total_driver_payout_egp
          FROM LIMO_TRIPS_TRACKER_V2 t
          WHERE t.SATTLE_STATUS <> 'SETTLED'
            AND t.EXECUTED_DATE IS NOT NULL
            AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
            AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE );
      
          /* =====================================================
             2. Trips invoice totals by currency
             ===================================================== */
          SELECT LISTAGG(
              '<span class="currency-line">' ||
              TO_CHAR(SUM(TOTAL_INVOICE_CURRENCY),'FM999G999G999D00') ||
              ' ' || TRIP_CURRENCY || '</span>',
              ''
          ) WITHIN GROUP (ORDER BY TRIP_CURRENCY)
          INTO l_trip_totals_by_currency
          FROM LIMO_TRIPS_TRACKER_V2 t
          WHERE t.SATTLE_STATUS <> 'SETTLED'
            AND t.TRIP_CURRENCY IS NOT NULL
            AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
            AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
          GROUP BY TRIP_CURRENCY;
      
          /* =====================================================
             3. Collections by currency
             ===================================================== */
          SELECT LISTAGG(
              '<span class="currency-line">' ||
              TO_CHAR(SUM(AMOUNT_COLLECTED),'FM999G999G999D00') ||
              ' ' || CURRENCY || '</span>',
              ''
          ) WITHIN GROUP (ORDER BY CURRENCY)
          INTO l_collections_by_currency
          FROM LIMO_TRIP_COLLECTIONS c
          WHERE c.TRIP_ID IN (
              SELECT t.TRIP_ID
              FROM LIMO_TRIPS_TRACKER_V2 t
              WHERE t.SATTLE_STATUS <> 'SETTLED'
                AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
                AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
          )
          GROUP BY CURRENCY;
      
          /* =====================================================
             4. EGP collected
             ===================================================== */
          SELECT NVL(SUM(AMOUNT_COLLECTED),0)
          INTO l_collected_egp
          FROM LIMO_TRIP_COLLECTIONS c
          WHERE c.CURRENCY = 'EGP'
            AND c.TRIP_ID IN (
              SELECT t.TRIP_ID
              FROM LIMO_TRIPS_TRACKER_V2 t
              WHERE t.SATTLE_STATUS <> 'SETTLED'
                AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
                AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
          );
      
          /* =====================================================
             5. Final settlement logic (CORRECT)
             ===================================================== */
          l_egp_available :=
                l_collected_egp
              - l_total_driver_payout_egp
              - l_total_expenses_egp;
      
          IF l_egp_available >= 0 THEN
              l_company_due_egp        := l_egp_available;
              l_company_pay_driver_egp := 0;
          ELSE
              l_company_due_egp        := 0;
              l_company_pay_driver_egp := ABS(l_egp_available);
          END IF;
      
          /* =====================================================
             6. Foreign currencies due to company
             ===================================================== */
          SELECT LISTAGG(
              '<span class="currency-line">' ||
              TO_CHAR(SUM(AMOUNT_COLLECTED),'FM999G999G999D00') ||
              ' ' || CURRENCY || '</span>',
              ''
          ) WITHIN GROUP (ORDER BY CURRENCY)
          INTO l_company_currency_due
          FROM LIMO_TRIP_COLLECTIONS c
          WHERE c.CURRENCY <> 'EGP'
            AND c.TRIP_ID IN (
              SELECT t.TRIP_ID
              FROM LIMO_TRIPS_TRACKER_V2 t
              WHERE t.SATTLE_STATUS <> 'SETTLED'
                AND ( :P248_DRIVERID IS NULL OR t.DRIVER_ID   = :P248_DRIVERID )
                AND ( :P248_CARFILE  IS NULL OR t.USED_CAR_ID = :P248_CARFILE )
          )
          GROUP BY CURRENCY;
      
          /* =====================================================
             7. Render HTML
             ===================================================== */
          l_html := '
          <div class="settlement-box">
              <div class="settlement-title">ملخص تسوية الرحلات</div>
      
              <div class="settlement-sub">
                  عدد الرحلات: <b>'||l_trip_count||'</b><br>
                  أيام التشغيل الفعلية: <b>'||l_working_days||'</b> يوم<br>
                  الفترة: '||TO_CHAR(l_start_date,'DD Mon YYYY')||
                  ' → '||TO_CHAR(l_end_date,'DD Mon YYYY')||'
              </div>
      
              <table class="settlement-table">
                  <tr>
                      <td class="label">إجمالي قيمة الرحلات</td>
                      <td class="value">'||NVL(l_trip_totals_by_currency,'—')||'</td>
                  </tr>
                  <tr>
                      <td class="label">إجمالي التحصيلات</td>
                      <td class="value">'||NVL(l_collections_by_currency,'—')||'</td>
                  </tr>
                  <tr>
                      <td class="label">إجمالي المصروفات (تُعاد للسائق)</td>
                      <td class="value negative">'||
                          TO_CHAR(l_total_expenses_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
                  <tr>
                      <td class="label">إجمالي مستحقات السائق</td>
                      <td class="value">'||
                          TO_CHAR(l_total_driver_payout_egp,'FM999G999G999D00')||' EGP
                      </td>
                  </tr>
                  <tr class="total-row">
                      <td class="label">نتيجة التسوية النهائية</td>
                      <td class="value '||
                      CASE WHEN l_company_pay_driver_egp>0 THEN 'negative' ELSE 'positive' END||'">'||
                      CASE
                          WHEN l_company_pay_driver_egp>0 THEN
                              'على الشركة دفع '||
                              TO_CHAR(l_company_pay_driver_egp,'FM999G999G999D00')||' EGP للسائق'
                          ELSE
                              'على السائق تسليم '||
                              TO_CHAR(l_company_due_egp,'FM999G999G999D00')||' EGP للشركة'
                      END||'</td>
                  </tr>
                  <tr>
                      <td class="label">عملات أجنبية تُسلّم بالكامل للشركة</td>
                      <td class="value">'||NVL(l_company_currency_due,'—')||'</td>
                  </tr>
              </table>
      
              <div class="note">
                  * تم احتساب أيام التشغيل بناءً على تواريخ التنفيذ الفعلية للرحلات فقط.
              </div>
          </div>';
      
          RETURN l_html;
      END;
      
    page-items-to-submit: 
    - P248_CARFILE
    - P248_DRIVERID

  layout: 
    sequence: 60
    parent-region: No Parent
