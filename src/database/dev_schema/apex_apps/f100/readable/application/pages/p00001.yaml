processes: 
- # ====== Process: AIRPORT_AUTOCOMPLETE_EG ====================
  id: 217328560138165255
  identification: 
    name: AIRPORT_AUTOCOMPLETE_EG
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_input VARCHAR2(4000) := NVL(apex_application.g_x01, '');
        l_key   VARCHAR2(4000) := apex_app_setting.get_value('GOOGLE_PLACES_KEY'); -- حطيه في App Settings
        l_url   VARCHAR2(4000) := 'https://places.googleapis.com/v1/places:autocomplete';
        l_body  CLOB;
        l_resp  CLOB;
      BEGIN
        IF LENGTH(TRIM(l_input)) < 2 THEN
          owa_util.mime_header('application/json', FALSE);
          htp.p('{"suggestions": []}');
          RETURN;
        END IF;
      
        -- Request body: Airports فقط + مصر فقط
        l_body :=
          '{'||
          '  "input": "'|| apex_escape.json(l_input) ||'",'||
          '  "includedPrimaryTypes": ["airport"],'||
          '  "includedRegionCodes": ["EG"],'||
          '  "languageCode": "ar"'||
          '}';
      
        apex_web_service.g_request_headers.delete;
        apex_web_service.g_request_headers(1).name  := 'Content-Type';
        apex_web_service.g_request_headers(1).value := 'application/json';
      
        apex_web_service.g_request_headers(2).name  := 'X-Goog-Api-Key';
        apex_web_service.g_request_headers(2).value := l_key;
      
        -- FieldMask مطلوب في Places API (New)
        apex_web_service.g_request_headers(3).name  := 'X-Goog-FieldMask';
        apex_web_service.g_request_headers(3).value := 'suggestions.placePrediction.placeId,suggestions.placePrediction.text';
      
        l_resp := apex_web_service.make_rest_request(
          p_url         => l_url,
          p_http_method => 'POST',
          p_body        => l_body
        );
      
        owa_util.mime_header('application/json', FALSE);
        htp.p(l_resp);
      
      EXCEPTION
        WHEN OTHERS THEN
          owa_util.mime_header('application/json', FALSE);
          htp.p('{"error":true,"message":"' || apex_escape.json(SQLERRM) || '"}');
      END;
      

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

- # ====== Process: airport_calc ===============================
  id: 217328644370165256
  identification: 
    name: airport_calc
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_km  NUMBER;
        l_min NUMBER;
        l_raw CLOB;
      BEGIN
        maps_pkg.compute_route_by_place_id(
          p_from_place_id => :P1_FROM_PLACE_ID,
          p_to_place_id   => :P1_TO_PLACE_ID,
          o_distance_km   => l_km,
          o_duration_min  => l_min,
          o_raw_json      => l_raw
        );
      
        :P1_DISTANCE_KM  := l_km;
        :P1_DURATION_MIN := l_min;
      
      END;
      

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

