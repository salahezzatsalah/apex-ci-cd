- # ====== Process: Calculate counts ===========================
  id: 12234030325217943634
  identification: 
    name: Calculate counts
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      for c1 in (select count(*) c from bs_employees) loop
          :P1_EMPLOYEES := to_char(c1.c,'FM999G999G990'); 
      end loop;
      
      for c1 in (select count(*) c from bs_departments) loop
          :P1_DEPARTMENTS := to_char(c1.c,'FM999G999G990'); 
      end loop;
      
      for c1 in (select count(*) c from suppliers) loop
          :P1_SUPPLIERS := to_char(c1.c,'FM999G999G990'); 
      end loop;
      

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

