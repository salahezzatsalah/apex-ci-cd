- # ====== Region: System Departments Portal ===================
  id: 185546089738262345
  identification: 
    name: System Departments Portal
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html      CLOB;
        l_url       VARCHAR2(4000);
        l_image_url VARCHAR2(4000);
      BEGIN
        l_html := '<div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-5 p-4 text-right">';
      
        FOR r IN (
          SELECT
            MENU_ID,
            MENU_LABEL,
            MENU_PAGE_ID,
            MENU_ICON,
            MENU_IMAGE_URL
          FROM APP_MENU_HOME
          WHERE PARENT_MENU_ID IS NULL
            AND IS_ACTIVE = 'Y'
          ORDER BY DISPLAY_ORDER
        )
        LOOP
          l_url := APEX_UTIL.PREPARE_URL(
            p_url => 'f?p=' || V('APP_ID') || ':' || r.MENU_PAGE_ID || ':' || V('APP_SESSION'),
            p_checksum_type => 'SESSION'
          );
      
          l_html := l_html ||
            '<a href="' || l_url || '" ' ||
            'class="menu-tile group block rounded-2xl shadow-md border border-gray-200 hover:shadow-xl transition transform hover:scale-[1.03] active:scale-100 bg-white p-4 text-center overflow-hidden">';
      
          IF r.MENU_IMAGE_URL IS NOT NULL THEN
            l_image_url := REPLACE(r.MENU_IMAGE_URL, '#APP_FILES#', APEX_APPLICATION.G_IMAGE_PREFIX);
      
            l_html := l_html ||
              '<div class="flex items-center justify-center mb-3">' ||
                '<span class="flex items-center justify-center rounded-full h-16 w-16 bg-gradient-to-tr from-yellow-100 via-white to-yellow-50 shadow-sm border border-yellow-200 group-hover:scale-110 transition overflow-hidden">' ||
                  '<img src="' || l_image_url || '" ' ||
                       'alt="' || apex_escape.html(r.MENU_LABEL) || '" ' ||
                       'class="h-9 w-9 object-contain" ' ||
                       'onerror="this.style.display=''none''; this.parentNode.innerHTML=''<' || 'i class=&quot;' || r.MENU_ICON || ' text-3xl text-yellow-500&quot;></i>'';" />' ||
                '</span>' ||
              '</div>';
          ELSE
            l_html := l_html ||
              '<div class="flex items-center justify-center mb-3">' ||
                '<span class="flex items-center justify-center rounded-full h-16 w-16 bg-gradient-to-tr from-yellow-100 via-white to-yellow-50 shadow-sm border border-yellow-200 group-hover:scale-110 transition">' ||
                  '<i class="' || r.MENU_ICON || ' text-3xl text-yellow-500"></i>' ||
                '</span>' ||
              '</div>';
          END IF;
      
          l_html := l_html ||
            '<div class="text-sm sm:text-base font-bold text-gray-800 tracking-tight group-hover:text-yellow-600 transition leading-tight">' ||
            apex_escape.html(r.MENU_LABEL) ||
            '</div>';
      
          l_html := l_html || '</a>';
        END LOOP;
      
        l_html := l_html || '</div>';
      
        RETURN l_html;
      END;

