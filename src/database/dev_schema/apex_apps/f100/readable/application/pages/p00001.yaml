javascript: 
  file-urls: 
  - 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCHHyMsTG-SA9k9A4WKo_jGMd3e7uR5zxU&libraries=places&loading=async'
  execute-when-page-loads: |
    (async function () {
      async function waitForGoogle() {
        for (let i = 0; i < 60; i++) {
          if (window.google && google.maps && google.maps.importLibrary) return;
          await new Promise(r => setTimeout(r, 200));
        }
        throw new Error("Google Maps JS not ready");
      }
    
      async function mountPAC(slotId, textItem, placeIdItem, placeholder, cfg) {
        const slot = document.getElementById(slotId);
        if (!slot) {
          console.warn("Slot not found:", slotId);
          return;
        }
    
        await waitForGoogle();
        const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");
    
        slot.innerHTML = "";
    
        // ✅ أنشئ الويدجت
        const pac = new PlaceAutocompleteElement();
    
        // ✅ إعدادات حسب المطلوب
        if (cfg?.includedPrimaryTypes) pac.includedPrimaryTypes = cfg.includedPrimaryTypes;
        if (cfg?.includedRegionCodes)  pac.includedRegionCodes  = cfg.includedRegionCodes;
    
        pac.placeholder = placeholder || "";
        pac.style.width = "100%";
        slot.appendChild(pac);
    
        pac.addEventListener("gmp-select", async (e) => {
          const pred = e.placePrediction;
          if (!pred) return;
    
          const place = pred.toPlace();
          await place.fetchFields({ fields: ["formattedAddress", "displayName"] });
    
          const label = place.formattedAddress || place.displayName || "";
          const pid   = place.id || pred.placeId || "";
    
          // ✅ عبّي الـ items القديمة (زي ما انتي عايزة)
          apex.item(textItem).setValue(label);
          apex.item(placeIdItem).setValue(pid);
        });
      }
    
      apex.jQuery(async function () {
        // ✅ FROM: مطارات داخل مصر فقط
        await mountPAC(
          "PAC_FROM_SLOT",
          "P1_AIRPORT_FROM",
          "P1_FROM_PLACE_ID",
          "من (مطار داخل مصر)",
          {
            includedPrimaryTypes: ["airport"],
            includedRegionCodes: ["eg"]
          }
        );
    
        // ✅ TO: أي مكان عادي (بدون قيود)
        await mountPAC(
          "PAC_TO_SLOT",
          "P1_AIRPORT_TO",
          "P1_TO_PLACE_ID",
          "إلى (أي مكان)",
          {
            // لا نمرر أي includedPrimaryTypes ولا includedRegionCodes
          }
        );
    
        console.log("✅ FROM airports(EG) + TO any place");
      });
    })();
    
    
    
    
    
    (async function () {
      async function waitForGoogle() {
        for (let i = 0; i < 60; i++) {
          if (window.google && google.maps && google.maps.importLibrary) return;
          await new Promise(r => setTimeout(r, 200));
        }
        throw new Error("Google Maps JS not ready");
      }
    
      async function mountPAC(slotId, textItem, placeIdItem, placeholder) {
        const slot = document.getElementById(slotId);
        if (!slot) return;
    
        await waitForGoogle();
        const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");
    
        slot.innerHTML = "";
    
        const pac = new PlaceAutocompleteElement();
        pac.placeholder = placeholder || "";
        pac.style.width = "100%";
        slot.appendChild(pac);
    
        pac.addEventListener("gmp-select", async (e) => {
          const pred = e.placePrediction;
          if (!pred) return;
    
          const place = pred.toPlace();
          await place.fetchFields({ fields: ["formattedAddress", "displayName"] });
    
          const label = place.formattedAddress || place.displayName || "";
          const pid   = place.id || pred.placeId || "";
    
          apex.item(textItem).setValue(label);
          apex.item(placeIdItem).setValue(pid);
        });
      }
    
      // ✅ مهم جدًا في التابات: نركّب الويدجت لما التاب تتفتح كمان
      let mounted = false;
    
      async function initCityPAC() {
        if (mounted) return;
        if (!document.getElementById("PAC_CITY_FROM_SLOT")) return;
    
        await mountPAC("PAC_CITY_FROM_SLOT", "P1_FROM_TEXT", "P1_FROM_ID", "من (أي مكان)");
        await mountPAC("PAC_CITY_TO_SLOT",   "P1_TO_TEXT",   "P1_TO_ID",   "إلى (أي مكان)");
        mounted = true;
    
        console.log("✅ City PAC mounted");
      }
    
      apex.jQuery(async function () {
        // أول تحميل
        await initCityPAC();
    
        // لو التاب بتتغير بعد التحميل (UT Tabs)
        apex.jQuery(document).on("apexafterrefresh", function () {
          initCityPAC();
        });
    
        // لو بتستخدمي Tabs (Universal Theme) — ده بيساعد جدًا
        apex.jQuery(document).on("click", "a.t-Tabs-link", function () {
          setTimeout(initCityPAC, 50);
        });
      });
    })();
    

css: 
  inline: |
    
    .sp-tag {
        padding: 2px 4px;
        display: inline-block;
        vertical-align: text-bottom;
        border-radius: 3px;
        background-color: rgba(0,0,0,.1);
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .sp-tags-container {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: flex-start;
    }
    
    .resize-region {
      resize: vertical;
      overflow: auto;
    }
    
    .a-CardView-iconWrap,
    .a-CardView-badge { align-self: flex-start; }
    
    
    /* container */
    .airport-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    
    /* كل فيلد */
    .airport-field {
      background: #ffffff;
      color: #000;       /* أسود أنيق */
      border-radius: 12px;
      padding: 14px 16px;
      position: relative;
      box-shadow: 0 6px 18px rgba(0,0,0,.35);
    }
    
    /* الليبل */
    .airport-label {
      display: block;
      font-size: 13px;
      color: #cfcfcf;
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    /* عنصر Google نفسه */
    .airport-field gmp-place-autocomplete,
    .airport-field input {
      width: 100%;
      background: transparent !important;
      border: none !important;
      color: #fff !important;
      font-size: 15px;
      outline: none;
    }
    
    /* placeholder */
    .airport-field ::placeholder {
      color: #9a9a9a;
    }
    
    /* hover / focus */
    .airport-field:focus-within {
      box-shadow: 0 0 0 2px #caa24d; /* دهبي خفيف */
    }
    .airport-field.from {
      border-right: 4px solid #4caf50; /* أخضر */
    }
    
    .airport-field.to {
      border-right: 4px solid #2196f3; /* أزرق */
    }
    
    
    /* أيقونة البحث */
    .airport-field::after {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .6;
    }
    
    /* padding بسبب الأيقونة */
    .airport-field gmp-place-autocomplete {
      padding-left: 26px;
    }
    
    /* موبايل */
    @media (max-width: 768px) {
      .airport-grid {
        grid-template-columns: 1fr;
      }
    }
    

