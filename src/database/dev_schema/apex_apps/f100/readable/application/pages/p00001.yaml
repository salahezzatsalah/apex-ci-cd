- # ====== Region: Dashboard ===================================
  id: 220215200350152157
  identification: 
    name: Dashboard
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        l_html CLOB := '';
      
        n_new    NUMBER;
        n_assign NUMBER;
        n_prog   NUMBER;
        n_done   NUMBER;
        n_bad    NUMBER;
      
        FUNCTION esc(p_txt VARCHAR2) RETURN VARCHAR2 IS
        BEGIN
          RETURN apex_escape.html(NVL(p_txt,''));
        END;
      
      BEGIN
      
      /* =====================================================
         KPI
      ===================================================== */
      
        SELECT
          SUM(CASE WHEN status_code IN ('NEW','PENDING_OPS') THEN 1 ELSE 0 END),
          SUM(CASE WHEN status_code = 'ASSIGNED' THEN 1 ELSE 0 END),
          SUM(CASE WHEN status_code = 'IN_PROGRESS' THEN 1 ELSE 0 END),
          SUM(CASE WHEN status_code = 'COMPLETED' THEN 1 ELSE 0 END),
          SUM(CASE WHEN status_code IN ('FAILED','CANCELLED') THEN 1 ELSE 0 END)
        INTO
          n_new, n_assign, n_prog, n_done, n_bad
        FROM ops_orders_current
        WHERE is_active = 'Y';
      
      
      /* =====================================================
         CSS + JS
      ===================================================== */
      
      l_html := l_html || q'[
      <style>
      
      .ops-wrap{
        display:flex;
        flex-direction:column;
        gap:12px;
        direction:rtl;
      }
      
      /* KPI */
      
      .kpi-row{display:flex;gap:10px;flex-wrap:wrap}
      
      .kpi{
        flex:1;
        min-width:130px;
        background:#fff;
        border:1px solid #e2e8f0;
        border-radius:12px;
        padding:12px;
        text-align:center;
        cursor:pointer;
        font-weight:900;
      }
      
      .kpi:hover{background:#f8fafc}
      .kpi .v{font-size:22px;margin-top:4px}
      
      
      /* Search */
      
      .search-box{
        background:#fff;
        border:1px solid #e2e8f0;
        border-radius:12px;
        padding:10px;
        display:flex;
        gap:8px;
      }
      
      .search-box input{
        flex:1;
        border:none;
        outline:none;
        font-size:13px;
        font-weight:700;
      }
      
      
      /* Desktop Table */
      
      .tbl{
        width:100%;
        border-collapse:separate;
        border-spacing:0 6px;
        display:table;
      }
      
      .tbl th{
        font-size:11px;
        font-weight:900;
        color:#475569;
        padding:6px;
      }
      
      .tbl td{
        background:#fff;
        padding:8px 10px;
        font-size:11px;
        font-weight:800;
        border-top:1px solid #e2e8f0;
        border-bottom:1px solid #e2e8f0;
      }
      
      
      /* Service */
      
      .svc-title{font-weight:900}
      .svc-sub{font-size:10px;color:#64748b}
      
      
      /* Status */
      
      .badge{
        padding:3px 8px;
        border-radius:999px;
        font-size:10px;
        font-weight:900;
      }
      
      .b-new{background:#fffbeb;color:#92400e}
      .b-prog{background:#eff6ff;color:#1d4ed8}
      .b-done{background:#ecfdf5;color:#065f46}
      .b-bad{background:#fff1f2;color:#9f1239}
      
      
      /* Dropdown */
      
      .dd{position:relative;display:inline-block}
      
      .dd-btn{
        font-size:10px;
        padding:5px 8px;
        border-radius:8px;
        border:1px solid #cbd5e1;
        background:#fff;
        cursor:pointer;
      }
      
      .dd-menu{
        display:none;
        position:absolute;
        left:0;
        top:110%;
        background:#fff;
        border:1px solid #e2e8f0;
        border-radius:10px;
        min-width:160px;
        z-index:50;
      }
      
      .dd-menu a{
        display:block;
        padding:7px 10px;
        font-size:11px;
        font-weight:800;
        text-decoration:none;
      }
      
      .dd-menu a:hover{background:#f1f5f9}
      
      .dd.open .dd-menu{display:block}
      
      
      /* Mobile Cards */
      
      .mob-list{
        display:none;
        flex-direction:column;
        gap:10px;
      }
      
      .mob-card{
        background:#fff;
        border:1px solid #e2e8f0;
        border-radius:14px;
        padding:12px;
      }
      
      
      /* Switch */
      
      @media(max-width:768px){
      
        .tbl{display:none !important}
        .mob-list{display:flex}
      
      }
      
      </style>
      
      
      <script>
      
      function refreshOps(){
        apex.region("OPS_DASH").refresh();
      }
      
      
      function setKpi(v){
        $s("P1_KPI_STATUS",v);
        refreshOps();
      }
      
      
      function doSearch(){
        refreshOps();
      }
      
      
      function go(url){
        if(url){ apex.navigation.redirect(url); }
      }
      
      
      function toggleDD(id){
      
        document.querySelectorAll(".dd")
          .forEach(d=>d.classList.remove("open"));
      
        var el=document.getElementById(id);
      
        if(el){ el.classList.toggle("open"); }
      }
      
      
      document.addEventListener("click",e=>{
        if(!e.target.closest(".dd")){
          document.querySelectorAll(".dd")
            .forEach(d=>d.classList.remove("open"));
        }
      });
      
      
      /* Pull to refresh */
      
      let y0=0;
      
      document.addEventListener("touchstart",e=>{
        if(window.scrollY===0){
          y0=e.touches[0].clientY;
        }
      });
      
      document.addEventListener("touchend",e=>{
      
        let y1=e.changedTouches[0].clientY;
      
        if(y1-y0>90){
          refreshOps();
        }
      
      });
      
      </script>
      ]';
      
      
      /* =====================================================
         CONTAINER
      ===================================================== */
      
      l_html := l_html || '<div class="ops-wrap">';
      
      
      /* =====================================================
         KPI
      ===================================================== */
      
      l_html := l_html || '
      
      <div class="kpi-row">
      
      <div class="kpi" onclick="setKpi(''NEW'')">🟡 جديد<div class="v">'||n_new||'</div></div>
      <div class="kpi" onclick="setKpi(''ASSIGNED'')">👤 موزع<div class="v">'||n_assign||'</div></div>
      <div class="kpi" onclick="setKpi(''IN_PROGRESS'')">⚙️ جاري<div class="v">'||n_prog||'</div></div>
      <div class="kpi" onclick="setKpi(''COMPLETED'')">✅ مكتمل<div class="v">'||n_done||'</div></div>
      <div class="kpi" onclick="setKpi(''FAILED'')">❌ مشكلة<div class="v">'||n_bad||'</div></div>
      
      </div>
      ';
      
      
      /* =====================================================
         SEARCH
      ===================================================== */
      
      l_html := l_html || '
      
      <div class="search-box">
      
      <input type="text"
       value="'||esc(:P1_SEARCH)||'"
       placeholder="بحث..."
       onkeyup="apex.item(''P1_SEARCH'').setValue(this.value);doSearch();">
      
      </div>
      ';
      
      
      /* =====================================================
         MOBILE
      ===================================================== */
      
      l_html := l_html || '<div class="mob-list">';
      
      
      /* =====================================================
         TABLE
      ===================================================== */
      
      l_html := l_html || '
      
      <table class="tbl">
      
      <thead>
      <tr>
      <th>الخدمة</th><th>الطلب</th><th>العميل</th>
      <th>الحالة</th><th>المسؤول</th><th>التاريخ</th>
      <th>المبلغ</th><th>إجراء</th>
      </tr>
      </thead>
      
      <tbody>
      ';
      
      
      /* =====================================================
         DATA LOOP
      ===================================================== */
      
      FOR r IN (
      
        SELECT *
        FROM ops_orders_current
        WHERE is_active='Y'
      
        AND (
             :P1_KPI_STATUS IS NULL
          OR status_code=:P1_KPI_STATUS
        )
      
        AND (
             :P1_SEARCH IS NULL
          OR order_item_id LIKE '%'||:P1_SEARCH||'%'
          OR client_code LIKE '%'||:P1_SEARCH||'%'
        )
      
        ORDER BY priority_score DESC
        FETCH FIRST 100 ROWS ONLY
      
      )
      LOOP
      
        DECLARE
          v_cls VARCHAR2(20);
          v_url VARCHAR2(4000);
          v_dd  VARCHAR2(40);
        BEGIN
      
          IF r.status_code IN ('NEW','PENDING_OPS') THEN
            v_cls:='b-new';
          ELSIF r.status_code IN ('ASSIGNED','IN_PROGRESS') THEN
            v_cls:='b-prog';
          ELSIF r.status_code='COMPLETED' THEN
            v_cls:='b-done';
          ELSE
            v_cls:='b-bad';
          END IF;
      
          v_url := order_router_util.details_url(r.ref_table,r.ref_id);
          v_dd  := 'dd_'||r.order_item_id;
      
      
      /* MOBILE */
      
      l_html := l_html || '
      
      <div class="mob-card">
      
      <div>
      <span class="badge '||v_cls||'">'||esc(r.status_code)||'</span>
      </div>
      
      <div class="mob-title">'||esc(r.service_title_ar)||'</div>
      <div class="mob-sub">'||esc(r.service_subtitle_ar)||'</div>
      
      <div class="mob-row">#'||esc(r.order_item_id)||' | '||esc(r.client_code)||'</div>
      
      <div class="mob-row">💰 '||esc(r.amount_egp)||' EGP</div>
      
      </div>
      ';
      
      
      /* DESKTOP */
      
      l_html := l_html || '
      
      <tr>
      
      <td>
      <div class="svc-title">'||esc(r.service_title_ar)||'</div>
      <div class="svc-sub">'||esc(r.service_subtitle_ar)||'</div>
      </td>
      
      <td>'||esc(r.order_item_id)||'<br>'||esc(r.main_res_id)||'</td>
      
      <td>'||esc(r.client_code)||'<br>'||esc(r.client_phone)||'</td>
      
      <td><span class="badge '||v_cls||'">'||esc(r.status_code)||'</span></td>
      
      <td>'||esc(r.assigned_to_name)||'</td>
      
      <td>'||esc(TO_CHAR(r.created_at,'DD/MM HH24:MI'))||'</td>
      
      <td>'||esc(r.amount_egp)||'</td>
      
      <td>
      
      <div class="dd" id="'||v_dd||'">
      
      <div class="dd-btn" onclick="toggleDD('''||v_dd||''')">⋮</div>
      
      <div class="dd-menu">
      <a href="javascript:go('''||v_url||''')">👁 التفاصيل</a>
      </div>
      
      </div>
      
      </td>
      
      </tr>
      ';
      
        END;
      
      END LOOP;
      
      
      /* =====================================================
         CLOSE
      ===================================================== */
      
      l_html := l_html || '
      
      </div> <!-- mobile -->
      
      </tbody>
      </table>
      
      </div>
      ';
      
      
      RETURN l_html;
      
      END;
      

